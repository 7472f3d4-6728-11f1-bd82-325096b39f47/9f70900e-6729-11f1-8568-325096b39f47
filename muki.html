そうだ)と書きます。\n★苛性ソーダはNaOH。"},{"q":"炭酸ナトリウムは水に溶けると[____](性)を示す。","answer":"強塩基性","choices":["強塩基性","弱塩基性","強酸性","弱酸性"],"explain":"炭酸ナトリウムは水に溶けると[ 強塩基性 ]を示す。\n★CO₃²⁻ + H₂O ⇄ HCO₃⁻ + OH⁻\n★炭酸ナトリウムは強塩基NaOHと弱酸H₂CO₃由来ですが、炭酸イオンもOH⁻を作りやすく「比較的強い塩基性(pH12付近)」になります。\n★比較：炭酸ナトリウムNa₂CO₃は「比較的強い塩基性(pH12)」\n★炭酸水素ナトリウムNaHCO₃は「弱塩基性(pH8)」\n★硫酸水素ナトリウムNaHSO₄は「かなり強い酸性」"},{"q":"炭酸ナトリウムは熱すると400°C前後で徐々に分解して[____]を発生する。","answer":"二酸化炭素","choices":["二酸化炭素","水素","水","水酸化ナトリウム"],"explain":"炭酸ナトリウムは熱すると400°C前後で徐々に分解して[ 二酸化炭素 ]を発生する。\n★Na₂CO₃ ⇄ Na₂O + CO₂\n★炭酸ナトリウムの融点は851°Cですがそれよりも低い400°C前後から分解していきます。(啓林館 高校化学より)\n★多くの参考書には「炭酸ナトリウムは加熱しても分解しないが強酸を加えると分解し二酸化炭素CO₂を発生する」という記述もあり「炭酸ナトリウムは加熱で分解するのか、しないのか」ややこしいところがあります。"},{"q":"炭酸ナトリウムに[____]を加えると二酸化炭素が発生する。","answer":"強酸","choices":["強酸","強塩基","水","水素"],"explain":"炭酸ナトリウムに[ 強酸 ]を加えると二酸化炭素が発生する。\n★Na₂CO₃ + 2HCl → 2NaCl + H₂O + CO₂"},{"q":"炭酸ナトリウムの水溶液を濃縮していくと無色の[____]の結晶が析出する。この物質には[____](性)がある。","answer":"Na₂CO₃・10H₂O、風解性","choices":["Na₂CO₃・10H₂O、風解性","Na₂CO₃・10H₂O、潮解性","NaHCO₃、風解性","NaHCO₃、潮解性"],"explain":"炭酸ナトリウムの水溶液を濃縮していくと無色の[ Na₂CO₃・10H₂O ]の結晶が析出する。この物質には[ 風解性 ]がある。\n★炭酸ナトリウム・十水和物(洗濯ソーダ)Na₂CO₃・10H₂Oのような結晶に一定の割合で結合している水分子を水和水といいます。"},{"q":"Na₂CO₃・10H₂Oは空気中で放置すると、Na₂CO₃・H₂Oになる。この現象を[____]という。","answer":"風解","choices":["風解","潮解","昇華","融解"],"explain":"Na₂CO₃・10H₂Oは空気中で放置すると、Na₂CO₃・H₂Oになる。この現象を[ 風解 ]という。\n★Na₂CO₃・10H₂Oは風解性、NaOHは潮解性を覚えます。\n★炭酸ナトリウムの十水和物を洗濯ソーダ(せんたくソーダ)ともいいます。"},{"q":"結晶が自然に水和水を失う現象を[____]という。","answer":"風解","choices":["風解","潮解","昇華","融解"],"explain":"結晶が自然に水和水を失う現象を[ 風解 ]という。"},{"q":"結晶が自然に水和水を失う現象を[____]といい、結晶が空気中の水分を吸収して溶ける現象を[____]という。","answer":"風解、潮解","choices":["風解、潮解","風解、融解","潮解、風解","潮解、融解"],"explain":"結晶が自然に水和水を失う現象を[ 風解 ]といい、結晶が空気中の水分を吸収して溶ける現象を[ 潮解 ]という。"},{"q":"炭酸水素ナトリウムNaHCO₃は[____]とも呼ばれる。","answer":"重曹","choices":["重曹","炭酸ソーダ","カセイ(苛性)ソーダ","ソーダ石灰"],"explain":"炭酸水素ナトリウムNaHCO₃は[ 重曹 ]とも呼ばれる。\n★重曹(じゅうそう)と読みます。\n★苛性ソーダNaOH\n★ソーダ石灰NaOH + CaO\n★炭酸ソーダNa₂CO₃\n★炭酸ナトリウムNa₂CO₃を炭酸ソーダもしくはソーダ(曹達)と呼び、炭酸水素ナトリウムNaHCO₃を重炭酸ナトリウムと呼ぶことから、重炭酸ソーダ→重ソーダ(曹達)→重曹(じゅうそう)です。"},{"q":"炭酸水素ナトリウムNaHCO₃は、別名[____]とも呼ばれる[____]である。","answer":"重曹、白色粉末(固体)","choices":["重曹、白色粉末(固体)","重曹、淡赤色の固体","炭酸ソーダ、白色粉末(固体)","炭酸ソーダ、淡赤色の固体"],"explain":"炭酸水素ナトリウムNaHCO₃は、別名[ 重曹 ]とも呼ばれる[ 白色粉末(固体) ]である。\n★炭酸ナトリウムNa₂CO₃を炭酸ソーダもしくはソーダ(曹達)と呼び、炭酸水素ナトリウムNaHCO₃を重炭酸ナトリウムと呼ぶことから、重炭酸ソーダ→重ソーダ(曹達)→重曹(じゅうそう)です。"},{"q":"炭酸水素ナトリウムは水に少し溶けて[____](性)を示す。","answer":"弱塩基性","choices":["弱塩基性","強塩基性","弱酸性","強酸性"],"explain":"炭酸水素ナトリウムは水に少し溶けて[ 弱塩基性 ]を示す。\n★炭酸水素ナトリウムNaHCO₃は強塩基NaOHと弱酸H₂CO₃由来なので弱塩基性(pH8)になります。例外、炭酸ナトリウムNa₂CO₃は「比較的強い塩基性」を示します。二段階中和滴定の範囲でも登場します。また、硫酸水素ナトリウムNaHSO₄は「かなり強い酸性」です。"},{"q":"炭酸ナトリウムは水に溶けて[____](性)を示す。","answer":"強塩基性","choices":["強塩基性","弱塩基性","弱酸性","強酸性"],"explain":"炭酸ナトリウムは水に少し溶けて[ 強塩基性 ]を示す。\n★強塩基と弱酸の塩の多くは弱塩基になりやすいですが、炭酸ナトリウムNa₂CO₃は「比較的強い塩基性(pHは12付近)」を示します。★比較：炭酸水素ナトリウムNaHCO₃は弱塩基性(pH8)、\n硫酸水素ナトリウムNaHSO₄は「かなり強い酸性」です。"},{"q":"炭酸水素ナトリウムを熱するか、もしくは、強酸を加えると[____]が発生する。","answer":"二酸化炭素","choices":["二酸化炭素","水素","水酸化ナトリウム","炭酸ナトリウム"],"explain":"炭酸水素ナトリウムを熱するか、もしくは、強酸を加えると[ 二酸化炭素 ]が発生する。\n★①加熱、②強酸はHCl\n①2NaHCO₃ → Na₂CO₃ + CO₂ + H₂O (加熱)\n②NaHCO₃ + HCl → NaCl + H₂O + CO₂"},{"q":"2NaHCO₃ → [____]","answer":"Na₂CO₃ + CO₂ + H₂O (加熱必要)","choices":["Na₂CO₃ + CO₂ + H₂O (加熱必要)","Na₂CO₃ + CO₂ + H₂O (加熱なし)","2NaOH + CO₂ + H₂O (加熱必要)","2NaOH + CO₂ + H₂O (加熱なし)"],"explain":"2NaHCO₃ → Na₂CO₃ + CO₂ + H₂O (加熱必要)\n★炭酸水素ナトリウムを熱すると二酸化炭素が発生します。★塩酸などの強酸を加えても二酸化炭素が発生します。"},{"q":"NaHCO₃ + HCl → [____]","answer":"NaCl + H₂O + CO₂ (加熱なし)","choices":["NaCl + H₂O + CO₂ (加熱なし)","NaCl + H₂O + CO₂ (加熱必要)","NaOH + H₂O + CO₂ (加熱なし)","NaOH + H₂O + CO₂ (加熱必要)"],"explain":"NaHCO₃ + HCl → NaCl + H₂O + CO₂ (加熱なし)\n★炭酸水素ナトリウムに強酸を加えると二酸化炭素が発生します。強酸との反応では加熱は必要ありません。★(強酸なしで)単に加熱することでも二酸化炭素が発生します。"},{"q":"炭酸水素ナトリウムを入れた試験管をガスバーナーで熱するとき、試験管の[____]を試験管ばさみで固定し、試験管の口は[____]。","answer":"口の付近、下げる","choices":["口の付近、下げる","口の付近、下げなくてもよい","加熱部分、下げる","加熱部分、下げなくてもよい"],"explain":"炭酸水素ナトリウムを入れた試験管をガスバーナーで熱するとき、試験管の[ 口の付近 ]を試験管ばさみで固定し、試験管の口は[ 下げる ]。水が発生する反応では試験管の口を下げて、水滴により試験管が割れることを防ぎます。"},{"q":"セッケン、製紙、繊維の製造、乾燥剤などに利用されているナトリウムの化合物は[____]。別名[____]。","answer":"水酸化ナトリウム、カセイソーダ","choices":["水酸化ナトリウム、カセイソーダ","炭酸ナトリウム、炭酸ソーダ","炭酸水素ナトリウム、重曹","酸化ナトリウム、なし"],"explain":"セッケン、製紙、繊維の製造、乾燥剤などに利用されているナトリウムの化合物は[ 水酸化ナトリウム ]。別名[ カセイソーダ ]。\n★乾燥剤に注目します。\n★漢字では苛性ソーダと書きます。どちらの表記でも出題されます。"},{"q":"ガラスやセッケン、製紙、染料、医薬品などに利用されているナトリウムの化合物は[____]。別名[____]。","answer":"炭酸ナトリウム、炭酸ソーダ","choices":["炭酸ナトリウム、炭酸ソーダ","炭酸ナトリウム、重曹","炭酸水素ナトリウム、炭酸ソーダ","炭酸水素ナトリウム、重曹"],"explain":"ガラスやセッケン、製紙、染料、医薬品などに利用されているナトリウムの化合物は[ 炭酸ナトリウム ]。別名[ 炭酸ソーダ ]。\n★ガラスの製造は主に炭酸ナトリウムです。"},{"q":"ふくらし粉(ベーキングパウダー)、入浴剤、内服胃腸薬などに利用されているナトリウムの化合物は[____]。別名[____]。","answer":"炭酸水素ナトリウム、重曹","choices":["炭酸水素ナトリウム、重曹","水酸化ナトリウム、カセイ(苛性)ソーダ","炭酸ナトリウム、炭酸ソーダ","酸化ナトリウム、なし"],"explain":"ふくらし粉(ベーキングパウダー)、入浴剤、内服胃腸薬などに利用されているナトリウムの化合物は[ 炭酸水素ナトリウム ]。別名[ 重曹 ]。\n★ベーキングパウダーは他より頻度が高くなっています。\n★炭酸ナトリウムNa₂CO₃を炭酸ソーダもしくはソーダ(曹達)と呼び、炭酸水素ナトリウムNaHCO₃を重炭酸ナトリウムと呼ぶことから、重炭酸ソーダ→重ソーダ(曹達)→重曹(じゅうそう)です。"}]},
  {"code":"MC03","name":"ソルベー法","parent":"典型金属","questions":[{"q":"アンモニアソーダ法(ソルベー法)の全体反応の化学式は[____]である。","answer":"2NaCl + CaCO₃ → CaCl₂ + Na₂CO₃","choices":["2NaCl + CaCO₃ → CaCl₂ + Na₂CO₃","2NaCl + CaCO₃ → CaCl₂ + NaHCO₃","CaCl₂ + Na₂CO₃ → 2NaCl + CaCO₃","CaCl₂ + NaHCO₃ → 2NaCl + CaCO₃"],"explain":"アンモニアソーダ法(ソルベー法)の全体反応の化学式は\n2NaCl + CaCO₃ → CaCl₂ + Na₂CO₃\nである。\n★反応が自然に進む向きは左向きです。直接は起こらない反応をいくつかの過程を踏んで実現しています。"},{"q":"アンモニアソーダ法(ソルベー法)の原料は[____]と[____]である。","answer":"塩化ナトリウム、炭酸カルシウム","choices":["塩化ナトリウム、炭酸カルシウム","二酸化炭素、アンモニア","塩化カルシウム、炭酸ナトリウム","水酸化ナトリウム、炭酸水素カルシウム"],"explain":"アンモニアソーダ法(ソルベー法)の原料は[ 塩化ナトリウム ]と[ 炭酸カルシウム ]である。\n★全体の反応式は\n2NaCl + CaCO₃ → CaCl₂ + Na₂CO₃"},{"q":"アンモニアソーダ法(ソルベー法)の生成物は[____]と[____]である。","answer":"塩化カルシウム、炭酸ナトリウム","choices":["塩化カルシウム、炭酸ナトリウム","塩化ナトリウム、炭酸カルシウム","二酸化炭素、アンモニア","水酸化ナトリウム、炭酸水素カルシウム"],"explain":"アンモニアソーダ法(ソルベー法)の生成物は[ 塩化カルシウム ]と[ 炭酸ナトリウム ]である。\n★全体の反応式は\n2NaCl + CaCO₃ → CaCl₂ + Na₂CO₃"},{"q":"アンモニアソーダ法(ソルベー法)の反応過程で再利用される化合物を2つあげるとすれば[____]と[____]である。","answer":"二酸化炭素、アンモニア","choices":["二酸化炭素、アンモニア","塩化カルシウム、炭酸ナトリウム","塩化ナトリウム、炭酸カルシウム","水酸化ナトリウム、炭酸水素カルシウム"],"explain":"アンモニアソーダ法(ソルベー法)の反応過程で再利用される化合物を2つあげるとすれば[ 二酸化炭素 ]と[ アンモニア ]である。\n★どちらも気体です。理論上は全て再利用できますが、実際は全て再利用することは少ないようです。"},{"q":"アンモニアソーダ法(ソルベー法)において、カルシウム化合物は次の過程を進む。\n[____]","answer":"CaCO₃→CaO→Ca(OH)₂→CaCl₂","choices":["CaCO₃→CaO→Ca(OH)₂→CaCl₂","CaCO₃→Ca(OH)₂→CaO→CaCl₂","CaCl₂→CaO→Ca(OH)₂→CaCO₃","CaCl₂→Ca(OH)₂→CaO→CaCO₃"],"explain":"アンモニアソーダ法(ソルベー法)において、カルシウム化合物は次の過程を進む。\nCaCO₃→CaO→Ca(OH)₂→CaCl₂\n★全体の反応式は\n2NaCl + CaCO₃ → CaCl₂ + Na₂CO₃"},{"q":"アンモニアソーダ法(ソルベー法)において、ナトリウム化合物は次の過程を進む。\n[____]","answer":"NaCl→NaHCO₃→Na₂CO₃","choices":["NaCl→NaHCO₃→Na₂CO₃","NaCl→Na₂CO₃→NaHCO₃","Na₂CO₃→NaHCO₃→NaCl","Na₂CO₃→NaCl→NaHCO₃"],"explain":"アンモニアソーダ法(ソルベー法)において、ナトリウム化合物は次の過程を進む。\nNaCl→NaHCO₃→Na₂CO₃\n★全体の反応式は\n2NaCl + CaCO₃ → CaCl₂ + Na₂CO₃"},{"q":"飽和食塩水にアンモニアと二酸化炭素を十分に吹き込むと沈殿するのは[____]である。","answer":"炭酸水素ナトリウム","choices":["炭酸水素ナトリウム","塩化アンモニウム","炭酸ナトリウム","塩化ナトリウム"],"explain":"飽和食塩水にアンモニアと二酸化炭素を十分に吹き込むと、[ 炭酸水素ナトリウム ]が沈殿する。\n★比較的溶解度の小さい炭酸水素ナトリウムは沈殿します。\n★NaCl + NH₃ + CO₂ + H₂O → NaHCO₃ + NH₄Cl (加熱なし)"},{"q":"NaCl + NH₃ + CO₂ + H₂O → [____]","answer":"NaHCO₃ + NH₄Cl (加熱なし)","choices":["NaHCO₃ + NH₄Cl (加熱なし)","NaHCO₃ + NH₄Cl (加熱必要)","Na₂CO₃ + NH₄Cl (加熱必要)","Na₂CO₃ + NH₄Cl (加熱なし)"],"explain":"NaCl + NH₃ + CO₂ + H₂O → NaHCO₃ + NH₄Cl (加熱なし)\n★飽和食塩水にアンモニアと二酸化炭素を十分に吹き込むと、炭酸水素ナトリウムが沈殿します。"},{"q":"[____] → NaHCO₃ + NH₄Cl","answer":"NaCl + NH₃ + CO₂ + H₂O (加熱なし)","choices":["NaCl + NH₃ + CO₂ + H₂O (加熱なし)","NaCl + NH₃ + CO₂ + H₂O (加熱必要)","Na₂CO₃ + NH₃ (加熱必要)","Na₂CO₃ + NH₃ (加熱なし)"],"explain":"NaCl + NH₃ + CO₂ + H₂O → NaHCO₃ + NH₄Cl (加熱なし)\n★飽和食塩水にアンモニアと二酸化炭素を十分に吹き込むと、炭酸水素ナトリウムが沈殿します。"},{"q":"炭酸水素ナトリウムを加熱すると[____]が得られる。","answer":"炭酸ナトリウム","choices":["炭酸ナトリウム","二酸化炭素とアンモニア","炭酸カルシウム","炭酸水素カルシウム"],"explain":"炭酸水素ナトリウムを加熱すると[ 炭酸ナトリウム ]が得られる。\n★2NaHCO₃ → Na₂CO₃ + CO₂ + H₂O (加熱必要)"},{"q":"2NaHCO₃ → [____]","answer":"Na₂CO₃ + CO₂ + H₂O (加熱必要)","choices":["Na₂CO₃ + CO₂ + H₂O (加熱必要)","Na₂CO₃ + CO₂ + H₂O (加熱なし)","2NaOH + CO₂ + H₂O (加熱必要)","2NaOH + CO₂ + H₂O (加熱なし)"],"explain":"2NaHCO₃ → Na₂CO₃ + CO₂ + H₂O (加熱必要)\n★炭酸水素ナトリウムを加熱すると炭酸ナトリウムが得られます。\n★分解反応は加熱する熱分解反応が基本です。"},{"q":"[____] → Na₂CO₃ + CO₂ + H₂O","answer":"2NaHCO₃ (加熱必要)","choices":["2NaHCO₃ (加熱必要)","2NaHCO₃ (加熱なし)","Ca(HCO₃)₂ (加熱必要)","Ca(HCO₃)₂ (加熱なし)"],"explain":"2NaHCO₃ → Na₂CO₃ + CO₂ + H₂O (加熱必要)\n★炭酸水素ナトリウムを加熱すると炭酸ナトリウムが得られます。\n★分解反応は加熱する熱分解反応が基本です。"},{"q":"炭酸カルシウムCaCO₃は[____]とも呼ばれる。","answer":"石灰石","choices":["石灰石","消石灰","生石灰","石灰水"],"explain":"炭酸カルシウムCaCO₃は[ 石灰石 ]とも呼ばれる。\n★炭酸カルシウムCaCO₃は石灰石\n★酸化カルシウムCaOは生石灰(せいせっかい)\n★水酸化カルシウムCa(OH)₂は消石灰(しょうせっかい)\n★石灰水は消石灰の水溶液です。"},{"q":"石灰石を熱すると[____]が得られる。","answer":"酸化カルシウム","choices":["酸化カルシウム","水酸化カルシウム","炭酸カルシウム","炭化カルシウム"],"explain":"石灰石を熱すると[ 酸化カルシウム ]が得られる。\n★石灰石は炭酸カルシウムCaCO₃です。\n★CaCO₃ → CaO + CO₂ (加熱必要)"},{"q":"CaCO₃ → [____]","answer":"CaO + CO₂ (加熱必要)","choices":["CaO + CO₂ (加熱必要)","CaO + CO₂ (加熱なし)","Ca(OH)₂ (加熱必要)","Ca(OH)₂ (加熱なし)"],"explain":"CaCO₃ → CaO + CO₂ (加熱必要)\n★石灰石(炭酸カルシウム)を熱すると酸化カルシウムが得られます。\n★分解反応は加熱する熱分解反応が基本です。"},{"q":"[____] → CaO + CO₂","answer":"CaCO₃ (加熱必要)","choices":["CaCO₃ (加熱必要)","CaCO₃ (加熱なし)","Ca(HCO₃)₃ (加熱必要)","Ca(HCO₃) ₃ (加熱なし)"],"explain":"CaCO₃ → CaO + CO₂ (加熱必要)\n★石灰石(炭酸カルシウム)を熱すると酸化カルシウムが得られます。\n★分解反応は加熱する熱分解反応が基本です。"},{"q":"酸化カルシウムに水を加えると[____]が生じる。","answer":"水酸化カルシウム","choices":["水酸化カルシウム","水素","炭酸カルシウム","二酸化炭素"],"explain":"酸化カルシウムに水を加えると[ 水酸化カルシウム ]が生じる。"},{"q":"CaO + H₂O → [____]","answer":"Ca(OH)₂ (加熱なし)","choices":["Ca(OH)₂ (加熱なし)","Ca(OH)₂ (加熱必要)","CaO + H₂ (加熱なし)","CaO + H₂ (加熱必要)"],"explain":"CaO + H₂O → Ca(OH)₂ (加熱なし)\n★酸化カルシウムに水を加えると水酸化カルシウムが生じます。\n★塩基性酸化物(金属の酸化物)は水と反応して水酸化物を生じます。★このCa(OH)₂は固体の消石灰です。水溶液は石灰水。"},{"q":"[____] → Ca(OH)₂","answer":"CaO + H₂O (加熱なし)","choices":["CaO + H₂O (加熱なし)","CaO + H₂O (加熱必要)","CaCO₃ (加熱必要)","CaCO₃ (加熱なし)"],"explain":"CaO + H₂O → Ca(OH)₂ (加熱なし)\n★酸化カルシウムに水を加えると水酸化カルシウムが生じます。\n★塩基性酸化物(金属の酸化物)は水と反応して水酸化物を生じます。★アンモニアソーダ法(ソルベー法)では、このCa(OH)₂は固体の消石灰です。水溶液は石灰水。"},{"q":"塩化アンモニウムに水酸化カルシウム(消石灰)を加えて加熱すると[____]が生じる。","answer":"アンモニア","choices":["アンモニア","塩素","塩化水素","塩化アンモニウム"],"explain":"塩化アンモニウムに水酸化カルシウム(消石灰)を加えて加熱すると[ アンモニア ]が生じる。\n★固体+固体の反応では加熱が必要です。\n★2NH₄Cl + Ca(OH)₂ → CaCl₂ + 2NH₃ + 2H₂O (加熱必要)\n★弱塩基追い出し反応といえます。★アンモニアソーダ法(ソルベー法)ではアンモニアは再利用されます。"},{"q":"2NH₄Cl + Ca(OH)₂ → [____]","answer":"CaCl₂ + 2NH₃ + 2H₂O (加熱必要)","choices":["CaCl₂ + 2NH₃ + 2H₂O (加熱必要)","CaCl₂ + 2NH₃ + 2H₂O (加熱なし)","2HCl + 2NH₃ + 2H₂O (加熱必要)","2HCl + 2NH₃ + 2H₂O (加熱なし)"],"explain":"2NH₄Cl + Ca(OH)₂ → CaCl₂ + 2NH₃ + 2H₂O (加熱必要)\n★塩化アンモニウムに水酸化カルシウム(消石灰)を加えて加熱すると塩化カルシウムとアンモニアが生じます。★固体+固体の反応では加熱が必要です。★弱塩基追い出し反応といえます。★アンモニアソーダ法(ソルベー法)では塩化カルシウムは廃棄物となり、アンモニアは再利用されます。"},{"q":"[____] → CaCl₂ + 2NH₃ + 2H₂O","answer":"2NH₄Cl + Ca(OH)₂ (加熱必要)","choices":["2NH₄Cl + Ca(OH)₂ (加熱必要)","2NH₄Cl + Ca(OH)₂ (加熱なし)","2NH₄Cl + CaO + CO₂ (加熱必要)","2NH₄Cl + CaO + CO₂ (加熱なし)"],"explain":"2NH₄Cl + Ca(OH)₂ → CaCl₂ + 2NH₃ + 2H₂O (加熱必要)\n★塩化アンモニウムに水酸化カルシウム(消石灰)を加えて加熱すると塩化カルシウムとアンモニアが生じます。★固体+固体の反応では加熱が必要です。★弱塩基追い出し反応といえます。★アンモニアソーダ法(ソルベー法)では塩化カルシウムは廃棄物となり、アンモニアは再利用されます。"},{"q":"塩化アンモニウムはそのまま[____]としても利用できる。","answer":"肥料","choices":["肥料","触媒","乾燥剤","冷却剤"],"explain":"塩化アンモニウムはそのまま[ 肥料 ]としても利用できる。\n★アンモニアソーダ法(ソルベー法)の関連では肥料に利用されることが問われます。他に、食品添加物などにも利用されています。"},{"q":"理論上、アンモニアソーダ法(ソルベー法)で塩化ナトリウム1molから作られる炭酸ナトリウムは[____](mol)である。","answer":"0.5mol","choices":["0.5mol","1mol","2mol","0.25mol"],"explain":"理論上、アンモニアソーダ法(ソルベー法)で塩化ナトリウム1molから作られる炭酸ナトリウムは[ 0.5mol ]である。\n★2NaCl + CaCO₃ → CaCl₂ + Na₂CO₃より、mol比は\nNaCl:Na₂CO₃=2:1です。2:1=1mol:Xmolを解いて、X=0.5molです。有効数字1桁。"},{"q":"理論上、アンモニアソーダ法(ソルベー法)で塩化ナトリウム11kgから作られる炭酸ナトリウムは[____](kg)である。式量はNaClは58.5、Na₂CO₃は106とする。","answer":"10kg","choices":["10kg","11kg","20kg","22kg"],"explain":"理論上、アンモニアソーダ法(ソルベー法)で塩化ナトリウム11kgから作られる炭酸ナトリウムは[ 10kg ]である。式量はNaClは58.5、Na₂CO₃は106とする。\n★2NaCl + CaCO₃ → CaCl₂ + Na₂CO₃より、mol比はNaCl:Na₂CO₃=2:1なので、11kg/58.5:Xkg/106=2:1を解いて、X= 11×53 / 58.5 = 9.965 = 10(kg)です。有効数字2桁。*選択肢形式なので53/58.5≒53/(53+5.3)=10/11もありだと思います。"}]},
  {"code":"MC04","name":"アルカリ土類金属1","parent":"典型金属","questions":[{"q":"周期表で2族の6つの元素は[____]に分類される。","answer":"アルカリ土類金属","choices":["アルカリ土類金属","アルカリ金属","遷移元素","ハロゲン"],"explain":"周期表で2族の6つの元素は[ アルカリ土類金属 ]に分類される。\n★現在は新課程教科書(2024年版を確認)、IUPAC、日本化学会ともにBe、Mgを含めています。かつては「アルカリ土類金属は周期表で2族の第4〜7周期に位置する4つの元素」とし、BeとMgは性質が異なるため含めない方が採用されていました。★ゴロ: 2族元素、弁慶負かすはバラの花(Be、Mg、Ca、Sr、Ba、Ra)"},{"q":"アルカリ土類金属には、[____]がある。","answer":"Ca、Sr、Ba、Ra","choices":["Ca、Sr、Ba、Ra","Ca、Sr、Be、Rb","Na、K、Rb、Cs","Na、Ca、Rb、Cs"],"explain":"アルカリ土類金属には、[ Ca、Sr、Ba、Ra ]がある。\n★周期表で2族の6つの元素がアルカリ土類金属です。★ゴロ: 2族元素、弁慶負かすはバラの花(Be、Mg、Ca、Sr、Ba、Ra)"},{"q":"アルカリ土類金属の価電子は[____](個)で、[____](価)の[____](イオン)になりやすい。","answer":"2個、2価、陽イオン","choices":["2個、2価、陽イオン","2個、2価、陰イオン","1個、1価、陽イオン","1個、1価、陰イオン"],"explain":"アルカリ土類金属の価電子は[ 2個 ]で、[ 2価 ]の[ 陽イオン ]になりやすい。"},{"q":"アルカリ土類金属のイオン化傾向は[____](く)、[____](力)が強い。","answer":"大きく、還元力","choices":["大きく、還元力","大きく、酸化力","小さく、還元力","小さく、酸化力"],"explain":"アルカリ土類金属のイオン化傾向は[ 大きく ]、[ 還元力 ]が強い。\n★アルカリ金属に次いでイオン化傾向が大きく、還元力が強いといえます。★2価の陽イオンになるアルカリ土類金属では、還元力を電子を与える力(電子を放つ力)と考えるとわかりやすいと思います。"},{"q":"アルカリ土類金属の単体は、[____]で得ている。","answer":"融解塩電解","choices":["融解塩電解","水溶液の電気分解","天然の単体","鉱物の分留"],"explain":"アルカリ土類金属の単体は、[ 融解塩電解 ]で得ている。\n★融解塩電解(又は、溶融塩電解)は、化合物を高温に熱して得られる融解液の電気分解です。★イオン化傾向の大きいアルカリ土類金属はイオン化合物を作りやすく、天然には塩として存在します。"},{"q":"アルカリ土類金属は密度が[____]、陽性が[____]。","answer":"小さく、強い","choices":["小さく、強い","小さく、弱い","大きく、強い","大きく、弱い"],"explain":"アルカリ土類金属は密度が[ 小さく ]、陽性が[ 強い ]。\n★アルカリ金属に次いで密度が小さく、陽性が強いといえます。ラジウムRaは密度5.0で、他は密度4.0未満の軽金属です。"},{"q":"2族の元素のうち、[____]は炎色反応を示さず、常温の水や冷水とも反応しない。","answer":"Be、Mg","choices":["Be、Mg","Mgのみ","Beのみ","Ca、Sr、Ba、Ra"],"explain":"2族の元素のうち、[ Be、Mg ]は炎色反応を示さず、常温の水や冷水とも反応しない。\n★ベリリウムBeは常温の水、熱水、冷水どちらとも反応しません。\n★マグネシウムMgは熱水と徐々に反応して水素を発生します。"},{"q":"2族の元素のうち、[____]は炎色反応を示し、常温の水や冷水と反応して水素を発生する。","answer":"Ca、Sr、Ba、Ra","choices":["Ca、Sr、Ba、Ra","Be、Mg","Mg","Be"],"explain":"2族の元素のうち、[ Ca、Sr、Ba、Ra ]は炎色反応を示し、常温の水や冷水と反応して水素を発生する。\n★カルシウムCa、ストロンチウムSr、バリウムBa、ラジウムRa\n★Ca + 2H₂O → Ca(OH)₂ + H₂、など。"},{"q":"2族の元素のうち、[____]は炎色反応を示さず、常温の水、熱水、冷水どちらとも反応しない。","answer":"Be","choices":["Be","Ca、Sr、Ba、Ra","Be、Mg","Mg"],"explain":"2族の元素のうち、[ Be ]は炎色反応を示さず、常温の水、熱水、冷水どちらとも反応しない。\n★ベリリウムBe\n★マグネシウムMgは熱水と徐々に反応して水素を発生します。"},{"q":"2族の元素のうち、[____]は炎色反応を示さず、熱水と徐々に反応して水素を発生する。","answer":"Mg","choices":["Mg","Be","Ca、Sr、Ba、Ra","Be、Mg"],"explain":"2族の元素のうち、[ Mg ]は炎色反応を示さず、熱水と徐々に反応して水素を発生する。\n★マグネシウムMg\n★Mg + 2H₂O → Mg(OH)₂ + H₂\n★Beは常温の水、熱水、冷水どちらとも反応しません。"},{"q":"[____]は空気中で強熱すると、明るい光を放って燃焼する。","answer":"Mg","choices":["Mg","Be","Ca","Sr"],"explain":"[ Mg ]は空気中で強熱すると、明るい光を放って燃焼する。\n★教室(実験室)ではマグネシウムリボンを燃やして実験します。\n★2Mg + O₂ → 2MgO"},{"q":"マグネシウムMgを空気中で強熱するときの化学反応式を記せ。[____]","answer":"2Mg + O₂ → 2MgO","choices":["2Mg + O₂ → 2MgO","2Mg + O₂ → 2Mg(OH)₂","Mg + 2H₂O → Mg(OH)₂ + H₂","Mg + 2H₂O → MgO + H₂"],"explain":"マグネシウムMgを空気中で強熱するときの化学反応式を記せ。\n2Mg + O₂ → 2MgO\n★明るい光を放ちながら燃えます。教室(実験室)ではマグネシウムリボンを燃やして実験します。"},{"q":"2族元素の炎色反応について、ベリリウムBeは[____]、マグネシウムMgは[____]である。","answer":"なし、なし","choices":["なし、なし","黄緑、紅(深赤)","黄緑、紫","橙赤、紅(深赤)"],"explain":"2族元素の炎色反応について、ベリリウムBeは[ なし ]、マグネシウムMgは[ なし ]である。\n★2族元素(アルカリ土類金属)のうち、BeとMgは炎色反応を示しません。\n★Beは常温の水、熱水、冷水どちらとも反応しません。"},{"q":"2族元素の炎色反応について、カルシウムCaは[____]、ストロンチウムSrは[____]である。","answer":"橙赤、紅(深赤)","choices":["橙赤、紅(深赤)","なし、なし","黄緑、紅(深赤)","黄緑、紫"],"explain":"2族元素の炎色反応について、カルシウムCaは[ 橙赤 ]、ストロンチウムSrは[ 紅(深赤) ]である。\n★ゴロ: カシスオレンジ(Ca、橙)、ストロベリー(Sr、紅べに、いちごの赤)。有名なゴロに「リアカー無きK村〜」もあります。"},{"q":"2族元素の炎色反応について、バリウムBaは[____]、ラジウムRaは[____]である。","answer":"黄緑、紅(深赤)","choices":["黄緑、紅(深赤)","黄緑、紫","橙赤、紅(深赤)","なし、なし"],"explain":"2族元素の炎色反応について、バリウムBaは[ 黄緑 ]、ラジウムRaは[ 紅(深赤) ]である。\n★ゴロ: バナナ(Ba、黄緑)、ラジオくれ(Ra、紅くれない)。★Raの炎色反応は扱わない教科書もあり、入試では難問です。"},{"q":"Mg(OH)₂は[____](性)、Ca(OH)₂は[____](性)、Ba(OH)₂は[____](性)である。","answer":"弱塩基性、強塩基性、強塩基性","choices":["弱塩基性、強塩基性、強塩基性","弱塩基性、強塩基性、弱塩基性","強塩基性、弱塩基性、強塩基性","強塩基性、弱塩基性、弱塩基性"],"explain":"Mg(OH)₂は[ 弱塩基性 ]、Ca(OH)₂は[ 強塩基性 ]、Ba(OH)₂は[ 強塩基性 ]である。\n★Mg(OH)₂は水に溶けにくく弱塩基性を示します。アルカリ土類金属の水酸化物、Ca(OH)₂、Sr(OH)₂、Ba(OH)₂、Ra(OH)₂は強塩基性です。★強塩基はNaOH、KOH、Ca(OH)₂、Ba(OH)₂の4つを覚えます。ゴロ: 泣くカバ。"},{"q":"Ca、Sr、Baを反応性の大きい順(陽イオンになりやすい順)に並べると、[____]。(小さい＜大きい)","answer":"Ca＜Sr＜Ba","choices":["Ca＜Sr＜Ba","Ca＜Ba＜Sr","Ba＜Ca＜Sr","Ba＜Sr＜Ca"],"explain":"Ca、Sr、Baを反応性の大きい順(陽イオンになりやすい順)に並べると、[ Ca＜Sr＜Ba ]。(小さい＜大きい)\n★周期表の下になるほど強くなります。★ゴロ: 2族元素、弁慶負かすはバラの花(Be、Mg、Ca、Sr、Ba、Ra)"},{"q":"水を入れた試験管にアルカリ金属やアルカリ土類金属の粒を入れると[____]が発生する。この気体の発生を確認するには[____](置換)で捕集する。","answer":"水素H₂、上方置換","choices":["水素H₂、上方置換","水素H₂、下方置換","酸素O₂、上方置換","酸素O₂、下方置換"],"explain":"水を入れた試験管にアルカリ金属やアルカリ土類金属の粒を入れると[ 水素H₂ ]が発生する。この気体の発生を確認するには[ 上方置換 ]で捕集する。\n★水素の存在を確認するときは、逆さにしたもう一つの試験管の口を合わせ、上方置換とします。集めた気体にマッチで点火するとポンと爆鳴音が鳴り水素を確認できます。器具は増えますが水上置換では純度の高い水素を捕集できます。"}]},
  {"code":"MC05","name":"アルカリ土類金属2","parent":"典型金属","questions":[{"q":"アルカリ土類金属(Ca、Sr、Ba、Ra)の酸化物は[____](酸化物)である。","answer":"塩基性酸化物","choices":["塩基性酸化物","酸性酸化物","両性酸化物","中性物質"],"explain":"アルカリ土類金属(Ca、Sr、Ba、Ra)の酸化物は[ 塩基性酸化物 ]である。\n★塩基性酸化物(金属の酸化物)は、水と反応して水酸化物となり、酸と反応して塩となります。"},{"q":"アルカリ土類金属(Ca、Sr、Ba、Ra)の酸化物は、水と反応して[____]となり、酸と反応して[____]となる。","answer":"水酸化物、塩","choices":["水酸化物、塩","水酸化物、酸","酸、塩","酸、水酸化物"],"explain":"アルカリ土類金属(Ca、Sr、Ba、Ra)の酸化物は、水と反応して[ 水酸化物 ]となり、酸と反応して[ 塩 ]となる。\n★塩基性酸化物(金属の酸化物)は、水と反応して水酸化物となり、酸と反応して塩となります。★比較：酸性酸化物(非金属の酸化物)は水と反応して酸(オキソ酸や水素酸)となり、塩基と反応して塩となります。"},{"q":"Mgの酸化物は、水に[____](く)、[____](性)を示す。","answer":"溶けにくく、弱塩基性","choices":["溶けにくく、弱塩基性","溶けにくく、強塩基性","溶けやすく、弱塩基性","溶けやすく、強塩基性"],"explain":"Mgの酸化物は、水に[ 溶けにくく ]、[ 弱塩基性 ]を示す。\n★2族元素のうち、(ベリリウムBeは特になし)、マグネシウムMgの酸化物と水酸化物は水に溶けにくく弱塩基性、アルカリ土類金属(Ca、Sr、Ba、Ra)の酸化物と水酸化物は水に溶けて強塩基性を示します。このうち、Ca(OH)₂は水にわずかに溶けて強塩基性です。"},{"q":"Mgの水酸化物は、水に[____](く)、[____](性)を示す。","answer":"溶けにくく、弱塩基性","choices":["溶けにくく、弱塩基性","溶けにくく、強塩基性","溶けやすく、弱塩基性","溶けやすく、強塩基性"],"explain":"Mgの水酸化物は、水に[ 溶けにくく ]、[ 弱塩基性 ]を示す。\n★2族元素のうち、(ベリリウムBeは特になし)、マグネシウムMgの酸化物と水酸化物は水に溶けにくく弱塩基性、アルカリ土類金属(Ca、Sr、Ba、Ra)の酸化物と水酸化物は水に溶けて強塩基性を示します。このうち、Ca(OH)₂は水にわずかに溶けて強塩基性です。"},{"q":"[____]は、生石灰(せいせっかい)ともよばれる。","answer":"酸化カルシウム","choices":["酸化カルシウム","水酸化カルシウム","炭酸カルシウム","炭酸水素カルシウム"],"explain":"[ 酸化カルシウム ]は、生石灰(せいせっかい)ともよばれる。\n★炭酸カルシウムCaCO₃は石灰石\n★酸化カルシウムCaOは生石灰(せいせっかい)\n★水酸化カルシウムCa(OH)₂消石灰(しょうせっかい)\n★石灰水は消石灰の水溶液です。"},{"q":"[____]は、消石灰(しょうせっかい)ともよばれる。","answer":"水酸化カルシウム","choices":["水酸化カルシウム","酸化カルシウム","炭酸カルシウム","炭酸水素カルシウム"],"explain":"[ 水酸化カルシウム ]は、消石灰(しょうせっかい)ともよばれる。\n★炭酸カルシウムCaCO₃は石灰石\n★酸化カルシウムCaOは生石灰(せいせっかい)\n★水酸化カルシウムCa(OH)₂消石灰(しょうせっかい)\n★石灰水は消石灰の水溶液です。"},{"q":"[____]の飽和水溶液は、石灰水(せっかいすい)ともよばれる。","answer":"水酸化カルシウム","choices":["水酸化カルシウム","炭酸水素カルシウム","酸化カルシウム","炭酸カルシウム"],"explain":"[ 水酸化カルシウム ]の飽和水溶液は、石灰水(せっかいすい)ともよばれる。\n★炭酸カルシウムCaCO₃は石灰石\n★酸化カルシウムCaOは生石灰(せいせっかい)\n★水酸化カルシウムCa(OH)₂消石灰(しょうせっかい)\n★石灰水は消石灰の水溶液です。"},{"q":"[____]は、石灰石(せっかいせき)ともよばれる。","answer":"炭酸カルシウム","choices":["炭酸カルシウム","水酸化カルシウム","炭酸水素カルシウム","酸化カルシウム"],"explain":"[ 炭酸カルシウム ]は、石灰石(せっかいせき)ともよばれる。\n★炭酸カルシウムCaCO₃は石灰石\n★酸化カルシウムCaOは生石灰(せいせっかい)\n★水酸化カルシウムCa(OH)₂消石灰(しょうせっかい)\n★石灰水は消石灰の水溶液です。"},{"q":"石灰岩、大理石、貝殻、鍾乳洞の鍾乳石や石筍の主成分は[____]である。","answer":"炭酸カルシウム","choices":["炭酸カルシウム","水酸化カルシウム","炭酸水素カルシウム","酸化カルシウム"],"explain":"石灰岩、大理石、貝殻、鍾乳洞の鍾乳石や石筍の主成分は[ 炭酸カルシウム ]である。\n★炭酸カルシウムCaCO₃"},{"q":"鍾乳洞の上から生えるつらら状の炭酸カルシウムを[____]という。","answer":"鍾乳石","choices":["鍾乳石","カルスト","石筍","石柱"],"explain":"鍾乳洞の上から生えるつらら状の炭酸カルシウムを[ 鍾乳石 ]という。\n★鍾乳石(しょうにゅうせき)と読みます。\n★炭酸カルシウムCaCO₃"},{"q":"鍾乳洞の天井からの水滴が析出したもので、下から生えるタケノコ状の炭酸カルシウムを[____]という。","answer":"石筍","choices":["石筍","鍾乳石","カルスト","石柱"],"explain":"鍾乳洞の天井からの水滴が析出したもので、下から生えるタケノコ状の炭酸カルシウムを[ 石筍 ]という。\n★石筍(せきじゅん)と読みます。\n★炭酸カルシウムCaCO₃"},{"q":"鍾乳洞の天井からの水滴が析出したもので、天井から地面まで繋がった炭酸カルシウムを[____]という。","answer":"石柱","choices":["石柱","鍾乳石","石筍","カルスト"],"explain":"鍾乳洞の天井からの水滴が析出したもので、天井から地面まで繋がった炭酸カルシウムを[ 石柱 ]という。\n★石柱(せきちゅう)と読みます。\n★炭酸カルシウムCaCO₃"},{"q":"石灰岩の台地を[____]と呼ぶ。","answer":"カルスト","choices":["カルスト","鍾乳石","石筍","石柱"],"explain":"石灰岩の台地を[ カルスト ]と呼ぶ。\n★石灰岩の主成分は炭酸カルシウムCaCO₃。\n★カルスト(Karst)はドイツ語です。\n★日本三大カルスト地形として、\n山口県「秋吉台(あきよしだい)」、\n高知県「四国カルスト」、\n福岡県「平尾台(ひらおだい)」、があります。"},{"q":"石灰水に二酸化炭素を通じると[____]の白色沈殿が生じ、さらに通じ続けると白色沈殿が[____]となり溶ける。","answer":"炭酸カルシウム、炭酸水素カルシウム","choices":["炭酸カルシウム、炭酸水素カルシウム","炭酸カルシウム、酸化カルシウム","炭酸水素カルシウム、炭酸カルシウム","炭酸水素カルシウム、酸化カルシウム"],"explain":"石灰水に二酸化炭素を通じると[ 炭酸カルシウム ]の白色沈殿が生じ、さらに通じ続けると白色沈殿が[ 炭酸水素カルシウム ]となり溶ける。\n★Ca(OH)₂ + CO₂ → CaCO₃ + H₂O\n★CaCO₃ + H₂O + CO₂ ⇄ Ca(HCO₃)₂"},{"q":"Ca(OH)₂ + CO₂ → [____]","answer":"CaCO₃ + H₂O (加熱なし)","choices":["CaCO₃ + H₂O (加熱なし)","CaCO₃ + H₂O (加熱必要)","Ca(HCO₃)₂ (加熱なし)","Ca(HCO₃)₂ (加熱必要)"],"explain":"Ca(OH)₂ + CO₂ → CaCO₃ + H₂O (加熱なし)\n★石灰水に二酸化炭素を通じると炭酸カルシウムの白色沈殿が生じます。★さらに二酸化炭素を通じると白色沈殿が炭酸水素カルシウムへ変化して溶けます。\nCaCO₃ + H₂O + CO₂ ⇄ Ca(HCO₃)₂"},{"q":"[____] → CaCO₃ + H₂O","answer":"Ca(OH)₂ + CO₂ (加熱なし)","choices":["Ca(OH)₂ + CO₂ (加熱なし)","Ca(OH)₂ + CO₂ (加熱必要)","Ca(HCO₃)₂ (加熱なし)","Ca(HCO₃)₂ (加熱必要)"],"explain":"Ca(OH)₂ + CO₂ → CaCO₃ + H₂O (加熱なし)\n★石灰水に二酸化炭素を通じると炭酸カルシウムの白色沈殿が生じます。★さらに二酸化炭素を通じると白色沈殿が炭酸水素カルシウムへ変化して溶けます。\nCaCO₃ + H₂O + CO₂ ⇄ Ca(HCO₃)₂"},{"q":"CaCO₃ + H₂O + CO₂ ⇄ [____]\n*CaCO₃白色沈殿が消える反応として。","answer":"Ca(HCO₃)₂ (加熱なし)","choices":["Ca(HCO₃)₂ (加熱なし)","Ca(HCO₃)₂ (加熱必要)","CaCO₃ + H₂O (加熱なし)","CaCO₃ + H₂O (加熱必要)"],"explain":"CaCO₃ + H₂O + CO₂ ⇄ Ca(HCO₃)₂ (加熱なし)\n★炭酸カルシウムに二酸化炭素を通じると白色沈殿が炭酸水素カルシウムへ変化して溶けます。"},{"q":"[____] ⇄ Ca(HCO₃)₂\n*CaCO₃白色沈殿が消える反応として。","answer":"CaCO₃ + H₂O + CO₂ (加熱なし)","choices":["CaCO₃ + H₂O + CO₂ (加熱なし)","CaCO₃ + H₂O + CO₂ (加熱必要)","Ca(OH)₂ + CO₂ (加熱なし)","Ca(OH)₂ + CO₂ (加熱必要)"],"explain":"CaCO₃ + H₂O + CO₂ ⇄ Ca(HCO₃)₂ (加熱なし)\n★炭酸カルシウムに二酸化炭素を通じると白色沈殿が炭酸水素カルシウムへ変化して溶けます。"},{"q":"次の反応式は加熱すると平衡が[____](側)へ移動して[____]。\nCaCO₃ + H₂O + CO₂ ⇄ Ca(HCO₃)₂","answer":"左側、白色沈殿が生じる","choices":["左側、白色沈殿が生じる","左側、透明の水溶液となる","右側、白色沈殿が生じる","右側、透明の溶液となる"],"explain":"次の反応式は加熱すると平衡が[ 左側 ]へ移動して[ 白色沈殿が生じる ]。\nCaCO₃ + H₂O + CO₂ ⇄ Ca(HCO₃)₂\n★加熱すると二酸化炭素が減少し、平衡が左へ移動します。★これから右向きの反応は加熱なしと判断できます。"},{"q":"CaCO₃ → [____]","answer":"CaO + CO₂ (加熱必要)","choices":["CaO + CO₂ (加熱必要)","CaO + CO₂ (加熱なし)","CaO + H₂O (加熱必要)","CaO + H₂O (加熱なし)"],"explain":"CaCO₃ → CaO + CO₂ (加熱必要)\n★分解反応は基本的に熱分解反応で加熱が必要です。\n★アンモニアソーダ法(ソルベー法)にも出てきます。900°Cで分解します。"},{"q":"[____] → CaCl₂ + H₂O + CO₂","answer":"CaCO₃ + 2HCl (加熱なし)","choices":["CaCO₃ + 2HCl (加熱なし)","CaCO₃ + 2HCl (加熱必要)","Ca(HCO₃)₂ + 2HCl (加熱なし)","Ca(HCO₃)₂ + 2HCl (加熱必要)"],"explain":"CaCO₃ + 2HCl → CaCl₂ + H₂O + CO₂ (加熱なし)\n★強酸に溶けて二酸化炭素を生じます。★反応性の高い希塩酸や希硫酸などの強酸との反応では加熱は必要ありません。"},{"q":"アルカリ土類金属の硫酸塩は水に[____](く)、硫酸マグネシウムMgSO₄は水に[____]。","answer":"溶けにくく、よく溶ける","choices":["溶けにくく、よく溶ける","溶けにくく、溶けにくい","溶けやすく、よく溶ける","溶けやすく、溶けにくい"],"explain":"アルカリ土類金属の硫酸塩は水に[ 溶けにくく ]、硫酸マグネシウムMgSO₄は水に[ よく溶ける ]。\n★比較：アルカリ土類金属(Ca、Sr、Ba、Ra)の酸化物と水酸化物は水によく溶け強塩基性を示します。酸化マグネシウムMgOや水酸化マグネシウムMg(OH)₂は水に溶けにくく弱塩基性です。"},{"q":"CaSO₄・2H₂Oを[____]と呼ぶ。","answer":"セッコウ(石膏)","choices":["セッコウ(石膏)","焼きセッコウ","石灰石","消石灰"],"explain":"CaSO₄・2H₂Oを[ セッコウ(石膏) ]と呼ぶ。\n★硫酸カルシウムの二水和物をセッコウ(石膏)、硫酸カルシウムの半水和物を焼きセッコウ(半水セッコウ)と呼びます。"},{"q":"CaSO₄・1/2 H₂Oを[____]と呼ぶ。*1/2 H₂Oは半水和物とする。","answer":"焼きセッコウ","choices":["焼きセッコウ","セッコウ(石膏)","石灰石","消石灰"],"explain":"CaSO₄・1/2 H₂Oを[ 焼きセッコウ ]と呼ぶ。*1/2 H₂Oは半水和物とする。\n★硫酸カルシウムの二水和物をセッコウ(石膏)、硫酸カルシウムの半水和物を焼きセッコウ(半水セッコウ)と呼びます。"},{"q":"硫酸カルシウムの二水和物を130〜140°Cで加熱すると、白色粉末の[____]となる。","answer":"焼きセッコウ","choices":["焼きセッコウ","セッコウ(石膏)","石灰石","消石灰"],"explain":"硫酸カルシウムの二水和物を130〜140°Cで加熱すると、白色粉末の[ 焼きセッコウ ]となる。\n★硫酸カルシウムの二水和物をセッコウ(石膏)、硫酸カルシウムの半水和物を焼きセッコウ(半水セッコウ)と呼びます。"},{"q":"セッコウ(石膏)は硫酸カルシウムの[____]、焼きセッコウは硫酸カルシウムの[____]である。","answer":"二水和物、半水和物","choices":["二水和物、半水和物","二水和物、無水物","半水和物、二水和物","半水和物、無水物"],"explain":"セッコウ(石膏)は硫酸カルシウムの[ 二水和物 ]、焼きセッコウは硫酸カルシウムの[ 半水和物 ]である。"},{"q":"焼きセッコウに水を適度に混ぜるとセッコウ(石膏)になる。このとき[____]し、体積が少し[____]。","answer":"発熱しながら硬化、増える","choices":["発熱しながら硬化、増える","発熱しながら硬化、減る","吸熱しながら軟化、増える","吸熱しながら軟化、減る"],"explain":"焼きセッコウに水を適度に混ぜるとセッコウ(石膏)になる。このとき[ 発熱しながら硬化 ]し、体積が少し[ 増える ]。\n★この性質から、ギプス、塑像、壁の塗装などに利用されています。"},{"q":"胃や腸などの消化管のX線撮影の造影剤に利用されているアルカリ土類金属の化合物は[____]である。","answer":"硫酸バリウムBaSO₄","choices":["硫酸バリウムBaSO₄","炭酸バリウムBaCO₃","硫酸カルシウムCaSO₄","塩化カルシウムCaCl₂"],"explain":"胃や腸などの消化管のX線撮影の造影剤に利用されているアルカリ土類金属の化合物は[ 硫酸バリウムBaSO₄ ]である。"},{"q":"水酸化バリウムBa(OH)₂に希硫酸を加えると[____]の[____]を生じる。","answer":"硫酸バリウムBaSO₄、白色沈殿","choices":["硫酸バリウムBaSO₄、白色沈殿","硫酸バリウムBaSO₄、黄色沈殿","酸化バリウムBaO、白色沈殿","酸化バリウムBaO、黄色沈殿"],"explain":"水酸化バリウムBa(OH)₂に希硫酸を加えると[ 硫酸バリウムBaSO₄ ]の[ 白色沈殿 ]を生じる。\n★アルカリ土類金属(Ca、Sr、Ba、Ra)の硫酸塩は水に溶けにくく、白色沈殿になります。★沈殿する炭酸塩と硫酸塩は白色です。ゴロ: バカな白龍(BaSO₄、CaSO₄、PbSO₄は白色沈殿となる硫酸塩)。"},{"q":"硫酸バリウムBaSO₄は[____]で、水や酸に[____]。","answer":"白色粉末、溶けにくい","choices":["白色粉末、溶けにくい","白色粉末、溶けやすい","黄色粉末、溶けにくい","黄色粉末、溶けやすい"],"explain":"硫酸バリウムBaSO₄は[ 白色粉末 ]で、水や酸に[ 溶けにくい ]。\n★強塩基Ba(OH)₂と強酸H₂SO₄由来の塩なので酸に溶けにくくなります。★比較：炭酸バリウムBaCO₃は強塩基Ba(OH)₂と弱酸H₂CO₃由来なので塩酸などに溶けます(弱酸追い出し反応)。"},{"q":"胃や腸などの消化管のX線撮影の造影剤として硫酸バリウムBaSO₄の代わりに炭酸バリウムBaCO₃を利用すると胃酸の成分[____]と反応し、有毒な[____]を生じるため不適切である。","answer":"塩酸HCl、塩化バリウムBaCl₂","choices":["塩酸HCl、塩化バリウムBaCl₂","塩酸HCl、硫酸バリウムBaSO₄","硫酸H₂SO₄、塩化バリウムBaCl₂","硫酸H₂SO₄、硫酸バリウムBaSO₄"],"explain":"胃や腸などの消化管のX線撮影の造影剤として硫酸バリウムBaSO₄の代わりに炭酸バリウムBaCO₃を利用すると胃酸の成分[ 塩酸HCl ]と反応し、有毒な[ 塩化バリウムBaCl₂ ]を生じるため不適切である。\n★炭酸バリウムBaCO₃だと塩酸HClで弱酸遊離反応が起こります。★硫酸バリウムBaSO₄なら強塩基Ba(OH)₂と強酸H₂SO₄由来の塩なので塩酸HClにも溶けにくく安定です。★思考問題対策として。"},{"q":"2族元素の塩化物は水に[____]、このうち[____]は乾燥剤、融雪剤、凍結防止剤などに利用されている。","answer":"よく溶け、塩化カルシウムCaCl₂","choices":["よく溶け、塩化カルシウムCaCl₂","よく溶け、塩化バリウムBaCl₂","溶けにくく、塩化カルシウムCaCl₂","溶けにくく、塩化バリウムBaCl₂"],"explain":"2族元素の塩化物は水に[ よく溶け ]、このうち[ 塩化カルシウムCaCl₂ ]は乾燥剤、融雪剤、凍結防止剤などに利用されている。"},{"q":"2族元素の塩化物について、塩化マグネシウムと塩化カルシウムには[____](性)がある。","answer":"潮解性","choices":["潮解性","昇華性","還元性","風解性"],"explain":"2族元素の塩化物について、塩化マグネシウムと塩化カルシウムには[ 潮解性 ]がある。\n★2族元素の塩化物は吸湿性が強く、水によく溶けます。"},{"q":"カルシウムイオンCa²⁺やマグネシウムイオンMg²⁺を多く含む水を[____]と呼ぶ。これらのイオンを少量だけ含む水を[____]と呼ぶ。","answer":"硬水、軟水","choices":["硬水、軟水","硬水、純水","軟水、硬水","軟水、純水"],"explain":"カルシウムイオンCa²⁺やマグネシウムイオンMg²⁺を多く含む水を[ 硬水 ]と呼ぶ。これらのイオンを少量だけ含む水を[ 軟水 ]と呼ぶ。\n★日本の多くでは軟水または軟水化をして生活用水に利用していますが、硬水のまま利用している地域ではヤカンなどにカルシウムなどの結晶が生じます。硬水では配管パイプなどが詰まりやすくなります。"}]},
  {"code":"MC06","name":"Alの単体","parent":"典型金属","questions":[{"q":"アルミニウムは[____](元素)である。","answer":"両性金属","choices":["両性金属","陽性金属","陰性金属","非金属"],"explain":"アルミニウムは[ 両性金属 ]である。\n★酸とも塩基とも反応する元素を両性金属といいます。★ゴロ: ああすんなり両性に好かれる(Al、Zn、Sn、Pb)。高校範囲では4つを覚えます。\n★新課程(2024年入試以降)の教科書では「両性元素」は用語として使用されていません。「両性金属、両性酸化物、両性水酸化物」となります。"},{"q":"アルミニウムは[____](族)に属する元素で、[____](個)の価電子をもち、[____](価)の[____]になる。","answer":"13族、3個、3価、陽イオン","choices":["13族、3個、3価、陽イオン","13族、3個、3価、陰イオン","12族、2個、2価、陽イオン","12族、2個、2価、陰イオン"],"explain":"アルミニウムは[ 13族 ]に属する元素で、[ 3個 ]の価電子をもち、[ 3価 ]の[ 陽イオン ]になる。"},{"q":"アルミニウムAlは、地殻中に、[____]に次いで多く存在する元素で、金属元素では[____](番目)に多い。","answer":"ケイ素Si、1番目","choices":["ケイ素Si、1番目","ケイ素Si、2番目","鉄Fe、1番目","鉄Fe、2番目"],"explain":"アルミニウムAlは、地殻中に、[ ケイ素Si ]に次いで多く存在する元素で、金属元素では[ 1番目 ]に多い。\n★クラーク数のゴロ: おっしゃるてか(O、Si、Al、Fe、Ca)、地殻中の元素の割合(質量比)の大きい順です。"},{"q":"アルミニウムAlの単体は、[____]で得ている。","answer":"融解塩電解","choices":["融解塩電解","水溶液の電気分解","天然の単体","鉱物の分留"],"explain":"アルミニウムAlの単体は、[ 融解塩電解 ]で得ている。\n★融解塩電解(又は、溶融塩電解)は、化合物を高温に熱して得られる融解液の電気分解です。★原料鉱石(ボーキサイト)から取り出したアルミナ(酸化アルミニウム)を融解塩電解します。★水溶液の電気分解では水素が発生するのみで、単体は得られません。\n★陰極\nAl³⁺ + 3e⁻ → Al\n陽極\nC + O²⁻ → CO + 2e⁻\nおよび、\nC + 2O²⁻ → CO₂ + 4e⁻"},{"q":"酸化アルミニウム(アルミナ)を氷晶石と共に融解塩電解するとき、陰極では[____]、陽極では[____]が生じる。","answer":"陰極: Al、陽極: COとCO₂","choices":["陰極: Al、陽極: COとCO₂","陰極: Al、陽極: Al₂O₃","陰極: Al₂O₃、陽極: COとCO₂","陰極: Al、陽極: O₂"],"explain":"酸化アルミニウム(アルミナ)を氷晶石と共に融解塩電解するとき、陰極では[ Al ]、陽極では[ COとCO₂ ]が生じる。\n★陰極\nAl³⁺ + 3e⁻ → Al\n陽極\nC + O²⁻ → CO + 2e⁻\nおよび、\nC + 2O²⁻ → CO₂ + 4e⁻"},{"q":"アルミニウムAlの単体は、原料鉱石の[____]を精製すると得られる[____]を氷晶石と共に融解塩電解することで製造される。","answer":"ボーキサイト、酸化アルミニウム","choices":["ボーキサイト、酸化アルミニウム","ボーキサイト、水酸化アルミニウム","アルミナ、酸化アルミニウム","アルミナ、水酸化アルミニウム"],"explain":"アルミニウムAlの単体は、原料鉱石の[ ボーキサイト ]を精製すると得られる[ 酸化アルミニウム ]を氷晶石と共に融解塩電解することで製造される。\n★酸化アルミニウムAl₂O₃をアルミナともいいます。★氷晶石は酸化アルミニウムの融点(2000°C以上)を1000°C前後へ下げる役割をします。より詳しい過程は、ボーキサイト→[Al(OH)₄]⁻→Al(OH)₃→アルミナAl₂O₃→Alです。"},{"q":"酸化アルミニウムAl₂O₃は[____]とも呼ばれる。","answer":"アルミナ","choices":["アルミナ","アルマイト","ジュラルミン","ボーキサイト"],"explain":"酸化アルミニウムAl₂O₃は[ アルミナ ]とも呼ばれる。\n★ボーキサイトはアルミニウムの原料鉱石\n★アルミナは酸化アルミニウムAl₂O₃\n★ジュラルミンはMgやCuなどとのアルミニウム合金\n★アルマイトは人工的に厚い酸化被膜をつけた製品"},{"q":"氷晶石の化学式は[____]。","answer":"Na₃AlF₆","choices":["Na₃AlF₆","Na₃Al₆","Na₂AlF₃","Na₂AlF₄"],"explain":"氷晶石の化学式は[ Na₃AlF₆ ]。\n★ゴロ: 波平ある風呂。波平アフロ。"},{"q":"ボーキサイトから酸化アルミニウム(アルミナ)を精製する工業的製法を[____](法)、酸化アルミニウム(アルミナ)を氷晶石と共に融解塩電解して単体のアルミニウムを得る工業的製法を[____](法)と呼ぶ。","answer":"バイヤー法、ホール・エルー法","choices":["バイヤー法、ホール・エルー法","バイヤー法、オストワルト法","ホール・エルー法、バイヤー法","オストワルト法、ホール・エルー法"],"explain":"ボーキサイトから酸化アルミニウム(アルミナ)を精製する工業的製法を[ バイヤー法 ]、酸化アルミニウム(アルミナ)を氷晶石と共に融解塩電解して単体のアルミニウムを得る工業的製法を[ ホール・エルー法 ]と呼ぶ。\n★教科書に用語の記載はありませんが入試問題文中には登場します。"},{"q":"アルミニウムをボーキサイトから製錬するときに多くの電気エネルギーを必要とすることから、アルミニウムは[____]と呼ばれる。","answer":"電気の缶詰","choices":["電気の缶詰","乾電池","アルミナ","ジュラルミン"],"explain":"アルミニウムをボーキサイトから製錬するときに多くの電気エネルギーを必要とすることから、アルミニウムは[ 電気の缶詰 ]と呼ばれる。"},{"q":"アルミニウム製品をリサイクルし再生アルミニウムを作るときのエネルギーは、原料鉱石のボーキサイトから製錬するときの[____]のエネルギーを必要とする。","answer":"約3％","choices":["約3％","約30％","約300％","約103％"],"explain":"アルミニウム製品をリサイクルし再生アルミニウムを作るときの電気エネルギーは、原料鉱石のボーキサイトから製錬するときの[ 約3％ ]のエネルギーを必要とする。\n★ボーキサイトを原料にアルミ缶の容器を3個つくった電気エネルギーで、リサイクル時には100個のアルミ缶を作ることができます。リサイクルにより電気を節約できます。"},{"q":"金属の鉱石から目的の金属を取り出す操作を[____]といい、不純物を含んだ金属から純粋な金属を取り出す操作を[____]という。","answer":"製錬(せいれん)、精錬(せいれん)","choices":["製錬(せいれん)、精錬(せいれん)","製錬(せいれん)、精製(せいせい)","精製(せいせい)、精錬(せいれん)","精錬(せいれん)、製錬(せいれん)"],"explain":"金属の鉱石から目的の金属を取り出す操作を[ 製錬(せいれん) ]といい、不純物を含んだ金属から純粋な金属を取り出す操作を[ 精錬(せいれん) ]という。\n★製錬の後に精錬することがあります。★製錬(せいれん)は英語でsmelting、精錬(せいれん)は英語ではrefining。refiningは正確には広い意味の精製(せいせい)にあたり、不純物を含んだ金属や金属以外の化合物から純物質を取り出す工程です。"},{"q":"混合物を純物質にする工程として、再結晶、蒸留、昇華、クロマトグラフィーなどを[____]という。","answer":"精製(せいせい)","choices":["精製(せいせい)","製錬(せいれん)","精錬(せいれん)","浄化(じょうか)"],"explain":"混合物を純物質にする工程として、再結晶、蒸留、昇華、クロマトグラフィーなどを[ 精製(せいせい) ]という。\n★製錬(せいれん)は金属の鉱石から目的の金属を取り出す操作。\n★精錬(せいれん)は不純物を含んだ金属から純粋な金属を取り出す操作。\n★精製(せいせい)は不純物を含んだ金属や金属以外の化合物から純物質を取り出す操作。"},{"q":"アルミニウムは銀白色の[____](い)[____](金属)である。","answer":"柔らかい、軽金属","choices":["柔らかい、軽金属","柔らかい、重金属","硬い、軽金属","硬い、重金属"],"explain":"アルミニウムは銀白色の[ 柔らかい ][ 軽金属 ]である。\n★密度2.70g/cm³ ★アルミ缶はスチール缶に比べると柔らかく軽いのでイメージしやすいと思います。"},{"q":"アルミニウムは電気を[____]、展性・延性が[____]。","answer":"よく通し、大きい","choices":["よく通し、大きい","よく通し、小さい","通さず、大きい","通さず、小さい"],"explain":"アルミニウムは電気を[ よく通し ]、展性・延性が[ 大きい ]。\n★アルミニウムの電気伝導率は銅Cuの60％前後ですが、価格は1/3と安く、密度も1/3程度と軽量であるため架空送電線などに利用されています。"},{"q":"金属が引き伸ばされる性質を[____]、圧力や叩くことで広がる性質を[____]という。","answer":"延性、展性","choices":["延性、展性","展性、粘性","展性、延性","延性、粘性"],"explain":"金属が引き伸ばされる性質を[ 延性 ]、圧力や叩くことで広がる性質を[ 展性 ]という。\n★延性(えんせい)は、延(の)びる性質です。延長、延期、遅延。\n★展性(てんせい)は、展(ひろ)がる性質です。展開、展覧会、展示。"},{"q":"アルミニウムの単体は空気中では表面に[____]の緻密な被膜をつくり内部を保護しているため酸化されにくい。この酸化されにくい(錆びにくい)状態を[____]という。","answer":"酸化アルミニウム、不動態","choices":["酸化アルミニウム、不動態","酸化アルミニウム、絶縁体","水酸化アルミニウム、不動態","水酸化アルミニウム、絶縁体"],"explain":"アルミニウムの単体は空気中では表面に[ 酸化アルミニウム ]の緻密な被膜をつくり内部を保護しているため酸化されにくい。この酸化されにくい(錆びにくい)状態を[ 不動態 ]という。\n★酸化アルミニウムAl₂O₃"},{"q":"アルミニウムの単体は、濃硝酸に入れると表面に緻密な酸化被膜をつくり内部を保護する[____]となるため溶けない。","answer":"不動態","choices":["不動態","絶縁体","半導体","アルマイト"],"explain":"アルミニウムの単体は、濃硝酸に入れると表面に緻密な酸化被膜をつくり内部を保護する[ 不動態 ]となるため溶けない。\n★不動態(ふどうたい)には「不働態」の表記もあります。★アルマイトは人工的に厚めの酸化被膜を施した製品です。"},{"q":"不動態となる金属に、[____]がある。","answer":"Cr、Co、Fe、Ni、Al","choices":["Cr、Co、Fe、Ni、Al","Cr、Co、Te、Ni、Ar","K、Co、Fe、Ni、Al","K、Co、Te、Ni、Ar"],"explain":"不動態となる金属に、[ Cr、Co、Fe、Ni、Al ]がある。\n★ゴロ: 黒子テツヤにある不動産。他、黒子とテツ子、黒柳徹子などでゴロを作れます。"},{"q":"アルミニウムに特に厚い酸化被膜をつけた製品を[____]という。","answer":"アルマイト","choices":["アルマイト","ジュラルミン","アルミナ","ボーキサイト"],"explain":"アルミニウムに特に厚い酸化被膜をつけた製品を[ アルマイト ]という。\n★ボーキサイトはアルミニウムの原料鉱石\n★アルミナは酸化アルミニウムAl₂O₃\n★ジュラルミンはMgやCuなどとのアルミニウム合金\n★アルマイトは人工的に厚い酸化被膜をつけた製品"},{"q":"空気中で容易に錆びる金属を[____]、空気中で安定し、錆びにくい金属を[____]という。","answer":"卑金属、貴金属","choices":["卑金属、貴金属","卑金属、重金属","貴金属、卑金属","軽金属、貴金属"],"explain":"空気中で容易に錆びる金属を[ 卑金属 ]、空気中で安定し、錆びにくい金属を[ 貴金属 ]という。\n★卑金属(ひきんぞく)、貴金属(ききんぞく)と読みます。★貴金属は金Au、銀Ag、白金Pt、Pd、Rh、Ir、Ru、Osの8つの元素(+銅Cuや水銀Hg)を指し、イオン化傾向が水素より大きいアルミニウムAlは卑金属へ分類されます。"},{"q":"アルミニウムの単体は[____]と反応する。","answer":"高温の水蒸気","choices":["高温の水蒸気","熱水","常温の水","水とは反応しない"],"explain":"アルミニウムの単体は[ 高温の水蒸気 ]と反応する。\n★水との反応のイオン化傾向、\n|(水)陸かな、|まじ|歩くあて|なし|\n|Li K Ca Na | Mg | Al Zn Fe | ～ |\n|常温の水と激しく反応|熱水と反応|高温の水蒸気と反応|反応なし|"},{"q":"アルミニウムを空気中で高温に熱すると[____]、[____]になる。","answer":"激しく燃焼し、酸化アルミニウム","choices":["激しく燃焼し、酸化アルミニウム","激しく燃焼し、水酸化アルミニウム","徐々に燃焼し、酸化アルミニウム","徐々に燃焼し、水酸化アルミニウム"],"explain":"アルミニウムを空気中で高温に熱すると[ 激しく燃焼し ]、[ 酸化アルミニウム ]になる。\n★酸化アルミニウムは水に溶けない白色粉末です。\n★4Al + 3O₂ → 2Al₂O₃"},{"q":"アルミニウムは酸化されやすく、つまり[____](力)が強く、他の金属の酸化物を[____]することから金属の単体の製造に利用される。","answer":"還元力、還元","choices":["還元力、還元","還元力、酸化","酸化力、酸化","酸化力、還元"],"explain":"アルミニウムは酸化されやすく、つまり[ 還元力 ]が強く、他の金属の酸化物を[ 還元 ]することから金属の単体の製造に利用される。\n★テルミット反応といいます。激しく光を放ちながら反応し、アルミニウムが金属酸化物の酸素を奪い酸化アルミニウムと金属の単体が生じます。"},{"q":"アルミニウムAlの還元力を利用して金属の単体を得る方法を[____](反応・法)という。","answer":"テルミット反応","choices":["テルミット反応","接触法","融解塩電解","アセチレン炎反応"],"explain":"アルミニウムAlの還元力を利用して金属の単体を得る方法を[ テルミット反応 ]という。\n★テルミット法ともいいます。激しく光を放ちながら反応し、アルミニウムが金属酸化物の酸素を奪うことで酸化アルミニウムと金属の単体が生じます。レールなど、鉄の溶接に利用されています。"},{"q":"飛行機の機体などに利用されるアルミニウムの合金を[____]という。少量の銅やマグネシウムが含まれる。","answer":"ジュラルミン","choices":["ジュラルミン","アルミナ","ボーキサイト","アルマイト"],"explain":"飛行機の機体などに利用されるアルミニウムの合金を[ ジュラルミン ]という。少量の銅やマグネシウムが含まれる。\n★ボーキサイトはアルミニウムの原料鉱石\n★アルミナは酸化アルミニウムAl₂O₃\n★ジュラルミンはMgやCuなどとのアルミニウム合金\n★アルマイトは人工的に厚い酸化被膜をつけた製品"},{"q":"単体のアルミニウムAlは標準状態で[____]の結晶構造をとる。","answer":"面心立方格子","choices":["面心立方格子","体心立方格子","六方最密充填","不定形固体"],"explain":"単体のアルミニウムAlは標準状態で[ 面心立方格子 ]の結晶構造をとる。\n★見る角度を変えると立方最密充填構造と同じ形です。他に、記憶しやすい範囲で金Au、銀Ag、銅Cu、白金Pt、鉛Pb、カルシウムCaなどがあります(加工しやすい金属)。\n★慶応理工2019年。アボガドロ定数N=6.02×10²³、原子量Al=27.0、単位格子一辺の長さ4.04×10⁻⁸cmが与えられ、密度2.72g/cm³を答えさせる問題が続きました。単位格子中の原子4個。d=(M/N)×個数/一辺³"},{"q":"2Al + 6HCl → [____]","answer":"2AlCl₃ + 3H₂","choices":["2AlCl₃ + 3H₂","2AlCl₃ + 3H₂O","2Al(OH)₃ + 3Cl₂","2[Al(OH)₄]Cl + 3H₂"],"explain":"2Al + 6HCl → 2AlCl₃ + 3H₂\n★アルミニウムAlの単体は両性金属で酸や強塩基と反応して水素を発生します。\n★塩基との反応\n2Al + 2NaOH + 6H₂O → 2Na[Al(OH)₄] + 3H₂"},{"q":"2Al + 2NaOH + 6H₂O → [____]","answer":"2Na[Al(OH)₄] + 3H₂","choices":["2Na[Al(OH)₄] + 3H₂","2Na[Al(OH)₄] + 3H₂O","Na₂[Al(OH)₄] + 3H₂","Na₂[Al(OH)₄] + 3H₂O"],"explain":"2Al + 2NaOH + 6H₂O → 2Na[Al(OH)₄] + 3H₂\n★錯イオンの名称はテトラヒドロキシドアルミン酸ナトリウム。★アルミニウムAlの単体は両性金属で酸や強塩基と反応して水素を発生します。\n★酸との反応\n2Al + 6HCl → 2AlCl₃ + 3H₂"},{"q":"アルミニウムは、酸の水溶液と反応して[____]を発生し、強塩基の水溶液と反応して[____]を発生する。","answer":"水素、水素","choices":["水素、水素","水素、水","水、水素","水、水"],"explain":"アルミニウムは、酸の水溶液と反応して[ 水素 ]を発生し、強塩基の水溶液と反応して[ 水素 ]を発生する。\n★アルミニウムAlの単体は両性金属で酸や強塩基と反応して水素を発生します。\n★酸との反応\n2Al + 6HCl → 2AlCl₃ + 3H₂\n★塩基との反応\n2Al + 2NaOH + 6H₂O → 2Na[Al(OH)₄] + 3H₂"},{"q":"テトラヒドロキシドアルミン酸ナトリウムの化学式は[____]である。","answer":"Na[Al(OH)₄]","choices":["Na[Al(OH)₄]","Na[Al(NH₃)₄]","Na₂[Al(OH)₄]","Na₂[Al(NH₃)₄]"],"explain":"テトラヒドロキシドアルミン酸ナトリウムの化学式は[  Na[Al(OH)₄]  ]である。\n★ Na[Al(OH)₄]\nテトラ(4)ヒドロキシド(OH⁻)アルミン(Al³⁺)酸(陰イオン)ナトリウム(Na⁺)、★錯イオンの部分が陰イオンのときは「〜酸」と付きます。\n★テトラヒドロキシドアルミン(III)酸イオン[Al(OH)₄]⁻。\n[Al(OH)₄(H₂O)₂]⁻、アルミニウムの配位数は6で、水酸化物イオン4つと水分子2つが配位しています。水分子を省略した形が[Al(OH)₄]⁻です。\n★両性金属の錯イオン[X(配位子)₄]ⁿ⁻は「配位数4の形」で揃っています(高校化学)。"},{"q":"[Al(OH)₄]⁻イオンは厳密には[____](つ)の水分子が[____](結合)した形を取っている。","answer":"2つ、配位結合","choices":["2つ、配位結合","4つ、配位結合","2つ、イオン結合","4つ、イオン結合"],"explain":"[Al(OH)₄]⁻イオンは厳密には[ 2つ ]の水分子が[ 配位結合 ]した形を取っている。\n★テトラヒドロキシドアルミン(III)酸イオン[Al(OH)₄]⁻。\n[Al(OH)₄(H₂O)₂]⁻、アルミニウムの配位数は6で、水酸化物イオン4つと水分子2つが配位しています。水分子を省略した形が[Al(OH)₄]⁻です。\n★両性金属の錯イオン[X(配位子)₄]ⁿ⁻は「配位数4の形」で揃っています(高校化学)。"}]},
  {"code":"MC07","name":"Alの化合物","parent":"典型金属","questions":[{"q":"アルミナは[____]の[____]であり、水に溶けない。","answer":"白色の粉末(固体)、酸化アルミニウム","choices":["白色の粉末(固体)、酸化アルミニウム","白色ゲル状物質、酸化アルミニウム","白色の粉末(固体)、水酸化アルミニウム","白色ゲル状物質、水酸化アルミニウム"],"explain":"アルミナは[ 白色の粉末(固体) ]の[ 酸化アルミニウム ]であり、水に溶けない。\n★酸化アルミニウムAl₂O₃は両性酸化物で酸や塩基の水溶液に溶けますが、水には溶けません。\n★水酸化アルミニウムAl(OH)₃は白色無定形固体で水中ではゲル状沈殿になります。"},{"q":"酸化アルミニウムAl₂O₃は[____](酸化物)であり、酸や強塩基の水溶液と反応して溶ける。","answer":"両性酸化物","choices":["両性酸化物","塩基性酸化物","酸性酸化物","中性物質"],"explain":"酸化アルミニウムAl₂O₃は[ 両性酸化物 ]であり、酸や強塩基の水溶液と反応して溶ける。\n★強塩基とは反応しますが、アンモニア水などの弱塩基とは反応しません。"},{"q":"水酸化アルミニウムAl(OH)₃は[____](水酸化物)であり、酸や強塩基の水溶液と反応して溶ける。","answer":"両性水酸化物","choices":["両性水酸化物","塩基性水酸化物","酸性水酸化物","中性物質"],"explain":"水酸化アルミニウムAl(OH)₃は[ 両性水酸化物 ]であり、酸や強塩基の水溶液と反応して溶ける。\n★強塩基とは反応しますが、アンモニア水などの弱塩基とは反応しません。"},{"q":"酸化アルミニウムAl₂O₃は[____]で水に溶けない。水酸化アルミニウムAl(OH)₃は白色無定形固体であり水中では[____]である。","answer":"白色粉末、白色ゲル状沈殿","choices":["白色粉末、白色ゲル状沈殿","白色粉末、無色の水溶液","白色ゲル状物質、白色ゲル状沈殿","白色ゲル状物質、無色の水溶液"],"explain":"酸化アルミニウムAl₂O₃は[ 白色粉末 ]で水に溶けない。水酸化アルミニウムAl(OH)₃は白色無定形固体であり水中では[ 白色ゲル状沈殿 ]である。\n★酸化アルミニウムAl₂O₃は両性酸化物で酸や強塩基の水溶液に溶けますが、水には溶けません。"},{"q":"酸化アルミニウムに塩酸を加えると[____]が生じる。","answer":"塩化アルミニウムと水","choices":["塩化アルミニウムと水","テトラヒドロキシドアルミン酸ナトリウムと水","塩化アルミニウムと水素","テトラヒドロキシドアルミン酸ナトリウム"],"explain":"酸化アルミニウムに塩酸を加えると[ 塩化アルミニウムと水 ]が生じる。\n★Al₂O₃ + 6HCl → 2AlCl₃ + 3H₂O\n★酸化アルミニウムに水酸化ナトリウム水溶液を加えるとテトラヒドロキシドアルミン酸ナトリウムが生じます。\n★Al₂O₃ + 2NaOH + 3H₂O → 2Na[Al(OH)₄]\n★テトラヒドロキシドアルミン(III)酸イオン[Al(OH)₄]⁻。\n[Al(OH)₄(H₂O)₂]⁻、アルミニウムの配位数は6で、水酸化物イオン4つと水分子2つが配位しています。水分子を省略した形が[Al(OH)₄]⁻です。\n★両性金属の錯イオン[X(配位子)₄]ⁿ⁻は「配位数4の形」で揃っています(高校化学)。"},{"q":"酸化アルミニウムに水酸化ナトリウム水溶液を加えると[____]が生じる。","answer":"テトラヒドロキシドアルミン酸ナトリウム","choices":["テトラヒドロキシドアルミン酸ナトリウム","テトラヒドロキシドアルミン酸ナトリウムと水素","塩化アルミニウムと水素","塩化アルミニウムと水"],"explain":"酸化アルミニウムに水酸化ナトリウム水溶液を加えると[ テトラヒドロキシドアルミン酸ナトリウム ]が生じる。\n★Al₂O₃ + 2NaOH + 3H₂O → 2Na[Al(OH)₄]\n★問題文中にないH₂Oが化学式の左辺に必要なためやや難しいと思います。Na[Al(OH)₄]が生じることを覚えておきます。"},{"q":"ルビーは[____]を主成分とし、微量の[____]を含む結晶である。","answer":"Al₂O₃、Cr₂O₃","choices":["Al₂O₃、Cr₂O₃","Al₂O₃、Cr₂O₃やTiO₂","Al₂O₃、Fe₂O₃","Al₂O₃、Fe₂O₃やTiO₂"],"explain":"ルビーは[ Al₂O₃ ]を主成分とし、微量の[ Cr₂O₃ ]を含む結晶である。\n★ルビーは酸化アルミニウムを主成分とする赤色の宝石で、微量のCr₂O₃を含みます。ルビー(ruby)の語源は赤色です。"},{"q":"サファイアは[____]を主成分とし、微量の[____]を含む結晶である。","answer":"Al₂O₃、Fe₂O₃やTiO₂","choices":["Al₂O₃、Fe₂O₃やTiO₂","Al₂O₃、Cr₂O₃やTiO₂","Al₂O₃、Fe₂O₃やCr₂O₃","Al₂O₃、Cr₂O₃"],"explain":"サファイアは[ Al₂O₃ ]を主成分とし、微量の[ Fe₂O₃やTiO₂ ]を含む結晶である。\n★サファイアは酸化アルミニウムを主成分とする主に青色の宝石で、赤色でないもの(ルビーでないもの)です。微量のFe₂O₃とTiO₂を含みます。サファイア(sapphire)の語源は青色です。"},{"q":"酸化アルミニウムを主成分とする宝石(結晶)に赤色の[____]や青などその他の色の[____]がある。","answer":"ルビー、サファイア","choices":["ルビー、サファイア","ルビー、氷晶石","サファイア、ルビー","サファイア、氷晶石"],"explain":"酸化アルミニウムを主成分とする宝石(結晶)に赤色の[ ルビー ]や青などその他の色の[ サファイア ]がある。\n★ルビーとサファイアはダイヤモンドに次ぐ硬度をもちます。ルビーの色はピンクや紫もあり、ピジョンブラッド(鳩の血)が最高級です。★酸化アルミニウムの結晶のうち赤色でないものをサファイアとしています。イエローサファイア、ホワイトサファイアなどもあります。"},{"q":"酸化アルミニウムを主成分とする宝石(結晶)のルビーとサファイアは、酸に[____]、塩基に[____]。","answer":"溶けない、溶けない","choices":["溶けない、溶けない","溶けない、溶ける","溶ける、溶けない","溶ける、溶ける"],"explain":"酸化アルミニウムを主成分とする宝石(結晶)のルビーとサファイアは、酸に[ 溶けない ]、塩基に[ 溶けない ]。\n★比較：Al(OH)₃を熱して作ったAl₂O₃(宝石ではないもの)は結晶に隙間が多く、酸にも強塩基にも反応します。"},{"q":"アルミニウムイオンAl³⁺を含む水溶液に、アンモニア水または少量の水酸化ナトリウムなどの塩基を加えると[____]の[____]が生じる。","answer":"白色ゲル状沈殿、水酸化アルミニウム","choices":["白色ゲル状沈殿、水酸化アルミニウム","白色ゲル状沈殿、酸化アルミニウム","無色の水溶液、水酸化アルミニウム","無色の水溶液、酸化アルミニウム"],"explain":"アルミニウムイオンAl³⁺を含む水溶液に、アンモニア水または少量の水酸化ナトリウムなどの塩基を加えると[ 白色ゲル状沈殿 ]の[ 水酸化アルミニウム ]が生じる。\n★水酸化アルミニウムAl(OH)₃\n★Al³⁺ + 3OH⁻ → Al(OH)₃"},{"q":"水酸化アルミニウムに塩酸を加えると[____](が生じる)。","answer":"塩化アルミニウムと水","choices":["塩化アルミニウムと水","テトラヒドロキシドアルミン酸ナトリウム","塩化アルミニウムと水素","溶けない"],"explain":"水酸化アルミニウムに塩酸を加えると[ 塩化アルミニウムと水 ]が生じる。\n★Al(OH)₃は両性水酸化物で酸の水溶液に溶けます。\n★Al(OH)₃ + 3HCl → AlCl₃ + 3H₂O\n★テトラヒドロキシドアルミン(III)酸イオン[Al(OH)₄]⁻。\n[Al(OH)₄(H₂O)₂]⁻、アルミニウムの配位数は6で、水酸化物イオン4つと水分子2つが配位しています。水分子を省略した形が[Al(OH)₄]⁻です。\n★両性金属の錯イオン[X(配位子)₄]ⁿ⁻は「配位数4の形」で揃っています(高校化学)。"},{"q":"水酸化アルミニウムに(過剰の)水酸化ナトリウム水溶液を加えると[____](が生じる)。","answer":"テトラヒドロキシドアルミン酸ナトリウム","choices":["テトラヒドロキシドアルミン酸ナトリウム","テトラヒドロキシドアルミン酸ナトリウムと水","塩化アルミニウムと水素","溶けない"],"explain":"水酸化アルミニウムに(過剰の)水酸化ナトリウム水溶液を加えると[ テトラヒドロキシドアルミン酸ナトリウム ]が生じる。\n★Al(OH)₃は両性水酸化物で強塩基の水溶液に溶けます。\n★Al(OH)₃ + NaOH → Na[Al(OH)₄]\n★Al³⁺へ「少量の」NaOH水溶液を加えるとAl(OH)₃です。"},{"q":"水酸化アルミニウムにアンモニア水を加えると[____](が生じる)。","answer":"溶けない","choices":["溶けない","テトラヒドロキシドアルミン酸ナトリウム","テトラヒドロキシドアルミン酸ナトリウムと水素","塩化アルミニウムと水素"],"explain":"水酸化アルミニウムにアンモニア水を加えると[ 溶けない ]。\n★Al(OH)₃は両性水酸化物で強塩基の水溶液に溶けますが、弱塩基のアンモニア水には溶けません。★Al³⁺にアンモニア水を加えるとAl(OH)₃が生じ、過剰に加えてもAl(OH)₃のままです。"},{"q":"アルミニウムイオンAl³⁺を含む水溶液に、少量の水酸化ナトリウムを加えると[____]、さらに加えていくと[____]。","answer":"白色沈殿が生じ、無色溶液となる","choices":["白色沈殿が生じ、無色溶液となる","白色沈殿が生じ、変化しない","無色溶液となり、白色沈殿が生じる","無色溶液となり、変化しない"],"explain":"アルミニウムイオンAl³⁺を含む水溶液に、少量の水酸化ナトリウムを加えると[ 白色沈殿が生じ ]、さらに加えていくと[ 無色溶液となる ]。\n★Al³⁺ → Al(OH)₃ → [Al(OH)₄]⁻\n★酸を加えると戻ります。\nAl³⁺ ← Al(OH)₃ ← [Al(OH)₄]⁻"},{"q":"アルミニウムイオンAl³⁺を含む水溶液に、少量のアンモニア水を加えると[____]、さらに加えていくと[____]。","answer":"白色沈殿が生じ、変化しない","choices":["白色沈殿が生じ、変化しない","白色沈殿が生じ、無色溶液となる","無色溶液となり、白色沈殿が生じる","無色溶液となり、変化しない"],"explain":"アルミニウムイオンAl³⁺を含む水溶液に、少量のアンモニア水を加えると[ 白色沈殿が生じ ]、さらに加えていくと[ 変化しない ]。\n★Al³⁺ → Al(OH)₃ → 変化なし\n★酸を加えると戻ります。\nAl³⁺ ← Al(OH)₃"},{"q":"硫酸アルミニウムと硫酸カリウムとの混合水溶液を濃縮すると[____]が生じる。","answer":"ミョウバン","choices":["ミョウバン","氷晶石","アルミナ","アルマイト"],"explain":"硫酸アルミニウムと硫酸カリウムとの混合水溶液を濃縮すると[ ミョウバン ]が生じる。\n★ミョウバンAlK(SO₄)₂・12H₂O。★硫酸アルミニウムAl₂(SO₄)₃と硫酸カリウムK₂SO₄を合わせて2で割り、AlK(SO₄)₂へ12個の水和水を付けます。★ゴロ: 歩く龍に水を出す。(ダース12)"},{"q":"ミョウバンの化学式は[____]である。","answer":"AlK(SO₄)₂・12H₂O","choices":["AlK(SO₄)₂・12H₂O","AlK(SO₄)₂・10H₂O","AlK(SO₄)₄・12H₂O","AlK(SO₄)₄・10H₂O"],"explain":"ミョウバンの化学式は[ AlK(SO₄)₂・12H₂O ]である。\n★硫酸アルミニウムAl₂(SO₄)₃と硫酸カリウムK₂SO₄を合わせて2で割り、AlK(SO₄)₂へ12個の水和水を付けます。★ゴロ: 歩く龍に水を出す。(ダース12)"},{"q":"ミョウバンは[____](形)の結晶で、無色透明である。","answer":"正八面体形","choices":["正八面体形","立方体","正四面体形","球形"],"explain":"ミョウバンは[ 正八面体形 ]の結晶で、無色透明である。\n★ミョウバンは水の清澄剤(せいちょうざい)や食品添加物に使われています。井戸の水にミョウバンを入れると不純物が沈殿します。★ミョウバンAlK(SO₄)₂・12H₂O。★ゴロ: 歩く龍に水を出す。(ダース12)"},{"q":"ミョウバンのように2種類以上の塩が一定の割合で結合し、水に溶けるときそれぞれの成分イオンへ電離する塩を[____]という。","answer":"複塩","choices":["複塩","単塩","酸性塩","塩基性塩"],"explain":"ミョウバンのように2種類以上の塩が一定の割合で結合し、水に溶けるときそれぞれの成分イオンへ電離する塩を[ 複塩 ]という。\n★AlK(SO₄)₂・12H₂O → Al³⁺ + K⁺ + 2SO₄²⁻ + 12H₂O\n★単塩は陽イオンと陰イオンのそれぞれ1種類ずつから成る塩。複塩は陽イオンまたは陰イオン、あるいは両方を2種類以上含む塩。酸性塩はH⁺を含む塩。塩基性塩はOH⁻を含む塩。"},{"q":"ミョウバンは水に溶けると[____](性)を示す。","answer":"酸性","choices":["酸性","中性","塩基性","両性"],"explain":"ミョウバンは水に溶けると[ 酸性 ]を示す。\n★AlK(SO₄)₂・12H₂O → Al³⁺ + K⁺ + 2SO₄²⁻ + 12H₂O\nAl³⁺は弱塩基由来なので強酸由来のSO₄²⁻に負けて酸性に寄ります。強塩基由来のK⁺と強酸由来のSO₄²⁻は打ち消し合うと考えます。"}]},
  {"code":"MC08","name":"亜鉛Znと水銀Hg","parent":"典型金属","questions":[{"q":"亜鉛Znは[____]と同じ[____](族)に属する金属元素である。","answer":"水銀Hg、12族","choices":["水銀Hg、12族","アルミニウムAl、13族","スズSn、14族","鉛Pb、14族"],"explain":"亜鉛Znは[ 水銀Hg ]と同じ[ 12族 ]に属する金属元素である。\n★12族は主に亜鉛Znと水銀Hgについて覚えます。新課程から遷移元素(遷移金属)に分類されていますが、性質は典型元素です。"},{"q":"亜鉛Znは[____](族)に属する元素で、[____](個)の価電子をもち、[____](価)の[____]になる。","answer":"12族、2個、2価、陽イオン","choices":["12族、2個、2価、陽イオン","12族、2個、2価、陰イオン","13族、3個、3価、陽イオン","13族、3個、3価、陰イオン"],"explain":"亜鉛Znは[ 12族 ]に属する元素で、[ 2個 ]の価電子をもち、[ 2価 ]の[ 陽イオン ]になる。"},{"q":"亜鉛Znの単体は[____](色)で金属光沢が[____]。","answer":"青白色、ある","choices":["青白色、ある","青白色、ない","黄色、ある","黄色、ない"],"explain":"亜鉛Znの単体は[ 青白色 ]で金属光沢が[ ある ]。\n★青白色は銀白色と表記されることもあります。"},{"q":"亜鉛Znは[____](金属)に分類され、融点は比較的[____]。","answer":"重金属、低い","choices":["重金属、低い","重金属、高い","軽金属、低い","軽金属、高い"],"explain":"亜鉛Znは[ 重金属 ]に分類され、融点は比較的[ 低い ]。\n★同じ両性金属のアルミニウムAlと化学的性質は似ていますが、物理的性質(Alは軽金属で融点は高い)は異なっています。"},{"q":"亜鉛Znは[____](元素)であり、酸、強塩基の水溶液と反応して[____]を発生する。","answer":"両性金属、水素","choices":["両性金属、水素","両性金属、水","陽性金属、水素","陽性金属、水"],"explain":"亜鉛Znは[ 両性金属 ]であり、酸、強塩基の水溶液と反応して[ 水素 ]を発生する。\n★強塩基とは非常にゆっくりと反応します。★ゴロ: ああすんなり両性に好かれる(Al、Zn、Sn、Pb)。高校範囲では4つを覚えます。"},{"q":"亜鉛の単体は、酸の水溶液と反応して[____]を発生し、強塩基の水溶液と反応して[____]を発生する。","answer":"水素、水素","choices":["水素、水素","水素、水","水、水素","水、水"],"explain":"亜鉛の単体は、酸の水溶液と反応して[ 水素 ]を発生し、強塩基の水溶液と反応して[ 水素 ]を発生する。"},{"q":"亜鉛の単体に塩酸を加えると[____]を生じる。","answer":"塩化亜鉛と水素","choices":["塩化亜鉛と水素","塩化亜鉛と水","水酸化亜鉛と塩素","水酸化亜鉛と水素"],"explain":"亜鉛の単体に塩酸を加えると[ 塩化亜鉛と水素 ]を生じる。\n★単体と酸や強塩基との反応では水素が発生します。\n★Zn + 2HCl → ZnCl₂ + H₂"},{"q":"Zn + 2HCl → [____]","answer":"ZnCl₂ + H₂","choices":["ZnCl₂ + H₂","ZnCl₂ + H₂O","Zn(OH)₂ + Cl₂","Zn(OH)₂ + H₂"],"explain":"Zn + 2HCl → ZnCl₂ + H₂\n★亜鉛は両性金属で酸や強塩基と反応して水素を発生します。水とは高温の水蒸気と反応して水素を発生します。"},{"q":"亜鉛の単体に水酸化ナトリウム水溶液を加えると[____]を生じる。","answer":"テトラヒドロキシド亜鉛(II)酸ナトリウムと水素","choices":["テトラヒドロキシド亜鉛(II)酸ナトリウムと水素","テトラヒドロキシド亜鉛(II)酸ナトリウム","トリヒドロキシド亜鉛(II)酸ナトリウム","トリヒドロキシド亜鉛(II)酸ナトリウムと水素"],"explain":"亜鉛の単体に水酸化ナトリウム水溶液水溶液を加えると[ テトラヒドロキシド亜鉛(II)酸ナトリウムと水素 ]を生じる。\n★単体と酸や強塩基との反応では水素が発生します。\n★Zn + 2NaOH + 2H₂O → Na₂[Zn(OH)₄] + H₂"},{"q":"Zn + 2NaOH + 2H₂O → [____]","answer":"Na₂[Zn(OH)₄] + H₂","choices":["Na₂[Zn(OH)₄] + H₂","Na₂[Zn(OH)₄]","Na₂[Zn(OH)₃]","Na₂[Zn(OH)₃] + H₂"],"explain":"Zn + 2NaOH + 2H₂O → Na₂[Zn(OH)₄] + H₂\n★亜鉛は両性金属で酸や強塩基と反応して水素を発生します。水とは高温の水蒸気と反応して水素を発生します。★左辺にH₂Oを含む化学反応式はH₂Oや生成物を暗記しておくと書きやすくなります。"},{"q":"亜鉛の単体は[____]と反応する。","answer":"高温の水蒸気","choices":["高温の水蒸気","冷水","常温の水","水とは反応しない"],"explain":"亜鉛の単体は[ 高温の水蒸気 ]と反応する。\n★水との反応のイオン化傾向、\n|(水)陸かな、|まじ|歩くあて|なし|\n|Li K Ca Na | Mg | Al Zn Fe | ～ |\n|常温の水と激しく反応|熱水と反応|高温の水蒸気と反応|反応なし|"},{"q":"銅と亜鉛の合金を[____]という。","answer":"黄銅","choices":["黄銅","トタン","ブリキ","青銅"],"explain":"銅と亜鉛の合金を[ 黄銅 ]という。\n★黄銅(こうどう、おうどう)と読みます。真鍮(しんちゅう)ともいいます。五円玉や金管楽器(トランペットなど)に使われています。★連想、亜鉛の亜には五円玉の五が隠れている気がします(漢字の形)。五円玉の色から黄銅と答えやすいと思います。"},{"q":"鋼に亜鉛めっきしたものを[____]という。","answer":"トタン","choices":["トタン","ブリキ","黄銅","アマルガム"],"explain":"鋼に亜鉛めっきしたものを[ トタン ]という。\n★トタンは簡易的な建物の屋根に使われます。★鋼(こう、はがね)は鉄Feのことです。★トタンは鉄Feに亜鉛Znをめっき(ゴロ: テツヤと途端に会えん)。ブリキは鉄FeにスズSnをめっき(ゴロ: テツヤにスズちゃんブリッ子)。"},{"q":"亜鉛は電池の電極として[____](極)に使われる。","answer":"負極","choices":["負極","陰極","正極","陽極"],"explain":"亜鉛は電池の電極として[ 負極 ]に使われる。\n★Zn → Zn²⁺ + 2e⁻ (電子を放出)\n★正極は電池が電流を出す部分(電子を外から受け取る部分)です。★負極は電池が電流を吸い込む部分(電子を外へ放出する部分)です。★陽極は電池の正極と繋いだ部分(酸化反応が起こる部分)です。★陰極は電池の負極と繋いだ部分(還元反応が起こる部分)です。"},{"q":"酸化亜鉛ZnOは[____]で水に[____]。","answer":"白色粉末、溶けない","choices":["白色粉末、溶けない","白色粉末、溶ける","白色ゲル状物質、溶けない","白色ゲル状物質、溶ける"],"explain":"酸化亜鉛ZnOは[ 白色粉末 ]で水に[ 溶けない ]。\n★Al₂O₃やZnOは水に溶けず、酸や強塩基の水溶液と反応する両性酸化物です。両性酸化物は受験用にこの2つを覚えます。"},{"q":"酸化亜鉛ZnOは[____]で酸や強塩基の水溶液と反応する。","answer":"両性酸化物","choices":["両性酸化物","中性物質","酸性酸化物","塩基性酸化物"],"explain":"酸化亜鉛ZnOは[ 両性酸化物 ]で酸や強塩基の水溶液と反応する。\n★Al₂O₃やZnOは水に溶けず、酸や強塩基の水溶液と反応する両性酸化物です。両性酸化物は受験用にこの2つを覚えます。"},{"q":"ZnO + 2HCl →[____]","answer":"ZnCl₂ + H₂O","choices":["ZnCl₂ + H₂O","ZnCl₂ + H₂","Zn(OH)₂ + H₂O","Zn(OH)₂ + Cl₂"],"explain":"ZnO + 2HCl → ZnCl₂ + H₂O\n★Al₂O₃やZnOは水に溶けず、酸や強塩基の水溶液と反応する両性酸化物です。"},{"q":"ZnO + 2NaOH + H₂O → [____]","answer":"Na₂[Zn(OH)₄]","choices":["Na₂[Zn(OH)₄]","Na₂[Zn(OH)₄] + H₂O","Na₂[Zn(OH)₄] + H₂","Na₂[Zn(OH)₂] + H₂"],"explain":"ZnO + 2NaOH + H₂O → Na₂[Zn(OH)₄]\n★Al₂O₃やZnOは水に溶けず、酸や強塩基の水溶液と反応する両性酸化物です。★左辺にH₂Oを含む化学反応式はH₂Oや生成物を暗記しておくと書きやすくなります。"},{"q":"白色の絵具には[____]が用いられている。","answer":"酸化亜鉛ZnO","choices":["酸化亜鉛ZnO","酸化水銀HgO","硫化水銀(II)HgS","硫化鉛PbS"],"explain":"白色の絵具には[ 酸化亜鉛ZnO ]が用いられている。\n★「白色顔料に用いられる」とも表現されます。硫化亜鉛ZnS(白色)も同様に白色の絵具(白色顔料)に利用されます。"},{"q":"酸化亜鉛ZnOは[____]で水に溶けない。水酸化亜鉛Zn(OH)₂は白色粉末であり水中では[____]である。","answer":"白色粉末、白色ゲル状沈殿","choices":["白色粉末、白色ゲル状沈殿","白色粉末、無色の錯イオン","黄色粉末、白色ゲル状沈殿","黄色粉末、無色の錯イオン"],"explain":"酸化亜鉛ZnOは[ 白色粉末 ]で水に溶けない。水酸化亜鉛Zn(OH)₂は白色粉末であり水中では[ 白色ゲル状沈殿 ]である。\n★「ゲル状」は「コロイド状」「ゼリー状」などの表現もあります。★酸化アルミニウムAl₂O₃や水酸化アルミニウムAl(OH)₃と似ています。"},{"q":"亜鉛イオンZn²⁺を含む水溶液に、少量のアンモニア水または少量の水酸化ナトリウムなどの塩基を加えると[____]の[____]が生じる。","answer":"水酸化亜鉛、白色ゲル状沈殿","choices":["水酸化亜鉛、白色ゲル状沈殿","水酸化亜鉛、白色水溶液","酸化亜鉛、白色ゲル状沈殿","酸化亜鉛、白色水溶液"],"explain":"亜鉛イオンZn²⁺を含む水溶液に、少量のアンモニア水または少量の水酸化ナトリウムなどの塩基を加えると[ 水酸化亜鉛 ]の[ 白色ゲル状沈殿 ]が生じる。\n★水酸化亜鉛Zn(OH)₂\n★Zn²⁺ + 2OH⁻ → Zn(OH)₂"},{"q":"水酸化亜鉛に塩酸を加えると[____](が生じる)。","answer":"塩化亜鉛と水","choices":["塩化亜鉛と水","水酸化亜鉛と塩素","塩化亜鉛と水素","反応しない"],"explain":"水酸化亜鉛に塩酸を加えると[ 塩化亜鉛と水 ]が生じる。\n★Zn(OH)₂は両性水酸化物で酸の水溶液に溶けます。\n★Zn(OH)₂ + 2HCl → ZnCl₂ + 2H₂O"},{"q":"水酸化亜鉛に(過剰の)水酸化ナトリウム水溶液を加えると[____](が生じる)。","answer":"テトラヒドロキシド亜鉛(II)酸ナトリウム","choices":["テトラヒドロキシド亜鉛(II)酸ナトリウム","テトラアンミン亜鉛(II)酸ナトリウム","水酸化亜鉛","反応しない"],"explain":"水酸化亜鉛に(過剰の)水酸化ナトリウム水溶液を加えると[ テトラヒドロキシド亜鉛(II)酸ナトリウム ]が生じる。\n★Zn(OH)₂は両性水酸化物で強塩基の水溶液に溶けます。\n★Zn(OH)₂ + 2NaOH → Na₂[Zn(OH)₄]\n★Zn²⁺に「少量の」NaOH水溶液を加えるとZn(OH)₂です。"},{"q":"水酸化亜鉛に(過剰の)アンモニア水を加えると[____](が生じる)。","answer":"テトラアンミン亜鉛(II)イオン","choices":["テトラアンミン亜鉛(II)イオン","テトラヒドロキシド亜鉛(II)酸イオン","水酸化亜鉛","反応しない"],"explain":"水酸化亜鉛に(過剰の)アンモニア水を加えると[ テトラアンミン亜鉛(II)イオン ]が生じる。\n★Zn(OH)₂は両性水酸化物で強塩基の水溶液に溶けます。弱塩基のアンモニア水には溶けませんが、過剰のアンモニア水には溶けます。★Zn²⁺にアンモニア水を加えるとZn(OH)₂が生じ、過剰のアンモニア水を加える[Zn(NH₃)₄]²⁺になります。\n★「過剰」は濃度が大切との実験報告がネットで見つかるので調べてみてください。キーワード「錯イオン生成反応の考察 -過剰量の試薬で溶けるのはなぜか- 前田 祐作(奈良県立畝傍高等学校)」"},{"q":"亜鉛イオンZn²⁺を含む水溶液に、少量の水酸化ナトリウムを加えると[____]が生じ、さらに加えていくと[____]。","answer":"白色沈殿、無色溶液となる","choices":["白色沈殿、無色溶液となる","白色沈殿、白色ゲル状沈殿となる","無色溶液、白色沈殿となる","無色溶液、白色ゲル状沈殿となる"],"explain":"亜鉛イオンZn²⁺を含む水溶液に、少量の水酸化ナトリウムを加えると[ 白色沈殿 ]が生じ、さらに加えていくと[ 無色溶液となる ]。\n★Zn²⁺ → Zn(OH)₂ → [Zn(OH)₄]²⁻\n★酸を加えると戻ります。\nZn²⁺ ← Zn(OH)₂ ← [Zn(OH)₄]²⁻"},{"q":"[____]を含む水溶液に、少量の水酸化ナトリウムを加えると白色沈殿が生じ、さらに加えていくと無色溶液となる。","answer":"Zn²⁺、Al³⁺、Sn²⁺、Pb²⁺","choices":["Zn²⁺、Al³⁺、Sn²⁺、Pb²⁺","Zn²⁺、Ag⁺、Sn²⁺、Pb²⁺","Ag⁺、Cu²⁺、Ni²⁺、Zn²⁺","Ag⁺、Fe²⁺、Fe³⁺"],"explain":"[ Zn²⁺、Al³⁺、Sn²⁺、Pb²⁺ ]を含む水溶液に、少量の水酸化ナトリウムを加えると白色沈殿が生じ、さらに加えていくと無色溶液となる。\n★両性金属のZn²⁺、Al³⁺、Sn²⁺、Pb²⁺の4つは過剰の水酸化ナトリウムで錯イオンを形成します。\n★Zn²⁺ → Zn(OH)₂ → [Zn(OH)₄]²⁻"},{"q":"亜鉛イオンZn²⁺を含む水溶液に、少量のアンモニア水を加えると[____]が生じ、さらに加えていくと[____]。","answer":"白色沈殿、無色溶液となる","choices":["白色沈殿、無色溶液となる","白色沈殿、白色ゲル状沈殿となる","無色溶液、白色沈殿となる","無色溶液、白色ゲル状沈殿となる"],"explain":"亜鉛イオンZn²⁺を含む水溶液に、少量のアンモニア水を加えると[ 白色沈殿 ]が生じ、さらに加えていくと[ 無色溶液となる ]。\n★Zn²⁺ → Zn(OH)₂ → [Zn(NH₃)₄]²⁺\n★酸を加えると戻ります。\nZn²⁺ ← Zn(OH)₂ ← [Zn(NH₃)₄]²⁺"},{"q":"Al³⁺、Zn²⁺をそれぞれ含む水溶液に、少量のアンモニア水を加えると両方とも白色沈殿が生じ、さらに加えていくと[____]を含む水溶液は無色溶液となり、[____]を含む水溶液は変化しない。","answer":"Zn²⁺、Al³⁺","choices":["Zn²⁺、Al³⁺","Zn²⁺、Cu²⁺","Al³⁺、Zn²⁺","Al³⁺、Cu²⁺"],"explain":"Al³⁺、Zn²⁺をそれぞれ含む水溶液に、少量のアンモニア水を加えると両方とも白色沈殿が生じ、さらに加えていくと[ Zn²⁺ ]を含む水溶液は無色溶液となり、[ Al³⁺ ]を含む水溶液は変化しない。\n★過剰のアンモニア水で錯イオンを形成するのはAg⁺、Cu²⁺、Ni²⁺、Zn²⁺の4つです。★ゴロ: 金(銀)土日はあんまり会えん。\n★Zn²⁺ → Zn(OH)₂ → [Zn(NH₃)₄]²⁺\n★Al³⁺ → Al(OH)₃ → 変化なし"},{"q":"亜鉛イオンZn²⁺を含む水溶液に、[____](性)で硫化水素を通じると、[____]の白色沈殿が生じる。","answer":"中性〜塩基性、硫化亜鉛ZnS","choices":["中性〜塩基性、硫化亜鉛ZnS","中性〜塩基性、亜硫酸亜鉛ZnSO₃","酸性〜中性、硫化亜鉛ZnS","酸性〜中性、亜硫酸亜鉛ZnSO₃"],"explain":"亜鉛イオンZn²⁺を含む水溶液に、[ 中性〜塩基性 ]で硫化水素を通じると、[ 硫化亜鉛ZnS ]の白色沈殿が生じる。\n★Zn²⁺ + S²⁻ ⇄ ZnS\n★Zn²⁺ + H₂S ⇄ ZnS + 2H⁺\n★酸性にすると平衡が左側へ移動し、ZnSが溶けてZn²⁺となります。"},{"q":"亜鉛イオンZn²⁺を含む水溶液に、中性〜塩基性で硫化水素を通じると、[____]の[____]が生じる。","answer":"硫化亜鉛ZnS、白色沈殿","choices":["硫化亜鉛ZnS、白色沈殿","硫化亜鉛ZnS、黄色沈殿","亜硫酸亜鉛ZnSO₃、白色沈殿","亜硫酸亜鉛ZnSO₃、黄色沈殿"],"explain":"亜鉛イオンZn²⁺を含む水溶液に、中性〜塩基性で硫化水素を通じると、[ 硫化亜鉛ZnS ]の[ 白色沈殿 ]が生じる。\n★Zn²⁺ + S²⁻ ⇄ ZnS\n★Zn²⁺ + H₂S ⇄ ZnS + 2H⁺\n★酸性にすると平衡が左側へ移動し、ZnSが溶けてZn²⁺となります。"},{"q":"Zn²⁺ + H₂S ⇄ ZnS + 2H⁺\nこの反応は酸性中では[____]が増えることで平衡が[____]へ移動する。","answer":"水素イオンH⁺、左側","choices":["水素イオンH⁺、左側","水素イオンH⁺、右側","水酸化物イオンOH⁻、左側","水酸化物イオンOH⁻、右側"],"explain":"Zn²⁺ + H₂S ⇄ ZnS + 2H⁺\nこの反応は酸性中では[ 水素イオンH⁺ ]が増えることで平衡が[ 左側 ]へ移動する。★このことから中性〜塩基性下でZnSの白色沈殿が生じると判断できます。"},{"q":"白色顔料や蓄光塗料(夜光塗料)、蛍光塗料に利用される硫化物に[____]がある。","answer":"硫化亜鉛ZnS","choices":["硫化亜鉛ZnS","硫化カドミウムCdS","硫化水銀(II)HgS","硫化鉛PbS"],"explain":"白色顔料や蓄光塗料(夜光塗料)、蛍光塗料に利用される硫化物に[ 硫化亜鉛ZnS ]がある。\n★蓄光塗料・夜光塗料(ちっこうとりょう、やこうとりょう)は光を蓄えて暗所でも光を放つ塗料です。蛍光塗料は光を当てたときにだけ光ります。★硫化物XSの多くは黒色(黒色沈殿)です。例外にZnS白色、CdS黄色、MnS桃色(淡赤色、ピンク色)があります(*余力があればSnS褐色、SnS₂黄色も覚えてください)。HgSは昇華させると赤色へ変化します。"},{"q":"水銀Hgは[____]と同じ[____](族)に属する金属元素である。","answer":"亜鉛Zn、12族","choices":["亜鉛Zn、12族","アルミニウムAl、13族","スズSn、14族","鉛Pb、14族"],"explain":"水銀Hgは[ 亜鉛Zn ]と同じ[ 12族 ]に属する金属元素である。\n★重金属で融点が低いところなどが似ています。他の性質はあまり似ていません。"},{"q":"水銀Hgは密度が[____]、融点が[____]。","answer":"大きい、低い","choices":["大きい、低い","大きい、高い","小さい、低い","小さい、高い"],"explain":"水銀Hgは密度が[ 大きい ]、融点が[ 低い ]。\n★密度13.55g/cm³、融点-39°C。常温で液体の金属は水銀Hgのみです。"},{"q":"水銀は常温で[____](体)であり、[____](毒)である。","answer":"液体、極めて有毒","choices":["液体、極めて有毒","液体、無毒","固体、極めて有毒","固体、無毒"],"explain":"水銀は常温で[ 液体 ]であり、[ 極めて有毒 ]である。\n★密度13.55g/cm³、融点-39°C。常温で液体の金属は水銀Hgのみです。\n★極めて有毒で水俣病(みなまたびょう)などの水銀公害があります。"},{"q":"水銀の用途には、[____]がある。","answer":"温度計、血圧計、気圧計、蛍光灯など","choices":["温度計、血圧計、気圧計、蛍光灯など","花火、蛍光灯、LEDなど","遮蔽剤、電池の電極","窓ガラスの枠、飛行機の機体"],"explain":"水銀の用途には、[ 温度計、血圧計、気圧計、蛍光灯など ]がある。\n★液体であるため利用されてきましたが有毒なので使用量を減らしています。★蛍光灯は水銀を使用しないLEDへ置きかわる傾向にあります。もう少し目にやさしいLEDが開発されてほしいです。"},{"q":"水銀と他の金属との合金を[____]という。","answer":"アマルガム","choices":["アマルガム","ジュラルミン","アルマイト","黄銅"],"explain":"水銀と他の金属との合金を[ アマルガム ]という。\n★歯の詰め物としてアマルガムが使われることもありましたが、2016年に保険治療から外されています。\n★比較：アルマイトはアルミニウムに厚めの酸化被膜をつけたものです。"},{"q":"水銀は塩酸や希硫酸に[____]、硝酸や濃硫酸に[____]。","answer":"溶けず、溶ける","choices":["溶けず、溶ける","溶けず、溶けない","溶け、溶ける","溶け、溶けない"],"explain":"水銀は塩酸や希硫酸に[ 溶けず ]、硝酸や濃硫酸に[ 溶ける ]。\n★酸化力のある硝酸や濃硫酸に溶けます。塩酸(希塩酸)や希硫酸は反応性は高いですが、酸化力は小さい水溶液です。硝酸や濃硫酸には強い酸化作用があります。"},{"q":"水銀(II)イオンHg²⁺を含む水溶液に、硫化水素H₂Sを通じると、[____]の[____]が生じる。","answer":"硫化水銀(II)HgS、黒色沈殿","choices":["硫化水銀(II)HgS、黒色沈殿","硫化水銀(II)HgS、白色沈殿","硫酸水銀(II)HgSO₄、黒色沈殿","硫酸水銀(II)HgSO₄、白色沈殿"],"explain":"水銀(II)イオンHg²⁺を含む水溶液に、硫化水素H₂Sを通じると、[ 硫化水銀(II)HgS ]の[ 黒色沈殿 ]が生じる。\n★硫化物XSの多くは黒色(黒色沈殿)です。例外はZnS白色、CdS黄色、MnS桃色(淡赤色、ピンク色)があります(*余力があればSnS褐色、SnS₂黄色も覚えてください)。★HgSは熱して昇華させると赤色へ変化します。"},{"q":"硫化水銀(II)HgSを熱して昇華させると[____](色)から[____](色)へ変化する。","answer":"黒色、赤色","choices":["黒色、赤色","黒色、白色","白色、赤色","白色、黒色"],"explain":"硫化水銀(II)HgSを熱して昇華させると[ 黒色 ]から[ 赤色 ]へ変化する。\n★赤色顔料の朱肉や神社の赤い塗料として利用されます。"}]},
  {"code":"MC09","name":"スズSnと鉛Pb","parent":"典型金属","questions":[{"q":"スズSnと鉛Pbは[____](族)に属する元素である。","answer":"14族","choices":["14族","13族","12族","15族"],"explain":"スズSnと鉛Pbは[ 14族 ]に属する元素である。\n★炭素Cやケイ素Siと同じ14族です。★ゴロ: 単身のゲスなり(C、Si、Ge、Sn、Pb)"},{"q":"スズSnと鉛Pbは[____](個)の価電子をもち酸化数[____]の化合物をつくる。","answer":"4個、+2と+4","choices":["4個、+2と+4","4個、+4と+6","2個、+2と+4","2個、+2と+6"],"explain":"スズSnと鉛Pbは[ 4個 ]の価電子をもち酸化数[ +2と+4 ]の化合物をつくる。\n★14族なので酸化数+4は答えやすいと思います。PbSなどから+2がわかります。"},{"q":"スズSnと鉛Pbの化合物について、スズSnは酸化数[____]の化合物が安定し、鉛Pbは酸化数[____]の化合物が安定する。","answer":"+4、+2","choices":["+4、+2","+4、+6","+2、+4","+2、+6"],"explain":"スズSnと鉛Pbの化合物について、スズSnは酸化数[ +4 ]の化合物が安定し、鉛Pbは酸化数[ +2 ]の化合物が安定する。\n★ゴロ: 涼し〜夏(Sn、+4、Pb、+2)\n★SnCl₂ + 2Cl⁻ → SnCl₄ + 2e⁻\nSnCl₂はCl⁻を還元して安定する酸化数+4のSnCl₄になります。"},{"q":"スズSnは[____](元素)であり、鉛Pbは[____](元素)である。","answer":"両性金属、両性金属","choices":["両性金属、両性金属","両性金属、陽性金属","陽性金属、両性金属","陽性金属、陽性金属"],"explain":"スズSnは[ 両性金属 ]であり、鉛Pbは[ 両性金属 ]である。\n★ゴロ: ああすんなり 両性に好かれる(Al、Zn、Sn、Pb)"},{"q":"スズSnと鉛Pbは[____](金属)であり、融点は[____]。","answer":"重金属、低い","choices":["重金属、低い","重金属、高い","軽金属、低い","軽金属、高い"],"explain":"スズSnと鉛Pbは[ 重金属 ]であり、融点は[ 低い ]。"},{"q":"鋼にスズSnでめっきした合金を[____]という。","answer":"ブリキ","choices":["ブリキ","トタン","青銅","はんだ"],"explain":"鋼にスズSnでめっきした合金を[ ブリキ ]という。\n★鋼(こう、はがね)は鉄Feのことです。銅(どう)と漢字が似ているので気をつけてください。\n★スズSnの合金など\n★ブリキは鉄にスズをメッキした鉄板。★青銅は銅とスズの合金。★無鉛はんだは銀・銅とスズの合金。★はんだは鉛とスズの合金。"},{"q":"銅とスズの合金を[____]という。","answer":"青銅","choices":["青銅","ブリキ","トタン","はんだ"],"explain":"銅とスズの合金を[ 青銅 ]という。\n★青銅(せいどう)はブロンズとも呼ばれます。★連想、スズとブロンズの「ズ」が韻を踏んでいます。スズの含有量が多くなると赤銅色から白銀色へ近くなります。10円玉にも使用されています(Cu95％、Sn2％、Zn3％)。\n★比較：銅Cuと亜鉛Znの合金は黄銅で5円玉、銅CuとニッケルNiの合金は白銅で50円玉と100円玉です。"},{"q":"銀・銅とスズの合金を[____]という。","answer":"無鉛はんだ","choices":["無鉛はんだ","はんだ","ブリキ","青銅"],"explain":"銀・銅とスズの合金を[ 無鉛はんだ ]という。\n★スズSnの合金など\n★ブリキは鉄にスズをメッキした鉄板。★青銅は銅とスズの合金。★無鉛はんだは銀・銅とスズの合金。★はんだは鉛とスズの合金。"},{"q":"鉛とスズの合金を[____]という。","answer":"はんだ","choices":["はんだ","無鉛はんだ","ブリキ","青銅"],"explain":"鉛とスズの合金を[ はんだ ]という。\n★スズSnの合金など\n★ブリキは鉄にスズをメッキした鉄板。★青銅は銅とスズの合金。★無鉛はんだは銀・銅とスズの合金。★はんだは鉛とスズの合金。"},{"q":"スズSnを塩酸に溶かすと塩化スズ(II)二水和物SnCl₂・2H₂Oが生じる。これは[____]で、水に[____]。","answer":"無色の結晶、よく溶ける","choices":["無色の結晶、よく溶ける","無色の結晶、溶けにくい","黄色の結晶、よく溶ける","黄色の結晶、溶けにくい"],"explain":"スズSnを塩酸に溶かすと塩化スズ(II)二水和物SnCl₂・2H₂Oが生じる。これは[ 無色の結晶 ]で、水に[ よく溶ける ]。"},{"q":"塩化スズ(II)二水和物SnCl₂・2H₂Oは強い[____]があり、有機化合物の[____]として利用される。","answer":"還元作用、還元剤","choices":["還元作用、還元剤","酸化作用、酸化剤","脱水作用、脱水剤","吸湿作用、乾燥剤"],"explain":"塩化スズ(II)二水和物SnCl₂・2H₂Oは強い[ 還元作用 ]があり、有機化合物の[ 還元剤 ]として利用される。\n★(有機化学)ニトロベンゼンにスズSnと濃塩酸を加えて還元しアニリン塩酸塩を得るとき、Sn→SnCl₂→SnCl₄と変化しています。"},{"q":"鉛PbはX線・放射線の[____]や[____]の電極として利用される。","answer":"遮蔽剤、蓄電池","choices":["遮蔽剤、蓄電池","遮蔽剤、一次電池","造影剤、蓄電池","造影剤、一次電池"],"explain":"鉛PbはX線・放射線の[ 遮蔽剤 ]や[ 蓄電池 ]の電極として利用される。"},{"q":"鉛Pbの単体は両性金属であり、[____]、強塩基の水溶液に溶けるが、[____]には表面に水に難溶性の被膜を作るためほとんど溶けない。","answer":"硝酸、塩酸や希硫酸","choices":["硝酸、塩酸や希硫酸","硝酸、濃硫酸","塩酸や希硫酸、硝酸","濃硫酸、硝酸"],"explain":"鉛Pbの単体は両性金属であり、[ 硝酸 ]、強塩基の水溶液に溶けるが、[ 塩酸や希硫酸 ]には表面に水に難溶性の被膜を作るためほとんど溶けない。\n★両性金属として硝酸HNO₃や強塩基NaOHの水溶液には溶けます。\n★水に難溶性の被膜は塩化鉛PbCl₂や硫酸鉛PbSO₄です。濃硝酸による不動態ではないので注意してください。\n★比較:不動態はCr、Fe、Co、Ni、Al\n★ゴロ: 黒子とテツ子にアル不動産"},{"q":"酸化鉛(II)PbOは[____](色)、酸化鉛(IV)PbO₂は[____](色)である。","answer":"黄色、黒褐色","choices":["黄色、黒褐色","黄色、赤褐色","赤色、黒褐色","赤色、黄褐色"],"explain":"酸化鉛(II)PbOは[ 黄色 ]、酸化鉛(IV)PbO₂は[ 黒褐色 ]である。\n★顔料に使われています。やや難。"},{"q":"四酸化三鉛Pb₃O₄は[____](色)である。","answer":"赤色","choices":["赤色","黒褐色","黄色","青色"],"explain":"四酸化三鉛Pb₃O₄は[ 赤色 ]である。\n★顔料に使われています。四酸化鉛(IV)二鉛(II)とも呼ばれます。やや難。"},{"q":"鉛(II)イオンPb²⁺の水溶液は[____](色)である。","answer":"無色透明","choices":["無色透明","黄色透明","緑色透明","赤色透明"],"explain":"鉛(II)イオンPb²⁺の水溶液は[ 無色透明 ]である。\n★水に溶ける硝酸鉛(II)Pb(NO₃)₂や酢酸鉛(II)(CH₃COO)₂Pbの水溶液の色として出てきます。"},{"q":"鉛の化合物の多くは水に溶けにくいが、[____]や[____]は常温の水に溶ける。","answer":"硝酸鉛(II)、酢酸鉛(II)","choices":["硝酸鉛(II)、酢酸鉛(II)","硝酸鉛(II)、硫酸鉛(II)","塩化鉛(II)、酢酸鉛(II)","塩化鉛(II)、硫酸鉛(II)"],"explain":"鉛の化合物の多くは水に溶けにくいが、[ 硝酸鉛(II) ]や[ 酢酸鉛(II) ]は常温の水に溶ける。\n★硝酸鉛(II)Pb(NO₃)₂\n★酢酸鉛(II)(CH₃COO)₂Pb"},{"q":"鉛の化合物のうち、[____]は常温の水には溶けないが熱水には溶ける。","answer":"塩化鉛(II)PbCl₂","choices":["塩化鉛(II)PbCl₂","硝酸鉛(II)Pb(NO₃)₂","酢酸鉛(II)(CH₃COO)₂Pb","硫酸鉛(II)PbSO₄"],"explain":"鉛の化合物のうち、[ 塩化鉛(II) ]は常温の水には溶けないが熱水には溶ける。\n★硝酸鉛(II)Pb(NO₃)₂と酢酸鉛(II)(CH₃COO)₂Pbは熱水にも常温の水にも溶けます。★鉛の化合物の多くは水に難溶です。"},{"q":"酢酸鉛(II)水溶液(CH₃COO)₂Pbに、水酸化ナトリウムNaOHなどの塩基を加えると[____]の[____]が生じる。","answer":"水酸化鉛(II)Pb(OH)₂、白色沈殿","choices":["水酸化鉛(II)Pb(OH)₂、白色沈殿","水酸化鉛(II)Pb(OH)₂、黄色沈殿","水酸化鉛(IV)Pb(OH)₄、白色沈殿","水酸化鉛(IV)Pb(OH)₄、黄色沈殿"],"explain":"酢酸鉛(II)水溶液(CH₃COO)₂Pbに、水酸化ナトリウムNaOHなどの塩基を加えると[ 水酸化鉛(II)Pb(OH)₂ ]の[ 白色沈殿 ]が生じる。\n★水酸化物の多くは白色です。★過剰の塩基を加えると錯イオンになります。★硝酸鉛(II)Pb(NO₃)₂と酢酸鉛(II)(CH₃COO)₂Pbの水溶液は鉛(II)イオンPb²⁺を含む水溶液を意味します。"},{"q":"水酸化鉛(II)Pb(OH)₂の白色沈殿に過剰の水酸化ナトリウムNaOH(水溶液)を加えると[____](になる)。","answer":"無色透明の水溶液になる","choices":["無色透明の水溶液になる","黄色透明の水溶液になる","白色沈殿が黄色沈殿となる","変化しない"],"explain":"水酸化鉛(II)Pb(OH)₂の白色沈殿に過剰の水酸化ナトリウムNaOH(水溶液)を加えると[ 無色透明の水溶液になる ]。\n★[Pb(OH)₃]⁻や[Pb(OH)₄]²⁻などの錯イオンとなって溶けます。\n★両性金属のZn²⁺、Al³⁺、Sn²⁺、Pb²⁺の4つは過剰の水酸化ナトリウムで錯イオンを形成します。"},{"q":"酢酸鉛(II)水溶液(CH₃COO)₂Pbに、塩酸HClを加えると[____]の[____]が生じる。","answer":"塩化鉛(II)PbCl₂、白色沈殿","choices":["塩化鉛(II)PbCl₂、白色沈殿","塩化鉛(II)PbCl₂、黒色沈殿","水酸化鉛(II)Pb(OH)₂、白色沈殿","水酸化鉛(II)Pb(OH)₂、黄色沈殿"],"explain":"酢酸鉛(II)水溶液(CH₃COO)₂Pbに、塩酸HClを加えると[ 塩化鉛(II)PbCl₂ ]の[ 白色沈殿 ]が生じる。\n★硝酸鉛(II)Pb(NO₃)₂と酢酸鉛(II)(CH₃COO)₂Pbの水溶液は鉛(II)イオンPb²⁺を含む水溶液を意味します。"},{"q":"酢酸鉛(II)水溶液(CH₃COO)₂Pbに、希硫酸H₂SO₄を加えると[____]の[____]が生じる。","answer":"硫酸鉛(II)PbSO₄、白色沈殿","choices":["硫酸鉛(II)PbSO₄、白色沈殿","硫酸鉛(II)PbSO₄、黒色沈殿","硫化鉛(II)PbS、白色沈殿","硫化鉛(II)PbS、黒色沈殿"],"explain":"酢酸鉛(II)水溶液(CH₃COO)₂Pbに、希硫酸H₂SO₄を加えると[ 硫酸鉛(II)PbSO₄ ]の[ 白色沈殿 ]が生じる。\n★硝酸鉛(II)Pb(NO₃)₂と酢酸鉛(II)(CH₃COO)₂Pbの水溶液は鉛(II)イオンPb²⁺を含む水溶液を意味します。"},{"q":"酢酸鉛(II)水溶液(CH₃COO)₂Pbに、硫化水素H₂Sを加えると[____]の[____]が生じる。","answer":"硫化鉛(II)PbS、黒色沈殿","choices":["硫化鉛(II)PbS、黒色沈殿","硫化鉛(II)PbS、白色沈殿","硫酸鉛(II)PbSO₄、白色沈殿","硫酸鉛(II)PbSO₄、黒色沈殿"],"explain":"酢酸鉛(II)水溶液(CH₃COO)₂Pbに、硫化水素H₂Sを加えると[ 硫化鉛(II)PbS ]の[ 黒色沈殿 ]が生じる。\n★硫化物は一般に黒色です。例外にZnSの白色、CdSの黄色、MnSのピンク(淡赤色、淡桃色)の3つを覚えます。ゴロ: 黒龍(硫化物は黒)の黄色い角(CdS)に刺さる白あん(ZnS)と桃マン(MnS)。絵を描くと覚えやすいです。(*余力があればSnS褐色、SnS₂黄色も覚えてください)。"},{"q":"酢酸鉛(II)水溶液(CH₃COO)₂Pbに、クロム酸カリウムK₂CrO₄を加えると[____]の[____]が生じる。","answer":"クロム酸鉛(II)PbCrO₄、黄色沈殿","choices":["クロム酸鉛(II)PbCrO₄、黄色沈殿","クロム酸鉛(II)PbCrO₄、赤褐色沈殿","二クロム酸鉛(II)PbCr₂O₇、黄色沈殿","二クロム酸鉛(II)PbCr₂O₇、赤褐色沈殿"],"explain":"酢酸鉛(II)水溶液(CH₃COO)₂Pbに、クロム酸カリウムK₂CrO₄を加えると[ クロム酸鉛(II)PbCrO₄ ]の[ 黄色沈殿 ]が生じる。\n★クロム酸イオンCrO₄²⁻の沈殿は、Ag₂CrO₄は赤褐色沈殿(暗赤色沈殿)、BaCrO₄黄色沈殿、PbCrO₄黄色沈殿、です。\n★ゴロ: 苦労し(XCrO₄)て得た銀貨(Ag、赤褐色(暗赤色))で黄色いバナナ(黄色、Ba、Pb)を買う。"},{"q":"鉄Feに亜鉛Znをめっきしたものを[____]という。","answer":"トタン","choices":["トタン","ブリキ","はんだ","黄銅"],"explain":"鉄Feに亜鉛Znをめっきしたものを[ トタン ]という。\n★ゴロ: テツヤと途端に会えん。"},{"q":"鉄FeにスズSnをめっきしたものを[____]という。","answer":"ブリキ","choices":["ブリキ","トタン","はんだ","黄銅"],"explain":"鉄FeにスズSnをめっきしたものを[ ブリキ ]という。\n★ゴロ: テツヤにスズちゃんブリッ子。★鋼にスズをめっきとも表現されます。"},{"q":"トタンとブリキでは傷がついたときに中の鉄Feが腐食しやすい(錆びやすい)のは[____]である。これはイオン化傾向が[____]だからである。","answer":"ブリキ、(大)Zn＞Fe＞Sn(小)","choices":["ブリキ、(大)Zn＞Fe＞Sn(小)","ブリキ、(大)Sn＞Fe＞Zn(小)","トタン、(大)Zn＞Fe＞Sn(小)","トタン、(大)Sn＞Fe＞Zn(小)"],"explain":"トタンとブリキでは傷がついたときに中の鉄Feが腐食しやすい(錆びやすい)のは[ ブリキ ]である。これはイオン化傾向が[ (大)Zn＞Fe＞Sn(小) ]だからである。\n★トタン(鉄Feに亜鉛Znをめっき)は傷がつくと中の鉄Feよりもイオン化傾向の大きい亜鉛Znが先に溶けるため、中の鉄Feは溶けにくくなります(鉄は錆びにくい)。(Zn → Zn²⁺ + 2e⁻、Znが先に電子を供給する)\n★ブリキ(鉄FeにスズSnをめっき)は傷がつくと、表面のスズSnよりも中の鉄Feの方がイオン化傾向が大きいため、鉄Feが先に溶け出します(鉄が錆びやすい)。\n★ゴロ: あてにすんな(Zn、Fe、Ni、Sn、Pb)。★イオン化傾向が大きい金属は陽イオンになりやすく、腐食しやすく(錆びやすく)なります。*英語:スズはtin、ブリキはtinplate。"},{"q":"トタンとブリキでは傷がついていないときに水分に強いのは[____]であり、傷がついたときに腐食に強いのは[____]である。","answer":"ブリキ、トタン","choices":["ブリキ、トタン","ブリキ、ブリキ","トタン、トタン","トタン、ブリキ"],"explain":"トタンとブリキでは傷がついていないときに水分に強いのは[ ブリキ ]であり、傷がついたときに腐食に強いのは[ トタン ]である。\n★ゴロ: あてにすんな(Zn、Fe、Ni、Sn、Pb)。★イオン化傾向が大きい金属は陽イオンになりやすく、腐食しやすく(錆びやすく)なります。(大)Zn＞Fe＞Sn(小)。★トタンは鉄Feに亜鉛Znをめっき。ブリキは鉄FeにスズSnをめっき。*英語:スズはtin、ブリキはtinplate。"},{"q":"[____]は屋根などに使われ、[____]は缶詰などに使われる。","answer":"トタン、ブリキ","choices":["トタン、ブリキ","ブリキ、トタン","ブリキ、ブリキ","トタン、トタン"],"explain":"[ トタン ]は屋根などに使われ、[ ブリキ ]は缶詰などに使われる。\n★屋外などの傷つきやすい場所ではトタンを使用します。★トタンは鉄Feに亜鉛Znをめっき(ゴロ: テツヤと途端に会えん)。ブリキは鉄FeにスズSnをめっき(ゴロ: テツヤにスズちゃんブリッ子)。"},{"q":"[____]に傷がつき水に濡れると、表面では亜鉛Znが還元剤として陽イオンとなり、傷の内側部分では[____]が酸化剤として働く。","answer":"トタン、溶存酸素","choices":["トタン、溶存酸素","トタン、Fe鉄","ブリキ、溶存酸素","ブリキ、Fe鉄"],"explain":"[ トタン ]に傷がつき水に濡れると、表面では亜鉛Znが還元剤として陽イオンとなり、傷の内側部分では[ 溶存酸素 ]が酸化剤として働く。\n★傷がついても内部の鉄Fe(鋼)が腐食しにくい構造になっています。★溶存酸素(ようぞんさんそ)は、水中に溶解している酸素です。\n★Zn → Zn²⁺ + 2e⁻\n★O₂ + 2H₂O + 4e⁻ → 4OH⁻"}]},
  {"code":"MD01","name":"遷移元素と錯イオン","parent":"遷移元素","questions":[{"q":"遷移元素は周期表の[____](族)の元素である。","answer":"3～12族","choices":["3～12族","3～13族","2～12族","2～13族"],"explain":"遷移元素は周期表の[ 3～12族 ]の元素である。現教科書には「12族は遷移元素に含める場合と含めない場合がある」と注意書きもあります。\n*旧課程では「遷移元素は3〜11族」でした。"},{"q":"遷移元素は[____](元素)であり、周期表で隣り合う元素の性質は[____]。","answer":"全て金属元素、似ている","choices":["全て金属元素、似ている","全て金属元素、似ていない","非金属元素と金属元素、似ている","非金属元素と金属元素、似ていない"],"explain":"遷移元素は[ 全て金属元素 ]であり、周期表で隣り合う元素の性質は[ 似ている ]。\n★同族元素の性質もある程度似ていますが、同周期元素の性質が似ていることが遷移元素(遷移金属)の特徴です。\n★同周期元素は、周期表で横に並んだ元素のことです。"},{"q":"遷移元素について、原子の最外殻電子の数は[____]。これは、原子番号が増えるとき電子が[____](側)の電子殻に収容されるためである。","answer":"1または2である、内側","choices":["1または2である、内側","1または2である、外側","周期的に増加する、内側","周期的に増加する、外側"],"explain":"遷移元素について、原子の最外殻電子の数は[ 1または2である ]。これは、原子番号が増えるとき電子が[ 内側 ]の電子殻に収容されるためである。\n★「最外殻電子の数は1または2である」は「原子番号が増加しても価電子の数はほとんど変化しない」と出題されることもあります。\n*例外にPd(パラジウム)などがあります(大学範囲)"},{"q":"遷移元素のほとんどは[____](金属)で、融点が[____]。","answer":"重金属、高い","choices":["重金属、高い","重金属、低い","軽金属、高い","軽金属、低い"],"explain":"遷移元素のほとんどは[ 重金属 ]で、融点が[ 高い ]。\n★比較：典型金属のアルカリ金属、アルカリ土類金属、アルミニウムなど軽金属が多いことや、典型金属の重金属(Sn、Pb)は融点が低い傾向にあることを対比させて覚えます。*新課程(2024年度入試)から12族の亜鉛Znと水銀Hgは遷移元素になりました。典型元素の特徴を持ち、重金属ですが融点は低いです。亜鉛Znは両性金属でもあります。それでも新課程教科書は「遷移元素のほとんどは重金属(密度が大きい)で、融点が高い」としています。"},{"q":"遷移元素の軽金属には[____]などがある。","answer":"スカンジウムSc、チタンTi","choices":["スカンジウムSc、チタンTi","スカンジウムSc、鉄Fe","アルミニウムAl、鉄Fe","アルミニウムAl、チタンTi"],"explain":"遷移元素の軽金属には[ スカンジウムSc、チタンTi ]などがある。\n★軽金属の定義には「密度4以下」や「密度5以下」など幅があります。正誤問題で「遷移元素は全て重金属である」(誤り)、「遷移元素には軽金属が含まれる」(正しい)、などに反応できるように作成しました。何か選ばされたことあるな、と思い出せたら正解できます。\n★選択肢のアルミニウムAlは典型元素(典型金属)の軽金属です。"},{"q":"遷移元素は[____]をとるものが多い。また、イオンや化合物は[____](色)のものが多い。","answer":"複数の酸化数、有色","choices":["複数の酸化数、有色","複数の酸化数、無色","1つの酸化数、有色","1つの酸化数、無色"],"explain":"遷移元素は[ 複数の酸化数 ]をとるものが多い。また、イオンや化合物は[ 有色 ]のものが多い。\n★Mnは+2、+4、+7、Crは+2、+3、+6の酸化数をとります。★典型金属にも複数の酸化数を取るものがあります。"},{"q":"遷移元素は錯イオンを作り[____](く)、単体や化合物は触媒として働くものが[____]。","answer":"やすく、多い","choices":["やすく、多い","やすく、少ない","にくく、多い","にくく、少ない"],"explain":"遷移元素は錯イオンを作り[ やすく ]、単体や化合物は触媒として働くものが[ 多い ]。"},{"q":"中心となる金属イオンに分子や陰イオンが配位結合してできたイオンを[____]という。","answer":"錯イオン","choices":["錯イオン","陰イオン","双性イオン","両性イオン"],"explain":"中心となる金属イオンに分子や陰イオンが配位結合してできたイオンを[ 錯イオン ]という。\n★[Cu(NH₃)₄]²⁺のようなイオンです。"},{"q":"Na[Al(OH)₄]のように、錯イオンを含む塩(えん)を[____]という。","answer":"錯塩","choices":["錯塩","正塩","複塩","酸性塩"],"explain":"Na[Al(OH)₄]のように、錯イオンを含む塩(えん)を[ 錯塩 ]という。"},{"q":"錯イオンにおいて、非共有電子対を与えて[____](結合)する分子や陰イオンを[____]という。","answer":"配位結合、配位子","choices":["配位結合、配位子","イオン結合、塩","金属結合、配位子","共有結合、水和分子"],"explain":"錯イオンにおいて、非共有電子対を与えて[ 配位結合 ]する分子や陰イオンを[ 配位子 ]という。"},{"q":"錯イオンにおいて、中心となる金属イオンに配位結合している分子や陰イオンの数を[____]という。","answer":"配位数","choices":["配位数","側鎖数","酸化数","価数"],"explain":"錯イオンにおいて、中心となる金属イオンに配位結合している分子や陰イオンの数を[ 配位数 ]という。"},{"q":"アンモニアNH₃が配位子となるとき、配位子名として[____]と呼ぶ。","answer":"アンミン","choices":["アンミン","アンモニウム","アクア","水和水"],"explain":"アンモニアNH₃が配位子となるとき、配位子名として[ アンミン ]と呼ぶ。"},{"q":"水H₂Oが配位子となるとき、配位子名として[____]と呼ぶ。","answer":"アクア","choices":["アクア","水和水","アンミン","アンモニウム"],"explain":"水H₂Oが配位子となるとき、配位子名として[ アクア ]と呼ぶ。"},{"q":"シアン化物イオンCN⁻が配位子となるとき、配位子名として[____]と呼ぶ。","answer":"シアニド","choices":["シアニド","シアン酸","フルオリド","フルオロ"],"explain":"シアン化物イオンCN⁻が配位子となるとき、配位子名として[ シアニド ]と呼ぶ。"},{"q":"フッ化物イオンF⁻が配位子となるとき、配位子名として[____]と呼ぶ。","answer":"フルオリド","choices":["フルオリド","フルオロ","シアニド","シアン酸"],"explain":"フッ化物イオンF⁻が配位子となるとき、配位子名として[ フルオリド ]と呼ぶ。"},{"q":"塩化物イオンCl⁻が配位子となるとき、配位子名として[____]と呼ぶ。","answer":"クロリド","choices":["クロリド","クロロ","ブロミド","ブロモ"],"explain":"塩化物イオンCl⁻が配位子となるとき、配位子名として[ クロリド ]と呼ぶ。"},{"q":"臭化物イオンBr⁻が配位子となるとき、配位子名として[____]と呼ぶ。","answer":"ブロミド","choices":["ブロミド","ブロモ","クロリド","クロロ"],"explain":"臭化物イオンBr⁻が配位子となるとき、配位子名として[ ブロミド ]と呼ぶ。"},{"q":"水酸化物イオンOH⁻が配位子となるとき、配位子名として[____]と呼ぶ。","answer":"ヒドロキシド","choices":["ヒドロキシド","ヒドロキソ","アクア","水和水"],"explain":"水酸化物イオンOH⁻が配位子となるとき、配位子名として[ ヒドロキシド ]と呼ぶ。\n★比較：オキソニウムイオンH₃O⁺\nH₃O⁺は最も単純なオキソニウムイオンです。ヒドロキソニウムイオン(ヒドロニウムイオン)とも呼ばれます。"},{"q":"チオ硫酸イオンS₂O₃²⁻が配位子となるとき、配位子名として[____]と呼ぶ。","answer":"チオスルファト","choices":["チオスルファト","硫化","亜硫酸","ジスルフィド"],"explain":"チオ硫酸イオンS₂O₃²⁻が配位子となるとき、配位子名として[ チオスルファト ]と呼ぶ。"},{"q":"中心イオンが銀(I)イオンAg⁺のとき、配位数は[____]、錯イオンの形は[____]である。","answer":"2、直線形","choices":["2、直線形","6、正八面体形","4、正方形","4、正四面体形"],"explain":"中心イオンが銀(I)イオンAg⁺のとき、配位数は[ 2 ]、錯イオンの形は[ 直線形 ]である。"},{"q":"中心イオンが銅(II)イオンCu²⁺のとき、配位数は[____]、錯イオンの形は[____]である。","answer":"4、正方形","choices":["4、正方形","2、直線形","6、正八面体形","4、正四面体形"],"explain":"中心イオンが銅(II)イオンCu²⁺のとき、配位数は[ 4 ]、錯イオンの形は[ 正方形 ]である。"},{"q":"中心イオンが亜鉛(II)イオンZn²⁺のとき、配位数は[____]、錯イオンの形は[____]である。","answer":"4、正四面体形","choices":["4、正四面体形","2、直線形","4、正方形","6、正八面体形"],"explain":"中心イオンが亜鉛(II)イオンZn²⁺のとき、配位数は[ 4 ]、錯イオンの形は[ 正四面体形 ]である。"},{"q":"中心イオンがコバルト(II)イオンCo²⁺のとき、配位数は[____]、錯イオンの形は[____]である。","answer":"6、正八面体形","choices":["6、正八面体形","2、直線形","4、正方形","4、正四面体形"],"explain":"中心イオンがコバルト(II)イオンCo²⁺のとき、配位数は[ 6 ]、錯イオンの形は[ 正八面体形 ]である。"},{"q":"中心イオンがニッケル(II)イオンNi²⁺のとき、配位数は[____]、錯イオンの形は[____]である。","answer":"6、正八面体形","choices":["6、正八面体形","2、直線形","4、正方形","4、正四面体形"],"explain":"中心イオンがニッケル(II)イオンNi²⁺のとき、配位数は[ 6 ]、錯イオンの形は[ 正八面体形 ]である。"},{"q":"中心イオンが鉄(II)イオンFe²⁺のとき、配位数は[____]、錯イオンの形は[____]である。","answer":"6、正八面体形","choices":["6、正八面体形","2、直線形","4、正方形","4、正四面体形"],"explain":"中心イオンが鉄(II)イオンFe²⁺のとき、配位数は[ 6 ]、錯イオンの形は[ 正八面体形 ]である。"},{"q":"中心イオンが鉄(III)イオンFe³⁺のとき、配位数は[____]、錯イオンの形は[____]である。","answer":"6、正八面体形","choices":["6、正八面体形","2、直線形","4、正方形","4、正四面体形"],"explain":"中心イオンが鉄(III)イオンFe³⁺のとき、配位数は[ 6 ]、錯イオンの形は[ 正八面体形 ]である。"},{"q":"[Ag(NH₃)₂]⁺の名称は[____]、水溶液の色は無色。","answer":"ジアンミン銀(I)イオン","choices":["ジアンミン銀(I)イオン","ジアンミン銀(I)酸イオン","ジアンモニウム銀(I)イオン","テトラアンミン亜鉛(II)イオン"],"explain":"[Ag(NH₃)₂]⁺の名称は[ ジアンミン銀(I)イオン ]、水溶液の色は無色。\n★ジ(2)アンミン(NH₃)銀(I)(Ag⁺)イオン。★Ag⁺、AgNO₃aq、[Ag(NH₃)₂]⁺は無色溶液です。"},{"q":"[Cu(NH₃)₄]²⁺の名称は[____]、水溶液の色は深青色。","answer":"テトラアンミン銅(II)イオン","choices":["テトラアンミン銅(II)イオン","テトラアンミン銅(II)酸イオン","ヘキサアンミン銅(II)イオン","ヘキサアンミン銅(II)酸イオン"],"explain":"[Cu(NH₃)₄]²⁺の名称は[ テトラアンミン銅(II)イオン ]、水溶液の色は深青色。\n★テトラ(4)アンミン(NH₃)銅(II)(Cu²⁺)イオン。★[Cu(NH₃)₄]²⁺は配位数4の正方形ですが、さらに水分子H₂Oが2つ配位結合するので、配位数6の正八面体と捉えることもできます。"},{"q":"[Zn(NH₃)₄]²⁺の名称は[____]、水溶液の色は無色。","answer":"テトラアンミン亜鉛(II)イオン","choices":["テトラアンミン亜鉛(II)イオン","テトラアンミン亜鉛(II)酸イオン","テトラアンモニウム亜鉛(II)イオン","テトラアンモニウム亜鉛(II)酸イオン"],"explain":"[Zn(NH₃)₄]²⁺の名称は[ テトラアンミン亜鉛(II)イオン ]、水溶液の色は無色。\n★テトラ(4)アンミン(NH₃)亜鉛(II)(Zn²⁺)イオン。★Zn²⁺の水溶液も無色です。"},{"q":"[Co(H₂O)₆]²⁺の名称は[____]、水溶液の色は淡赤色。","answer":"ヘキサアクアコバルト(II)イオン","choices":["ヘキサアクアコバルト(II)イオン","ヘキサアクアコバルト(II)酸イオン","テトラアクアコバルト(II)イオン","テトラアクアコバルト(II)酸イオン"],"explain":"[Co(H₂O)₆]²⁺の名称は[ ヘキサアクアコバルト(II)イオン ]、水溶液の色は淡赤色。\n★ヘキサ(6)アクア(H₂O)コバルト(II)(Co²⁺)イオン。★コバルトイオンCo²⁺は乾燥時に青色で、水和すると淡赤色(桃色、ピンク色)になります。"},{"q":"[Ni(NH₃)₆]²⁺の名称は[____]、水溶液の色は青紫色。","answer":"ヘキサアンミンニッケル(II)イオン","choices":["ヘキサアンミンニッケル(II)イオン","ヘキサアンミンニッケル(II)酸イオン","ヘキサアンモニウムニッケル(II)イオン","ヘキサアンモニウムニッケル(II)酸イオン"],"explain":"[Ni(NH₃)₆]²⁺の名称は[ ヘキサアンミンニッケル(II)イオン ]、水溶液の色は青紫色。\n★ヘキサ(6)アンミン(NH₃)ニッケル(II)(Ni²⁺)イオン。★Ni²⁺の水溶液は緑色です。"},{"q":"[Fe(CN)₆]⁴⁻の名称は[____]、水溶液の色は淡黄色。","answer":"ヘキサシアニド鉄(II)酸イオン","choices":["ヘキサシアニド鉄(II)酸イオン","ヘキサシアニド鉄(II)イオン","ヘキサシアニド鉄(III)酸イオン","ヘキサシアニド鉄(III)イオン"],"explain":"[Fe(CN)₆]⁴⁻の名称は[ ヘキサシアニド鉄(II)酸イオン ]、水溶液の色は淡黄色。\n★ヘキサ(6)シアニド(CN⁻)鉄(II)(Fe²⁺)酸(陰イオン)イオン。\n★Fe²⁺系：K₄[Fe(CN)₆]は黄色固体、水溶液中で[Fe(CN)₆]⁴⁻となり淡黄色。\n★Fe²⁺(淡緑色)と反応するとFe₂[Fe(CN)₆]の青白色沈殿。\n★Fe³⁺(黄褐色)と反応するとKFe[Fe(CN)₆]の濃青色沈殿(プルシアンブルー、紺青)。"},{"q":"[Fe(CN)₆]³⁻の名称は[____]、水溶液の色は黄色。","answer":"ヘキサシアニド鉄(III)酸イオン","choices":["ヘキサシアニド鉄(III)酸イオン","ヘキサシアニド鉄(III)イオン","ヘキサシアニド鉄(II)酸イオン","ヘキサシアニド鉄(II)イオン"],"explain":"[Fe(CN)₆]³⁻の名称は[ ヘキサシアニド鉄(III)酸イオン ]、水溶液の色は黄色。\n★ヘキサ(6)シアニド(CN⁻)鉄(III)(Fe³⁺)酸(陰イオン)イオン。\n★Fe³⁺系：K₃[Fe(CN)₆]は暗赤色固体、水溶液中で[Fe(CN)₆]³⁻となり黄色。\n★Fe²⁺(淡緑色)と反応するとKFe[Fe(CN)₆]の濃青色沈殿(プルシアンブルー、紺青)。\n★Fe³⁺(黄褐色)と反応するとFe[Fe(CN)₆]の褐色溶液(沈殿なし)。"},{"q":"Fe²⁺(淡緑色)とK₃[Fe(CN)₆]、または、Fe³⁺(黄褐色)とK₄[Fe(CN)₆]が反応すると共に濃青色沈殿(プルシアンブルー、紺青)が生じる。この沈殿の化学式は[____]である。","answer":"KFe[Fe(CN)₆]","choices":["KFe[Fe(CN)₆]","KFe[Fe(CN)₆]₂","Fe₃[Fe(CN)₆]₂","Fe₄[Fe(CN)₆]₃"],"explain":"Fe²⁺(淡緑色)とK₃[Fe(CN)₆]、または、Fe³⁺(黄褐色)とK₄[Fe(CN)₆]が反応すると共に濃青色沈殿(プルシアンブルー、紺青)が生じる。この沈殿の化学式は[ KFe[Fe(CN)₆] ]である。\n★実教出版の図説サイエンスビュー(2025年版)に、化学式KFe[Fe(CN)₆]と沈殿生成の反応式が記されています。\n★Fe²⁺ + K₃[Fe(CN)₆] → KFe[Fe(CN)₆] + 2K⁺\n★Fe³⁺ + K₄[Fe(CN)₆] → KFe[Fe(CN)₆] + 3K⁺\n★水和水を伴いKFe[Fe(CN)₆]・H₂Oなどにもなります。教科書や図説の写真で2つの色に違いがあるのは水和水の影響です。\n★濃青色沈殿の別名(教科書範囲)\nターンブル青、ターンブルブルー、プルシアンブルー、紺青、プルシアンブルー、ベルリン青\n★(美術などの分野で)一般に、発見された地名から「ベルリン藍」、略して「ベロ藍」とも呼ばます。葛飾北斎の浮世絵版画『富嶽三十六景』(ふがくさんじゅうろっけい)にも使われています。"}]},
  {"code":"MD02","name":"色まとめ1","parent":"遷移元素","questions":[{"q":"クロム(III)イオンCr³⁺は水溶液中で[____](色)を示す。","answer":"緑色","choices":["緑色","黄褐色","淡赤色(ピンク色)","青色"],"explain":"クロム(III)イオンCr³⁺は水溶液中で[ 緑色 ]を示す。\n★Ni²⁺とCr³⁺は緑色、Fe²⁺が淡緑色です。\n★Cr³⁺は緑色、\nCrO₄²⁻は黄色、\nCr₂O₇²⁻は橙赤色。*教科書の出版社により橙赤色と赤橙色の表記があります。"},{"q":"マンガン(II)イオンMn²⁺は水溶液中で[____](色)を示す。","answer":"淡赤色(ピンク色)","choices":["淡赤色(ピンク色)","黄褐色","緑色","青色"],"explain":"マンガン(II)イオンMn²⁺は水溶液中で[ 淡赤色(ピンク色) ]を示す。\n★Co²⁺とMn²⁺が赤系統です。(Co²⁺は乾燥時は青色、溶液中で赤色)\n★見た目はほぼ無色です。酸化還元滴定の範囲にも出てきます。\n★Mn²⁺は淡赤色(ピンク、淡桃色、見た目は無色)、\nMnO₂は黒色固体(黒褐色)、\nMnO₄⁻は赤紫色。"},{"q":"鉄(II)イオンFe²⁺は水溶液中で[____](色)を示す。","answer":"淡緑色","choices":["淡緑色","淡赤色(ピンク色)","黄褐色","青色"],"explain":"鉄(II)イオンFe²⁺は水溶液中で[ 淡緑色 ]を示す。\n★Fe²⁺は淡緑色、K₄[Fe(CN)₆]は黄色固体、[Fe(CN)₆]⁴⁻は淡黄色、\n★Fe³⁺は黄褐色、K₃[Fe(CN)₆]は暗赤色固体、[Fe(CN)₆]³⁻は黄色"},{"q":"鉄(III)イオンFe³⁺は水溶液中で[____](色)を示す。","answer":"黄褐色","choices":["黄褐色","淡赤色(ピンク色)","緑色","青色"],"explain":"鉄(III)イオンFe³⁺は水溶液中で[ 黄褐色 ]を示す。\n★Fe²⁺は淡緑色、K₄[Fe(CN)₆]は黄色固体、[Fe(CN)₆]⁴⁻は淡黄色、\n★Fe³⁺は黄褐色、K₃[Fe(CN)₆]は暗赤色固体、[Fe(CN)₆]³⁻は黄色"},{"q":"コバルト(II)イオンCo²⁺は水溶液中で[____](色)を示す。","answer":"赤色","choices":["赤色","黄褐色","緑色","青色"],"explain":"コバルト(II)イオンCo²⁺は水溶液中で[ 赤色 ]を示す。\n★水溶液なので淡赤色(ピンク色)に見えます。Co²⁺とMn²⁺が赤系統です。★[Co(H₂O)₆]²⁺は淡赤色です。★コバルトイオンCo²⁺は乾燥時に青色で、水和すると淡赤色(桃色、ピンク色)になります。"},{"q":"ニッケル(II)イオンNi²⁺は水溶液中で[____](色)を示す。","answer":"緑色","choices":["緑色","赤色","黄褐色","青色"],"explain":"ニッケル(II)イオンNi²⁺は水溶液中で[ 緑色 ]を示す。\n★Ni²⁺とCr³⁺は緑色、Fe²⁺が淡緑色です。"},{"q":"銅(II)イオンCu²⁺は水溶液中で[____](色)を示す。","answer":"青色","choices":["青色","緑色","赤色","黄褐色"],"explain":"銅(II)イオンCu²⁺は水溶液中で[ 青色 ]を示す。\n★Cu²⁺は青色、[Cu(NH₃)₄]²⁺は深青色、[CuCl₄]²⁻は黄緑色です。"},{"q":"クロム酸イオンCrO₄²⁻は水溶液中で[____](色)を示す。","answer":"黄色","choices":["黄色","緑色","橙赤色","青色"],"explain":"クロム酸イオンCrO₄²⁻は水溶液中で[ 黄色 ]を示す。\n★Cr³⁺は緑色、\nCrO₄²⁻は黄色、\nCr₂O₇²⁻は橙赤色。"},{"q":"二クロム酸イオンCr₂O₇²⁻は水溶液中で[____](色)を示す。","answer":"橙赤色","choices":["橙赤色","黄色","緑色","青色"],"explain":"二クロム酸イオンCr₂O₇²⁻は水溶液中で[ 橙赤色 ]を示す。\n★Cr³⁺は緑色、\nCrO₄²⁻は黄色、\nCr₂O₇²⁻は橙赤色。*教科書の出版社により橙赤色と赤橙色の表記があります。"},{"q":"過マンガン酸イオンMnO₄⁻は水溶液中で[____](色)を示す。","answer":"赤紫色","choices":["赤紫色","黄色","緑色","無色"],"explain":"過マンガン酸イオンMnO₄⁻は水溶液中で[ 赤紫色 ]を示す。\n★Mn²⁺は淡赤色(ピンク、淡桃色、見た目は無色)、\nMnO₂は黒色固体(黒褐色)、\nMnO₄⁻は赤紫色。"},{"q":"[Ag(NH₃)₂]⁺は水溶液中で[____](色)を示す。","answer":"無色","choices":["無色","淡赤色","青紫色","淡黄色"],"explain":"[Ag(NH₃)₂]⁺は水溶液中で[ 無色 ]を示す。\n★ジ(2)アンミン(NH₃)銀(I)(Ag⁺)イオン。\n★Ag⁺、AgNO₃aq、[Ag(NH₃)₂]⁺は無色溶液です。"},{"q":"[Cu(NH₃)₄]²⁺は水溶液中で[____](色)を示す。","answer":"深青色","choices":["深青色","淡赤色","淡黄色","無色"],"explain":"[Cu(NH₃)₄]²⁺は水溶液中で[ 深青色 ]を示す。\n★テトラ(4)アンミン(NH₃)銅(II)(Cu²⁺)イオン、★[Cu(NH₃)₄]²⁺は配位数4の正方形ですが、さらに水分子H₂Oが2つ配位結合するので、配位数6の正八面体と捉えることもできます。\n★Cu²⁺は青色、[Cu(NH₃)₄]²⁺は深青色、[CuCl₄]²⁻は黄緑色です。"},{"q":"[Zn(NH₃)₄]²⁺は水溶液中で[____](色)を示す。","answer":"無色","choices":["無色","淡赤色","青紫色","淡黄色"],"explain":"[Zn(NH₃)₄]²⁺は水溶液中で[ 無色 ]を示す。\n★テトラ(4)アンミン(NH₃)亜鉛(II)(Zn²⁺)イオン。★Zn²⁺の水溶液も無色です。"},{"q":"[Co(H₂O)₆]²⁺は水溶液中で[____](色)を示す。","answer":"淡赤色","choices":["淡赤色","淡黄色","青色","無色"],"explain":"[Co(H₂O)₆]²⁺は水溶液中で[ 淡赤色 ]を示す。\n★ヘキサ(6)アクア(H₂O)コバルト(II)(Co²⁺)イオン。\n★Co²⁺は青色、[Co(H₂O)₆]²⁺は淡赤色です。★コバルトイオンCo²⁺は乾燥時に青色で、水和すると淡赤色(桃色、ピンク色)になります。"},{"q":"[Ni(NH₃)₆]²⁺は水溶液中で[____](色)を示す。","answer":"青紫色","choices":["青紫色","淡赤色","緑色","無色"],"explain":"[Ni(NH₃)₆]²⁺は水溶液中で[ 青紫色 ]を示す。\n★ヘキサ(6)アンミン(NH₃)ニッケル(II)(Ni²⁺)イオン。★色については難問。★Ni²⁺の水溶液は緑色です。"},{"q":"K₄[Fe(CN)₆]は[____](色)の固体であり、水溶液中では[Fe(CN)₆]⁴⁻の[____](色)になる。","answer":"黄色、淡黄色","choices":["黄色、淡黄色","暗赤色、黄色","青紫色、淡緑色","無色、青色"],"explain":"K₄[Fe(CN)₆]は[ 黄色 ]の固体であり、水溶液中では[Fe(CN)₆]⁴⁻の[ 淡黄色 ]になる。\n★Fe²⁺は淡緑色、\nK₄[Fe(CN)₆]は黄色固体、溶液中では[Fe(CN)₆]⁴⁻となり淡黄色。\nFe³⁺は黄褐色、\nK₃[Fe(CN)₆]は暗赤色固体、\n溶液中では[Fe(CN)₆]³⁻となり黄色。"},{"q":"K₃[Fe(CN)₆]は[____](色)の固体であり、水溶液中では[Fe(CN)₆]³⁻の[____](色)になる。","answer":"暗赤色、黄色","choices":["暗赤色、黄色","黄色、淡黄色","青紫色、淡緑色","無色、青色"],"explain":"K₃[Fe(CN)₆]は[ 暗赤色 ]の固体であり、水溶液中では[Fe(CN)₆]³⁻の[ 黄色 ]になる。\n★Fe²⁺は淡緑色、K₄[Fe(CN)₆]は黄色固体、[Fe(CN)₆]⁴⁻は淡黄色、\n★Fe³⁺は黄褐色、K₃[Fe(CN)₆]は暗赤色固体、[Fe(CN)₆]³⁻は黄色"},{"q":"FeSO₄水溶液にNaOH水溶液を加えると、Fe(OH)₂の[____](となる・を生じる)。","answer":"緑白色沈殿","choices":["緑白色沈殿","赤褐色沈殿","濃青色沈殿","青白色沈殿"],"explain":"FeSO₄水溶液にNaOH水溶液を加えると、Fe(OH)₂の[ 緑白色沈殿 ]を生じる。\n★FeSO₄水溶液はFe²⁺(淡緑色)を含む水溶液と解釈します。\n★比較：FeCl₃水溶液にNaOH水溶液を加えると、水酸化鉄(III)の赤褐色沈殿を生じます。(Fe³⁺は黄褐色)\n*新課程教科書(2025年度版)では「Fe(OH)₃」の表記がなくなり「水酸化鉄(III)」と日本語表記にするものと、便宜的に酸化水酸化鉄(III)のFeO(OH)をあてているものがあります。"},{"q":"FeSO₄水溶液にK₄[Fe(CN)₆]水溶液を加えると、[____](となる・を生じる)。","answer":"青白色沈殿","choices":["青白色沈殿","濃青色沈殿","赤褐色沈殿","緑白色沈殿"],"explain":"FeSO₄水溶液にK₄[Fe(CN)₆]水溶液を加えると、[ 青白色沈殿 ]を生じる。\n★FeSO₄水溶液はFe²⁺(淡緑色)を含む水溶液と解釈します。Fe₂[Fe(CN)₆]の青白色沈殿です。*K₄[Fe(CN)₆]は黄色の固体、水溶液は淡黄色。\n★比較：FeCl₃水溶液にK₄[Fe(CN)₆]水溶液(淡黄色)を加えると、Fe₄[Fe(CN)₆]₃の濃青色沈殿を生じます。(Fe³⁺は黄褐色)"},{"q":"FeSO₄水溶液にK₃[Fe(CN)₆]水溶液を加えると、[____](となる・を生じる)。","answer":"濃青色沈殿","choices":["濃青色沈殿","褐色溶液","赤褐色沈殿","変化しない"],"explain":"FeSO₄水溶液にK₃[Fe(CN)₆]水溶液を加えると、[ 濃青色沈殿 ]を生じる。\n★FeSO₄水溶液はFe²⁺(淡緑色)を含む水溶液と解釈します。Fe₄[Fe(CN)₆]₃の濃青色沈殿です。*K₃[Fe(CN)₆]は暗赤色の固体、水溶液は黄色。\n★比較：FeCl₃水溶液にK₃[Fe(CN)₆]水溶液(黄色)を加えると、Fe[Fe(CN)₆]の褐色溶液(沈殿なし)となります。(Fe³⁺は黄褐色)\n* 濃青色沈殿の化学式について、僕も愛用していた問題集「化学の新演習」では、K･Fe[Fe(CN)₆]↓(濃青)となっています(解答p171)。Fe₄[Fe(CN)₆]₃を採用するとのことです。ご質問を受けた流れでユーザーの方にお問い合わせを共有していただきました。ありがとうございます。(2024年10月)"},{"q":"FeSO₄水溶液にKSCN水溶液を加えると、[____](となる・を生じる)。","answer":"変化しない","choices":["変化しない","血赤色溶液","濃青色沈殿","赤褐色沈殿"],"explain":"FeSO₄水溶液にKSCN水溶液を加えると、[ 変化しない ]。\n★FeSO₄水溶液はFe²⁺(淡緑色)を含む水溶液と解釈します。\n★比較：FeCl₃水溶液にKSCN水溶液を加えると、血赤色溶液を生じます。(Fe³⁺は黄褐色)"},{"q":"FeCl₃水溶液にNaOH水溶液を加えると、水酸化鉄(III)の[____](となる・を生じる)。","answer":"赤褐色沈殿","choices":["赤褐色沈殿","緑白色沈殿","濃青色沈殿","変化しない"],"explain":"FeCl₃水溶液にNaOH水溶液を加えると、水酸化鉄(III)の[ 赤褐色沈殿 ]を生じる。\n★FeCl₃水溶液はFe³⁺(黄褐色)を含む水溶液と解釈します。\n★比較：FeSO₄水溶液にNaOH水溶液を加えると、Fe(OH)₂の緑白色沈殿を生じます。(Fe²⁺は淡緑色)\n*新課程教科書(2025年度版)では「Fe(OH)₃」の表記がなくなり「水酸化鉄(III)」と日本語表記にするものと、便宜的に酸化水酸化鉄(III)のFeO(OH)をあてているものがあります。"},{"q":"FeCl₃水溶液にK₄[Fe(CN)₆]水溶液を加えると、[____](となる・を生じる)。","answer":"濃青色沈殿","choices":["濃青色沈殿","青白色沈殿","赤褐色沈殿","変化しない"],"explain":"FeCl₃水溶液にK₄[Fe(CN)₆]水溶液を加えると、[ 濃青色沈殿 ]を生じる。\n★FeCl₃水溶液はFe³⁺(黄褐色)を含む水溶液と解釈します。Fe₄[Fe(CN)₆]₃の濃青色沈殿が生じます。*K₄[Fe(CN)₆]は黄色の固体、水溶液は淡黄色です。\n★比較：FeSO₄水溶液にK₄[Fe(CN)₆]水溶液(淡黄色)を加えると、Fe₂[Fe(CN)₆]の青白色沈殿を生じます。(Fe²⁺は淡緑色)"},{"q":"FeCl₃水溶液にK₃[Fe(CN)₆]水溶液を加えると、[____](となる・を生じる)。","answer":"褐色溶液","choices":["褐色溶液","濃青色沈殿","赤褐色沈殿","変化しない"],"explain":"FeCl₃水溶液にK₃[Fe(CN)₆]水溶液を加えると、[ 褐色溶液 ]となる。\n★FeCl₃水溶液はFe³⁺(黄褐色)を含む水溶液と解釈します。Fe[Fe(CN)₆]の褐色溶液(沈殿なし)です。\n★比較：FeSO₄水溶液にK₃[Fe(CN)₆]水溶液(黄色)を加えると、Fe₄[Fe(CN)₆]₃の濃青色沈殿を生じます。(Fe²⁺は淡緑色)"},{"q":"FeCl₃水溶液にKSCN水溶液を加えると、[____](となる・を生じる)。","answer":"血赤色溶液","choices":["血赤色溶液","変化しない","濃青色沈殿","赤褐色沈殿"],"explain":"FeCl₃水溶液にKSCN水溶液を加えると、[ 血赤色溶液 ]を生じる。\n★FeCl₃水溶液はFe³⁺(黄褐色)を含む水溶液と解釈します。\n★比較：FeSO₄水溶液にKSCN水溶液を加えても、変化しません。(Fe²⁺は淡緑色)"}]},
  {"code":"MD03","name":"色まとめ2","parent":"遷移元素","questions":[{"q":"酸化銅(I)Cu₂Oは[____](色)の固体である。","answer":"赤色","choices":["赤色","黒色","青白色","緑白色"],"explain":"酸化銅(I)Cu₂Oは[ 赤色 ]の固体である。\n★赤色と表記されます。\n★X₂Oₓは「〜褐色」が多いですが(受験用)、酸化銅(I)Cu₂Oが例外です。\nAg₂O暗褐色(黒色)\nFe₂O₃赤褐色\nAg₂CrO₄赤褐色(暗赤色)。"},{"q":"酸化銅(II)CuOは[____](色)の固体である。","answer":"黒色","choices":["黒色","赤褐色","青白色","緑白色"],"explain":"酸化銅(II)CuOは[ 黒色 ]の固体である。\n★酸化銅(I)Cu₂Oは赤色、酸化銅(II)CuOは黒色。化学式中のCuの数と酸化数が逆になるので注意です。★Cu₂Oの方がCuの割合が多いので赤っぽくなると予想できます。"},{"q":"CuSO₄は[____](色)の固体で、水分を吸収するとCuSO₄・5H₂Oの[____](色)の固体へ変化する。これを加熱すると元の無水物へ戻る。","answer":"白色、青色","choices":["白色、青色","白色、淡赤色","青色、白色","青色、淡赤色"],"explain":"CuSO₄は[ 白色 ]の固体で、水分を吸収するとCuSO₄・5H₂Oの[ 青色 ]の固体へ変化する。これを加熱すると元の無水物へ戻る。★微量の水H₂Oの検出に用いられます。"},{"q":"CuSO₄の水溶液に塩基を少量加えると水酸化銅(II)Cu(OH)₂の[____](となる・が生じる)。","answer":"青白色沈殿","choices":["青白色沈殿","濃青色沈殿","赤褐色沈殿","緑白色沈殿"],"explain":"CuSO₄の水溶液に塩基を少量加えると水酸化銅(II)Cu(OH)₂の[ 青白色沈殿 ]が生じる。\n★水酸化物は一般に白色です。色付きのものは金属イオンの色を「〜白色」とするものが多いです。\nCu²⁺青色、Cu(OH)₂青白色沈殿。\nFe²⁺緑色、Fe(OH)₂緑白色沈殿、\nFe³⁺黄褐色、水酸化鉄(III)赤褐色沈殿(例外)。\n*新課程教科書(2025年度版)では「Fe(OH)₃」の表記がなくなり「水酸化鉄(III)」と日本語表記にするものと、便宜的に酸化水酸化鉄(III)のFeO(OH)をあてているものがあります。"},{"q":"[CuCl₄]²⁻は水溶液中で[____](色)を示す。","answer":"黄緑色","choices":["黄緑色","青色","黄褐色","淡赤色"],"explain":"[CuCl₄]²⁻は水溶液中で[ 黄緑色 ]を示す。\n★Cu²⁺の色ですが、相手となる陰イオンによっても色が変化します。単体でのCu²⁺は青色です。[Cu(NH₃)₄]²⁺は深青色。"},{"q":"硫化銅(II)CuSは[____](色)である。","answer":"黒色","choices":["黒色","白色","淡赤色(ピンク)","黄色"],"explain":"硫化銅(II)CuSは[ 黒色 ]である。\n★硫化物は一般に黒色です。例外はZnSの白色、CdSの黄色、MnSのピンク(淡赤色、淡桃色)の3つ。ゴロ: 黒龍(硫化物は黒)の黄色い角(CdS)に刺さる白あん(ZnS)と桃マン(MnS)。絵を描くと覚えやすいです。(*余力があればSnS褐色、SnS₂黄色も覚えてください)。"},{"q":"硝酸銀AgNO₃水溶液は[____](色)である。","answer":"無色","choices":["無色","黄緑色","暗褐色","黄褐色"],"explain":"硝酸銀AgNO₃水溶液は[ 無色 ]である。\n★硝酸銀AgNO₃水溶液はAg⁺イオンを含む無色溶液と解釈します。"},{"q":"Ag⁺は水溶液中で[____](色)である。","answer":"無色","choices":["無色","黄緑色","青白色","黄褐色"],"explain":"Ag⁺は水溶液中で[ 無色 ]である。\n★硝酸銀AgNO₃水溶液の色はAg⁺イオンを含む無色溶液と解釈します。"},{"q":"無色の硝酸銀AgNO₃水溶液に塩基を少量加えると、酸化銀(I)Ag₂Oの[____]が生じる。","answer":"暗褐色沈殿","choices":["暗褐色沈殿","緑白色沈殿","白色沈殿","黄色沈殿"],"explain":"無色の硝酸銀AgNO₃水溶液に塩基を少量加えると、酸化銀(I)Ag₂Oの[ 暗褐色沈殿 ]が生じる。\n★X₂Oₓは「〜褐色」が多いですが(受験用)、酸化銅(I)Cu₂Oが例外です。\nAg₂O暗褐色(黒色)\nFe₂O₃赤褐色\nAg₂CrO₄赤褐色(暗赤色)。"},{"q":"酸化銀(I)Ag₂Oの暗褐色沈殿(黒色沈殿)が生じた溶液にアンモニア水を加えると、沈殿が溶けて[Ag(NH₃)₂]⁺の[____](色)の溶液になる。","answer":"無色","choices":["無色","青白色","赤褐色","黄色"],"explain":"酸化銀(I)Ag₂Oの暗褐色沈殿(黒色沈殿)が生じた溶液にアンモニア水を加えると、沈殿が溶けて[Ag(NH₃)₂]⁺の[ 無色 ]の溶液になる。\n★塩化銀(I)AgClの白色沈殿でも同様の反応です。★Ag⁺、AgNO₃aq、[Ag(NH₃)₂]⁺は無色溶液です。"},{"q":"フッ化銀(I)AgFは水溶液中で[____]である。","answer":"無色溶液","choices":["無色溶液","黄色沈殿","白色沈殿","淡黄色沈殿"],"explain":"フッ化銀(I)AgFは水溶液中で[ 無色溶液 ]である。\n★ハロゲン化銀のうちAgFは水に溶けます。\n★AgF(黄色)は溶けて無色溶液、\nAgClは白色沈殿、\nAgBrは淡黄色沈殿、\nAgIは黄色沈殿、です。"},{"q":"塩化銀(I)AgClは水溶液中で[____]である。","answer":"白色沈殿","choices":["白色沈殿","無色溶液","黄色沈殿","淡黄色沈殿"],"explain":"塩化銀(I)AgClは水溶液中で[ 白色沈殿 ]である。\n★AgF(黄色)は溶けて無色溶液、\nAgClは白色沈殿、\nAgBrは淡黄色沈殿、\nAgIは黄色沈殿、です。"},{"q":"臭化銀(I)AgBrは水溶液中で[____]である。","answer":"淡黄色沈殿","choices":["淡黄色沈殿","無色溶液","白色沈殿","黄色沈殿"],"explain":"臭化銀(I)AgBrは水溶液中で[ 淡黄色沈殿 ]である。\n★AgF(黄色)は溶けて無色溶液、\nAgClは白色沈殿、\nAgBrは淡黄色沈殿、\nAgIは黄色沈殿、です。"},{"q":"ヨウ化銀(I)AgIは水溶液中で[____]である。","answer":"黄色沈殿","choices":["黄色沈殿","無色溶液","白色沈殿","淡黄色沈殿"],"explain":"ヨウ化銀(I)AgIは水溶液中で[ 黄色沈殿 ]である。\n★AgF(黄色)は溶けて無色溶液、\nAgClは白色沈殿、\nAgBrは淡黄色沈殿、\nAgIは黄色沈殿、です。"},{"q":"塩化銀(I)AgClの白色沈殿が生じた溶液にアンモニア水を加えると、沈殿が溶けて[Ag(NH₃)₂]⁺の[____](色)の溶液になる。","answer":"無色","choices":["無色","黄色","青白色","赤褐色"],"explain":"塩化銀(I)AgClの白色沈殿が生じた溶液にアンモニア水を加えると、沈殿が溶けて[Ag(NH₃)₂]⁺の[ 無色 ]の溶液になる。\n★酸化銀(I)Ag₂Oの暗褐色沈殿(黒色沈殿)でも同様の反応です。★Ag⁺、AgNO₃aq、[Ag(NH₃)₂]⁺は無色溶液です。"},{"q":"塩化銀(I)AgClの白色沈殿が生じた溶液にチオ硫酸ナトリウムNa₂S₂O₃水溶液を加えると、沈殿が溶けて[Ag(S₂O₃)₂]³⁻の[____](色)の溶液になる。","answer":"無色","choices":["無色","黄色","青白色","赤褐色"],"explain":"塩化銀(I)AgClの白色沈殿が生じた溶液にチオ硫酸ナトリウムNa₂S₂O₃水溶液を加えると、沈殿が溶けて[Ag(S₂O₃)₂]³⁻の[ 無色 ]の溶液になる。\n★[Ag(S₂O₃)₂]³⁻はビス(チオスルファト)銀(I)酸イオンといいます。(まるかっこ)はジ(2)と同様の意味のビス(2)が(チオスルファトS₂O₃²⁻)全体にかかることを意味します。"},{"q":"銀Agは湿った空気中で硫化水素H₂Sと反応し、[____](色)の硫化銀Ag₂Sを生じる。","answer":"黒色","choices":["黒色","白色","淡赤色(ピンク)","黄色"],"explain":"銀Agは湿った空気中で硫化水素H₂Sと反応し、[ 黒色 ]の硫化銀Ag₂Sを生じる。\n★Ag⁺の水溶液と硫化水素H₂Sの反応でも硫化銀Ag
