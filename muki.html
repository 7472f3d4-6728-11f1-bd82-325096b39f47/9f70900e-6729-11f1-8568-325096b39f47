₂Sの黒色沈殿を生じます。\n★硫化物は一般に黒色です。例外はZnSの白色、CdSの黄色、MnSのピンク(淡赤色、淡桃色)の3つ。ゴロ: 黒龍(硫化物は黒)の黄色い角(CdS)に刺さる白あん(ZnS)と桃マン(MnS)。絵を描くと覚えやすいです。(*余力があればSnS褐色、SnS₂黄色も覚えてください)。"},{"q":"Ag⁺はクロム酸カリウムK₂CrO₄水溶液中でAg₂CrO₄の[____]となる。","answer":"赤褐色沈殿","choices":["赤褐色沈殿","黄色沈殿","濃青色沈殿","白色沈殿"],"explain":"Ag⁺はクロム酸カリウムK₂CrO₄水溶液中でAg₂CrO₄の[ 赤褐色沈殿 ]となる。\n★クロム酸イオンCrO₄²⁻\nAg₂CrO₄は赤褐色沈殿(暗赤色沈殿)、\nBaCrO₄は黄色沈殿、\nPbCrO₄は黄色沈殿、です。\n★ゴロ: 苦労し(XCrO₄)て得た銀貨(Ag、赤褐色(暗赤色))で黄色いバナナ(黄色、Ba、Pb)を買う。"},{"q":"クロム酸カリウムK₂CrO₄は[____]の固体である。","answer":"黄色","choices":["黄色","橙赤色","緑色","青色"],"explain":"クロム酸カリウムK₂CrO₄は[ 黄色 ]の固体である。\n★K₂CrO₄とCrO₄²⁻は黄色、K₂Cr₂O₇とCr₂O₇²⁻は橙赤色(赤系)です。"},{"q":"二クロム酸カリウムK₂Cr₂O₇は[____]の固体である。","answer":"橙赤色","choices":["橙赤色","黄色","緑色","青色"],"explain":"二クロム酸カリウムK₂Cr₂O₇は[ 橙赤色 ]の固体である。\n★K₂CrO₄とCrO₄²⁻は黄色、K₂Cr₂O₇とCr₂O₇²⁻は橙赤色(赤系)です。"},{"q":"クロム酸イオンCrO₄²⁻は水溶液中で[____](色)を示す。","answer":"黄色","choices":["黄色","橙赤色","緑色","青色"],"explain":"クロム酸イオンCrO₄²⁻は水溶液中で[ 黄色 ]を示す。\n★K₂CrO₄とCrO₄²⁻は黄色、K₂Cr₂O₇とCr₂O₇²⁻は橙赤色(赤系)です。"},{"q":"二クロム酸イオンCr₂O₇²⁻は水溶液中で[____](色)を示す。","answer":"橙赤色","choices":["橙赤色","黄色","緑色","青色"],"explain":"二クロム酸イオンCr₂O₇²⁻は水溶液中で[ 橙赤色 ]を示す。\n★K₂CrO₄とCrO₄²⁻は黄色、K₂Cr₂O₇とCr₂O₇²⁻は橙赤色(赤系)です。"},{"q":"Ba²⁺はクロム酸カリウムK₂CrO₄水溶液中でBaCrO₄の[____]となる。","answer":"黄色沈殿","choices":["黄色沈殿","赤褐色沈殿","濃青色沈殿","白色沈殿"],"explain":"Ba²⁺はクロム酸カリウムK₂CrO₄水溶液中でBaCrO₄の[ 黄色沈殿 ]となる。\n★クロム酸イオンCrO₄²⁻\nAg₂CrO₄は赤褐色沈殿(暗赤色沈殿)、\nBaCrO₄は黄色沈殿、\nPbCrO₄は黄色沈殿、です。\n★ゴロ: 苦労し(XCrO₄)て得た銀貨(Ag、赤褐色(暗赤色))で黄色いバナナ(黄色、Ba、Pb)を買う。"},{"q":"Pb²⁺はクロム酸カリウムK₂CrO₄水溶液中でPbCrO₄の[____]となる。","answer":"黄色沈殿","choices":["黄色沈殿","赤褐色沈殿","濃青色沈殿","白色沈殿"],"explain":"Pb²⁺はクロム酸カリウムK₂CrO₄水溶液中でPbCrO₄の[ 黄色沈殿 ]となる。\n★クロム酸イオンCrO₄²⁻\nAg₂CrO₄は赤褐色沈殿(暗赤色沈殿)、\nBaCrO₄は黄色沈殿、\nPbCrO₄は黄色沈殿、です。\n★ゴロ: 苦労し(XCrO₄)て得た銀貨(Ag、赤褐色(暗赤色))で黄色いバナナ(黄色、Ba、Pb)を買う。"},{"q":"酸化マンガン(IV)MnO₂は[____](色)粉末で水に溶けない。","answer":"黒褐色","choices":["黒褐色","淡赤色(ピンク色)","赤紫色","黒紫色"],"explain":"酸化マンガン(IV)MnO₂は[ 黒褐色 ]粉末で水に溶けない。\n★色と名称\nMnO₂黒褐色、酸化マンガン(IV)\nKMnO₄黒紫色、過マンガン酸カリウム\nMnO₄⁻赤紫色、過マンガン酸イオン\nMn²⁺淡赤色(ピンク色)、肉眼では無色\nMnの金属単体は銀白色。"},{"q":"過マンガン酸カリウムKMnO₄は[____](色)結晶で水に溶けて過マンガン酸イオンMnO₄⁻の[____](色)水溶液になる。","answer":"黒紫色、赤紫色","choices":["黒紫色、赤紫色","黒褐色、赤紫色","赤紫色、黒紫色","赤紫色、黒褐色"],"explain":"過マンガン酸カリウムKMnO₄は[ 黒紫色 ]結晶で水に溶けて過マンガン酸イオンMnO₄⁻の[ 赤紫色 ]水溶液になる。\n★両方へ紫系統を入れます。\n★色と名称\nMnO₂黒褐色、酸化マンガン(IV)\nKMnO₄黒紫色、過マンガン酸カリウム\nMnO₄⁻赤紫色、過マンガン酸イオン\nMn²⁺淡赤色(ピンク色)、肉眼では無色\nMnの金属単体は銀白色。"},{"q":"マンガン(II)イオンMn²⁺は水溶液中で[____](色)を示す。","answer":"淡赤色(ピンク色)","choices":["淡赤色(ピンク色)","黒褐色","赤紫色","黒紫色"],"explain":"マンガン(II)イオンMn²⁺は水溶液中で[ 淡赤色(ピンク色) ]を示す。\n★色と名称\nMnO₂黒褐色、酸化マンガン(IV)\nKMnO₄黒紫色、過マンガン酸カリウム\nMnO₄⁻赤紫色、過マンガン酸イオン\nMn²⁺淡赤色(ピンク色)、肉眼では無色\nMnの金属単体は銀白色。"},{"q":"塩化コバルトCoCl₂の無水物は[____](色)だが、水を吸収すると[____](色)のヘキサアクアコバルト(II)イオンになる。","answer":"青色、淡赤色","choices":["青色、淡赤色","青色、白色","淡赤色、青色","淡赤色、白色"],"explain":"塩化コバルトCoCl₂の無水物は[ 青色 ]だが、水を吸収すると[ 淡赤色 ]のヘキサアクアコバルト(II)イオンになる。\n★[Co(H₂O)₆]²⁺\n★塩化コバルトは乾燥剤のシリカゲルに含まれています。★Co³⁺は赤色、[Co(H₂O)₆]²⁺は淡赤色です。"},{"q":"炭酸イオンを含む溶液中でBaCO₃、CaCO₃、SrCO₃(、PbCO₃)は[____]となる。","answer":"白色沈殿","choices":["白色沈殿","黄色沈殿","白色溶液","黒色沈殿"],"explain":"炭酸イオンを含む溶液中でBaCO₃、CaCO₃、SrCO₃、PbCO₃は[ 白色沈殿 ]となる。\n★ゴロ: バカにするな白龍たん(Ba²⁺、Ca²⁺、Sr²⁺、Pb²⁺、白色沈殿、硫酸塩と炭酸塩)\n*質問の多い炭酸鉛(II)PbCO₃について、調べた範囲では教科書に記載なしです。系統分析の初手で白色沈殿のPbCl₂になることから考慮していないものと考えています(開発者見解)。wikipediaには、薄めた酢酸鉛(II)溶液に二酸化炭素を通すことで、炭酸鉛(II)PbCO₃が生じる、とあります。"},{"q":"硫酸イオンを含む溶液中でBaSO₄、CaSO₄、SrSO₄、PbSO₄は[____]となる。","answer":"白色沈殿","choices":["白色沈殿","黄色沈殿","白色溶液","黒色沈殿"],"explain":"硫酸イオンを含む溶液中でBaSO₄、CaSO₄、SrSO₄、PbSO₄は[ 白色沈殿 ]となる。\n★ゴロ: バカにするな白龍たん(Ba²⁺、Ca²⁺、Sr²⁺、Pb²⁺、白色沈殿、硫酸塩と炭酸塩)\n*質問の多い炭酸鉛(II)PbCO₃について、調べた範囲では教科書に記載なしです。系統分析の初手で白色沈殿のPbCl₂になることから考慮していないものと考えています(開発者見解)。wikipediaには、薄めた酢酸鉛(II)溶液に二酸化炭素を通すことで、炭酸鉛(II)PbCO₃が生じる、とあります。"}]},
  {"code":"MD04","name":"銀Ag","parent":"遷移元素","questions":[{"q":"鉄Feは、地殻中に、[____]に次いで多く存在する元素で、金属元素では[____](番目)に多い。","answer":"アルミニウムAl、2番目","choices":["アルミニウムAl、2番目","ケイ素Si、1番目","アルミニウムAl、3番目","ケイ素Si、2番目"],"explain":"鉄Feは、地殻中に、[ アルミニウムAl ]に次いで多く存在する元素で、金属元素では[ 2番目 ]に多い。\n★クラーク数のゴロ: おっしゃるてか(O、Si、Al、Fe、Ca)、地殻中の元素の割合(質量比)の大きい順です。"},{"q":"純粋な鉄は[____](色)で、比較的[____]。","answer":"灰白色、軟らかい","choices":["灰白色、軟らかい","灰白色、硬い","黒褐色、軟らかい","黒褐色、硬い"],"explain":"純粋な鉄は[ 灰白色 ]で、比較的[ 軟らかい ]。"},{"q":"純粋な鉄は融点が[____]。また、湿った空気中で[____]。","answer":"高い、錆びやすい","choices":["高い、錆びやすい","高い、錆びにくい","低い、錆びやすい","低い、錆びにくい"],"explain":"純粋な鉄は融点が[ 高い ]。また、湿った空気中で[ 錆びやすい ]。\n★錆びやすいとは、酸化されやすいことです。★純粋な鉄(教科書の表現)は錆びやすいのですが、「超高純度の鉄」は錆びず、酸にも溶けません(範囲外)。"},{"q":"鉄には酸化数[____]と[____]の化合物が存在し、酸化数[____]の化合物がより安定している。","answer":"+2、+3、+3","choices":["+2、+3、+3","+2、+3、+2","+3、+4、+3","+3、+4、+4"],"explain":"鉄には酸化数[ +2 ]と[ +3 ]の化合物が存在し、酸化数[ +3 ]の化合物がより安定している。"},{"q":"鉄の原料鉱石には[____]や[____]などの鉄鉱石がある。","answer":"赤鉄鉱、磁鉄鉱","choices":["赤鉄鉱、磁鉄鉱","赤鉄鉱、黄銅鉱","ボーキサイト、磁鉄鉱","黄銅鉱、磁鉄鉱"],"explain":"鉄の原料鉱石には[ 赤鉄鉱 ]や[ 磁鉄鉱 ]などの鉄鉱石がある。\n★赤鉄鉱Fe₂O₃、磁鉄鉱Fe₃O₄。\n★Fe₂O₃は赤錆、Fe₃O₄は黒錆とも呼ばれます。"},{"q":"Fe₂O₃は[____]と呼ばれ、Fe₃O₄は[____]と呼ばれる。","answer":"赤錆、黒錆","choices":["赤錆、黒錆","銑鉄、スラグ","黒錆、赤錆","スラグ、銑鉄"],"explain":"Fe₂O₃は[ 赤錆 ]と呼ばれ、Fe₃O₄は[ 黒錆 ]と呼ばれる。\n★鉄の原料鉱石(鉄鉱石)としては、赤鉄鉱Fe₂O₃、磁鉄鉱Fe₃O₄です。\n★赤錆(赤さび)を酸化鉄(III)水和物(主成分はFeO(OH)の酸化水酸化鉄(III))と記述している教科書もあります。酸化鉄(III)水和物を脱水していくとFe₂O₃になります。"},{"q":"Fe₂O₃の赤褐色の粉末は[____]とも呼ばれ、顔料になる。","answer":"弁柄(べんがら)","choices":["弁柄(べんがら)","朱肉(しゅにく)","砂鉄","銑鉄"],"explain":"Fe₂O₃の赤褐色の粉末は[ 弁柄(べんがら) ]とも呼ばれ、顔料になる。\n★Fe₂O₃は赤鉄鉱、赤錆、弁柄(べんがら)です。★Fe₃O₄は磁鉄鉱、黒錆。\n★顔料は、絵の具や塗料などの原料です。"},{"q":"Fe₃O₄は[____](性)があり、[____]の主成分でもある。","answer":"磁性、砂鉄","choices":["磁性、砂鉄","磁性、銑鉄","還元性、砂鉄","還元性、銑鉄"],"explain":"Fe₃O₄は[ 磁性 ]があり、[ 砂鉄 ]の主成分でもある。"},{"q":"鉄やニッケルは外部の磁場によって磁石となりやすい性質である[____](性)を持つ。","answer":"強磁性","choices":["強磁性","延性・展性","電気伝導性","絶縁性"],"explain":"鉄やニッケルは外部の磁場によって磁石となりやすい性質である[ 強磁性 ]を持つ。\n★ferromagnetism(強磁性)を語源分解すると、ferro-/féroᴜ-/は「鉄(II)の、鉄を含む」、magnetismは「磁性」です。\n★(範囲外)他に、反磁性(diamagnetism、逆磁性、加えた磁界と逆方向に磁化する性質)、常磁性(paramagnetism、強磁性と似た性質で磁力の強さが数万分の1と弱い)、などの用語があります。"},{"q":"鉄を湿った空気中に放置すると酸化され、[____]を生じる。これを[____]と呼ぶ。この錆は内部まで進行する。","answer":"酸化鉄(III)Fe₂O₃、赤錆","choices":["酸化鉄(III)Fe₂O₃、赤錆","酸化鉄(III)Fe₂O₃、黒錆","四酸化三鉄Fe₃O₄、赤錆","四酸化三鉄Fe₃O₄、黒錆"],"explain":"鉄を湿った空気中に放置すると酸化され、[ 酸化鉄(III)Fe₂O₃ ]を生じる。これを[ 赤錆 ]と呼ぶ。この錆は内部まで進行する。\n★赤錆は酸化鉄(III)Fe₂O₃です。空気中や水中で自然に錆びて内部まで侵食する錆です。\n★黒錆は、四酸化三鉄Fe₃O₄です。鉄を強熱することで表面を覆い内部を保護する錆です。"},{"q":"鉄を強熱すると酸化され、[____]を生じる。これを[____]と呼ぶ。この錆は表面を覆い、内部を保護する。","answer":"四酸化三鉄Fe₃O₄、黒錆","choices":["四酸化三鉄Fe₃O₄、黒錆","四酸化三鉄Fe₃O₄、赤錆","酸化鉄(III)Fe₂O₃、赤錆","酸化鉄(III)Fe₂O₃、黒錆"],"explain":"鉄を強熱すると酸化され、[ 四酸化三鉄Fe₃O₄ ]を生じる。これを[ 黒錆 ]と呼ぶ。この錆は表面を覆い、内部を保護する。\n★赤錆は酸化鉄(III)Fe₂O₃です。空気中や水中で自然に錆びて内部まで侵食する錆です。\n★黒錆は、四酸化三鉄Fe₃O₄です。鉄を強熱することで表面を覆い内部を保護する錆です。"},{"q":"鉄鉱石、コークスC、石灰石CaCO₃を高炉(溶鉱炉)に入れ、下から熱風を送るとき、鉄鉱石は上から下へ進むにつれて次のように還元されて行く。\n[____]→[____]→[____]→Fe","answer":"Fe₂O₃→Fe₃O₄→FeO","choices":["Fe₂O₃→Fe₃O₄→FeO","Fe₂O₃→FeO→Fe₃O₄","Fe₃O₄→Fe₂O₃→FeO","Fe₃O₄→FeO→Fe₂O₃"],"explain":"鉄鉱石、コークスC、石灰石CaCO₃を高炉(溶鉱炉)に入れ、下から熱風を送るとき、鉄鉱石は上から下へ進むにつれて次のように還元されて行く。\nFe₂O₃→Fe₃O₄→FeO→Fe"},{"q":"鉄鉱石、[____]、[____]を高炉(溶鉱炉)に入れ、下から熱風を送り、鉄鉱石を還元することでFe(銑鉄)を得ることができる。","answer":"コークスC、石灰石CaCO₃","choices":["コークスC、石灰石CaCO₃","コークスC、消石灰Ca(OH)₂","一酸化炭素CO、石灰石CaCO₃","一酸化炭素CO、消石灰Ca(OH)₂"],"explain":"鉄鉱石、[ コークスC ]、[ 石灰石CaCO₃ ]を高炉(溶鉱炉)に入れ、下から熱風を送り、鉄鉱石を還元することでFe(銑鉄)を得ることができる。"},{"q":"溶鉱炉で赤鉄鉱から鉄の単体を精製する反応をまとめた化学式は、\n[____] → 2Fe + 3CO₂","answer":"Fe₂O₃ + 3CO","choices":["Fe₂O₃ + 3CO","Fe₂O₃ + 3CO₂","2FeO + 3CO₂","2FeO + 3CO"],"explain":"溶鉱炉で赤鉄鉱から鉄の単体を精製する反応をまとめた化学式は、\nFe₂O₃ + 3CO → 2Fe + 3CO₂\n★Fe₂O₃→Fe₃O₄→FeO→Feの順に還元されていきます。\n赤鉄鉱→磁鉄鉱→酸化鉄(II)→銑鉄"},{"q":"鉄の精錬に用いられる溶鉱炉の内部は[____]の方が温度が低い。下から入れる熱風は[____](°C)である。","answer":"上部、約1250°C","choices":["上部、約1250°C","上部、約200°C","下部、約1250°C","下部、約200°C"],"explain":"鉄の精錬に用いられる溶鉱炉の内部は[ 上部 ]の方が温度が低い。下から入れる熱風は[ 1250°C ]である。\n★上から200°C、500°C、1200°C、2000°Cの部分に分けて鉄の還元反応を覚えます。熱風はさらに下から送ります。"},{"q":"鉄の精錬において溶鉱炉の下部から熱い空気を送り込むと、2000°Cの温度域でコークスが燃焼され[____]が発生する。この物質で鉄を還元していく。","answer":"一酸化炭素CO","choices":["一酸化炭素CO","二酸化炭素CO₂","酸素O₂","窒素N₂"],"explain":"鉄の精錬において溶鉱炉の下部から熱い空気を送り込むと、2000°Cの温度域でコークスが燃焼され[ 一酸化炭素CO ]が発生する。この物質で鉄を還元していく。\n★C + CO₂ ⇄ 2CO\n★Fe₂O₃→Fe₃O₄→FeO→Feの順に還元されていきます。★京大など"},{"q":"鉄の精錬において溶鉱炉の200°C～500°Cの温度域では[____]から[____]へ還元される反応が起こる。","answer":"酸化鉄(III)Fe₂O₃、四酸化三鉄Fe₃O₄","choices":["酸化鉄(III)Fe₂O₃、四酸化三鉄Fe₃O₄","酸化鉄(III)Fe₂O₃、酸化鉄(II)FeO","四酸化三鉄Fe₃O₄、酸化鉄(III)Fe₂O₃","四酸化三鉄Fe₃O₄、酸化鉄(II)FeO"],"explain":"鉄の精錬において溶鉱炉の200°C～500°Cの温度域では[ 酸化鉄(III)Fe₂O₃ ]から[ 四酸化三鉄Fe₃O₄ ]へ還元される反応が起こる。\n★3Fe₂O₃ + CO → 2Fe₃O₄ + CO₂\n★Fe₂O₃→Fe₃O₄→FeO→Feの順に還元されていきます。★京大など"},{"q":"鉄の精錬において溶鉱炉の500°C～1200°Cの温度域では[____]から[____]へ還元される反応が起こる。","answer":"四酸化三鉄Fe₃O₄、酸化鉄(II)FeO","choices":["四酸化三鉄Fe₃O₄、酸化鉄(II)FeO","四酸化三鉄Fe₃O₄、酸化鉄(III)Fe₂O₃","酸化鉄(III)Fe₂O₃、四酸化三鉄Fe₃O₄","酸化鉄(III)Fe₂O₃、酸化鉄(II)FeO"],"explain":"鉄の精錬において溶鉱炉の500°C～1200°Cの温度域では[ 四酸化三鉄Fe₃O₄ ]から[ 酸化鉄(II)FeO ]へ還元される反応が起こる。\n★Fe₃O₄ + CO → 3FeO+ CO₂\n★Fe₂O₃→Fe₃O₄→FeO→Feの順に還元されていきます。★京大など"},{"q":"鉄の精錬において溶鉱炉の1200°C～2000°Cの温度域では[____]から[____]へ還元される反応が起こる。","answer":"酸化鉄(II)FeO、銑鉄Fe","choices":["酸化鉄(II)FeO、銑鉄Fe","酸化鉄(II)FeO、酸化鉄(III)Fe₂O₃","四酸化三鉄Fe₃O₄、銑鉄Fe","四酸化三鉄Fe₃O₄、酸化鉄(II)FeO"],"explain":"鉄の精錬において溶鉱炉の1200°C～2000°Cの温度域では[ 酸化鉄(II)FeO ]から[ 銑鉄Fe ]へ還元される反応が起こる。\n★FeO + CO → Fe + CO₂\n★Fe₂O₃→Fe₃O₄→FeO→Feの順に還元されていきます。★京大など"},{"q":"酸化鉄(II)FeO、酸化鉄(III)Fe₂O₃、四酸化三鉄Fe₃O₄のうち、最も密度の高いものは[____]。","answer":"酸化鉄(II)FeO","choices":["酸化鉄(II)FeO","酸化鉄(III)Fe₂O₃","四酸化三鉄Fe₃O₄","酸化鉄(III)Fe₂O₃と四酸化三鉄Fe₃O₄"],"explain":"酸化鉄(II)FeO、酸化鉄(III)Fe₂O₃、四酸化三鉄Fe₃O₄を密度の高いものは[ 酸化鉄(II)FeO ]。\n★重たい鉄Feの割合が高いほど密度が高いと考えられます。酸化鉄(II)FeOは1:1で50％、酸化鉄(III)Fe₂O₃は2:3で40％、四酸化三鉄Fe₃O₄は3:4で42％なので、50％の酸化鉄(II)FeOの密度が高いと推測できます。"},{"q":"高炉(溶鉱炉)で鉄鉱石を還元して得られたばかりの鉄は、質量比で約4％の[____]を含み[____]と呼ばれる。他に、ケイ素Si、硫黄S、リンPなども含む。","answer":"炭素C、銑鉄(せんてつ)","choices":["炭素C、銑鉄(せんてつ)","酸素O₂、銑鉄(せんてつ)","炭素C、鋼(こう、はがね)","酸素O₂、鋼(こう、はがね)"],"explain":"高炉(溶鉱炉)で鉄鉱石を還元して得られたばかりの鉄は、質量比で約4％の[ 炭素C ]を含み[ 銑鉄(せんてつ) ]と呼ばれる。他に、ケイ素Si、硫黄S、リンPなども含む。★京大など"},{"q":"高炉(溶鉱炉)で鉄鉱石を還元して得られた鉄を転炉へ移し、[____]により酸化して炭素Cの含有量を減らした鉄を[____]と呼ぶ。","answer":"酸素O₂、鋼(こう、はがね)","choices":["酸素O₂、鋼(こう、はがね)","炭素C、鋼(こう、はがね)","酸素O₂、銑鉄(せんてつ)","炭素C、銑鉄(せんてつ)"],"explain":"高炉(溶鉱炉)で鉄鉱石を還元して得られた鉄を転炉へ移し、[ 酸素O₂ ]により酸化して炭素Cの含有量を減らした鉄を[ 鋼(こう、はがね) ]と呼ぶ。"},{"q":"銑鉄は[____](く)、鋼は[____]。","answer":"もろく、硬くて強い","choices":["もろく、硬くて強い","もろく、もろい","硬くて強く、もろい","硬くて強く、硬くて強い"],"explain":"銑鉄は[ もろく ]、鋼は[ 硬くて強い ]。\n★銑鉄は、鉄鉱石の還元で得られたばかりの約4％の炭素Cを含む鉄です。鋼は、銑鉄から炭素Cの含有量を減らした鉄です。"},{"q":"高炉(溶鉱炉)で得られる銑鉄の上に浮かぶケイ酸カルシウムCaSiO₃などを[____]という。","answer":"スラグ","choices":["スラグ","銑鉄","鋼","陽極泥"],"explain":"高炉(溶鉱炉)で得られる銑鉄の上に浮かぶケイ酸カルシウムCaSiO₃などを[ スラグ ]という。"},{"q":"高炉(溶鉱炉)で得られる銑鉄の上に浮かぶ[____]などをスラグという。","answer":"ケイ酸カルシウムCaSiO₃","choices":["ケイ酸カルシウムCaSiO₃","陽極泥(Au、Ag)","銑鉄","炭酸カルシウムCaCO₃"],"explain":"高炉(溶鉱炉)で得られる銑鉄の上に浮かぶ[ ケイ酸カルシウムCaSiO₃ ]などをスラグという。"},{"q":"鉄は塩酸や希硫酸と[____]。鉄は濃硝酸と[____]。","answer":"反応する、不動態を作る","choices":["反応する、不動態を作る","反応する、反応する","不動態を作る、反応する","不動態を作る、不動態を作る"],"explain":"鉄は塩酸や希硫酸と[ 反応する ]。鉄は濃硝酸と[ 不動態を作る ]。\n★Fe + H₂SO₄ → FeSO₄ + H₂\n★Fe + 2HCl → FeCl₂ + H₂\n★不動態を作ると反応が進まなくなります。★Cr、Co、Fe、Ni、Alと濃硝酸は不動態を作ります。ゴロ: 黒子テツヤにある不動産(黒柳徹子ならCr、Fe、Co、Ni、Alの順)。"},{"q":"鉄は塩酸や希硫酸と反応して[____]を発生する。鉄は濃硝酸には[____]となり溶解しない。","answer":"水素、不動態","choices":["水素、不動態","水素、酸化鉄(III)","水、不動態","水、酸化鉄(III)"],"explain":"鉄は塩酸や希硫酸と反応して[ 水素 ]を発生する。鉄は濃硝酸には[ 不動態 ]となり溶解しない。\n★Fe + H₂SO₄ → FeSO₄ + H₂\n★Fe + 2HCl → FeCl₂ + H₂\n★不動態を作ると反応が進まなくなります。★Cr、Co、Fe、Ni、Alと濃硝酸は不動態を作ります。ゴロ: 黒子テツヤにある不動産(黒柳徹子ならCr、Fe、Co、Ni、Alの順)。"},{"q":"Fe + H₂SO₄ → [____]","answer":"FeSO₄ + H₂ (加熱なし)","choices":["FeSO₄ + H₂ (加熱なし)","FeSO₄ + H₂ (加熱必要)","FeSO₃ + H₂O (加熱なし)","FeSO₃ + H₂O (加熱必要)"],"explain":"Fe + H₂SO₄ → FeSO₄ + H₂ (加熱なし)\n★鉄などのイオン化傾向の大きい金属の単体は塩酸や希硫酸と反応して水素を発生します。★塩酸や希硫酸は反応性が高く加熱は必要ありません。"},{"q":"鉄と[____]との合金をステンレス鋼といい、錆びにくい(酸化されにくい)。","answer":"クロムCr、ニッケルNi","choices":["クロムCr、ニッケルNi","クロムCr、亜鉛Zn","スズSn、ニッケルNi","スズSn、亜鉛Zn"],"explain":"鉄と[ クロムCr、ニッケルNi ]との合金をステンレス鋼といい、錆びにくい(酸化されにくい)。"},{"q":"鉄Feを主成分とした、クロムCr、ニッケルNiとの合金である[____]は、空気中で[____]の膜を作るため錆びにくい。","answer":"ステンレス鋼、不動態","choices":["ステンレス鋼、不動態","ステンレス鋼、赤錆","銑鉄(せんてつ)、不動態","銑鉄(せんてつ)、赤錆"],"explain":"鉄Feを主成分とした、クロムCr、ニッケルNiとの合金である[ ステンレス鋼 ]は、空気中で[ 不動態 ]の膜を作るため錆びにくい。\n★ステンレス鋼の主成分は鉄Feです。★比較：ニッケルNiを主成分とし、クロムCrや鉄Feを添加した合金は二クロムです。★Cr、Co、Fe、Ni、Alと濃硝酸は不動態を作ります。ゴロ: 黒子テツヤにある不動産(黒柳徹子ならCr、Fe、Co、Ni、Alの順)。"},{"q":"ニッケルNiを主成分とし、クロムCrや鉄Feを添加した合金である[____]は、電気抵抗が[____]く、電熱線としてドライヤーやオーブントースターなどに用いられている。","answer":"ニクロム、大きく","choices":["ニクロム、大きく","ニクロム、小さく","ステンレス鋼、大きく","ステンレス鋼、小さく"],"explain":"ニッケルNiを主成分とし、クロムCrや鉄Feを添加した合金である[ ニクロム ]は、電気抵抗が[ 大きく ]、電熱線としてドライヤーやオーブントースターなどに用いられている。\n★「にくろむ」にはCrの酸化数の「二(漢字)」からくる「二クロム」とニッケル+クロムからくる「ニクロム」(カタカナのみ)があります。\n★ステンレス鋼の主成分は鉄Feです。★比較：鉄Feを主成分とした、クロムCr、ニッケルNiとの合金はステンレス鋼です。"},{"q":"鉄Feに亜鉛Znをめっきしたものを[____]、鉄FeにスズSnをめっきしたものを[____]という。","answer":"トタン、ブリキ","choices":["トタン、ブリキ","トタン、ステンレス鋼","ブリキ、トタン","ブリキ、ステンレス鋼"],"explain":"鉄Feに亜鉛Znをめっきしたものを[ トタン ]、鉄FeにスズSnをめっきしたものを[ ブリキ ]という。\n★トタンは鉄Feに亜鉛Znをめっき(ゴロ: テツヤと途端に会えん)。ブリキは鉄FeにスズSnをめっき(ゴロ: テツヤにスズちゃんブリッ子)。"},{"q":"酸化数+2の鉄の固体の化合物には、[____](色)の硫酸鉄(II)七水和物や、[____](色)のヘキサシアニド鉄(II)酸カリウム三水和物がある。","answer":"淡緑色、黄色","choices":["淡緑色、黄色","淡緑色、赤色","黄褐色、赤色","黄褐色、淡緑色"],"explain":"酸化数+2の鉄の固体の化合物には、[ 淡緑色 ]の硫酸鉄(II)七水和物や、[ 黄色 ]のヘキサシアニド鉄(II)酸カリウム三水和物がある。\n★FeSO₄・7H₂Oの色はFe²⁺の淡緑色から推測できます。\n★K₄[Fe(CN)₆]·3H₂Oの色はK₄[Fe(CN)₆]の黄色から推測できます。"},{"q":"酸化数+3の鉄の固体の化合物には、[____](色)の塩化鉄(III)六水和物や、[____](色)のヘキサシアニド鉄(III)酸カリウムがある。","answer":"黄褐色、赤色","choices":["黄褐色、赤色","淡緑色、黄色","淡緑色、赤色","黄褐色、淡緑色"],"explain":"酸化数+3の鉄の固体の化合物には、[ 黄褐色 ]の塩化鉄(III)六水和物や、[ 赤色 ]のヘキサシアニド鉄(III)酸カリウムがある。\n★FeCl₃・6H₂Oの色はFe³⁺の黄褐色から推測できます。\n★K₃[Fe(CN)₆]は暗赤色固体です。"},{"q":"Fe₄[Fe(CN)₆]₃をベルリン青、プルシアン青、[____]、[____]などと呼ぶ。","answer":"ターンブル青、紺青(こんじょう)","choices":["ターンブル青、紺青(こんじょう)","ターンブル青、緑青(ろくしょう)","コバルトブルー、紺青(こんじょう)","コバルトブルー、緑青(ろくしょう)"],"explain":"Fe₄[Fe(CN)₆]₃をベルリン青、プルシアン青、[ ターンブル青 ]、[ 紺青(こんじょう) ]などと呼ぶ。"},{"q":"K₄[Fe(CN)₆]は[____](色)の固体であり、水溶液中では[Fe(CN)₆]⁴⁻の[____](色)になる。","answer":"黄色、淡黄色","choices":["黄色、淡黄色","暗赤色、黄色","青紫色、淡緑色","無色、青色"],"explain":"K₄[Fe(CN)₆]は[ 黄色 ]の固体であり、水溶液中では[Fe(CN)₆]⁴⁻の[ 淡黄色 ]になる。\n★Fe²⁺は淡緑色、\nK₄[Fe(CN)₆]は黄色固体、溶液中では[Fe(CN)₆]⁴⁻となり淡黄色。\nFe³⁺は黄褐色、\nK₃[Fe(CN)₆]は暗赤色固体、\n溶液中では[Fe(CN)₆]³⁻となり黄色。"},{"q":"K₃[Fe(CN)₆]は[____](色)の固体であり、水溶液中では[Fe(CN)₆]³⁻の[____](色)になる。","answer":"暗赤色、黄色","choices":["暗赤色、黄色","黄色、淡黄色","青紫色、淡緑色","無色、青色"],"explain":"K₃[Fe(CN)₆]は[ 暗赤色 ]の固体であり、水溶液中では[Fe(CN)₆]³⁻の[ 黄色 ]になる。\n★Fe²⁺は淡緑色、K₄[Fe(CN)₆]は黄色固体、[Fe(CN)₆]⁴⁻は淡黄色、\n★Fe³⁺は黄褐色、K₃[Fe(CN)₆]は暗赤色固体、[Fe(CN)₆]³⁻は黄色"},{"q":"FeSO₄水溶液にNaOH水溶液を加えると、Fe(OH)₂の[____](となる・を生じる)。","answer":"緑白色沈殿","choices":["緑白色沈殿","赤褐色沈殿","濃青色沈殿","青白色沈殿"],"explain":"FeSO₄水溶液にNaOH水溶液を加えると、Fe(OH)₂の[ 緑白色沈殿 ]を生じる。\n★FeSO₄水溶液はFe²⁺(淡緑色)を含む水溶液と解釈します。\n★比較：FeCl₃水溶液にNaOH水溶液を加えると、水酸化鉄(III)の赤褐色沈殿を生じます。(Fe³⁺は黄褐色)\n*新課程教科書(2025年度版)では「Fe(OH)₃」の表記がなくなり「水酸化鉄(III)」と日本語表記にするものと、便宜的に酸化水酸化鉄(III)のFeO(OH)をあてているものがあります。"},{"q":"FeSO₄水溶液にK₄[Fe(CN)₆]水溶液を加えると、[____](となる・を生じる)。","answer":"青白色沈殿","choices":["青白色沈殿","濃青色沈殿","赤褐色沈殿","緑白色沈殿"],"explain":"FeSO₄水溶液にK₄[Fe(CN)₆]水溶液を加えると、[ 青白色沈殿 ]を生じる。\n★FeSO₄水溶液はFe²⁺(淡緑色)を含む水溶液と解釈します。Fe₂[Fe(CN)₆]の青白色沈殿です。*K₄[Fe(CN)₆]は黄色の固体、水溶液は淡黄色。\n★比較：FeCl₃水溶液にK₄[Fe(CN)₆]水溶液(淡黄色)を加えると、Fe₄[Fe(CN)₆]₃の濃青色沈殿が生じます。(Fe³⁺は黄褐色)"},{"q":"FeSO₄水溶液にK₃[Fe(CN)₆]水溶液を加えると、[____](となる・を生じる)。","answer":"濃青色沈殿","choices":["濃青色沈殿","褐色溶液","赤褐色沈殿","変化しない"],"explain":"FeSO₄水溶液にK₃[Fe(CN)₆]水溶液を加えると、[ 濃青色沈殿 ]を生じる。\n★FeSO₄水溶液はFe²⁺(淡緑色)を含む水溶液と解釈します。Fe₄[Fe(CN)₆]₃の濃青色沈殿です。*K₃[Fe(CN)₆]は暗赤色の固体、水溶液は黄色。\n★比較：FeCl₃水溶液にK₃[Fe(CN)₆]水溶液(黄色)を加えると、Fe[Fe(CN)₆]の褐色溶液(沈殿なし)となります。(Fe³⁺は黄褐色)\n* 濃青色沈殿の化学式について、僕も愛用していた問題集「化学の新演習」では、K･Fe[Fe(CN)₆]↓(濃青)となっています(解答p171)。Fe₄[Fe(CN)₆]₃を採用するとのことです。ご質問を受けた流れでユーザーの方にお問い合わせを共有していただきました。ありがとうございます。(2024年10月)"},{"q":"FeSO₄水溶液にKSCN水溶液を加えると、[____](となる・を生じる)。","answer":"変化しない","choices":["変化しない","血赤色溶液","濃青色沈殿","赤褐色沈殿"],"explain":"FeSO₄水溶液にKSCN水溶液を加えると、[ 変化しない ]。\n★FeSO₄水溶液はFe²⁺(淡緑色)を含む水溶液と解釈します。\n★比較：FeCl₃水溶液にKSCN水溶液を加えると、血赤色溶液を生じます。(Fe³⁺は黄褐色)"},{"q":"FeCl₃水溶液にNaOH水溶液を加えると、水酸化鉄(III)の[____](となる・を生じる)。","answer":"赤褐色沈殿","choices":["赤褐色沈殿","緑白色沈殿","濃青色沈殿","変化しない"],"explain":"FeCl₃水溶液にNaOH水溶液を加えると、水酸化鉄(III)の[ 赤褐色沈殿 ]を生じる。\n★FeCl₃水溶液はFe³⁺(黄褐色)を含む水溶液と解釈します。\n★比較：FeSO₄水溶液にNaOH水溶液を加えると、Fe(OH)₂の緑白色沈殿を生じます。(Fe²⁺は淡緑色)\n*新課程教科書(2025年度版)では「Fe(OH)₃」の表記がなくなり「水酸化鉄(III)」と日本語表記にするものと、便宜的に酸化水酸化鉄(III)のFeO(OH)をあてているものがあります。"},{"q":"FeCl₃水溶液にK₄[Fe(CN)₆]水溶液を加えると、[____](となる・を生じる)。","answer":"濃青色沈殿","choices":["濃青色沈殿","青白色沈殿","赤褐色沈殿","変化しない"],"explain":"FeCl₃水溶液にK₄[Fe(CN)₆]水溶液を加えると、[ 濃青色沈殿 ]を生じる。\n★FeCl₃水溶液はFe³⁺(黄褐色)を含む水溶液と解釈します。Fe₄[Fe(CN)₆]₃の濃青色沈殿です。*K₄[Fe(CN)₆]は黄色の固体、水溶液は淡黄色。\n★比較：FeSO₄水溶液にK₄[Fe(CN)₆]水溶液(淡黄色)を加えると、Fe₂[Fe(CN)₆]の青白色沈殿を生じます。(Fe²⁺は淡緑色)"},{"q":"FeCl₃水溶液にK₃[Fe(CN)₆]水溶液を加えると、[____](となる・を生じる)。","answer":"褐色溶液","choices":["褐色溶液","濃青色沈殿","赤褐色沈殿","変化しない"],"explain":"FeCl₃水溶液にK₃[Fe(CN)₆]水溶液を加えると、[ 褐色溶液 ]となる。\n★FeCl₃水溶液はFe³⁺(黄褐色)を含む水溶液と解釈します。Fe[Fe(CN)₆]の褐色溶液(沈殿なし)です。\n★比較：FeSO₄水溶液にK₃[Fe(CN)₆]水溶液(黄色)を加えると、Fe₄[Fe(CN)₆]₃の濃青色沈殿を生じます。(Fe²⁺は淡緑色)"},{"q":"FeCl₃水溶液にKSCN水溶液を加えると、[____](となる・を生じる)。","answer":"血赤色溶液","choices":["血赤色溶液","変化しない","濃青色沈殿","赤褐色沈殿"],"explain":"FeCl₃水溶液にKSCN水溶液を加えると、[ 血赤色溶液 ]を生じる。\n★FeCl₃水溶液はFe³⁺(黄褐色)を含む水溶液と解釈します。\n★比較：FeSO₄水溶液にKSCN水溶液を加えても、変化しません。(Fe²⁺は淡緑色)"}]},
  {"code":"MD05","name":"銅Cu","parent":"遷移元素","questions":[{"q":"銅Cuは主に[____](主成分は[____])などの化合物として産出する。","answer":"黄銅鉱、CuFeS₂","choices":["黄銅鉱、CuFeS₂","赤鉄鉱、Fe₂O₃","磁鉄鉱、Fe₃O₄","ボーキサイト、Al₂O₃"],"explain":"銅Cuは主に[ 黄銅鉱 ](主成分は[ CuFeS₂ ])などの化合物として産出する。\n★イオン化傾向の小さい金属で天然に単体としても存在します。"},{"q":"銅は[____](色)で、光沢の[____]金属である。","answer":"赤色、ある","choices":["赤色、ある","赤色、ない","銀白色、ある","銀白色、ない"],"explain":"銅は[ 赤色 ]で、光沢の[ ある ]金属である。"},{"q":"銅には酸化数[____]と[____]の化合物が存在し、酸化数[____]の化合物がより安定している。","answer":"+1、+2、+2","choices":["+1、+2、+2","+1、+2、+1","+2、+3、+3","+2、+3、+2"],"explain":"銅には酸化数[ +1 ]と[ +2 ]の化合物が存在し、酸化数[ +2 ]の化合物がより安定している。"},{"q":"黄銅鉱CuFeS₂を溶鉱炉で空気とともに加熱すると[____]が取り除かれ、[____](Cu純度約99％)が得られる。","answer":"鉄や硫黄、粗銅","choices":["鉄や硫黄、粗銅","鉄や硫黄、純銅","スラグ、粗銅","スラグ、純銅"],"explain":"黄銅鉱CuFeS₂を溶鉱炉で空気とともに加熱すると[ 鉄や硫黄 ]が取り除かれ[ 粗銅 ](Cu純度約99％)が得られる。\n★これをさらに電解精錬すると純度99.99％の純銅が得られます。★粗銅(そどう)は純度約99％。純銅(じゅんどう)は純度99.99％。"},{"q":"銅鉱CuFeS₂から得られた粗銅(Cu純度約99％)を[____]することにより純銅(純度99.99％)を得ている。","answer":"電解精錬","choices":["電解精錬","融解塩電解","水溶液の電気分解","分留"],"explain":"銅鉱CuFeS₂から得られた粗銅(Cu純度約99％)を[ 電解精錬 ]することにより純銅(純度99.99％)を得ている。\n★粗銅をイオン化して不純物を取り除いて純銅としています。"},{"q":"銅の電解精錬では、陽極に[____]、陰極に[____]として、硫酸酸性の硫酸銅(II)水溶液中で約0.3Vの電圧をかけて電気分解を行う。","answer":"粗銅板、純銅板","choices":["粗銅板、純銅板","粗銅板、粗銅板","純銅板、粗銅板","純銅板、純銅板"],"explain":"銅の電解精錬では、陽極に[ 粗銅板 ]、陰極に[ 純銅板 ]として、硫酸酸性の硫酸銅(II)水溶液中で約0.3Vの電圧をかけて電気分解を行う。\n★陽極では電源の正極へe⁻が移動します。陰極では電源の負極からe⁻が供給されます。陽極から銅(II)イオンCu²⁺が水溶液中へ溶け出し、陰極でCu²⁺がe⁻を2つ受け取ります。"},{"q":"銅の電解精錬では、水溶液中のZn、Fe、Niなどは[____]。これらの金属は銅Cuよりイオン化傾向が[____]ためである。","answer":"陽イオンとなる、大きい","choices":["陽イオンとなる、大きい","陽イオンとなる、小さい","陽極の下に沈殿する、小さい","陽極の下に沈殿する、大きい"],"explain":"銅の電解精錬では、水溶液中のZn、Fe、Niなどは[ 陽イオンとなる ]。これらの金属は銅Cuよりイオン化傾向が[ 大きい ]ためである。\n★イオン化傾向(大＞小)\n〜Mg Al Zn Fe Ni Sn Pb \nH₂ Cu Hg Ag Pt Au\nゴロ: 〜まああてにするなひどすぎる借金"},{"q":"銅の電解精錬では、水溶液中のAu、Agなどは[____]。これらの金属は銅Cuよりイオン化傾向が[____]ためである。","answer":"陽極の下に沈殿する、小さい","choices":["陽極の下に沈殿する、小さい","陽極の下に沈殿する、大きい","陽イオンとなる、大きい","陽イオンとなる、小さい"],"explain":"銅の電解精錬では、水溶液中のAu、Agなどは[ 陽極の下に沈殿する ]。これらの金属は銅Cuよりイオン化傾向が[ 小さい ]ためである。\n★イオン化傾向(大＞小)\n〜Mg Al Zn Fe Ni Sn Pb \nH₂ Cu Hg Ag Pt Au\nゴロ: 〜まああてにするなひどすぎる借金"},{"q":"銅の電解精錬では、水溶液中のAu、Agなどが陽極の下に単体のまま沈殿する。これを[____]という。","answer":"陽極泥","choices":["陽極泥","スラグ","氷晶石","不動態"],"explain":"銅の電解精錬では、水溶液中のAu、Agなどが陽極の下に単体のまま沈殿する。これを[ 陽極泥 ]という。\n★銅Cuよりイオン化傾向が小さい金属(Hg Ag Pt Au)は単体となり沈殿します。"},{"q":"銅の電解精錬において、陽極でのイオン反応式は、[____]","answer":"Cu → Cu²⁺ + 2e⁻","choices":["Cu → Cu²⁺ + 2e⁻","Cu → Cu⁺ + e⁻","Cu²⁺ + 2e⁻ → Cu","Cu⁺ + e⁻ → Cu"],"explain":"銅の電解精錬において、陽極でのイオン反応式は、\nCu → Cu²⁺ + 2e⁻\n★陽極では粗銅がイオン化し、e⁻が電源の正極へ移動し、Cu²⁺が水溶液中へ溶けます。★陰極ではe⁻が電源の負極から供給され、水溶液中のCu²⁺とe⁻が結びつきCu(純銅)となります。"},{"q":"銅の電解精錬において、陰極でのイオン反応式は、[____]","answer":"Cu²⁺ + 2e⁻ → Cu","choices":["Cu²⁺ + 2e⁻ → Cu","Cu⁺ + e⁻ → Cu","Cu → Cu²⁺ + 2e⁻","Cu → Cu⁺ + e⁻"],"explain":"銅の電解精錬において、陰極でのイオン反応式は、\nCu²⁺ + 2e⁻ → Cu\n★陽極では粗銅がイオン化し、e⁻が電源の正極へ移動し、Cu²⁺が水溶液中へ溶けます。★陰極では電源の負極からe⁻が供給され、水溶液中のCu²⁺とe⁻が結びつきCu(純銅)となります。"},{"q":"銅は光沢のある[____](色)の金属で、[____]に富む。","answer":"赤色、延性・展性","choices":["赤色、延性・展性","赤色、絶縁性・耐熱性","銀白色、延性・展性","銀白色、絶縁性・耐熱性"],"explain":"銅は光沢のある[ 赤色 ]の金属で、[ 延性・展性 ]に富む。\n★延性は金、銀、白金、鉄、ニッケル、銅の順で6番目、展性は、金、銀、鉛、銅の順で4番目に位置付けています。"},{"q":"銅は銀に次いで2番目に[____](性)が高い。","answer":"電気伝導性","choices":["電気伝導性","熱伝導性","絶縁性","耐熱性"],"explain":"銅は銀に次いで2番目に[ 電気伝導性 ]が高い。\n★電気伝導性は銀、銅、金、アルミニウム、鉄の順です。★熱伝導性はカーボンナノチューブ、ダイヤモンド、銀、銅、金、アルミニウムの順です。"},{"q":"銅は[____](性)も大きいことから、調理器具などにも用いられている。","answer":"熱伝導性","choices":["熱伝導性","電気伝導性","絶縁性","耐熱性"],"explain":"銅は[ 熱伝導性 ]も大きいことから、調理器具などにも用いられている。\n★炊飯器の釜、やかん、湯たんぽ、マグカップなどに使われています。★熱伝導性はカーボンナノチューブ、ダイヤモンド、銀、銅、金、アルミニウムの順です。"},{"q":"銅は湿った空気中で徐々にCu₂Oの皮膜を生じ、数ヶ月〜数年と長時間経過すると緑色のさびとなる。これを[____]といい、化学式は[____]である。","answer":"緑青、CuCO₃・Cu(OH)₂","choices":["緑青、CuCO₃・Cu(OH)₂","緑青、CuSO₄・5H₂O","べんがら、CuCO₃・Cu(OH)₂","べんがら、CuSO₄・5H₂O"],"explain":"銅は湿った空気中で徐々にCu₂Oの皮膜を生じ、数ヶ月〜数年と長時間経過すると緑色のさびとなる。これを[ 緑青 ]といい、化学式は[ CuCO₃・Cu(OH)₂ ]である。\n★Cuが空気中のO₂、CO₂、H₂Oと1つずつ結合するイメージで覚えています。★大気中のSO₂やH₂Sと結びついたCuSO₄・3Cu(OH)₂もあります(高校教科書より)。"},{"q":"銅は塩酸や希硫酸に[____]、硝酸や熱濃硫酸に[____]。","answer":"溶けず、溶ける","choices":["溶けず、溶ける","溶けず、溶けない","溶け、溶ける","溶け、溶けない"],"explain":"銅は塩酸や希硫酸に[ 溶けず ]、硝酸や熱濃硫酸に[ 溶ける ]。\n★銅Cuはイオン化傾向が水素H₂より小さいので塩酸や希硫酸には溶けません。★酸化力の強い酸には溶け、希硝酸でNO、濃硝酸でNO₂、熱濃硫酸でSO₂を生じます。"},{"q":"銅は[____]と反応して、一酸化窒素NOを生じる。","answer":"希硝酸","choices":["希硝酸","濃硝酸","熱濃硫酸","希硫酸"],"explain":"銅は[ 希硝酸 ]と反応して、一酸化窒素NOを生じる。\n★銅Cuはイオン化傾向が水素H₂より小さいので塩酸や希硫酸には溶けません。★酸化力の強い酸には溶け、希硝酸でNO、濃硝酸でNO₂、熱濃硫酸でSO₂を生じます。\n★3Cu + 8HNO₃ → 3Cu(NO₃)₂ + 4H₂O + 2NO"},{"q":"銅は[____]と反応して、二酸化窒素NO₂を生じる。","answer":"濃硝酸","choices":["濃硝酸","希硝酸","熱濃硫酸","希硫酸"],"explain":"銅は[ 濃硝酸 ]と反応して、二酸化窒素NO₂を生じる。\n★銅Cuはイオン化傾向が水素H₂より小さいので塩酸や希硫酸には溶けません。★酸化力の強い酸には溶け、希硝酸でNO、濃硝酸でNO₂、熱濃硫酸でSO₂を生じます。\n★Cu + 4HNO₃ → Cu(NO₃)₂ + 2H₂O + 2NO₂"},{"q":"銅は[____]と反応して、二酸化硫黄SO₂を生じる。","answer":"熱濃硫酸","choices":["熱濃硫酸","希硝酸","濃硝酸","希硫酸"],"explain":"銅は[ 熱濃硫酸 ]と反応して、二酸化硫黄SO₂を生じる。\n★銅Cuはイオン化傾向が水素H₂より小さいので塩酸や希硫酸には溶けません。★酸化力の強い酸には溶け、希硝酸でNO、濃硝酸でNO₂、熱濃硫酸でSO₂を生じます。\n★Cu + 2H₂SO₄ → CuSO₄ + 2H₂O + SO₂ (加熱必要)"},{"q":"銅と亜鉛の合金を[____]という。","answer":"黄銅","choices":["黄銅","青銅","白銅","緑青"],"explain":"銅と亜鉛の合金を[ 黄銅 ]という。\n★黄銅(こうどう、おうどう)と読みます。真鍮(しんちゅう)ともいいます。五円玉や金管楽器(トランペットなど)に使われています。★連想、亜鉛の亜には五円玉の五が隠れている気がします(漢字の形)。五円玉の色から黄銅と答えやすいと思います。"},{"q":"銅とスズの合金を[____]という。","answer":"青銅","choices":["青銅","黄銅","白銅","緑青"],"explain":"銅とスズの合金を[ 青銅 ]という。\n★青銅(せいどう)はブロンズとも呼ばれます。★連想、スズとブロンズの「ズ」が韻を踏んでいます。スズの含有量が多くなると赤銅色から白銀色へ近くなります。10円玉にも使用されています(Cu95％、Sn2％、Zn3％)。\n★比較：銅Cuと亜鉛Znの合金は黄銅で5円玉、銅CuとニッケルNiの合金は白銅で50円玉と100円玉です。"},{"q":"銅とニッケルとの合金を[____]という。","answer":"白銅","choices":["白銅","青銅","黄銅","緑青"],"explain":"銅とニッケルとの合金を[ 白銅 ]という。\n★50円玉と100円玉、楽器などに利用されています。★連想、白銅の白という漢字にニッケルの「ニ」が隠れている気がします(漢字の形)。"},{"q":"銅を空気中で加熱すると1000°C以下の低温では[____](色)の[____]になる。","answer":"黒色、酸化銅(II)CuO","choices":["黒色、酸化銅(II)CuO","黒色、酸化銅(I)Cu₂O","赤色、酸化銅(I)Cu₂O","赤色、酸化銅(II)CuO"],"explain":"銅を空気中で加熱すると1000°C以下の低温では[ 黒色 ]の[ 酸化銅(II)CuO ]になる。\n★1000°C以上の高温では赤色の酸化銅(I)Cu₂Oになります。★Cuの割合が多い方が赤っぽいと覚えます。"},{"q":"銅を空気中で加熱すると1000°C以上の高温では[____](色)の[____]になる。","answer":"赤色、酸化銅(I)Cu₂O","choices":["赤色、酸化銅(I)Cu₂O","赤色、酸化銅(II)CuO","黒色、酸化銅(II)CuO","黒色、酸化銅(I)Cu₂O"],"explain":"銅を空気中で加熱すると1000°C以上の高温では[ 赤色 ]の[ 酸化銅(I)Cu₂O ]になる。\n★1000°C以下の低温では黒色の酸化銅(II)CuOになります。★Cuの割合が多い方が赤っぽいと覚えます。"},{"q":"銅を熱濃硫酸に溶かすと、[____]と[____]が生成する。","answer":"硫酸銅(II)CuSO₄、二酸化硫黄SO₂","choices":["硫酸銅(II)CuSO₄、二酸化硫黄SO₂","硫酸銅(II)CuSO₄、三酸化硫黄SO₃","亜硫酸銅(II)CuSO₃、二酸化硫黄SO₂","亜硫酸銅(II)CuSO₃、三酸化硫黄SO₃"],"explain":"銅を熱濃硫酸に溶かすと、[ 硫酸銅(II)CuSO₄ ]と[ 二酸化硫黄SO₂ ]が生成する。\n★Cu + 2H₂SO₄ → CuSO₄ + 2H₂O + SO₂ (加熱必要)"},{"q":"Cu + 2H₂SO₄ → [____]","answer":"CuSO₄ + 2H₂O + SO₂ (加熱必要)","choices":["CuSO₄ + 2H₂O + SO₂ (加熱必要)","CuSO₄ + 2H₂O + SO₂ (加熱なし)","CuSO₄ + H₂O + SO₃ (加熱必要)","CuSO₄ + H₂O + SO₃ (加熱なし)"],"explain":"Cu + 2H₂SO₄ → CuSO₄ + 2H₂O + SO₂ (加熱必要)\n★H₂SO₄は熱濃硫酸なので加熱が必要になります。"},{"q":"硫酸銅(II)水溶液から結晶を析出させると、[____]の[____]が得られる。","answer":"青色結晶、硫酸銅(II)五水和物","choices":["青色結晶、硫酸銅(II)五水和物","青色結晶、硫酸銅(II)無水物","白色粉末、硫酸銅(II)五水和物","白色粉末、硫酸銅(II)無水物"],"explain":"硫酸銅(II)水溶液から結晶を析出させると、[ 青色結晶 ]の[ 硫酸銅(II)五水和物 ]が得られる。\n★CuSO₄・5H₂Oが析出します。150°C以上に加熱すると無水物になります。\n★分子量250。Cuは64、SO₄は96、H₂Oが5つで18×5=90。"},{"q":"硫酸銅(II)水溶液から結晶を析出させ、150°C以上に加熱すると、[____]の[____]が得られる。","answer":"白色粉末、硫酸銅(II)無水物","choices":["白色粉末、硫酸銅(II)無水物","白色粉末、硫酸銅(II)五水和物","青色結晶、硫酸銅(II)五水和物","青色結晶、硫酸銅(II)無水物"],"explain":"硫酸銅(II)水溶液から結晶を析出させ、150°C以上に加熱すると、[ 白色粉末 ]の[ 硫酸銅(II)無水物 ]が得られる。\n★CuSO₄。水を吸収すると青色結晶の硫酸銅(II)五水和物になります。"},{"q":"硫酸銅(II)五水和物CuSO₄・5H₂Oの構造について、4つのH₂OはCu²⁺を囲むように正方形の頂点上から[____](結合)をしている。残りの1つは[____](結合)をしている。","answer":"配位結合、水素結合","choices":["配位結合、水素結合","配位結合、共有結合","水素結合、配位結合","水素結合、共有結合"],"explain":"硫酸銅(II)五水和物CuSO₄・5H₂Oの構造について、4つのH₂OはCu²⁺を囲むように正方形の頂点上から[ 配位結合 ]をしている。残りの1つは[ 水素結合 ]をしている。\n★4つの配位水の正方形の上下にはSO₄²⁻が1つずつ配位結合しています。水素結合でくっつくH₂OはSO₄²⁻と配位結合のH₂Oの両方へ水素結合を作ります。"},{"q":"硫酸銅(II)無水物をさらに熱すると、[____]と[____]へ分解される。","answer":"酸化銅(II)CuO、三酸化硫黄SO₃","choices":["酸化銅(II)CuO、三酸化硫黄SO₃","酸化銅(II)CuO、二酸化硫黄SO₂","酸化銅(I)Cu₂O、三酸化硫黄SO₃","酸化銅(I)Cu₂O、二酸化硫黄SO₂"],"explain":"硫酸銅(II)無水物をさらに熱すると、[ 酸化銅(II)CuO ]と[ 三酸化硫黄SO₃ ]へ分解される。\n★CuSO₄ → CuO + SO₃"},{"q":"銅(II)イオンCu²⁺を含む水溶液に塩基の水溶液を加えると、[____]の[____]が生じる。","answer":"水酸化銅(II)Cu(OH)₂、青白色沈殿","choices":["水酸化銅(II)Cu(OH)₂、青白色沈殿","水酸化銅(II)Cu(OH)₂、白色沈殿","酸化銅(II)CuO、黒色沈殿","酸化銅(II)CuO、赤褐色沈殿"],"explain":"銅(II)イオンCu²⁺を含む水溶液に塩基の水溶液を加えると、[ 水酸化銅(II)Cu(OH)₂ ]の[ 青白色沈殿 ]が生じる。\n★Cu²⁺ + 2OH⁻ → Cu(OH)₂\n★塩基はNaOHaqやアンモニア水を想定します。★酸を加えると元に戻ります。"},{"q":"銅(II)イオンCu²⁺を含む水溶液に水酸化ナトリウム水溶液を過剰に加えると、[____]の[____]が生じる。","answer":"水酸化銅(II)Cu(OH)₂、青白色沈殿","choices":["水酸化銅(II)Cu(OH)₂、青白色沈殿","水酸化銅(II)Cu(OH)₂、白色沈殿","テトラアンミン銅(II)イオン、深青色溶液","テトラアンミン銅(II)イオン、白色溶液"],"explain":"銅(II)イオンCu²⁺を含む水溶液に水酸化ナトリウム水溶液を過剰に加えると、[ 水酸化銅(II)Cu(OH)₂ ]の[ 青白色沈殿 ]が生じる。\n★Cu²⁺ + 2OH⁻ → Cu(OH)₂\n★NaOHaqを加えるとCu(OH)₂の青白色沈殿が生じ、過剰に加えても変化はありません。"},{"q":"銅(II)イオンCu²⁺を含む水溶液にアンモニア水を過剰に加えると、[____]の[____]が生じる。","answer":"テトラアンミン銅(II)イオン、深青色溶液","choices":["テトラアンミン銅(II)イオン、深青色溶液","テトラアンミン銅(II)イオン、白色溶液","水酸化銅(II)Cu(OH)₂、青白色沈殿","水酸化銅(II)Cu(OH)₂、白色沈殿"],"explain":"銅(II)イオンCu²⁺を含む水溶液にアンモニア水を過剰に加えると、[ テトラアンミン銅(II)イオン ]の[ 深青色溶液 ]が生じる。\n★Cu²⁺ + 2OH⁻ → Cu(OH)₂\n★アンモニア水を加えるとCu(OH)₂の青白色沈殿が生じ、過剰に加えるとテトラアンミン銅(II)イオン[Cu(NH₃)₄]²⁺の深青色溶液となります。"},{"q":"水酸化銅(II)に酸を加えると、[____]の[____]が生じる。","answer":"銅(II)イオンCu²⁺、青色溶液","choices":["銅(II)イオンCu²⁺、青色溶液","銅(II)イオンCu²⁺、黄緑色溶液","テトラアンミン銅(II)イオン、深青色溶液","テトラアンミン銅(II)イオン、白色溶液"],"explain":"水酸化銅(II)に酸を加えると、[ 銅(II)イオンCu²⁺ ]の[ 青色溶液 ]が生じる。\n★Cu(OH)₂ + 2H⁺ → Cu²⁺ + 2H₂O\n★塩基を加えると元に戻ります。"},{"q":"水酸化銅(II)を加熱すると、[____]の[____]が生じる。","answer":"酸化銅(II)CuO、黒色沈殿","choices":["酸化銅(II)CuO、黒色沈殿","酸化銅(II)CuO、赤色沈殿","酸化銅(I)Cu₂O、黒色沈殿","酸化銅(I)Cu₂O、赤色沈殿"],"explain":"水酸化銅(II)を加熱すると、[ 酸化銅(II)CuO ]の[ 黒色沈殿 ]が生じる。\n★Cu(OH)₂ → CuO + H₂O\n★1000°C以上ではないと考えてCuOを選びます。Cuの割合が少ないので黒色です。酸化銅(I)Cu₂Oは赤色です。"},{"q":"酸化銅(II)CuOに酸を加えると、[____]の[____]が生じる。","answer":"銅(II)イオンCu²⁺、青色溶液","choices":["銅(II)イオンCu²⁺、青色溶液","銅(II)イオンCu²⁺、黄緑色溶液","テトラアンミン銅(II)イオン、深青色溶液","テトラアンミン銅(II)イオン、白色溶液"],"explain":"酸化銅(II)CuOに酸を加えると、[ 銅(II)イオンCu²⁺ ]の[ 青色溶液 ]が生じる。\n★CuO + 2H⁺ → Cu²⁺ + H₂O\n★「酸H⁺を加える」では水溶液中、「水素で還元」では固体を想定します。"},{"q":"酸化銅(II)CuOを水素などで還元すると、[____]の[____]が生じる。","answer":"銅の単体、赤色固体","choices":["銅の単体、赤色固体","銅(II)イオンCu²⁺、青色溶液","水酸化銅(II)Cu(OH)₂、青白色沈殿","テトラアンミン銅(II)イオン、深青色溶液"],"explain":"酸化銅(II)CuOを水素などで還元すると、[ 銅の単体 ]の[ 赤色固体 ]が生じる。\n★CuO + H₂ → Cu + H₂O(加熱必要)\n★炭素Cで還元することもできます。\n2CuO + C → 2Cu + CO₂ (加熱必要)\n★「酸H⁺を加える」では水溶液中、「水素で還元」では固体を想定します。"},{"q":"銅(II)イオンCu²⁺を含む水溶液に硫化水素H₂Sを加えると、[____]の[____]が生じる。","answer":"硫化銅(II)CuS、黒色沈殿","choices":["硫化銅(II)CuS、黒色沈殿","硫化銅(II)CuS、黄色沈殿","酸化銅(II)CuO、黒色沈殿","酸化銅(II)CuO、赤色沈殿"],"explain":"銅(II)イオンCu²⁺を含む水溶液に硫化水素H₂Sを加えると、[ 硫化銅(II)CuS ]の[ 黒色沈殿 ]が生じる。\n★Cu²⁺ + S²⁻ → CuS\n★Cu²⁺ + H₂S → CuS + 2H⁺\n溶液の液性によらずCuSの黒色沈殿が生じます。"},{"q":"銅(II)イオンCu²⁺を含む水溶液に濃塩酸HClを加えると、[____]の[____]が生じる。","answer":"テトラクロリド銅(II)酸イオン、黄緑色溶液","choices":["テトラクロリド銅(II)酸イオン、黄緑色溶液","テトラクロリド銅(II)酸イオン、青色溶液","テトラアンミン銅(II)イオン、黄緑色溶液","テトラアンミン銅(II)イオン、深青色溶液"],"explain":"銅(II)イオンCu²⁺を含む水溶液に濃塩酸HClを加えると、[ テトラクロリド銅(II)酸イオン ]の[ 黄緑色溶液 ]が生じる。\n★Cu²⁺は青色、[CuCl₄]²⁻は黄緑色です。"}]},
  {"code":"MD06","name":"鉄Fe","parent":"遷移元素","questions":[{"q":"銀Agの酸化数は主に[____]と[____]が考えられるが、ほとんどが化合物中で酸化数[____]をとる。","answer":"+1、+3、+1","choices":["+1、+3、+1","+1、+3、+3","+2、+3、+2","+2、+3、+3"],"explain":"銀Agの酸化数は主に[ +1 ]と[ +3 ]が考えられるが、ほとんどが化合物中で酸化数[ +1 ]をとる。\n★酸化数+2の銀もありますが、さらに不安定です。"},{"q":"銀は[____](色)の光沢のある金属であり、[____]。","answer":"銀白色、サビにくい","choices":["銀白色、サビにくい","銀白色、サビやすい","赤色、サビにくい","赤色、サビやすい"],"explain":"銀は[ 銀白色 ]の光沢のある金属であり、[ サビにくい ]。\n★イオン化傾向が小さく化学的な反応性の低い金属です。"},{"q":"銀は金に次いで[____](性)がある。","answer":"延性・展性","choices":["延性・展性","電気伝導性","熱伝導性","断熱性"],"explain":"銀は金に次いで[ 延性・展性 ]がある。\n★延性(えんせい)は金属が引き伸ばされる性質、展性(てんせい)は圧力や叩くことで広がる性質です。★延性は、金、銀、白金、鉄の順、展性は、金、銀、鉛、銅の順です。どちらも金、銀が1位、2位です。★熱伝導性と電気伝導性については金属中で銀が1位です(共に銀、銅、金の順)。"},{"q":"銀は金属中で最も高い[____](性)を示す。","answer":"熱伝導性","choices":["熱伝導性","延性・展性","絶縁性","断熱性"],"explain":"銀は金属中で最も高い[ 熱伝導性 ]を示す。\n★銀は電気伝導性と熱伝導性が最も高い金属です。★電気伝導性は銀、銅、金、アルミニウム、鉄の順です。★熱伝導性はカーボンナノチューブ、ダイヤモンド、銀、銅、金、アルミニウムの順です。"},{"q":"銀は金属中で最も高い[____](性)を示す。","answer":"電気伝導性","choices":["電気伝導性","延性・展性","絶縁性","断熱性"],"explain":"銀は金属中で最も高い[ 電気伝導性 ]を示す。\n★銀は電気伝導性と熱伝導性が最も高い金属です。★電気伝導性は銀、銅、金、アルミニウム、鉄の順です。★熱伝導性はカーボンナノチューブ、ダイヤモンド、銀、銅、金、アルミニウムの順です。"},{"q":"銀は塩酸や希硫酸に[____]、硝酸や熱濃硫酸に[____]。","answer":"溶けず、溶ける","choices":["溶けず、溶ける","溶けず、溶けない","溶け、溶ける","溶け、溶けない"],"explain":"銀は塩酸や希硫酸に[ 溶けず ]、硝酸や熱濃硫酸に[ 溶ける ]。\n★銀Agはイオン化傾向が水素H₂より小さいので塩酸や希硫酸には溶けません。★酸化力の強い酸には溶け、希硝酸でNO、濃硝酸でNO₂、熱濃硫酸でSO₂を生じます。"},{"q":"銀に希硝酸を加えると、[____](が発生する)。","answer":"一酸化窒素NO","choices":["一酸化窒素NO","二酸化窒素NO₂","二酸化硫黄SO₂","反応しない"],"explain":"銀に希硝酸を加えると、[ 一酸化窒素NO ]が発生する。\n★3Ag + 4HNO₃ → 3AgNO₃ + 2H₂O + NO"},{"q":"銀に濃硝酸を加えると、[____](が発生する)。","answer":"二酸化窒素NO₂","choices":["二酸化窒素NO₂","一酸化窒素NO","二酸化硫黄SO₂","反応しない"],"explain":"銀に濃硝酸を加えると、[ 二酸化窒素NO₂ ]が発生する。\n★Ag + 2HNO₃ → AgNO₃ + H₂O + NO₂"},{"q":"銀に熱濃硫酸を加えると、[____](が発生する)。","answer":"二酸化硫黄SO₂","choices":["二酸化硫黄SO₂","一酸化窒素NO","二酸化窒素NO₂","反応しない"],"explain":"銀に熱濃硫酸を加えると、[ 二酸化硫黄SO₂ ]が発生する。\n★2Ag + 2H₂SO₄ → Ag₂SO₄ + 2H₂O + SO₂"},{"q":"銀に希硫酸を加えると、[____](が発生する)。","answer":"反応しない","choices":["反応しない","二酸化窒素NO₂","一酸化窒素NO","二酸化硫黄SO₂"],"explain":"銀に希硫酸を加えると、[ 反応しない ]。\n★イオン化傾向が水素H₂より小さい金属(Cu、Hg、Ag、Pt、Au)は塩酸や希硫酸には溶けません。硝酸や熱濃硫酸などの強い酸には溶けます。"},{"q":"銀Agは湿った空気中で硫化水素H₂Sに触れると、[____](色)の[____]が生じる。","answer":"黒色、硫化銀Ag₂S","choices":["黒色、硫化銀Ag₂S","黒色、硫酸銀Ag₂SO₄","黄色、硫化銀Ag₂S","黄色、硫酸銀Ag₂SO₄"],"explain":"銀Agは湿った空気中で硫化水素H₂Sに触れると、[ 黒色 ]の[ 硫化銀Ag₂S ]が生じる。\n★2Ag + H₂S → Ag₂S + H₂\n★銀に硫黄Sの蒸気を触れさせてもAg₂Sが生じます。"},{"q":"硝酸銀は[____](色)の[____]である。","answer":"無色、板状結晶","choices":["無色、板状結晶","無色、油状沈殿","黄色、板状結晶","黄色、油状沈殿"],"explain":"硝酸銀は[ 無色 ]の[ 板状結晶 ]である。\n★銀と硝酸との反応で生じます。\n★銀と希硝酸\n3Ag + 4HNO₃ → 3AgNO₃ + 2H₂O + NO\n★銀と濃硝酸\nAg + 2HNO₃ → AgNO₃ + H₂O + NO₂"},{"q":"硝酸銀は無色の[____]で水に[____]。","answer":"板状結晶、よく溶ける","choices":["板状結晶、よく溶ける","板状結晶、溶けない","油状沈殿、よく溶ける","油状沈殿、溶けない"],"explain":"硝酸銀は無色の[ 板状結晶 ]で水に[ よく溶ける ]。\n★硝酸銀AgNO₃は銀と硝酸との反応で生じます。\n★銀と希硝酸\n3Ag + 4HNO₃ → 3AgNO₃ + 2H₂O + NO\n★銀と濃硝酸\nAg + 2HNO₃ → AgNO₃ + H₂O + NO₂"},{"q":"硝酸銀は光によって分解し銀を遊離する。この性質を[____](性)という。","answer":"感光性","choices":["感光性","熱伝導性","腐食性","延性・展性"],"explain":"硝酸銀は光によって分解し銀を遊離する。この性質を[ 感光性 ]という。\n★光での分解を防ぐため褐色瓶に保存します。★感光性のある化合物にハロゲン化銀AgXがあり、臭化銀AgBrが写真のフィルムや印画紙に利用されています。"},{"q":"硝酸銀は[____]に保存する。","answer":"褐色瓶","choices":["褐色瓶","ポリスチレン容器","デシケーター","水中"],"explain":"硝酸銀は[ 褐色瓶 ]に保存する。\n★感光性があり光で分解して銀を遊離します。光の入らない褐色瓶で保存します。"},{"q":"銀イオンAg⁺はハロゲン化物イオンX⁻と反応して、[____]を生じる。","answer":"ハロゲン化銀AgX","choices":["ハロゲン化銀AgX","銀アセチリドAgC≡CAg","硝酸銀AgNO₃","酸化銀Ag₂O"],"explain":"銀イオンAg⁺はハロゲン化物イオンX⁻と反応して、[ ハロゲン化銀AgX ]を生じる。\n★フッ化銀AgFは水に溶けます。他のハロゲン化銀は水中でも沈殿します。"},{"q":"ハロゲン化物イオンを含む水溶液に硝酸銀水溶液AgNO₃を加えると、[____]以外はハロゲン化銀の沈殿が生じる。","answer":"フッ化銀AgF","choices":["フッ化銀AgF","塩化銀AgCl","臭化銀AgBr","ヨウ化銀AgI"],"explain":"ハロゲン化物イオンを含む水溶液に硝酸銀水溶液AgNO₃を加えると、[ フッ化銀AgF ]以外はハロゲン化銀の沈殿を生じる。★ハロゲン化合物の例外の多くはフッ素化合物です。"},{"q":"フッ化銀AgFは[____](色)であり、水に[____]。","answer":"黄色、溶ける","choices":["黄色、溶ける","黄色、溶けない","白色、溶けない","白色、溶ける"],"explain":"フッ化銀AgFは[ 黄色 ]であり、水に[ 溶ける ]。\n★ハロゲン化銀ではフッ化銀AgFのみ水に溶けます。\n★フッ化銀AgF(黄色)の水溶液は無色透明です。"},{"q":"塩化銀AgClは[____](色)であり、水に[____]。","answer":"白色、溶けない","choices":["白色、溶けない","黄色、溶ける","黄色、溶けない","白色、溶ける"],"explain":"塩化銀AgClは[ 白色 ]であり、水に[ 溶けない ]。\n★ハロゲン化銀ではフッ化銀AgFのみ水に溶けます。"},{"q":"臭化銀AgBrは[____](色)であり、水に[____]。","answer":"淡黄色、溶けない","choices":["淡黄色、溶けない","黄色、溶ける","白色、溶けない","白色、溶ける"],"explain":"臭化銀AgBrは[ 淡黄色 ]であり、水に[ 溶けない ]。\n★ハロゲン化銀ではフッ化銀AgFのみ水に溶けます。"},{"q":"ヨウ化銀AgIは[____](色)であり、水に[____]。","answer":"黄色、溶けない","choices":["黄色、溶けない","黄色、溶ける","白色、溶けない","白色、溶ける"],"explain":"ヨウ化銀AgIは[ 黄色 ]であり、水に[ 溶けない ]。\n★ハロゲン化銀ではフッ化銀AgFのみ水に溶けます。"},{"q":"ハロゲン化銀のうち[____]は水に溶ける。","answer":"フッ化銀AgF","choices":["フッ化銀AgF","塩化銀AgCl","臭化銀AgBr","ヨウ化銀AgI"],"explain":"ハロゲン化銀のうち[ フッ化銀AgF ]は水に溶ける。\n★ハロゲン化合物の例外の多くはフッ素化合物です。"},{"q":"ハロゲン化銀は[____](性)があり、光が当たると分解し、銀Agが析出して[____](色)になる。","answer":"感光性、黒色","choices":["感光性、黒色","感光性、白色","吸湿性、黒色","吸湿性、白色"],"explain":"ハロゲン化銀は[ 感光性 ]があり、光が当たると分解し、銀Agが析出して[ 黒色 ]になる。\n★銀が細かく黒色に見えます。写真のフィルムなどに利用されています。"},{"q":"ハロゲン化銀は[____]に利用されている。","answer":"フィルム写真の感光剤","choices":["フィルム写真の感光剤","フェーリング液","ガラスの加工","めっき液"],"explain":"ハロゲン化銀は[ フィルム写真の感光剤 ]に利用されている。\n★「写真のフィルム」や「印画紙」などが出てきます。"},{"q":"硝酸銀AgNO₃水溶液は[____](色)である。","answer":"無色","choices":["無色","黄緑色","暗褐色","黄褐色"],"explain":"硝酸銀AgNO₃水溶液は[ 無色 ]である。\n★硝酸銀AgNO₃水溶液はAg⁺イオンを含む無色溶液と解釈します。"},{"q":"Ag⁺は水溶液中で[____](色)である。","answer":"無色","choices":["無色","黄緑色","青白色","黄褐色"],"explain":"Ag⁺は水溶液中で[ 無色 ]である。\n★硝酸銀AgNO₃水溶液の色はAg⁺イオンを含む無色溶液と解釈します。"},{"q":"無色の硝酸銀AgNO₃水溶液に塩基を少量加えると、酸化銀(I)Ag₂Oの[____]が生じる。","answer":"暗褐色沈殿","choices":["暗褐色沈殿","緑白色沈殿","白色沈殿","黄色沈殿"],"explain":"無色の硝酸銀AgNO₃水溶液に塩基を少量加えると、酸化銀(I)Ag₂Oの[ 暗褐色沈殿 ]が生じる。\n★X₂Oₓは「〜褐色」が多いですが(受験用)、酸化銅(I)Cu₂Oが例外です。\nAg₂O暗褐色(黒色)\nFe₂O₃赤褐色\nAg₂CrO₄赤褐色(暗赤色)。"},{"q":"酸化銀(I)Ag₂Oの暗褐色沈殿(黒色沈殿)が生じた溶液にアンモニア水を加えると、沈殿が溶けて[Ag(NH₃)₂]⁺の[____](色)の溶液になる。","answer":"無色","choices":["無色","青白色","赤褐色","黄色"],"explain":"酸化銀(I)Ag₂Oの暗褐色沈殿(黒色沈殿)が生じた溶液にアンモニア水を加えると、沈殿が溶けて[Ag(NH₃)₂]⁺の[ 無色 ]の溶液になる。\n★塩化銀(I)AgClの白色沈殿でも同様の反応です。★Ag⁺、AgNO₃aq、[Ag(NH₃)₂]⁺は無色溶液です。"},{"q":"フッ化銀(I)AgFは水溶液中で[____]である。","answer":"無色溶液","choices":["無色溶液","黄色沈殿","白色沈殿","淡黄色沈殿"],"explain":"フッ化銀(I)AgFは水溶液中で[ 無色溶液 ]である。\n★ハロゲン化銀のうちAgFは水に溶けます。\n★AgF(黄色)は溶けて無色溶液、\nAgClは白色沈殿、\nAgBrは淡黄色沈殿、\nAgIは黄色沈殿、です。"},{"q":"塩化銀(I)AgClは水溶液中で[____]である。","answer":"白色沈殿","choices":["白色沈殿","無色溶液","黄色沈殿","淡黄色沈殿"],"explain":"塩化銀(I)AgClは水溶液中で[ 白色沈殿 ]である。\n★AgF(黄色)は溶けて無色溶液、\nAgClは白色沈殿、\nAgBrは淡黄色沈殿、\nAgIは黄色沈殿、です。"},{"q":"臭化銀(I)AgBrは水溶液中で[____]である。","answer":"淡黄色沈殿","choices":["淡黄色沈殿","無色溶液","白色沈殿","黄色沈殿"],"explain":"臭化銀(I)AgBrは水溶液中で[ 淡黄色沈殿 ]である。\n★AgF(黄色)は溶けて無色溶液、\nAgClは白色沈殿、\nAgBrは淡黄色沈殿、\nAgIは黄色沈殿、です。"},{"q":"ヨウ化銀(I)AgIは水溶液中で[____]である。","answer":"黄色沈殿","choices":["黄色沈殿","無色溶液","白色沈殿","淡黄色沈殿"],"explain":"ヨウ化銀(I)AgIは水溶液中で[ 黄色沈殿 ]である。\n★AgF(黄色)は溶けて無色溶液、\nAgClは白色沈殿、\nAgBrは淡黄色沈殿、\nAgIは黄色沈殿、です。"},{"q":"水溶液中で沈殿となるAgCl、AgBr、AgIのうちアンモニア水に溶けるものは[____]である。","answer":"AgCl、AgBrの2つ","choices":["AgCl、AgBrの2つ","AgCl、AgBr、AgI","AgIのみ","AgBr、AgIの2つ"],"explain":"水溶液中で沈殿となるAgCl、AgBr、AgIのうちアンモニア水に溶けるものは[ AgCl、AgBrの2つ ]である。\n★AgClは「溶ける」、AgBrは「少し溶ける」と表現されます。\n★AgCl + 2NH₃ → [Ag(NH₃)₂]⁺ + Cl⁻\n★比較：チオ硫酸ナトリウムNa₂S₂O₃水溶液にはAgCl、AgBr、AgIの3つ全てが溶けます。"},{"q":"塩化銀(I)AgClの白色沈殿が生じた溶液にアンモニア水を加えると、沈殿が溶けて[Ag(NH₃)₂]⁺の[____](色)の溶液になる。","answer":"無色","choices":["無色","黄色","青白色","赤褐色"],"explain":"塩化銀(I)AgClの白色沈殿が生じた溶液にアンモニア水を加えると、沈殿が溶けて[Ag(NH₃)₂]⁺の[ 無色 ]の溶液になる。\n★酸化銀(I)Ag₂Oの暗褐色沈殿(黒色沈殿)でも同様の反応です。★Ag⁺、AgNO₃aq、[Ag(NH₃)₂]⁺は無色溶液です。"},{"q":"水溶液中で沈殿となるAgCl、AgBr、AgIのうちチオ硫酸ナトリウムNa₂S₂O₃水溶液に溶けるものは[____]である。","answer":"AgCl、AgBr、AgI","choices":["AgCl、AgBr、AgI","AgCl、AgBrの2つ","AgIのみ","AgBr、AgIの2つ"],"explain":"水溶液中で沈殿となるAgCl、AgBr、AgIのうちチオ硫酸ナトリウムNa₂S₂O₃水溶液に溶けるものは[ AgCl、AgBr、AgI ]である。\n★3つ全て溶けます。\n★AgBr + 2Na₂S₂O₃ → Na₃[Ag(S₂O₃)₂] + NaBr\n★比較：アンモニア水にはAgCl、AgBrの2つが溶けます。"},{"q":"塩化銀(I)AgClの白色沈殿が生じた溶液にチオ硫酸ナトリウムNa₂S₂O₃水溶液を加えると、沈殿が溶けて[Ag(S₂O₃)₂]³⁻の[____](色)の溶液になる。","answer":"無色","choices":["無色","黄色","青白色","赤褐色"],"explain":"塩化銀(I)AgClの白色沈殿が生じた溶液にチオ硫酸ナトリウムNa₂S₂O₃水溶液を加えると、沈殿が溶けて[Ag(S₂O₃)₂]³⁻の[ 無色 ]の溶液になる。\n★[Ag(S₂O₃)₂]³⁻はビス(チオスルファト)銀(I)酸イオンといいます。(まるかっこ)はジ(2)と同様の意味のビス(2)が(チオスルファトS₂O₃²⁻)全体にかかることを意味します。"},{"q":"銀Agは湿った空気中で硫化水素H₂Sと反応し、[____](色)の硫化銀Ag₂Sを生じる。","answer":"黒色","choices":["黒色","白色","淡赤色(ピンク)","黄色"],"explain":"銀Agは湿った空気中で硫化水素H₂Sと反応し、[ 黒色 ]の硫化銀Ag₂Sを生じる。\n★Ag⁺の水溶液と硫化水素H₂Sの反応でも硫化銀Ag₂Sの黒色沈殿を生じます。\n★硫化物は一般に黒色です。例外はZnSの白色、CdSの黄色、MnSのピンク(淡赤色、淡桃色)の3つ。ゴロ: 黒龍(硫化物は黒)の黄色い角(CdS)に刺さる白あん(ZnS)と桃マン(MnS)。絵を描くと覚えやすいです。(*余力があればSnS褐色、SnS₂黄色も覚えてください)。"},{"q":"Ag⁺はクロム酸カリウムK₂CrO₄水溶液中でAg₂CrO₄の[____]となる。","answer":"赤褐色沈殿","choices":["赤褐色沈殿","黄色沈殿","濃青色沈殿","白色沈殿"],"explain":"Ag⁺はクロム酸カリウムK₂CrO₄水溶液中でAg₂CrO₄の[ 赤褐色沈殿 ]となる。\n★クロム酸イオンCrO₄²⁻\nAg₂CrO₄は赤褐色沈殿(暗赤色沈殿)、\nBaCrO₄は黄色沈殿、\nPbCrO₄は黄色沈殿、です。\n★ゴロ: 苦労し(XCrO₄)て得た銀貨(Ag、赤褐色(暗赤色))で黄色いバナナ(黄色、Ba、Pb)を買う。"},{"q":"写真のフィルムには[____]が塗布されている。","answer":"臭化銀AgBr","choices":["臭化銀AgBr","硝酸銀AgNO₃","酸化銀(I)Ag₂O","硫化銀(I)AgS"],"explain":"写真のフィルムには[ 臭化銀AgBr ]が塗布されている。\n★連想：ブロマイド写真は臭化銀(I)(silver(I) bromide)の臭化物(bromide)からきています。印画紙をbromide paperといいます。"},{"q":"写真のフィルムが広い意味での現像されるまでの過程には、[____]がある。","answer":"感光→現像→定着","choices":["感光→現像→定着","感光→定着→現像","現像→定着→感光","現像→感光→定着"],"explain":"写真のフィルムが現像されるまでの過程には、[ 感光→現像→定着 ]がある。\n★感光:臭化銀AgBrが銀Agになる。\n★現像:銀Agが大きくなる。\n★定着:余った臭化銀AgBrを洗い流す。"},{"q":"写真のフィルムに光が当たると感光性により[____]が分解され、銀Agが遊離する。この過程を[____]という。","answer":"臭化銀AgBr、感光","choices":["臭化銀AgBr、感光","臭化銀AgBr、現像","硝酸銀AgNO₃、感光","硝酸銀AgNO₃、現像"],"explain":"写真のフィルムに光が当たると感光性により[ 臭化銀AgBr ]が分解され、銀Agが遊離する。この過程を[ 感光 ]という。\n★2AgBr → 2Ag + Br₂"},{"q":"写真のフィルムが感光性によりAgが遊離したところへ、[____]で処理すると銀の結晶の微粒子が大きくなる。この過程を[____]という。","answer":"還元剤、現像","choices":["還元剤、現像","還元剤、定着","チオ硫酸ナトリウム水溶液、現像","チオ硫酸ナトリウム水溶液、定着"],"explain":"写真のフィルムが感光性によりAgが遊離したところへ、[ 還元剤 ]で処理すると銀の結晶の微粒子が大きくなる。この過程を[ 現像 ]という。\n★Ag⁺ + e⁻ → Ag"},{"q":"現像の過程で、写真のフィルムに反応せずに残ったAgBrを[____]で溶かして除去する。この過程を[____]という。これによりさらなるAgBrの感光を防ぐことができる。","answer":"チオ硫酸ナトリウム水溶液、定着","choices":["チオ硫酸ナトリウム水溶液、定着","チオ硫酸ナトリウム水溶液、現像","還元剤、定着","還元剤、現像"],"explain":"現像の過程で、反応せずに残ったAgBrを[ チオ硫酸ナトリウム水溶液 ]で溶かして除去する。この過程を[ 定着 ]という。これによりさらなるAgBrの感光を防ぐことができる。\n★臭化銀AgBrはチオ硫酸ナトリウムNa₂S₂O₃水溶液に溶けます。"},{"q":"ジシアニド銀(I)酸イオン[Ag(CN)₂]⁻やビス(チオスルファト)銀(I)酸イオン[Ag(S₂O₃)₂]³⁻の水溶液は[____]として利用される。","answer":"めっき液","choices":["めっき液","フィルム写真の感光剤","フェーリング液","ガラスの加工"],"explain":"ジシアニド銀(I)酸イオン[Ag(CN)₂]⁻やビス(チオスルファト)銀(I)酸イオン[Ag(S₂O₃)₂]³⁻の水溶液は[ めっき液 ]として利用される。"},{"q":"銀よりイオン化傾向の大きい金属(亜鉛や銅など)は、[____]を[____]し、[____]を生じさせる。","answer":"銀イオン、還元、銀の単体","choices":["銀イオン、還元、銀の単体","銀イオン、酸化、銀の単体","銀の単体、還元、銀イオン","銀の単体、酸化、銀イオン"],"explain":"銀よりイオン化傾向の大きい金属(亜鉛や銅など)は、[ 銀イオン ]を[ 還元 ]し、[ 銀の単体 ]を生じさせる。\n★2Ag⁺ + Zn → 2Ag + Zn²⁺\n★2Ag⁺ + Cu → 2Ag + Cu²⁺\nAgの酸化数は+1→0と還元されています。"}]},
  {"code":"MD07","name":"CrとMn","parent":"遷移元素","questions":[{"q":"クロムCrは銀白色の硬い金属で、化合物中では主に[____]と[____]の酸化数をとり、酸化数が[____]の化合物は毒性が強い。","answer":"+3、+6、+6","choices":["+3、+6、+6","+3、+6、+3","+3、+7、+7","+3、+7、+3"],"explain":"クロムCrは銀白色の硬い金属で、化合物中ではおもに[ +3 ]と[ +6 ]の酸化数をとり、酸化数が[ +6 ]の化合物は毒性が強い。\n★酸化数+2、+3、+4、+5、+6の化合物がありますが、教科書や入試の範囲では+3と+6が扱われています。"},{"q":"クロムCrの単体はイオン化傾向が比較的大きいが、空気中では[____]をつくるため、(酸化され)[____]","answer":"酸化被膜、酸化されにくい","choices":["酸化被膜、酸化されにくい","酸化被膜、酸化されやすい","クロムめっき、酸化されにくい","クロムめっき、酸化されやすい"],"explain":"クロムCrの単体はイオン化傾向が比較的大きいが、空気中では[ 酸化被膜 ]をつくるため、[ 酸化されにくい ]。\n★「酸化されにくい」は「サビにくい」「腐食しにくい」などへも言い換えできます。★イオン化傾向はZn＞Cr＞Feに位置しますが空気中で不動態となり酸化被膜を作るためFeより錆びにくい金属です。"},{"q":"[____]と鉄Feのイオン化傾向はほぼ同じであるが、空気中で不動態となり表面に酸化被膜を作るため鉄Feより錆びにくい。蛇口などの鉄の表面に[____]を施し、鉄錆の防止に用いられている。","answer":"クロムCr、クロムめっき","choices":["クロムCr、クロムめっき","銀Ag、銀めっき","亜鉛Zn、トタン","スズSn、ブリキ"],"explain":"[ クロムCr ]と鉄Feのイオン化傾向はほぼ同じであるが、空気中で不動態となり表面に酸化被膜を作るため鉄Feより錆びにくい。蛇口などの鉄の表面に[ クロムめっき ]を施し、鉄錆の防止に用いられている。\n★Crのイオン化傾向はZn＞Cr＞Feに位置します。★単に金属に似せるためにプラスチックへのクロムめっきもあります。"},{"q":"クロム酸カリウムK₂CrO₄や二クロム酸カリウムK₂Cr₂O₇は、クロムCrの酸化数が[____]の化合物で(毒性が)[____]。","answer":"+6、毒性がある","choices":["+6、毒性がある","+6、毒性はない","+3、毒性がある","+3、毒性はない"],"explain":"クロム酸カリウムK₂CrO₄や二クロム酸カリウムK₂Cr₂O₇は、クロムCrの酸化数が[ +6 ]の化合物で[ 毒性がある ]。"},{"q":"クロム酸カリウムK₂CrO₄は[____]の固体である。","answer":"黄色","choices":["黄色","橙赤色","緑色","青色"],"explain":"クロム酸カリウムK₂CrO₄は[ 黄色 ]の固体である。\n★K₂CrO₄とCrO₄²⁻は黄色、K₂Cr₂O₇とCr₂O₇²⁻は橙赤色(赤系)です。"},{"q":"二クロム酸カリウムK₂Cr₂O₇は[____]の固体である。","answer":"橙赤色","choices":["橙赤色","黄色","緑色","青色"],"explain":"二クロム酸カリウムK₂Cr₂O₇は[ 橙赤色 ]の固体である。\n★K₂CrO₄とCrO₄²⁻は黄色、K₂Cr₂O₇とCr₂O₇²⁻は橙赤色(赤系)です。"},{"q":"クロム酸イオンCrO₄²⁻は水溶液中で[____](色)を示す。","answer":"黄色","choices":["黄色","橙赤色","緑色","青色"],"explain":"クロム酸イオンCrO₄²⁻は水溶液中で[ 黄色 ]を示す。\n★K₂CrO₄とCrO₄²⁻は黄色、K₂Cr₂O₇とCr₂O₇²⁻は橙赤色(赤系)です。"},{"q":"二クロム酸イオンCr₂O₇²⁻は水溶液中で[____](色)を示す。","answer":"橙赤色","choices":["橙赤色","黄色","緑色","青色"],"explain":"二クロム酸イオンCr₂O₇²⁻は水溶液中で[ 橙赤色 ]を示す。\n★K₂CrO₄とCrO₄²⁻は黄色、K₂Cr₂O₇とCr₂O₇²⁻は橙赤色(赤系)です。"},{"q":"クロム酸イオンCrO₄²⁻(黄色)を含む水溶液を[____](性)にすると二クロム酸イオンCr₂O₇²⁻(赤橙色)に変化する。","answer":"酸性","choices":["酸性","塩基性","中性","酸性もしくは中性"],"explain":"クロム酸イオンCrO₄²⁻(黄色)を含む水溶液を[ 酸性 ]にすると二クロム酸イオンCr₂O₇²⁻(赤橙色)に変化する。\n★2CrO₄²⁻ + 2H⁺ → Cr₂O₇²⁻ + H₂O\n★Cr₂O₇²⁻+ 2OH⁻ → 2CrO₄²⁻ + H₂O\n★H⁺が酸素Oを奪い、OH⁻が酸素Oを与えるイメージで判断しています。"},{"q":"二クロム酸イオンCr₂O₇²⁻(赤橙色)を含む水溶液を[____](性)にするとクロム酸イオンCrO₄²⁻(黄色)に変化する。","answer":"塩基性","choices":["塩基性","酸性","中性","酸性もしくは中性"],"explain":"二クロム酸イオンCr₂O₇²⁻(赤橙色)を含む水溶液を[ 塩基性 ]にするとクロム酸イオンCrO₄²⁻(黄色)に変化する。\n★2CrO₄²⁻ + 2H⁺ → Cr₂O₇²⁻ + H₂O\n★Cr₂O₇²⁻+ 2OH⁻ → 2CrO₄²⁻ + H₂O\n★H⁺が酸素Oを奪い、OH⁻が酸素Oを与えるイメージで判断しています。"},{"q":"Ag⁺はクロム酸カリウムK₂CrO₄水溶液中でAg₂CrO₄の[____]となる。","answer":"赤褐色沈殿","choices":["赤褐色沈殿","黄色沈殿","濃青色沈殿","白色沈殿"],"explain":"Ag⁺はクロム酸カリウムK₂CrO₄水溶液中でAg₂CrO₄の[ 赤褐色沈殿 ]となる。\n★クロム酸イオンCrO₄²⁻\nAg₂CrO₄は赤褐色沈殿(暗赤色沈殿)、\nBaCrO₄は黄色沈殿、\nPbCrO₄は黄色沈殿、です。\n★ゴロ: 苦労し(XCrO₄)て得た銀貨(Ag、赤褐色(暗赤色))で黄色いバナナ(黄色、Ba、Pb)を買う。"},{"q":"Ba²⁺はクロム酸カリウムK₂CrO₄水溶液中でBaCrO₄の[____]となる。","answer":"黄色沈殿","choices":["黄色沈殿","赤褐色沈殿","濃青色沈殿","白色沈殿"],"explain":"Ba²⁺はクロム酸カリウムK₂CrO₄水溶液中でBaCrO₄の[ 黄色沈殿 ]となる。\n★クロム酸イオンCrO₄²⁻\nAg₂CrO₄は赤褐色沈殿(暗赤色沈殿)、\nBaCrO₄は黄色沈殿、\nPbCrO₄は黄色沈殿、です。\n★ゴロ: 苦労し(XCrO₄)て得た銀貨(Ag、赤褐色(暗赤色))で黄色いバナナ(黄色、Ba、Pb)を買う。"},{"q":"Pb²⁺はクロム酸カリウムK₂CrO₄水溶液中でPbCrO₄の[____]となる。","answer":"黄色沈殿","choices":["黄色沈殿","赤褐色沈殿","濃青色沈殿","白色沈殿"],"explain":"Pb²⁺はクロム酸カリウムK₂CrO₄水溶液中でPbCrO₄の[ 黄色沈殿 ]となる。\n★クロム酸イオンCrO₄²⁻\nAg₂CrO₄は赤褐色沈殿(暗赤色沈殿)、\nBaCrO₄は黄色沈殿、\nPbCrO₄は黄色沈殿、です。\n★ゴロ: 苦労し(XCrO₄)て得た銀貨(Ag、赤褐色(暗赤色))で黄色いバナナ(黄色、Ba、Pb)を買う。"},{"q":"沈殿滴定でクロム酸カリウムを用いた塩化物イオンの沈殿滴定を特に、[____]と呼ぶ。","answer":"モール法","choices":["モール法","ニュートン法","クメン法","接触法"],"explain":"沈殿滴定でクロム酸カリウムを用いた塩化物イオンの沈殿滴定を特に、[ モール法 ]と呼ぶ。\n★モール法(Mohr’s method):例えば、クロム酸カリウム水溶液K₂CrO₄(黄色)を少量加え、塩化銀の沈殿生成が完了したときに、クロム酸銀Ag₂CrO₄の赤褐色沈殿が生じることで色の変化が確認できます。教科書の理論範囲で登場します。\n*他の選択肢、ニュートン法(数学、近似解)、クメン法(有機化学、フェノールの製法)、接触法(硫酸の製法)"},{"q":"硫酸酸性の二クロム酸カリウムK₂Cr₂O₇水溶液は[____](剤)であり、相手を酸化すると緑色の[____]となる。","answer":"強い酸化剤、Cr³⁺","choices":["強い酸化剤、Cr³⁺","強い酸化剤、Cr²⁺","強い還元剤、Cr³⁺","強い還元剤、Cr²⁺"],"explain":"硫酸酸性の二クロム酸カリウムK₂Cr₂O₇水溶液は[ 強い酸化剤 ]であり、相手を酸化すると緑色の[ Cr³⁺ ]となる。\n★クロムの酸化数は+3と+6を優先的に覚えます。\n★Cr₂O₇²⁻は赤橙色です。\n★半反応式\nCr₂O₇²⁻ + 14H⁺ + 6e⁻ → 2Cr³⁺ + 7H₂O"},{"q":"マンガンMnは銀白色の硬い金属で、化合物中では主に[____]の酸化数をとる。","answer":"+2、+4、+7","choices":["+2、+4、+7","+1、+4、+7","+2、+4、+8","+1、+4、+8"],"explain":"マンガンMnは銀白色の硬い金属で、化合物中では主に[ +2、+4、+7 ]の酸化数をとる。\n★マンガンMnは酸化数+2、+3、+4、+5、+6、+7をとります。教科書や入試で出てくるものは+2、+4、+7です。"},{"q":"酸化マンガン(IV)のマンガンの酸化数は[____]、過マンガン酸カリウムのマンガンの酸化数は[____]である。","answer":"+4、+7","choices":["+4、+7","+4、+8","+2、+7","+2、+8"],"explain":"酸化マンガン(IV)のマンガンの酸化数は[ +4 ]、過マンガン酸カリウムのマンガンの酸化数は[ +7 ]である。\n★酸化マンガン(IV)MnO₂\n★過マンガン酸カリウムKMnO₄\n★酸化マンガン(IV)の(IV)はマンガンの酸化数なので+4です。KMnO₄はOの酸化数を-2、K⁺からKは+1を記憶しておき、KMnO₄は\n(+1)+(Mnの酸化数)+(-2x4)=0を解きます。\n(Mnの酸化数) = +7。"},{"q":"酸化マンガン(IV)MnO₂は[____](剤)として乾電池の[____]に利用されている。","answer":"酸化剤、正極活物質","choices":["酸化剤、正極活物質","酸化剤、負極活物質","還元剤、正極活物質","還元剤、負極活物質"],"explain":"酸化マンガン(IV)MnO₂は[ 酸化剤 ]として乾電池の[ 正極活物質 ]に利用されている。\n★理論化学の電池の範囲です。"},{"q":"酸化マンガン(IV)MnO₂は過酸化水素水から酸素を発生させるとき[____]として働く。","answer":"触媒","choices":["触媒","酸化剤","冷却剤","還元剤"],"explain":"酸化マンガン(IV)MnO₂は過酸化水素水から酸素を発生させるとき[ 触媒 ]として働く。\n★2H₂O₂ → 2H₂O + O₂ (触媒 MnO₂)\n触媒がなくても反応はゆっくり進んでいきます。"},{"q":"酸化マンガン(IV)MnO₂は塩化水素から塩素を発生させるとき[____]として働く。","answer":"酸化剤","choices":["酸化剤","触媒","冷却剤","還元剤"],"explain":"酸化マンガン(IV)MnO₂は塩化水素から塩素を発生させるとき[ 酸化剤 ]として働く。\n★塩素の製法です。\n★MnO₂ + 4HCl → MnCl₂ + Cl₂ + 2H₂O\nMnの酸化数は+4→+2となり還元されています(相手Clを酸化しています)。"},{"q":"過マンガン酸カリウム水溶液は[____]に保存する。","answer":"褐色瓶","choices":["褐色瓶","ポリスチレン容器","デシケーター","水中"],"explain":"過マンガン酸カリウム水溶液は[ 褐色瓶 ]に保存する。\n★過マンガン酸カリウム水溶液KMnO₄を長期に空気にさらしておくと、熱、光、還元剤などにより二酸化マンガンへ変質する部分が出るため、褐色びん、冷暗所で保存します。(「過マンガン酸カリウム、褐色びん」などでネット検索してみてください)。"},{"q":"少量のマンガンを含む鋼は[____]と呼ばれる。鋼より硬く、電車のレールの分岐器(ポイント)などに利用されている。","answer":"マンガン鋼","choices":["マンガン鋼","ステンレス鋼","アルマイト","スラグ"],"explain":"少量のマンガンを含む鋼は[ マンガン鋼 ]と呼ばれる。鋼より硬く、電車のレールの分岐器(ポイント)などに利用されている。\n★鋼(こう、はがね)のうち、マンガンを1.5％前後含むものを(低)マンガン鋼、12％前後含むものを高マンガン鋼といいます。"},{"q":"酸化マンガン(IV)MnO₂は水に [____]、過マンガン酸カリウムKMnO₄は水に[____]。","answer":"溶けず、溶ける","choices":["溶けず、溶ける","溶けず、溶けない","溶け、溶ける","溶け、溶けない"],"explain":"酸化マンガン(IV)MnO₂は水に [ 溶けず ]、過マンガン酸カリウムKMnO₄は水に[ 溶ける ]。\n★MnO₂は主に黒色沈殿や黒色粉末(もしくは黒褐色)と説明されます。\n★KMnO₄は水に溶けてK⁺とMnO₄⁻へ電離します。"},{"q":"過マンガン酸カリウムの硫酸酸性溶液は強い酸化作用を示し、相手を酸化して[____](色)の[____]となる。","answer":"淡赤色、Mn²⁺","choices":["淡赤色、Mn²⁺","淡赤色、MnO₂(沈殿)","黒色、MnO₂(沈殿)","黒色、Mn²⁺"],"explain":"過マンガン酸カリウムの硫酸酸性溶液は強い酸化作用を示し、相手を酸化して[ 淡赤色 ]の[ Mn²⁺ ]となる。\n★Mn²⁺の淡赤色は「ピンク色」や「ほぼ無色」と書かれることもあります。★酸性中ではH⁺が酸素を全て奪うためMn²⁺になる(MnO₂にはならない)と考えます。\n★MnO₄⁻ + 8H⁺ + 5e⁻ → Mn²⁺ + 4H₂O"},{"q":"過マンガン酸カリウムの中性、塩基性溶液は酸化作用を示し、相手を酸化して[____](色)の[____]となる。","answer":"黒色、MnO₂(沈殿)","choices":["黒色、MnO₂(沈殿)","黒色、Mn²⁺","淡赤色、Mn²⁺","淡赤色、MnO₂(沈殿)"],"explain":"過マンガン酸カリウムの中性、塩基性溶液は酸化作用を示し、相手を酸化して[ 黒色 ]の[ MnO₂(沈殿) ]となる。\n★中性、塩基性溶液中ではH₂OやOH⁻が既に酸素Oをもち、H⁺ほど酸素Oを奪うことはないためMnO₂になる(Mn²⁺まではいかない)と考えます。\n★MnO₄⁻ + 2H₂O + 3e⁻ → MnO₂ + 4OH⁻"},{"q":"過マンガン酸カリウムの硫酸酸性溶液での半反応式は、\nMnO₄⁻ + 8H⁺ + 5e⁻ → [____]","answer":"Mn²⁺ + 4H₂O","choices":["Mn²⁺ + 4H₂O","MnO₂ + 4OH⁻","Mn²⁺ + 4OH⁻","MnO₂ + 4H₂O"],"explain":"過マンガン酸カリウムの硫酸酸性溶液での半反応式は、\nMnO₄⁻ + 8H⁺ + 5e⁻ → Mn²⁺ + 4H₂O\n★酸性中ではH⁺が酸素を全て奪うためMn²⁺になる(MnO₂にはならない)と考えます。OH⁻もH₂Oへ書き直します。\n★MnO₄⁻赤紫色、Mn²⁺淡赤色(ピンク色、ほぼ無色)\n★中性、塩基性溶液中では、\nMnO₄⁻ + 2H₂O + 3e⁻ → MnO₂ + 4OH⁻"},{"q":"過マンガン酸カリウムの中性、塩基性溶液での半反応式は、\nMnO₄⁻ + 2H₂O + 3e⁻ → [____]","answer":"MnO₂ + 4OH⁻","choices":["MnO₂ + 4OH⁻","Mn²⁺ + 4H₂O","MnO₂ + 4H₂O","Mn²⁺ + 4OH⁻"],"explain":"過マンガン酸カリウムの中性、塩基性溶液での半反応式は、\nMnO₄⁻ + 2H₂O + 3e⁻ → MnO₂ + 4OH⁻\n★MnO₄⁻の赤紫色がMnO₂の黒色沈殿へ変化します。★中性、塩基性溶液中ではH₂OやOH⁻が既に酸素Oをもち、H⁺ほど酸素Oを奪うことはないためMnO₂になる(Mn²⁺まではいかない)と考えます。\n★硫酸酸性溶液では、\nMnO₄⁻ + 8H⁺ + 5e⁻ → Mn²⁺ + 4H₂O"},{"q":"過マンガン酸カリウムの硫酸酸性溶液での半反応式は、\n[____] → Mn²⁺ + 4H₂O","answer":"MnO₄⁻ + 8H⁺ + 5e⁻","choices":["MnO₄⁻ + 8H⁺ + 5e⁻","MnO₄⁻ + 2H₂O + 3e⁻","MnO₄⁻ + 2H₂O + 5e⁻","MnO₄⁻ + 8H⁺ + 3e⁻"],"explain":"過マンガン酸カリウムの硫酸酸性溶液での半反応式は、\nMnO₄⁻ + 8H⁺ + 5e⁻ → Mn²⁺ + 4H₂O\n★硫酸酸性での半反応式にはH⁺が含まれると考えると解きやすくなります。★MnO₄⁻の赤紫色がMn²⁺の淡赤色(ピンク色、ほぼ無色)へ変化します。\n★中性、塩基性溶液中では、\nMnO₄⁻ + 2H₂O + 3e⁻ → MnO₂ + 4OH⁻"},{"q":"過マンガン酸カリウムの中性、塩基性溶液での半反応式は、\n[____] → MnO₂ + 4OH⁻","answer":"MnO₄⁻ + 2H₂O + 3e⁻","choices":["MnO₄⁻ + 2H₂O + 3e⁻","MnO₄⁻ + 8H⁺ + 5e⁻","MnO₄⁻ + 2H₂O + 5e⁻","MnO₄⁻ + 8H⁺ + 3e⁻"],"explain":"過マンガン酸カリウムの中性、塩基性溶液での半反応式は、\nMnO₄⁻ + 2H₂O + 3e⁻ → MnO₂ + 4OH⁻\n★特に塩基性下の半反応式にH⁺は含まれないと考えると解きやすくなります。★MnO₄⁻の赤紫色がMnO₂の黒色沈殿へ変化します。\n★硫酸酸性溶液では、\nMnO₄⁻ + 8H⁺ + 5e⁻ → Mn²⁺ + 4H₂O"},{"q":"酸化マンガン(IV)MnO₂は[____](色)粉末で水に溶けない。","answer":"黒褐色","choices":["黒褐色","淡赤色(ピンク色)","赤紫色","黒紫色"],"explain":"酸化マンガン(IV)MnO₂は[ 黒褐色 ]粉末で水に溶けない。\n★色と名称\nMnO₂黒褐色、酸化マンガン(IV)\nKMnO₄黒紫色、過マンガン酸カリウム\nMnO₄⁻赤紫色、過マンガン酸イオン\nMn²⁺淡赤色(ピンク色)、肉眼では無色\nMnの金属単体は銀白色。"},{"q":"過マンガン酸カリウムKMnO₄は[____](色)結晶で水に溶けて過マンガン酸イオンMnO₄⁻の[____](色)水溶液になる。","answer":"黒紫色、赤紫色","choices":["黒紫色、赤紫色","黒褐色、赤紫色","赤紫色、黒紫色","赤紫色、黒褐色"],"explain":"過マンガン酸カリウムKMnO₄は[ 黒紫色 ]結晶で水に溶けて過マンガン酸イオンMnO₄⁻の[ 赤紫色 ]水溶液になる。\n★両方へ紫系統を入れます。\n★色と名称\nMnO₂黒褐色、酸化マンガン(IV)\nKMnO₄黒紫色、過マンガン酸カリウム\nMnO₄⁻赤紫色、過マンガン酸イオン\nMn²⁺淡赤色(ピンク色)、肉眼では無色\nMnの金属単体は銀白色。"},{"q":"マンガン(II)イオンMn²⁺は水溶液中で[____](色)を示す。","answer":"淡赤色(ピンク色)","choices":["淡赤色(ピンク色)","黒褐色","赤紫色","黒紫色"],"explain":"マンガン(II)イオンMn²⁺は水溶液中で[ 淡赤色(ピンク色) ]を示す。\n★色と名称\nMnO₂黒褐色、酸化マンガン(IV)\nKMnO₄黒紫色、過マンガン酸カリウム\nMnO₄⁻赤紫色、過マンガン酸イオン\nMn²⁺淡赤色(ピンク色)、肉眼では無色\nMnの金属単体は銀白色。"}]},
  {"code":"MD08","name":"イオン分析1","parent":"遷移元素","questions":[{"q":"何種類かの金属イオンの混合水溶液から、各金属イオンを分類しその種類を確認する操作を金属イオンの[____]という。","answer":"系統分析","choices":["系統分析","塩析","元素分析","質量測定"],"explain":"何種類かの金属イオンの混合水溶液から、各金属イオンを分類しその種類を確認する操作を金属イオンの[ 系統分析 ]という。\n★金属イオンの系統分析は沈殿反応や溶解反応が利用されます。基本的に6つの手順が決まっています。1属〜6属と呼びます。"},{"q":"イオンや官能基、分子などを検出・確認する操作を[____]という。また、中和滴定や酸化還元滴定のような量を確認する操作を[____]という。","answer":"定性分析、定量分析","choices":["定性分析、定量分析","定性分析、元素分析","定量分析、定性分析","定量分析、元素分析"],"explain":"イオンや官能基、分子などを検出・確認する操作を[ 定性分析 ]という。また、中和滴定や酸化還元滴定のような量を確認する操作を[ 定量分析 ]という。"},{"q":"金属イオンの系統分析で希塩酸HClを加えるとき、沈殿を生じる金属イオンは[____]。","answer":"Hg₂²⁺、Ag⁺、Pb²⁺","choices":["Hg₂²⁺、Ag⁺、Pb²⁺","Li⁺、Na⁺、K⁺","Cu²⁺、Cd²⁺、Pb²⁺","Cr³⁺、Fe³⁺、Al³⁺"],"explain":"金属イオンの系統分析で希塩酸HClを加えるとき、沈殿を生じる金属イオンは[ Hg₂²⁺、Ag⁺、Pb²⁺ ]。\n★1属は1価の陽イオンです。★ゴロ: ひと苦労が好きな人。(1属、HCl、Hg₂²⁺、Ag⁺、Pb²⁺)*Hg₂Cl₂は私医用です(図説範囲)。"},{"q":"AgClとPbCl₂のうち、[____]は少し水に溶け、溶液中で加熱すると[____]となる。","answer":"PbCl₂、無色溶液","choices":["PbCl₂、無色溶液","PbCl₂、白色沈殿","AgCl、無色溶液","AgCl、白色沈殿"],"explain":"AgClとPbCl₂のうち、[ PbCl₂ ]は少し水に溶け、溶液中で加熱すると[ 無色溶液 ]となる。\n★塩酸HClで白色沈殿となったAgClとPbCl₂のうち、PbCl₂はわずかに溶液中に溶け、加熱すると無色溶液になります。AgClは熱湯でも溶けません。"},{"q":"金属イオンの系統分析において、希塩酸により酸性となった溶液に硫化水素H₂Sを加えるとき、沈殿を生じる金属イオンは[____]。","answer":"Cu²⁺、Cd²⁺、Pb²⁺","choices":["Cu²⁺、Cd²⁺、Pb²⁺","Hg₂²⁺、Ag⁺、Pb²⁺","Ag⁺、Cu²⁺、Ni²⁺、Zn²⁺","Ba²⁺、Ca²⁺、Sr²⁺、Pb²⁺"],"explain":"金属イオンの系統分析において、希塩酸により酸性となった溶液に硫化水素H₂Sを加えるとき、沈殿を生じる金属イオンは[ Cu²⁺、Cd²⁺、Pb²⁺ ]。\n★2属は2価の陽イオンです。CdSとSnS₂が黄色沈殿で残りは黒色沈殿です。★ゴロ: 兄さん龍(2属、酸性、硫化水素H₂S)、道路で銀貨とナス拾う(CuS、Ag₂S、CdS(黄色)、PbS、SnS、SnS₂(黄色)、HgS)★Ag⁺は先に1属で沈殿します。★PbCl₂は1属で沈殿しますが、溶解度が大きく一部ろ液中に残ります。残りのPb²⁺は2属でPbSとして沈殿します。"},{"q":"鉄イオンのうち[____]は硫化水素H₂Sにより[____]へ還元される。","answer":"Fe³⁺、Fe²⁺","choices":["Fe³⁺、Fe²⁺","Fe³⁺、Fe⁺","Fe²⁺、Fe³⁺","Fe²⁺、Fe⁺"],"explain":"鉄イオンのうち[ Fe³⁺ ]は硫化水素H₂Sにより[ Fe²⁺ ]へ還元される。\n★鉄(III)イオンFe³⁺は還元性の強い硫化水素H₂Sにより鉄(II)イオンFe²⁺へ還元されます。酸化数+3→+2。イオン分析の2属での反応なので+2になると覚えます。\n★比較：3属ではFe²⁺→Fe³⁺へ戻ります。"},{"q":"金属イオンの系統分析において、「溶液を煮沸して、希硝酸を加える」操作では、煮沸は[____]を取り除き、希硝酸は[____](する)役割がある。","answer":"H₂S、Fe²⁺をFe³⁺へ戻す","choices":["H₂S、Fe²⁺をFe³⁺へ戻す","H₂S、Fe³⁺をFe²⁺へ戻す","HCl、Fe²⁺をFe³⁺へ戻す","HCl、Fe³⁺をFe²⁺へ戻す"],"explain":"金属イオンの系統分析において、「溶液を煮沸して、希硝酸を加える」操作では、煮沸は[ H₂S ]を取り除き、希硝酸は[ Fe²⁺をFe³⁺へ戻す ]役割がある。\n★3属には①溶液を煮沸、②希硝酸を加える、③アンモニア水を十分に加える、の3つの行程があります。3価の陽イオン、特に、Cr³⁺、Fe³⁺、Al³⁺の3つが沈殿を生じると覚えます。(3つながり)。"},{"q":"適量の塩基(NaOH溶液やNH₃溶液)では「沈殿を生じない金属イオン」は[____]。","answer":"Li⁺、Na⁺、K⁺","choices":["Li⁺、Na⁺、K⁺","Hg₂²⁺、Ag⁺、Pb²⁺","Cu²⁺、Cd²⁺、Pb²⁺","Ag⁺、Cu²⁺、Ni²⁺、Zn²⁺"],"explain":"適量の塩基(NaOH溶液やNH₃溶液)では「沈殿を生じない金属イオン」は[ Li⁺、Na⁺、K⁺ ]。\n★アルカリ金属(周期表の一番左)はどんな陰イオンとも沈殿を作りません。特にLi⁺、Na⁺、K⁺の3つを覚えます。"},{"q":"適量の塩基(NaOH溶液やNH₃溶液)で沈殿を生じるが、過剰のNaOHaqにより沈殿が溶解し、錯イオンを生じる金属イオンは[____]。","answer":"Zn²⁺、Al³⁺、Sn²⁺、Pb²⁺","choices":["Zn²⁺、Al³⁺、Sn²⁺、Pb²⁺","Li⁺、Na⁺、K⁺","Cr³⁺、Fe³⁺、Al³⁺","Ag⁺、Cu²⁺、Ni²⁺、Zn²⁺"],"explain":"適量の塩基(NaOH溶液やNH₃溶液)で沈殿を生じるが、過剰のNaOHaqにより沈殿が溶解し、錯イオンを生じる金属イオンは[ Zn²⁺、Al³⁺、Sn²⁺、Pb²⁺ ]。\n★両性金属のZn²⁺、Al³⁺、Sn²⁺、Pb²⁺の4つは過剰の水酸化ナトリウムで錯イオンを形成します。(ゴロ: ああすんなり両性に好かれる。)\n★比較：過剰のアンモニア水で錯イオンとなり溶ける金属イオンは、Ag⁺、Cu²⁺、Ni²⁺、Zn²⁺(ゴロ: 銀、土、日はあんまり会えん)"},{"q":"適量の塩基(NaOH溶液やNH₃溶液)で沈殿を生じるが、過剰のアンモニア水により沈殿が溶解し、錯イオンを生じる金属イオンは[____]。","answer":"Ag⁺、Cu²⁺、Ni²⁺、Zn²⁺","choices":["Ag⁺、Cu²⁺、Ni²⁺、Zn²⁺","Zn²⁺、Al³⁺、Sn²⁺、Pb²⁺","Li⁺、Na⁺、K⁺","Cr³⁺、Fe³⁺、Al³⁺"],"explain":"適量の塩基(NaOH溶液やNH₃溶液)で沈殿を生じるが、過剰のアンモニア水により沈殿が溶解し、錯イオンを生じる金属イオンは[ Ag⁺、Cu²⁺、Ni²⁺、Zn²⁺ ]。\n★過剰のアンモニア水で溶解し錯イオンとなる金属イオンは、Ag⁺、Cu²⁺、Ni²⁺、Zn²⁺(ゴロ: 銀、土、日はあんまり会えん)\n★比較：両性金属のZn²⁺、Al³⁺、Sn²⁺、Pb²⁺の4つは過剰の水酸化ナトリウムで錯イオンを形成します。(ゴロ: ああすんなり両性に好かれる。)"},{"q":"金属イオンの系統分析において、溶液を煮沸して、希硝酸を加えたあと、アンモニア水を十分に加えるとき、沈殿を生じる金属イオンは[____]。","answer":"Cr³⁺、Fe³⁺、Al³⁺","choices":["Cr³⁺、Fe³⁺、Al³⁺","Hg₂²⁺、Ag⁺、Pb²⁺","Cu²⁺、Cd²⁺、Pb²⁺","Ag⁺、Cu²⁺、Ni²⁺、Zn²⁺"],"explain":"金属イオンの系統分析において、溶液を煮沸して、希硝酸を加えたあと、アンモニア水を十分に加えるとき、沈殿を生じる金属イオンは[ Cr³⁺、Fe³⁺、Al³⁺ ]。\n★3属は3価の陽イオン3つを覚えます。★ゴロ: 3番車両を追い出されたキショイ鉄兄さん(3属、煮沸で硫化水素を追い出し、希硝酸でFe²⁺をFe³⁺へ戻す)、アンモニアでミクロの手垢が白くなる(ある)。(十分なアンモニア水、緑白色Cr(OH)₃、水酸化鉄(III)赤褐色、白色Al(OH)₃)\n*新課程教科書(2025年度版)では「Fe(OH)₃」の表記がなくなり「水酸化鉄(III)」と日本語表記にするものと、便宜的に酸化水酸化鉄(III)のFeO(OH)をあてているものがあります。"},{"q":"過剰のアンモニア水で錯イオンを形成する金属イオンには[____]がある。","answer":"Ag⁺、Cu²⁺、Ni²⁺、Zn²⁺","choices":["Ag⁺、Cu²⁺、Ni²⁺、Zn²⁺","Zn²⁺、Al³⁺、Sn²⁺、Pb²⁺","Cu²⁺、Cd²⁺、Pb²⁺","Cr³⁺、Fe³⁺、Al³⁺"],"explain":"過剰のアンモニア水で錯イオンを形成する金属イオンには[ Ag⁺、Cu²⁺、Ni²⁺、Zn²⁺ ]がある。★確認問題です。\n★過剰のアンモニア水で沈殿が溶解し錯イオンとなる金属イオンは、Ag⁺、Cu²⁺、Ni²⁺、Zn²⁺(ゴロ: 銀、土、日はあんまり会えん)。\n★比較：3属で過剰のアンモニア水で「沈殿する」のはCr³⁺、Fe³⁺、Al³⁺です。(ゴロ: ミクロの手垢が白くある)"},{"q":"金属イオンの系統分析において、アンモニア水で塩基性となった溶液に硫化水素H₂Sを加えるとき、沈殿を生じる金属イオンは[____]。","answer":"Co²⁺、Zn²⁺、Mn²⁺、Ni²⁺","choices":["Co²⁺、Zn²⁺、Mn²⁺、Ni²⁺","Ba²⁺、Ca²⁺、Sr²⁺、Pb²⁺","Cu²⁺、Cd²⁺、Pb²⁺","Hg₂²⁺、Ag⁺、Pb²⁺"],"explain":"金属イオンの系統分析において、アンモニア水で塩基性となった溶液に硫化水素H₂Sを加えるとき、沈殿を生じる金属イオンは[ Co²⁺、Zn²⁺、Mn²⁺、Ni²⁺ ]。\n★4属は2価の陽イオンです。中性〜塩基性ではイオン化傾向でMn²⁺〜Ni²⁺です。★ゴロ: 4円で龍子があんまんを手に(4属、塩基性、硫化水素、CoS、ZnS(白色)、MnS(桃色)、FeS、NiS)。*Fe²⁺、Fe³⁺は先に3属で沈殿します。"},{"q":"硫化物の沈殿のうち、黄色沈殿は[____]とSnS₂、白色沈殿は[____]、桃色沈殿はMnSである。","answer":"CdS、ZnS","choices":["CdS、ZnS","CdS、PbS","CuS、ZnS","CuS、PbS"],"explain":"硫化物の沈殿のうち、黄色沈殿は[ CdS ]とSnS₂、白色沈殿は[ ZnS ]、桃色沈殿はMnSである。\n★硫化物XSは基本的に黒色沈殿です。例外を覚えます。\n★CdS、SnS、SnS₂は酸性の2属でも塩基性の4属でも沈殿します。ZnSとMnSは塩基性の4属で沈殿します。"},{"q":"金属イオンの系統分析において、炭酸アンモニウム(NH₄)₂CO₃水溶液を加えるとき、沈殿を生じる金属イオンは[____]。","answer":"Ba²⁺、Ca²⁺、Sr²⁺、Pb²⁺","choices":["Ba²⁺、Ca²⁺、Sr²⁺、Pb²⁺","Ag⁺、Cu²⁺、Ni²⁺、Zn²⁺","Cu²⁺、Cd²⁺、Pb²⁺","Zn²⁺、Al³⁺、Sn²⁺、Pb²⁺"],"explain":"金属イオンの系統分析において、炭酸アンモニウム(NH₄)₂CO₃水溶液を加えるとき、沈殿を生じる金属イオンは[ Ba²⁺、Ca²⁺、Sr²⁺、Pb²⁺ ]。\n★5属は特にBaCO₃とCaCO₃の白色沈殿です。★ゴロ: バカにするな白龍たん(Ba²⁺、Ca²⁺、Sr²⁺、Pb²⁺、白色沈殿、硫酸塩と炭酸塩)。*シュウ酸塩としても白色沈殿になります。"},{"q":"炭酸カルシウムCaCO₃は[____]で溶かすことができる。","answer":"塩酸HCl","choices":["塩酸HCl","シュウ酸(COOH)₂","硫酸H₂SO₄","炭酸H₂CO₃"],"explain":"炭酸カルシウムCaCO₃は[ 塩酸HCl ]で溶かすことができる。\n★Ca²⁺は硫酸カルシウムCaSO₄やシュウ酸カルシウムCaC₂O₄としても白色沈殿を生じます。\n★CaCO₃ + 2HCl → CaCl₂ + H₂O + CO₂"},{"q":"金属イオンの系統分析において、1属〜5属の操作で沈殿せずに溶液中に残った金属イオンは[____]で確認する。","answer":"炎色反応","choices":["炎色反応","チンダル現象","塩析","中和滴定"],"explain":"金属イオンの系統分析において、1属〜5属の操作で沈殿せずに溶液中に残った金属イオンは[ 炎色反応 ]で確認する。\n★6属は沈殿しないイオンを検出します。特にアルカリ金属のLi⁺、Na⁺、K⁺が検出されます。炎色反応のゴロ: リアカー無きK村〜(Li赤、Na黄、K紫)。"},{"q":"金属イオンの系統分析において、沈殿せずに溶液中に残った金属イオンは炎色反応で確認する。特に[____]が検出される。","answer":"Li⁺、Na⁺、K⁺","choices":["Li⁺、Na⁺、K⁺","Cr³⁺、Fe³⁺、Al³⁺","Ba²⁺、Ca²⁺、Sr²⁺、Pb²⁺","Zn²⁺、Al³⁺、Sn²⁺、Pb²⁺"],"explain":"金属イオンの系統分析において、沈殿せずに溶液中に残った金属イオンは炎色反応で確認する。特に[ Li⁺、Na⁺、K⁺ ]が検出される。\n★6属は沈殿しないイオンを検出します。特にアルカリ金属のLi⁺、Na⁺、K⁺が検出されます。炎色反応のゴロ: リアカー無きK村〜(Li赤、Na黄、K紫)。"},{"q":"AgClとPbCl₂の白色固体について、過剰のNH₃水を加えると[____]が溶解し、熱湯を注ぐと[____]が溶解する。","answer":"AgCl、PbCl₂","choices":["AgCl、PbCl₂","AgCl、AgCl","PbCl₂、PbCl₂","PbCl₂、AgCl"],"explain":"AgClとPbCl₂の白色固体について、過剰のNH₃水を加えると[ AgCl ]が溶解し、熱湯を注ぐと[ PbCl₂ ]が溶解する。\n★過剰のアンモニア水で沈殿が溶解し錯イオンとなる金属イオンは、Ag⁺、Cu²⁺、Ni²⁺、Zn²⁺(ゴロ: 銀、土、日はあんまり会えん)\n★AgClは水にも熱湯にも溶けません。PbCl₂は水に少し溶け、熱湯に溶けます。"},{"q":"PbCl₂の白色沈殿へ熱湯を注いでPb²⁺を含む溶液としたあと、[____]を加えると[____]が生じる。","answer":"クロム酸カリウム水溶液、黄色沈殿","choices":["クロム酸カリウム水溶液、黄色沈殿","クロム酸カリウム水溶液、赤褐色沈殿","過剰のNH₃水溶液、黄色沈殿","過剰のNH₃水溶液、赤褐色沈殿"],"explain":"PbCl₂の白色沈殿へ熱湯を注いでPb²⁺を含む溶液としたあと、[ クロム酸カリウム水溶液 ]を加えると[ 黄色沈殿 ]が生じる。\n★クロム酸鉛(II)PbCrO₄の黄色沈殿が生じます。1属の塩酸HClを加えると生じるAgClとPbCl₂の判別に使えます。"},{"q":"AgClの白色沈殿へ[____](する)と固体の[____]が遊離する。","answer":"光を当てる、銀Ag","choices":["光を当てる、銀Ag","光を当てる、[Ag(NH₃)₂]⁺","過剰のNH₃水を加える、[Ag(NH₃)₂]⁺","過剰のNH₃水を加える、銀Ag"],"explain":"AgClの白色沈殿へ[ 光を当てる ]と固体の[ 銀Ag ]が遊離する。\n★ハロゲン化銀へ光を当てると感光性により銀(黒色、黒紫色)が遊離します。"},{"q":"AgClの白色沈殿へ[____](する)と沈殿が溶け[____]が生じる。","answer":"過剰のNH₃水を加える、[Ag(NH₃)₂]⁺","choices":["過剰のNH₃水を加える、[Ag(NH₃)₂]⁺","過剰のNH₃水を加える、銀Ag","光を当てる、銀Ag","光を当てる、[Ag(NH₃)₂]⁺"],"explain":"AgClの白色沈殿へ[ 過剰のNH₃水を加える ]と沈殿が溶け[ [Ag(NH₃)₂]⁺ ]が生じる。\n★過剰のアンモニア水で沈殿が溶解し錯イオンとなる金属イオンは、Ag⁺、Cu²⁺、Ni²⁺、Zn²⁺(ゴロ: 銀、土、日はあんまり会えん)"}]},
  {"code":"MD09","name":"イオン分析2","parent":"遷移元素","questions":[{"q":"金属イオン分析で用いる金属イオンは硝酸塩で統一することが多い。これは[____]を揃えるため、また、硝酸塩が水に[____]ためである。","answer":"陰イオン、溶けやすい","choices":["陰イオン、溶けやすい","陰イオン、溶けにくい","陽イオン、溶けやすい","陽イオン、溶けにくい"],"explain":"金属イオン分析で用いる金属イオンは硝酸塩で統一することが多い。これは[ 陰イオン ]を揃えるため、また、硝酸塩が水に[ 溶けやすい ]ためである。\n★金属の硝酸塩で統一しておくと、全て「金属イオン+硝酸イオン」の組み合わせなので、陰イオン(硝酸イオン)が揃います。金属イオンは一般に陽イオンです。★「溶けやすい」は「よく溶ける」などと言い換えられます。★一般に、金属イオンと硝酸では沈殿しないと覚えておくと便利です。"},{"q":"AgCl、PbCl₂、Hg₂Cl₂の白色沈殿のうち[____]は(過剰の)アンモニア水に溶ける。","answer":"AgCl","choices":["AgCl","PbCl₂","Hg₂Cl₂","AgClとPbCl₂"],"explain":"AgCl、PbCl₂、Hg₂Cl₂の白色沈殿のうち[ AgCl ]は(過剰の)アンモニア水に溶ける。\n★無色溶液になります。★「適量(もしくは少量)のアンモニア水」ではOH⁻イオンによりAg₂Oの褐色沈殿を作りますが、この形の出題では「過剰の(もしくは十分な)」を書かないことがあります。★(過剰の)アンモニア水に溶ける金属イオンはAg⁺、Cu²⁺、Ni²⁺、Zn²⁺(ゴロ: 銀、土、日はあんまり会えん)。\n★AgCl + 2NH₃ → [Ag(NH₃)₂]⁺ + Cl⁻"},{"q":"AgCl、PbCl₂、Hg₂Cl₂の白色沈殿のうち[____]はチオ硫酸ナトリウム水溶液に溶ける。","answer":"AgCl","choices":["AgCl","PbCl₂","Hg₂Cl₂","AgClとPbCl₂"],"explain":"AgCl、PbCl₂、Hg₂Cl₂の白色沈殿のうち[ AgCl ]はチオ硫酸ナトリウム水溶液に溶ける。\n★無色溶液になります。★チオ硫酸ナトリウムNa₂S₂O₃水溶液はハロゲン化銀AgXを溶かします。★写真の定着剤としてAgBrとセットでも登場します。"},{"q":"塩化銀AgClにアンモニア水を十分に加えると、溶けて[____](化学式)の[____](色)溶液となる。","answer":"[Ag(NH₃)₂]⁺、無色","choices":["[Ag(NH₃)₂]⁺、無色","[Ag(NH₃)₂]⁺、赤色","[Ag(NH₃)₄]⁺、無色","[Ag(NH₃)₄]⁺、赤色"],"explain":"塩化銀AgClにアンモニア水を十分に加えると、溶けて[ [Ag(NH₃)₂]⁺ ]の[ 無色 ]溶液となる。\n★[Ag(NH₃)₂]⁺\n★配位数2、配位子NH₃、陽イオンなのでジアンミン銀(I)イオン\nジ(2)アンミン(NH₃)銀(I)(Ag⁺)イオンです。"},{"q":"塩化銀AgClにチオ硫酸ナトリウム水溶液を十分に加えると、溶けて[____](化学式)の[____](色)溶液となる。","answer":"[Ag(S₂O₃)₂]³⁻、無色","choices":["[Ag(S₂O₃)₂]³⁻、無色","[Ag(S₂O₃)₂]³⁻、赤色","[Ag(S₂O₃)₂]⁻、無色","[Ag(S₂O₃)₂]⁻、赤色"],"explain":"塩化銀AgClにチオ硫酸ナトリウム水溶液を十分に加えると、溶けて[ [Ag(S₂O₃)₂]³⁻ ]の[ 無色 ]溶液となる。\n★[Ag(S₂O₃)₂]³⁻はビス(チオスルファト)銀(I)酸イオンといいます。(まるかっこ)はジ(2)と同様の意味のビス(2)が(チオスルファトS₂O₃²⁻)全体にかかることを意味します。"},{"q":"溶液中の硫化水素H₂Sは、次の電離平衡の状態にあり、\nH₂S ⇄ 2H⁺ + S²⁻\n硫化物イオン濃度[S²⁻]は水素イオン濃度[H⁺]により変化する。酸性中では硫化物イオン濃度[S²⁻]は[____](く)なり、塩基性中では[____](く)なる。","answer":"小さく、大きく","choices":["小さく、大きく","小さく、小さく","大きく、大きく","大きく、小さく"],"explain":"溶液中の硫化水素H₂Sは、次の電離平衡の状態にあり、\nH₂S ⇄ 2H⁺ + S²⁻\n硫化物イオン濃度[S²⁻]は水素イオン濃度[H⁺]により変化する。酸性中では硫化物イオン濃度[S²⁻]は[ 小さく ]なり、塩基性中では[ 大きく ]なる。\n★酸性で沈殿する硫化物(CuS、PbS、CdSなど)は塩基性でも沈殿します。逆に塩基性でのみ沈殿する硫化物(MnS、FeS、ZnSなど)は酸性下では[S²⁻]が小さいため沈殿を作りません。\n★硫化水素の二段階の電離\nH₂S ⇄ H⁺ + HS⁻\nHS⁻ ⇄ H⁺ + S²⁻"},{"q":"CuSかFeSを判別したいとき、[____]とよい。","answer":"塩酸を加える","choices":["塩酸を加える","過剰のアンモニア水を加える","沈殿の色の違いを確認する","過剰の水酸化ナトリウム水溶液を加える"],"explain":"CuSかFeSを判別したいとき、[ 塩酸HClを加える ]とよい。\n★塩酸HClで酸性にします。酸性下ではFeSが溶解します。どちらも黒色沈殿です。★酸性で沈殿する硫化物(CuS、PbS、CdSなど)は塩基性でも沈殿しますが、塩基性でのみ沈殿する硫化物(MnS、FeS、ZnSなど)は酸性では[S²⁻]が小さいため沈殿を作りません。"},{"q":"酢酸鉛(II)Pb(CH₃COO)₂水溶液を染み込ませたろ紙を[____]という。","answer":"鉛糖紙","choices":["鉛糖紙","リトマス紙","化学繊維","写真のネガ"],"explain":"酢酸鉛(II)Pb(CH₃COO)₂水溶液を染み込ませたろ紙を[ 鉛糖紙 ]という。\n★鉛糖紙(えんとうし)と読みます。"},{"q":"金属イオン分析において、煮沸により硫化水素H₂Sが追い出されたかどうかを確認するには、水溶液に[____]とよい。","answer":"鉛糖紙を近づける","choices":["鉛糖紙を近づける","濃塩酸を付けたガラス棒を近づける","過剰の酸素を通す","二酸化炭素を通す"],"explain":"金属イオン分析において、煮沸により硫化水素H₂Sが追い出されたかどうかを確認するには、水溶液に[ 鉛糖紙を近づける ]とよい。\n★鉛糖紙(えんとうし)と読みます。酢酸鉛(II)Pb(CH₃COO)₂水溶液を染み込ませたろ紙です。\n★硫化水素H₂Sが残っているとき、硫化鉛(II)PbSを生じて黒変します。鉛糖紙へ溶液を1滴ほど滴下することでも確認できます。"},{"q":"酢酸鉛(II)Pb(CH₃COO)₂水溶液を染み込ませたろ紙(鉛糖紙)を硫化水素を含む水溶液へ近づけると[____]。","answer":"ろ紙が黒変する","choices":["ろ紙が黒変する","白煙を生じる","白色沈殿が生じる","溶液が赤色に着色する"],"explain":"酢酸鉛(II)Pb(CH₃COO)₂水溶液を染み込ませたろ紙(鉛糖紙)を硫化水素を含む水溶液へ近づけると[ ろ紙が黒変する ]。\n★硫化鉛(II)PbSを生じて黒変します。鉛糖紙へ溶液を1滴ほど滴下することでも確認できます。"},{"q":"鉛(II)イオンPb²⁺を検出するには、[____]を加えて白色沈殿の有無、または[____]を加えて黄色沈殿の有無を見る方法がある。","answer":"硫酸、クロム酸カリウム水溶液","choices":["硫酸、クロム酸カリウム水溶液","硫酸、アンモニア水","硝酸、クロム酸カリウム水溶液","硝酸、アンモニア水"],"explain":"鉛(II)イオンPb²⁺を検出するには、[ 硫酸 ]を加えて白色沈殿の有無、または[ クロム酸カリウム水溶液 ]を加えて黄色沈殿の有無を見る方法がある。\n★硫酸鉛(II)PbSO₄(白色沈殿)\n★クロム酸鉛(II)PbCrO₄(黄色沈殿)\n★ゴロ: 苦労し(XCrO₄)て得た銀貨(Ag、赤褐色(暗赤色))で黄色いバナナ(黄色、Ba、Pb)を買う。\n★ゴロ: バカにするな白龍たん(Ba²⁺、Ca²⁺、Sr²⁺、Pb²⁺、白色沈殿、硫酸塩と炭酸塩)\n★塩酸HClでも白色沈殿のPbCl₂を生じます。"},{"q":"鉄(II)イオンFe²⁺を検出するには、[____]を加えて淡緑色溶液から黄色溶液への変化を確認する方法がある。","answer":"過酸化水素や希硝酸","choices":["過酸化水素や希硝酸","ヘキサシアニド鉄(III)酸カリウム水溶液","クロム酸カリウム水溶液","アンモニア水"],"explain":"鉄(II)イオンFe²⁺を検出するには、[ 過酸化水素や希硝酸 ]を加えて淡緑色溶液から黄色溶液への変化を確認する方法がある。\n★過酸化水素H₂O₂や希硝酸HNO₃で酸化するとFe²⁺(淡緑色)→Fe³⁺(黄褐色)と変化します。"},{"q":"鉄(II)イオンFe²⁺を検出するには、[____]を加えて濃青色沈殿(ターンブル青)の有無を確認する方法がある。","answer":"ヘキサシアニド鉄(III)酸カリウム水溶液","choices":["ヘキサシアニド鉄(III)酸カリウム水溶液","ヘキサシアニド鉄(II)酸カリウム水溶液","クロム酸カリウム水溶液","KSCN水溶液"],"explain":"鉄(II)イオンFe²⁺を検出するには、[ ヘキサシアニド鉄(III)酸カリウム水溶液 ]を加えて濃青色沈殿(ターンブル青)の有無を確認する方法がある。\n★濃青色沈殿は、\n①鉄(II)イオンFe²⁺とヘキサシアニド鉄(III)酸カリウム水溶液K₃[Fe(CN)₆]、\n②鉄(III)イオンFe³⁺とヘキサシアニド鉄(II)酸カリウム水溶液K₄[Fe(CN)₆]、のセットを特に覚えます。"},{"q":"鉄(III)イオンFe³⁺を検出するには、[____]を加えて黄色溶液から血赤色溶液への変化を確認する方法がある。","answer":"KSCN水溶液","choices":["KSCN水溶液","ヘキサシアニド鉄(III)酸カリウム水溶液","ヘキサシアニド鉄(II)酸カリウム水溶液","クロム酸カリウム水溶液"],"explain":"鉄(III)イオンFe³⁺を検出するには、[ KSCN水溶液 ]を加えて黄色溶液から血赤色溶液への変化を確認する方法がある。\n★KSCN水溶液を加えるとFe³⁺の黄色溶液から血赤色溶液へ変化します。\n★比較：鉄(II)イオンFe²⁺(緑色)とKSCN水溶液では変化しません。"},{"q":"鉄(III)イオンFe³⁺を検出するには、[____]を加えて濃青色沈殿(ベルリン青)を確認する方法がある。","answer":"ヘキサシアニド鉄(II)酸カリウム水溶液","choices":["ヘキサシアニド鉄(II)酸カリウム水溶液","KSCN水溶液","ヘキサシアニド鉄(III)酸カリウム水溶液","クロム酸カリウム水溶液"],"explain":"鉄(III)イオンFe³⁺を検出するには、[ ヘキサシアニド鉄(II)酸カリウム水溶液 ]を加えて濃青色沈殿(ベルリン青)を確認する方法がある。\n★濃青色沈殿は、\n①鉄(II)イオンFe²⁺とヘキサシアニド鉄(III)酸カリウム水溶液K₃[Fe(CN)₆]、\n②鉄(III)イオンFe³⁺とヘキサシアニド鉄(II)酸カリウム水溶液K₄[Fe(CN)₆]、のセットを特に覚えます。"},{"q":"銅(II)イオンCu²⁺を検出するには、[____]を加えて青色溶液から黄緑色溶液への変化を確認する方法がある。","answer":"濃塩酸","choices":["濃塩酸","硫酸","クロム酸カリウム水溶液","KSCN水溶液"],"explain":"銅(II)イオンCu²⁺を検出するには、[ 濃塩酸 ]を加えて青色溶液から黄緑色溶液への変化を確認する方法がある。\n★濃塩酸HClを加えると銅(II)イオンCu²⁺(青色溶液)からテトラクロリド銅(II)酸イオン[CuCl₄]²⁻の緑色溶液(黄緑色溶液)へ変化します。"},{"q":"溶液に硫化水素H₂Sを加えると黄色沈殿を作った。この溶液に含まれていたイオンは[____]。","answer":"Cd²⁺","choices":["Cd²⁺","Zn²⁺","Mn²⁺","Cu²⁺"],"explain":"溶液に硫化水素H₂Sを加えると黄色沈殿を作った。この溶液に含まれていたイオンは[ Cd²⁺ ]。\n★CdSは黄色沈殿です。液性に関係なく沈殿します。\n★硫化物は一般に黒色です。例外のZnS(白色)、CdS(黄色)、MnS(ピンク)の3つは沈殿の色で判別できます。★ゴロ: 黒龍(硫化物は黒)の黄色い角(CdS)に刺さる白あん(ZnS)と桃マン(MnS)。絵を描くと覚えやすいです。"},{"q":"溶液に硫化水素H₂Sを加えると淡桃色沈殿を作った。この溶液に含まれていたイオンは[____]。","answer":"Mn²⁺","choices":["Mn²⁺","Cd²⁺","Zn²⁺","Cu²⁺"],"explain":"溶液に硫化水素H₂Sを加えると淡桃色沈殿を作った。この溶液に含まれていたイオンは[ Mn²⁺ ]。\n★MnSは淡桃色沈殿です。中性～塩基性中で沈殿します。\n★硫化物は一般に黒色です。例外のZnS(白色)、CdS(黄色)、MnS(ピンク)の3つは沈殿の色で判別できます。★ゴロ: 黒龍(硫化物は黒)の黄色い角(CdS)に刺さる白あん(ZnS)と桃マン(MnS)。絵を描くと覚えやすいです。"},{"q":"溶液に硫化水素H₂Sを加えると白色沈殿を作った。この溶液に含まれていたイオンは[____]。","answer":"Zn²⁺","choices":["Zn²⁺","Mn²⁺","Cd²⁺","Cu²⁺"],"explain":"溶液に硫化水素H₂Sを加えると白色沈殿を作った。この溶液に含まれていたイオンは[ Zn²⁺ ]。\n★ZnSは白色沈殿です。中性～塩基性中で沈殿します。\n★硫化物は一般に黒色です。例外のZnS(白色)、CdS(黄色)、MnS(ピンク)の3つは沈殿の色で判別できます。★ゴロ: 黒龍(硫化物は黒)の黄色い角(CdS)に刺さる白あん(ZnS)と桃マン(MnS)。絵を描くと覚えやすいです。"},{"q":"硫化物の黒色沈殿を濃硝酸で溶かし、アンモニア水を加えて塩基性にすると深青色溶液となった。深青色溶液となった金属イオンは[____]である。","answer":"Cu²⁺","choices":["Cu²⁺","Zn²⁺","Mn²⁺","Cd²⁺"],"explain":"硫化物の黒色沈殿を濃硝酸で溶かし、アンモニア水を加えて塩基性にすると深青色溶液となった。深青色溶液となった金属イオンは[ Cu²⁺ ]である。\n★錯イオンの[Cu(NH₃)₄]²⁺が深青色です。Cu²⁺も青色です。"},{"q":"炭酸塩の沈殿を硝酸に溶かし、炎色反応を見ると、黄緑色だった。この炭酸塩を作っていたイオンは[____]。","answer":"Ba²⁺","choices":["Ba²⁺","Ca²⁺","Sr²⁺","Pb²⁺"],"explain":"炭酸塩の沈殿を硝酸に溶かし、炎色反応を見ると、黄緑色だった。この炭酸塩を作っていたイオンは[ Ba²⁺ ]。\n★炎色反応のゴロ: リアカー無きK村(Li赤、Na黄、K紫)、動力貸そうか馬力にするべ(Cu緑、Ca橙、Ba黄緑、Sr紅・深赤)"},{"q":"炭酸塩の沈殿を硝酸に溶かし、炎色反応を見ると、橙赤色だった。この炭酸塩を作っていたイオンは[____]。","answer":"Ca²⁺","choices":["Ca²⁺","Ba²⁺","Sr²⁺","Pb²⁺"],"explain":"炭酸塩の沈殿を硝酸に溶かし、炎色反応を見ると、橙赤色だった。この炭酸塩を作っていたイオンは[ Ca²⁺ ]。\n★炎色反応のゴロ: リアカー無きK村(Li赤、Na黄、K紫)、動力貸そうか馬力にするべ(Cu緑、Ca橙、Ba黄緑、Sr紅・深赤)"},{"q":"BaCO₃とBaSO₄のどちらかの白色沈殿があり炭酸塩なのか硫酸塩なのかを判別したい。このとき[____]を加えるとよい。","answer":"希塩酸","choices":["希塩酸","シュウ酸ナトリウム水溶液","クロム酸カリウム水溶液","KSCN水溶液"],"explain":"BaCO₃とBaSO₄のどちらかの白色沈殿があり炭酸塩なのか硫酸塩なのかを判別したい。このとき[ 希塩酸 ]を加えるとよい。\n★塩酸のような強酸を加えると弱酸追い出し反応により炭酸塩が二酸化炭素を発生しながら溶けます。\nCaCO₃ + 2HCl → CaCl₂ + H₂O + CO₂\n★Ba²⁺、Ca²⁺、Sr²⁺、Pb²⁺(ゴロ: バカにするな白龍たん、白色沈殿の硫酸塩と炭酸塩)について当てはまります。"},{"q":"Ba²⁺、Ca²⁺、Sr²⁺、Pb²⁺、などを含む水溶液に[____]を加えると白色沈殿を生じる。","answer":"シュウ酸ナトリウム水溶液","choices":["シュウ酸ナトリウム水溶液","水酸化ナトリウム水溶液","クロム酸カリウム水溶液","KSCN水溶液"],"explain":"Ba²⁺、Ca²⁺、Sr²⁺、Pb²⁺、などを含む水溶液に[ シュウ酸ナトリウム水溶液 ]を加えると白色沈殿を生じる。\n★シュウ酸ナトリウムNa₂(COO)₂水溶液\n★シュウ酸カルシウムCa(COO)₂が生じます。ゴロ: バカにするな白龍たん(Ba²⁺、Ca²⁺、Sr²⁺、Pb²⁺、白色沈殿、硫酸塩と炭酸塩)で覚えたイオンはシュウ酸塩としても白色沈殿を生じます。"},{"q":"Fe(OH)₂(緑白色沈殿)へ過剰のアンモニア水を加えると[____]。また、過剰の水酸化ナトリウム水溶液を加えると[____]。","answer":"変化なし、変化なし","choices":["変化なし、変化なし","変化なし、沈殿が溶ける","沈殿が溶ける、変化なし","沈殿が溶ける、沈殿が溶ける"],"explain":"Fe(OH)₂(緑白色沈殿)へ過剰のアンモニア水を加えると[ 変化なし ]。また、過剰の水酸化ナトリウム水溶液を加えると[ 変化なし ]。\n★鉄の水酸化物であるFe(OH)₂と水酸化鉄(III)は過剰のアンモニア水や過剰の水酸化ナトリウム水溶液へ溶けないことは個別で覚えておいてもよいと思います。\n*新課程教科書(2025年度版)では「Fe(OH)₃」の表記がなくなり「水酸化鉄(III)」と日本語表記にするものと、便宜的に酸化水酸化鉄(III)のFeO(OH)をあてているものがあります。"},{"q":"水酸化鉄(III)(赤褐色沈殿)へ過剰のアンモニア水を加えると[____]。また、過剰の水酸化ナトリウム水溶液を加えると[____]。","answer":"変化なし、変化なし","choices":["変化なし、変化なし","変化なし、沈殿が溶ける","沈殿が溶ける、変化なし","沈殿が溶ける、沈殿が溶ける"],"explain":"水酸化鉄(III)(赤褐色沈殿)へ過剰のアンモニア水を加えると[ 変化なし ]。また、過剰の水酸化ナトリウム水溶液を加えると[ 変化なし ]。\n★鉄の水酸化物であるFe(OH)₂と水酸化鉄(III)は過剰のアンモニア水や過剰の水酸化ナトリウム水溶液へ溶けないことは個別で覚えておいてもよいと思います。\n*新課程教科書(2025年度版)では「Fe(OH)₃」の表記がなくなり「水酸化鉄(III)」と日本語表記にするものと、便宜的に酸化水酸化鉄(III)のFeO(OH)をあてているものがあります。"},{"q":"ある金属イオンへ塩基を加えて生じた褐色沈殿へ過剰のアンモニア水を加えると溶解した。このとき、[____]から[____](イオン式)へ変化している。","answer":"Ag₂O、[Ag(NH₃)₂]⁺","choices":["Ag₂O、[Ag(NH₃)₂]⁺","Zn(OH)₂、[Zn(NH₃)₄]²⁺","AgOH、[Ag(NH₃)₂]⁺","Zn(OH)₂、[Zn(NH₃)₂]²⁺"],"explain":"ある金属イオンへ塩基を加えて生じた褐色沈殿へ過剰のアンモニア水を加えると溶解した。このとき、[ Ag₂O ]から[ [Ag(NH₃)₂]⁺ ](イオン式)へ変化している。\n★過剰のアンモニア水で錯イオンとなり溶ける金属イオンのゴロ: 銀、土、日はあんまり会えん([Ag(NH₃)₂]⁺、[Cu(NH₃)₄]²⁺、[Ni(NH₃)₆]²⁺、アンモニア水、[Zn(NH₃)₄]²⁺)\n★水酸化物沈殿は、Ag₂O(褐色、例外的に酸化物)、Cu(OH)₂(青白色)、Ni(OH)₂(緑白色)、Zn(OH)₂(白色)、です。\n*Ni(OH)₂の緑白色は、緑色、灰緑色、淡緑色など様々な表記が見られます。"},{"q":"ある金属イオンへ塩基を加えて生じた青白色沈殿へ過剰のアンモニア水を加えると溶解した。このとき、[____]から[____](イオン式)へ変化している。","answer":"Cu(OH)₂、[Cu(NH₃)₄]²⁺","choices":["Cu(OH)₂、[Cu(NH₃)₄]²⁺","Ag₂O、[Ag(NH₃)₂]⁺","Cu(OH)₂、[Cu(NH₃)₆]²⁺","Ag₂O、[Ag(NH₃)₄]⁺"],"explain":"ある金属イオンへ塩基を加えて生じた青白色沈殿へ過剰のアンモニア水を加えると溶解した。このとき、[ Cu(OH)₂ ]から[ [Cu(NH₃)₄]²⁺ ](イオン式)へ変化している。\n★過剰のアンモニア水で錯イオンとなり溶ける金属イオンのゴロ: 銀、土、日はあんまり会えん([Ag(NH₃)₂]⁺、[Cu(NH₃)₄]²⁺、[Ni(NH₃)₆]²⁺、アンモニア水、[Zn(NH₃)₄]²⁺)\n★水酸化物沈殿(色)は、Ag₂O(褐色、例外的に酸化物)、Cu(OH)₂(青白色)、Ni(OH)₂(緑白色)、Zn(OH)₂(白色)、です。\n*Ni(OH)₂の緑白色は、緑色、灰緑色、淡緑色など様々な表記が見られます。"},{"q":"ある金属イオンへ塩基を加えて生じた緑白色沈殿へ過剰のアンモニア水を加えると溶解した。このとき、[____]から[____](イオン式)へ変化している。","answer":"Ni(OH)₂、[Ni(NH₃)₆]²⁺","choices":["Ni(OH)₂、[Ni(NH₃)₆]²⁺","Cu(OH)₂、[Cu(NH₃)₄]²⁺","Ni(OH)₂、[Ni(NH₃)₄]²⁺","Cu(OH)₂、[Cu(NH₃)₆]²⁺"],"explain":"ある金属イオンへ塩基を加えて生じた緑白色沈殿へ過剰のアンモ const _qMap = MASTER_DATA.questions ? Object.fromEntries(MASTER_DATA.questions.map(q=>[q.id,q])) : {};

const LSP = "muki";
const LS_KEY  = LSP + "_progress_v4";   /* v4: 新ストレージ／クラウド方式に合わせて再スタート */
const SET_KEY = LSP + "_settings_v2";
const UID_KEY = LSP + "_uid_v2";   /* v2: 同期IDも新規化（旧IDを記憶しない＝完全に最初から） */
const GAS_URL = "https://script.google.com/macros/s/AKfycbxzSyhZakYdLJ2kYgczpUlpVW4H-ORJksS2JIa-NDOEGmIUEUbFDK9TnLqRywmiT6D0zA/exec";
const SYNC_SUFFIX = "-muki-v4";   /* 教科ごとに固有のクラウド保存枠（衝突防止・空き枠から再スタート） */
const DAILY_GOAL = 10;

/* proficiency: 0 未学習 / 1 苦手 / 2 うろ覚え / 3 ほぼ覚えた / 4 完璧 */
const PLABEL=["未学習","苦手","うろ覚え","ほぼ覚えた","覚えた"];
const PCOLOR=["#d9d9de","#3b86f0","#7cc6b0","#46c07a","#1a9d5a"];
const H=3600e3, D=24*H;
function reviewInterval(p){ return p===4?7*D : p===3?3*D : p===2?1*D : 1*H; }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }

/* ---------- storage ---------- */
let progress = loadProgress();
let settings = loadSettings();
function loadProgress(){
  let o; try{ o=JSON.parse(localStorage.getItem(LS_KEY)); }catch(e){}
  if(!o||typeof o!=="object") o={};
  o.words=o.words||{}; o.stocked=o.stocked||{}; o.resume=o.resume||{}; o.daily=o.daily||{date:todayStr(),count:0};
  return o;
}
function saveProgress(){ try{ localStorage.setItem(LS_KEY,JSON.stringify(progress)); }catch(e){} cloudPush(); }
function loadSettings(){
  const def={count:50,quizTime:0,cardTime:0,hide:false,auto:false,train:false,sound:true,shuffle:true,resume:false,mode:"quiz"};
  let o; try{ o=JSON.parse(localStorage.getItem(SET_KEY)); }catch(e){}
  return Object.assign(def,o||{});
}
function saveSettings(){ try{ localStorage.setItem(SET_KEY,JSON.stringify(settings)); }catch(e){} }

function wordId(code,idx){ return code+"#"+idx; }
function peek(id){
  const s=progress.words[id];
  if(!s) return {p:0,c:0,w:0,due:0};
  if(s.p===undefined){ const c=s.c||0,w=s.w||0; return {p:(c+w===0)?0:(w>c)?1:(c-w>=3)?4:(w===c)?2:3,c,w,due:s.due||0}; }
  return {p:s.p,c:s.c||0,w:s.w||0,due:s.due||0};
}
function profOf(id){ return peek(id).p; }
function dueNow(id,now){ const s=peek(id); return s.p>0 && s.due && s.due<=now; }
function isStocked(id){ return !!progress.stocked[id]; }
function wState(id){
  let s=progress.words[id];
  if(!s){ s={p:0,c:0,w:0,due:0,t:0}; progress.words[id]=s; }
  if(s.p===undefined){ const c=s.c||0,w=s.w||0; s.p=(c+w===0)?0:(w>c)?1:(c-w>=3)?4:(w===c)?2:3; }
  if(s.due===undefined) s.due=0;
  return s;
}
function applyAnswer(id,correct){
  const s=wState(id); const before=s.p; const now=Date.now();
  if(correct){ s.c++; s.p=(s.p===0)?2:Math.min(4,s.p+1); } // 初見正解→うろ覚え、以降+1
  else       { s.w++; s.p=1; }                              // 不正解→苦手
  s.t=now; s.due=now+reviewInterval(s.p);
  bumpDaily();
  return {before,after:s.p};
}
function bumpDaily(){
  const t=todayStr();
  if(!progress.daily||progress.daily.date!==t) progress.daily={date:t,count:0};
  progress.daily.count++;
}
function dailyCount(){ return (progress.daily&&progress.daily.date===todayStr())?progress.daily.count:0; }

/* ---------- cloud sync ---------- */
function getUid(){ try{ return localStorage.getItem(UID_KEY)||""; }catch(e){ return ""; } }
function setUid(v){ try{ localStorage.setItem(UID_KEY,v); }catch(e){} }
function syncStatus(t,kind){ const el=document.getElementById("syncStatus"); if(!el)return;
  el.textContent=t||""; if(kind==="ok"){ clearTimeout(syncStatus._t); syncStatus._t=setTimeout(()=>el.textContent="",1600); } }
let pushTimer=null,pushing=false,unsynced=false;
function cloudPush(){ if(!getUid())return; clearTimeout(pushTimer); pushTimer=setTimeout(doPush,800); }
/* doPush: 同期成否をレスポンスで必ず検証する。サーバが {ok:true} を返さない限り「成功」と表示しない。
   失敗してもローカル（localStorage）には保存済みなのでデータは失われない。 */
async function doPush(){ const uid=getUid(); if(!uid)return; if(pushing){ cloudPush(); return; }
  pushing=true; syncStatus("同期中…");
  try{
    const res=await fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({userId:uid+SYNC_SUFFIX,data:progress})});
    let ok=false; try{ const j=JSON.parse(await res.text()); ok=!!(j&&j.ok); }catch(_){ ok=false; }
    if(res.ok&&ok){ unsynced=false; syncStatus("同期しました ✓","ok"); }
    else{ unsynced=true; syncStatus("クラウド保存に失敗（端末には保存済み）","warn"); }
  }catch(e){ unsynced=true; syncStatus("オフライン（端末には保存済み）","warn"); }
  finally{ pushing=false; } }
/* mergeProgress: クラウドとローカルを「問題ごとに最終解答時刻 t が新しい方」で統合する。
   ローカルを丸ごと上書きしないため、クラウドが古い／空でも学習結果が消えない。
   各レコード {p,c,w,due,t} 自体は変更しない＝習熟度判定・SRS・学習履歴のロジックは不変。 */
function mergeProgress(local, cloud){
  local=local||{}; cloud=cloud||{};
  const out={ words:{}, stocked:{}, resume:{}, daily:null };
  const lw=local.words||{}, cw=cloud.words||{};
  new Set([...Object.keys(lw),...Object.keys(cw)]).forEach(id=>{
    const a=lw[id], b=cw[id];
    out.words[id]=(a&&b)?(((b.t||0)>(a.t||0))?b:a):(a||b);
  });
  out.stocked=Object.assign({}, cloud.stocked||{}, local.stocked||{});
  out.resume =Object.assign({}, cloud.resume||{},  local.resume||{});
  const t=todayStr(); const cand=[local.daily,cloud.daily].filter(d=>d&&d.date===t);
  out.daily = cand.length ? cand.reduce((m,d)=>((d.count||0)>(m.count||0)?d:m)) : (local.daily||cloud.daily||{date:t,count:0});
  return out;
}
async function cloudPull(){ const uid=getUid(); if(!uid)return false; syncStatus("読み込み中…");
  try{ const res=await fetch(GAS_URL+"?userId="+encodeURIComponent(uid+SYNC_SUFFIX)); const j=await res.json();
    if(j&&j.ok&&j.data&&typeof j.data==="object"){
      const cloud=j.data; cloud.words=cloud.words||{};
      const cloudEmpty=Object.keys(cloud.words).length===0;
      const localEmpty=Object.keys((progress&&progress.words)||{}).length===0;
      /* クラウドが空でローカルに学習結果がある場合は、絶対にローカルを消さない。逆にローカルをクラウドへ上げる。 */
      if(cloudEmpty&&!localEmpty){ syncStatus("","ok"); doPush(); return false; }
      progress=mergeProgress(progress, cloud);
      progress.words=progress.words||{}; progress.stocked=progress.stocked||{}; progress.resume=progress.resume||{}; progress.daily=progress.daily||{date:todayStr(),count:0};
      try{ localStorage.setItem(LS_KEY,JSON.stringify(progress)); }catch(e){}
      syncStatus("読み込み完了 ✓","ok"); return true; }
    syncStatus("","ok"); return false; }
  catch(e){ syncStatus("オフライン","warn"); return false; } }

  if(!getUid())return; if(await cloudPull()) renderHome(); }

function tone(freq,start,dur,type,vol){ const o=actx.createOscillator(),g=actx.createGain();
  o.type=type||"sine"; o.frequency.setValueAtTime(freq,actx.currentTime+start);
  g.gain.setValueAtTime(0.0001,actx.currentTime+start);
  g.gain.exponentialRampToValueAtTime(vol||0.18,actx.currentTime+start+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+start+dur);
  o.connect(g); g.connect(actx.destination); o.start(actx.currentTime+start); o.stop(actx.currentTime+start+dur+0.02); }

function chapterCards(c){ return c.questions.map((q,idx)=>({q,idx,id:wordId(c.code,idx)})); }
function deckCount(c,key){ const now=Date.now(); let n=0;
  c.questions.forEach((q,idx)=>{ const id=wordId(c.code,idx);
    if(key==="unlearn"){ if(profOf(id)===0)n++; }
    else if(key==="weak"){ if(profOf(id)===1)n++; }
    else if(key==="vague"){ if(profOf(id)===2)n++; }
    else if(key==="good"){ if(profOf(id)===3)n++; }
    else if(key==="perfect"){ if(profOf(id)===4)n++; }
    else if(key==="stocked"){ if(isStocked(id))n++; }
    else if(key==="review"){ if(dueNow(id,now))n++; }
    else n++; });
  return n; }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }

function pickWords(c,deck,count,shuffleOn){
  const cards=chapterCards(c); const now=Date.now(); let pool;
  if(deck==="unlearn") pool=cards.filter(x=>profOf(x.id)===0);
  else if(deck==="weak") pool=cards.filter(x=>profOf(x.id)===1);
  else if(deck==="vague") pool=cards.filter(x=>profOf(x.id)===2);
  else if(deck==="good") pool=cards.filter(x=>profOf(x.id)===3);
  else if(deck==="perfect") pool=cards.filter(x=>profOf(x.id)===4);
  else if(deck==="stocked") pool=cards.filter(x=>isStocked(x.id));
  else if(deck==="review") pool=cards.filter(x=>dueNow(x.id,now));
  else pool=cards.slice();
  pool=shuffleOn?shuffle(pool):pool; if(count>0&&pool.length>count) pool=pool.slice(0,count); return pool;
}
function hasNextTraining(c){ return chapterCards(c).some(x=>profOf(x.id)<=1); }

/* ---------- scope helpers（章詳細=単章 / おさらい=全章 を“同じUI”で扱う共通化） ---------- */
/* reviewAll のときは全章を対象スコープにし、章詳細と同じ deck/出題ロジックをそのまま再利用する。
   各問題の id（章コード#idx）は元のまま保持＝習熟度・SRS・統計のロジックは一切変更しない。 */
function scopeChapters(){ return reviewAll ? DATA.chapters : (curChapter ? [curChapter] : []); }
function scopeDeckCount(key){ return scopeChapters().reduce((s,c)=>s+deckCount(c,key),0); }
function scopePick(deck,count,shuffleOn){
  let pool=[];
  scopeChapters().forEach(c=>{ pickWords(c,deck,0,false).forEach(x=>pool.push({q:x.q,idx:x.idx,id:x.id,code:c.code})); });
  pool=shuffleOn?shuffle(pool):pool;
  if(count>0&&pool.length>count) pool=pool.slice(0,count);
  return pool;
}
function scopeQuestions(){ const out=[]; scopeChapters().forEach(c=>c.questions.forEach((q,idx)=>out.push({q,idx,code:c.code}))); return out; }
function scopeDonutSVG(size){

  scopeChapters().forEach(c=>c.questions.forEach((q,idx)=>{ cts[profOf(wordId(c.code,idx))]++; total++; }));

function ringSVG(pct,size,centerText,centerSub){
  const r=15.9155, col=pct>=80?"#1a9d5a":pct>=40?"#00c1cc":pct>0?"#7cc6b0":"#dcdce0";

  const sub=centerSub?`<text x="18" y="${big?24:24}" text-anchor="middle" class="ring-sub" font-size="4.2">${centerSub}</text>`:"";
  return `<svg width="${size}" height="${size}" viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="${r}" fill="none" stroke="#f0f0f0" stroke-width="3.2"/>

      stroke-dasharray="${pct} 100" transform="rotate(-90 18 18)"/>

/* ---------- DONUT CHART ---------- */
function donutSVG(c,size){
  const total=c.questions.length; if(!total) return ringSVG(0,size,"?","");
  let gray=0,blue=0,green=0;
  // 色: p=0→灰, p=1(苦手)→青, p=2/3/4(うろ覚え以上)→緑
  c.questions.forEach((q,idx)=>{ const p=profOf(wordId(c.code,idx)); if(p===0)gray++;else if(p===1)blue++;else green++; });
  const grayPct=Math.round(gray/total*100);
  const bluePct=Math.round(blue/total*100);
  const greenPct=100-grayPct-bluePct;
  const gDeg=greenPct*3.6,bDeg=bluePct*3.6;
  const chIdx=DATA.chapters.findIndex(ch=>ch.code===c.code)+1;
  const hole=Math.round(size*0.60); const fs=size>=60?14:11;
