→ FeCl₂ + H₂S"},{"q":"FeS + H₂SO₄ → [____]","answer":"FeSO₄ + H₂S (加熱なし)","choices":["FeSO₄ + H₂S (加熱なし)","FeSO₄ + H₂S (加熱必要)","FeO + H₂O + SO₂ (加熱なし)","FeO + H₂O + SO₂ (加熱必要)"],"explain":"FeS + H₂SO₄ → FeSO₄ + H₂S\n★硫化鉄(II)FeSに希硫酸または希塩酸を加えると硫化水素が発生します。\n★希硫酸や希塩酸が含まれる反応では、ほとんどが加熱の必要はありません。\n★比較:濃硫酸(酸化作用あり)は、硫化水素H₂S(弱酸性・還元性)と酸化還元反応をするため、この反応になりません。"},{"q":"[____] → FeSO₄ + H₂S","answer":"FeS + H₂SO₄ (加熱なし)","choices":["FeS + H₂SO₄ (加熱なし)","FeS + H₂SO₄ (加熱必要)","FeO + H₂O + SO₂ (加熱なし)","FeO + H₂O + SO₂ (加熱必要)"],"explain":"FeS + H₂SO₄ → FeSO₄ + H₂S\n★硫化鉄(II)FeSに希硫酸または希塩酸を加えると硫化水素が発生します。\n★希硫酸や希塩酸が含まれる反応では、ほとんどが加熱の必要はありません。\n★比較:濃硫酸(酸化作用あり)は、硫化水素H₂S(弱酸性・還元性)と酸化還元反応をするため、この反応になりません。"},{"q":"火山ガスや温泉水(鉱泉)に含まれ、無色、腐卵臭の有毒な気体といえば[____]である。","answer":"硫化水素H₂S","choices":["硫化水素H₂S","二酸化硫黄SO₂","三酸化硫黄SO₃","塩素Cl₂"],"explain":"火山ガスや温泉水(鉱泉)に含まれ、無色、腐卵臭の有毒な気体といえば[ 硫化水素H₂S ]である。"},{"q":"硫化水素の二段階のイオン反応式は、\n①H₂S ⇄ [____]\n②[____] ⇄ H⁺ + S²⁻","answer":"H⁺ + HS⁻、HS⁻","choices":["H⁺ + HS⁻、HS⁻","H⁺ + HS⁻、S²⁻","2H⁺ + S²⁻、HS⁻","2H⁺ + S²⁻、S²⁻"],"explain":"硫化水素の二段階のイオン反応式は、\n①H₂S ⇄ H⁺ + HS⁻ \n②HS⁻ ⇄ H⁺ + S²⁻\n★H⁺が1つずつ電離します。"},{"q":"硫化水素の水溶液は[____](性)を示し、強い[____]をもつ。","answer":"弱酸性、(強い)還元性","choices":["弱酸性、(強い)還元性","弱酸性、(強い)酸化力","強酸性、(強い)還元性","強酸性、(強い)酸化力"],"explain":"硫化水素の水溶液は[ 弱酸性 ]を示し、強い[ 還元性 ]をもつ。"},{"q":"H₂S + I₂ → [____]","answer":"2HI + S","choices":["2HI + S","H₂ + SI₂","2HI + S²⁻","HI₂ + SH⁻"],"explain":"H₂S + I₂ → 2HI + S\n硫化水素の強い還元性により、ヨウ素が還元されてヨウ化水素になります。酸化数は、硫黄(-2→0)、ヨウ素(0→-1)です。"},{"q":"[____] → 2HI + S","answer":"H₂S + I₂","choices":["H₂S + I₂","SO₂ + I₂","S²⁻ + 2I⁻ + H₂","H₂S + 2HI"],"explain":"H₂S + I₂ → 2HI + S\n硫化水素の強い還元性により、ヨウ素が還元されてヨウ化水素になります。酸化数は、硫黄(-2→0)、ヨウ素(0→-1)です。"},{"q":"硫化水素は、[____]水溶液を染み込ませたろ紙(鉛糖紙)を[____](色)にする。","answer":"酢酸鉛(II)、黒色","choices":["酢酸鉛(II)、黒色","酢酸鉛(II)、白色","硫化炭素、黒色","硫化炭素、白色"],"explain":"硫化水素は、[ 酢酸鉛(II) ]水溶液を染み込ませたろ紙(鉛糖紙)を[ 黒色 ]にする。\n★鉛糖紙は「えんとうし」と読みます。"},{"q":"(CH₃COO)₂Pb + H₂S → [____]","answer":"PbS + 2CH₃COOH","choices":["PbS + 2CH₃COOH","PbS + C₂H₄(COOH)₂","PbSO₄ + 2CH₃COOH","PbSO₄ + C₂H₄COOH"],"explain":"(CH₃COO)₂Pb + H₂S → PbS + 2CH₃COOH\n★硫化水素が、酢酸鉛(II)水溶液を染み込ませたろ紙(鉛糖紙)を黒色にするところを連想します。"},{"q":"硫黄の燃焼により[____]が得られる。(工業的製法)","answer":"二酸化硫黄SO₂","choices":["二酸化硫黄SO₂","硫化水素H₂S","三酸化硫黄SO₃","硫酸H₂SO₄"],"explain":"硫黄の燃焼により[ 二酸化硫黄SO₂ ]が得られる。(工業的製法)\n★S + O₂ → SO₂\n★燃焼(加熱)により三酸化硫黄を生成するには五酸化バナジウムを触媒として二酸化硫黄を400°C〜600°Cに加熱します。\n★実験室でも硫黄の燃焼はできますが、実験室では安全かつ手軽な方法として、「亜硫酸ナトリウムまたは亜硫酸水素ナトリウムに希硫酸を加える」「銅に濃硫酸を加えて加熱する」の2つが用いられます。"},{"q":"S + O₂ → [____](工業的製法)","answer":"SO₂","choices":["SO₂","H₂S","SO₃","H₂SO₄"],"explain":"S + O₂ → SO₂(工業的製法)\n★硫黄の燃焼により二酸化硫黄が得られます。\\n★実験室でも硫黄の燃焼はできますが、実験室では安全かつ手軽な方法として、「亜硫酸ナトリウムまたは亜硫酸水素ナトリウムに希硫酸を加える」「銅に濃硫酸を加えて加熱する」の2つが用いられます。"},{"q":"亜硫酸ナトリウムに希硫酸を加えると[____]が発生する。","answer":"二酸化硫黄SO₂","choices":["二酸化硫黄SO₂","硫化水素H₂S","三酸化硫黄SO₃","硫酸H₂SO₄"],"explain":"亜硫酸ナトリウムに希硫酸を加えると[ 二酸化硫黄SO₂ ]が発生する。\n★Na₂SO₃ + H₂SO₄ → Na₂SO₄ + H₂O + SO₂ (加熱なし)\n★希硫酸は加熱なし、濃硫酸は加熱あり、が基本です。"},{"q":"[____] + H₂SO₄ → Na₂SO₄ + H₂O + SO₂","answer":"Na₂SO₃ (加熱なし)","choices":["Na₂SO₃ (加熱なし)","Na₂SO₃ (加熱必要)","2NaSO₃ (加熱なし)","2NaSO₃ (加熱必要)"],"explain":"Na₂SO₃ + H₂SO₄ → Na₂SO₄ + H₂O + SO₂ (加熱なし)\n★亜硫酸ナトリウムに希硫酸を加えると二酸化硫黄が発生します。\n★希硫酸は加熱なし、濃硫酸は加熱あり、が基本です。"},{"q":"Na₂SO₃ + H₂SO₄ → [____]","answer":"Na₂SO₄ + H₂O + SO₂ (加熱なし)","choices":["Na₂SO₄ + H₂O + SO₂ (加熱なし)","Na₂SO₄ + H₂O + SO₃ (加熱必要)","NaHSO₄ + H₂O + SO₂ (加熱なし)","NaHSO₄ + H₂O + SO₃ (加熱必要)"],"explain":"Na₂SO₃ + H₂SO₄ → Na₂SO₄ + H₂O + SO₂ (加熱なし)\n★亜硫酸ナトリウムに希硫酸を加えると二酸化硫黄が発生します。\n★希硫酸は加熱なし、濃硫酸は加熱あり、が基本です。"},{"q":"亜硫酸水素ナトリウムに希硫酸を加えると[____]が発生する。","answer":"二酸化硫黄SO₂","choices":["二酸化硫黄SO₂","硫化水素H₂S","三酸化硫黄SO₃","硫酸H₂SO₄"],"explain":"亜硫酸水素ナトリウムに希硫酸を加えると[ 二酸化硫黄SO₂ ]が発生する。\n★NaHSO₃ + H₂SO₄ → NaHSO₄ + H₂O + SO₂ (加熱なし)\n★加熱ありのときは次の反応式になります。\n2NaHSO₃ + H₂SO₄ → Na₂SO₄ + 2H₂O + 2SO₂(加熱あり)\n★三酸化硫黄は硫酸水素ナトリウム→チオ硫酸ナトリウム→三酸化硫黄と生成できます。"},{"q":"NaHSO₃ + H₂SO₄ → [____]","answer":"NaHSO₄ + H₂O + SO₂ (加熱なし)","choices":["NaHSO₄ + H₂O + SO₂ (加熱なし)","NaHSO₄ + H₂O + SO₃ (加熱必要)","Na₂SO₄ + H₂O + SO₂ (加熱なし)","Na₂SO₄ + H₂O + SO₃ (加熱必要)"],"explain":"NaHSO₃ + H₂SO₄ → NaHSO₄ + H₂O + SO₂ (加熱なし)\n★亜硫酸水素ナトリウムに希硫酸を加えると二酸化硫黄が発生します。\n★加熱ありのときは次の反応式になります。\n2NaHSO₃ + H₂SO₄ → Na₂SO₄ + 2H₂O + 2SO₂(加熱あり)"},{"q":"二酸化硫黄SO₂は[____]とも呼ばれる。","answer":"亜硫酸ガス","choices":["亜硫酸ガス","硫酸ガス","硫酸","発煙硫酸"],"explain":"二酸化硫黄SO₂は[ 亜硫酸ガス ]とも呼ばれる。\n★二酸化硫黄を水に溶かすと亜硫酸。また、二酸化硫黄は、亜硫酸ナトリウムや亜硫酸水素ナトリウムに希硫酸を加えることで生成されます。"},{"q":"銅に熱濃硫酸(加熱した濃硫酸)を作用させると[____]が得られる。","answer":"二酸化硫黄SO₂","choices":["二酸化硫黄SO₂","硫化水素H₂S","三酸化硫黄SO₃","硫酸H₂SO₄"],"explain":"銅に熱濃硫酸(加熱した濃硫酸)を作用させると[ 二酸化硫黄SO₂ ]が得られる。"},{"q":"Cu + 2H₂SO₄ → CuSO₄ + 2H₂O + [____]","answer":"SO₂ (加熱必要)","choices":["SO₂ (加熱必要)","SO₂ (加熱なし)","SO₃ (加熱必要)","SO₃ (加熱なし)"],"explain":"Cu + 2H₂SO₄ → CuSO₄ + 2H₂O + SO₂ (加熱必要)\n★銅に熱濃硫酸(加熱した濃硫酸)を作用させると二酸化硫黄が得られます。"},{"q":"二酸化硫黄SO₂は[____](色)、[____](臭)の有毒な気体である。","answer":"無色、刺激臭","choices":["無色、刺激臭","無色、無臭","淡黄色、刺激臭","淡黄色、無臭"],"explain":"二酸化硫黄SO₂は[ 無色 ]、[ 刺激臭 ]の有毒な気体である。"},{"q":"二酸化硫黄SO₂が水に溶けると[____]が生じる。化学式は[____]。","answer":"亜硫酸、H₂SO₃","choices":["亜硫酸、H₂SO₃","亜硫酸、H₂SO₄","希硫酸、H₂SO₃","希硫酸、H₂SO₄"],"explain":"二酸化硫黄SO₂が水に溶けると[ 亜硫酸 ]が生じる。化学式は[ H₂SO₃ ]。\n★SO₂ + H₂O ⇄ H⁺ + HSO₃⁻\n★二酸化硫黄SO₂は亜硫酸ガスとも呼ばれます。"},{"q":"SO₂ + H₂O ⇄ [____]","answer":"H⁺ + HSO₃⁻","choices":["H⁺ + HSO₃⁻","H⁺ + SO₂(OH)⁻","OH⁻ + HSO₂⁻","OH⁻ + SO₂(OH)⁻"],"explain":"SO₂ + H₂O ⇄ H⁺ + HSO₃⁻\n★二酸化硫黄が水に溶けると亜硫酸が生じます(生じるとされています)。"},{"q":"二酸化硫黄SO₂や亜硫酸H₂SO₃には[____](作用)があり、紙や繊維などの[____](剤)に用いられる。","answer":"還元作用、漂白剤","choices":["還元作用、漂白剤","還元作用、染色剤","酸化作用、漂白剤","酸化作用、染色剤"],"explain":"二酸化硫黄SO₂や亜硫酸H₂SO₃には[ 還元作用 ]があり、紙や繊維などの[ 漂白剤 ]に用いられる。"},{"q":"二酸化硫黄は通常は[____](剤)としてはたらくが、[____]との反応では[____](剤)としてはたらく。","answer":"還元剤、硫化水素H₂S、酸化剤","choices":["還元剤、硫化水素H₂S、酸化剤","還元剤、硫黄S、酸化剤","酸化剤、硫化水素H₂S、還元剤","酸化剤、硫黄S、還元剤"],"explain":"二酸化硫黄は通常は[ 還元剤 ]としてはたらくが、[ 硫化水素H₂S ]との反応では[ 酸化剤 ]としてはたらく。\n★2H₂S + SO₂ → 3S + 2H₂O\nこの反応式は「さんエス(3S)」と覚えて、残りの係数を合わせています。"},{"q":"2H₂S + SO₂ → [____]","answer":"3S + 2H₂O","choices":["3S + 2H₂O","3H₂SO₃","2S + H₂SO₃","3S + H₂O"],"explain":"2H₂S + SO₂ → 3S + 2H₂O\n★この反応式は「さんエス(3S)」と覚えて、残りの係数を合わせています。通常はどちらも還元剤ですが、この反応での二酸化硫黄は酸化剤となります。"},{"q":"ヨウ素溶液の色を消す気体といえば[____]や[____]がある。","answer":"硫化水素H₂S、二酸化硫黄SO₂","choices":["硫化水素H₂S、二酸化硫黄SO₂","硫化水素H₂S、塩素Cl₂","オゾンO₃、二酸化硫黄SO₂","オゾンO₃、塩素Cl₂"],"explain":"ヨウ素溶液の色を消す気体といえば[ 硫化水素H₂S ]や[ 二酸化硫黄SO₂ ]がある。\n★硫化水素H₂Sと二酸化硫黄SO₂には還元作用があり、ヨウ素溶液(別名、ヨウ素ヨウ化カリウム水溶液)の褐色を脱色します。同様に、過マンガン酸カリウムKMnO₄の紫色(赤紫色)も脱色します。"},{"q":"過マンガン酸カリウムKMnO₄の色を消す気体といえば[____]や[____]がある。","answer":"硫化水素H₂S、二酸化硫黄SO₂","choices":["硫化水素H₂S、二酸化硫黄SO₂","硫化水素H₂S、塩素Cl₂","オゾンO₃、二酸化硫黄SO₂","オゾンO₃、塩素Cl₂"],"explain":"過マンガン酸カリウムKMnO₄の色を消す気体といえば[ 硫化水素H₂S ]や[ 二酸化硫黄SO₂ ]がある。\n★硫化水素H₂Sと二酸化硫黄SO₂には還元作用があり、過マンガン酸カリウムKMnO₄の紫色(赤紫色)を脱色します。同様に、ヨウ素溶液(別名、ヨウ素ヨウ化カリウム水溶液)の褐色も脱色します。"},{"q":"ヨウ化カリウム水溶液からヨウ素を遊離させる気体には[____]や[____]がある。","answer":"オゾンO₃、塩素Cl₂","choices":["オゾンO₃、塩素Cl₂","硫化水素H₂S、二酸化硫黄SO₂","硫化水素H₂S、塩素Cl₂","オゾンO₃、二酸化硫黄SO₂"],"explain":"ヨウ化カリウム水溶液からヨウ素を遊離させる気体には[ オゾンO₃ ]や[ 塩素Cl₂ ]がある。\n★オゾンO₃や塩素Cl₂には酸化力があり、ヨウ素が遊離します。共に漂白作用もあります。★「ヨウ化カリウムデンプン紙を青変させる」の表現もあります。"},{"q":"ヨウ化カリウムデンプン紙を青変させる気体には[____]や[____]がある。","answer":"オゾンO₃、塩素Cl₂","choices":["オゾンO₃、塩素Cl₂","硫化水素H₂S、二酸化硫黄SO₂","硫化水素H₂S、塩素Cl₂","オゾンO₃、二酸化硫黄SO₂"],"explain":"ヨウ化カリウムデンプン紙を青変させる気体には[ オゾンO₃ ]や[ 塩素Cl₂ ]がある。\n★オゾンO₃や塩素Cl₂には酸化力があり、ヨウ素が遊離します。共に漂白作用もあります。★「ヨウ化カリウム水溶液からヨウ素を遊離させる」の表現もあります。"},{"q":"二酸化硫黄の中の硫黄原子の酸化数は[____]。","answer":"+4","choices":["+4","+2","+6","-2"],"explain":"二酸化硫黄の中の硫黄原子の酸化数は[ +4 ]。\n★SO₂全体で酸化数0、Oの酸化数-2、Sの酸化数をXとおくと、\nX + (-2)×2 = 0よりX = +4\n★「二酸化硫黄、硫酸、硫化水素の中の硫黄原子の酸化数を書け。なお、酸化数が正の場合は+を、負の場合は-を付けて書くこと。」順に+4、+6、-2(東北大学2019年)と出題されました。"},{"q":"硫酸の中の硫黄原子の酸化数は[____]。","answer":"+6","choices":["+6","+2","+4","-2"],"explain":"硫酸の中の硫黄原子の酸化数は[ +6 ]。\n★H₂SO₄全体で酸化数0、Hの酸化数+1、Oの酸化数-2、Sの酸化数をXとおくと、\n(+1)×2 + X + (-2)×4 = 0よりX = +6\n★「二酸化硫黄、硫酸、硫化水素の中の硫黄原子の酸化数を書け。なお、酸化数が正の場合は+を、負の場合は-を付けて書くこと。」順に+4、+6、-2(東北大学2019年)と出題されました。"},{"q":"硫化水素の中の硫黄原子の酸化数は[____]。","answer":"-2","choices":["-2","+6","+2","+4"],"explain":"硫化水素の中の硫黄原子の酸化数は[ -2 ]。\n★H₂S全体で酸化数0、Hの酸化数+1、Sの酸化数をXとおくと、\n(+1)×2 + X = 0よりX = -2\n★「二酸化硫黄、硫酸、硫化水素の中の硫黄原子の酸化数を書け。なお、酸化数が正の場合は+を、負の場合は-を付けて書くこと。」順に+4、+6、-2(東北大学2019年)と出題されました。"}]},
  {"code":"MB08","name":"希硫酸と濃硫酸","parent":"非金属2","questions":[{"q":"硫酸は工業的には[____](法)で作られる。","answer":"接触法","choices":["接触法","ハーバーボッシュ法","アルカリ融解","オストワルト法"],"explain":"硫酸は工業的には[ 接触法 ]で作られる。"},{"q":"接触法の流れについて、[____]から始めるものと、[____]から始めるものが代表的である。(二酸化硫黄を得る段階として)","answer":"硫黄の単体S、黄鉄鉱FeS₂","choices":["硫黄の単体S、黄鉄鉱FeS₂","硫黄の単体S、黄鉄鉱FeS₃","三酸化硫黄SO₃、黄鉄鉱FeS₂","三酸化硫黄SO₃、黄鉄鉱FeS₃"],"explain":"接触法の流れについて、[ 硫黄の単体S ]から始めるものと、[ 黄鉄鉱FeS₂ ]から始めるものがある。(二酸化硫黄を得る段階として)\n★現在は硫黄の単体が比較的容易に手に入るため、黄鉄鉱FeS₂や黄銅鉱CuFeS₂の使用は少ないようです。"},{"q":"黄鉄鉱FeS₂の酸化\n[____] → 2Fe₂O₃ + 8SO₂","answer":"4FeS₂ + 11O₂","choices":["4FeS₂ + 11O₂","4FeS₂ + 13O₂","2FeS₂ + 11O₂","2FeS₂ + 13O₂"],"explain":"黄鉄鉱FeS₂の酸化\n4FeS₂ + 11O₂ → 2Fe₂O₃ + 8SO₂\n★係数を合わせる問題です。O₂でまとめて、3O₂と8O₂より(3+8=11で)11O₂と計算するとよいと思います。"},{"q":"黄鉄鉱FeS₂の酸化\n4FeS₂ + 11O₂ → [____]","answer":"2Fe₂O₃ + 8SO₂","choices":["2Fe₂O₃ + 8SO₂","2Fe₂O₃ + 8SO₃","4FeO + 8SO₂","4FeO + 8SO₃"],"explain":"黄鉄鉱FeS₂の酸化\n4FeS₂ + 11O₂ → 2Fe₂O₃ + 8SO₂\n★二酸化硫黄が発生します。酸化鉄はFe₂O₃が生成します。覚えておく酸化鉄には、酸化鉄(II)FeO、赤錆(赤鉄鉱)Fe₂O₃、黒錆(磁鉄鉱)Fe₃O₄ (FeO + Fe₂O₃)があります。"},{"q":"二酸化硫黄を[____]を触媒として、空気中の酸素で酸化すると[____]が得られる。","answer":"酸化バナジウム(V)V₂O₅、三酸化硫黄SO₃","choices":["酸化バナジウム(V)V₂O₅、三酸化硫黄SO₃","酸化バナジウム(V)V₂O₅、亜硫酸H₂SO₃","酸化銅(II)CuO、三酸化硫黄SO₃","酸化銅(II)CuO、亜硫酸H₂SO₃"],"explain":"二酸化硫黄を[ 酸化バナジウム(V)V₂O₅ ]を触媒として、空気中の酸素で酸化すると[ 三酸化硫黄SO₃ ]が得られる。\n★400°C〜600°Cの高温で反応します。\n★2SO₂ + O₂ → 2SO₃ (触媒V₂O₅)"},{"q":"2SO₂ + O₂ → [____] (触媒[____])","answer":"2SO₃、触媒V₂O₅","choices":["2SO₃、触媒V₂O₅","2SO₃、触媒CuO","H₂SO₃、触媒V₂O₅","H₂SO₃、触媒CuO"],"explain":"2SO₂ + O₂ → 2SO₃ (触媒V₂O₅)\n★二酸化硫黄を酸化バナジウム(V)を触媒として、空気中の酸素で酸化すると三酸化硫黄が得られます。\n★400°C〜600°Cの高温で反応します。"},{"q":"[____]を濃硫酸に吸収させて[____]とし、これを希硫酸で薄めて濃硫酸にする。","answer":"三酸化硫黄、発煙硫酸","choices":["三酸化硫黄、発煙硫酸","三酸化硫黄、亜硫酸","二酸化硫黄、発煙硫酸","二酸化硫黄、亜硫酸"],"explain":"[ 三酸化硫黄 ]を濃硫酸に吸収させて[ 発煙硫酸 ]とし、これを希硫酸で薄めて濃硫酸にする。\n★この流れは、濃硫酸が最初と最後に出てきたり、「薄めて濃硫酸にする」など少しややこしいです。"},{"q":"[____] + H₂O → H₂SO₄ (水は[____]中の水)","answer":"SO₃、濃硫酸中の水","choices":["SO₃、濃硫酸中の水","SO₃、亜硫酸中の水","SO₂、濃硫酸中の水","SO₂、亜硫酸中の水"],"explain":"SO₃ + H₂O → H₂SO₄ (水は[ 濃硫酸 ]中の水)\n★三酸化硫黄は水と激しく作用して硫酸となるため、濃硫酸(または希硫酸)に吸収させて硫酸を作ります。"},{"q":"三酸化硫黄は[____]と激しく作用して霧状の硫酸になってしまうため、一旦、[____](または希硫酸)に吸収させて発煙硫酸とし、それを薄めて硫酸を作っている。","answer":"水、濃硫酸","choices":["水、濃硫酸","水、亜硫酸","亜硫酸、濃硫酸","濃硫酸、亜硫酸"],"explain":"三酸化硫黄は[ 水 ]と激しく作用して霧状の硫酸になってしまうため、一旦、[ 濃硫酸 ](または希硫酸)に吸収させて発煙硫酸とし、それを薄めて硫酸を作っている。\n★SO₃ + H₂O → H₂SO₄ (水は濃硫酸中の水)"},{"q":"次の3つの化学式を1つにまとめよ。\n4FeS₂ + 11O₂ → 2Fe₂O₃ + 8SO₂\n2SO₂ + O₂ → 2SO₃ (触媒V₂O₅)\nSO₃ + H₂O → H₂SO₄ (水は濃硫酸中の水)","answer":"4FeS₂ + 15O₂ + 8H₂O → 2Fe₂O₃ + 8H₂SO₄","choices":["4FeS₂ + 15O₂ + 8H₂O → 2Fe₂O₃ + 8H₂SO₄","4FeS₂ + 15O₂ + 8H₂O → 4FeO + 8H₂SO₄","4FeS₂ + 17O₂ + 8H₂O → 2Fe₂O₃ + 8H₂SO₄","4FeS₂ + 17O₂ + 8H₂O → 4FeO + 8H₂SO₄"],"explain":"① + ②×4 + ③×8よりSO₂とSO₃を消去します。\n①4FeS₂ + 11O₂ → 2Fe₂O₃ + 8SO₂\n②2SO₂ + O₂ → 2SO₃\n③SO₃ + H₂O → H₂SO₄\n★4FeS₂ + 15O₂ + 8H₂O → 2Fe₂O₃ + 8H₂SO₄"},{"q":"次の3つの化学式を1つにまとめよ。\nS + O₂ → SO₂\n2SO₂ + O₂ → 2SO₃ (触媒V₂O₅)\nSO₃ + H₂O → H₂SO₄ (水は濃硫酸中の水)","answer":"2S + 3O₂ + 2H₂O → 2H₂SO₄","choices":["2S + 3O₂ + 2H₂O → 2H₂SO₄","2S + 3O₂ + 2H₂O → 4H₂SO₄","4S + 3O₂ + 2H₂O → 2H₂SO₄","4S + 3O₂ + 2H₂O → 4H₂SO₄"],"explain":"①×2 + ② + ③×2よりSO₂とSO₃を消去します。\n①S + O₂ → SO₂\n②2SO₂ + O₂ → 2SO₃\n③SO₃ + H₂O → H₂SO₄\n★2S + 3O₂ + 2H₂O → 2H₂SO₄"},{"q":"発煙硫酸は常温で[____]の白煙を生じる。","answer":"三酸化硫黄SO₃","choices":["三酸化硫黄SO₃","二酸化硫黄SO₂","亜硫酸H₂SO₃","希硫酸H₂SO₄"],"explain":"発煙硫酸は常温で[ 三酸化硫黄SO₃ ]の白煙を生じる。"},{"q":"三酸化硫黄は、常温で[____](色)、[____](状結晶)で、[____]しやすい。","answer":"無色、針状結晶、昇華","choices":["無色、針状結晶、昇華","無色、塊状結晶、酸化","黄色、針状結晶、昇華","黄色、ゴム状結晶、酸化"],"explain":"三酸化硫黄は、常温で[ 無色 ]、[ 針状結晶 ]で、[ 昇華 ]しやすい。"},{"q":"2SO₂ + O₂ → 2SO₃ (触媒V₂O₅)\nSO₃ + H₂O → H₂SO₄\nこの2つの反応は[____]である。","answer":"接触法","choices":["接触法","ハーバーボッシュ法","アルカリ融解","オストワルト法"],"explain":"2SO₂ + O₂ → 2SO₃ (触媒V₂O₅)\nSO₃ + H₂O → H₂SO₄\nこの2つの反応は[ 接触法 ]である。\n★接触法の後半2つの反応式です。"},{"q":"[____]を亜硫酸ガスとも呼び、大気中の汚染物質としてSOₓを[____]と呼ぶ。","answer":"二酸化硫黄SO₂ 、ソックス","choices":["二酸化硫黄SO₂ 、ソックス","二酸化硫黄SO₂ 、ノックス","三酸化硫黄SO₃ 、ソックス","三酸化硫黄SO₃ 、ノックス"],"explain":"[ 二酸化硫黄SO₂ ]を亜硫酸ガスとも呼び、大気中の汚染物質としてSOₓを[ ソックス ]と呼ぶ。\n★NOₓはノックスと呼びます。"},{"q":"濃硫酸は沸点が[____]く、[____](性)の酸である。","answer":"高く、不揮発性","choices":["高く、不揮発性","高く、揮発性","低く、不揮発性","低く、揮発性"],"explain":"濃硫酸は沸点が[ 高く ]、[ 不揮発性 ]の酸である。"},{"q":"濃硫酸は[____](性)が強く、[____](性)気体の乾燥剤に用いられる。","answer":"吸湿性、中性・酸性","choices":["吸湿性、中性・酸性","吸湿性、塩基性","揮発性、中性・酸性","揮発性、塩基性"],"explain":"濃硫酸は[ 吸湿性 ]が強く、[ 中性・酸性 ]気体の乾燥剤に用いられる。\n★ただし、硫化水素H₂S(弱酸性)は還元性が強く、濃硫酸H₂SO₄と酸化還元反応するため、濃硫酸を乾燥剤としては使えないことに注意です。"},{"q":"濃硫酸を乾燥剤として用いることのできない物質の組み合わせとして適切なものは、[____] である。","answer":"アンモニア、硫化水素","choices":["アンモニア、硫化水素","アンモニア、酸素","酸素、硫化水素","酸素、塩化水素"],"explain":"濃硫酸を乾燥剤として用いることのできない物質の組み合わせとして適切なものは、[ アンモニア、硫化水素 ] である。\n★濃硫酸は中性・酸性の気体の乾燥剤に用いられますが、硫化水素(弱酸性)とは酸化還元反応を起こすため乾燥剤として使用できません。アンモニア(弱塩基性)は濃硫酸と中和して吸収されてしまいます。"},{"q":"濃硫酸は有機化合物に対して[____](作用)がある。","answer":"脱水作用","choices":["脱水作用","漂白作用","還元作用","吸熱作用"],"explain":"濃硫酸は有機化合物に対して[ 脱水作用 ]がある。\n★アルコールの分子間脱水や分子内脱水など有機化学で活躍します。"},{"q":"熱濃硫酸は強い[____](作用)をもち、[____]なども溶かしてSO₂を発生する。","answer":"酸化作用、銅や銀","choices":["酸化作用、銅や銀","酸化作用、金や白金","還元作用、銅や銀","還元作用、金や白金"],"explain":"熱濃硫酸は強い[ 酸化作用 ]をもち、[ 銅や銀 ]なども溶かしてSO₂を発生する。"},{"q":"濃硫酸を水に溶かすと、多量の[____]を発生して[____]になる。","answer":"溶解熱、希硫酸","choices":["溶解熱、希硫酸","溶解熱、亜硫酸","蒸発熱、希硫酸","蒸発熱、亜硫酸"],"explain":"濃硫酸を水に溶かすと、多量の[ 溶解熱 ]を発生して[ 希硫酸 ]になる。"},{"q":"希硫酸は電離度が[____]く、[____](性)を示す。","answer":"大きく、強酸性","choices":["大きく、強酸性","大きく、弱酸性","小さく、強酸性","小さく、弱酸性"],"explain":"希硫酸は電離度が[ 大きく ]、[ 強酸性 ]を示す。"},{"q":"薬品を保存するデシケーター(容器)の中に濃硫酸を入れるのは、濃硫酸の[____]を利用している。","answer":"吸湿性","choices":["吸湿性","酸化作用","脱水作用","不揮発性"],"explain":"薬品を保存するデシケーター(容器)の中に濃硫酸を入れるのは、濃硫酸の[ 吸湿性 ]を利用している。\n★吸湿性は水分子H₂Oを吸収する性質。脱水作用はHとOを奪って水分子H₂Oを作る性質です。"},{"q":"スクロース(砂糖の主成分)の固体に濃硫酸を加えると、炭素が遊離し炭化する。これは濃硫酸の[____]を利用している。","answer":"脱水作用","choices":["脱水作用","酸化作用","吸湿性","不揮発性"],"explain":"スクロース(砂糖の主成分)の固体に濃硫酸を加えると、炭素が遊離し炭化する。これは濃硫酸の[ 脱水作用 ]を利用している。\n★吸湿性は水分子H₂Oを吸収する性質。脱水作用はHとOを奪って水分子H₂Oを作る性質です。"},{"q":"銅の単体に熱した濃硫酸を加えると、二酸化硫黄SO₂が発生する。これは濃硫酸の[____]を利用している。","answer":"酸化作用","choices":["酸化作用","脱水作用","不揮発性","吸湿性"],"explain":"銅の単体に熱した濃硫酸を加えると、二酸化硫黄SO₂が発生する。これは濃硫酸の[ 酸化作用 ]を利用している。\n★Cu + 2H₂SO₄ → CuSO₄ + 2H₂O + SO₂ (加熱必要)"},{"q":"濃硫酸を希釈する場合、[a)____]に[b)____]を少しずつ加えていく。逆に、[b)____]に[a)____]を加えると発熱して水蒸気が発生し、硫酸が周囲に飛び散り危険である。","answer":"a) 水、b) 濃硫酸","choices":["a) 水、b) 濃硫酸","a) 水、b) 亜硫酸","a) 濃硫酸、b) 水","a) 濃硫酸、b) 亜硫酸"],"explain":"濃硫酸を希釈する場合、[a) 水 ]に[b) 濃硫酸 ]を少しずつ加えていく。逆に、[b) 濃硫酸 ]に[a) 水 ]を加えると発熱して水蒸気が発生し、硫酸が周囲に飛び散り危険である。"}]},
  {"code":"MB09","name":"窒素とその化合物1","parent":"非金属2","questions":[{"q":"[____]は、常温で安定な無色、無臭の気体であり、空気の体積の約78％を占めている。","answer":"窒素N₂","choices":["窒素N₂","酸素O₂","水素H₂","二酸化炭素CO₂"],"explain":"[ 窒素N₂ ]は、常温で安定な無色、無臭の気体であり、空気の体積の約78％を占めている。"},{"q":"窒素を-196°Cで凝縮すると[____]となり、冷却剤に用いられる。","answer":"液体窒素","choices":["液体窒素","液体酸素","液体空気","固体の窒素"],"explain":"窒素を-196°Cで凝縮すると[ 液体窒素 ]となり、冷却剤に用いられる。\n★凝縮から液体と判断します。凝固点(融点)は-210°Cです。"},{"q":"塩化アンモニウムと水酸化カルシウムの混合物を加熱すると[____]が発生する。","answer":"アンモニアNH₃","choices":["アンモニアNH₃","二酸化窒素NO₂","窒素N₂","塩化水素HCl"],"explain":"塩化アンモニウムと水酸化カルシウムの混合物を加熱すると[ アンモニアNH₃ ]が発生する。\n★2NH₄Cl + Ca(OH)₂ → CaCl₂ + 2NH₃ + 2H₂O (加熱必要)"},{"q":"2NH₄Cl + Ca(OH)₂ → [____]","answer":"CaCl₂ + 2NH₃ + 2H₂O (加熱必要)","choices":["CaCl₂ + 2NH₃ + 2H₂O (加熱必要)","CaCl₂ + 2NH₃ + 2H₂O (加熱なし)","CaCl₂ + N₂ + 2H₂O (加熱必要)","CaCl₂ + N₂ + 2H₂O (加熱なし)"],"explain":"2NH₄Cl + Ca(OH)₂ → CaCl₂ + 2NH₃ + 2H₂O\n★塩化アンモニウム(固)と水酸化カルシウム(固)の混合物を加熱するとアンモニアが生じます。\n★固体と固体の反応は基本的に加熱が必要になります。"},{"q":"[____] → CaCl₂ + 2NH₃ + 2H₂O","answer":"2NH₄Cl + Ca(OH)₂ (加熱必要)","choices":["2NH₄Cl + Ca(OH)₂ (加熱必要)","2NH₄Cl + Ca(OH)₂ (加熱なし)","2HNO₃ + 2HCl + Ca(OH)₂ (加熱必要)","2HNO₃ + 2HCl + Ca(OH)₂ (加熱なし)"],"explain":"2NH₄Cl + Ca(OH)₂ → CaCl₂ + 2NH₃ + 2H₂O\n★塩化アンモニウム(固)と水酸化カルシウム(固)の混合物を加熱するとアンモニアが生じます。\n★固体と固体の反応は基本的に加熱が必要になります。"},{"q":"塩化アンモニウムと水酸化カルシウムの混合物を加熱してアンモニアが発生する反応は[____]反応である。","answer":"弱塩基遊離反応","choices":["弱塩基遊離反応","酸化還元反応","揮発性気体遊離反応","分解反応"],"explain":"塩化アンモニウムと水酸化カルシウムの混合物を加熱してアンモニアが発生する反応は[ 弱塩基遊離反応 ]である。\n★弱塩基のアンモニアが遊離しています。\n★弱塩基追い出し反応とも呼びます。"},{"q":"亜硝酸アンモニウムの水溶液を加熱すると[____]が発生する。","answer":"窒素N₂","choices":["窒素N₂","二酸化窒素NO₂","アンモニアNH₃","塩化水素HCl"],"explain":"亜硝酸アンモニウムの水溶液を加熱すると[ 窒素N₂ ]が発生する。\n★実験室での窒素の製法です。\n★NH₄NO₂ → N₂ + 2H₂O (加熱必要)"},{"q":"NH₄NO₂ → [____]","answer":"N₂ + 2H₂O (加熱必要)","choices":["N₂ + 2H₂O (加熱必要)","N₂ + 2H₂O (加熱なし)","NH₃ + 2H₂ + NO (加熱必要)","NH₃ + 2H₂ + NO (加熱なし)"],"explain":"NH₄NO₂ → N₂ + 2H₂O (加熱必要)\n★亜硝酸アンモニウムの水溶液を加熱すると窒素が発生します。実験室での窒素の製法です。\n★分解反応は基本的に加熱が必要です。"},{"q":"[____] → N₂ + 2H₂O","answer":"NH₄NO₂ (加熱必要)","choices":["NH₄NO₂ (加熱必要)","NH₄NO₂ (加熱なし)","NH₄NO (加熱必要)","NH₄NO (加熱なし)"],"explain":"NH₄NO₂ → N₂ + 2H₂O (加熱必要)\n★亜硝酸アンモニウムの水溶液を加熱すると窒素が発生します。実験室での窒素の製法です。\n★分解反応は基本的に加熱が必要です。"},{"q":"亜硝酸アンモニウムの水溶液を加熱して窒素が発生する反応は[____]反応である。","answer":"分解反応","choices":["分解反応","弱塩基遊離反応","弱酸追遊離反応","揮発性気体遊離反応"],"explain":"亜硝酸アンモニウムの水溶液を加熱して窒素が発生する反応は[ 分解反応 ]である。\n★NH₄NO₂ → N₂ + 2H₂O (加熱必要)\n★分解反応は基本的に加熱が必要です。"},{"q":"アンモニアは水に[____]、空気より[____]ため、[____]で捕集する。","answer":"溶けやすく、軽い、上方置換","choices":["溶けやすく、軽い、上方置換","溶けにくく、軽い、上方置換","溶けやすく、重い、下方置換","溶けにくく、軽い、水上置換"],"explain":"アンモニアは水に[ 溶けやすく ]、空気より[ 軽い ]ため、[ 上方置換 ]で捕集する。"},{"q":"アンモニアは[____](色)で[____](臭)があり、水溶液は弱塩基性を示す。","answer":"無色、刺激臭","choices":["無色、刺激臭","無色、無臭","赤色、刺激臭","赤色、無臭"],"explain":"アンモニアは[ 無色 ]で[ 刺激臭 ]があり、水溶液は弱塩基性を示す。"},{"q":"アンモニアの水溶液は[____](性)を示す。","answer":"弱塩基性","choices":["弱塩基性","強塩基性","弱酸性","強酸性"],"explain":"アンモニアの水溶液は[ 弱塩基性 ]を示す。\n★NH₃ + H₂O ⇄ NH₄⁺ + OH⁻\n★アンモニア水と呼びます。"},{"q":"[____]は濃塩酸を付けたガラス棒を近づけ、白煙が生じることで検出できる。","answer":"アンモニアNH₃","choices":["アンモニアNH₃","窒素N₂","塩素Cl₂","塩化水素HCl"],"explain":"[ アンモニアNH₃ ]は濃塩酸を付けたガラス棒を近づけ、白煙が生じることで検出できる。\n★NH₃ + HCl → NH₄Cl\n★塩化アンモニウムNH₄Clは白色の固体(微結晶)です。"},{"q":"アンモニアの検出で、濃塩酸を付けたガラス棒を近づけたときに生じる白煙は、[____](体)の[____]である。","answer":"固体、塩化アンモニウムNH₄Cl","choices":["固体、塩化アンモニウムNH₄Cl","固体、亜硝酸アンモニウムNH₄NO₂","気体、塩化アンモニウムNH₄Cl","気体、亜硝酸アンモニウムNH₄NO₂"],"explain":"アンモニアの検出で、濃塩酸を付けたガラス棒を近づけたときに生じる白煙は、[ 固体 ]の[ 塩化アンモニウムNH₄Cl ]である。\n★固体であることに注意します。微結晶とも表記されます。"},{"q":"アンモニアを作るとき、乾燥剤は主に[____]を使う。","answer":"ソーダ石灰(CaOとNaOH)","choices":["ソーダ石灰(CaOとNaOH)","塩化カルシウムCaCl₂","十酸化四リンP₄O₁₀","濃硫酸H₂SO₄"],"explain":"アンモニアを作るとき、乾燥剤は主に[ ソーダ石灰(CaOとNaOH) ]を使う。\n★塩化カルシウムCaCl₂、濃硫酸H₂SO₄、十酸化四リンP₄O₁₀などはアンモニアと反応するため乾燥剤として適しません。"},{"q":"水や酸性気体(二酸化炭素など)を吸収するソーダ石灰は[____]と[____]の混合物である。","answer":"水酸化ナトリウムNaOH、酸化カルシウムCaO","choices":["水酸化ナトリウムNaOH、酸化カルシウムCaO","水酸化ナトリウムNaOH、塩化カルシウムCaCl₂","ケイ酸ナトリウムNa₂SiO₃、酸化カルシウムCaO","ケイ酸ナトリウムNa₂SiO₃、塩化カルシウムCaCl₂"],"explain":"水や酸性気体(二酸化炭素)を吸収するソーダ石灰は[ 水酸化ナトリウムNaOH ]と[ 酸化カルシウムCaO ]の混合物である。\n★NaOHとCaO ゴロ: なおちゃんえっちな顔でソーダ(石灰)飲む。"},{"q":"アンモニアの工業的製法はFe₃O₄を主成分とした触媒を用いて、窒素と水素から直接合成させる[____](法)である。","answer":"ハーバー・ボッシュ法","choices":["ハーバー・ボッシュ法","アンモニアソーダ法","アルカリ融解","オストワルト法"],"explain":"アンモニアの工業的製法はFe₃O₄を主成分とした触媒を用いて、窒素と水素から直接合成させる[ ハーバー・ボッシュ法 ]である。\nN₂ + 3H₂ ⇄ 2NH₃\n★「四酸化三鉄Fe₃O₄を主成分とする触媒」、「鉄Feを主成分とする触媒」などの表記があります。"},{"q":"アンモニアの工業的製法は[____](法)\nN₂ + 3H₂ ⇄ 2NH₃ (触媒[____])","answer":"ハーバー・ボッシュ法、Fe₃O₄を主成分","choices":["ハーバー・ボッシュ法、Fe₃O₄を主成分","アンモニアソーダ法、なし","熱分解、Feを主成分","オストワルト法、Pt"],"explain":"アンモニアの工業的製法は[ ハーバー・ボッシュ法 ]\nN₂ + 3H₂ ⇄ 2NH₃ (触媒[ Fe₃O₄を主成分 ])\n★フリッツ・ハーバー(独)が1918年にノーベル化学賞を受賞しています。一方、カール・ボッシュ(独)は1931年に他の研究開発でノーベル化学賞を受賞しています。"},{"q":"銅に希硝酸を反応させると[____]が発生し、銅に濃硝酸を反応させると[____]が発生する。","answer":"一酸化窒素NO、二酸化窒素NO₂","choices":["一酸化窒素NO、二酸化窒素NO₂","一酸化窒素NO、二酸化硫黄SO₂","二酸化窒素NO₂、一酸化窒素NO","二酸化窒素NO₂、二酸化窒素SO₂"],"explain":"銅に希硝酸を反応させると[ 一酸化窒素NO ]が発生し、銅に濃硝酸を反応させると[ 二酸化窒素NO₂ ]が発生する。\n★3Cu + 8HNO₃ → 3Cu(NO₃)₂ + 4H₂O + 2NO\n★Cu + 4HNO₃ → Cu(NO₃)₂ + 2H₂O + 2NO₂"},{"q":"銅に[____]を反応させると一酸化窒素NOが発生し、銅に[____]を反応させると二酸化窒素NO₂が発生する。","answer":"希硝酸、濃硝酸","choices":["希硝酸、濃硝酸","濃硝酸、希硝酸","希硝酸、亜硝酸","亜硝酸、濃硝酸"],"explain":"銅に[ 希硝酸 ]を反応させると一酸化窒素NOが発生し、銅に[ 濃硝酸 ]を反応させると二酸化窒素NO₂が発生する。\n★3Cu + 8HNO₃ → 3Cu(NO₃)₂ + 4H₂O + 2NO\n★Cu + 4HNO₃ → Cu(NO₃)₂ + 2H₂O + 2NO₂"},{"q":"①3Cu + 8HNO₃ → 3Cu(NO₃)₂ + 4H₂O + 2[____]\n②Cu + 4HNO₃ → Cu(NO₃)₂ + 2H₂O + 2[____]","answer":"NO、NO₂","choices":["NO、NO₂","NO₂、NO","NO、NO","NO₂、NO₂"],"explain":"①3Cu + 8HNO₃ → 3Cu(NO₃)₂ + 4H₂O + 2NO\n②Cu + 4HNO₃ → Cu(NO₃)₂ + 2H₂O + 2NO₂\n★銅に希硝酸を反応させると一酸化窒素NOが発生し、銅に濃硝酸を反応させると二酸化窒素NO₂が発生します。"},{"q":"①[____]Cu + [____]HNO₃ → 3Cu(NO₃)₂ + 4H₂O + 2NO\n②[____]Cu + [____]HNO₃ → Cu(NO₃)₂  + 2H₂O + 2NO₂","answer":"3、8、1、4","choices":["3、8、1、4","3、8、4、1","8、3、1、4","8、3、4、1"],"explain":"①3Cu + 8HNO₃ → 3Cu(NO₃)₂ + 4H₂O + 2NO\n②Cu + 4HNO₃ → Cu(NO₃)₂ + 2H₂O + 2NO₂\n★昨日の夕食サバ刺しに石五つ(希濃の順に3834214122)のゴロと絵を描いて覚えました。"},{"q":"一酸化窒素NOは[____](色)、二酸化窒素NO₂は[____](色)である。","answer":"無色、赤褐色","choices":["無色、赤褐色","無色、黄褐色","赤褐色、無色","黄褐色、無色"],"explain":"一酸化窒素NOは[ 無色 ]、二酸化窒素NO₂は[ 赤褐色 ]である。"},{"q":"一酸化窒素NOは水に[____]、二酸化窒素NO₂は水に[____]。","answer":"溶けにくく、溶けやすい","choices":["溶けにくく、溶けやすい","溶けにくく、溶けにくい","溶けやすく、溶けやすい","溶けやすく、溶けにくい"],"explain":"一酸化窒素NOは水に[ 溶けにくく ]、二酸化窒素NO₂は水に[ 溶けやすい ]。\n★NOは中性気体の1つで水と反応しません。他に、CO、H₂、O₂、N₂が中性気体です。水に反応はしませんが、少し溶けます。"},{"q":"一酸化窒素NOは[____](置換)で捕集し、二酸化窒素NO₂は[____](置換)で捕集する。","answer":"水上置換、下方置換","choices":["水上置換、下方置換","水上置換、上方置換","下方置換、水上置換","下方置換、上方置換"],"explain":"一酸化窒素NOは[ 水上置換 ]で捕集し、二酸化窒素NO₂は[ 下方置換 ]で捕集する。\n★NO(分子量30)は水に溶けにくいので水上置換で捕集します。NO₂(分子量46)は水と反応し、空気(平均分子量28.8)より重いので下方置換で捕集します。"},{"q":"一酸化窒素NOは[____](性)気体であり、二酸化窒素NO₂は[____](性)気体である。","answer":"中性、酸性","choices":["中性、酸性","中性、塩基性","酸性、中性","塩基性、中性"],"explain":"一酸化窒素NOは[ 中性 ]気体であり、二酸化窒素NO₂は[ 酸性 ]気体である。\n★NをCへ変えて、「COが中性気体、CO₂が酸性気体」の関係も一緒に覚えます。"},{"q":"一酸化窒素NOは酸化されると[____]になる。","answer":"二酸化窒素NO₂","choices":["二酸化窒素NO₂","亜硝酸HNO₂","希硝酸HNO₃","濃硝酸HNO₃"],"explain":"一酸化窒素NOは酸化されると[ 二酸化窒素NO₂ ]になる。\n★無色の一酸化窒素NOは、空気中で速やかに酸化され、赤褐色の二酸化窒素NO₂となります。\n★2NO + O₂ → 2NO₂"},{"q":"二酸化窒素NO₂は温水に溶けると[____]になる。","answer":"硝酸HNO₃","choices":["硝酸HNO₃","亜硝酸HNO₂","四酸化二窒素N₂O₄","窒素N₂"],"explain":"二酸化窒素NO₂は温水に溶けると[ 硝酸HNO₃ ]になる。\n★3NO₂ + H₂O → 2HNO₃ + NO"},{"q":"一酸化窒素NOは、空気中で速やかに酸化され、[____](色)から[____](色)の二酸化窒素NO₂となる。","answer":"無色、赤褐色","choices":["無色、赤褐色","無色、黄褐色","赤褐色、無色","黄褐色、無色"],"explain":"一酸化窒素NOは、空気中で速やかに酸化され、[ 無色 ]から[ 赤褐色 ]の二酸化窒素NO₂となる。\n★2NO + O₂ → 2NO₂"},{"q":"二酸化窒素NO₂は[____](毒)であり、特有の臭気がある。空気中では一部が[____](色)の[____]になっている。","answer":"有毒、無色、四酸化二窒素N₂O₄","choices":["有毒、無色、四酸化二窒素N₂O₄","有毒、無色、一酸化窒素NO","無毒、赤褐色、四酸化二窒素N₂O₄","無毒、赤褐色、一酸化窒素NO"],"explain":"二酸化窒素NO₂は[ 有毒 ]であり、特有の臭気がある。空気中では一部が[ 無色 ]の[ 四酸化二窒素N₂O₄ ]になっている。\n★2NO₂ ⇄ N₂O₄"}]},
  {"code":"MB10","name":"窒素とその化合物2","parent":"非金属2","questions":[{"q":"二酸化窒素は水と反応して硝酸HNO₃と[____]になる。水温が低い場合は硝酸HNO₃と[____]になる。","answer":"一酸化窒素NO、亜硝酸HNO₂","choices":["一酸化窒素NO、亜硝酸HNO₂","一酸化窒素NO、二酸化窒素NO₂","二酸化窒素NO₂、亜硝酸HNO₂","二酸化窒素NO₂、一酸化窒素NO"],"explain":"二酸化窒素は水と反応して硝酸HNO₃と[ 一酸化窒素NO ]になる。水温が低い場合は硝酸HNO₃と[ 亜硝酸HNO₂ ]になる。\n★3NO₂ + H₂O → 2HNO₃ + NO\n★2NO₂ + H₂O → HNO₃ + HNO₂ (低温)"},{"q":"①3NO₂ + H₂O → 2HNO₃ + [____]\n②2NO₂ + H₂O → HNO₃ + [____] (低温)","answer":"NO、HNO₂","choices":["NO、HNO₂","NO、NO₂","NO₂、HNO₂","NO₂、NO"],"explain":"①3NO₂ + H₂O → 2HNO₃ + NO\n②2NO₂ + H₂O → HNO₃ + HNO₂ (低温)\n★①二酸化窒素は水と反応して硝酸HNO₃と一酸化窒素NOになります。②水温が低い場合は硝酸HNO₃と亜硝酸HNO₂になります。"},{"q":"①3NO₂ + H₂O → [____]\n②2NO₂ + H₂O → HNO₃ + HNO₂ (低温)","answer":"2HNO₃ + NO","choices":["2HNO₃ + NO","2HNO₃ + HNO₂","2HNO₃ + NO₂","2NO₂ + NO"],"explain":"①3NO₂ + H₂O → 2HNO₃ + NO\n②2NO₂ + H₂O → HNO₃ + HNO₂ (低温)\n★①二酸化窒素は水と反応して硝酸HNO₃と一酸化窒素NOになります。②水温が低い場合は硝酸HNO₃と亜硝酸HNO₂になります。"},{"q":"①3NO₂ + H₂O → 2HNO₃ + NO\n②2NO₂ + H₂O → [____] (低温)","answer":"HNO₃ + HNO₂","choices":["HNO₃ + HNO₂","HNO₃ + NO","HNO₃ + NO₂","NO₂ + NO"],"explain":"①3NO₂ + H₂O → 2HNO₃ + NO\n②2NO₂ + H₂O → HNO₃ + HNO₂ (低温)\n★①二酸化窒素は水と反応して硝酸HNO₃と一酸化窒素NOになります。②水温が低い場合は硝酸HNO₃と亜硝酸HNO₂になります。"},{"q":"硝酸の工業的製法に[____](法)がある。","answer":"オストワルト法","choices":["オストワルト法","ハーバー・ボッシュ法","接触法","ソルベー法"],"explain":"硝酸の工業的製法に[ オストワルト法 ]がある。\n★ヴィルヘルム・オストヴァルト(独)は1909年にノーベル化学賞を受賞しています。ハーバー・ボッシュ法(1911年〜1913年)によりアンモニアNH₃を大量生産できるようになったことで注目されました。フリッツ・ハーバー(独)のノーベル化学賞は1918年です。"},{"q":"オストワルト法は[____]段階の反応を繰り返して[____]をつくる。","answer":"3段階、硝酸HNO₃","choices":["3段階、硝酸HNO₃","3段階、硫酸H₂SO₄","4段階、硝酸HNO₃","4段階、硫酸H₂SO₄"],"explain":"オストワルト法は[ 3段階 ]の反応を繰り返して[ 硝酸HNO₃ ]をつくる。\n★NH₃→NO→NO₂→HNO₃ の3段階です。最後の段階でNOも発生するのでリサイクルします。"},{"q":"オストワルト法\n1) 触媒に白金を使い、[____]を酸化して一酸化窒素をつくる。\n2) 一酸化窒素を空気中の酸素で酸化して[____]にする。\n3) この[____]を温水に吸収させて硝酸をつくる。","answer":"アンモニア、二酸化窒素、二酸化窒素","choices":["アンモニア、二酸化窒素、二酸化窒素","アンモニア、亜硝酸、亜硝酸","窒素、亜硝酸、亜硝酸","窒素、二酸化窒素、二酸化窒素"],"explain":"オストワルト法\n1) 触媒に白金を使い、[ アンモニア ]を酸化して一酸化窒素をつくる。\n2) 一酸化窒素を空気中の酸素で酸化して[ 二酸化窒素 ]にする。\n3) この[ 二酸化窒素 ]を温水に吸収させて硝酸をつくる。"},{"q":"オストワルト法\n1) 触媒に[____]を使い、アンモニアを酸化して[____]をつくる。\n2) [____]を空気中の酸素で酸化して二酸化窒素にする。\n3) 二酸化窒素を温水に吸収させて硝酸をつくる。","answer":"白金、一酸化窒素、一酸化窒素","choices":["白金、一酸化窒素、一酸化窒素","白金、二酸化窒素、二酸化窒素","鉄、一酸化窒素、一酸化窒素","鉄、二酸化窒素、二酸化窒素"],"explain":"オストワルト法\n1) 触媒に[ 白金 ]を使い、アンモニアを酸化して[ 一酸化窒素 ]をつくる。\n2) [ 一酸化窒素 ]を空気中の酸素で酸化して二酸化窒素にする。\n3) 二酸化窒素を温水に吸収させて硝酸をつくる。"},{"q":"オストワルト法1\n[____] → 4NO + 6H₂O (触媒Pt)","answer":"4NH₃ + 5O₂","choices":["4NH₃ + 5O₂","4NH₃ + 5O₂ + 2HNO₃","4N₂ + 5O₂ + 2HNO₃","4N₂ + 5O₂"],"explain":"オストワルト法1\n4NH₃ + 5O₂ → 4NO + 6H₂O (触媒Pt)\n★触媒に白金を使い、アンモニアを酸化して一酸化窒素をつくります。\n★アンモニアはハーバー・ボッシュ法(触媒はFe主体)で製造します。"},{"q":"オストワルト法1\n4NH₃ + 5O₂ → [____](触媒[____])","answer":"4NO + 6H₂O、触媒Pt","choices":["4NO + 6H₂O、触媒Pt","4NO + 6H₂O、触媒Fe","4NO₂ + 6H₂O、触媒Pt","4NO₂ + 6H₂O、触媒Fe"],"explain":"オストワルト法1\n4NH₃ + 5O₂ → 4NO + 6H₂O (触媒Pt)\n★触媒に白金を使い、アンモニアを酸化して一酸化窒素をつくります。\n★アンモニアはハーバー・ボッシュ法(触媒はFe主体)で製造します。"},{"q":"オストワルト法2\n[____] → 2NO₂","answer":"2NO + O₂","choices":["2NO + O₂","2NO + NO₂","2NH₃ + O₂","N₂ + 2O₂"],"explain":"オストワルト法2\n2NO + O₂ → 2NO₂\n★一酸化窒素を空気中の酸素で酸化して二酸化窒素NO₂にします。一酸化窒素(無色)は空気中で速やかに二酸化窒素(赤褐色)へ酸化されます。"},{"q":"オストワルト法2\n2NO + O₂ → [____]","answer":"2NO₂","choices":["2NO₂","2NO₃","2NH₃","2HNO₃"],"explain":"オストワルト法2\n2NO + O₂ → 2NO₂\n★一酸化窒素を空気中の酸素で酸化して二酸化窒素NO₂にします。一酸化窒素(無色)は空気中で速やかに二酸化窒素(赤褐色)へ酸化されます。"},{"q":"オストワルト法3\n[____] → 2HNO₃ + NO","answer":"3NO₂ + H₂O","choices":["3NO₂ + H₂O","2NO₂ + NO + H₂O","3NH₃ + H₂O","NO₂ + 2NO + H₂O"],"explain":"オストワルト法3\n3NO₂ + H₂O → 2HNO₃ + NO\n★二酸化窒素を温水に吸収させて硝酸をつくります。同時に発生する一酸化窒素NOは2つ目の反応へリサイクルします。"},{"q":"オストワルト法3\n3NO₂ + H₂O → [____]","answer":"2HNO₃ + NO","choices":["2HNO₃ + NO","2HNO₃ + NO₂","HNO₃ + NO","HNO₃ + NO₂"],"explain":"オストワルト法3\n3NO₂ + H₂O → 2HNO₃ + NO\n★二酸化窒素を温水に吸収させて硝酸をつくります。同時に発生する一酸化窒素NOは2つ目の反応へリサイクルします。"},{"q":"オストワルト法の3つの化学式を1つにまとめると、\n[____] → HNO₃ + H₂O","answer":"NH₃ + 2O₂","choices":["NH₃ + 2O₂","NH₃ + 2NO","3NH₃ + NO₂","3NH₃ + HNO₃"],"explain":"オストワルト法の3つの化学式を1つにまとめると、\nNH₃ + 2O₂ → HNO₃ + H₂O\n★これからアンモニア1molから硝酸1molが得られるとわかります。"},{"q":"オストワルト法の3段階の反応の流れは、\n[____] → [____] → [____] → [____]である。","answer":"NH₃ → NO → NO₂ → HNO₃","choices":["NH₃ → NO → NO₂ → HNO₃","NH₃ → NO₂ → NO → HNO₃","HNO₃ → NO → NO₂ → NH₃","HNO₃ → NO₂ → NO → NH₃"],"explain":"オストワルト法の3段階の反応の流れは、\nNH₃ → NO → NO₂ → HNO₃である。\n★アンモニアから硝酸を作ります。最後の段階でNOも発生するのでリサイクルします。"},{"q":"オストワルト法の3つの化学式を1つにまとめると、\nNH₃ + 2O₂ → [____]\nこれからアンモニア1molから硝酸[____]molが得られるとわかる。","answer":"HNO₃ + H₂O、1mol","choices":["HNO₃ + H₂O、1mol","3HNO₃ + H₂O、3mol","HNO₃ + NO、1mol","3HNO₃ + NO、3mol"],"explain":"オストワルト法の3つの化学式を1つにまとめると、\nNH₃ + 2O₂ → HNO₃ + H₂O\nこれからアンモニア1molから硝酸[ 1mol ]が得られるとわかる。\n★繰り返し反応させることでNOやNO₂は全てHNO₃になります。"},{"q":"市販の濃硝酸は濃度[____]％で、[____](性)をもつ。","answer":"約60％、発煙性","choices":["約60％、発煙性","約60％、還元性","約98％、発煙性","約98％、還元性"],"explain":"市販の濃硝酸は濃度[ 約60％ ]で、[ 発煙性 ]をもつ。\n★市販の濃硝酸は約60％、濃硫酸は約98％。濃度については教養問題です。"},{"q":"濃硝酸は[____](性)、希硝酸は[____](性)である。","answer":"強酸性、強酸性","choices":["強酸性、強酸性","強酸性、弱酸性","弱酸性、強酸性","弱酸性、弱酸性"],"explain":"濃硝酸は[ 強酸性 ]、希硝酸は[ 強酸性 ]である。\n★どちらも強酸性です。"},{"q":"濃硝酸と希硝酸は共に強い[____]があり、銅や銀を溶かすとき、濃硝酸は[____]、希硝酸は[____]を発生する。","answer":"酸化力、二酸化窒素、一酸化窒素","choices":["酸化力、二酸化窒素、一酸化窒素","酸化力、一酸化窒素、二酸化窒素","還元性、二酸化窒素、一酸化窒素","還元性、一酸化窒素、二酸化窒素"],"explain":"濃硝酸と希硝酸は共に強い[ 酸化力 ]があり、銅や銀を溶かすとき、濃硝酸は[ 二酸化窒素 ]、希硝酸は[ 一酸化窒素 ]を発生する。\n★希硝酸:3Cu + 8HNO₃ → 3Cu(NO₃)₂ + 4H₂O + 2NO\n★濃硝酸:Cu + 4HNO₃ → Cu(NO₃)₂ + 2H₂O + 2NO₂"},{"q":"[____]などの金属は濃硝酸に溶けない。これは金属表面に緻密な酸化被膜を生じ内部が保護される状態([____]という)になるからである。","answer":"Cr、Fe、Co、Ni、Al、不動態","choices":["Cr、Fe、Co、Ni、Al、不動態","Cr、Fe、Co、Ni、Al、絶縁体","Cr、Fe、Cu、Ni、Au、不動態","Cr、Fe、Cu、Ni、Au、絶縁体"],"explain":"[ Cr、Fe、Co、Ni、Al ]などの金属は濃硝酸に溶けない。これは金属表面に緻密な酸化被膜を生じ内部が保護される状態([ 不動態 ]という)になるからである。\n★ゴロ: 黒子とテツ子にアル不動産"},{"q":"硝酸は[____]ので、[____]に入れ、冷暗所に保存する。","answer":"光や熱で分解する、褐色瓶","choices":["光や熱で分解する、褐色瓶","光や熱で分解する、ポリエチレン容器","ガラスを分解する、褐色瓶","ガラスを分解する、ポリエチレン容器"],"explain":"硝酸は[ 光や熱で分解する ]ので、[ 褐色瓶 ]に入れ、冷暗所に保存する。\n★硝酸は遮光性のある褐色瓶に保存します。\n★ガラスを分解するのはフッ化水素HFです。ポリエチレン容器(プラスチック容器)に保存します。"},{"q":"硝酸を光や熱に当てたとき、次のように反応する。\n4HNO₃ → [____]","answer":"2H₂O + O₂ + 4NO₂","choices":["2H₂O + O₂ + 4NO₂","2H₂O + 3O₂ + 4NO","2H₂ + 2O₂ + 4NO₂","2H₂ + 4O₂ + 4NO"],"explain":"硝酸を光や熱に当てたとき、次のように反応する。\n4HNO₃ → 2H₂O + O₂ + 4NO₂\n★水、酸素、二酸化窒素へ分解します。無色の硝酸が黄色く変化します。"},{"q":"一酸化二窒素N₂Oは別名[____]や[____]と呼ばれる。[____](色)のわずかに臭いのある気体である。","answer":"亜酸化窒素、笑気ガス、無色","choices":["亜酸化窒素、笑気ガス、無色","亜酸化窒素、亜硫酸ガス、黄色","二酸化窒素、笑気ガス、無色","二酸化窒素、亜硫酸ガス、黄色"],"explain":"一酸化二窒素N₂Oは別名[ 亜酸化窒素 ]や[ 笑気ガス ]と呼ばれる。[ 無色 ]のわずかに臭いのある気体である。\n★近年では早稲田で名称を問われました。"}]},
  {"code":"MB11","name":"リンとその化合物","parent":"非金属2","questions":[{"q":"黄リン(白リン)と赤リンはリンの[____](体)で、互いに[____](体)である。","answer":"単体、同素体","choices":["単体、同素体","単体、同位体","化合物、同素体","化合物、同位体"],"explain":"黄リン(白リン)と赤リンはリンの[ 単体 ]で、互いに[ 同素体 ]である。\n★黄リン(白リン)(おうりん、はくりん)、赤リン(せきりん)と読みます。\n★同素体は「同じ元素で異なる単体(分子)」、同位体は「周期表の同じ位置にある異なる原子」と、区別するとよいと思います。"},{"q":"化学式で書くとき、黄リン(白リン)は[____]で表し、赤リンは[____]で表す。","answer":"分子式 P₄、組成式 P","choices":["分子式 P₄、組成式 P","分子式 P₄、分子式 P₈","組成式 P、分子式 P₄","組成式 P、組成式 P"],"explain":"化学式で書くとき、黄リン(白リン)は[ 分子式 P₄ ]で表し、赤リンは[ 組成式 P ]で表す。\n★黄リン(白リン)は正四面体の四原子分子、赤リンは多数の分子が結合しています。"},{"q":"黄リン(白リン)の分子の形は[____]であり、赤リンは複雑な構造をした[____]である。","answer":"正四面体、高分子","choices":["正四面体、高分子","正四面体、単原子分子","三角錐、高分子","三角錐、単原子分子"],"explain":"黄リン(白リン)の分子の形は[ 正四面体 ]であり、赤リンは複雑な構造をした[ 高分子 ]である。\n★黄リン(白リン)は分子式P₄、赤リンは組成式Pです。"},{"q":"毒性について、黄リン(白リン)は[____]であり、赤リンは毒性が[____]。","answer":"猛毒、少ない","choices":["猛毒、少ない","猛毒、高い","無毒、少ない","無毒、高い"],"explain":"毒性について、黄リン(白リン)は[ 猛毒 ]であり、赤リンは毒性が[ 少ない ]。\n★赤リンがマッチの箱の側薬に使われていることから毒性が少ないと判断しやすいと思います。"},{"q":"黄リン(白リン)は二硫化炭素CS₂に[____]、赤リンは二硫化炭素CS₂に[____]。","answer":"溶け、溶けない","choices":["溶け、溶けない","溶け、溶ける","溶けず、溶けない","溶けず、溶ける"],"explain":"黄リン(白リン)は二硫化炭素CS₂に[ 溶け ]、赤リンは二硫化炭素CS₂に[ 溶けない ]。\n★無極性溶媒の二硫化炭素CS₂には、無極性分子が溶けやすく、巨大分子は溶けません。\n★黄リン(白リン)P₄、斜方硫黄S₈、単斜硫黄S₈が溶けやすく、赤リン(組成式P)やゴム状硫黄Sₓ(高分子化合物)は溶けません。"},{"q":"黄リン(白リン)は水H₂Oに[____]、赤リンは水H₂Oに[____]。","answer":"溶けず、溶けない","choices":["溶けず、溶けない","溶けず、溶ける","溶け、溶けない","溶け、溶ける"],"explain":"黄リン(白リン)は水H₂Oに[ 溶けず ]、赤リンは水H₂Oに[ 溶けない ]。\n★どちらも溶けません。赤リンの方が化学的に安定です。\n★黄リン(白リン)は水中で保存することから、水に溶けないと判断できます。"},{"q":"リンの同素体のうちマッチの側薬に使用されるのは[____]である。また、空気中で自然発火する[____]は[____]で保存する。","answer":"赤リン、黄リン(白リン)、水中","choices":["赤リン、黄リン(白リン)、水中","赤リン、黄リン(白リン)、褐色瓶","黄リン(白リン)、赤リン、水中","黄リン(白リン)、赤リン、褐色瓶"],"explain":"リンの同素体のうちマッチの側薬に使用されるのは[ 赤リン ]である。また、空気中で自然発火する[ 黄リン(白リン) ]は[ 水中 ]で保存する。"},{"q":"密閉した容器で(空気を断ち)[____]を250°Cに熱すると[____]となる。","answer":"黄リン(白リン)、赤リン","choices":["黄リン(白リン)、赤リン","黄リン(白リン)、リン酸","赤リン、十酸化四リン","赤リン、リン酸"],"explain":"密閉した容器で(空気を断ち)[ 黄リン(白リン) ]を250°Cに熱すると[ 赤リン ]となる。\n★教科書範囲ですが、逆に、赤リンを乾留(かんりゅう、空気を断って燃焼)することで黄リン(白リン)を得られるので、ややこしく入試での出題は少ないと思われます。"},{"q":"リンを[____]で燃焼させると[____]になる。","answer":"空気中、十酸化四リンP₄O₁₀","choices":["空気中、十酸化四リンP₄O₁₀","空気中、リン酸H₃PO₄","真空中、十酸化四リンP₄O₁₀","真空中、リン酸H₃PO₄"],"explain":"リンを[ 空気中 ]で燃焼させると[ 十酸化四リンP₄O₁₀ ]になる。\n★「空気中」は「酸素中」と書かれることもあります。\n★組成式がP₂O₅なので五酸化二リンとも呼びます。"},{"q":"4P + 5O₂ → [____]","answer":"P₄O₁₀","choices":["P₄O₁₀","2P₂O₃ + 2O₂","4H₃PO₄","4Ca(H₂PO₄)₂"],"explain":"4P + 5O₂ → P₄O₁₀\n★リンを空気中で燃焼させると十酸化四リンが生じます。"},{"q":"十酸化四リンP₄O₁₀は[____](色)粉末(固体)で、[____](性)が強く[____](剤)として用いられる。","answer":"白色、吸湿性、乾燥剤","choices":["白色、吸湿性、乾燥剤","白色、助燃性、酸化剤","黄色、吸湿性、乾燥剤","黄色、助燃性、酸化剤"],"explain":"十酸化四リンP₄O₁₀は[ 白色 ]粉末(固体)で、[ 吸湿性 ]が強く[ 乾燥剤 ]として用いられる。"},{"q":"十酸化四リンに水を加えて加熱すると、徐々に反応し[____]となる。","answer":"リン酸","choices":["リン酸","黄リン(白リン)","五酸化二リン","赤リン"],"explain":"十酸化四リンP₄O₁₀に水を加えて加熱すると、徐々に反応し[ リン酸 ]となる。\n★リン酸H₃PO₄、十酸化四リンP₄O₁₀(別名 五酸化二リン)、黄リン(白リン)P₄、赤リンP"},{"q":"P₄O₁₀ + 6H₂O → [____]","answer":"4H₃PO₄ (加熱)","choices":["4H₃PO₄ (加熱)","4H₃PO₄ (加熱なし)","4H₂PO₄ (加熱)","4H₂PO₄ (加熱なし)"],"explain":"P₄O₁₀ + 6H₂O → 4H₃PO₄ (加熱)\n★十酸化四リンに水を加えて加熱すると、徐々に反応しリン酸となります。\n★リン酸H₃PO₄は3価のオキソ酸です。"},{"q":"リン酸H₃PO₄は、[____](性)のある[____](色)の結晶で、水によく溶け酸性を示す。","answer":"潮解性、無色","choices":["潮解性、無色","潮解性、黄色","昇華性、無色","昇華性、黄色"],"explain":"リン酸H₃PO₄は、[ 潮解性 ]のある[ 無色 ]の結晶で、水によく溶け酸性を示す。"},{"q":"窒素N、リンP、カリウムKは[____]と呼ばれる。","answer":"肥料の三要素","choices":["肥料の三要素","三大栄養素","空気中の三大元素","地殻中の三大元素"],"explain":"窒素N、リンP、カリウムKは[ 肥料の三要素 ]と呼ばれる。"},{"q":"[____]は肥料の三要素と呼ばれる。","answer":"窒素N、リンP、カリウムK","choices":["窒素N、リンP、カリウムK","窒素N、酸素O、アルゴンAr","酸素O、ケイ素Si、アルミニウムAl","酸素O、リンP、カリウムK"],"explain":"[ 窒素N、リンP、カリウムK ]は肥料の三要素と呼ばれる。"},{"q":"リン酸二水素カルシウム[____]と硫酸カルシウムCaSO₄の混合物を[____]という。","answer":"Ca(H₂PO₄)₂、過リン酸石灰","choices":["Ca(H₂PO₄)₂、過リン酸石灰","Ca(H₂PO₄)₂、リン酸カルシウム","H₃PO₄、リン酸カルシウム","H₃PO₄、過リン酸石灰"],"explain":"リン酸二水素カルシウム[ Ca(H₂PO₄)₂ ]と硫酸カルシウムCaSO₄の混合物を[ 過リン酸石灰 ]という。\n★水に溶けるリン酸二水素カルシウムは植物が栄養(リンP)を吸収できます。過リン酸石灰はリン酸肥料です。"},{"q":"リン酸二水素カルシウムは[____]に[____]を加えることで作る。","answer":"リン酸カルシウム、硫酸","choices":["リン酸カルシウム、硫酸","リン酸カルシウム、亜硫酸","リン酸、硫酸","リン酸、亜硫酸"],"explain":"リン酸二水素カルシウムは[ リン酸カルシウム ]に[ 硫酸 ]を加えることで作る。\n★Ca₃(PO₄)₂ + 2H₂SO₄ → Ca(H₂PO₄)₂ + 2CaSO₄\n★リン酸カルシウムは難溶性、リン酸二水素カルシウムは水溶性です。過リン酸石灰(リン酸肥料)に利用されます。"},{"q":"[____] → Ca(H₂PO₄)₂ + 2CaSO₄","answer":"Ca₃(PO₄)₂ + 2H₂SO₄","choices":["Ca₃(PO₄)₂ + 2H₂SO₄","Ca₃(PO₄)₂ + 2H₂SO₃","2H₃PO₄ + 2H₂SO₄","2H₃PO₄ + 2H₂SO₃"],"explain":"Ca₃(PO₄)₂ + 2H₂SO₄ → Ca(H₂PO₄)₂ + 2CaSO₄\n★リン酸カルシウムに硫酸を加えることでリン酸二水素カルシウムが作られます。\n★リン酸カルシウムは難溶性、リン酸二水素カルシウムは水溶性です。過リン酸石灰(リン酸肥料)に利用されます。"},{"q":"Ca₃(PO₄)₂ + 2H₂SO₄ → [____]","answer":"Ca(H₂PO₄)₂ + 2CaSO₄","choices":["Ca(H₂PO₄)₂ + 2CaSO₄","Ca(H₂PO₄)₂ + 2CaSO₃","CaHPO₄ + 2CaSO₄","CaHPO₄ + 2CaSO₃"],"explain":"Ca₃(PO₄)₂ + 2H₂SO₄ → Ca(H₂PO₄)₂ + 2CaSO₄\n★リン酸カルシウムに硫酸を加えることでリン酸二水素カルシウムが作られます。\n★リン酸カルシウムは難溶性、リン酸二水素カルシウムは水溶性です。過リン酸石灰(リン酸肥料)に利用されます。"},{"q":"リン酸カルシウムCa₃(PO₄)₂は[____]の主成分であり、水に[____](い)固体である。","answer":"歯や骨、溶けにくい","choices":["歯や骨、溶けにくい","歯や骨、溶けやすい","毛髪や爪、溶けにくい","毛髪や爪、溶けやすい"],"explain":"リン酸カルシウムCa₃(PO₄)₂は[ 歯や骨 ]の主成分であり、水に[ 溶けにくい ]固体である。"},{"q":"市販の食品の原材料名欄に書かれている[____]にリン酸塩が使われている。","answer":"pH調整剤","choices":["pH調整剤","香料","甘味料","着色料"],"explain":"市販の食品の原材料名欄に書かれている[ pH調整剤 ]にリン酸塩が使われている。"},{"q":"リン灰石を[____]と呼ぶ。","answer":"アパタイト","choices":["アパタイト","アマルガム","カーバイト","エボナイト"],"explain":"リン灰石を[ アパタイト ]と呼ぶ。\n★英語は apatite\n★漢字(読み)は 燐灰石(りんかいせき)\n★化学式 Ca₅(PO₄)₃(F,Cl,OH)\n★フッ素燐灰石、塩素燐灰石、水酸燐灰石があります。単に燐灰石のときはフッ素燐灰石をさします。"},{"q":"リン鉱石の主成分であるフッ素リン灰石Ca₅(PO₄)₃Fを他に[____]と呼ぶ。","answer":"フルオロアパタイト","choices":["フルオロアパタイト","二酸化ケイ素","ヘキサフルオロケイ酸","ヒドロキシアパタイト"],"explain":"フッ素リン灰石Ca₅(PO₄)₃Fを[ フルオロアパタイト ]と呼ぶ。\n★英語は fluorapatite\n★教科書はフルオリドアパタイトでした。歯科系のサイトにはフルオロアパタイトが多く、フルオリドアパタイトは探せなかったので解答はフルオロアパタイトにしています。\n★参考: 燐灰石(りんかいせき)\n★化学式 Ca₅(PO₄)₃(F,Cl,OH)\n★フッ素燐灰石、塩素燐灰石、水酸燐灰石があります。\n★ヘキサフルオロケイ酸 H₂SiF₆"},{"q":"脊椎動物ではリンは骨や歯の主要な構成成分Ca₁₀(OH)₂(PO₄)₆として存在する。このCa₁₀(OH)₂(PO₄)₆の名称は[____]。","answer":"ヒドロキシアパタイト","choices":["ヒドロキシアパタイト","フルオロアパタイト","アマルガム","カーバイト"],"explain":"脊椎動物ではリンは骨や歯の主要な構成成分Ca₁₀(OH)₂(PO₄)₆として存在する。このCa₁₀(OH)₂(PO₄)₆の名称は[ ヒドロキシアパタイト ]。\n★昭和大学医学部前期2017年\n★英語は hydroxyapatite\n★ヒドロキシアパタイトの他に、ハイドロキシアパタイト、水酸アパタイト、水酸燐灰石(りんかいせき)の別名があります。\n★高校教科書での化学式はCa₅(PO₄)₃(OH)\n★参考: 燐灰石(りんかいせき)\n★化学式 Ca₅(PO₄)₃(F,Cl,OH)\n★フッ素燐灰石、塩素燐灰石、水酸燐灰石があります。"},{"q":"[____]の単体はリン鉱石(主にフルオロアパタイトCa₅(PO₄)₃F)を電気炉中でけい砂SiO₂やコークスCと反応させて作られる。このとき[____]は蒸気となって発生し、これを水中で固化させると[____]が得られる。*空欄に共通する用語を選べ。","answer":"黄リン(白リン)","choices":["黄リン(白リン)","赤リン","カルシウム","アパタイト"],"explain":"[ 黄リン(白リン) ]の単体はリン鉱石(主にフルオロアパタイトCa₅(PO₄)₃F)を電気炉中でけい砂SiO₂やコークスCと反応させて作られる。このとき[ 黄リン(白リン) ]は蒸気となって発生し、これを水中で固化させると[ 黄リン(白リン) ]が得られる。\n★高校教科書ほぼそのままを問題化しました。入試ではリン酸カルシウムをけい砂SiO₂、コークスCと共に反応させる文脈で出題されています。けい砂、ケイ砂の表記両方あります。"},{"q":"黄リン(白リン)はリン酸カルシウムを電気炉中でコークス(主成分C)とケイ砂(主成分SiO₂)とともに強熱し、生じた気体のリンを水中で冷却することで得られる。このときの化学反応式は\n[____] + 6SiO₂ + 10C → 6CaSiO₃ + [____] + P₄","answer":"2Ca₃(PO₄)₂、10CO","choices":["2Ca₃(PO₄)₂、10CO","2Ca₃(PO₄)₂、10CO₂","Ca₅(PO₄)₂、10CO","Ca₅(PO₄)₂、10CO₂"],"explain":"黄リン(白リン)はリン酸カルシウムを電気炉中でコークス(主成分C)とケイ砂(主成分SiO₂)とともに強熱し、生じた気体のリンを水中で冷却することで得られる。このときの化学反応式は\n2Ca₃(PO₄)₂ + 6SiO₂ + 10C → 6CaSiO₃ + 10CO + P₄\n★昭和大学医学部前期2017年\n★リン酸カルシウムCa₃(PO₄)₂もしくはリン酸H₃PO₄を記憶していれば数を合わせて正解できる出題でした。\n★酸素 (O): 左辺 2(4×2) + 6(2) = 28個 → 右辺 6(3) + 10(1) = 28個"}]},
  {"code":"MB12","name":"炭素とその化合物","parent":"非金属2","questions":[{"q":"14族の元素(C、Si、Ge、Sn、Pb)は原子番号が増すにつれて[____](性)が増し、電気伝導性が[____](く)なる。","answer":"金属性、高く","choices":["金属性、高く","金属性、低く","非金属性、高く","非金属性、低く"],"explain":"14族の元素(C、Si、Ge、Sn、Pb)は原子番号が増すにつれて[ 金属性 ]が増し、電気伝導性が[ 高く ]なる。"},{"q":"炭素の同素体のうち、[____]は電気伝導性があり、[____]には電気伝導性はない。","answer":"黒鉛、ダイヤモンドやフラーレン","choices":["黒鉛、ダイヤモンドやフラーレン","ダイヤモンド、黒鉛やフラーレン","フラーレン、ダイヤモンドや黒鉛","ダイヤモンドやフラーレン、黒鉛"],"explain":"炭素の同素体のうち、[ 黒鉛 ]は電気伝導性があり、[ ダイヤモンドやフラーレン ]には電気伝導性はない。"},{"q":"炭素の同素体のうち黒鉛は[____](構造)、ダイヤモンドは[____](構造)、フラーレンは[____](構造)である。","answer":"平面層状構造、立体網目構造、球状構造","choices":["平面層状構造、立体網目構造、球状構造","平面層状構造、球状構造、立体網目構造","立体網目構造、平面層状構造、球状構造","立体網目構造、球状構造、平面層状構造"],"explain":"炭素の同素体のうち黒鉛は[ 平面層状構造 ]、ダイヤモンドは[ 立体網目構造 ]、フラーレンは[ 球状構造 ]である。"},{"q":"ダイヤモンドは、炭素原子間の結合が全て[____](結合)であり、[____](色)の結晶である。地球上の物質で最も硬い(注: 現在は3番目に硬い)。","answer":"共有結合、無色","choices":["共有結合、無色","共有結合、黒色","イオン結合、無色","イオン結合、黒色"],"explain":"ダイヤモンドは、炭素原子間の結合が全て[ 共有結合 ]であり、[ 無色 ]の結晶である。地球上の物質で最も硬い(注: 現在は3番目に硬い)。\n*ダイヤモンドより硬い物質に、ウルツァイト窒化ホウ素、ロンズデーライトの2つがあることが2009年頃に発表されています。"},{"q":"黒鉛は、柔らかく、[____]のある[____](色)の結晶で、電気や熱をよく通す。層状構造は薄く[____](い)。","answer":"光沢、黒色、はがれやすい","choices":["光沢、黒色、はがれやすい","光沢、無色、はがれにくい","くすみ、黒色、はがれやすい","くすみ、無色、はがれにくい"],"explain":"黒鉛は、柔らかく、[ 光沢 ]のある[ 黒色 ]の結晶で、電気や熱をよく通す。層状構造は薄く[ はがれやすい ]。"},{"q":"[____](C₆₀やC₇₀など)は[____](構造)の分子で1985年に発見された(はじめて合成された)。宇宙空間にも存在が確認されている。","answer":"フラーレン、球状構造","choices":["フラーレン、球状構造","フラーレン、立体網目構造","ダイヤモンド、球状構造","ダイヤモンド、立体網目構造"],"explain":"[ フラーレン ](C₆₀やC₇₀など)は[ 球状構造 ]の分子で1985年に発見された(はじめて合成された)。宇宙空間にも存在が確認されている。"},{"q":"1985年に[____]の[____](構造)を突き止めたことによりクロトー(英)、スモーリー(米)、カール(米)は1996年にノーベル化学賞を受賞している。","answer":"フラーレン、球状構造","choices":["フラーレン、球状構造","フラーレン、立体網目構造","ダイヤモンド、球状構造","ダイヤモンド、立体網目構造"],"explain":"1985年に[ フラーレン ]の[ 球状構造 ]を突き止めたことによりクロトー(英)、スモーリー(米)、カール(米)は1996年にノーベル化学賞を受賞している。\n★教養問題です。"},{"q":"木炭、すす、カーボンブラックなどの不規則な黒鉛の結晶を[____]と呼び、多孔質のものを[____]、繊維状のものを[____]と呼ぶ。","answer":"無定形炭素、活性炭、炭素繊維","choices":["無定形炭素、活性炭、炭素繊維","無定形炭素、炭素繊維、活性炭","活性炭、無定形炭素、炭素繊維","炭素繊維、活性炭、無定形炭素"],"explain":"木炭、すす、カーボンブラックなどの不規則な黒鉛の結晶を[ 無定形炭素 ]と呼び、多孔質のものを[ 活性炭 ]、繊維状のものを[ 炭素繊維 ]と呼ぶ。"},{"q":"黒鉛の[____](構造)のうち、1層だけのものを[____]という。この単離に成功したガイム(蘭)とノボセロフ(露)は2010年にノーベル物理学賞を受賞している。","answer":"(平面)層状構造、グラフェン","choices":["(平面)層状構造、グラフェン","(平面)層状構造、カーボンナノチューブ","球状構造、グラフェン","球状構造、カーボンナノチューブ"],"explain":"黒鉛の[ (平面)層状構造 ]のうち、1層だけのものを[ グラフェン ]という。この単離に成功したガイム(蘭)とノボセロフ(露)は2010年にノーベル物理学賞を受賞している。"},{"q":"黒鉛の[____](構造)が筒状に丸まったものは、[____]と呼ばれる。1991年に飯島澄男によって発見された。","answer":"(平面)層状構造、カーボンナノチューブ","choices":["(平面)層状構造、カーボンナノチューブ","(平面)層状構造、グラフェン","球状構造、グラフェン","球状構造、カーボンナノチューブ"],"explain":"黒鉛の[ (平面)層状構造 ]が筒状に丸まったものは、[ カーボンナノチューブ ]と呼ばれる。1991年に飯島澄男によって発見された。"},{"q":"ダイヤモンドでは、各炭素原子は[____](個)の価電子すべてを使い、他の[____](個)の炭素原子と共有結合で、[____](体/形)が繰り返される立体網目構造を形成している。","answer":"4個、4個、正四面体 ","choices":["4個、4個、正四面体 ","4個、4個、正六角形","3個、3個、正四面体 ","3個、3個、正六角形"],"explain":"ダイヤモンドでは、各炭素原子は[ 4個 ]の価電子すべてを使い、他の[ 4個 ]の炭素原子と共有結合で、[ 正四面体 ]が繰り返される立体網目構造を形成している。"},{"q":"黒鉛では、各炭素原子が4個の価電子のうち[____](個)を使い、他の[____](個)の炭素原子と共有結合し、[____](体/形)網目状の平面構造を形成している。この平面構造が弱い分子間力で結合し平面層状構造を形成している。 ","answer":"3個、3個、正六角形","choices":["3個、3個、正六角形","3個、3個、正四面体 ","4個、4個、正四面体 ","4個、4個、正六角形"],"explain":"黒鉛では、各炭素原子が4個の価電子のうち[ 3個 ]を使い、他の[ 3個 ]の炭素原子と共有結合し、[ 正六角形 ]網目状の平面構造を形成している。この平面構造が弱い分子間力で結合し平面層状構造を形成している。 "},{"q":"黒鉛の平面構造どうしを結合する[____](力/結合)は[____](い)ため、黒鉛は[____](い)。 ","answer":"分子間力、弱い、やわらかい","choices":["分子間力、弱い、やわらかい","分子間力、強い、極めて硬い","共有結合、弱い、やわらかい","共有結合、強い、極めて硬い"],"explain":"黒鉛の平面構造どうしを結合する[ 分子間力 ]は[ 弱い ]ため、黒鉛は[ やわらかい ]。 "},{"q":"黒鉛では、炭素原子の4個の価電子のうち[____](個)は平面内を自由に動き回るため、[____](性)をもつ。","answer":"1個、電気伝導性","choices":["1個、電気伝導性","1個、絶縁性","3個、電気伝導性","3個、絶縁性"],"explain":"黒鉛では、炭素原子の4個の価電子のうち[ 1個 ]は平面内を自由に動き回るため、[ 電気伝導性 ]をもつ。"},{"q":"炭素や炭素化合物が不完全燃焼すると[____]が生じる。 ","answer":"一酸化炭素CO","choices":["一酸化炭素CO","メタンCH₄","オゾンO₃","一酸化窒素NO"],"explain":"炭素や炭素化合物が不完全燃焼すると[ 一酸化炭素CO ]が生じる。 \n★2C + O₂ →2CO\n★完全燃焼では二酸化炭素CO₂が生じます。炭素化合物に水素が含まれていれば水H₂Oも生じます。"},{"q":"二酸化炭素が高温の炭素に接触すると[____]が生じる。 ","answer":"一酸化炭素CO","choices":["一酸化炭素CO","メタンCH₄","オゾンO₃","一酸化窒素NO"],"explain":"二酸化炭素が高温の炭素に接触すると[ 一酸化炭素CO ]が生じる。\n★「高温の炭素」は「赤熱した炭素」と表現されることもあります。 \n★CO₂ + C → 2CO\n★酸化還元反応です。二酸化炭素は酸素を奪われ還元されています。"},{"q":"二酸化炭素が高温の炭素に接触するときの反応。\n[____] → [____]","answer":"CO₂ + C → 2CO","choices":["CO₂ + C → 2CO","CO₂ + 3C → 2C₂O","CO₂ + C → 2C + O₂","2CO₂ + C → 2CO + CO₃"],"explain":"二酸化炭素が高温の炭素に接触するときの反応。\nCO₂ + C → 2CO \n★酸化還元反応です。二酸化炭素は酸素を奪われ還元されています。炭素は酸素を得て酸化されています。"},{"q":"[____]を濃硫酸と共に加熱し、[____]すると一酸化炭素が得られる。","answer":"ギ酸HCOOH、脱水","choices":["ギ酸HCOOH、脱水","ギ酸HCOOH、縮合","酢酸CH₃COOH、脱水","酢酸CH₃COOH、縮合"],"explain":"[ ギ酸HCOOH ]を濃硫酸と共に加熱し、[ 脱水 ]すると一酸化炭素が得られる。\n★HCOOH → CO + H₂O(H₂SO₄と共に加熱)\n★実験室での一酸化炭素の製法です。\n★有機化学のエタノールと濃硫酸の混合物を加熱してエチレンを生成するときと同じ反応(分子内脱水)です。"},{"q":"[____] → CO + H₂O\n条件:[____]","answer":"HCOOH、濃H₂SO₄と共に加熱","choices":["HCOOH、濃H₂SO₄と共に加熱","HCOOH、希H₂SO₄を加える","CH₃COOH、濃H₂SO₄と共に加熱","CH₃COOH、希H₂SO₄を加える"],"explain":"HCOOH → CO + H₂O\n条件: 濃H₂SO₄と共に加熱\n★ギ酸を濃硫酸と共に加熱し、脱水すると一酸化炭素が得られます。実験室での一酸化炭素の製法です。\n★脱水作用が必要なので「濃硫酸+加熱」と連想します。\n★有機化学のエタノールと濃硫酸の混合物を加熱してエチレンを生成するときと同じ反応(分子内脱水)です。"},{"q":"一酸化炭素は高温で[____](性)が強く、[____]に使われている。 ","answer":"還元性、鉄の精錬","choices":["還元性、鉄の精錬","還元性、助燃剤","酸化作用、鉄の精錬","酸化作用、助燃剤"],"explain":"一酸化炭素は高温で[ 還元性 ]が強く、[ 鉄の精錬 ]に使われている。 \n★酸素を奪ってCO₂となりやすいため還元性が強いといえます。鉄の精錬の範囲で再び出てきます。"},{"q":"Fe₂O₃ + 3CO → [____]","answer":"2Fe + 3CO₂ ","choices":["2Fe + 3CO₂ ","2FeCO₃ ","Fe₂CO₃ + 2CO₂ ","2FeC₂  + 3O₂ "],"explain":"Fe₂O₃ + 3CO → 2Fe + 3CO₂ \n★一酸化炭素COは還元性が強く、反応する物質の酸素を奪い二酸化炭素CO₂となります。"},{"q":"一酸化炭素は[____](色)、[____](臭)の[____](性)気体で水に溶けにくい。","answer":"無色、無臭、中性","choices":["無色、無臭、中性","無色、無臭、酸性","淡青色、刺激臭、中性","淡青色、刺激臭、酸性"],"explain":"一酸化炭素は[ 無色 ]、[ 無臭 ]の[ 中性 ]気体で水に溶けにくい。\n★COとNOの2つをセットで「無色、無臭の中性気体」と覚えます。中性気体は水と反応しません。"},{"q":"一酸化炭素は、血液中の[____]と強く結合し、酸素の運搬を妨げるため[____](毒)である。","answer":"ヘモグロビン、極めて有毒","choices":["ヘモグロビン、極めて有毒","ヘモグロビン、無毒","二酸化炭素、極めて有毒","二酸化炭素、無毒"],"explain":"一酸化炭素は、血液中の[ ヘモグロビン ]と強く結合し、酸素の運搬を妨げるため[ 極めて有毒 ]である。\n★化学や生物の他に、家庭科や保健体育でも学ぶ一般常識です。"},{"q":"炭素や炭素化合物が完全燃焼すると[____]が生じる。 ","answer":"二酸化炭素CO₂ ","choices":["二酸化炭素CO₂ ","一酸化炭素CO","二酸化窒素NO₂ ","一酸化窒素NO"],"explain":"炭素や炭素化合物が完全燃焼すると[ 二酸化炭素CO₂ ]が生じる。 \n★C + O₂ → CO₂\n★完全燃焼はCO₂、不完全燃焼はCOが生じます。"},{"q":"石灰石(主成分CaCO₃)に希塩酸を反応させると[____]が生じる。","answer":"二酸化炭素CO₂ ","choices":["二酸化炭素CO₂ ","一酸化炭素CO","アセチレンC₂H₂","メタンCH₄"],"explain":"石灰石(主成分CaCO₃)に希塩酸を反応させると[ 二酸化炭素CO₂ ]が生じる。\n★CaCO₃ + 2HCl → CaCl₂ + CO₂ + H₂O\n★弱酸遊離反応です。★炭酸は二酸化炭素と水へ分解されます。\nH₂CO₃ → CO₂ + H₂O\n★実験室での二酸化炭素の製法です。"},{"q":"[____] → CaCl₂ + CO₂ + H₂O","answer":"CaCO₃ + 2HCl","choices":["CaCO₃ + 2HCl","CaCO₃ + 4HCl","H₂CO₃ + 2HCl","H₂CO₃ + 4HCl"],"explain":"CaCO₃ + 2HCl → CaCl₂ + CO₂ + H₂O\n★石灰石(主成分CaCO₃)に希塩酸を反応させると二酸化炭素CO₂が発生します。\n★弱酸遊離反応です。★炭酸は二酸化炭素と水へ分解されます。\nH₂CO₃ → CO₂ + H₂O\n★実験室での二酸化炭素の製法です。"},{"q":"CaCO₃ + 2HCl → [____]","answer":"CaCl₂ + CO₂ + H₂O","choices":["CaCl₂ + CO₂ + H₂O","CaCl₂ + CO + H₂O","Ca(HCO₃)₂ + 2HCl","Ca(HCO₃)₂ + Cl₂"],"explain":"CaCO₃ + 2HCl → CaCl₂ + CO₂ + H₂O\n★石灰石(主成分CaCO₃)に希塩酸を反応させると二酸化炭素CO₂が発生します。\n★弱酸遊離反応です。★炭酸は二酸化炭素と水へ分解されます。\nH₂CO₃ → CO₂ + H₂O\n★実験室での二酸化炭素の製法です。"},{"q":"石灰石を強熱すると[____]が生じる。","answer":"二酸化炭素CO₂","choices":["二酸化炭素CO₂","一酸化炭素CO","アセチレンC₂H₂","メタンCH₄"],"explain":"石灰石を強熱すると[ 二酸化炭素CO₂ ]が生じる。\n★二酸化炭素の工業的製法です。加熱は1000°C近くの高温。「石灰石の熱分解」とも表現されます。\n★CaCO₃ → CaO + CO₂"},{"q":"CaCO₃ → [____]","answer":"CaO + CO₂ (加熱必要)","choices":["CaO + CO₂ (加熱必要)","CaO + CO₂ (加熱なし)","CaO₂ + CO (加熱必要)","CaO₂ + CO (加熱なし)"],"explain":"CaCO₃ → CaO + CO₂ (加熱必要)\n★固体の分解は基本的に加熱が必要です。\n★二酸化炭素の工業的製法です。加熱は1000°C近くの高温。「石灰石の熱分解」とも表現されます。\n★CaCO₃ → CaO + CO₂\n★反応式は東大2018年。東大化学でも基本の出題は多数です。"},{"q":"二酸化炭素CO₂は、[____](色)、[____](臭)の気体で水に少し溶けて[____](性)を示す。","answer":"無色、無臭、弱酸性","choices":["無色、無臭、弱酸性","無色、無臭、中性","赤褐色、刺激臭、弱酸性","赤褐色、刺激臭、中性"],"explain":"二酸化炭素CO₂は、[ 無色 ]、[ 無臭 ]の気体で水に少し溶けて[ 弱酸性 ]を示す。\n①CO₂ + H₂O ⇄ H₂CO₃\n②H₂CO₃ ⇄ H⁺ + HCO₃⁻\n③HCO₃⁻ ⇄ H⁺ + CO₃²⁻"},{"q":"二酸化炭素は[____](性酸化物)であり、水酸化ナトリウムなどの塩基と反応して[____]を作る。","answer":"酸性酸化物、塩","choices":["酸性酸化物、塩","酸性酸化物、オキソ酸","塩基性酸化物、塩","塩基性酸化物、オキソ酸"],"explain":"二酸化炭素は[ 酸性酸化物 ]であり、水酸化ナトリウムなどの塩基と反応して[ 塩 ]を作る。\n★酸性酸化物(非金属の酸化物)である二酸化炭素は、水と反応してオキソ酸である炭酸を生じ、塩基と反応して塩を生じます。"},{"q":"①CO₂ + [____] ⇄ H₂CO₃\n②CO₂ + [____] → Na₂CO₃ + H₂O","answer":"H₂O、2NaOH","choices":["H₂O、2NaOH","H₂O、NaOH","2NaOH、H₂O","NaOH、H₂O"],"explain":"①CO₂ + H₂O ⇄ H₂CO₃\n②CO₂ + 2NaOH → Na₂CO₃ + H₂O\n★酸性酸化物(非金属の酸化物)なので水と反応してオキソ酸である炭酸H₂CO₃を生じ、塩基と反応して塩Na₂CO₃を生じます。"},{"q":"二酸化炭素を[____]に通じると[____]の沈殿を生じて白濁する。(二酸化炭素の検出反応)","answer":"石灰水、炭酸カルシウム","choices":["石灰水、炭酸カルシウム","石灰水、炭酸水素カルシウム","炭酸水、炭酸カルシウム","炭酸水、炭酸水素カルシウム"],"explain":"二酸化炭素を[ 石灰水 ]に通じると[ 炭酸カルシウム ]の沈殿を生じて白濁する。(二酸化炭素の検出反応)\n★Ca(OH)₂ + CO₂ → CaCO₃ + H₂O"},{"q":"[____] + CO₂ → [____] + H₂O(二酸化炭素の検出反応)","answer":"Ca(OH)₂、CaCO₃","choices":["Ca(OH)₂、CaCO₃","Ca(OH)₂、Ca(HCO₃)₂","H₂CO₃、CaCO₃","H₂CO₃、Ca(HCO₃)₂"],"explain":"Ca(OH)₂ + CO₂ → CaCO₃ + H₂O(二酸化炭素の検出反応)\n★石灰水に二酸化炭素を通じると炭酸カルシウムの沈殿が生じて白濁します。石灰水の化学式としてCa(OH)₂も覚えます。"},{"q":"石灰水に二酸化炭素を通じて生じた[____]の白色沈殿にさらに二酸化炭素を通じると[____]が生じて沈殿が溶ける。","answer":"炭酸カルシウム、炭酸水素カルシウム","choices":["炭酸カルシウム、炭酸水素カルシウム","炭酸カルシウム、水酸化カルシウム","炭酸水素カルシウム、炭酸カルシウム","炭酸水素カルシウム、水酸化カルシウム"],"explain":"石灰水に二酸化炭素を通じて生じた[ 炭酸カルシウム ]の白色沈殿にさらに二酸化炭素を通じると[ 炭酸水素カルシウム ]が生じて沈殿が溶ける。\n①Ca(OH)₂ + CO₂ → CaCO₃ + H₂O\n②CaCO₃ + CO₂ + H₂O → Ca(HCO₃)₂"},{"q":"①[____] + CO₂ → CaCO₃ + H₂O\n②CaCO₃ + CO₂ + H₂O → [____]","answer":"Ca(OH)₂、Ca(HCO₃)₂","choices":["Ca(OH)₂、Ca(HCO₃)₂","Ca(OH)₂、CaHCO₃","Ca(HCO₃)₂、Ca(OH)₂","Ca(HCO₃)₂、CaHCO₃"],"explain":"①Ca(OH)₂ + CO₂ → CaCO₃ + H₂O\n②CaCO₃ + CO₂ + H₂O → Ca(HCO₃)₂\n★石灰水に二酸化炭素を通じて生じた炭酸カルシウムの白色沈殿にさらに二酸化炭素を通じると炭酸水素カルシウムが生じて沈殿が溶けます。"},{"q":"二酸化炭素の固体は[____]と呼ばれ、-79°Cで[____]し周囲の熱を奪うので、[____](剤)として用いられる。","answer":"ドライアイス、昇華、冷却剤","choices":["ドライアイス、昇華、冷却剤","ドライアイス、昇華、研磨剤","ダイヤモンド、凝固、冷却剤","ダイヤモンド、凝固、研磨剤"],"explain":"二酸化炭素の固体は[ ドライアイス ]と呼ばれ、-79°Cで[ 昇華 ]し周囲の熱を奪うので、[ 冷却剤 ]として用いられる。"},{"q":"一酸化炭素は[____](置換)、二酸化炭素は[____](置換)で捕集する。","answer":"水上置換、下方置換","choices":["水上置換、下方置換","水上置換、上方置換","上方置換、下方置換","上方置換、上方置換"],"explain":"一酸化炭素は[ 水上置換 ]、二酸化炭素は[ 下方置換 ]で捕集する。\n★水に溶けない気体(CO)は水上置換、水に溶け空気より重い気体(CO₂)は下方置換です。(平均)分子量は空気28.8、CO₂44です。★CO₂はやや水に溶けますが、水上置換でも捕集できます。"},{"q":"燃焼について、一酸化炭素は[____](性)であり、二酸化炭素は[____](性)である。","answer":"可燃性、不燃性","choices":["可燃性、不燃性","可燃性、可燃性","不燃性、不燃性","不燃性、可燃性"],"explain":"燃焼について、一酸化炭素は[ 可燃性 ]であり、二酸化炭素は[ 不燃性 ]である。\n★一酸化炭素を燃やすと二酸化炭素となります。二酸化炭素は完全燃焼による生成物でこれ以上は燃焼(酸化)されません。"},{"q":"一酸化炭素を空気中で燃やすと[____]をあげて燃える。","answer":"青白い炎","choices":["青白い炎","緑色の炎","黄色い炎","黒いスス"],"explain":"一酸化炭素を空気中で燃やすと[ 青白い炎 ]をあげて燃える。"},{"q":"一酸化炭素は石灰水に通すと[____]、二酸化炭素は石灰水に通すと[____]。","answer":"反応せず、白濁する","choices":["反応せず、白濁する","反応せず、反応しない","白濁し、反応しない","白濁し、白濁する"],"explain":"一酸化炭素は石灰水に通すと[ 反応せず ]、二酸化炭素は石灰水に通すと[ 白濁する ]。\n★石灰水に二酸化炭素を通じると炭酸カルシウムの白色沈殿が生じます。"},{"q":"一酸化炭素は水に[____]、二酸化炭素は水に[____]。","answer":"溶けず、少し溶ける","choices":["溶けず、少し溶ける","溶けず、よく溶ける","よく溶け、少し溶ける","よく溶け、溶けない"],"explain":"一酸化炭素は水に[ 溶けず ]、二酸化炭素は水に[ 少し溶ける ]。\n★二酸化炭素は水に「少し溶ける」なので、CO₂を含む混合気体を水に通してもCO₂を取り除くことはできません。\n★CO₂、NO₂は水に溶ける。それぞれ炭酸H₂CO₃、硝酸HNO₃になる。\n★CO、NOは水に溶けない。C≡O(三重結合)、N≡O(2.5重結合)と結合力が強い。"},{"q":"COとCO₂の混合気体からCO₂を除去するには[____]とよい。","answer":"NaOH水溶液やソーダ石灰に通す","choices":["NaOH水溶液やソーダ石灰に通す","水上置換で再捕集する(水に通す)","希塩酸や希硫酸に通す","気体を燃焼させる"],"explain":"COとCO₂の混合気体からCO₂を除去するには[ NaOH水溶液やソーダ石灰に通す ]とよい。\n★COは中性気体、CO₂は酸性気体なので、強塩基性の水溶液に通しCO₂を反応させます。ソーダ石灰はNaOHとCaOの混合物です。★水に通してもCO₂を全て取り除けるほどは溶けません。★燃焼させると両方ともCO₂となります。"}]},
  {"code":"MB13","name":"ケイ素とその化合物","parent":"非金属2","questions":[{"q":"ケイ素の単体はダイヤモンドと同じ構造の[____]結晶で、灰黒色の[____]を持ち、融点が[____]。","answer":"共有結合、金属光沢、高い","choices":["共有結合、金属光沢、高い","共有結合、くすみ、高い","イオン結合、金属光沢、低い","イオン結合、くすみ、低い"],"explain":"ケイ素の単体はダイヤモンドと同じ構造の[ 共有結合 ]結晶で、灰黒色の[ 金属光沢 ]を持ち、融点が[ 高い ]。"},{"q":"高純度のケイ素の単体は金属と非金属の中間の電気伝導性をもつ[____]で、[____](IC)や[____]などに用いられる。","answer":"半導体、集積回路、太陽電池","choices":["半導体、集積回路、太陽電池","半導体、集積回路、光ファイバー","絶縁体、光ファイバー、太陽電池","絶縁体、集積回路、太陽電池"],"explain":"高純度のケイ素の単体は金属と非金属の中間の電気伝導性をもつ[ 半導体 ]で、[ 集積回路 ](IC)や[ 太陽電池 ]などに用いられる。\n★半導体は金属のような電気伝導性と非金属の絶縁性を併せもちます。導体と絶縁体の中間の性質をもつ物質、とも表現されます。\n★高純度の二酸化ケイ素SiO₂を融解して繊維状にしたものは光ファイバーに用いられます。"},{"q":"ケイ砂とコークスを高温で融解すると[____]が得られる。","answer":"ケイ素Si","choices":["ケイ素Si","炭素C","硫黄S","塩素Cl"],"explain":"ケイ砂とコークスを高温で融解すると[ ケイ素Si ]が得られる。\n★ケイ砂(しゃ)と読みます。★酸化物SiO₂を電気炉で融解し、炭素で還元します。ケイ素は自然界中に単体で存在せず、主にこの方法で単体を得ます。\n★SiO₂ + 2C → Si + 2CO"},{"q":"SiO₂ + 2C → [____]","answer":"Si + 2CO","choices":["Si + 2CO","Si + 2CO₂","SiC₂ + O₂","SiO + 2CO"],"explain":"SiO₂ + 2C → Si + 2CO\n★酸化物SiO₂を電気炉で融解し、炭素で還元します。ケイ素は自然界中に単体で存在せず、主にこの方法で単体を得ます。"},{"q":"[____] → Si + 2CO","answer":"SiO₂ + 2C","choices":["SiO₂ + 2C","SiO₂ + 2CO₂","SiO₃ + 2C","SiO₃ + 2CO₂"],"explain":"SiO₂ + 2C → Si + 2CO\n★酸化物SiO₂を電気炉で融解し、炭素で還元します。ケイ素は自然界中に単体で存在せず、主にこの方法で単体を得ます。"},{"q":"ケイ素は単体として自然界に存在しないが、[____]として、水晶、石英、ケイ砂などの形で地殻中に分布している。","answer":"二酸化ケイ素SiO₂","choices":["二酸化ケイ素SiO₂","シランSiH₄","ヘキサフルオロケイ酸H₂SiF₆","ケイ酸ナトリウムNa₂SiO₃"],"explain":"ケイ素は単体として自然界に存在しないが、[ 二酸化ケイ素SiO₂ ]として、水晶、石英、ケイ砂などの形で地殻中に分布している。\n★SiO₂は組成式で、Si原子を中心とする正四面体構造がO原子を介して無数に連なります。"},{"q":"ケイ素は質量％で比較すると、地殻中に[____]に次いで[____](番目)に多く含まれる。","answer":"酸素O、2番目","choices":["酸素O、2番目","酸素O、3番目","アルミニウムAl、2番目","アルミニウムAl、4番目"],"explain":"ケイ素は質量％で比較すると、地殻中に[ 酸素O ]に次いで[ 2番目 ]に多く含まれる。\n★ゴロ: おっしゃるてか(質量比でO、Si、Al、Fe、Caの順に多い。Ca以降は分析地域により変化あり。)"},{"q":"二酸化ケイ素SiO₂は[____]結晶で、硬く、融点が[____]。","answer":"共有結合、高い","choices":["共有結合、高い","共有結合、低い","金属結合、高い","金属結合、低い"],"explain":"二酸化ケイ素SiO₂は[ 共有結合 ]結晶で、硬く、融点が[ 高い ]。\n★SiO₂は組成式で、Si原子を中心とする正四面体構造がO原子を介して無数に連なります。"},{"q":"二酸化ケイ素SiO₂は化学的に安定で薬品に侵されにくいが、[____]には侵される。*単純に触れるときの反応とします。","answer":"フッ化水素酸(フッ酸)HF","choices":["フッ化水素酸(フッ酸)HF","塩化水素酸(塩酸)HCl","炭酸ナトリウムNa₂CO₃","水酸化ナトリウムNaOH"],"explain":"二酸化ケイ素SiO₂は化学的に安定で薬品に侵されにくいが、[ フッ化水素酸(フッ酸)HF ]には侵される。*単純に触れるときの反応とします。\n★SiO₂ + 6HF → H₂SiF₆ + 2H₂O\n★加熱融解をするときは、水酸化ナトリウムNaOHや炭酸ナトリウムNa₂CO₃も反応します。"},{"q":"[____] → H₂SiF₆ + 2H₂O","answer":"SiO₂ + 6HF","choices":["SiO₂ + 6HF","SiO₂ + 4HF","H₂SiO₃ + 6HF","H₂SiO₃ + 4HF"],"explain":"SiO₂ + 6HF → H₂SiF₆ + 2H₂O\n★二酸化ケイ素SiO₂は化学的に安定で薬品に侵されにくい物質ですが、フッ化水素酸(フッ酸)HFには侵されます。ガラス製品の目盛りや模様を付けることに利用されます。"},{"q":"SiO₂ + 6HF → [____] ","answer":"H₂SiF₆ + 2H₂O","choices":["H₂SiF₆ + 2H₂O","H₂SiF₆ + O₂","H₂SiO₃ + 2H₂O","H₂SiO₃ + O₂"],"explain":"SiO₂ + 6HF → H₂SiF₆ + 2H₂O\n★二酸化ケイ素SiO₂は化学的に安定で薬品に侵されにくい物質ですが、フッ化水素酸(フッ酸)HFには侵されます。ガラス製品の目盛りや模様を付けることに利用されます。"},{"q":"二酸化ケイ素SiO₂にフッ化水素酸HFをかけると、[____]を生じながら溶ける。","answer":"ヘキサフルオロケイ酸H₂SiF₆","choices":["ヘキサフルオロケイ酸H₂SiF₆","シランSiH₄","炭酸ナトリウムNa₂CO₃","ケイ酸ナトリウムNa₂SiO₃"],"explain":"二酸化ケイ素SiO₂にフッ化水素酸HFをかけると、[ ヘキサフルオロケイ酸H₂SiF₆ ]を生じながら溶ける。\n★SiO₂ + 6HF → H₂SiF₆ + 2H₂O"},{"q":"石英から作られる石英ガラスは[____]や[____]に用いられる。","answer":"化学実験器具、光ファイバー","choices":["化学実験器具、光ファイバー","シリコーンゴム、光ファイバー","半導体、シリコーンゴム","半導体、化学実験器具"],"explain":"石英から作られる石英ガラスは[ 化学実験器具 ]や[ 光ファイバー ]に用いられる。"},{"q":"高純度の二酸化ケイ素SiO₂を融解して繊維状にしたものは[____]に利用されている。","answer":"光ファイバー","choices":["光ファイバー","化学実験器具","シリコーンゴム","半導体"],"explain":"高純度の二酸化ケイ素SiO₂を融解して繊維状にしたものは[ 光ファイバー ]に利用されている。"},{"q":"シリカゲルの製法の流れ\n二酸化ケイ素→[____]→[____]→[____]→シリカゲル","answer":"ケイ酸ナトリウム→水ガラス→ケイ酸","choices":["ケイ酸ナトリウム→水ガラス→ケイ酸","ケイ酸ナトリウム→ケイ酸→水ガラス","水ガラス→ケイ酸ナトリウム→ケイ酸","ケイ酸→ケイ酸ナトリウム→水ガラス"],"explain":"シリカゲルの製法の流れ\n二酸化ケイ素→[ ケイ酸ナトリウム ]→[ 水ガラス ]→[ ケイ酸 ]→シリカゲル\n★二酸化ケイ素SiO₂を主成分とするケイ砂や石英なども二酸化ケイ素を意味します。"},{"q":"シリカゲルの製法の流れ\n[____]→[____]→[____]→ケイ酸→シリカゲル","answer":"ケイ砂→ケイ酸ナトリウム→水ガラス","choices":["ケイ砂→ケイ酸ナトリウム→水ガラス","ケイ砂→水ガラス→ケイ酸ナトリウム","ケイ酸ナトリウム→ケイ砂→水ガラス","水ガラス→ケイ砂→ケイ酸ナトリウム"],"explain":"シリカゲルの製法の流れ\n[ ケイ砂 ]→[ ケイ酸ナトリウム ]→[ 水ガラス ]→ケイ酸→シリカゲル\n★二酸化ケイ素SiO₂を主成分とするケイ砂や石英なども二酸化ケイ素を意味します。"},{"q":"ケイ砂(SiO₂)を、水酸化ナトリウムまたは炭酸ナトリウムと加熱融解すると、[____]が生成する。","answer":"ケイ酸ナトリウム","choices":["ケイ酸ナトリウム","シリカゲル","水ガラス","ケイ酸"],"explain":"ケイ砂(SiO₂)を、水酸化ナトリウムまたは炭酸ナトリウムと加熱融解すると、[ ケイ酸ナトリウム ]が生成する。\n★SiO₂ + 2NaOH → Na₂SiO₃ + H₂O\n★SiO₂ + Na₂CO₃ → Na₂SiO₃ + CO₂"},{"q":"二酸化ケイ素を[____]、または[____]と加熱融解すると、ケイ酸ナトリウムが生成する。","answer":"水酸化ナトリウム、炭酸ナトリウム","choices":["水酸化ナトリウム、炭酸ナトリウム","ヘキサフルオロケイ酸、ケイ酸ナトリウム","ヘキサフルオロケイ酸、炭酸ナトリウム","水酸化ナトリウム、ヘキサフルオロケイ酸"],"explain":"二酸化ケイ素を[ 水酸化ナトリウム ]、または[ 炭酸ナトリウム ]と加熱融解すると、ケイ酸ナトリウムが生成する。\n★1300°Cでの融解反応です。\n★SiO₂ + 2NaOH → Na₂SiO₃ + H₂O\n★SiO₂ + Na₂CO₃ → Na₂SiO₃ + CO₂"},{"q":"SiO₂ + 2NaOH → [____]","answer":"Na₂SiO₃ + H₂O","choices":["Na₂SiO₃ + H₂O","Na₂SiO₃ + CO₂","H₂SiO₃ + CO₂","H₂SiO₃ + H₂O"],"explain":"SiO₂ + 2NaOH → Na₂SiO₃ + H₂O\n★二酸化ケイ素は水酸化ナトリウムNaOH(または炭酸ナトリウムNa₂CO₃)と加熱融解すると、ケイ酸ナトリウムNa₂SiO₃が生じます。★1300°Cでの融解反応です。★順序は逆ですがH₂SiO₃(SiO₂+H₂O)の形から連想すると作りやすいです。"},{"q":"[____] → Na₂SiO₃ + H₂O","answer":"SiO₂ + 2NaOH","choices":["SiO₂ + 2NaOH","SiO₂ + NaOH","SiO₂ + Na₂CO₃","SiO₂ + 2Na₂CO₃"],"explain":"SiO₂ + 2NaOH → Na₂SiO₃ + H₂O\n★二酸化ケイ素は水酸化ナトリウムNaOH(または炭酸ナトリウムNa₂CO₃)と加熱融解すると、ケイ酸ナトリウムNa₂SiO₃が生じます。★高分子であるSiO₂は水に溶けにくいためこの過程を経てケイ酸やシリカゲルを作ります。"},{"q":"SiO₂ + Na₂CO₃ → [____] ","answer":"Na₂SiO₃ + CO₂","choices":["Na₂SiO₃ + CO₂","Na₂SiO₃ + H₂O","H₂SiO₃ + H₂O","H₂SiO₃ + CO₂"],"explain":"SiO₂ + Na₂CO₃ → Na₂SiO₃ + CO₂\n★ケイ砂(SiO₂)は炭酸ナトリウムNa₂CO₃(または水酸化ナトリウムNaOH)と加熱融解すると、ケイ酸ナトリウムNa₂SiO₃が生じます。\n★順序は逆ですがH₂SiO₃(SiO₂+H₂O)の形から連想すると作りやすいです。"},{"q":"[____] → Na₂SiO₃ + CO₂","answer":"SiO₂ + Na₂CO₃","choices":["SiO₂ + Na₂CO₃","SiO₂ + 2NaOH","SiO₂ + H₂CO₃","SiO₂ + NaOH"],"explain":"SiO₂ + Na₂CO₃ → Na₂SiO₃ + CO₂\n★ケイ砂(SiO₂)は炭酸ナトリウムNa₂CO₃(または水酸化ナトリウムNaOH)と加熱融解すると、ケイ酸ナトリウムNa₂SiO₃が生じます。★高分子であるSiO₂は水に溶けにくいためこの過程を経てケイ酸やシリカゲルを作ります。"},{"q":"ケイ酸ナトリウムNa₂SiO₃に水を加えて加熱すると[____]が生成する。","answer":"水ガラス","choices":["水ガラス","ケイ砂","シリカゲル","ケイ酸"],"explain":"ケイ酸ナトリウムNa₂SiO₃に水を加えて加熱すると[ 水ガラス ]が生成する。\n★水ガラス(Na₂SiO₃の水溶液)は粘性の大きい無色透明の液体です。"},{"q":"ケイ酸ナトリウムNa₂SiO₃に[____]を加えて長時間加熱すると無色透明の、[____]である水ガラス(Na₂SiO₃の水溶液)が生成する。","answer":"水、粘性の大きい液体","choices":["水、粘性の大きい液体","水、ゲル状沈殿","塩酸、粘性の大きい液体","塩酸、ゲル状沈殿"],"explain":"ケイ酸ナトリウムNa₂SiO₃に[ 水 ]を加えて長時間加熱すると無色透明の、[ 粘性の大きい液体 ]である水ガラス(Na₂SiO₃の水溶液)が生成する。\n★ケイ酸ナトリウムも高分子であるため水に溶かすには長時間の加熱が必要です。\n★塩酸にするとケイ酸が遊離します。"},{"q":"水ガラス(Na₂SiO₃の水溶液)に塩酸を加えるとゲル状沈殿の[____]が遊離する。","answer":"ケイ酸","choices":["ケイ酸","ケイ酸ナトリウム","ケイ砂","シリカゲル"],"explain":"水ガラス(Na₂SiO₃の水溶液)に塩酸を加えるとゲル状沈殿の[ ケイ酸 ]が遊離する。\n★Na₂SiO₃ + 2HCl → 2NaCl + H₂SiO₃\n★ケイ酸は一般式SiO₂・nH₂O、n=1のH₂SiO₃をメタケイ酸、n=2のH₄SiO₄をオルトケイ酸と呼びます。ケイ酸を脱水・乾燥したシリカゲル(n≒1/2)も同じ化学式です。"},{"q":"水ガラス(Na₂SiO₃の水溶液)に[____](する)と[____]であるケイ酸H₂SiO₃が遊離する。","answer":"塩酸を加える、ゲル状沈殿","choices":["塩酸を加える、ゲル状沈殿","塩酸を加える、粘性の大きい液体","水を加える、粘性の大きい液体","水を加える、ゲル状沈殿"],"explain":"水ガラス(Na₂SiO₃の水溶液)に[ 塩酸を加える ]と[ ゲル状沈殿 ]のケイ酸H₂SiO₃が遊離する。\n★Na₂SiO₃ + 2HCl → 2NaCl + H₂SiO₃\n★ケイ酸は一般式SiO₂・nH₂O、n=1のときH₂SiO₃です。ケイ酸を脱水・乾燥したシリカゲル(n≒1/2)も同じ化学式です。"},{"q":"Na₂SiO₃ + 2HCl → [____] ","answer":"2NaCl + H₂SiO₃","choices":["2NaCl + H₂SiO₃","2NaCl + H₂SiO₄","2NaOH + H₂SiO₃","2NaOH + H₂SiO₄"],"explain":"Na₂SiO₃ + 2HCl → 2NaCl + H₂SiO₃\n★水ガラス(Na₂SiO₃の水溶液)に塩酸を加えるとゲル状沈殿のケイ酸H₂SiO₃が遊離します。\n★ケイ酸は一般式SiO₂・nH₂O、n=1のときH₂SiO₃です。ケイ酸を脱水・乾燥したシリカゲル(n≒1/2)も同じ化学式です。"},{"q":"[____] → 2NaCl + H₂SiO₃","answer":"Na₂SiO₃ + 2HCl","choices":["Na₂SiO₃ + 2HCl","Na₂SiO₃ + 2H₂O","H₂SiO₃ + 2NaOH","H₂SiO₃ + 2HCl"],"explain":"Na₂SiO₃ + 2HCl → 2NaCl + H₂SiO₃\n★水ガラス(Na₂SiO₃の水溶液)に塩酸を加えるとゲル状沈殿のケイ酸H₂SiO₃が遊離します。\n★ケイ酸は一般式SiO₂・nH₂O、n=1のときH₂SiO₃です。ケイ酸を脱水・乾燥したシリカゲル(n≒1/2)も同じ化学式です。"},{"q":"ケイ酸を加熱し乾燥(脱水)させると[____]になる。","answer":"シリカゲル","choices":["シリカゲル","水ガラス","ケイ酸ナトリウム","ケイ砂"],"explain":"ケイ酸を加熱し乾燥(脱水)させると[ シリカゲル ]になる。\n★ケイ酸は一般式SiO₂・nH₂O、n=1のときH₂SiO₃です。ケイ酸を脱水・乾燥したシリカゲル(n≒1/2)も同じ化学式です。"},{"q":"ケイ酸を[____](する)と[____]のシリカゲルが得られる。","answer":"加熱し乾燥(脱水)させる、多孔質の固体","choices":["加熱し乾燥(脱水)させる、多孔質の固体","加熱し乾燥(脱水)させる、ゲル状沈殿","塩酸を加えて長時間加熱、多孔質の固体","塩酸を加えて長時間加熱、ゲル状沈殿"],"explain":"ケイ酸を[ 加熱し乾燥(脱水)させる ]と[ 多孔質の固体 ]のシリカゲルが得られる。\n★多孔質であれば表面積も大きくなります。\n★ケイ酸は一般式SiO₂・nH₂O、n=1のときH₂SiO₃です。ケイ酸を脱水・乾燥したシリカゲル(n≒1/2)も同じ化学式です。"},{"q":"二酸化ケイ素SiO₂はSiを中心として4つの酸素が[____](体)の頂点に位置する構造を繰り返す、立体網目構造の[____](分子)である。","answer":"正四面体、無機高分子","choices":["正四面体、無機高分子","正六角形、無機高分子","正四面体、有機高分子","正六角形、有機高分子"],"explain":"二酸化ケイ素SiO₂はSiを中心として4つの酸素が[ 正四面体 ]の頂点に位置する構造を繰り返す、立体網目構造の[ 無機高分子 ]である。\n★Siから出る4つの手(価標)はそれぞれ酸素とつながっていますが、反対側のSiと酸素を1/2ずつ共有するため組成式では1/2の酸素Oが4つでSiO₂となります。★結晶構造の種類は多数あります。"},{"q":"二酸化ケイ素、[____]、[____]の構造はSiを中心として4つの酸素が正四面体の頂点に位置する構造を繰り返し、立体網目構造の無機高分子となっている。","answer":"ケイ酸、ケイ酸ナトリウム","choices":["ケイ酸、ケイ酸ナトリウム","二酸化炭素、炭酸ナトリウム","二酸化炭素、ケイ酸ナトリウム","ケイ酸、炭酸ナトリウム"],"explain":"二酸化ケイ素、[ ケイ酸 ]、[ ケイ酸ナトリウム ]の構造はSiを中心として4つの酸素が正四面体の頂点に位置する構造を繰り返し、立体網目構造の無機高分子となっている。\n★ケイ素Siと炭素Cは同族元素ですが酸化物やオキソ酸塩の性質に違いがあり出題項目になっています。"},{"q":"[____]と[____]は同じ化学式Na₂SiO₃で表わされる。","answer":"ケイ酸ナトリウム、水ガラス","choices":["ケイ酸ナトリウム、水ガラス","ケイ酸ナトリウム、シリカゲル","ケイ酸、シリカゲル","ケイ酸、水ガラス"],"explain":"[ ケイ酸ナトリウム ]と[ 水ガラス ]は同じ化学式Na₂SiO₃で表わされる。"},{"q":"[____]と[____]は同じ化学式で表される。一般式SiO₂・nH₂O","answer":"ケイ酸、シリカゲル","choices":["ケイ酸、シリカゲル","ケイ酸、水ガラス","ケイ酸ナトリウム、水ガラス","ケイ酸ナトリウム、シリカゲル"],"explain":"[ ケイ酸 ]と[ シリカゲル ]は同じ化学式で表される。一般式SiO₂・nH₂O"},{"q":"①[____]は無色透明の粘性の強い液体。\n②[____]は白色ゲル状沈殿。\n③[____]は多孔質の固体である。","answer":"①水ガラス、②ケイ酸、③シリカゲル","choices":["①水ガラス、②ケイ酸、③シリカゲル","①水ガラス、②シリカゲル、③ケイ酸","①シリカゲル、②ケイ酸、③水ガラス","①ケイ酸、②水ガラス、③シリカゲル"],"explain":"①[ 水ガラス ]は無色透明の粘性の強い液体。\n②[ ケイ酸 ]は白色ゲル状沈殿。\n③[ シリカゲル ]は多孔質の固体である。"},{"q":"ケイ酸ナトリウムNa₂SiO₃などの、SiO₂と[____]を反応させて得られる化合物を[____]という。","answer":"塩基、ケイ酸塩","choices":["塩基、ケイ酸塩","塩基、シリカゲル","酸、ケイ酸塩","酸、シリカゲル"],"explain":"ケイ酸ナトリウムNa₂SiO₃などの、SiO₂と[ 塩基 ]を反応させて得られる化合物を[ ケイ酸塩 ]という。\n★SiO₂ + 2NaOH → Na₂SiO₃ + H₂O\n★SiO₂ + Na₂CO₃ → Na₂SiO₃ + CO₂"},{"q":"ケイ砂や粘土を原料として、ガラス、セメント、陶磁器などのセラミックスを作る工業を、[____](または[____])という。","answer":"ケイ酸塩工業(または窯業)","choices":["ケイ酸塩工業(または窯業)","ケイ酸塩工業(または軽工業)","アルカリ工業(または窯業)","アルカリ工業(または軽工業)"],"explain":"ケイ砂や粘土を原料として、ガラス、セメント、陶磁器などのセラミックスを作る工業を、[ ケイ酸塩工業 ](または[ 窯業 ])という。\n★窯業(ようぎょう)と読みます。窯(かま)で土・砂などの高熱処理をし、陶磁器・ガラス・セメント・煉瓦(れんが)・壁や床のタイル、セラミックなどを作ります。"},{"q":"[____]は粘性の大きな水飴状の液体である。","answer":"水ガラス","choices":["水ガラス","シリカゲル","ケイ酸","ケイ酸ナトリウム"],"explain":"[ 水ガラス ]は粘性の大きな水飴状の液体である。\n★「粘性の大きい・強い」などの言い換え表現に慣れて下さい。"},{"q":"シリカゲルは多孔質で表面積が大きく、表面に[____](性)の[____](基)をもち水分子を吸着する。","answer":"親水性、ヒドロキシ基-OH","choices":["親水性、ヒドロキシ基-OH","親水性、カルボキシ基-COOH","疎水性、ヒドロキシ基-OH","疎水性、カルボキシ基-COOH"],"explain":"シリカゲルは多孔質で表面積が大きく、表面に[ 親水性 ]の[ ヒドロキシ基-OH ]をもち水分子を吸着する。\n★SiO₂・nH₂O (n≒1/2)"},{"q":"シリカゲルは[____](剤)やクロマトグラフィーの[____](剤)として用いられる。","answer":"乾燥剤、吸着剤","choices":["乾燥剤、吸着剤","乾燥剤、染色剤","脱水剤、吸着剤","脱水剤、染色剤"],"explain":"シリカゲルは[ 乾燥剤 ]やクロマトグラフィーの[ 吸着剤 ]として用いられる。\n★シリカゲルは酸性の乾燥剤です。どちらの用途でも塩基性物質との使用は避けます。★シリカゲルは無色で染色効果はありません。★シリカゲルカラムクロマトグラフィーは記載のある化学・化学基礎の教科書もあります。\n★シリカゲルの液性について、調整して中性を保証している中性シリカゲル(製品:シリカゲル60)と弱酸性のシリカゲルがあります。"},{"q":"シリカゲルは[____](色)であるが、塩化コバルトCoCl₂で[____](色)に着色してあり、水分を吸収すると[____](色)に変化する。水を吸収した後、加熱などで乾燥させると再び乾燥剤として利用できる。","answer":"無色、 青色、 淡赤色","choices":["無色、 青色、 淡赤色","無色、 淡赤色、 青色","淡赤色、 青色、 淡赤色","淡青色、 淡赤色、 青色"],"explain":"シリカゲルは[ 無色 ]であるが、塩化コバルトCoCl₂で[ 青色 ]に着色してあり、水分を吸収すると[ 淡赤色 ]に変化する。水を吸収した後、加熱などで乾燥させると再び乾燥剤として利用できる。\n★コバルトイオンCo²⁺は乾燥時に青色で、水和すると淡赤色(桃色、ピンク色)になります。"}]},
  {"code":"MB14","name":"気体の製法まとめ","parent":"非金属2","questions":[{"q":"「黄緑色の気体」といえば[____]である。","answer":"塩素","choices":["塩素","オゾン","臭素","二酸化窒素"],"explain":"「黄緑色の気体」といえば[ 塩素 ]である。\n\n★色付きの気体は\n・塩素Cl₂ 黄緑色\n・二酸化窒素NO₂ 赤褐色\n・臭素の気体も赤褐色\n・オゾンO₃ 淡青色(微青色など)\n・フッ素F₂ 淡黄色\n・残りは無色"},{"q":"「赤褐色の気体」といえば[____]である。","answer":"二酸化窒素","choices":["二酸化窒素","二酸化硫黄","二酸化炭素","一酸化窒素"],"explain":"「赤褐色の気体」といえば[ 二酸化窒素 ]である。\n\n★色付きの気体は\n・塩素Cl₂ 黄緑色\n・二酸化窒素NO₂ 赤褐色\n・臭素の気体も赤褐色\n・オゾンO₃ 淡青色(微青色など)\n・フッ素F₂ 淡黄色\n・残りは無色"},{"q":"「淡青色の気体」といえば[____]である。","answer":"オゾン","choices":["オゾン","塩素","二酸化窒素","フッ素"],"explain":"「淡青色の気体」といえば[ オゾン ]である。\n\n★色付きの気体は\n・塩素Cl₂ 黄緑色\n・二酸化窒素NO₂ 赤褐色\n・臭素の気体も赤褐色\n・オゾンO₃ 淡青色(微青色など)\n・フッ素F₂ 淡黄色\n・残りは無色"},{"q":"「淡黄色の気体」といえば[____]である。","answer":"フッ素","choices":["フッ素","オゾン","塩素","二酸化窒素"],"explain":"「淡黄色の気体」といえば[ フッ素 ]である。\n\n★色付きの気体は\n・塩素Cl₂ 黄緑色\n・二酸化窒素NO₂ 赤褐色\n・臭素の気体も赤褐色\n・オゾンO₃ 淡青色(微青色など)\n・フッ素F₂ 淡黄色\n・残りは無色"},{"q":"「腐卵臭の気体」といえば[____]である。","answer":"硫化水素","choices":["硫化水素","二酸化硫黄","フッ化水素","オゾン"],"explain":"「腐卵臭の気体」といえば[ 硫化水素 ]である。\n\n★気体の臭い\n・硫化水素H₂Sの腐卵臭\n・オゾンO₃の特異臭\n・刺激臭がNH₃、HCl、Cl₂、SO₂、NO₂、と、HFなどハロゲン化水素\n・その他の気体は無臭(無機化学の範囲)\n*オゾンO₃はほとんどの教科書が「特異臭」ですが「生臭い特有の臭い」の表現もあります。\n*NO₂は主に「刺激臭」ですが「特有の臭気」とする教科書もあります。2025年版調べ。"},{"q":"「特異臭のある気体」または「生臭い特有の臭いをもつ気体」といえば、[____]である。","answer":"オゾン","choices":["オゾン","硫化水素","二酸化硫黄","フッ化水素"],"explain":"「特異臭のある気体」または「生臭い特有の臭いをもつ気体」といえば、[ オゾン ]である。\n\n★気体の臭い\n・硫化水素H₂Sの腐卵臭\n・オゾンO₃の特異臭\n・刺激臭がNH₃、HCl、Cl₂、SO₂、NO₂、と、HFなどハロゲン化水素\n・その他の気体は無臭(無機化学の範囲)(無機化学の範囲)\n*オゾンO₃はほとんどの教科書が「特異臭」ですが「生臭い特有の臭い」の表現もあります。\n*NO₂は主に「刺激臭」ですが「特有の臭気」とする教科書もあります。2025年版調べ。"},{"q":"「刺激臭のある気体」に当てはまる組み合わせは[____]である。","answer":"アンモニア、フッ化水素","choices":["アンモニア、フッ化水素","アンモニア、硫化水素","二酸化炭素、一酸化炭素","二酸化炭素、二酸化硫黄"],"explain":"「刺激臭のある気体」に当てはまる組み合わせは[ アンモニア、フッ化水素 ]である。\n\n★二酸化炭素や一酸化炭素が無臭なことが個人的なイメージと逆だったので問題にしました。\n★気体の臭い\n・硫化水素H₂Sの腐卵臭\n・オゾンO₃の特異臭\n・刺激臭がNH₃、HCl、Cl₂、SO₂、NO₂、と、HFなどハロゲン化水素\n・その他の気体は無臭(無機化学の範囲)\n*オゾンO₃はほとんどの教科書が「特異臭」ですが「生臭い特有の臭い」の表現もあります。\n*NO₂は主に「刺激臭」ですが「特有の臭気」とする教科書もあります。2025年版調べ。\n*有機範囲にはホルムアルデヒド、アセトアルデヒドなど刺激臭の気体があります。"},{"q":"「刺激臭のある気体」に当てはまる組み合わせは[____]である。","answer":"塩化水素、二酸化硫黄","choices":["塩化水素、二酸化硫黄","塩化水素、二酸化炭素","硫化水素、二酸化炭素","硫化水素、二酸化硫黄"],"explain":"「刺激臭のある気体」に当てはまる組み合わせは[ 塩化水素、二酸化硫黄 ]である。\n\n★二酸化炭素や一酸化炭素が無臭なことが個人的なイメージと逆だったので問題にしました。\n★気体の臭い\n・硫化水素H₂Sの腐卵臭\n・オゾンO₃の特異臭\n・刺激臭がNH₃、HCl、Cl₂、SO₂、NO₂、と、HFなどハロゲン化水素\n・その他の気体は無臭(無機化学の範囲)\n*オゾンO₃はほとんどの教科書が「特異臭」ですが「生臭い特有の臭い」の表現もあります。\n*NO₂は主に「刺激臭」ですが「特有の臭気」とする教科書もあります。2025年版調べ。\n*有機範囲にはホルムアルデヒド、アセトアルデヒドなど刺激臭の気体があります。"},{"q":"「刺激臭のある気体」に当てはまる組み合わせは[____]である。","answer":"塩素、ヨウ化水素","choices":["塩素、ヨウ化水素","塩素、硫化水素","塩化水素、二酸化炭素","塩化水素、硫化水素"],"explain":"「刺激臭のある気体」に当てはまる組み合わせは[ 塩素、ヨウ化水素 ]である。\n\n★二酸化炭素や一酸化炭素が無臭なことが個人的なイメージと逆だったので問題にしました。\n★気体の臭い\n・硫化水素H₂Sの腐卵臭\n・オゾンO₃の特異臭\n・刺激臭がNH₃、HCl、Cl₂、SO₂、NO₂、と、HFなどハロゲン化水素\n・その他の気体は無臭(無機化学の範囲)\n*オゾンO₃はほとんどの教科書が「特異臭」ですが「生臭い特有の臭い」の表現もあります。\n*NO₂は主に「刺激臭」ですが「特有の臭気」とする教科書もあります。2025年版調べ。有機範囲にはホルムアルデヒド、アセトアルデヒドなど刺激臭の気体です。"},{"q":"「塩素酸カリウムの分解」とあれば、[____]の発生と特定できる。","answer":"酸素","choices":["酸素","水素","塩化水素","硫化水素"],"explain":"「塩素酸カリウムの分解」とあれば、[ 酸素 ]の発生と特定できる。\n\n★2KClO₃ → 2KCl + 3O₂ (触媒 MnO₂、加熱)。\n★塩素酸カリウムKClO₃は白色固体(結晶粉末)です。"},{"q":"「過酸化水素の分解」とあれば、[____]の発生と特定できる。","answer":"酸素","choices":["酸素","水素","塩化水素","硫化水素"],"explain":"「過酸化水素の分解」とあれば、[ 酸素 ]の発生と特定できる。\n\n★過酸化水素水H₂O₂に少量の酸化マンガン(IV)MnO₂を加えると[ 酸素O₂ ]が得られる。\n★2H₂O₂ → 2H₂O + O₂(触媒MnO₂)"},{"q":"「液体空気の分留」とあれば、[____]の発生と特定できる。","answer":"酸素","choices":["酸素","水素","塩化水素","硫化水素"],"explain":"「液体空気の分留」とあれば、[ 酸素 ]の発生と特定できる。\n\n★液体空気の分留では酸素、窒素が主に得られます。特別な分留で貴ガスが得られます。"},{"q":"「酸素中(空気中)の無声放電」とあれば、[____]の発生と特定できる。","answer":"オゾン","choices":["オゾン","塩素","塩化水素","二酸化窒素"],"explain":"「酸素中(空気中)の無声放電」とあれば、[ オゾン ]の発生と特定できる。\n\n★3O₂ ⇄ 2O₃\nオゾンO₃は不安定なため放置すると酸素O₂へ戻ります。"},{"q":"「亜鉛に希硫酸を加える」とあれば、[____]の発生と特定できる。","answer":"水素","choices":["水素","塩素","塩化水素","二酸化窒素"],"explain":"「亜鉛に希硫酸を加える」とあれば、[ 水素 ]の発生と特定できる。\n\n★イオン化傾向が水素より大きい金属(亜鉛と鉄が出題多数)は塩酸や希硫酸と反応して水素を発生します。"},{"q":"「炭化水素や石油と水蒸気の反応」とあれば、[____]の発生と特定できる。","answer":"水素","choices":["水素","塩素","塩化水素","二酸化窒素"],"explain":"「炭化水素や石油と水蒸気の反応」とあれば、[ 水素 ]の発生と特定できる。\n\n★ニッケルNi触媒を用いて、石油の成分を高温の水蒸気と反応させる。一酸化炭素なども生じる。教科書には掲載なしですが水蒸気改質という水素の製法です。"},{"q":"「食塩水の電気分解(陰極)」とあれば、[____]の発生と特定できる。","answer":"水素","choices":["水素","塩素","塩化水素","二酸化窒素"],"explain":"「食塩水の電気分解(陰極)」とあれば、[ 水素 ]の発生と特定できる。\n\n★食塩水(塩化ナトリウム水溶液)の電気分解で水酸化ナトリウムが製造される際に。\n★陽極では塩素、陰極では水素が発生します。Na⁺とOH⁻がくっつきNaOHになります。"},{"q":"「酸化マンガンMnO₂と濃塩酸を加熱」とあれば、[____]の発生と特定できる。","answer":"塩素","choices":["塩素","水素","塩化水素","二酸化窒素"],"explain":"「酸化マンガンMnO₂と濃塩酸を加熱」とあれば、[ 塩素 ]の発生と特定できる。\n\n★MnO₂ + 4HCl → MnCl₂ + 2H₂O + Cl₂ (加熱必要)\n酸化マンガン(IV)に濃塩酸を加えて加熱すると塩素が発生します。"},{"q":"「さらし粉に塩酸を加える」とあれば、[____]の発生と特定できる。","answer":"塩素","choices":["塩素","水素","塩化水素","二酸化窒素"],"explain":"「さらし粉に塩酸を加える」とあれば、[ 塩素 ]の発生と特定できる。\n\n★さらし粉に塩酸を加えると塩素が発生します。\nCaCl(ClO)･H₂O + 2HCl → CaCl₂ + 2H₂O + Cl₂ (加熱なし)\n★高度さらし粉に塩酸を加えると塩素が発生します。\nCa(ClO)₂･2H₂O + 4HCl → CaCl₂ + 4H₂O + 2Cl₂ (加熱なし)\nすぐに反応するため二又試験管(ふたまた、二股)を使います。"},{"q":"「食塩水の電気分解(陽極)」とあれば、[____]の発生と特定できる。","answer":"塩素","choices":["塩素","水素","塩化水素","二酸化窒素"],"explain":"「食塩水の電気分解(陽極)」とあれば、[ 塩素 ]の発生と特定できる。\n\n★食塩水(塩化ナトリウム水溶液)の電気分解で水酸化ナトリウムが製造される際に。\n★陽極では塩素、陰極では水素が発生します。Na⁺とOH⁻がくっつきNaOHになります。"},{"q":"「亜硝酸アンモニウムの熱分解」とあれば、[____]の発生と特定できる。","answer":"窒素","choices":["窒素","塩素","塩化水素","二酸化窒素"],"explain":"「亜硝酸アンモニウムの熱分解」とあれば、[ 窒素 ]の発生と特定できる。\n\n★実験室での窒素の製法です。\n★NH₄NO₂ → N₂ + 2H₂O (加熱必要)"},{"q":"「液体空気の分留」とあれば、[____]の発生と特定できる。","answer":"窒素","choices":["窒素","塩素","塩化水素","二酸化窒素"],"explain":"「液体空気の分留」とあれば、[ 窒素 ]の発生と特定できる。\n\n★液体空気の分留では酸素、窒素が主に得られます。特別な分留で貴ガスが得られます。"},{"q":"「塩化ナトリウムと濃硫酸を加熱」とあれば、[____]の発生と特定できる。","answer":"塩化水素","choices":["塩化水素","塩素","アンモニア","二酸化窒素"],"explain":"「塩化ナトリウムと濃硫酸を加熱」とあれば、[ 塩化水素 ]の発生と特定できる。\n\n★NaCl + H₂SO₄ → NaHSO₄ + HCl(揮発性酸追い出し)(加熱必要)\n★濃硫酸が絡む反応では基本的に加熱が必要です。"},{"q":"「塩化アンモニウムに水酸化カルシウムを加えて加熱」とあれば、[____]の発生と特定できる。","answer":"アンモニア","choices":["アンモニア","塩素","塩化水素","二酸化窒素"],"explain":"「塩化アンモニウムに水酸化カルシウムを加えて加熱」とあれば、[ アンモニア ]の発生と特定できる。\n\n★2NH₄Cl + Ca(OH)₂ → CaCl₂ + 2NH₃ + 2H₂O (加熱必要)"},{"q":"「窒素と水素を直接反応させる」とあれば、[____]の発生と特定できる。","answer":"アンモニア","choices":["アンモニア","塩素","塩化水素","二酸化窒素"],"explain":"「窒素と水素を直接反応させる」とあれば、[ アンモニア ]の発生と特定できる。\n\n★ハーバー・ボッシュ法\nN₂ + 3H₂ ⇄ 2NH₃ (触媒[ Fe₃O₄を主成分 ])\n★フリッツ・ハーバー(独)が1918年にノーベル化学賞を受賞しています。一方、カール・ボッシュ(独)は1931年に他の研究開発でノーベル化学賞を受賞しています。"},{"q":"「銅に希硝酸を加える」とあれば、[____]の発生と特定できる。","answer":"一酸化窒素","choices":["一酸化窒素","塩素","二酸化硫黄","二酸化窒素"],"explain":"「銅に希硝酸を加える」とあれば、[ 一酸化窒素 ]の発生と特定できる。\n★酸化力の強い酸には溶け、希硝酸でNO、濃硝酸でNO₂、熱濃硫酸でSO₂を生じます。\n★3Cu + 8HNO₃ → 3Cu(NO₃)₂ + 4H₂O + 2NO"},{"q":"「アンモニアを酸化(白金触媒)」とあれば、[____]の発生と特定できる。","answer":"一酸化窒素","choices":["一酸化窒素","塩素","二酸化硫黄","二酸化窒素"],"explain":"「アンモニアを酸化(白金触媒)」とあれば、[ 一酸化窒素 ]の発生と特定できる。\n\n★オストワルト法1\n4NH₃ + 5O₂ → 4NO + 6H₂O (触媒Pt)\n★触媒に白金を使い、アンモニアを酸化して一酸化窒素をつくります。\n★アンモニアはハーバー・ボッシュ法(触媒はFe主体)で製造します。"},{"q":"「銅に濃硝酸を加える」とあれば、[____]の発生と特定できる。","answer":"二酸化窒素","choices":["二酸化窒素","塩素","一酸化窒素","二酸化硫黄"],"explain":"「銅に濃硝酸を加える」とあれば、[ 二酸化窒素 ]の発生と特定できる。\n★酸化力の強い酸には溶け、希硝酸でNO、濃硝酸でNO₂、熱濃硫酸でSO₂を生じます。\n★Cu + 4HNO₃ → Cu(NO₃)₂ + 2H₂O + 2NO₂"},{"q":"「銀に濃硝酸」とあれば、[____]の発生と特定できる。","answer":"二酸化窒素","choices":["二酸化窒素","塩素","一酸化窒素","二酸化硫黄"],"explain":"「銀に濃硝酸」とあれば、[ 二酸化窒素 ]の発生と特定できる。\n\n★Ag + 2HNO₃ → AgNO₃ + H₂O + NO₂"},{"q":"「一酸化窒素の空気酸化」とあれば、[____]の発生と特定できる。","answer":"二酸化窒素","choices":["二酸化窒素","塩素","一酸化窒素","二酸化硫黄"],"explain":"「一酸化窒素の空気酸化」とあれば、[ 二酸化窒素 ]の発生と特定できる。\n\n★オストワルト法2\n2NO + O₂ → 2NO₂\n★一酸化窒素を空気中の酸素で酸化して二酸化窒素NO₂にします。一酸化窒素(無色)は空気中で速やかに二酸化窒素(赤褐色)へ酸化されます。"},{"q":"「ホタル石と濃硫酸を加熱」とあれば、[____]の発生と特定できる。","answer":"フッ化水素","choices":["フッ化水素","オゾン","一酸化窒素","二酸化窒素"],"explain":"「ホタル石と濃硫酸を加熱」とあれば、[ フッ化水素 ]の発生と特定できる。\n\n★CaF₂ + H₂SO₄ → CaSO₄ + 2HF"},{"q":"「銅と濃硫酸を加熱」とあれば、[____]の発生と特定できる。","answer":"二酸化硫黄","choices":["二酸化硫黄","塩素","一酸化窒素","二酸化窒素"],"explain":"「銅と濃硫酸を加熱」とあれば、[ 二酸化硫黄 ]の発生と特定できる。\n★酸化力の強い酸には溶け、希硝酸でNO、濃硝酸でNO₂、熱濃硫酸でSO₂を生じます。\n★Cu + 2H₂SO₄ → CuSO₄ + 2H₂O + SO₂ (加熱必要)"},{"q":"「亜硫酸塩(亜硫酸ナトリウムなど)に硫酸を加える」とあれば、[____]の発生と特定できる。","answer":"二酸化硫黄","choices":["二酸化硫黄","塩素","一酸化窒素","二酸化窒素"],"explain":"「亜硫酸塩(亜硫酸ナトリウムなど)に硫酸を加える」とあれば、[ 二酸化硫黄 ]の発生と特定できる。\n\n★Na₂SO₃ + H₂SO₄ → Na₂SO₄ + H₂O + SO₂"},{"q":"「硫黄の燃焼」とあれば、[____]の発生と特定できる。","answer":"二酸化硫黄","choices":["二酸化硫黄","塩素","一酸化窒素","二酸化窒素"],"explain":"「硫黄の燃焼」とあれば、[ 二酸化硫黄 ]の発生と特定できる。\n\n★S + O₂ → SO₂\n★燃焼(加熱)により三酸化硫黄を生成するには五酸化バナジウムを触媒として二酸化硫黄を400°C〜600°Cに加熱します。"},{"q":"「硫化鉄(II)に希硫酸を加える」とあれば、[____]の発生と特定できる。","answer":"硫化水素","choices":["硫化水素","塩素","一酸化窒素","二酸化窒素"],"explain":"「硫化鉄(II)に希硫酸を加える」とあれば、[ 硫化水素 ]の発生と特定できる。\n\n★FeS + H₂SO₄ → FeSO₄ + H₂S\n★FeS + 2HCl → FeCl₂ + H₂S"},{"q":"「ギ酸と濃硫酸を加熱」とあれば、[____]の発生と特定できる。","answer":"一酸化炭素","choices":["一酸化炭素","塩素","一酸化窒素","二酸化窒素"],"explain":"「ギ酸と濃硫酸を加熱」とあれば、[ 一酸化炭素 ]の発生と特定できる。\n\n★HCOOH → CO + H₂O(H₂SO₄と共に加熱)\n★実験室での一酸化炭素の製法です。\n★有機化学のエタノールと濃硫酸の混合物を加熱してエチレンを生成するときと同じ反応(分子内脱水)です。"},{"q":"「大理石(もしくは石灰石)に希塩酸を加える」とあれば、[____]の発生と特定できる。","answer":"二酸化炭素","choices":["二酸化炭素","オゾン","一酸化窒素","二酸化窒素"],"explain":"「大理石(もしくは石灰石)に希塩酸を加える」とあれば、[ 二酸化炭素 ]の発生と特定できる。\n\n★大理石は炭酸カルシウムのこと。\n★CaCO₃ + 2HCl → CaCl₂ + CO₂ + H₂O\n★弱酸遊離反応です。★炭酸は二酸化炭素と水へ分解されます。\nH₂CO₃ → CO₂ + H₂O\n★実験室での二酸化炭素の製法です。"},{"q":"「炭酸水素ナトリウムを加熱する」とあれば、[____]の発生と特定できる。","answer":"二酸化炭素","choices":["二酸化炭素","塩素","一酸化窒素","二酸化窒素"],"explain":"「炭酸水素ナトリウムを加熱する」とあれば、[ 二酸化炭素 ]の発生と特定できる。\n\n★2NaHCO₃ → Na₂CO₃ + CO₂ + H₂O (加熱)\n★炭酸水素ナトリウムを熱すると二酸化炭素が発生します。\n★炭酸水素ナトリウムと炭酸ナトリウムは塩酸や希硫酸などの強酸を加えると二酸化炭素が発生します。"},{"q":"「炭酸水素ナトリウムに塩酸(または希硫酸)を加える」とあれば、[____]の発生と特定できる。","answer":"二酸化炭素","choices":["二酸化炭素","塩素","一酸化窒素","二酸化窒素"],"explain":"「炭酸水素ナトリウムに塩酸(または希硫酸)を加える」とあれば、[ 二酸化炭素 ]の発生と特定できる。\n\n★NaHCO₃ + HCl → NaCl + CO₂ + H₂O\n★2NaHCO₃ + H₂SO₄ → Na₂SO₄ + 2CO₂ + 2H₂O★塩酸や希硫酸などの強酸を加えると二酸化炭素が発生します。"},{"q":"「炭酸ナトリウムに塩酸(または希硫酸)を加える」とあれば、[____]の発生と特定できる。","answer":"二酸化炭素","choices":["二酸化炭素","塩素","一酸化窒素","二酸化窒素"],"explain":"「炭酸ナトリウムに塩酸(または希硫酸)を加える」とあれば、[ 二酸化炭素 ]の発生と特定できる。\n\n★Na₂CO₃ + 2HCl → 2NaCl + CO₂ + H₂O \n★Na₂CO₃ + H₂SO₄ → Na₂SO₄ + CO₂ + H₂O\n★炭酸水素ナトリウムと炭酸ナトリウムは塩酸や希硫酸などの強酸を加えると二酸化炭素が発生します。"},{"q":"「石灰石の熱分解」とあれば、[____]の発生と特定できる。","answer":"二酸化炭素","choices":["二酸化炭素","塩素","一酸化窒素","二酸化窒素"],"explain":"「石灰石の熱分解」とあれば、[ 二酸化炭素 ]の発生と特定できる。\n\n★石灰石(主成分CaCO₃)\n★固体の分解は基本的に加熱が必要です。\n★二酸化炭素の工業的製法です。加熱は1000°C近くの高温。「石灰石の熱分解」とも表現されます。\n★CaCO₃ → CaO + CO₂\n★反応式は東大2018年。東大化学でも基本の出題は多数です。"},{"q":"「酢酸ナトリウムと水酸化ナトリウムを加熱」とあれば、[____]の発生と特定できる。","answer":"メタン","choices":["メタン","アンモニア","アセチレン","オゾン"],"explain":"「酢酸ナトリウムと水酸化ナトリウムを加熱」とあれば、[ メタン ]の発生と特定できる。\n\n★CH₃COONa + NaOH → Na₂CO₃ + CH₄ (加熱必要)\n★実験室でのメタンの製法です。酢酸ナトリウム(固)と水酸化ナトリウム(固)は固体同士の反応なので加熱が必要です。"},{"q":"「カーバイトに水を加える」とあれば、[____]の発生と特定できる。","answer":"アセチレン","choices":["アセチレン","メタン","アンモニア","エチレン、もしくはジエチルエーテル"],"explain":"「カーバイトに水を加える」とあれば、[ アセチレン ]の発生と特定できる。\n\n★炭化カルシウム(カルシウムカーバイド)CaC₂をアルミホイルに包んで水に浸すと生成し、そのまま水上置換で捕集できる。\n★実験室でのアセチレンの製法です。実験の写真や絵も確認してください。"},{"q":"「メタンの熱分解」とあれば、[____]の発生と特定できる。","answer":"アセチレン","choices":["アセチレン","メタン","アンモニア","エチレン、もしくはジエチルエーテル"],"explain":"「メタンの熱分解」とあれば、[ アセチレン ]の発生と特定できる。\n\n★工業的に、メタンや石油中のアルカンを熱分解(クラッキング)することによって作る。\n★熱分解はクラッキング、接触分解ともいいます。"},{"q":"「エタノールと濃硫酸を加熱」とあれば、[____]の発生と特定できる。","answer":"エチレン、もしくはジエチルエーテル","choices":["エチレン、もしくはジエチルエーテル","メタン","アセチレン","アンモニア"],"explain":"「エタノールと濃硫酸を加熱」とあれば、[ エチレン、もしくはジエチルエーテル ]の発生と特定できる。\n\n★エタノールを濃硫酸と高温(160～170°C)で加熱すると分子内脱水(脱離)が起こり、エチレンと水が生じます。\n★CH₃CH₂OH → H₂C=CH₂ + H₂O\n\n★エタノールを濃硫酸と中温(130～140°C)で加熱すると分子間脱水(縮合)が起こり、ジエチルエーテルと水が生じる。\n★C₂H₅-OH + H-OC₂H₅ → C₂H₅OC₂H₅ + H₂O"}]},
  {"code":"MC01","name":"アルカリ金属1","parent":"典型金属","questions":[{"q":"水素以外の1族の元素を[____]という。","answer":"アルカリ金属","choices":["アルカリ金属","アルカリ土類金属","貴ガス","ハロゲン"],"explain":"水素以外の1族の元素を[ アルカリ金属 ]という。\n★選択肢について\n1族はアルカリ金属\n2族はアルカリ土類金属\n17族はハロゲン\n18族は貴ガスです。"},{"q":"アルカリ金属には、[____]がある。","answer":"Li、Na、K、Rb、Cs","choices":["Li、Na、K、Rb、Cs","Mg、Ca、Sr、Ba、Ra","Ne、Ar、Kr、Xe、Rn","F、Cl、Br、I、At"],"explain":"アルカリ金属には、[ Li、Na、K、Rb、Cs ]がある。\n★セシウムCsの次のフランシウムFrはほとんど存在せず、扱っていない教科書も複数ありました。"},{"q":"アルカリ金属の価電子は[____](個)で[____](価)の[____](イオン)になりやすい。","answer":"1個、1価、陽イオン","choices":["1個、1価、陽イオン","1個、1価、陰イオン","2個、2価、陽イオン","2個、2価、陰イオン"],"explain":"アルカリ金属の価電子は[ 1個 ]で[ 1価 ]の[ 陽イオン ]になりやすい。"},{"q":"原子から電子e⁻を1個取り去り、1価の陽イオンにするために必要なエネルギーを[____]という。これが[____](い)原子ほど陽イオンになりやすい。","answer":"イオン化エネルギー、小さい","choices":["イオン化エネルギー、小さい","イオン化エネルギー、大きい","イオン化傾向、小さい","イオン化傾向、大きい"],"explain":"原子から電子e⁻を1個取り去り、1価の陽イオンにするために必要なエネルギーを[ イオン化エネルギー ]という。これが[ 小さい ]原子ほど陽イオンになりやすい。\n★イオン化エネルギーが小さいほど電子e⁻を取り去りやすく陽イオンになりやすくなります。多くは、イオン化エネルギーが小さいほど、イオン化傾向が大きくなります。\n★比較：イオン化傾向は陽イオンになろうとする性質です(主に金属)。イオン化エネルギーはエネルギー、イオン化傾向は性質です。"},{"q":"単体の金属が、水溶液中で電子e⁻を失って陽イオンになろうとする性質を金属の[____]という。これが[____](い)金属ほど陽イオンになりやすい。","answer":"イオン化傾向、大きい","choices":["イオン化傾向、大きい","イオン化傾向、小さい","イオン化エネルギー、大きい","イオン化エネルギー、小さい"],"explain":"単体の金属が、水溶液中で電子e⁻を失って陽イオンになろうとする性質を金属の[ イオン化傾向 ]という。これが[ 大きい ]金属ほど陽イオンになりやすい。\n★イオン化傾向は陽イオンになろうとする性質です(主に金属)。これを大きい順に左から並べた列をイオン化列といいます。\n★比較：イオン化エネルギーは原子から電子e⁻を1個取り去り、1価の陽イオンにするために必要なエネルギーです。多くは、イオン化エネルギーが小さいほど、イオン化傾向が大きくなります。"},{"q":"アルカリ金属のイオン化傾向は[____](く)、[____](力)が強い。","answer":"大きく、還元力","choices":["大きく、還元力","大きく、酸化力","小さく、還元力","小さく、酸化力"],"explain":"アルカリ金属のイオン化傾向は[ 大きく ]、[ 還元力 ]が強い。\n★空気中の酸素、塩素、水などとの反応性が高く、酸化されやすい金属です。★イオン化エネルギー(e⁻を1個取り去るエネルギー)は小さくなります。"},{"q":"アルカリ金属の単体は、[____]で得ている。","answer":"融解塩電解","choices":["融解塩電解","水溶液の電気分解","天然の単体","鉱物の分留"],"explain":"アルカリ金属の単体は、[ 融解塩電解 ]で得ている。\n★融解塩電解、又は、溶融塩電解といい、化合物を高温に熱して得られる融解液の電気分解です。アルカリ金属はイオン化傾向が大きく、水と反応するため、水溶液の電気分解では得られません。"},{"q":"アルカリ金属は[____]に保存する。","answer":"灯油中","choices":["灯油中","水中","デシケーター(空気中)","アルコール中"],"explain":"アルカリ金属は[ 灯油中 ]に保存する。\n★空気中で酸化され、水やアルコールとも反応するため、灯油中で保存します。"},{"q":"アルカリ金属はどれも密度が[____](い)[____](金属)であり、比較的[____](い)。","answer":"小さい、軽金属、柔らかい","choices":["小さい、軽金属、柔らかい","小さい、軽金属、固い","大きい、重金属、柔らかい","大きい、重金属、固い"],"explain":"アルカリ金属はどれも密度が[ 小さい ][ 軽金属 ]であり、比較的[ 柔らかい ]。\n★比較的柔らかく、ナイフで切れます。★軽金属は密度4.0g/cm³以下とし、アルカリ金属は全て2.0g/cm³未満で原子番号が大きくなると密度も大きくなります。"},{"q":"アルカリ金属は、他の金属に比べ、[____](く)、融点は[____](い)。","answer":"柔らかく、低い","choices":["柔らかく、低い","柔らかく、高い","固く、低い","固く、高い"],"explain":"アルカリ金属は、他の金属に比べ、[ 柔らかく ]、融点は[ 低い ]。\n★ナイフで切れるほど柔らかく、金属の中では融点は低いといえます。"},{"q":"アルカリ金属をナイフで切ると、その断面は[____]。","answer":"すぐに酸化され、金属光沢を失う","choices":["すぐに酸化され、金属光沢を失う","すぐに酸化され、金属光沢をもつ","ほとんど酸化されず、金属光沢を失う","ほとんど酸化されず、金属光沢をもつ"],"explain":"アルカリ金属をナイフで切ると、その断面は[ すぐに酸化され、金属光沢を失う ]。\n★空気に触れる面はすぐに酸化されます。「アルカリ金属は灯油中で保存する」ことと関連づけると答えやすくなります。"},{"q":"4Na + O₂ → [____]","answer":"2Na₂O","choices":["2Na₂O","4NaO","2NaOH","4NaOH"],"explain":"4Na + O₂ → 2Na₂O\n★空気中の酸素で酸化されます。★加熱すると過酸化ナトリウムNa₂O₂まで反応が進みます。"},{"q":"2Na + Cl₂ → [____]","answer":"2NaCl","choices":["2NaCl","Na₂Cl","2NaOCl","2NaOH"],"explain":"2Na + Cl₂ → 2NaCl\n★空気中の酸素と同様に、塩素とも激しく(速やかに)反応します。"},{"q":"「空気中の酸素で直ちに酸化される」とあれば、[____]が強いといえる。","answer":"還元力","choices":["還元力","酸化力","吸湿性","脱水作用"],"explain":"空気中の酸素で直ちに酸化される」とあれば、[ 還元力 ]が強いといえる。\n★「酸化される」=相手を還元する=還元力が強い\n★「相手を酸化する」=酸化力が強い\n=その物質は還元される\n★酸化とは、酸素Oを受け取る、水素Hまたは電子e⁻を放出することです。\n★還元とは、酸素Oを与える、水素Hまたは電子e⁻を奪うことです。\n*「酸化される」=「その物質が酸化する」(例「鉄釘が酸化して色が変わる」など)の意味ですが、主語がその物質のときは「酸化される」の受身表現の方が誤解が生じにくく好まれます。"},{"q":"アルカリ金属は常温の水と反応すると、[____]を発生し、[____]を生じる。","answer":"水素、水酸化物","choices":["水素、水酸化物","水素、オキソ酸","酸素、水酸化物","酸素、オキソ酸"],"explain":"アルカリ金属は常温の水と反応すると、[ 水素 ]を発生し、[ 水酸化物 ]を生じる。\n★2Na + 2H₂O → 2NaOH + H₂"},{"q":"2Na + 2H₂O → [____]","answer":"2NaOH + H₂","choices":["2NaOH + H₂","2NaOH + O₂","Na₂O + H₂","Na₂O + O₂"],"explain":"2Na + 2H₂O → 2NaOH + H₂\n★アルカリ金属は常温の水と反応すると、水素を発生し、水酸化物を生じます。"},{"q":"アルカリ金属の水酸化物は[____](性)を示す。","answer":"強塩基性","choices":["強塩基性","弱塩基性","強酸性","弱酸性"],"explain":"アルカリ金属の水酸化物は[ 強塩基性 ]を示す。\n★記憶すべき4つの強塩基に、NaOH、KOH、Ca(OH)₂、Ba(OH)₂(ゴロ: 泣くカバ)があり、NaとKはアルカリ金属です。CaとBaはアルカリ土類金属です。このうち、Ca(OH)₂は水に溶けにくく「水に少し溶ける(わずかに溶ける)」という表現がされます。"},{"q":"アルカリ金属が水と反応し、水素を発生させ、水酸化物を生じることから、[____]が強いといえる。","answer":"還元力","choices":["還元力","酸化力","吸湿性","脱水作用"],"explain":"アルカリ金属が水と反応し、水素を発生させ、水酸化物を生じることから、[ 還元力 ]が強いといえる。\n★水から水素が出ていきます。\n★2Na + 2H₂O → 2NaOH + H₂\n★相手を酸化する=酸化力が強い。\n★酸化されやすい=還元力が強い。"},{"q":"アルカリ金属の還元作用は原子番号が[____](い)ほど強い。これは周期表の[____]へ行くほど原子半径が[____](く)なり価電子を放出しやすくなるためである。","answer":"大きい、下、大きく","choices":["大きい、下、大きく","大きい、下、小さく","小さい、上、大きく","小さい、上、小さく"],"explain":"アルカリ金属の還元作用は原子番号が[ 大きい ]ほど強い。これは周期表の[ 下 ]へ行くほど原子半径が[ 大きく ]なり価電子を放出しやすくなるためである。"},{"q":"ナトリウムやカリウムは少量の水と反応するとき、[____]。","answer":"炎を伴って反応する","choices":["炎を伴って反応する","ススと炎を伴って反応する","ポンと爆鳴音(ばくめいおん)がなる","静かに反応し水素が発生する"],"explain":"ナトリウムやカリウムは少量の水と反応するとき、[ 炎を伴って反応する ]。\n★水素も発生します。\n★2Na + 2H₂O → 2NaOH + H₂\n★2K + 2H₂O → 2KOH + H₂"},{"q":"ナトリウムは[____](の水)と反応するとき、[____](色)の炎を伴って反応する。","answer":"少量の水、黄色","choices":["少量の水、黄色","少量の水、赤紫","少量・多量の水、黄色","少量・多量の水、赤紫"],"explain":"ナトリウムは[ 少量の水 ]と反応するとき、[ 黄色 ]の炎を伴って反応する。\n★炎色反応の色と同じです。\n★比較：ナトリウムは少量の水のときに炎を伴います。カリウムは少量・多量の水でも炎を伴います。\n★2Na + 2H₂O → 2NaOH + H₂\n★2K + 2H₂O → 2KOH + H₂"},{"q":"カリウムは[____](の水)と反応するとき、[____](色)の炎を伴って反応する。","answer":"少量・多量の水、赤紫","choices":["少量・多量の水、赤紫","少量・多量の水、黄色","少量の水、黄色","少量の水、赤紫"],"explain":"カリウムは[ 少量・多量の水 ]と反応するとき、[ 赤紫 ]の炎を伴って反応する。\n★炎色反応の色と同じです。\n★比較：ナトリウムは少量の水のときに炎を伴います。カリウムは少量・多量の水でも炎を伴います。\n★2Na + 2H₂O → 2NaOH + H₂\n★2K + 2H₂O → 2KOH + H₂"},{"q":"アルカリ金属の炎色反応は、\nLiは[____]、Naは[____]、Kは[____]、\nRbは赤、Csは青、である。","answer":"赤、黄、赤紫","choices":["赤、黄、赤紫","赤、赤紫、黄","黄、赤、赤紫","黄、赤紫、黄"],"explain":"アルカリ金属の炎色反応は、\nLiは[ 赤 ]、Naは[ 黄 ]、Kは[ 赤紫 ]、\nRbは赤、Csは青、である。\n★ゴロ「リアカーなきK村(Li赤Na黄K赤紫)」の部分です。"},{"q":"アルカリ金属の炎色反応は、\nLiは赤、Naは黄、Kは赤紫、\nRbは[____]、Csは[____]、である。(大学入試としては難問です。)","answer":"赤、青","choices":["赤、青","赤、黄","青、赤","青、黄"],"explain":"アルカリ金属の炎色反応は、\nLiは赤、Naは黄、Kは赤紫、\nRbは[ 赤 ]、Csは[ 青 ]、である。\n★セシウムCsが注目される時期がありました。宝石のRuby(ルビー)とサファイアが赤と青なのでRbとRubyの音つながりで覚えられると思います。\n*Rbの炎色反応は教科書や図説により「赤、深赤、紅紫、青紫」と分かれています。「赤はスペクトル色、実験室では青紫」などとしているものもあります。\n*セシウムの炎色反応は「青、青紫」の表記があります。"}]},
  {"code":"MC02","name":"Naの化合物","parent":"典型金属","questions":[{"q":"アルカリ金属の酸化物は[____]に分類される。","answer":"塩基性酸化物","choices":["塩基性酸化物","酸性酸化物","両性酸化物","中性酸化物"],"explain":"アルカリ金属の酸化物は[ 塩基性酸化物 ]に分類される。\n★金属の酸化物を塩基性酸化物、非金属の酸化物を酸性酸化物、金属の酸化物のうち酸とも塩基とも反応するものを両性酸化物と呼びます。*中性酸化物は選択肢用に入れた言葉です。ネットで調べると出てきますが、推奨されない用語と考えられます。"},{"q":"アルカリ金属の酸化物は水と反応して[____]となり、酸と反応して[____]となる。","answer":"水酸化物、塩","choices":["水酸化物、塩","水酸化物、オキソ酸","オキソ酸、塩","オキソ酸、水酸化物"],"explain":"アルカリ金属の酸化物は水と反応して[ 水酸化物 ]となり、酸と反応して[ 塩 ]となる。\n★アルカリ金属の酸化物は塩基性酸化物です。\n★Na₂O + H₂O → 2NaOH\n★Na₂O + 2HCl → 2NaCl + H₂O\n★塩(えん)とは酸の陰イオンと塩基の陽イオンがイオン結合した化合物のことです。"},{"q":"Na₂O + H₂O → [____]","answer":"2NaOH","choices":["2NaOH","2NaCl","2NaCl + H₂O","2NaCl + Cl₂"],"explain":"Na₂O + H₂O → 2NaOH\n★アルカリ金属の酸化物は水と反応して水酸化物となります。酸と反応すると塩となります。"},{"q":"Na₂O + 2HCl → [____]","answer":"2NaCl + H₂O","choices":["2NaCl + H₂O","2NaCl + Cl₂","2NaOH + H₂O","2NaOH + Cl₂"],"explain":"Na₂O + 2HCl → 2NaCl + H₂O\n★アルカリ金属の酸化物は水と反応して水酸化物となります。酸と反応すると塩となります。"},{"q":"アルカリ金属の水酸化物は水に[____]、[____](性)を示す。","answer":"よく溶け、強塩基性","choices":["よく溶け、強塩基性","よく溶け、強酸性","少し溶け、弱塩基性","少し溶け、弱酸性"],"explain":"アルカリ金属の水酸化物は水に[ よく溶け ]、[ 強塩基性 ]を示す。\n★記憶すべき4つの強塩基に、NaOH、KOH、Ca(OH)₂、Ba(OH)₂(ゴロ: 泣くカバ)があり、NaとKはアルカリ金属です。CaとBaはアルカリ土類金属です。このうち、Ca(OH)₂は水に溶けにくく「水に少し溶ける(わずかに溶ける)」という表現がされます。"},{"q":"[____]は、食塩水(塩化ナトリウム水溶液)の電気分解で製造されている。","answer":"水酸化ナトリウム","choices":["水酸化ナトリウム","水素","炭酸ナトリウム","塩化水素"],"explain":"[ 水酸化ナトリウム ]は、食塩水(塩化ナトリウム水溶液)の電気分解で製造されている。\n★陽極では塩素、陰極では水素が発生します。Na⁺とOH⁻がくっつきNaOHになります。"},{"q":"水酸化ナトリウムが空気中の二酸化炭素を吸収すると、[____]と[____]が生じる。","answer":"炭酸ナトリウム、水","choices":["炭酸ナトリウム、水","炭酸ナトリウム、水素","炭酸水素ナトリウム、水","炭酸水素ナトリウム、水素"],"explain":"水酸化ナトリウムが空気中の二酸化炭素を吸収すると、[ 炭酸ナトリウム ]と[ 水 ]が生じる。\n★2NaOH + CO₂ → Na₂CO₃ + H₂O\n★強塩基のNaOHが多いとき、NaHCO₃は全て中和されてNa₂CO₃のみが生じます。★同時に空気中の水分も吸収し潮解していきます。"},{"q":"2NaOH + CO₂ → [____]","answer":"Na₂CO₃ + H₂O (加熱なし)","choices":["Na₂CO₃ + H₂O (加熱なし)","Na₂CO₃ + H₂O (加熱あり)","2NaHCO₃ (加熱なし)","2NaHCO₃ (加熱あり)"],"explain":"2NaOH + CO₂ → Na₂CO₃ + H₂O\n★水酸化ナトリウムが空気中の二酸化炭素を吸収すると、炭酸ナトリウムと水が生じます。★強塩基のNaOHが多いとき、NaHCO₃は全て中和されてNa₂CO₃のみが生じます。★同時に空気中の水分も吸収し潮解します。"},{"q":"水酸化ナトリウムNaOHは[____]とも呼ばれる。","answer":"カセイ(苛性)ソーダ","choices":["カセイ(苛性)ソーダ","炭酸ソーダ","ソーダ石灰","重曹"],"explain":"水酸化ナトリウムNaOHは[ カセイ(苛性)ソーダ ]とも呼ばれる。\n★炭酸ソーダNa₂CO₃\n★ソーダ石灰NaOH + CaO\n★重曹NaHCO₃"},{"q":"水酸化ナトリウムNaOHは、別名[____]とも呼ばれる[____](体)である。","answer":"カセイ(苛性)ソーダ、白色透明の固体","choices":["カセイ(苛性)ソーダ、白色透明の固体","カセイ(苛性)ソーダ、淡赤色の固体","ソーダ石灰、白色透明の固体","ソーダ石灰、淡赤色の固体"],"explain":"水酸化ナトリウムNaOHは、別名[ カセイ(苛性)ソーダ ]とも呼ばれる[ 白色透明の固体 ]である。\n★白色透明は無色透明と表記されることもあります。★ソーダ石灰はNaOHとCaOの混合物です。"},{"q":"水酸化ナトリウムは、空気中に放置すると空気中の水分を吸収して溶ける[____](性)がある。","answer":"潮解性","choices":["潮解性","風解性","昇華性","融解性"],"explain":"水酸化ナトリウムは、空気中に放置すると空気中の水分を吸収して溶ける[ 潮解性 ]がある。\n★KOHにも同様の性質があります。どちらも水や二酸化炭素を吸収します。\n★炭酸ナトリウムの十水和物には風解性があります。"},{"q":"水酸化ナトリウムには[____](性)があり、[____](剤)に使われる。","answer":"潮解性、乾燥剤","choices":["潮解性、乾燥剤","潮解性、冷却材","風解性、乾燥剤","風解性、冷却材"],"explain":"水酸化ナトリウムには[ 潮解性 ]があり、[ 乾燥剤 ]に使われる。\n★乾燥剤のソーダ石灰はNaOHとCaOの混合物です。\n★二酸化炭素などの酸性気体とは中和反応をしてしまうため適しません。"},{"q":"水酸化ナトリウムを乾燥剤として使うとき、[____]などの[____](性)気体は中和反応をしてしまうので適さない。","answer":"二酸化炭素、酸性","choices":["二酸化炭素、酸性","二酸化炭素、塩基性","アンモニア、酸性","アンモニア、塩基性"],"explain":"水酸化ナトリウムを乾燥剤として使うとき、[ 二酸化炭素 ]などの[ 酸性 ]気体は中和反応をしてしまうので適さない。\n★乾燥剤のソーダ石灰(NaOHとCaOの混合物)も同じ扱いです。\n★NaOH + CO₂ → NaHCO₃\n★NaHCO₃ + NaOH → Na₂CO₃ + H₂O"},{"q":"炭酸ナトリウムは工業的には[____](法)で作られる。","answer":"アンモニアソーダ法","choices":["アンモニアソーダ法","ハーバー・ボッシュ法","オストワルト法","融解塩電解"],"explain":"炭酸ナトリウムは工業的には[ アンモニアソーダ法 ]で作られる。\n★ソルベー法ともいいます。1861年にベルギーの化学者エルネスト・ソルベーが発案し、1863〜1867年頃に実用化・工業化に成功しています。現在は、アンモニアソーダ法(ソルベー法)は少なく、天然資源のトロナの精製から主に作られています。"},{"q":"炭酸ナトリウムNa₂CO₃は[____]とも呼ばれる。","answer":"炭酸ソーダ","choices":["炭酸ソーダ","カセイ(苛性)ソーダ","ソーダ石灰","重曹"],"explain":"炭酸ナトリウムNa₂CO₃は[ 炭酸ソーダ ]とも呼ばれる。\n★苛性ソーダNaOH\n★ソーダ石灰NaOH + CaO\n★重曹NaHCO₃"},{"q":"炭酸ナトリウムNa₂CO₃は、別名[____]とも呼ばれる[____]である。","answer":"炭酸ソーダ、白色の固体","choices":["炭酸ソーダ、白色の固体","炭酸ソーダ、淡赤色の固体","カセイ(苛性)ソーダ、白色の固体","カセイ(苛性)ソーダ、淡赤色の固体"],"explain":"炭酸ナトリウムNa₂CO₃は、別名[ 炭酸ソーダ ]とも呼ばれる[ 白色の固体 ]である。\n★ソーダは漢字で曹達(
