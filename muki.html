<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>無機化学</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="無機化学">
<meta name="theme-color" content="#00c1cc">
<link rel="manifest" href="manifest.json">
<style>
  :root{
    --bg:#fff; --paper:#f4f4f6; --ink:#2b2b2b; --sub:#9a9a9a; --line:#eee;
    --accent:#7ce7ed; --accent2:#29f4ff; --accent-deep:#00c1cc; --accent-soft:#e0fdff; --accent-ink:#005257; --accent-glow:rgba(0,193,204,0.30);
    --peach:#fff3e6;
    --p0:#d9d9de; --p1:#3b86f0; --p2:#7cc6b0; --p3:#46c07a; --p4:#1a9d5a;
    --ok:#1a9d5a; --ok-soft:#e8f6ee; --ng:#e8483b; --ng-soft:#fdecea;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:"Hiragino Sans","Yu Gothic UI","Yu Gothic",system-ui,sans-serif;background:var(--paper);
    color:var(--ink);line-height:1.6;display:flex;justify-content:center;min-height:100dvh;}
  .app{width:100%;max-width:460px;background:var(--bg);min-height:100dvh;position:relative;overflow:hidden;}
  button{font-family:inherit;cursor:pointer;}
  .screen{display:none;flex-direction:column;min-height:100dvh;}
  .screen.show{display:flex;}
  @keyframes fade{from{opacity:.5}to{opacity:1}}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}

  /* ---------- HOME ---------- */
  .home{flex:1;display:flex;flex-direction:column;animation:fade .2s;}
  .home-head{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--accent-ink);padding:20px 18px 16px;}
  .kicker{font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.85;font-weight:700;}
  .home-head h1{margin:1px 0 0;font-size:23px;font-weight:800;}
  .sync-bar{display:flex;align-items:center;gap:8px;margin-top:9px;}
  .sync-status{font-size:12px;opacity:.92;min-height:15px;}
  .sync-btn{margin-left:auto;background:rgba(0,0,0,.07);border:none;color:var(--accent-ink);font-size:12px;
    font-weight:700;padding:6px 12px;border-radius:999px;}
  .sync-btn:active{transform:scale(.96);}
  .summary{display:flex;align-items:center;gap:14px;margin:-26px 14px 0;background:#fff;border-radius:18px;
    box-shadow:var(--shadow);padding:14px 16px;position:relative;z-index:2;}
  .summary .sm-stats{display:flex;flex:1;gap:2px;text-align:center;}
  .summary .sm{flex:1;}
  .summary .sm .n{font-size:17px;font-weight:800;line-height:1.2;}
  .summary .sm .l{font-size:10px;color:var(--sub);}
  .review-cta{margin:12px 14px 0;background:var(--accent-soft);border:1px solid #ffe2b8;border-radius:14px;
    padding:12px 15px;display:flex;align-items:center;gap:10px;}
  .review-cta:active{transform:scale(.995);}
  .review-cta .rc-t{font-weight:800;font-size:13.5px;color:var(--accent-ink);}
  .review-cta .rc-s{font-size:11.5px;color:var(--sub);}
  .review-cta .rc-go{margin-left:auto;color:var(--accent-deep);font-weight:800;font-size:18px;}
  /* おさらい確認画面 */
  .rc-hero{background:var(--accent-soft);border-radius:16px;margin:14px;padding:18px 16px;text-align:center;}
  .rc-hero-emoji{font-size:30px;}
  .rc-hero-title{font-weight:800;font-size:16px;color:var(--accent-ink);margin-top:4px;}
  .rc-hero-sub{font-size:11.5px;color:var(--sub);margin-top:10px;}
  .rc-hero-count{font-weight:900;color:var(--accent-deep);line-height:1;}
  .rc-hero-count>span:first-child{font-size:40px;}
  .rc-hero-unit{font-size:16px;margin-left:3px;}
  #rcProf{padding:6px 4px;}
  .rc-prow{display:flex;align-items:center;gap:10px;padding:7px 12px;}
  .rc-pdot{width:12px;height:12px;border-radius:50%;flex:none;}
  .rc-plabel{font-size:13px;color:var(--ink);}
  .rc-pcount{margin-left:auto;font-weight:800;font-size:13px;color:var(--sub);}
  .rc-chapters{padding:2px 14px 16px;}
  .rc-chip{display:flex;align-items:center;gap:8px;background:var(--paper);border-radius:12px;padding:11px 13px;margin-bottom:8px;}
  .rc-chip-parent{font-size:10.5px;color:var(--sub);}
  .rc-chip-name{font-weight:700;font-size:13.5px;color:var(--ink);}
  .rc-chip-n{margin-left:auto;font-weight:800;font-size:12.5px;color:var(--accent-deep);background:var(--accent-soft);border-radius:999px;padding:3px 10px;flex:none;}
  .rc-empty{text-align:center;color:var(--sub);font-size:13px;padding:24px;}
  .seg{display:flex;gap:7px;overflow-x:auto;padding:15px 14px 6px;scrollbar-width:none;}
  .seg::-webkit-scrollbar{display:none;}
  .seg button{flex:0 0 auto;border:1px solid var(--line);background:#fff;color:#666;padding:7px 15px;
    border-radius:999px;font-size:13px;font-weight:700;white-space:nowrap;}
  .seg button.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);}
  .chapters{padding:4px 14px 30px;display:flex;flex-direction:column;gap:9px;}
  .lesson{display:flex;align-items:center;gap:13px;background:#fff;border:1px solid var(--line);
    border-radius:15px;padding:12px 14px;}
  .lesson:active{transform:scale(.99);}
  .lesson-name{flex:1;font-size:15px;font-weight:700;min-width:0;}
  .lesson-q{font-size:12px;color:var(--sub);font-weight:700;background:#f4f4f6;border-radius:999px;
    padding:4px 11px;white-space:nowrap;}
  .lesson-go{color:#ccc;font-size:18px;font-weight:800;margin-left:2px;}

  /* ring */
  .ring-txt{font-weight:800;fill:var(--ink);}
  .ring-sub{fill:var(--sub);}

  /* ---------- DETAIL (full screen) ---------- */
  #detailScreen{background:#fff;}
  .detail-wrap{flex:1;display:flex;flex-direction:column;animation:slideup .25s ease;overflow:hidden;}
  .grip{width:42px;height:4px;background:#e2e2e2;border-radius:999px;margin:9px auto 2px;}
  .detail-top{display:flex;padding:2px 14px;}
  .detail-scroll{flex:1;overflow-y:auto;padding:6px 18px 16px;}
  .detail-ring{display:flex;flex-direction:column;align-items:center;margin:12px 0 4px;}
  .detail-name{font-size:17px;font-weight:800;text-align:center;margin:10px 0 2px;}
  .detail-parent{font-size:12px;color:var(--sub);text-align:center;}
  .decks{display:flex;gap:9px;overflow-x:auto;padding:16px 2px 6px;scrollbar-width:none;}
  .decks::-webkit-scrollbar{display:none;}
  .decks::after{content:"";flex:0 0 16px;display:block;}
  .deck{flex:0 0 auto;width:84px;border:1.5px solid var(--line);border-radius:14px;padding:10px 4px 9px;
    text-align:center;background:#fff;}
  .deck.on{border-color:var(--accent-deep);background:var(--accent-soft);}
  .deck.dis{opacity:.4;}
  .deck .di{font-size:17px;height:22px;line-height:22px;display:flex;align-items:center;justify-content:center;}
  .deck .dl{font-size:12.5px;font-weight:800;margin-top:1px;}
  .deck .dn{font-size:11px;color:var(--sub);}
  .deck.on .dn{color:var(--accent-ink);}
  .deck-info{background:var(--accent-soft);border-radius:13px;padding:12px 14px;margin-top:10px;position:relative;}
  .deck-info .dit{font-size:13px;font-weight:800;color:var(--accent-ink);margin-bottom:2px;}
  .deck-info .dis2{font-size:12px;color:#7a7a7a;}
  .opt-label{font-size:12px;color:#999;font-weight:800;margin:18px 2px 8px;}
  .mode-row{display:flex;gap:10px;}
  .mode-row button{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:13px;padding:11px;
    display:flex;flex-direction:column;align-items:center;gap:4px;}
  .mode-row button.on{border-color:var(--accent-deep);background:var(--accent-soft);}
  .mode-row .mi{font-size:20px;}
  .mode-row .mt{font-size:13px;font-weight:800;color:#555;}
  .mode-row button.on .mt{color:var(--accent-ink);}
  .settings-link{width:100%;display:flex;justify-content:space-between;align-items:center;background:#fff;
    border:1px solid var(--line);border-radius:13px;padding:14px 15px;font-size:14px;color:#444;font-weight:700;margin-top:16px;}
  .settings-link .sl-go{color:#bbb;font-size:18px;}
  .detail-foot{padding:12px 18px calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:#fff;}

  .icon-btn{width:30px;height:30px;border:none;background:#f2f2f4;border-radius:50%;font-size:18px;color:#666;
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .icon-btn:active{transform:scale(.92);}
  .big-btn{width:100%;background:var(--accent);color:var(--accent-ink);border:none;border-radius:14px;padding:16px;font-size:16px;
    font-weight:800;box-shadow:0 5px 16px var(--accent-glow);}
  .big-btn:active{transform:scale(.99);}
  .big-btn:disabled{background:#d3d3d6;box-shadow:none;}

  /* ---------- SETTINGS (full screen) ---------- */
  #settingsScreen{background:var(--paper);}
  .set-bar{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border-bottom:1px solid var(--line);}
  .set-bar h2{font-size:16px;font-weight:800;margin:0;}
  .set-scroll{flex:1;overflow-y:auto;padding:8px 16px 30px;}
  .ds-label{font-size:12px;color:#999;font-weight:800;margin:16px 2px 7px;}
  .ds-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:2px 15px;}
  .row{display:flex;justify-content:space-between;align-items:center;padding:13px 2px;border-bottom:1px solid #f2f2f2;font-size:14px;color:#333;gap:10px;}
  .ds-card .row:last-child{border-bottom:none;}
  .row .rsub{font-size:11px;color:var(--sub);font-weight:400;margin-top:1px;}
  .stepper{display:flex;align-items:center;gap:12px;flex:0 0 auto;}
  .stepper button{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--accent-deep);background:#fff;
    color:var(--accent-deep);font-size:17px;display:flex;align-items:center;justify-content:center;font-weight:700;}
  .stepper button:active{transform:scale(.9);}
  .st-val{min-width:52px;text-align:center;font-weight:800;font-size:14px;}
  .switch{position:relative;display:inline-block;width:46px;height:27px;flex:0 0 auto;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;inset:0;background:#d4d4d8;border-radius:999px;transition:.2s;}
  .slider::before{content:"";position:absolute;width:21px;height:21px;left:3px;top:3px;background:#fff;border-radius:50%;
    transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.25);}
  input:checked + .slider{background:var(--accent);}
  input:checked + .slider::before{transform:translateX(19px);}

  /* ---------- QUIZ ---------- */
  .top-bar{display:flex;align-items:center;gap:11px;padding:12px 14px 8px;}
  .pbar{flex:1;height:8px;background:#eee;border-radius:6px;overflow:hidden;}
  .pfill{height:100%;width:0;background:var(--accent-deep);border-radius:6px;transition:width .3s;}
  .dots{font-size:20px;color:#bbb;letter-spacing:1px;background:none;border:none;}
  .timer-bar{height:4px;background:#f0f0f0;margin:0 16px;border-radius:3px;overflow:hidden;}
  .timer-fill{height:100%;width:100%;background:var(--accent-deep);}
  .quiz-body{flex:1;display:flex;flex-direction:column;padding:8px 18px 18px;}
  .q-card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);
    padding:22px 20px;position:relative;display:flex;flex-direction:column;justify-content:center;min-height:190px;}
  .q-count{font-size:12px;color:var(--sub);text-align:center;font-weight:700;margin-bottom:12px;}
  .q-text{font-size:18px;font-weight:700;line-height:1.7;text-align:center;}
  .q-card .card-star{position:absolute;right:14px;bottom:12px;font-size:21px;background:none;border:none;color:#dcdce0;}
  .q-card .card-star.on{color:var(--accent-deep);}
  .blank{display:inline-block;min-width:62px;border-bottom:2.5px solid var(--accent-deep);margin:0 5px;color:transparent;}
  .opts{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
  .opt{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);background:#fff;border-radius:13px;
    padding:14px 14px;font-size:15px;text-align:left;color:#333;font-weight:600;position:relative;}
  .opt:active{transform:scale(.99);}
  .opt .num{width:24px;height:24px;border-radius:50%;border:1.5px solid #ddd;color:#aaa;font-size:12px;font-weight:800;
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .opt.correct{background:var(--ok-soft);border-color:var(--ok);color:var(--ok);}
  .opt.correct .num{border-color:var(--ok);color:var(--ok);}
  .opt.wrong{background:var(--ng-soft);border-color:var(--ng);color:var(--ng);}
  .opt.wrong .num{border-color:var(--ng);color:var(--ng);}
  .opt.dim{opacity:.45;}
  .opt .mk{margin-left:auto;font-weight:800;font-size:17px;}
  .opt.cover{justify-content:center;color:var(--accent-ink);background:var(--accent-soft);border:1.5px dashed var(--accent-deep);font-weight:700;}
  .explain{display:none;background:#fafafa;border:1px solid var(--line);border-radius:13px;padding:13px 14px;
    font-size:13px;color:#444;white-space:pre-wrap;margin-top:13px;}
  .explain.show{display:block;animation:fade .2s;}
  .explain .ex-h{font-weight:800;font-size:12px;margin-bottom:4px;}
  .quiz-foot{margin-top:auto;padding-top:13px;}
  .next-btn{display:none;width:100%;background:var(--accent);color:var(--accent-ink);border:none;border-radius:14px;padding:16px;
    font-size:16px;font-weight:800;box-shadow:0 5px 16px var(--accent-glow);}
  .next-btn.show{display:block;}
  .next-btn:active{transform:scale(.99);}

  /* ---------- FLASHCARD ---------- */
  .flash-body{flex:1;display:flex;flex-direction:column;padding:8px 18px 18px;}
  .fcard{flex:1;min-height:300px;border-radius:20px;border:1px solid var(--line);box-shadow:var(--shadow);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;
    margin:14px 0;background:#fff;position:relative;}
  .face-label{position:absolute;top:14px;left:16px;font-size:11px;font-weight:800;color:var(--accent-deep);letter-spacing:1px;}
  .fcard .card-star{position:absolute;right:14px;bottom:12px;font-size:21px;background:none;border:none;color:#dcdce0;}
  .fcard .card-star.on{color:var(--accent-deep);}
  .face-text{font-size:19px;font-weight:700;line-height:1.7;}
  .fans{font-size:23px;font-weight:800;color:var(--ok);margin-bottom:10px;}
  .fexp{font-size:13px;color:#555;white-space:pre-wrap;text-align:left;margin-top:4px;max-height:38vh;overflow:auto;}
  .fhint{text-align:center;color:var(--sub);font-size:12px;margin-bottom:8px;}
  .grade-row{display:flex;gap:11px;}
  .grade-row button{flex:1;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:800;}
  .g-ng{background:#eaf2fe;color:#2f6fd0;}
  .g-ok{background:var(--ok-soft);color:var(--ok);}
  .grade-row button:active{transform:scale(.98);}

  /* ---------- RESULT ---------- */
  .result{flex:1;background:var(--peach);display:flex;flex-direction:column;padding:6px 18px 24px;overflow-y:auto;animation:fade .25s;}
  .result-top{display:flex;}
  .praise{text-align:center;margin-top:6px;}
  .praise .pk{font-size:13px;color:var(--accent-ink);font-weight:800;}
  .praise .pt{font-size:30px;font-weight:900;letter-spacing:2px;}
  .praise .pm{font-size:13px;color:#666;margin-top:2px;}
  .mascot{display:block;margin:10px auto 4px;animation:pop .4s ease;}
  .stat-card{background:#fff;border-radius:18px;box-shadow:var(--shadow);padding:18px;margin:14px 0 0;text-align:center;}
  .stat-card .sc-badge{display:inline-block;background:var(--accent-soft);color:var(--accent-ink);font-size:12px;
    font-weight:800;padding:4px 14px;border-radius:999px;}
  .stat-card .sc-big{font-size:38px;font-weight:900;color:var(--accent-deep);margin:6px 0;}
  .stat-card .sc-big small{font-size:20px;color:#bbb;}
  .stat-card .sc-row{display:flex;border-top:1px solid var(--line);padding-top:12px;margin-top:6px;}
  .stat-card .sc-cell{flex:1;}
  .stat-card .sc-cell .v{font-size:17px;font-weight:800;}
  .stat-card .sc-cell .k{font-size:11px;color:var(--sub);}
  .res-btn{width:100%;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:800;margin-top:14px;}
  .res-prim{background:var(--accent);color:var(--accent-ink);box-shadow:0 5px 16px var(--accent-glow);}
  .res-btn:active{transform:scale(.99);}
  .wrong-head{display:flex;align-items:center;margin:20px 0 8px;}
  .wrong-head .wh-t{font-weight:800;font-size:14px;}
  .wrong-head .wh-b{margin-left:auto;background:#eaf2fe;color:#2f6fd0;border:none;border-radius:999px;
    padding:7px 13px;font-size:12px;font-weight:800;}
  .wrong-item{background:#fff;border-radius:12px;padding:11px 14px;margin-bottom:7px;}
  .wrong-item .wi-q{font-size:13px;color:#888;}
  .wrong-item .wi-a{font-size:15px;font-weight:800;}
  /* result 2 */
  .r2-card{background:#fff;border-radius:18px;box-shadow:var(--shadow);padding:18px;margin-top:14px;}
  .r2-head{display:flex;align-items:flex-end;justify-content:space-between;}
  .r2-ch{font-size:12px;color:var(--sub);}
  .r2-name{font-size:16px;font-weight:800;}
  .r2-pct{font-size:30px;font-weight:900;color:var(--accent-deep);}
  .r2-pct small{font-size:15px;}
  .r2-bar{height:14px;background:#eee;border-radius:999px;overflow:hidden;margin:10px 0 4px;position:relative;}
  .r2-fill{height:100%;background:var(--accent-deep);border-radius:999px;display:flex;align-items:center;justify-content:flex-start;}
  .r2-bar .r2-min{position:absolute;left:9px;top:0;line-height:14px;font-size:10px;font-weight:800;color:#fff;}
  .r2-bar .r2-max{position:absolute;right:9px;top:0;line-height:14px;font-size:10px;font-weight:800;color:#aaa;}
  .r2-goal{font-size:12px;color:#777;text-align:center;}
  .r2-levels{border-top:1px solid var(--line);margin-top:12px;padding-top:8px;}
  .r2-lv{display:flex;align-items:center;padding:7px 2px;font-size:14px;}
  .r2-lv .l{color:#555;width:92px;}
  .r2-lv .badge{min-width:26px;height:22px;padding:0 7px;border-radius:7px;color:#fff;font-size:12px;font-weight:800;
    display:inline-flex;align-items:center;justify-content:center;}
  .r2-lv .delta{margin-left:10px;font-weight:800;font-size:13px;}
  .speech{display:flex;align-items:center;gap:10px;margin-top:14px;}
  .speech .bubble{flex:1;background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px 13px;font-size:13px;
    color:#444;position:relative;}
  .speech .bubble::before{content:"";position:absolute;left:-7px;top:50%;transform:translateY(-50%);
    border:7px solid transparent;border-right-color:#fff;}
  .empty{padding:26px;text-align:center;color:var(--sub);font-size:13px;}

  /* ---------- DARK MODE ---------- */
  body.dark{--bg:#12131a;--paper:#1c1d28;--ink:#f0f0f5;--sub:#8888a8;--line:#2c2d40;--accent:#00c1cc;--accent2:#29f4ff;--accent-deep:#00c1cc;--accent-soft:#0a2a2e;--accent-ink:#7ce7ed;--accent-glow:rgba(0,193,204,.20);--peach:#1e1a14;--p0:#555;--p1:#2a5cb0;--p2:#3a8060;--p3:#2a7a3a;--p4:#107a3a;--ok:#2aad6a;--ok-soft:#0e2a1e;--ng:#c03030;--ng-soft:#2a0e0e;--shadow:0 2px 4px rgba(0,0,0,.5),0 8px 24px rgba(0,0,0,.6);}
  body.dark .app{background:var(--bg);}
  body.dark .lesson{background:var(--bg);border-color:var(--line);}
  body.dark .lesson-name{color:var(--ink);}
  body.dark .lesson-q{background:var(--paper);color:var(--sub);}
  body.dark .lesson-go{color:var(--sub);}
  body.dark .seg button{background:var(--bg);color:var(--ink);border-color:var(--line);}
  body.dark .seg button.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);}
  body.dark .deck{background:var(--bg);border-color:var(--line);}
  body.dark .deck .dl{color:var(--ink);}
  body.dark .deck .dn{color:var(--sub);}
  body.dark .deck-info .dis2{color:var(--sub);}

  {"code":"MA01","name":"周期表と元素1","parent":"非金属1","questions":[{"q":"元素を原子番号順に配列するとき、元素の物理的、化学的性質が一定の周期性で変化することを[____]という。","answer":"周期律","choices":["周期律","ボイルの法則","シャルルの法則","ヘンリーの法則"],"explain":"元素を原子番号順に配列するとき、元素の物理的、化学的性質が一定の周期性で変化することを[ 周期律 ]という。"},{"q":"周期律に沿って並べた表を[____]という。","answer":"周期表","choices":["周期表","イオン化傾向","電子配置表","蒸気圧曲線"],"explain":"周期律に沿って並べた表を[ 周期表 ]という。"},{"q":"周期表で縦に並んだ元素を[____]という。","answer":"同族元素","choices":["同族元素","同周期元素","同位体","同素体"],"explain":"周期表で縦に並んだ元素を[ 同族元素 ]という。"},{"q":"ボイルの法則、シャルルの法則、周期表の発見、アボガドロの法則、ドルトンの分圧の法則、の5つの発見(発表)を年代順に並べると、ボイルの法則、[____]である。","answer":"シャルルの法則、ドルトンの分圧の法則、アボガドロの法則、周期表の発見","choices":["シャルルの法則、ドルトンの分圧の法則、アボガドロの法則、周期表の発見","ドルトンの分圧の法則、周期表の発見、シャルルの法則、アボガドロの法則","アボガドロの法則、シャルルの法則、ドルトンの分圧の法則、周期表の発見","シャルルの法則、周期表の発見、ドルトンの分圧の法則、アボガドロの法則"],"explain":"ボイルの法則、シャルルの法則、周期表の発見、アボガドロの法則、ドルトンの分圧の法則、の5つの発見(発表)を年代順に並べると、ボイルの法則、[ シャルルの法則、ドルトンの分圧の法則、アボガドロの法則、周期表の発見 ]である。\n★解説\n・ボイルの法則(1662年、PV=k)\n・シャルルの法則(1787年、V=kT)\n・ドルトンの分圧の法則(1801年、原子説の人)\n・アボガドロの法則(1811年、分子説)\n・周期表の発見(1869年)\n★早稲田大教育2015年より"},{"q":"典型元素は周期表の[____](族)に位置する。","answer":"1族、2族、13族～18族","choices":["1族、2族、13族～18族","3～12族","1族、2族、13族～17族","13族～18族"],"explain":"典型元素は周期表の[ 1族、2族、13族～18族 ]に位置する。\n★典型元素(てんけいげんそ)と読みます。現教科書には「12族は遷移元素に含める場合と含めない場合がある」と注意書きもあります。\n*旧課程では「遷移元素は3〜11族」でした。"},{"q":"周期表において、1族、2族、13族～18族の元素を[____]と呼ぶ。","answer":"典型元素","choices":["典型元素","遷移元素","金属元素","非金属元素"],"explain":"周期表において、1族、2族、13族～18族の元素を[ 典型元素 ]と呼ぶ。現教科書には「12族は遷移元素に含める場合と含めない場合がある」と注意書きもあります。\n*旧課程では「遷移元素は3〜11族」でした。"},{"q":"遷移元素は周期表の[____](族)に位置する。","answer":"3～12族","choices":["3～12族","1族、2族、13族～18族","1族、2族、13族～17族","13族～18族"],"explain":"遷移元素は周期表の[ 3～12族 ]に位置する。\n★遷移元素(せんいげんそ)と読みます。現教科書には「12族は遷移元素に含める場合と含めない場合がある」と注意書きもあります。\n*旧課程では「遷移元素は3〜11族」でした。"},{"q":"周期表において、3～12族の元素を[____]と呼ぶ。","answer":"遷移元素","choices":["遷移元素","典型元素","アルカリ金属元素","非金属元素"],"explain":"周期表において、3～12族の元素を[ 遷移元素 ]と呼ぶ。現教科書には「12族は遷移元素に含める場合と含めない場合がある」と注意書きもあります。\n*旧課程では「遷移元素は3〜11族」でした。"},{"q":"[____](元素)は原子番号の増加とともに価電子の数が規則的に変化する。","answer":"典型元素","choices":["典型元素","遷移元素","アクチノイド","金属元素"],"explain":"[ 典型元素 ]は原子番号の増加とともに価電子の数が規則的に変化する。"},{"q":"[____](元素)は周期律をはっきり示す。","answer":"典型元素","choices":["典型元素","遷移元素","アクチノイド","金属元素"],"explain":"[ 典型元素 ]は周期律をはっきり示す。"},{"q":"[____](元素)は原子番号が増加しても価電子がほとんど変化しない。","answer":"遷移元素","choices":["遷移元素","典型元素","非金属元素","同周期元素"],"explain":"[ 遷移元素 ]は原子番号が増加しても価電子がほとんど変化しない。"},{"q":"周期表で横に並んだ元素を[____]という。","answer":"同周期元素","choices":["同周期元素","同族元素","同位体","同素体"],"explain":"周期表で横に並んだ元素を[ 同周期元素 ]という。"},{"q":"[____](元素)は同周期元素の性質が似ており、[____](元素)は同族元素の性質が似ていて、同周期元素の性質は似ていない。","answer":"遷移元素、典型元素","choices":["遷移元素、典型元素","典型元素、遷移元素","非金属元素、典型元素","遷移元素、非金属元素"],"explain":"[ 遷移元素 ]は同周期元素の性質が似ており、[ 典型元素 ]は同族元素の性質が似ていて、同周期元素の性質は似ていない。\n★遷移元素も同族元素の性質は似ています。\n★同周期元素は周期表で隣り合う元素(横方向)のことです。\n★同族元素は縦にならぶ元素です。"},{"q":"遷移元素以外の元素を[____]という。","answer":"典型元素","choices":["典型元素","遷移元素","非金属元素","金属元素"],"explain":"遷移元素以外の元素を[ 典型元素 ]という。"},{"q":"典型元素の構成元素は[____]である。","answer":"金属元素と非金属元素","choices":["金属元素と非金属元素","全て非金属元素","全て金属元素","遷移元素"],"explain":"典型元素の構成元素は[ 金属元素と非金属元素 ]である。"},{"q":"遷移元素の構成元素は[____]である。","answer":"全て金属元素","choices":["全て金属元素","金属元素と非金属元素","全て非金属元素","典型元素"],"explain":"遷移元素の構成元素は[ 全て金属元素 ]である。"},{"q":"遷移元素は一般に、典型元素より融点が[____]く、沸点は[____]","answer":"融点が高く、沸点も高い","choices":["融点が高く、沸点も高い","融点が高く、沸点は低い","融点が低く、沸点は高い","融点が低く、沸点も低い"],"explain":"遷移元素は一般に、典型元素より融点が[ 高く ]、沸点も[ 高い ]。"},{"q":"金属元素の中で最も融点が高い元素は[____]である。","answer":"タングステン(W)","choices":["タングステン(W)","ダイヤモンド(C)","チタン(Ti)","クロム(Cr)"],"explain":"金属元素の中で最も融点が高い元素は[ タングステン(W) ]である。\n★タングステン(W)はダイヤモンド(C)に次いで融点が高く(融点3410°C)、金属元素中では最も融点の高い金属です。白熱電球のフィラメントに用いられています。タングステンが含まれた炭化タングステンや高速度鋼は切削工具に用いられています。"},{"q":"タングステン(W)は[____]に用いられている。","answer":"白熱電球のフィラメント","choices":["白熱電球のフィラメント","アクセサリー類","メガネフレーム、ゴルフ用品","歯科治療素材"],"explain":"タングステン(W)は[ 白熱電球のフィラメント ]に用いられている。\n★タングステン(W)はダイヤモンド(C)に次いで融点が高く(融点3410°C)、金属元素中では最も融点の高い金属です。白熱電球のフィラメントに用いられていることは正誤問題などで頻出項目です。選択肢の補足\n★アクセサリー類は白金(Pt)\n★メガネフレーム、ゴルフ用品はチタン(Ti)\n★歯科治療素材は金(Au)\nの用途から作りました。"},{"q":"陽性元素の説明として正しいものを選べ。","answer":"電子を失って、陽イオンになりやすい","choices":["電子を失って、陽イオンになりやすい","電子を得て、陽イオンになりやすい","電子を得て、陰イオンになりやすい","電子を失って、陰イオンになりやすい"],"explain":"陽性元素は、電子を失って、陽イオンになりやすい。\n★陽子は正電荷(プラス)、電子が負電荷(マイナス)です。"},{"q":"陰性元素の説明として正しいものを選べ。","answer":"電子を得て、陰イオンになりやすい","choices":["電子を得て、陰イオンになりやすい","電子を失って、陰イオンになりやすい","電子を失って、陽イオンになりやすい","電子を得て、陽イオンになりやすい"],"explain":"陰性元素は、電子を得て、陰イオンになりやすい。\n★陽子は正電荷(プラス)、電子が負電荷(マイナス)です。"},{"q":"酸や塩基の両方とも反応する元素を[____]という。","answer":"両性金属","choices":["両性金属","陽性金属","陰性金属","非金属"],"explain":"酸や塩基の両方とも反応する元素を[ 両性金属 ]という。\n★新課程(2024年入試以降)の教科書では「両性元素」は用語として使用されていません。「両性金属、両性酸化物、両性水酸化物」となります。"},{"q":"[____]は酸や塩基の両方とも反応する元素である。","answer":"アルミニウム、亜鉛、スズ、鉛","choices":["アルミニウム、亜鉛、スズ、鉛","マグネシウム、亜鉛、スズ、鉛","アルミニウム、カルシウム、スズ、鉛","アルミニウム、亜鉛、スズ、鉄"],"explain":"[ アルミニウム、亜鉛、スズ、鉛 ]は酸や塩基の両方とも反応する元素である。\n★ゴロ: ああすんなり(Al、Zn、Sn、Pb)両性に愛される?で覚えます。"},{"q":"両性金属であるものを選べ。","answer":"アルミニウム、亜鉛、スズ、鉛","choices":["アルミニウム、亜鉛、スズ、鉛","マグネシウム、亜鉛、スズ、鉛","アルミニウム、カルシウム、スズ、鉛","アルミニウム、亜鉛、スズ、鉄"],"explain":"アルミニウム、亜鉛、スズ、鉛は、両性金属である。\n★ゴロ: ああすんなり(Al、Zn、Sn、Pb)両性に愛される?で覚えます。\n★新課程(2024年入試以降)の教科書では「両性元素」は用語として使用されていません。「両性金属、両性酸化物、両性水酸化物」となります。"},{"q":"酸とも塩基とも反応する化合物を[____]という。Al(OH)₃など","answer":"両性化合物","choices":["両性化合物","酸性化合物","塩基性化合物","複塩"],"explain":"酸とも塩基とも反応する化合物を[ 両性化合物 ]という。Al(OH)₃など"},{"q":"両性化合物を作る元素は、周期表の[____]に位置する。","answer":"金属元素と非金属元素の境界付近","choices":["金属元素と非金属元素の境界付近","金属元素の中央付近","非金属元素の中央付近","金属元素と非金属元素のそれぞれの中央付近"],"explain":"両性化合物を作る元素は、周期表の[ 金属元素と非金属元素の境界付近 ]に位置する。"},{"q":"貴ガスを除く第5周期までの典型元素のうち、単体が常温常圧で気体である元素を全てあげると[____]である。","answer":"H、N、O、F、Cl","choices":["H、N、O、F、Cl","H、N、O、F、Cl、Br","H、He、N、O、I","H、He、N、O、Cl"],"explain":"貴ガスを除く第5周期までの典型元素のうち、単体が常温常圧で気体である元素を全てあげると[ H、N、O、F、Cl ]である。\n★原子番号順です。Brは液体、Iは固体、Heは貴ガスです。\n★東北大 2018年"}]},
  {"code":"MA02","name":"周期表と元素2","parent":"非金属1","questions":[{"q":"18族の元素を特に[____]と呼ぶ。","answer":"貴ガス(希ガス)","choices":["貴ガス(希ガス)","ハロゲン","アルカリ金属","アルカリ土類金属"],"explain":"18族の元素を特に[ 貴ガス(希ガス) ]と呼ぶ。\n★英語にもrare gas(希ガス)とnoble gas(貴ガス)の呼び方があります。*令和3年頃には多くの教科書で「貴ガス」が優勢になり、注釈で「希ガスと呼ぶこともある」と記されるようになりました。"},{"q":"同周期元素について、原子番号が増加すると[____]の[____]が増える。","answer":"原子核、正電荷(陽子)","choices":["原子核、正電荷(陽子)","原子核、負電荷(電子)","中性子、正電荷(陽子)","中性子、負電荷(電子)"],"explain":"同周期元素について、原子番号が増加すると[ 原子核 ]の[ 正電荷(陽子) ]が増える。"},{"q":"原子核の[____]の数が増えると電子を引きつける力が強くなる。","answer":"正電荷(陽子)","choices":["正電荷(陽子)","負電荷(電子)","中性子","最外殻電子"],"explain":"原子核の[ 正電荷(陽子) ]の数が増えると電子を引きつける力が強くなる。"},{"q":"貴ガスを除いた同周期元素について、原子核の正電荷が多い元素は[____](性)が強くなる。","answer":"陰性","choices":["陰性","陽性","金属性","吸湿性"],"explain":"貴ガスを除いた同周期元素について、原子核の正電荷が多い元素は[ 陰性 ]が強くなる。\n★同周期元素で原子核の正電荷が多い元素は周期表のより右側へ並びます。\n★最外殻へ負電荷(電子)をより多く配置できるため、陰イオンになりやすい性質(陰性)が強くなります。"},{"q":"同族元素では、原子番号が増加すると周期表の[____](側)に配置され、同周期元素では、周期表の[____](側)に配置される。","answer":"下側、右側","choices":["下側、右側","下側、左側","右側、下側","左側、下側"],"explain":"同族元素について、原子番号が増加すると周期表の[ 下側 ]に配置され、同周期元素では周期表の[ 右側 ]に配置される。"},{"q":"同族元素では、原子番号が増加すると原子半径は[____](く)なり、同周期元素では原子半径は[____](く)なる。","answer":"大きく、小さく","choices":["大きく、小さく","大きく、大きく","小さく、小さく","小さく、大きく"],"explain":"同族元素について、原子番号が増加すると原子半径は[ 大きく ]なり、同周期元素では原子半径は[ 小さく ]なる。★同族元素では最外殻電子がより外側の殻へ入り半径が大きくなり、同周期元素では最外殻が同じなので原子核の正電荷(陽子)がより強く電子を引きつけ、半径が小さくなります。"},{"q":"同族元素では、原子番号が増加すると[____](性)が強くなり、同周期元素では[____](性)が強くなる。","answer":"陽性、陰性","choices":["陽性、陰性","陽性、陽性","陰性、陰性","陰性、陽性"],"explain":"同族元素について、原子番号が増加すると[ 陽性 ]が強くなり、同周期元素では[ 陰性 ]が強くなる。★同族元素についてはハロゲンなどと関連させて覚えてください。同周期元素では最外殻電子(負電荷)の数が増えて陰性が強くなると考えます。"},{"q":"典型元素について、陽性が強い元素は周期表の[____]に位置する。*貴ガスを除く。","answer":"左下","choices":["左下","右上","左上","右下"],"explain":"典型元素について、陽性が強い元素は周期表の[ 左下 ]に位置する。*貴ガスを除く。\n★陽性は金属性ともいえます。"},{"q":"典型元素について、陰性が強い元素は周期表の[____]に位置する。*貴ガスを除く。","answer":"右上","choices":["右上","左下","左上","右下"],"explain":"典型元素について、陰性が強い元素は周期表の[ 右上 ]に位置する。*貴ガスを除く。\n★陰性は非金属性ともいえます。"},{"q":"単体が金属の性質を示す元素を[____]、単体が金属の性質を示さない元素を[____]という。","answer":"金属元素、非金属元素","choices":["金属元素、非金属元素","金属元素、典型元素","金属元素、遷移元素","典型元素、非金属元素"],"explain":"単体が金属の性質を示す元素を[ 金属元素 ]、単体が金属の性質を示さない元素を[ 非金属元素 ]という。\n★典型元素は金属元素と非金属元素を含み、割合も同じくらいです。遷移元素は全て金属元素です。"},{"q":"金属元素は周期表の[____]に位置し、非金属元素は[____]に位置する。","answer":"左下～中央、右上","choices":["左下～中央、右上","左下～中央、左上","右上、左下～中央","左上、右下～中央"],"explain":"金属元素は周期表の[ 左下～中央 ]に位置し、非金属元素は[ 右上 ]に位置する。"},{"q":"ケイ素やゲルマニウムは金属元素の性質を[____]、非金属元素の性質を[____]。","answer":"示し、示す","choices":["示し、示す","示し、示さない","示さない、示す","示さず、示さない"],"explain":"ケイ素やゲルマニウムは金属元素の性質を[ 示し ]、非金属元素の性質を[ 示す ]。両方の性質を示す半導体です。半導体とは、金属などの電気伝導性の良い導体(良導体)と電気抵抗率の大きい絶縁体との中間的な抵抗率をもつ物質です。"},{"q":"[____](元素)では、金属元素と非金属元素の数は大体同じ数である。","answer":"典型元素","choices":["典型元素","遷移元素","半導体元素","両性元素"],"explain":"[ 典型元素 ]では、金属元素と非金属元素の数は大体同じ数である。"},{"q":"[____](元素)は全て金属元素である。","answer":"遷移元素","choices":["遷移元素","典型元素","半導体","ハロゲン"],"explain":"[ 遷移元素 ]は全て金属元素である。"},{"q":"金属元素の単体は[____](結合)による[____](結晶)である。","answer":"金属結合、金属結晶","choices":["金属結合、金属結晶","イオン結合、金属結晶","共有結合、共有結晶","イオン結合、イオン結晶"],"explain":"金属元素の単体は[ 金属結合 ]による[ 金属結晶 ]である。"},{"q":"金属の単体のうち、常温常圧で液体であるものを選べ。","answer":"水銀Hg","choices":["水銀Hg","ヨウ素I₂","臭素Br₂","ケイ素Si"],"explain":"金属の単体のうち、常温常圧で液体であるものは水銀Hgである。臭素Br₂は常温常圧で液体ですが非金属です。"},{"q":"多くの非金属元素の単体は[____](分子)や[____](結晶)である。","answer":"共有結合分子、共有結合結晶","choices":["共有結合分子、共有結合結晶","単原子分子、イオン結晶","共有結合分子、金属結晶","共有結合分子、イオン結晶"],"explain":"多くの非金属元素の単体は[ 共有結合分子 ]や[ 共有結合結晶 ]である。"},{"q":"一般に、二原子分子であるものを選べ。","answer":"水素、窒素、酸素、塩素","choices":["水素、窒素、酸素、塩素","硫黄、リン","ヘリウム、ネオン、アルゴン","ナトリウム、カルシウム"],"explain":"水素、窒素、酸素、塩素は、通常、二原子分子で多く存在しています。\n★順に、H₂、N₂、O₂、Cl₂"},{"q":"一般に、多原子分子であるものを選べ。","answer":"硫黄、リン","choices":["硫黄、リン","ナトリウム、カルシウム","ヘリウム、ネオン、アルゴン","水素、窒素、酸素、塩素"],"explain":"一般に、多原子分子であるものは硫黄、リンです。硫黄S₈、リンはP₄、もしくはそれぞれ高分子となり多原子分子として存在します。"},{"q":"一般に、単原子分子であるものを選べ。","answer":"ヘリウム、ネオン、アルゴン","choices":["ヘリウム、ネオン、アルゴン","硫黄、リン","ナトリウム、カルシウム","水素、窒素、酸素、塩素"],"explain":"一般に、単原子分子であるものは、ヘリウムHe、ネオンNe、アルゴンArです。貴ガスの単原子分子です。"},{"q":"一般に、金属結晶であるものを選べ。","answer":"ナトリウム、カルシウム","choices":["ナトリウム、カルシウム","水素、窒素、酸素、塩素","硫黄、リン","ヘリウム、ネオン、アルゴン"],"explain":"一般に、金属結晶であるものはナトリウムNa、カルシウムCaです。金属元素なので金属結晶で存在します。"},{"q":"二原子分子のうち、常温常圧で液体であるものを選べ。","answer":"臭素Br₂","choices":["臭素Br₂","ヨウ素I₂","水銀Hg","ケイ素Si"],"explain":"二原子分子のうち、常温常圧で液体であるものは臭素Br₂です。水銀は液体ですが金属のため二原子分子ではありません。"},{"q":"二原子分子のうち、常温常圧で固体であるものを選べ。","answer":"ヨウ素I₂","choices":["ヨウ素I₂","臭素Br₂","水銀Hg","ケイ素Si"],"explain":"二原子分子のうち、常温常圧で固体であるものはヨウ素I₂です。昇華性があり、少し温めると気体になります。"},{"q":"一般的に、二原子分子は[____]の状態で存在する。","answer":"ほとんどが気体","choices":["ほとんどが気体","ほとんどが固体","ほとんどが液体","全て気体"],"explain":"一般的に、二原子分子はほとんどが気体の状態で存在します。\n★気体でない例に、液体の臭素Br₂、固体のヨウ素I₂があります。"},{"q":"炭素やケイ素の単体は[____](結晶)であり、融点が[____]。","answer":"共有結合結晶、極めて高い","choices":["共有結合結晶、極めて高い","分子結晶、低い","共有結合結晶、低い","分子結晶、極めて高い"],"explain":"炭素やケイ素の単体は[ 共有結合結晶 ]であり、融点が[ 極めて高い ]。融点は炭素のダイヤモンドが最高(約3500°C)です。\n★共有結合結晶は「共有結合の結晶」とも書かれます。"}]},
  {"code":"MB01","name":"水素と貴ガス","parent":"非金属1","questions":[{"q":"全ての物質の中で密度が最も小さい(最も軽い)物質は[____]である。","answer":"水素H₂","choices":["水素H₂","ヘリウムHe","アルゴンAr","キセノンXe"],"explain":"全ての物質の中で密度が最も小さい(最も軽い)物質は[ 水素H₂ ]である。★1molあたりの気体の体積は22.4Lで共通なので、モル質量(1molあたりの質量)に相当する原子量(分子量)が小さいほど密度が小さくなります。H₂は分子量2、Heは原子量4です。"},{"q":"水素は[____](色)、[____](臭)である。","answer":"無色、無臭","choices":["無色、無臭","無色、刺激臭","青色、無臭","青色、刺激臭"],"explain":"水素は[ 無色 ]、[ 無臭 ]である。"},{"q":"[____]は水の電気分解や、亜鉛や鉄などの金属に薄い酸(希塩酸や希硫酸)を加えると得られる。","answer":"水素H₂","choices":["水素H₂","塩化水素HCl","酸素O₂","二酸化炭素CO₂"],"explain":"[ 水素H₂ ]は水の電気分解や、亜鉛や鉄などの金属に薄い酸(希塩酸や希硫酸)を加えると得られる。"},{"q":"純度の高い水素H₂は[____](置換)で捕集する。","answer":"水上置換","choices":["水上置換","下方置換","上方置換","下方置換または水上置換"],"explain":"純度の高い水素H₂は[ 水上置換 ]で捕集する。\n★水素H₂は水に溶けにくく、空気より軽いので、水上置換で捕集します。★上方置換では無色無臭の水素が試験管の外へ多く漏れても気づきにくく危険です。ただし、金属の小片を水に入れる実験などで水素の発生を確認する目的では器具も少なくて済む上方置換が効率的です。"},{"q":"[____]は、高温になると酸化物から酸素を奪う性質から還元剤として利用される。","answer":"水素H₂","choices":["水素H₂","酸化銅(II)CuO","過マンガン酸カリウムKMnO₄","ヘリウムHe"],"explain":"[ 水素H₂ ]は、高温になると酸化物から酸素を奪う性質から還元剤として利用される。"},{"q":"水素H₂は[____]との混合気体に[____]すると、爆発的に反応して水を生じる。","answer":"酸素O₂、点火","choices":["酸素O₂、点火","塩素Cl₂、点火","酸素O₂、加熱","塩素Cl₂、加熱"],"explain":"水素H₂は[ 酸素O₂ ]との混合気体に[ 点火 ]すると、爆発的に反応して水を生じる。\n★ポンッという音を爆鳴音(ばくめいおん)といいます。★体積比で水素:酸素=2:1の混合気体を特に爆鳴気(ばくめいき)と呼びます。"},{"q":"NH₃、H₂O、HFのような化合物を[____]という。","answer":"水素化合物","choices":["水素化合物","酸性酸化物","塩基性酸化物","ハロゲン化物"],"explain":"NH₃、H₂O、HFのような化合物を[ 水素化合物 ]という。"},{"q":"リンの水素化合物を[____]といい、化学式は[____]である。","answer":"ホスフィン、PH₃","choices":["ホスフィン、PH₃","リン酸、H₃PO₄","ホスフィン、H₃PO₄","リン酸、PH₃"],"explain":"リンの水素化合物を[ ホスフィン ]といい、化学式は[ PH₃ ]である。★リンは英語でphosphorus。リン酸はH₃PO₄です。\n★化学式PH₃を書かせる思考問題が東京大学で出題されています(2006年前期)。PH₃の形(三角錐形)とBF₃の形(正三角形)を電子配置から考える問題が東大2001年後期。"},{"q":"水素化合物を構成する水素と結合する元素が、周期表で[____]へ行くほど酸性が強くなり、[____]へ行くほど塩基性が強くなる。","answer":"右、左","choices":["右、左","左、右","上、下","下、上"],"explain":"水素化合物を構成する水素と結合する元素が、周期表で[ 右 ]へ行くほど酸性が強くなり、[ 左 ]へ行くほど塩基性が強くなる。★強酸である塩酸HClから連想すると都合がよいです。"},{"q":"水素化合物のうち、アンモニアNH₃は[____](性)、フッ化水素HFは[____](性)である。","answer":"弱塩基性、弱酸性","choices":["弱塩基性、弱酸性","弱酸性、弱酸性","弱塩基性、弱塩基性","弱酸性、弱塩基性"],"explain":"水素化合物のうち、アンモニアNH₃は[ 弱塩基性 ]、フッ化水素HFは[ 弱酸性 ]である。"},{"q":"水素化合物のうち、硫化水素H₂Sは[____](性)、塩化水素HClは[____](性)である。","answer":"弱酸性、強酸性","choices":["弱酸性、強酸性","弱塩基性、弱酸性","強酸性、弱酸性","弱塩基性、強酸性"],"explain":"水素化合物のうち、硫化水素H₂Sは[ 弱酸性 ]、塩化水素HClは[ 強酸性 ]である。"},{"q":"アンモニアNH₃やホスフィンPH₃の分子の形は[____]である。","answer":"三角錐","choices":["三角錐","折れ線","正四面体","直線"],"explain":"アンモニアNH₃やホスフィンPH₃の分子の形は[ 三角錐 ]である。\n★ホスフィンはアンモニアとの比較で出題されます。"},{"q":"水H₂Oや硫化水素H₂Sの分子の形は[____]である。","answer":"折れ線","choices":["折れ線","正四面体","三角錐","直線"],"explain":"水H₂Oや硫化水素H₂Sの分子の形は[ 折れ線 ]である。"},{"q":"フッ化水素HFや塩化水素HClの分子の形は[____]である。","answer":"直線","choices":["直線","折れ線","三角錐","正四面体"],"explain":"フッ化水素HFや塩化水素HClの分子の形は[ 直線 ]である。"},{"q":"水素は、陽性の強い金属(NaやCa)からは電子を受け取り[____]となって、水素化ナトリウム[____]や水素化カルシウム[____]などの水素化物を作る。","answer":"水素化物イオンH⁻、NaH、CaH₂","choices":["水素化物イオンH⁻、NaH、CaH₂","水素化物イオンH⁻、NaH₂、CaH","水酸化物イオンH⁺、NaH、CaH₂","水酸化物イオンH⁺、NaH₂、CaH₂"],"explain":"水素は、陽性の強い金属(NaやCa)からは電子を受け取り[ 水素化物イオンH⁻ ]となって、水素化ナトリウム[ NaH ]や水素化カルシウム[ CaH₂ ]などの水素化物を作る。\n★水素イオンH⁺と水素化物イオンH⁻があります。★水酸化物イオンはOH⁻です。\n★単原子の陽イオンは元素名にそのままイオンを付けて表します。水素なら水素イオンと呼びます。\n★単原子の陰イオンは元素名の語尾を〜化物イオンと変えて表し、塩素なら塩化物イオンとなります。水素は例外で、水素化物イオンと呼びます。"},{"q":"Zn + H₂SO₄ → [____]","answer":"ZnSO₄ + H₂(加熱なし)","choices":["ZnSO₄ + H₂(加熱なし)","ZnSO₃ + H₂O(加熱なし)","ZnSO₄ + H₂O(加熱必要)","ZnSO₃ + H₂(加熱必要)"],"explain":"Zn + H₂SO₄ → ZnSO₄ + H₂\n★亜鉛や鉄などの金属に薄い酸(希塩酸や希硫酸)を加える水素の製法です。酸化還元反応です。\n★希塩酸や希硫酸などの希酸は反応性が高いため基本的に加熱は必要ありません。"},{"q":"[____] → ZnSO₄ + H₂","answer":"Zn + H₂SO₄","choices":["Zn + H₂SO₄","ZnO + H₂SO₄","Zn + H₂SO₃","ZnO + H₂SO₃"],"explain":"Zn + H₂SO₄ → ZnSO₄ + H₂\n★亜鉛や鉄などの金属に薄い酸(希塩酸や希硫酸)を加える水素の製法です。酸化還元反応です。\n★希塩酸や希硫酸などの希酸は反応性が高いため基本的に加熱は必要ありません。"},{"q":"ニッケル触媒を使って、天然ガス(主にメタンCH₄)と水を650〜800°Cで反応させると[____]が生じる。","answer":"一酸化炭素と水素","choices":["一酸化炭素と水素","二酸化炭素と水素","一酸化炭素と水","二酸化炭素と水"],"explain":"ニッケル触媒を使って、天然ガス(主にメタンCH₄)と水を650〜800°Cで反応させると[ 一酸化炭素と水素 ]が生じる。\n★CH₄ + H₂O → CO + 3H₂\n★水素の工業的製法の1つです。"},{"q":"CH₄ + H₂O → [____]","answer":"CO + 3H₂","choices":["CO + 3H₂","CO₂ + 2H₂","CH₃OH","CH₃OH + H₂"],"explain":"CH₄ + H₂O → [ CO + 3H₂ ]\n★一酸化炭素COと水素H₂が発生します。\n★水素の工業的製法の1つです。ニッケル触媒を使って、天然ガス(主にメタンCH₄)と水を650〜800°Cで反応させる方法があります。"},{"q":"He、Ne、Ar、Krなどの18族の元素を[____]と呼ぶ。","answer":"貴ガス(希ガス)","choices":["貴ガス(希ガス)","ハロゲン","アルカリ土類金属","アルカリ金属"],"explain":"He、Ne、Ar、Krなどの18族の元素を[ 貴ガス(希ガス) ]と呼ぶ。\n★英語にもrare gas(希ガス)とnoble gas(貴ガス)の呼び方があります。*令和3年頃には多くの教科書で「貴ガス」が優勢になり、注釈で「希ガスと呼ぶこともある」と記されるようになりました。"},{"q":"貴ガスは[____]の分留によって得ることができる。","answer":"液体空気","choices":["液体空気","液体窒素","ナフサ","アルコール"],"explain":"貴ガスは[ 液体空気 ]の分留によって得ることができる。\n★液体空気の分留では酸素、窒素が主に得られます。特別な分留で貴ガスが得られます。"},{"q":"貴ガスの色は[____]、臭いは[____]である。","answer":"無色、無臭","choices":["無色、無臭","淡黄色、無臭","無色、刺激臭","淡黄色、刺激臭"],"explain":"貴ガスの色は[ 無色 ]、臭いは[ 無臭 ]である。"},{"q":"貴ガスはきわめて安定な電子配置であり、他の原子とほとんど化合物をつくらず、[____]として存在している。","answer":"単原子分子","choices":["単原子分子","二原子分子","金属結晶","イオン結晶"],"explain":"貴ガスはきわめて安定な電子配置であり、他の原子とほとんど化合物をつくらず、[ 単原子分子 ]として存在している。★最外殻電子がいっぱいで価電子がゼロです。"},{"q":"[____]は、水素の次に軽い気体であり、不燃性であるため気球や飛行船などの浮揚ガスに用いられる。","answer":"ヘリウムHe","choices":["ヘリウムHe","酸素O₂","アルゴンAr","ネオンNe"],"explain":"[ ヘリウムHe ]は、水素の次に軽い気体であり、不燃性であるため気球や飛行船などの浮揚ガスに用いられる。"},{"q":"[____]は、放電により橙赤色を示し、ネオンサインなどに用いられる。","answer":"ネオンNe","choices":["ネオンNe","アルゴンAr","ヘリウムHe","酸素O₂"],"explain":"[ ネオンNe ]は、放電により橙赤色を示し、ネオンサインなどに用いられる。橙赤色は「赤色の発光」「赤色光」の表現もあり、「さまざまな色」としている教科書もあります。2025年調べ。"},{"q":"[____]は、空気中に酸素の次に多く含まれ(3番目に多く)、放電管や電球などに用いられる。","answer":"アルゴンAr","choices":["アルゴンAr","ネオンNe","ヘリウムHe","酸素O₂"],"explain":"[ アルゴンAr ]は、空気中に酸素の次に多く含まれ(3番目に多く)、放電管や電球などに用いられる。\n★空気中の質量比でアルゴンArは3番目に多く含まれます。窒素78％、酸素21％、アルゴン0.9％、二酸化炭素0.04％、の順です。"},{"q":"貴ガスの最外殻電子数について、Heは[____]、その他の原子は[____]である。","answer":"Heは2、その他の原子は8","choices":["Heは2、その他の原子は8","Heは0、その他の原子は0","Heは8、その他の原子は8","Heは0、その他の原子は8"],"explain":"貴ガスの最外殻電子数について、Heは[ 2 ]、その他の原子は[ 8 ]である。\n★価電子数はどちらも0になります。混同注意です。価電子は原子間の結合に関わる最外殻電子を指します。貴ガスの最外殻電子は化学的に安定なため価電子とは呼ばないことになっています。"},{"q":"貴ガスの価電子数について、Heは[____]、その他の原子は[____]である。","answer":"Heは0、その他の原子は0","choices":["Heは0、その他の原子は0","Heは2、その他の原子は8","Heは8、その他の原子は8","Heは0、その他の原子は8"],"explain":"貴ガスの価電子数について、Heは[ 0 ]、その他の原子は[ 0 ]である。\n★価電子数はどちらも0になります。(記述問題用「貴ガスの最外殻電子は化学的に安定なためor原子間の結合に関わらないため」)\n★最外殻電子数はHeは2、その他の原子は8になります。混同注意です。価電子は原子間の結合に関わる最外殻電子を指します。貴ガスの最外殻電子は化学的に安定なため価電子とは呼ばないことになっています。"}]},
  {"code":"MB02","name":"ハロゲンの性質1","parent":"非金属1","questions":[{"q":"ハロゲンは周期表の[____](族)に属するF、Cl、Br、I、Atの5種類の元素である。","answer":"17族","choices":["17族","18族","16族","15族"],"explain":"ハロゲンは周期表の[ 17族 ]に属するF、Cl、Br、I、Atの5種類の元素である。★周期表の左から17番目、右から2番目です。"},{"q":"ハロゲンは同一周期上の元素で[____](番目)に陰性が強い。","answer":"1番目","choices":["1番目","2番目","17番目","18番目"],"explain":"ハロゲンは同一周期上の元素で[ 1 ]番目に陰性が強い。★「最も陰性が強い」の日本語で出題されます。"},{"q":"ハロゲンの最外殻電子数は、[____]である。","answer":"7","choices":["7","2","0","8"],"explain":"ハロゲンの最外殻電子数は、[ 7 ]である。"},{"q":"ハロゲンの価電子数は、[____]である。","answer":"7","choices":["7","2","0","8"],"explain":"ハロゲンの価電子数は、[ 7 ]である。★典型元素において、貴ガス以外は最外殻電子と価電子は等しくなります。"},{"q":"ハロゲンの価電子数は7個あるため電子を[____]得て、[____]になりやすい。","answer":"1個、1価の陰イオン","choices":["1個、1価の陰イオン","2個、2価の陰イオン","2個、2価の陽イオン","1個、1価の陽イオン"],"explain":"ハロゲンの価電子数は7個あるため電子を[ 1個得て ]、[ 1価の陰イオン ]になりやすい。"},{"q":"フッ素F₂、塩素Cl₂、臭素Br₂、ヨウ素I₂の常温(標準状態)での状態を順に答えよ。","answer":"F₂気体、Cl₂気体、Br₂液体、I₂固体","choices":["F₂気体、Cl₂気体、Br₂液体、I₂固体","F₂気体、Cl₂液体、Br₂液体、I₂固体","F₂気体、Cl₂気体、Br₂気体、I₂液体","F₂固体、Cl₂液体、Br₂気体、I₂気体"],"explain":"常温(標準状態)で、F₂気体、Cl₂気体、Br₂液体、I₂固体、です。"},{"q":"フッ素F₂の色は[____]である。","answer":"淡黄色","choices":["淡黄色","黒紫色","黄緑色","赤褐色"],"explain":"フッ素F₂の色は[ 淡黄色 ]である。"},{"q":"塩素Cl₂の色は[____]である。","answer":"黄緑色","choices":["黄緑色","淡黄色","黒紫色","赤褐色"],"explain":"塩素Cl₂の色は[ 黄緑色 ]である。"},{"q":"臭素Br₂の色は[____]である。","answer":"赤褐色","choices":["赤褐色","淡黄色","黄緑色","黒紫色"],"explain":"臭素Br₂の色は[ 赤褐色 ]である。"},{"q":"ヨウ素I₂の色は[____]である。","answer":"黒紫色","choices":["黒紫色","淡黄色","黄緑色","赤褐色"],"explain":"ヨウ素I₂の色は[ 黒紫色 ]である。"},{"q":"ハロゲン(フッ素F₂、塩素Cl₂、臭素Br₂、ヨウ素I₂)の臭いは[____]である。","answer":"刺激臭","choices":["刺激臭","無臭","特異臭","芳香臭"],"explain":"ハロゲン(フッ素F₂、塩素Cl₂、臭素Br₂、ヨウ素I₂)のにおいは[ 刺激臭 ]である。\n★実教出版の教科書にフッ素は特異臭と書かれているなど例外的な表記がたまにあります。"},{"q":"フッ素F₂、塩素Cl₂、臭素Br₂、ヨウ素I₂を融点の高い順に並べよ。(高い＞低い)","answer":"I₂＞Br₂＞Cl₂＞F₂","choices":["I₂＞Br₂＞Cl₂＞F₂","F₂＞I₂＞Br₂＞Cl₂","Cl₂＞Br₂＞I₂＞F₂","F₂＞Cl₂＞Br₂＞I₂"],"explain":"I₂＞Br₂＞Cl₂＞F₂\nの順に融点が高く、沸点も同じ順番です。★周期表の下からの順です。常温での状態(気体、液体、固体)からも連想できます。"},{"q":"フッ素F₂、塩素Cl₂、臭素Br₂、ヨウ素I₂を沸点の高い順に並べよ。(高い＞低い)","answer":"I₂＞Br₂＞Cl₂＞F₂","choices":["I₂＞Br₂＞Cl₂＞F₂","F₂＞I₂＞Br₂＞Cl₂","Cl₂＞Br₂＞I₂＞F₂","F₂＞Cl₂＞Br₂＞I₂"],"explain":"I₂＞Br₂＞Cl₂＞F₂\nの順に沸点が高く、融点も同じ順番です。★周期表の下からの順です。常温での状態(気体、液体、固体)からも連想できます。\n★ハロゲン単体とハロゲン化水素では沸点の順番が異なります。(HF＞HI＞HBr＞HCl)"},{"q":"フッ素F₂、塩素Cl₂、臭素Br₂、ヨウ素I₂を酸化力の大きい順に並べよ。(大きい＞小さい)","answer":"F₂＞Cl₂＞Br₂＞I₂","choices":["F₂＞Cl₂＞Br₂＞I₂","I₂＞Br₂＞Cl₂＞F₂","F₂＞I₂＞Br₂＞Cl₂","Cl₂＞Br₂＞I₂＞F₂"],"explain":"F₂＞Cl₂＞Br₂＞I₂\n★酸化力は「電子e⁻を引きつける力」ともいえます。周期表で同族元素の上にある方が酸化力が強く、F⁻のような陰イオンになりやすい順です。還元力と逆になります。"},{"q":"オゾンO₃、フッ素F₂、塩素Cl₂、臭素Br₂、ヨウ素I₂を酸化力の大きい順に並べよ。(大きい＞小さい)","answer":"F₂＞O₃＞Cl₂＞Br₂＞I₂","choices":["F₂＞O₃＞Cl₂＞Br₂＞I₂","I₂＞Br₂＞O₃＞Cl₂＞F₂","O₃＞F₂＞I₂＞Br₂＞Cl₂","O₃＞Cl₂＞Br₂＞I₂＞F₂"],"explain":"F₂＞O₃＞Cl₂＞Br₂＞I₂\n★酸化力は「電子e⁻を引きつける力」ともいえます。オゾンはフッ素に次ぐ強力な酸化力を持ち、脱臭・殺菌等に効力を発生します。オゾンの強い酸化力で臭素Br₂やヨウ素I₂を遊離します。ヨウ化カリウムデンプン紙に関する出題が頻出です。臭素Br₂の遊離も正誤で問われました。東工大2014年(*リクエストを受けて作成しました)"},{"q":"フッ化物イオンF⁻、塩化物イオンCl⁻、臭化物イオンBr⁻、ヨウ化物イオンI⁻を還元力の大きい順に並べよ。(大きい＞小さい)","answer":"I⁻＞Br⁻＞Cl⁻＞F⁻","choices":["I⁻＞Br⁻＞Cl⁻＞F⁻","F⁻＞Cl⁻＞Br⁻＞I⁻","F⁻＞I⁻＞Br⁻＞Cl⁻","Cl⁻＞Br⁻＞I⁻＞F⁻"],"explain":"I⁻＞Br⁻＞Cl⁻＞F⁻\n★還元力は「電子e⁻を与える力」ともいえます。周期表で同族元素の下にある方が還元力が強く、陰イオンになりにくい順、単体の分子になりやすい順です。酸化力と逆になります。"},{"q":"ハロゲン原子は、その半径が[____]ほど電子を引きつけやすく、[____]が強くなる。","answer":"小さい、酸化力","choices":["小さい、酸化力","小さい、還元力","大きい、酸化力","大きい、還元力"],"explain":"ハロゲン原子は、その半径が[ 小さい ]ほど電子を引きつけやすく、[ 酸化力 ]が強くなる。\n★電子を引きつけて陰イオンになりやすいので、酸化力が強いといえます。"},{"q":"フッ素F₂は水素H₂と反応するとき、[____]する。","answer":"冷暗所でも爆発的に反応","choices":["冷暗所でも爆発的に反応","激しく反応して酸素を発生","常温で光により爆発的に反応","加熱(高温)と触媒により反応"],"explain":"フッ素F₂は水素H₂と反応するとき、[ 冷暗所でも爆発的に反応 ]する。\n★ハロゲンと水素の反応についてこの日本語を覚えます。陰イオンになりやすい順に反応しやすくなります。F⁻＞Cl⁻＞Br⁻＞I⁻"},{"q":"塩素Cl₂は水素H₂と反応するとき、[____]する。","answer":"常温で光により爆発的に反応","choices":["常温で光により爆発的に反応","冷暗所でも爆発的に反応","激しく反応して酸素を発生","加熱(高温)と触媒により反応"],"explain":"塩素Cl₂は水素H₂と反応するとき、[ 常温で光により爆発的に反応 ]する。\n★ハロゲンと水素の反応についてこの日本語を覚えます。陰イオンになりやすい順に反応しやすくなります。F⁻＞Cl⁻＞Br⁻＞I⁻"},{"q":"臭素Br₂は水素H₂と反応するとき、[____]する。","answer":"加熱(高温)と触媒により反応","choices":["加熱(高温)と触媒により反応","冷暗所でも爆発的に反応","常温で光により爆発的に反応","激しく反応して酸素を発生"],"explain":"臭素Br₂は水素H₂と反応するとき、[ 加熱(高温)と触媒により反応 ]する。\n★ハロゲンと水素の反応についてこの日本語を覚えます。陰イオンになりやすい順に反応しやすくなります。F⁻＞Cl⁻＞Br⁻＞I⁻"},{"q":"ヨウ素I₂は水素H₂と反応するとき、[____]する。","answer":"加熱(高温)と触媒によりわずかに反応","choices":["加熱(高温)と触媒によりわずかに反応","冷暗所でも爆発的に反応","常温で光により爆発的に反応","激しく反応して酸素を発生"],"explain":"ヨウ素I₂は水素H₂と反応するとき、[ 加熱(高温)と触媒によりわずかに反応 ]する。\n★ハロゲンと水素の反応についてこの日本語を覚えます。陰イオンになりやすい順に反応しやすくなります。F⁻＞Cl⁻＞Br⁻＞I⁻"},{"q":"フッ素F₂は水H₂Oと反応するとき、[____]する。","answer":"激しく反応して酸素を発生","choices":["激しく反応して酸素を発生","ほとんど水に溶けない","一部が反応してHCl、HClOを生成","一部が反応してHBr、HBrOを生成"],"explain":"フッ素F₂は水H₂Oと反応するとき、[ 激しく反応して酸素を発生 ]する。\n★2F₂ + 2H₂O → 4HF + O₂"},{"q":"塩素Cl₂は水H₂Oと反応するとき、[____]する。","answer":"一部が反応してHCl、HClOを生成","choices":["一部が反応してHCl、HClOを生成","激しく反応して酸素を発生","ほとんど水に溶けない","一部が反応してHBr、HBrOを生成"],"explain":"塩素Cl₂は水H₂Oと反応するとき、[ 一部が反応してHCl、HClOを生成 ]する。\n★Cl₂ + H₂O ⇄ HCl + HClO "},{"q":"臭素Br₂は水H₂Oと反応するとき、[____]する。","answer":"一部が反応してHBr、HBrOを生成","choices":["一部が反応してHBr、HBrOを生成","激しく反応して酸素を発生","一部が反応してHCl、HClOを生成","ほとんど水に溶けない"],"explain":"臭素Br₂は水H₂Oと反応するとき、[ 一部が反応してHBr、HBrOを生成 ]する。\n★Br₂ + H₂O ⇄ HBr + HBrO"},{"q":"ヨウ素I₂は水H₂Oと反応するとき、[____]する。","answer":"ほとんど水に溶けない","choices":["ほとんど水に溶けない","激しく反応して酸素を発生","一部が反応してHCl、HClOを生成","一部が反応してHBr、HBrOを生成"],"explain":"ヨウ素I₂は水H₂Oと反応するとき、[ ほとんど水に溶けない ]。\n★「ヨウ素は水に溶けず、有機溶媒によく溶ける」と覚えます。"},{"q":"Cl₂ + 2F⁻ → [____]","answer":"反応しない","choices":["反応しない","2Cl⁻ + F₂","FCl + F⁻","Cl₂ + F₂"],"explain":"Cl₂ + 2F⁻ → 反応しない\n★電子を引きつける力(酸化力)の強さ、陰イオンになりやすさはF＞Clです。"},{"q":"Cl₂ + 2Br⁻ → [____]","answer":"2Cl⁻ + Br₂","choices":["2Cl⁻ + Br₂","反応しない","ClBr + F⁻","Cl₂ + Br₂"],"explain":"Cl₂ + 2Br⁻ → 2Cl⁻ + Br₂\n★電子を引きつける力(酸化力)の強さ、陰イオンになりやすさはCl＞Brです。"},{"q":"Cl₂ + 2KF → [____]","answer":"反応しない","choices":["反応しない","2KCl + F₂","KCl + KF + FCl","2KFCl"],"explain":"Cl₂ + 2KF → 反応しない\n★電子を引きつける力(酸化力)の強さ、陰イオンになりやすさはF＞Clです。逆に二原子分子になりやすいのはCl＞Fといえます。"},{"q":"Cl₂ + 2KBr → [____]","answer":"2KCl + Br₂","choices":["2KCl + Br₂","反応しない","KCl + KBr + ClBr","2KClBr"],"explain":"Cl₂ + 2KBr → 2KCl + Br₂\n★電子を引きつける力(酸化力)の強さ、陰イオンになりやすさはCl＞Brです。逆に二原子分子になりやすいのはBr＞Clといえます。"},{"q":"Br₂ + 2KCl → [____]","answer":"反応しない","choices":["反応しない","2KBr + Cl₂","KCl + KBr + ClBr","2KClBr"],"explain":"Br₂ + 2KCl → 反応しない\n★電子を引きつける力(酸化力)の強さ、陰イオンになりやすさはCl＞Brです。逆に二原子分子になりやすいのはBr＞Clといえます。"},{"q":"Br₂ + 2KI → [____]","answer":"2KBr + I₂","choices":["2KBr + I₂","反応しない","KBr + KI + BrI","2KBrI"],"explain":"Br₂ + 2KI → 2KBr + I₂\n★電子を引きつける力(酸化力)の強さ、陰イオンになりやすさはBr＞Iです。逆に二原子分子になりやすいのはI＞Brといえます。"},{"q":"原子の最外電子殻から電子を1個取り去り、1価の陽イオンにするために必要なエネルギーを[____]という。","answer":"イオン化エネルギー","choices":["イオン化エネルギー","電子親和力","活性化エネルギー","分子間力"],"explain":"原子の最外電子殻から電子を1個取り去り、1価の陽イオンにするために必要なエネルギーを[ イオン化エネルギー ]という。\n★厳密にはこの説明は第一イオン化エネルギーを指し、「原子の最外電子殻から電子を1個取り去り1価の陽イオンにするための必要最小のエネルギー」のことです。\n★比較：電子親和力：「原子が最外電子殻に電子を1個受け取り、1価の陰イオンになるときに放出されるエネルギー」"},{"q":"原子が最外電子殻に電子を1個受け取り、1価の陰イオンになるときに放出されるエネルギーを[____]という。","answer":"電子親和力","choices":["電子親和力","イオン化エネルギー","活性化エネルギー","分子間力"],"explain":"原子が最外電子殻に電子を1個受け取り、1価の陰イオンになるときに放出されるエネルギーを[ 電子親和力 ]という。\n★比較：イオン化エネルギー「原子が最外電子殻に電子を1個取り去り、1価の陽イオンにするために必要なエネルギー」"},{"q":"一般に、イオン化エネルギーが小さい原子ほど[____]になりやすく、電子親和力の大きい原子ほど[____]になりやすい。","answer":"陽イオン、陰イオン","choices":["陽イオン、陰イオン","陽イオン、陽イオン","陰イオン、陽イオン","陰イオン、陰イオン"],"explain":"一般に、イオン化エネルギーが小さい原子ほど[ 陽イオン ]になりやすく、電子親和力の大きい原子ほど[ 陰イオン ]になりやすい。\n★電子親和力：「原子が最外電子殻に電子を1個受け取り、1価の陰イオンになるときに放出されるエネルギー」\n★イオン化エネルギー「原子の最外電子殻から電子を1個取り去り、1価の陽イオンにするために必要なエネルギー」"},{"q":"一般に、イオン化エネルギーが[____]原子ほど陽イオンになりやすく、電子親和力の[____]原子ほど陰イオンになりやすい。","answer":"小さい、大きい","choices":["小さい、大きい","小さい、小さい","大きい、大きい","大きい、小さい"],"explain":"一般に、イオン化エネルギーが[ 小さい ]原子ほど陽イオンになりやすく、電子親和力の[ 大きい ]原子ほど陰イオンになりやすい。\n★電子親和力：「原子が最外電子殻に電子を1個受け取り、1価の陰イオンになるときに放出されるエネルギー」\n★イオン化エネルギー「原子の最外電子殻から電子を1個取り去り、1価の陽イオンにするために必要なエネルギー」"},{"q":"フッ素原子Fと塩素原子Clでは、電子親和力が大きく、陰イオンになりやすいのは[____]である。","answer":"塩素原子Cl","choices":["塩素原子Cl","フッ素原子F","フッ素分子F₂","塩素分子Cl₂"],"explain":"フッ素原子Fと塩素原子Clでは、電子親和力が大きく、陰イオンになりやすいのは[ 塩素原子Cl ]である。\n★これは酸化力を比較するときの「陰イオンになりやすい」とは比較条件が違うので注意が必要です。電子親和力は原子と電子のセットに着目しています。酸化力は酸化したい相手との比較です。"},{"q":"フッ素分子F₂と塩素分子Cl₂では、酸化力が強く、陰イオンになりやすいのは[____]である。","answer":"フッ素分子F₂","choices":["フッ素分子F₂","塩素分子Cl₂","塩素原子Cl","フッ素原子F"],"explain":"フッ素分子F₂と塩素分子Cl₂では、酸化力が強く、陰イオンになりやすいのは[ フッ素分子F₂ ]である。\n★これは電子親和力を比較するときの「陰イオンになりやすい」とは比較条件が違うので注意が必要です。電子親和力は原子と電子のセットに着目しています。酸化力は酸化したい相手との比較です。"}]},
  {"code":"MB03","name":"ハロゲンの性質2","parent":"非金属1","questions":[{"q":"ハロゲンの単体のうち、水と激しく反応して酸素を発生するものは[____]である。","answer":"フッ素F₂","choices":["フッ素F₂","塩素Cl₂","臭素Br₂","ヨウ素I₂"],"explain":"ハロゲンの単体のうち、水と激しく反応して酸素を発生するものは[ フッ素F₂ ]である。\n★2F₂ + 2H₂O → 4HF + O₂"},{"q":"2F₂ + 2H₂O → [____]","answer":"4HF + O₂","choices":["4HF + O₂","反応しない","2FOH + H₂","HF + HFO + H₂O"],"explain":"2F₂ + 2H₂O → 4HF + O₂\n★フッ素は水と激しく反応して酸素を発生します。"},{"q":"酸化マンガン(IV)に濃塩酸を加えて加熱すると[____](気体)が得られる。","answer":"塩素Cl₂","choices":["塩素Cl₂","フッ素F₂","臭素Br₂","酸素O₂"],"explain":"酸化マンガン(IV)に濃塩酸を加えて加熱すると[ 塩素Cl₂ ](気体)が得られる。\n★MnO₂ + 4HCl → MnCl₂ + 2H₂O + Cl₂ (加熱必要)\n★濃塩酸や濃硫酸との反応は基本的に加熱が必要と覚えます。"},{"q":"高度さらし粉に希塩酸を加えると[____](気体)が得られる。","answer":"塩素Cl₂","choices":["塩素Cl₂","フッ素F₂","臭素Br₂","酸素O₂"],"explain":"高度さらし粉に希塩酸を加えると[ 塩素Cl₂ ](気体)が得られる。\n★Ca(ClO)₂･2H₂O + 4HCl → CaCl₂ + 4H₂O + 2Cl₂"},{"q":"さらし粉に希塩酸を加えると[____](気体)が得られる。","answer":"塩素Cl₂","choices":["塩素Cl₂","フッ素F₂","臭素Br₂","酸素O₂"],"explain":"さらし粉に希塩酸を加えると[ 塩素Cl₂ ](気体)が得られる。\n★CaCl(ClO)･H₂O + 2HCl → CaCl₂ + 2H₂O + Cl₂"},{"q":"MnO₂ + 4HCl → [____]","answer":"MnCl₂ + 2H₂O + Cl₂ (加熱必要)","choices":["MnCl₂ + 2H₂O + Cl₂ (加熱必要)","MnCl₂ + 2H₂O + Cl₂ (加熱なし)","MnCl₄ + 2H₂ + O₂ (加熱必要)","MnCl₄ + 2H₂ + O₂ (加熱なし)"],"explain":"MnO₂ + 4HCl → MnCl₂ + 2H₂O + Cl₂ (加熱必要)\n酸化マンガン(IV)に濃塩酸を加えて加熱すると塩素が発生します。\n★濃塩酸や濃硫酸との反応は基本的に加熱が必要と覚えます。"},{"q":"[____] → MnCl₂ + 2H₂O + Cl₂","answer":"MnO₂ + 4HCl (加熱必要)","choices":["MnO₂ + 4HCl (加熱必要)","MnO₂ + 4HCl (加熱なし)","Ca(ClO)₂･2H₂O + 4HCl (加熱必要)","Ca(ClO)₂･2H₂O + 4HCl (加熱なし)"],"explain":"MnO₂ + 4HCl → MnCl₂ + 2H₂O + Cl₂ (加熱必要)\n★酸化マンガン(IV)に濃塩酸を加えて加熱すると塩素が発生します。\n★濃塩酸や濃硫酸との反応は基本的に加熱が必要と覚えます。"},{"q":"Ca(ClO)₂･2H₂O + 4HCl → [____]","answer":"CaCl₂ + 4H₂O + 2Cl₂ (加熱なし)","choices":["CaCl₂ + 4H₂O + 2Cl₂ (加熱なし)","CaCl₂ + 4H₂O + 2Cl₂ (加熱必要)","CaCl₂ + 2H₂O + Cl₂ (加熱必要)","CaCl₂ + 2H₂O + Cl₂ (加熱なし)"],"explain":" Ca(ClO)₂･2H₂O + 4HCl → CaCl₂ + 4H₂O + 2Cl₂ (加熱なし)\n★高度さらし粉に塩酸を加えると塩素が発生します。すぐに反応するため二又試験管(ふたまた、二股)を使います。"},{"q":"[____] → CaCl₂ + 4H₂O + 2Cl₂","answer":"Ca(ClO)₂･2H₂O + 4HCl (加熱なし)","choices":["Ca(ClO)₂･2H₂O + 4HCl (加熱なし)","Ca(ClO)₂･2H₂O + 4HCl (加熱必要)","CaCl(ClO)･H₂O + 2HCl (加熱なし)","CaCl(ClO)･H₂O + 2HCl (加熱必要)"],"explain":"Ca(ClO)₂･2H₂O + 4HCl → CaCl₂ + 4H₂O + 2Cl₂ (加熱なし)\n★高度さらし粉に塩酸を加えると塩素が発生します。すぐに反応するため二又試験管(ふたまた、二股)を使います。"},{"q":"CaCl(ClO)･H₂O + 2HCl → [____]","answer":"CaCl₂ + 2H₂O + Cl₂ (加熱なし)","choices":["CaCl₂ + 2H₂O + Cl₂ (加熱なし)","CaCl₂ + 2H₂O + Cl₂ (加熱必要)","CaCl₂ + 4H₂O + 2Cl₂ (加熱なし)","CaCl₂ + 4H₂O + 2Cl₂ (加熱必要)"],"explain":"CaCl(ClO)･H₂O + 2HCl → CaCl₂ + 2H₂O + Cl₂ (加熱なし)\n★さらし粉に塩酸を加えると塩素が発生します。すぐに反応するため二又試験管(ふたまた、二股)を使います。"},{"q":"[____] → CaCl₂ + 2H₂O + Cl₂","answer":"CaCl(ClO)･H₂O + 2HCl (加熱なし)","choices":["CaCl(ClO)･H₂O + 2HCl (加熱なし)","CaCl(ClO)･H₂O + 2HCl (加熱必要)","Ca(ClO)₂･2H₂O + 4HCl (加熱なし)","Ca(ClO)₂･2H₂O + 4HCl (加熱必要)"],"explain":"CaCl(ClO)･H₂O + 2HCl → CaCl₂ + 2H₂O + Cl₂ (加熱なし)\n★さらし粉に塩酸を加えると塩素が発生します。すぐに反応するため二又試験管(ふたまた、二股)を使います。"},{"q":"酸化マンガン(IV)に濃塩酸を加えて加熱して塩素を得るとき、酸化マンガン(IV)は[____]としてはたらく。","answer":"酸化剤","choices":["酸化剤","還元剤","冷却剤","触媒"],"explain":"酸化マンガン(IV)に濃塩酸を加えて加熱して塩素を得るとき、酸化マンガン(IV)は[ 酸化剤 ]としてはたらく。\n★MnO₂ + 4HCl → MnCl₂ + 2H₂O + Cl₂ (加熱必要)\n★Mnの酸化数+4→+2と還元されています。単体へ変化した塩素の酸化数-1→0をみるとHClを酸化しています。\n★塩素酸カリウムKClO₃と酸化マンガン(IV)MnO₂で酸素O₂を発生させるときは触媒として働きます。"},{"q":"塩素は[____]で捕集する。","answer":"下方置換","choices":["下方置換","上方置換","水上置換","水上置換または下方置換"],"explain":"塩素は[ 下方置換 ]で捕集する。\n★水に溶けやすく、空気より重いので下方置換です。塩素の分子量70.9(原子量35.45より)と空気の平均分子量28.8(ゴロ: 空気はつややか)と比較します。"},{"q":"塩素は[____](毒)の気体で空気より[____]。","answer":"有毒、重い","choices":["有毒、重い","有毒、軽い","無毒、重い","無毒、軽い"],"explain":"塩素は[ 有毒 ]の気体で空気より[ 重い ]。\n★塩素の分子量70.9(原子量35.45より)と空気の平均分子量28.8(ゴロ: 空気はつややか)と比較します。"},{"q":"塩素Cl₂が水に溶けるとき、一部が反応して[____]と[____]を生じる。","answer":"塩化水素HCl、次亜塩素酸HClO","choices":["塩化水素HCl、次亜塩素酸HClO","塩化水素HCl、酸素O₂","塩化水素HCl、水素H₂","亜塩素酸HClO₂と水素H₂"],"explain":"塩素Cl₂が水に溶けるとき、一部が反応して[ 塩化水素HCl ]と[ 次亜塩素酸HClO ]を生じる。\n★Cl₂ + H₂O ⇄ HCl + HClO "},{"q":"Cl₂ + H₂O ⇄ [____]","answer":"HCl + HClO","choices":["HCl + HClO","HCl + O₂","HCl + H₂","HCl + HClO₂ "],"explain":"Cl₂ + H₂O ⇄ HCl + HClO \n★塩素が水に溶けるとき一部がこのように反応します。"},{"q":"[____] ⇄ HCl + HClO","answer":"Cl₂ + H₂O","choices":["Cl₂ + H₂O","HCl + O₂","HCl + H₂","HCl + HClO₂ "],"explain":"Cl₂ + H₂O ⇄ HCl + HClO \n★塩素が水に溶けるとき一部がこのように反応します。"},{"q":"次亜塩素酸は[____]であるが、次亜塩素酸イオンClO⁻が強い[____](作用)を持つので、塩素水は漂白剤や消毒剤に用いられる。","answer":"弱酸、酸化作用","choices":["弱酸、酸化作用","強酸、酸化作用","弱酸、還元作用","強酸、還元作用"],"explain":"次亜塩素酸は[ 弱酸 ]であるが、次亜塩素酸イオンClO⁻が強い[ 酸化作用 ]を持つので、塩素水は漂白剤や消毒剤に用いられる。\n★ClO⁻ + 2H⁺ + 2e⁻ → Cl⁻ + H₂O"},{"q":"次亜塩素酸の化学式は[____]と書くことも多いが、構造式へ合わせると[____]と書ける。*両方とも高校教科書にあり。","answer":"HClO、HOCl","choices":["HClO、HOCl","HClO₂、HOClO","HClO₂、HO₂Cl","HClO、OHCl"],"explain":"次亜塩素酸の化学式は[ HClO ]と書くことも多いが、構造式へ合わせると[ HOCl ]と書ける。\n★両方とも高校教科書にあり。"},{"q":"ClO⁻ + 2H⁺ + 2e⁻ → [____]","answer":"Cl⁻ + H₂O","choices":["Cl⁻ + H₂O","Cl⁺ + OH⁺","Cl⁻ + OH⁺","Cl⁺ + H₂O"],"explain":"ClO⁻ + 2H⁺ + 2e⁻ → Cl⁻ + H₂O\n★次亜塩素酸イオンの半反応式です。相手を酸化します。Clの酸化数は+1→-1と還元されます。"},{"q":"[____] → Cl⁻ + H₂O ","answer":"ClO⁻ + 2H⁺ + 2e⁻","choices":["ClO⁻ + 2H⁺ + 2e⁻","ClO⁺ + 2H⁺ + 2e⁻","ClO⁻ + OH⁻ + e⁻","ClO⁺ + OH⁻ + e⁻"],"explain":"ClO⁻ + 2H⁺ + 2e⁻ → Cl⁻ + H₂O\n★次亜塩素酸イオンの半反応式です。相手を酸化します。Clの酸化数は+1→-1と還元されます。"},{"q":"塩素は常温で[____](体)である。また、水で湿らせた青色リトマス紙を[____]する。","answer":"気体、漂白する","choices":["気体、漂白する","気体、変化させない","液体、漂白する","液体、変化させない"],"explain":"塩素は常温で[ 気体 ]である。また、水で湿らせた青色リトマス紙を[ 漂白 ]する。\n★いったん赤くなり、白くなります。"},{"q":"臭素は常温で[____](色)の液体で、[____](毒)な蒸気を発生する。","answer":"赤褐色、有毒","choices":["赤褐色、有毒","黄褐色、有毒","黄褐色、無毒","赤褐色、無毒"],"explain":"臭素は常温で[ 赤褐色 ]の液体で、[ 有毒 ]な蒸気を発生する。"},{"q":"臭素は水に[____](溶け)、[____](色)の臭素水になる。","answer":"少し溶け、赤褐色","choices":["少し溶け、赤褐色","よく溶け、赤褐色","少し溶け、黄褐色","よく溶け、黄褐色"],"explain":"臭素は水に[ 少し溶け ]、[ 赤褐色 ]の臭素水になる。\n★Br₂ + H₂O ⇄ HBr + HBrO\n反応性は弱いですが、塩素と同様の反応をします。"},{"q":"臭素は[____](溶媒)(ヘキサンなど)に[____](溶ける/溶けない)。","answer":"有機溶媒、よく溶ける","choices":["有機溶媒、よく溶ける","有機溶媒、ほとんど溶けない","無機溶媒、よく溶ける","無機溶媒、ほとんど溶けない"],"explain":"臭素は[ 有機溶媒 ](ヘキサンなど)に[ よく溶ける ]。\n★ヘキサンなので有機溶媒を選びます。水には少しだけ溶けます。"},{"q":"ヨウ素は常温で[____](性)を持つ[____](色)の固体である。","answer":"昇華性、黒紫色","choices":["昇華性、黒紫色","昇華性、黄褐色","吸湿性、黒紫色","吸湿性、黄褐色"],"explain":"ヨウ素は常温で[ 昇華性 ]を持つ[ 黒紫色 ]の固体である。"},{"q":"ヨウ素は水に[____]、有機溶媒(ヘキサン)などに[____]。","answer":"(水)ほとんど溶けず、(有機溶媒)よく溶ける","choices":["(水)ほとんど溶けず、(有機溶媒)よく溶ける","(水)ほとんど溶けず、(有機溶媒)少し溶ける","(水)よく溶け、(有機溶媒)よく溶ける","(水)よく溶け、(有機溶媒)少し溶ける"],"explain":"ヨウ素は水に[ ほとんど溶けず ]、有機溶媒(ヘキサン)などに[ よく溶ける ]。\n★ハロゲン単体の分子は全て無極性分子(基本は水に溶けにくい性質)ですが、「水に溶けない」と記述されるものはヨウ素のみ。「水にわずかに溶ける、少し溶ける」が塩素と臭素(自己酸化還元反応グループ)。「水を酸化して酸素を発生させる(激しい反応)」のはフッ素です。"},{"q":"ヨウ素は[____]に溶けて褐色の[____]水溶液となる。","answer":"ヨウ化カリウム水溶液、ヨウ素ヨウ化カリウム","choices":["ヨウ化カリウム水溶液、ヨウ素ヨウ化カリウム","ヨウ化カリウム水溶液、ヨウ化カリウム","水、ヨウ素ヨウ化カリウム","水、ヨウ素"],"explain":"ヨウ素は[ ヨウ化カリウム水溶液 ]に溶けて褐色の[ ヨウ素ヨウ化カリウム ]水溶液となる。\n★ヨウ素ヨウ化カリウム水溶液はヨウ素溶液ともいいます。\n★ヨウ素は黒紫色の固体です。"},{"q":"ヨウ素I₂は、ヨウ化カリウム水溶液には[____]を生じて溶け[____](色)のヨウ素ヨウ化カリウム水溶液となる。","answer":"三ヨウ化物イオンI₃⁻、褐色","choices":["三ヨウ化物イオンI₃⁻、褐色","三ヨウ化物イオンI₃⁻、黒紫色","ヨウ化物イオンI⁻、褐色","ヨウ化物イオンI⁻、黒紫色"],"explain":"ヨウ素I₂は、ヨウ化カリウム水溶液には[ 三ヨウ化物イオンI₃⁻ ]を生じて溶け[ 褐色 ]のヨウ素ヨウ化カリウム水溶液となる。\n★ヨウ素は黒紫色の固体です。"},{"q":"ヨウ素ヨウ化カリウム水溶液は[____]溶液と反応して青紫色を示す。この反応を[____]という。","answer":"デンプン、ヨウ素デンプン反応","choices":["デンプン、ヨウ素デンプン反応","デンプン、中和反応","ヨウ素、ヨウ素デンプン反応","ヨウ素、中和反応"],"explain":"ヨウ素ヨウ化カリウム水溶液は[ デンプン ]溶液と反応して青紫色を示す。この反応を[ ヨウ素デンプン反応 ]という。(デンプンの検出)"},{"q":"I₂ + I⁻ → [____]","answer":"I₃⁻","choices":["I₃⁻","3I⁻","I₃⁺","変化なし"],"explain":"I₂ + I⁻ → I₃⁻\n★ヨウ素がヨウ化カリウム水溶液に溶ける反応です。"},{"q":"ヨウ化カリウムデンプン紙にはヨウ化カリウムとデンプンが染み込んでおり、オゾンや塩素などの酸化剤により[____]が遊離することで、[____]が生じる。これがデンプンと反応して青紫色になる。","answer":"ヨウ素I₂、ヨウ素ヨウ化カリウム水溶液","choices":["ヨウ素I₂、ヨウ素ヨウ化カリウム水溶液","ヨウ素ヨウ化カリウム水溶液、ヨウ素I₂","ヨウ素ヨウ化カリウム水溶液、ヨウ化カリウムKI","ヨウ化カリウムKI、ヨウ素ヨウ化カリウム水溶液"],"explain":"ヨウ化カリウムデンプン紙にはヨウ化カリウムとデンプンが染み込んでおり、オゾンや塩素などの酸化剤により[ ヨウ素I₂ ]が遊離することで、[ ヨウ素ヨウ化カリウム水溶液 ]が生じる。これがデンプンと反応して青紫色になる。"},{"q":"[____] → I₃⁻\nヨウ素がヨウ化カリウム水溶液に溶ける反応。","answer":"I₂ + I⁻","choices":["I₂ + I⁻","I₂ + I⁺","2I⁺ + I⁻","I⁺ + 2I⁻"],"explain":"I₂ + I⁻ → I₃⁻\n★ヨウ素がヨウ化カリウム水溶液に溶ける反応です。"},{"q":"ヨウ素は塩素より[____](い)[____](作用)があり、殺菌・消毒液(うがい薬)などに使われる。","answer":"弱い、酸化作用","choices":["弱い、酸化作用","弱い、還元作用","強い、酸化作用","強い、還元作用"],"explain":"ヨウ素は塩素より[ 弱い ][ 酸化作用 ]があり、殺菌・消毒液(うがい薬)などに使われる。\n★うがい薬はヨウ素の穏やかな酸化作用による殺菌・消毒の効果があります。\n★「弱い酸化作用」は「穏やかな酸化作用」と表現されることがよくあります。"}]},
  {"code":"MB04","name":"ハロゲンの化合物","parent":"非金属1","questions":[{"q":"フッ化水素酸HF、塩酸HCl、臭化水素酸HBr、ヨウ化水素酸HIを酸の強い順に並べよ。","answer":"HI＞HBr＞HCl＞HF","choices":["HI＞HBr＞HCl＞HF","HI＞HCl＞HBr＞HF","HF＞HCl＞HBr＞HI","HF＞HI＞HBr＞HCl"],"explain":"フッ化水素酸HF、塩酸HCl、臭化水素酸HBr、ヨウ化水素酸HIを酸の強い順に並べると、\nHI＞HBr＞HCl＞HF です。\n★フッ化水素酸HFのみ弱酸です。HFは水素結合が強いため電離しにくい。残りは強酸。塩酸HClより臭化水素酸HBr、ヨウ化水素酸HIが強いことで質問の多い問題です。アプリの質問のページにリンクされているblogから「フッ化水素酸」「HF」などでブログ内検索して頂くと教科書の引用を確認できます。"},{"q":"フッ化水素酸HF、塩酸HCl、臭化水素酸HBr、ヨウ化水素酸HIのうち[____]は弱酸であり、これ以外は強酸である。","answer":"フッ化水素酸HF","choices":["フッ化水素酸HF","塩酸HCl","臭化水素酸HBr","ヨウ化水素酸HI"],"explain":"フッ化水素酸HF、塩酸HCl、臭化水素酸HBr、ヨウ化水素酸HIのうち[ フッ化水素酸HF ]は弱酸であり、これ以外は強酸である。★フッ酸ともよびます。"},{"q":"フッ化水素HF、塩化水素HCl、臭化水素HBr、ヨウ化水素HIのうち、[____]は沸点が20°Cであるが、これ以外の沸点は0°C未満である。","answer":"フッ化水素HF","choices":["フッ化水素HF","塩化水素HCl","臭化水素HBr","ヨウ化水素HI"],"explain":"フッ化水素HF、塩化水素HCl、臭化水素HBr、ヨウ化水素HIのうち、[ フッ化水素HF ]は沸点が20°Cであるが、これ以外の沸点は0°C未満である。★水素結合をもつHFは高くなります。\n★水、アンモニア、フッ化水素は水素結合により沸点の高くなる代表例3つです。"},{"q":"フッ化水素HF、塩化水素HCl、臭化水素HBr、ヨウ化水素HIを沸点の高い順に並べよ。","answer":"HF＞HI＞HBr＞HCl","choices":["HF＞HI＞HBr＞HCl","HF＞HCl＞HBr＞HI","HCl＞HBr＞HI＞HF","HI＞HBr＞HCl＞HF"],"explain":"フッ化水素HF、塩化水素HCl、臭化水素HBr、ヨウ化水素HIを沸点の高い順に並べると、\nHF＞HI＞HBr＞HCl です。★水素結合をもつHFに注意します。\n★水、アンモニア、フッ化水素は水素結合により沸点の高くなる代表例3つです。\n★ハロゲン単体とハロゲン化水素では沸点の順番が異なります\nI₂＞Br₂＞Cl₂＞F₂"},{"q":"フッ化水素HFは分子間に[____]を持つため、例外的に他のハロゲン化水素より沸点が高い。","answer":"水素結合","choices":["水素結合","配位結合","金属結合","イオン結合"],"explain":"フッ化水素HFは分子間に[ 水素結合 ]を持つため、例外的に他のハロゲン化水素より沸点が高い。"},{"q":"塩化ナトリウムに濃硫酸を加えて加熱すると[____](気体)が得られる。","answer":"塩化水素HCl","choices":["塩化水素HCl","塩素Cl₂","二酸化硫黄SO₂","水素H₂"],"explain":"塩化ナトリウムに濃硫酸を加えて加熱すると[ 塩化水素HCl ](気体)が得られる。\n★NaCl + H₂SO₄ → NaHSO₄ + HCl(揮発性酸追い出し)(加熱必要)\n★濃硫酸が絡む反応では基本的に加熱が必要です。"},{"q":"塩化水素HClは水に[____]、空気より[____]。","answer":"(水に)溶けやすく、(空気より)重い","choices":["(水に)溶けやすく、(空気より)重い","(水に)溶けやすく、(空気より)軽い","(水に)溶けにくく、(空気より)重い","(水に)溶けにくく、(空気より)軽い"],"explain":"塩化水素HClは水に[ 溶けやすく ]、空気より[ 重い ]。\n★空気の平均分子量28.8(ゴロ: 空気はつややか)や塩素の原子量35.45を覚えておくと有利です。★塩素の発生実験において、「気体から塩化水素を取り除くために水に通す」ことも関連づけてください。"},{"q":"塩化水素HClは[____]で捕集する。","answer":"下方置換","choices":["下方置換","上方置換","水上置換","下方置換または水上置換"],"explain":"塩化水素HClは[ 下方置換 ]で捕集する。\n★塩化水素は水に溶けやすく、空気より重いので下方置換が適切です。★「気体から塩化水素を取り除くために水に通す」くらいですので水上置換では捕集できないといえます。"},{"q":"NaCl + H₂SO₄ → [____] ","answer":"NaHSO₄ + HCl(加熱必要)","choices":["NaHSO₄ + HCl(加熱必要)","NaHSO₄ + HCl(加熱なし)","Na₂SO₄ + 2HCl(加熱必要)","Na₂SO₄ + 2HCl(加熱なし)"],"explain":"NaCl + H₂SO₄ → NaHSO₄ + HCl\n★濃硫酸は不揮発性の酸として働きます。HClは揮発性の酸として追い出されます。\n★濃硫酸が絡む反応では基本的に加熱が必要です。"},{"q":"[____] → NaHSO₄ + HCl","answer":"NaCl + H₂SO₄ (加熱必要)","choices":["NaCl + H₂SO₄ (加熱必要)","NaCl + H₂SO₄ (加熱なし)","NaOH + H₂SO₄ (加熱必要)","NaOH + H₂SO₄ (加熱なし)"],"explain":"NaCl + H₂SO₄ → NaHSO₄ + HCl (加熱必要)\n★濃硫酸は不揮発性の酸として働きます。HClは揮発性の酸として追い出されます。\n★濃硫酸が絡む反応では基本的に加熱が必要です。"},{"q":"塩化ナトリウムに濃硫酸を加えて加熱し塩化水素を得る反応は[____]反応である。","answer":"揮発性酸追い出し反応","choices":["揮発性酸追い出し反応","弱酸追い出し反応","弱塩基追い出し反応","酸化還元反応"],"explain":"塩化ナトリウムに濃硫酸を加えて加熱し塩化水素を得る反応は[ 揮発性酸追い出し反応 ]である。"},{"q":"塩化ナトリウムに濃硫酸を加えて加熱し塩化水素を得る反応において、濃硫酸は[____]としてはたらく。","answer":"不揮発性酸","choices":["不揮発性酸","揮発性酸","強酸","酸化剤"],"explain":"塩化ナトリウムに濃硫酸を加えて加熱し塩化水素を得る反応において、濃硫酸は[ 不揮発性酸 ]としてはたらく。"},{"q":"塩化水素の水溶液(塩酸)は[____](性)と[____](性)があり、試薬瓶の栓を開けると白煙を生じる。","answer":"揮発性、発煙性","choices":["揮発性、発煙性","揮発性、昇華性","不揮発性、発煙性","不揮発性、昇華性"],"explain":"塩化水素の水溶液(塩酸)は[ 揮発性 ]と[ 発煙性 ]があり、試薬瓶の栓を開けると白煙を生じる。"},{"q":"塩化水素とアンモニアが反応すると[____]の白煙(微結晶)が生じる。これは塩化水素とアンモニアの相互の検出反応として利用される。","answer":"塩化アンモニウム","choices":["塩化アンモニウム","塩素と水素","塩素","アンモニアと水蒸気"],"explain":"塩化水素とアンモニアが反応すると[ 塩化アンモニウム ]の白煙(微結晶)が生じる。これは塩化水素とアンモニアの相互の検出反応として利用される。\n★塩化アンモニウムNH₄Cl"},{"q":"フッ化水素は20°C以下では[____](性)のある[____](体)である。","answer":"揮発性、液体","choices":["揮発性、液体","昇華性、固体","不揮発性、液体","吸湿性、固体"],"explain":"フッ化水素は20°C以下では[ 揮発性 ]のある[ 液体 ]である。★フッ化水素HFは水素結合をもつため沸点が高くなっています。"},{"q":"乾いた試験管に塩化水素HClを満たし、倒立させて水中に入れると試験管に[____]。このことから塩化水素が[____]ことがわかる。","answer":"水が入ってくる、水に溶けやすい","choices":["水が入ってくる、水に溶けやすい","水が入ってくる、水に溶けにくい","気体が入ってくる、水に溶けやすい","気体が入ってくる、水に溶けにくい"],"explain":"乾いた試験管に塩化水素HClを満たし、倒立させて水中に入れると試験管に[ 水が入ってくる ]。このことから塩化水素が[ 水に溶けやすい ]ことがわかる。"},{"q":"塩化水素HClは[____](性)の気体で、湿った[____](色)リトマス紙を[____](色)に変える。","answer":"酸性、青色、赤色","choices":["酸性、青色、赤色","酸性、赤色、青色","塩基性、青色、赤色","塩基性、赤色、青色"],"explain":"塩化水素HClは[ 酸性 ]の気体で、湿った[ 青色 ]リトマス紙を[ 赤色 ]に変える。\n★塩化水素は酸性なので青→赤となります。"},{"q":"[____]の主成分はCaF₂である。","answer":"ホタル石","choices":["ホタル石","鍾乳洞","石英","生石灰"],"explain":"[ ホタル石 ]の主成分はCaF₂である。\n★ホタル石(蛍石、ほたるいし、けいせき)CaF₂、鍾乳洞CaCO₃、生石灰CaO、石英SiO₂"},{"q":"ホタル石(主成分CaF₂)に濃硫酸を加えて加熱すると、[____](気体)が発生する。","answer":"フッ化水素HF","choices":["フッ化水素HF","二酸化炭素CO₂","フッ素F₂","水素H₂"],"explain":"ホタル石(主成分CaF₂)に濃硫酸を加えて加熱すると、[ フッ化水素HF ](気体)が発生する。\n★CaF₂ + H₂SO₄ → CaSO₄ + 2HF"},{"q":"ホタル石(主成分CaF₂)は[____]すると蛍光を発する。","answer":"熱する","choices":["熱する","冷やす","光を当て続ける","暗所に置く"],"explain":"ホタル石(主成分CaF₂)は[ 熱する ]と蛍光を発する。"},{"q":"CaF₂ + H₂SO₄ → [____]","answer":"CaSO₄ + 2HF(加熱必要)","choices":["CaSO₄ + 2HF(加熱必要)","CaSO₄ + 2HF(加熱なし)","F₂SO₄ + CaH₂(加熱必要)","CaHSO₄ + HF(加熱なし)"],"explain":"CaF₂ + H₂SO₄ → CaSO₄ + 2HF (加熱必要)\n★ホタル石に濃硫酸を加えて加熱すると、フッ化水素(気体)が発生します。\n★濃硫酸が絡む反応では基本的に加熱が必要です。"},{"q":"[____] → CaSO₄ + 2HF","answer":"CaF₂ + H₂SO₄(加熱必要)","choices":["CaF₂ + H₂SO₄(加熱必要)","CaF₂ + H₂SO₃(加熱必要)","CaF₂ + H₂SO₄(加熱不要)","CaF₂ + H₂SO₃(加熱不要)"],"explain":"CaF₂ + H₂SO₄ → CaSO₄ + 2HF (加熱必要)\n★ホタル石に濃硫酸を加えて加熱すると、フッ化水素(気体)が発生します。\n★濃硫酸が絡む反応では基本的に加熱が必要です。"},{"q":"ハロゲン化水素のうち、[____]はガラスの主成分である二酸化ケイ素SiO₂を溶かす。","answer":"フッ化水素HF","choices":["フッ化水素HF","塩化水素HCl","臭化水素HBr","ヨウ化水素HI"],"explain":"ハロゲン化水素のうち、[ フッ化水素HF ]はガラスの主成分である二酸化ケイ素SiO₂を溶かす。"},{"q":"ハロゲン化水素のうち、[____]はガラスなどのケイ酸塩や石英(二酸化ケイ素SiO₂)を溶かす。","answer":"フッ化水素HF","choices":["フッ化水素HF","塩化水素HCl","臭化水素HBr","ヨウ化水素HI"],"explain":"ハロゲン化水素のうち、[ フッ化水素HF ]はガラスなどのケイ酸塩や石英(二酸化ケイ素SiO₂)を溶かす。"},{"q":"フッ化水素HFを保存するときは[____]容器に貯える。","answer":"ポリエチレン容器","choices":["ポリエチレン容器","褐色瓶","デシケーター","ガラス瓶"],"explain":"フッ化水素HFを保存するときは[ ポリエチレン容器 ]に貯える。\n★フッ化水素HFはガラス製の容器を溶かすためポリエチレン容器(プラスチック容器)に保存します。"},{"q":"[____]はガラスを溶かすことから、ガラスに目盛りをつけたり、つや消しガラスの製造に利用される。","answer":"フッ化水素HF","choices":["フッ化水素HF","塩化水素HCl","臭化水素HBr","ヨウ化水素HI"],"explain":"[ フッ化水素HF ]はガラスを溶かすことから、ガラスに目盛りをつけたり、つや消しガラスの製造に利用される。"},{"q":"SiO₂ + 6HF → [____]","answer":"H₂SiF₆ + 2H₂O","choices":["H₂SiF₆ + 2H₂O","H₂SiF₆ + H₂O","H₂SiF₆O₂ + 2H₂","H₂SiF₆O₂ + H₂"],"explain":"SiO₂ + 6HF → H₂SiF₆ + 2H₂O\n★フッ化水素がガラス、ケイ酸塩、石英などのSiO₂を溶かす反応です。"},{"q":"[____] → H₂SiF₆ + 2H₂O","answer":"SiO₂ + 6HF","choices":["SiO₂ + 6HF","SiO₂ + 4HF","SiO₄ + 6HF","SiO₄ + 4HF"],"explain":"SiO₂ + 6HF → H₂SiF₆ + 2H₂O\n★フッ化水素がガラス、ケイ酸塩、石英などのSiO₂を溶かす反応です。"},{"q":"H₂SiF₆は[____]である。","answer":"ヘキサフルオロケイ酸","choices":["ヘキサフルオロケイ酸","ホタル石","フッ化水素酸","石英"],"explain":"H₂SiF₆は[ ヘキサフルオロケイ酸 ]である。\n★ホタル石CaF₂、フッ化水素酸HF、石英SiO₂"},{"q":"二酸化ケイ素SiO₂は、フッ化水素酸HFと反応するときは[____]を生じ、フッ化水素HFと反応する時は[____]が生じる。","answer":"ヘキサフルオロケイ酸H₂SiF₆、四フッ化ケイ素SiF₄","choices":["ヘキサフルオロケイ酸H₂SiF₆、四フッ化ケイ素SiF₄","ヘキサフルオロケイ酸H₂SiF₆、ケイ酸ナトリウムNa₂SiO₃","ケイ酸ナトリウムNa₂SiO₃、四フッ化ケイ素SiF₄","四フッ化ケイ素SiF₄、ヘキサフルオロケイ酸H₂SiF₆"],"explain":"二酸化ケイ素SiO₂は、フッ化水素酸と反応するときは[ ヘキサフルオロケイ酸H₂SiF₆ ]を生じ、フッ化水素HFと反応する時は[ 四フッ化ケイ素SiF₄ ]が生じる。\n★SiO₂ + 6HF → H₂SiF₆ + 2H₂O\n★SiO₂ + 4HF → SiF₄ + 2H₂O (教科書範囲外、2つの式は2HF分の違いのみ)\n★フッ化水素酸(フッ酸)は弱酸の水溶液、フッ化水素は気体または液体です。\n★リクエストにより作成しました。"},{"q":"塩素を水酸化カルシウムに吸収させると、白色粉末の[____]が得られる。主成分は[____]である。","answer":"さらし粉、CaCl(ClO)・H₂O","choices":["さらし粉、CaCl(ClO)・H₂O","さらし粉、KClO₃","塩素酸カリウム、KClO₃","塩素酸カリウム、CaCl(ClO)・H₂O"],"explain":"塩素を水酸化カルシウムに吸収させると、白色粉末の[ さらし粉 ]が得られる。主成分は[ CaCl(ClO)・H₂O ]である。\n★さらし粉は水に溶かすと次亜塩素酸イオンClO⁻を生じます。次亜塩素酸イオンClO⁻には強い酸化作用があり、漂白剤・殺菌剤に用いられます。日本では、さらし粉からより品質の良いCaCl₂の成分を減らした高度さらし粉Ca(ClO)₂・2H₂Oが製造されています。"},{"q":"さらし粉からCaCl₂の成分を減らしたものを、[____]といい、化学式は [____]。","answer":"高度さらし粉、Ca(ClO)₂・2H₂O","choices":["高度さらし粉、Ca(ClO)₂・2H₂O","塩素酸カリウム、Ca(ClO)₂・2H₂O","高度さらし粉、CaCl(ClO)・H₂O","塩素酸カリウム、CaCl(ClO)・H₂O"],"explain":"さらし粉からCaCl₂の成分を減らしたものを、[ 高度さらし粉 ]といい、化学式は [ Ca(ClO)₂・2H₂O ]。\n★日本では、さらし粉からより品質の良いCaCl₂の成分を減らした高度さらし粉Ca(ClO)₂・2H₂Oが製造され、漂白剤・殺菌剤に用いられます。"},{"q":"塩素酸カリウムKClO₃は酸化マンガン(IV)MnO₂を触媒として加熱すると[____]を発生する。","answer":"酸素O₂","choices":["酸素O₂","二酸化炭素CO₂","塩素Cl₂","水素H₂"],"explain":"塩素酸カリウムKClO₃は酸化マンガン(IV)MnO₂を触媒として加熱すると[ 酸素O₂ ]を発生する。\n★2KClO₃ → 2KCl + 3O₂ (触媒 MnO₂、加熱)。\n★塩素酸カリウムKClO₃は白色固体(結晶粉末)です。"},{"q":"塩素酸カリウムKClO₃は触媒を用いて加熱すると酸素を発生させることから、マッチの頭薬、花火や火薬の[____](剤)として利用される。","answer":"助燃剤","choices":["助燃剤","消火剤","点火剤","還元剤"],"explain":"塩素酸カリウムKClO₃は触媒を用いて加熱すると酸素を発生させることから、マッチの頭薬、花火や火薬の[ 助燃剤 ]として利用される。"},{"q":"2KClO₃ → [____] (触媒 [____]、加熱)","answer":"2KCl + 3O₂ 、触媒 MnO₂","choices":["2KCl + 3O₂ 、触媒 MnO₂","2KCl + 3O₂ 、触媒 H₂SO₄","2KOH + Cl₂ 、触媒 MnO₂","2KOH + Cl₂ 、触媒 H₂SO₄"],"explain":"2KClO₃ → 2KCl + 3O₂ (触媒 MnO₂、加熱)\n★酸化マンガン(IV)を触媒として塩素酸カリウムを加熱すると酸素が発生します。\n★自己酸化還元反応です。同一物質が酸化剤と還元剤の両方になっています。酸化数: Cl(+5)→Cl(-1)、O(-2)→O(0)。\n★分解反応は基本的に加熱が必要です。"},{"q":"[____] → 2KCl + 3O₂ (触媒 MnO₂)","answer":"2KClO₃ (加熱必要)","choices":["2KClO₃ (加熱必要)","2KClO₃ (加熱なし)","2KClO₂ (加熱必要)","2KClO₂ (加熱なし)"],"explain":"2KClO₃ → 2KCl + 3O₂ (触媒 MnO₂、加熱)\n★酸化マンガン(IV)を触媒として塩素酸カリウムを加熱すると酸素が発生します。\n★自己酸化還元反応です。同一物質が酸化剤と還元剤の両方になっています。酸化数: Cl(+5)→Cl(-1)、O(-2)→O(0)。\n★分解反応は基本的に加熱が必要です。"},{"q":"次亜塩素酸ナトリウムNa(OCl)は、次亜塩素酸イオンOCl⁻を含むため[____]を示す。酸化剤、漂白剤、殺菌消毒剤に用いられる。","answer":"酸化作用","choices":["酸化作用","還元作用","電気伝導性","昇華性"],"explain":"次亜塩素酸ナトリウムNa(OCl)は、次亜塩素酸イオンOCl⁻を含むため[ 酸化作用 ]を示す。酸化剤、漂白剤、殺菌消毒剤に用いられる。"},{"q":"次亜塩素酸ナトリウムNa(OCl)の水溶液に塩酸HClを加えると[____]が発生する。","answer":"塩素Cl₂","choices":["塩素Cl₂","酸素O₂","水素H₂","水素化ナトリウムNaH"],"explain":"次亜塩素酸ナトリウムNa(OCl)の水溶液に塩酸HClを加えると[ 塩素Cl₂ ]が発生する。\n★Na(OCl) + 2HCl → NaCl + H₂O + Cl₂\n★OCl⁻の酸化作用で酸化還元反応が起こります。酸化数はOCl⁻のCl(+1→0)、HClのCl(-1→0)\nNa(OCl)はNa(+1)、OCl(-1)で、O(-2)からCl(+1)\nCl₂は単体なのでCl(0)\nHCl→NaClの部分は酸化数に変化はなくCl(-1→-1)\nイオン反応式(酸性で右向きの反応)\n2H⁺ + ClO⁻ + Cl⁻ → Cl₂ + H₂O"},{"q":"Na(OCl) + 2HCl → [____]","answer":"NaCl + H₂O + Cl₂","choices":["NaCl + H₂O + Cl₂","NaCl + 2HCl + O₂","NaCl + H₂O + H₂","NaH + H₂O + Cl₂"],"explain":"Na(OCl) + 2HCl → NaCl + H₂O + Cl₂\n★次亜塩素酸ナトリウム水溶液に塩酸を加えると塩素が発生します。\n★OCl⁻の酸化作用で酸化還元反応が起こります。酸化数はOCl⁻のCl(+1→0)、HClのCl(-1→0)\nNa(OCl)はNa(+1)、OCl(-1)で、O(-2)からCl(+1)\nCl₂は単体なのでCl(0)\nHCl→NaClの部分は酸化数に変化はなくCl(-1→-1)\nイオン反応式(酸性で右向きの反応)\n2H⁺ + ClO⁻ + Cl⁻ → Cl₂ + H₂O"},{"q":"ハロゲン化物イオンを含む水溶液に硝酸銀水溶液AgNO₃を加えると、[____]以外は沈殿が生じる。","answer":"フッ化銀AgF","choices":["フッ化銀AgF","塩化銀AgCl","臭化銀AgBr","ヨウ化銀AgI"],"explain":"ハロゲン化物イオンを含む水溶液に硝酸銀水溶液AgNO₃を加えると、[ フッ化銀AgF ]以外は沈殿が生じる。★ハロゲン化合物の例外の多くはフッ素化合物です。"},{"q":"フッ化銀AgFは[____](色)であり、水に[____]。","answer":"黄色、溶ける","choices":["黄色、溶ける","黄色、溶けない","白色、溶けない","白色、溶ける"],"explain":"フッ化銀AgFは[ 黄色 ]であり、水に[ 溶ける ]。\n★ハロゲン化銀ではフッ化銀AgFのみ水に溶けます。\n★フッ化銀AgFの水溶液は無色透明です。"},{"q":"塩化銀AgClは[____](色)であり、水に[____]。","answer":"白色、溶けない","choices":["白色、溶けない","黄色、溶ける","黄色、溶けない","白色、溶ける"],"explain":"塩化銀AgClは[ 白色 ]であり、水に[ 溶けない ]。\n★ハロゲン化銀ではフッ化銀AgFのみ水に溶けます。"},{"q":"臭化銀AgBrは[____](色)であり、水に[____]。","answer":"淡黄色、溶けない","choices":["淡黄色、溶けない","黄色、溶ける","白色、溶けない","白色、溶ける"],"explain":"臭化銀AgBrは[ 淡黄色 ]であり、水に[ 溶けない ]。\n★ハロゲン化銀ではフッ化銀AgFのみ水に溶けます。"},{"q":"ヨウ化銀AgIは[____](色)であり、水に[____]。","answer":"黄色、溶けない","choices":["黄色、溶けない","黄色、溶ける","白色、溶けない","白色、溶ける"],"explain":"ヨウ化銀AgIは[ 黄色 ]であり、水に[ 溶けない ]。\n★ハロゲン化銀ではフッ化銀AgFのみ水に溶けます。"},{"q":"ハロゲン化銀のうち[____]は水に溶ける。","answer":"フッ化銀AgF","choices":["フッ化銀AgF","塩化銀AgCl","臭化銀AgBr","ヨウ化銀AgI"],"explain":"ハロゲン化銀のうち[ フッ化銀AgF ]は水に溶ける。\n★ハロゲン化合物の例外の多くはフッ素化合物です。"},{"q":"ハロゲン化銀は[____](性)があり、光が当たると分解し、銀Agが析出して[____](色)になる。","answer":"感光性、黒色","choices":["感光性、黒色","感光性、銀色","吸湿性、黒色","吸湿性、銀色"],"explain":"ハロゲン化銀は[ 感光性 ]があり、光が当たると分解し、銀Agが析出して[ 黒色 ]になる。"}]},
  {"code":"MB05","name":"酸素とオゾン","parent":"非金属1","questions":[{"q":"地殻中に最も多く含まれる元素は[____]である。質量比とする。","answer":"酸素O","choices":["酸素O","ケイ素Si","アルミニウムAl","鉄Fe"],"explain":"地殻中に最も多く含まれる元素は[ 酸素O ]である。質量比とする。\n★ゴロ: おっしゃるてか(O、Si、Al、Fe、Caの順に多い)"},{"q":"過酸化水素水H₂O₂に少量の酸化マンガン(IV)MnO₂を加えると[____]が得られる。","answer":"酸素O₂","choices":["酸素O₂","水素H₂","二酸化炭素CO₂","オゾンO₃"],"explain":"過酸化水素水H₂O₂に少量の酸化マンガン(IV)MnO₂を加えると[ 酸素O₂ ]が得られる。\n★2H₂O₂ → 2H₂O + O₂(触媒MnO₂)"},{"q":"2H₂O₂ → [____](触媒MnO₂)","answer":"2H₂O + O₂(加熱なし)","choices":["2H₂O + O₂(加熱なし)","2H₂O + O₂(加熱必要)","2H₂ + 2O₂(加熱なし)","2H₂ + 2O₂(加熱必要)"],"explain":"2H₂O₂ → 2H₂O + O₂(触媒MnO₂)\n★過酸化水素水に少量の酸化マンガン(IV)を加えると酸素が得られます。過酸化水素は不安定なため加熱や触媒がなくても少しずつ水と酸素へ分解されます。"},{"q":"[____] → 2H₂O + O₂(触媒MnO₂)","answer":"2H₂O₂(加熱なし)","choices":["2H₂O₂(加熱なし)","2H₂O₂(加熱必要)","H₂O + 2H₂ + O₂(加熱なし)","2H₂ + 2O₂(加熱必要)"],"explain":"2H₂O₂ → 2H₂O + O₂(触媒MnO₂、加熱なし)\n★過酸化水素水に少量の酸化マンガン(IV)を加えると酸素が得られます。過酸化水素は不安定なため加熱や触媒がなくても少しずつ水と酸素へ分解されます。"},{"q":"塩素酸カリウムKClO₃に少量の酸化マンガン(IV)MnO₂を加えて加熱すると[____]が得られる。","answer":"酸素O₂","choices":["酸素O₂","水素H₂","塩素Cl₂","次亜塩素酸HClO"],"explain":"塩素酸カリウムKClO₃に少量の酸化マンガン(IV)MnO₂を加えて加熱すると[ 酸素O₂ ]が得られる。\n★2KClO₃ → 2KCl + 3O₂(触媒MnO₂、加熱必要)。\n★塩素酸カリウムKClO₃は白色固体(結晶粉末)です。\n分解反応の多くは加熱が必要です。"},{"q":"2KClO₃ → [____](触媒MnO₂)","answer":"2KCl + 3O₂ (加熱必要)","choices":["2KCl + 3O₂ (加熱必要)","2KCl + 3O₂ (加熱なし)","2KCl + 2O₃ (加熱必要)","2KCl + 2O₃ (加熱なし)"],"explain":"2KClO₃ → 2KCl + 3O₂(触媒MnO₂、加熱必要)\n★塩素酸カリウムKClO₃に少量の酸化マンガン(IV)を加えて加熱すると酸素が得られます。"},{"q":"[____] → 2KCl + 3O₂(触媒MnO₂)","answer":"2KClO₃ (加熱必要)","choices":["2KClO₃ (加熱必要)","2KClO₃ (加熱なし)","3KClO₂ (加熱必要)","3KClO₂ (加熱なし)"],"explain":"2KClO₃ → 2KCl + 3O₂(触媒MnO₂、加熱必要)\n★塩素酸カリウムKClO₃に少量の酸化マンガン(IV)を加えて加熱すると酸素が得られます。"},{"q":"[____]を分留すると酸素が得られる。","answer":"液体空気","choices":["液体空気","液体窒素","アルコール","原油"],"explain":"[ 液体空気 ]を分留すると酸素が得られる。\n★酸素の他に、窒素も得られます。特別な分留では貴ガスも得られます。"},{"q":"酸素は[____]で捕集する。","answer":"水上置換","choices":["水上置換","上方置換","下方置換","上方置換もしくは水上置換"],"explain":"酸素は[ 水上置換 ]で捕集する。\n★水に溶けにくい気体は水上置換で集めます。酸素の分子量32と空気の平均分子量28.8では大きな差はないので下方置換では効率が悪いと考えてください。"},{"q":"過酸化水素H₂O₂は[____](色)の、水よりわずかに[____](性)のある[____](体)である。","answer":"無色、粘性、液体","choices":["無色、粘性、液体","無色、揮発性、気体","淡青色、粘性、液体","淡青色、揮発性、気体"],"explain":"過酸化水素H₂O₂は[ 無色 ]の、水よりわずかに[ 粘性 ]のある[ 液体 ]である。"},{"q":"過酸化水素H₂O₂の水溶液は猛毒で皮膚を侵すが、3％程度へ薄めたものを[____]といい[____](剤)として利用される。","answer":"オキシドール、殺菌消毒剤","choices":["オキシドール、殺菌消毒剤","オキシドール、漂白剤","ホルマリン、殺菌消毒剤","ホルマリン、漂白剤"],"explain":"過酸化水素H₂O₂の水溶液は猛毒で皮膚を侵すが、3％程度へ薄めたものを[ オキシドール ]といい[ 殺菌消毒剤 ]として利用される。"},{"q":"酸素の単体には酸素O₂の[____]としてオゾンO₃がある。","answer":"同素体","choices":["同素体","同位体","異性体","光学異性体"],"explain":"酸素の単体にはO₂の[ 同素体 ]としてオゾンO₃がある。"},{"q":"酸素中で無声放電を行うと[____]が生じる。","answer":"オゾンO₃","choices":["オゾンO₃","水H₂O","過酸化水素H₂O₂","水酸化物イオンOH⁻"],"explain":"酸素中で無声放電を行うと[ オゾンO₃ ]が生じる。\n★3O₂ ⇄ 2O₃\nオゾンO₃は不安定なため放置すると酸素O₂へ戻ります。"},{"q":"酸素に強い紫外線を当てると[____]が生じる。","answer":"オゾンO₃","choices":["オゾンO₃","水H₂O","過酸化水素H₂O₂","水酸化物イオンOH⁻"],"explain":"酸素に強い紫外線を当てると[ オゾンO₃ ]が生じる。\n★3O₂ ⇄ 2O₃\nオゾンO₃は不安定なため放置すると酸素O₂へ戻ります。"},{"q":"3O₂ ⇄ [____] (条件 [____])","answer":"2O₃、紫外線を当てる","choices":["2O₃、紫外線を当てる","2O₃、加熱する","O₆、紫外線を当てる","O₆、加熱する"],"explain":"3O₂ ⇄ 2O₃ (紫外線を当てる)\n★オゾンO₃は不安定なため放置すると酸素O₂へ戻ります。"},{"q":"大気の上層では、太陽からの強い紫外線によって、[____]からオゾンが作られる。これが[____]である。","answer":"酸素、オゾン層","choices":["酸素、オゾン層","酸素、大気圏","水、オゾン層","水、大気圏"],"explain":"大気の上層では、太陽からの強い紫外線によって、[ 酸素 ]からオゾンが作られる。これが[ オゾン層 ]である。"},{"q":"酸素O₂は[____](色)、[____](臭)であり、オゾンO₃より軽い。","answer":"無色、無臭","choices":["無色、無臭","無色、特異臭","淡青色、特異臭","淡青色、無臭"],"explain":"酸素O₂は[ 無色 ]、[ 無臭 ]であり、オゾンO₃より軽い。\n★気体の重さ(軽さ)は密度で考えます。標準状態で1molあたりの体積22.4Lは一定なので、分子量の大小と密度の大小が一致します。酸素O₂は32、オゾンO₃は48です。"},{"q":"オゾンO₃は[____](色)、[____](臭)であり、酸素O₂より重い。","answer":"淡青色、特異臭","choices":["淡青色、特異臭","淡青色、無臭","無色、無臭","無色、特異臭"],"explain":"オゾンO₃は[ 淡青色 ]、[ 特異臭 ]であり、酸素O₂より重い。\n★気体の重さ(軽さ)は密度で考えます。標準状態で1molあたりの体積22.4Lは一定なので、分子量の大小と密度の大小が一致します。酸素O₂は32、オゾンO₃は48です。"},{"q":"酸素O₂は無色、[____](臭)であり、オゾンO₃より[____]。","answer":"無臭、軽い","choices":["無臭、軽い","無臭、重い","特異臭、重い","特異臭、軽い"],"explain":"酸素O₂は無色、[ 無臭 ]であり、オゾンO₃より[ 軽い ]。"},{"q":"オゾンO₃は淡青色、[____](臭)であり、酸素O₂より[____]。","answer":"特異臭、重い","choices":["特異臭、重い","特異臭、軽い","無臭、軽い","無臭、重い"],"explain":"オゾンO₃は淡青色、[ 特異臭 ]であり、酸素O₂より[ 重い ]。"},{"q":"酸素O₂の分子の形は[____]であり、オゾンO₃の分子の形は[____]である。","answer":"(酸素は)直線形、(オゾンは)折れ線形","choices":["(酸素は)直線形、(オゾンは)折れ線形","(酸素は)直線形、(オゾンは)直線形","(酸素は)折れ線形、(オゾンは)折れ線形","(酸素は)折れ線形、(オゾンは)直線形"],"explain":"酸素O₂の分子の形は[ 直線形 ]であり、オゾンO₃の分子の形は[ 折れ線形 ]である。"},{"q":"オゾンO₃は淡青色、特異臭のある[____](毒)な気体で、酸素へ分解するときに強い[____](作用)を示す。","answer":"有毒、酸化作用","choices":["有毒、酸化作用","有毒、還元作用","無毒、酸化作用","無毒、還元作用"],"explain":"オゾンO₃は淡青色、特異臭のある[ 有毒 ]な気体で、酸素へ分解するときに強い[ 酸化作用 ]を示す。"},{"q":"オゾンは、水道水の[____]、空気の[____]、衣類などの[____]に利用される。","answer":"殺菌、浄化、漂白","choices":["殺菌、浄化、漂白","脱色、浄化、染色","殺菌、換気、漂白","脱色、換気、染色"],"explain":"オゾンは、水道水の[ 殺菌 ]、空気の[ 浄化 ]、衣類などの[ 漂白 ]に利用される。"},{"q":"オゾンO₃は、水で湿らせた[____]を[____](色)に変えることで検出できる。","answer":"ヨウ化カリウムデンプン紙、青紫色","choices":["ヨウ化カリウムデンプン紙、青紫色","ヨウ化カリウムデンプン紙、白色","赤色リトマス紙、青色","赤色リトマス紙、白色"],"explain":"オゾンO₃は、水で湿らせた[ ヨウ化カリウムデンプン紙 ]を[ 青紫色 ]に変えることで検出できる。\n★オゾンの強い酸化作用で遊離したヨウ素がデンプンと反応します。白→青系統の変化です。\n2KI + O₃ + H₂O → 2KOH + I₂ + O₂"},{"q":"ヨウ化カリウム水溶液にオゾンを通じると[____]が遊離する。同時に[____](気体)が発生する。","answer":"ヨウ素I₂、酸素O₂","choices":["ヨウ素I₂、酸素O₂","ヨウ素I₂、水素H₂","ヨウ化水素HI、酸素O₂","ヨウ化水素HI、水素H₂"],"explain":"ヨウ化カリウム水溶液にオゾンを通じると[ ヨウ素I₂ ]が遊離する。同時に[ 酸素O₂ ](気体)が発生する。\n★オゾンの強い酸化作用でヨウ素が遊離します。酸化数の変化はありませんが、オゾンO₃は還元されて酸素O₂になります。\n2KI + O₃ + H₂O → 2KOH + I₂ + O₂"},{"q":"2KI + O₃ + H₂O → [____]","answer":"2KOH + I₂ + O₂","choices":["2KOH + I₂ + O₂","2KOH + I₂ + H₂","2KOH + 2HI + O₂","2KOH + 2HI + H₂"],"explain":"2KI + O₃ + H₂O → 2KOH + I₂ + O₂\n★ヨウ化カリウム水溶液にオゾンを通じるとオゾンの強い酸化作用でヨウ素が遊離します。酸化数の変化はありませんが、オゾンO₃は還元されて酸素O₂になります。"},{"q":"[____] → 2KOH + I₂ + O₂","answer":"2KI + O₃ + H₂O ","choices":["2KI + O₃ + H₂O ","2KI + O₃","2KI + 2HI + H₂O ","2KI + 2H₂O "],"explain":"2KI + O₃ + H₂O → 2KOH + I₂ + O₂\n★ヨウ化カリウム水溶液にオゾンを通じるとオゾンの強い酸化作用でヨウ素が遊離します。酸化数の変化はありませんが、オゾンO₃は還元されて酸素O₂になります。"},{"q":"三原子分子の淡青色の気体で、酸化力が強いといえば[____]である。","answer":"オゾン","choices":["オゾン","二酸化窒素","二酸化硫黄","硫化水素"],"explain":"三原子分子の淡青色の気体で、酸化力が強い気体といえば[ オゾン ]である。\n★オゾンO₃は三原子分子の分子量48であることもおさえてください。共通テストから役に立ちます。"},{"q":"「分子量48の気体で、他の同素体へ分解しやすい」といえば[____]である。","answer":"オゾン","choices":["オゾン","硫黄","リン","二酸化窒素"],"explain":"「分子量48の気体で、他の同素体へ分解しやすい」といえば[ オゾン ]である。\n★オゾンO₃は三原子分子の分子量48であることをおさえてください。共通テストから役に立ちます。"},{"q":"ヨウ化カリウム水溶液からヨウ素を遊離させる気体には[____]や[____]がある。","answer":"オゾンO₃、塩素Cl₂","choices":["オゾンO₃、塩素Cl₂","硫化水素H₂S、二酸化硫黄SO₂","硫化水素H₂S、塩素Cl₂","オゾンO₃、二酸化硫黄SO₂"],"explain":"ヨウ化カリウム水溶液からヨウ素を遊離させる気体には[ オゾンO₃ ]や[ 塩素Cl₂ ]がある。\n★オゾンO₃や塩素Cl₂には酸化力があり、ヨウ素が遊離します。共に漂白作用もあります。★「ヨウ化カリウムデンプン紙を青変させる」の表現もあります。"},{"q":"ヨウ化カリウムデンプン紙を青変させる気体には[____]や[____]がある。","answer":"オゾンO₃、塩素Cl₂","choices":["オゾンO₃、塩素Cl₂","硫化水素H₂S、二酸化硫黄SO₂","硫化水素H₂S、塩素Cl₂","オゾンO₃、二酸化硫黄SO₂"],"explain":"ヨウ化カリウムデンプン紙を青変させる気体には[ オゾンO₃ ]や[ 塩素Cl₂ ]がある。\n★オゾンO₃や塩素Cl₂には酸化力があり、ヨウ素が遊離します。共に漂白作用もあります。★「ヨウ化カリウム水溶液からヨウ素を遊離させる」の表現もあります。"},{"q":"臭化カリウム水溶液にオゾンを通じると[____]。","answer":"オゾンO₃の酸化力で臭素Br₂が遊離する","choices":["オゾンO₃の酸化力で臭素Br₂が遊離する","オゾンO₃の還元力で臭素Br₂が遊離する","オゾンO₃が酸化され酸素O₂になる","化学反応は起こらない"],"explain":"臭化カリウム水溶液にオゾンを通じると[ オゾンO₃の酸化力で臭素Br₂が遊離する ]。\n★2KBr + O₃ + H₂O → 2KOH + Br₂ + O₂\n★酸化力の順はF₂＞O₃＞Cl₂＞Br₂＞I₂\n★オゾンはフッ素に次ぐ強力な酸化力を持ちます。\n★オゾンO₃や塩素Cl₂には酸化力があり、ヨウ素や臭素を遊離します。(東工大2014より)"}]},
  {"code":"MB06","name":"オキソ酸","parent":"非金属1","questions":[{"q":"塩基性酸化物は[____](元素)の酸化物であり、酸性酸化物は[____](元素)の酸化物である。","answer":"金属元素、非金属元素","choices":["金属元素、非金属元素","金属元素、金属元素","非金属元素、非金属元素","非金属元素、金属元素"],"explain":"塩基性酸化物は[ 金属元素 ]の酸化物であり、酸性酸化物は[ 非金属元素 ]の酸化物である。\n★Na₂O、CaOなどは塩基性酸化物、CO₂、NO₂、SO₃などは酸性酸化物です。\n★他にAl₂O₃やZnOなどの両性酸化物があります。"},{"q":"塩基性酸化物は、[____]と反応して水酸化物(塩基)を生じたり、[____]と反応して塩を生じたりする。","answer":"水、酸","choices":["水、酸","水、水酸化物(塩基)","酸、水酸化物(塩基)","酸、水"],"explain":"塩基性酸化物は、[ 水 ]と反応して水酸化物(塩基)を生じたり、[ 酸 ]と反応して塩を生じたりする。\n①CaO + H₂O → Ca(OH)₂\n②CaO + 2HCl → CaCl₂ + H₂O\n★塩(えん)とは酸の陰イオンと塩基の陽イオンがイオン結合した化合物のことです。酸はオキソ酸や水素酸を指します。"},{"q":"塩基性酸化物は、水と反応して[____]を生じたり、酸と反応して[____]を生じたりする。","answer":"水酸化物(塩基)、塩","choices":["水酸化物(塩基)、塩","水酸化物(塩基)、酸","酸、塩","酸、水酸化物(塩基)"],"explain":"塩基性酸化物は、水と反応して[ 水酸化物(塩基) ]を生じたり、酸と反応して[ 塩 ]を生じたりする。\n①CaO + H₂O → Ca(OH)₂\n②CaO + 2HCl → CaCl₂ + H₂O\n★塩(えん)とは酸の陰イオンと塩基の陽イオンがイオン結合した化合物のことです。酸はオキソ酸や水素酸を指します。"},{"q":"酸性酸化物は、水と反応して[____]を生じたり、水酸化物(塩基)と反応して[____]を生じたりする。","answer":"酸、塩","choices":["酸、塩","酸、水酸化物(塩基)","塩、水酸化物(塩基)","塩、酸"],"explain":"酸性酸化物は、水と反応して[ 酸 ]を生じたり、水酸化物(塩基)と反応して[ 塩 ]を生じたりする。\n①CO₂ + H₂O ⇄ H₂CO₃\n②CO₂ + Ca(OH)₂ → CaCO₃ + H₂O\n★塩(えん)とは酸の陰イオンと塩基の陽イオンのイオン性化合物のことです。酸はオキソ酸や水素酸を指します。"},{"q":"酸性酸化物は、[____]と反応して酸を生じたり、[____]と反応して塩を生じたりする。","answer":"水、水酸化物(塩基)","choices":["水、水酸化物(塩基)","水、酸","水酸化物(塩基)、水","水酸化物(塩基)、酸"],"explain":"酸性酸化物は、[ 水 ]と反応して酸を生じたり、[ 水酸化物(塩基) ]と反応して塩を生じたりする。\n①CO₂ + H₂O ⇄ H₂CO₃\n②CO₂ + Ca(OH)₂ → CaCO₃ + H₂O\n★塩(えん)とは酸の陰イオンと塩基の陽イオンのイオン性化合物のことです。酸はオキソ酸や水素酸を指します。"},{"q":"両性酸化物は[____](元素)の酸化物であるが、水に[____]、酸、塩基の両方と反応して塩を生じる。","answer":"金属元素、溶けず","choices":["金属元素、溶けず","金属元素、溶けやすく","非金属元素、溶けず","非金属元素、溶けやすく"],"explain":"両性酸化物は[ 金属元素 ]の酸化物であるが、水に[ 溶けず ]、酸、塩基の両方と反応して塩を生じる。★両性酸化物はAl₂O₃とZnOを覚えます。"},{"q":"正誤問題「PbO₂を希硫酸に加えると，PbSO₄が生じる」(旧センター試験)の解答は[____]である。この出題は[____]に二酸化鉛PbO₂、[____]に鉛Pbの鉛蓄電池の仕組みを参考にされている。","answer":"誤り、正極、負極","choices":["誤り、正極、負極","誤り、負極、正極","正しい、正極、負極","正しい、負極、正極"],"explain":"正誤問題「PbO₂を希硫酸に加えると、PbSO₄が生じる」(2013年旧センター試験)の解答は[ 誤り ]である。この出題は[ 正極 ]に二酸化鉛PbO₂、[ 負極 ]に鉛Pbの鉛蓄電池の仕組みを参考にされている。\n★二酸化鉛PbO₂の反応性については教科書に記載がないと思われます。なので鉛蓄電池が正極と負極を繋ぐことではじめて電子が流れることから逆算して、単に加えただけでは反応しないと答えるものと考えられます。「鉛Pbは希硫酸に加えるとわずかに反応して表面に薄い酸化被膜を作り反応は止まる」は教科書に記載があります。\n*両性金属(Al、Zn、Sn、Pb)の酸化物でも希硫酸に溶けない例外PbO₂。\n*PbO₂は熱濃硫酸には反応してPbSO₄を生じます。"},{"q":"Na₂O + H₂O → [____]","answer":"2NaOH","choices":["2NaOH","NaOH + O₂","2NaH + O₂","2NaH + O₃"],"explain":"Na₂O + H₂O → 2NaOH\n★金属の酸化物(塩基性酸化物)は水と反応して水酸化物を生じます。"},{"q":"MgO + 2HCl → [____]","answer":"MgCl₂ + H₂O","choices":["MgCl₂ + H₂O","MgCl₂ + H₂","Mg(OH)₂ + Cl₂","Mg(OH)₂ + HCl₂"],"explain":"MgO + 2HCl → MgCl₂ + H₂O\n★金属の酸化物(塩基性酸化物)は酸と反応して塩を生じます。"},{"q":"SO₃ + H₂O → [____]","answer":"H₂SO₄","choices":["H₂SO₄","SO₄ + H₂","SO₂ + H₂ + O₂","H₂SO₃"],"explain":"SO₃ + H₂O → H₂SO₄\n★非金属の酸化物(酸性酸化物)は水と反応して酸を生じます。"},{"q":"CO₂ + 2NaOH → [____]","answer":"Na₂CO₃ + H₂O","choices":["Na₂CO₃ + H₂O","2NaCO₂ + H₂O","Na₂CO₂ + H₂ + O₂","2Na + CO₃ + H₂O"],"explain":"CO₂ + 2NaOH → Na₂CO₃ + H₂O\n★非金属の酸化物(酸性酸化物)は塩基と反応して塩を生じます。"},{"q":"両性酸化物には[____]や[____]がある。","answer":"Al₂O₃、ZnO","choices":["Al₂O₃、ZnO","Al₂O₃、Fe₂O₃","PbO₂、CuO","PbO₂、ZnO"],"explain":"両性酸化物には[ Al₂O₃ ]や[ ZnO ]がある。★両性酸化物はAl₂O₃とZnOを覚えます。"},{"q":"分子中に酸素原子を含む酸を[____]、酸素原子を含まない酸を[____]という。","answer":"オキソ酸、水素酸","choices":["オキソ酸、水素酸","オキソ酸、塩基","塩基、オキソ酸","水素酸、オキソ酸"],"explain":"分子中に酸素原子を含む酸を[ オキソ酸 ]、酸素原子を含まない酸を[ 水素酸 ]という。\n★硫酸H₂SO₄や炭酸H₂CO₃はオキソ酸(酸素酸)です。フッ化水素酸HFや塩酸HClは水素酸です。"},{"q":"一般に、酸性酸化物が水と反応すると[____]が生じる。","answer":"オキソ酸","choices":["オキソ酸","水素酸","強酸","弱酸"],"explain":"一般に、酸性酸化物が水と反応すると[ オキソ酸 ]が生じる。★酸性酸化物は非金属の酸化物です。\n例 SO₃ + H₂O → H₂SO₄"},{"q":"[____]のオキソ酸では、水素原子と[____]酸素原子が中心原子に多く結合しているものほど酸性が強くなる。","answer":"同一元素、結合していない","choices":["同一元素、結合していない","同一元素、結合している","同周期元素、結合していない","同周期元素、結合している"],"explain":"[ 同一元素 ]のオキソ酸では、水素原子と[ 結合していない ]酸素原子が中心原子に多く結合しているものほど酸性が強くなる。★窒素Nのオキソ酸、亜硝酸HNO₂と硝酸HNO₃では、硝酸HNO₃の酸性が強くなります。"},{"q":"[____]のオキソ酸は、周期表の[____](側)ほど酸性が強い。","answer":"同周期元素、右側","choices":["同周期元素、右側","同周期元素、左側","同族元素、右側","同族元素、左側"],"explain":"[ 同周期元素 ]のオキソ酸は、周期表の[ 右側 ]ほど酸性が強い。\n★リン酸H₃PO₄＜硫酸H₂SO₄＜過塩素酸HClO₄、の順に酸性が強くなります。(弱＜強)"},{"q":"亜硫酸の化学式は[____]、硫酸(濃硫酸や希硫酸)の化学式は[____]であり、[____]の酸性が強い。","answer":"H₂SO₃、H₂SO₄、硫酸","choices":["H₂SO₃、H₂SO₄、硫酸","H₂SO₄、H₂SO₃、硫酸","H₂SO₃、H₂SO₄、亜硫酸","H₂SO₄、H₂SO₃、亜硫酸"],"explain":"亜硫酸の化学式は[ H₂SO₃ ]、硫酸(濃硫酸や希硫酸)の化学式は[ H₂SO₄ ]であり、[ 硫酸 ]の酸性が強い。\n★同一元素のオキソ酸では、水素原子と結合していない酸素原子が中心原子に多く結合しているものほど酸性が強くなります。"},{"q":"亜硝酸の化学式は[____]、硝酸の化学式は[____]であり、[____]の酸性が強い。","answer":"HNO₂、HNO₃、硝酸","choices":["HNO₂、HNO₃、硝酸","HNO₂、HNO₃、亜硝酸","HNO₃、HNO₂、硝酸","HNO₃、HNO₂、亜硝酸"],"explain":"亜硝酸の化学式は[ HNO₂ ]、硝酸の化学式は[ HNO₃ ]であり、[ 硝酸 ]の酸性が強い。\n★同一元素のオキソ酸では、水素原子と結合していない酸素原子が中心原子に多く結合しているものほど酸性が強くなります。"},{"q":"次亜塩素酸の化学式は[____]で、Clの酸化数は[____]である。","answer":"HClO、+1","choices":["HClO、+1","HClO、+3","HClO₂、+3","HClO₂、+1"],"explain":"次亜塩素酸の化学式は[ HClO ]で、Clの酸化数は[ +1 ]である。\n★酸化数は、Hが+1、Oが-2、全体で0なので、1 + X - 2 = 0 から求めます。\n次亜塩素酸HClO\n亜塩素酸HClO₂\n塩素酸HClO₃\n過塩素酸HClO₄"},{"q":"亜塩素酸の化学式は[____]で、Clの酸化数は[____]である。","answer":"HClO₂、+3","choices":["HClO₂、+3","HClO₂、+1","HClO、+1","HClO、+3"],"explain":"亜塩素酸の化学式は[ HClO₂ ]で、Clの酸化数は[ +3 ]である。\n★酸化数は、Hが+1、Oが-2、全体で0なので、1 + X - 2×2 = 0 から求めます。\n次亜塩素酸HClO\n亜塩素酸HClO₂\n塩素酸HClO₃\n過塩素酸HClO₄"},{"q":"塩素酸の化学式は[____]で、Clの酸化数は[____]である。","answer":"HClO₃、+5","choices":["HClO₃、+5","HClO₃、+7","HClO₄、+7","HClO₄、+5"],"explain":"塩素酸の化学式は[ HClO₃ ]で、Clの酸化数は[ +5 ]である。\n★酸化数は、Hが+1、Oが-2、全体で0なので、1 + X - 2×3 = 0 から求めます。\n次亜塩素酸HClO\n亜塩素酸HClO₂\n塩素酸HClO₃\n過塩素酸HClO₄"},{"q":"過塩素酸の化学式は[____]で、Clの酸化数は[____]である。","answer":"HClO₄、+7","choices":["HClO₄、+7","HClO₄、+5","HClO₃、+5","HClO₃、+7"],"explain":"過塩素酸の化学式は[ HClO₄ ]で、Clの酸化数は[ +7 ]である。\n★酸化数は、Hが+1、Oが-2、全体で0なので、1 + X - 2×4 = 0 から求めます。\n次亜塩素酸HClO\n亜塩素酸HClO₂\n塩素酸HClO₃\n過塩素酸HClO₄"},{"q":"次亜塩素酸、亜塩素酸、塩素酸、過塩素酸のうち、最も酸性が強いものは[____]、最も酸性が弱いものは[____]である。","answer":"(強い)過塩素酸、(弱い)次亜塩素酸","choices":["(強い)過塩素酸、(弱い)次亜塩素酸","(強い)過塩素酸、(弱い)亜塩素酸","(強い)塩素酸、(弱い)次亜塩素酸","(強い)塩素酸、(弱い)亜塩素酸"],"explain":"次亜塩素酸、亜塩素酸、塩素酸、過塩素酸のうち、最も酸性が強いものは[ 過塩素酸 ]、最も酸性が弱いものは[ 次亜塩素酸 ]である。\n★次亜塩素酸＜亜塩素酸＜塩素酸＜過塩素酸\nつまり、HClO＜HClO₂＜HClO₃＜HClO₄です。塩素と結合している酸素のうち、水素と結合していない酸素の数を比べます。"},{"q":"H₂SiO₃、H₃PO₄、H₂SO₄、HClO₄を酸性の強い順に並べると、[____]。","answer":"H₂SiO₃＜H₃PO₄＜H₂SO₄＜HClO₄","choices":["H₂SiO₃＜H₃PO₄＜H₂SO₄＜HClO₄","H₃PO₄＜H₂SiO₃＜H₂SO₄＜HClO₄","H₂SiO₃＜H₃PO₄＜HClO₄＜H₂SO₄","H₃PO₄＜H₂SiO₃＜HClO₄＜H₂SO₄"],"explain":"H₂SiO₃、H₃PO₄、H₂SO₄、HClO₄を酸性の強い順に並べると、\nH₂SiO₃＜H₃PO₄＜H₂SO₄＜HClO₄\n同周期元素のオキソ酸は、周期表の右側ほど酸性が強くなります。"}]},
  {"code":"MB07","name":"硫黄とその化合物","parent":"非金属2","questions":[{"q":"斜方硫黄、単斜硫黄、ゴム状硫黄は互いに[____]である。","answer":"同素体","choices":["同素体","同位体","同族体","異性体"],"explain":"斜方硫黄、単斜硫黄、ゴム状硫黄は互いに[ 同素体 ]である。\n★同素体は「同じ元素で異なる単体(分子)」、同位体は「周期表の同じ位置にある異なる原子」と、区別するとよいと思います。"},{"q":"硫黄の同素体のうち、常温で安定に存在するものは[____]であり、分子式は[____]の[____](状分子)である。","answer":"斜方硫黄、S₈、環状分子","choices":["斜方硫黄、S₈、環状分子","斜方硫黄、Sₓ、鎖状分子","単斜硫黄、S₈、環状分子","単斜硫黄、Sₓ、鎖状分子"],"explain":"硫黄の同素体のうち、常温で安定に存在するものは[ 斜方硫黄 ]であり、分子式は[ S₈ ]の[ 環状分子 ]である。"},{"q":"硫黄の同素体のうち、95°C以上で結晶化させると得られるものは[____]であり、分子式は[____]の[____](状分子)である。","answer":"単斜硫黄、S₈、環状分子","choices":["単斜硫黄、S₈、環状分子","単斜硫黄、Sₓ、鎖状分子","斜方硫黄、S₈、環状分子","斜方硫黄、Sₓ、鎖状分子"],"explain":"硫黄の同素体のうち、95°C以上で結晶化させると得られるものは[ 単斜硫黄 ]であり、分子式は[ S₈ ]の[ 環状分子 ]である。"},{"q":"硫黄の同素体のうち、250°C近くの液体を急冷すると得られるものは[____]であり、分子式は[____]の[____](状分子)である。","answer":"ゴム状硫黄、Sₓ、鎖状分子","choices":["ゴム状硫黄、Sₓ、鎖状分子","ゴム状硫黄、S₈、環状分子","斜方硫黄、S₈、環状分子","斜方硫黄、Sₓ、鎖状分子"],"explain":"硫黄の同素体のうち、250°C近くの液体を急冷すると得られるものは[ ゴム状硫黄 ]であり、分子式は[ Sₓ ]の[ 鎖状分子 ]である。\n★ゴム状硫黄は鎖状高分子化合物です。"},{"q":"硫黄の同素体のうち、二硫化炭素CS₂へ溶けるものは[____]である。","answer":"斜方硫黄と単斜硫黄","choices":["斜方硫黄と単斜硫黄","ゴム状硫黄のみ","単斜硫黄のみ","斜方硫黄のみ"],"explain":"硫黄の同素体のうち、二硫化炭素CS₂へ溶けるものは[ 斜方硫黄と単斜硫黄 ]である。\n★無極性溶媒の二硫化炭素CS₂には、無極性分子が溶けやすく、巨大分子は溶けません。\n★「黄リン(白リン)P₄は二硫化炭素CS₂に溶け、赤リンP(多数の原子が結合)は二硫化炭素CS₂に溶けない。」もあります。"},{"q":"硫黄の同素体のうち、二硫化炭素CS₂へ溶けないものは[____]である。","answer":"ゴム状硫黄のみ","choices":["ゴム状硫黄のみ","斜方硫黄と単斜硫黄","単斜硫黄のみ","斜方硫黄のみ"],"explain":"硫黄の同素体のうち、二硫化炭素CS₂へ溶けないものは[ ゴム状硫黄のみ ]である。\n★無極性溶媒の二硫化炭素CS₂には、無極性分子が溶けやすく、巨大分子は溶けません。\n★「黄リン(白リン)P₄は二硫化炭素CS₂に溶け、赤リンP(多数の原子が結合)は二硫化炭素CS₂に溶けない。」もあります。"},{"q":"硫黄の同素体のうち、[____]は常温で長時間放置すると[____]になる。","answer":"単斜硫黄とゴム状硫黄、斜方硫黄","choices":["単斜硫黄とゴム状硫黄、斜方硫黄","単斜硫黄と斜方硫黄、ゴム状硫黄","斜方硫黄とゴム状硫黄、単斜硫黄","ゴム状硫黄、斜方硫黄"],"explain":"硫黄の同素体のうち、[ 単斜硫黄とゴム状硫黄 ]は常温で長時間放置すると[ 斜方硫黄 ]になる。"},{"q":"硫化鉄(II)FeSに希硫酸または希塩酸を加えると[____]が発生する。","answer":"硫化水素H₂S","choices":["硫化水素H₂S","三酸化硫黄SO₃","二酸化硫黄SO₂","水素H₂"],"explain":"硫化鉄(II)FeSに希硫酸または希塩酸を加えると[ 硫化水素H₂S ]が発生する。\n★FeS + H₂SO₄ → FeSO₄ + H₂S\n★FeS + 2HCl
