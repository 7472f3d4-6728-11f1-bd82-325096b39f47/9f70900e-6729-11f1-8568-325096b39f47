<style>
  :root{
    --bg:#ffffff;
    --paper:#fbfbfa;
    --ink:#1e1e1e;
    --sub:#8a8a8a;
    --line:#ececec;
    --accent:#2e9e6b;
    --accent-soft:#e7f5ee;
    --accent-ink:#d3640f;
    --ok:#27935a;
    --ok-soft:#e8f6ee;
    --ng:#d9463c;
    --ng-soft:#fdecea;
    --chip:#f3f3f1;
    --shadow:0 1px 2px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.03);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Hiragino Sans","Yu Gothic UI","Yu Gothic",sans-serif;
    background:var(--paper);color:var(--ink);
    display:flex;justify-content:center;min-height:100vh;line-height:1.6;
  }
  .app{width:100%;max-width:500px;background:var(--bg);min-height:100vh;
       display:flex;flex-direction:column;position:relative;}

  /* ---------- shared header ---------- */
  .bar{display:flex;align-items:center;gap:12px;padding:14px 18px 10px;}
  .icon-btn{font-size:22px;color:#c2c2c2;cursor:pointer;line-height:1;
            width:26px;height:26px;display:flex;align-items:center;justify-content:center;
            border:none;background:none;flex-shrink:0;}
  .icon-btn:hover{color:#9a9a9a;}
  .pbar{flex:1;height:6px;background:#efefef;border-radius:99px;overflow:hidden;}
  .pfill{height:100%;background:var(--accent);width:0;border-radius:99px;
         transition:width .3s ease;}

  /* ---------- home ---------- */
  .home{padding:0 18px 32px;display:flex;flex-direction:column;}
  .home-head{padding:22px 0 8px;}
  .kicker{font-size:11px;letter-spacing:.18em;color:var(--accent);
          font-weight:700;text-transform:uppercase;}
  .home-head h1{font-size:23px;font-weight:800;margin:6px 0 2px;letter-spacing:.01em;}
  .home-head p{font-size:13px;color:var(--sub);margin:0;}

  .stat-strip{display:flex;gap:10px;margin:18px 0 6px;}
  .stat{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:14px;
        padding:12px 14px;}
  .stat .n{font-size:20px;font-weight:800;line-height:1;}
  .stat .l{font-size:11px;color:var(--sub);margin-top:5px;}

  .seg{display:flex;gap:6px;overflow-x:auto;padding:14px 0 12px;
       scrollbar-width:none;}
  .seg::-webkit-scrollbar{display:none;}
  .seg button{flex:0 0 auto;border:none;background:var(--chip);color:#777;
              font-size:13px;font-weight:600;padding:8px 16px;border-radius:99px;
              cursor:pointer;white-space:nowrap;transition:.15s;}
  .seg button.on{background:var(--ink);color:#fff;}

  .chapters{display:flex;flex-direction:column;gap:9px;margin-top:4px;}
  .chap{display:flex;align-items:center;gap:14px;background:var(--bg);
        border:1px solid var(--line);border-radius:15px;padding:15px 16px;
        cursor:pointer;transition:.15s;text-align:left;width:100%;
        font-family:inherit;}
  .chap:hover{border-color:#dcdcdc;box-shadow:var(--shadow);}
  .chap:active{transform:scale(.992);}
  .chap .ring{width:42px;height:42px;flex-shrink:0;position:relative;}
  .chap .ring svg{transform:rotate(-90deg);}
  .chap .ring .pct{position:absolute;inset:0;display:flex;align-items:center;
                   justify-content:center;font-size:11px;font-weight:700;color:var(--accent-ink);}
  .chap .meta{flex:1;min-width:0;}
  .chap .meta .t{font-size:15px;font-weight:700;}
  .chap .meta .s{font-size:12px;color:var(--sub);margin-top:2px;}
  .chap .go{color:#ccc;font-size:18px;flex-shrink:0;}

  /* ---------- mode picker (bottom sheet on chapter tap) ---------- */
  .sheet-wrap{position:fixed;inset:0;background:rgba(0,0,0,.35);
              display:none;align-items:flex-end;justify-content:center;z-index:40;}
  .sheet-wrap.show{display:flex;}
  .sheet{width:100%;max-width:500px;background:var(--bg);border-radius:22px 22px 0 0;
         padding:22px 20px calc(22px + env(safe-area-inset-bottom));animation:rise .25s ease;}
  @keyframes rise{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet h3{margin:0 0 2px;font-size:18px;font-weight:800;}
  .sheet .sub{font-size:13px;color:var(--sub);margin-bottom:18px;}

                   display:flex;flex-direction:column;align-items:center;gap:6px;transition:.15s;}

                     border-radius:12px;padding:11px;font-size:13px;font-weight:600;
                     color:#777;cursor:pointer;font-family:inherit;}
  .toggle-row button.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink);}

  .screen{display:none;flex-direction:column;flex:1;}

       font-family:inherit;color:var(--ink);}
  .opt:hover{border-color:#d8d8d8;}

  .opt.correct .n{border-color:var(--ok);background:var(--ok);color:#fff;}

  .opt.dim{opacity:.45;pointer-events:none;}
  .opt.locked{pointer-events:none;}

  .explain{margin-top:16px;background:var(--paper);border:1px solid var(--line);

           max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;}

  .explain .eh{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.1em;
               margin-bottom:6px;}

  .quiz-foot{margin-top:auto;padding-top:18px;}
  .next-btn{width:100%;border:none;background:var(--accent);color:#fff;font-size:15px;

  .fhint{text-align:center;font-size:12px;color:var(--sub);margin-top:12px;}
  .frow{display:flex;gap:10px;margin-top:16px;}

               font-size:14px;font-weight:600;padding:14px;border-radius:99px;cursor:pointer;
               font-family:inherit;}
  .frow button.prim{background:var(--accent);color:#fff;border-color:var(--accent);}
  .frow button:active{transform:scale(.99);}

  /* ---------- done ---------- */
  .done{padding:40px 24px;text-align:center;display:flex;flex-direction:column;
        align-items:center;gap:8px;flex:1;justify-content:center;}
  .done .big{font-size:54px;font-weight:800;color:var(--accent);line-height:1;}
  .done .lab{font-size:14px;color:var(--sub);}
  .done h2{font-size:20px;font-weight:800;margin:10px 0 2px;}
  .done .again{margin-top:24px;border:none;background:var(--accent);color:#fff;
               font-size:15px;font-weight:700;padding:15px 40px;border-radius:99px;
               cursor:pointer;font-family:inherit;}
  .done .home-link{margin-top:12px;border:none;background:none;color:var(--sub);
                   font-size:13px;cursor:pointer;text-decoration:underline;font-family:inherit;}

.sync-bar{display:flex;align-items:center;gap:10px;margin-top:10px;}
.sync-btn{font:inherit;font-size:13px;padding:6px 12px;border:1px solid var(--line,#e5e5e5);
  background:#fff;border-radius:999px;color:#555;cursor:pointer;line-height:1;}
.sync-btn:active{transform:scale(.97);}
.sync-status{font-size:12px;color:#888;min-height:16px;transition:color .2s;}
.sync-status.ok{color:#1a9d5a;}
.sync-status.warn{color:#c47b16;}


/* mikan風 結果画面 */
.level-delta{display:flex;flex-direction:column;gap:8px;width:100%;max-width:340px;margin:18px auto 6px;}

.lvbar{display:inline-flex;width:90px;height:7px;border-radius:4px;overflow:hidden;vertical-align:middle;gap:0;}

スが生じる", "choices": ["不完全燃焼で黒いススが生じる", "不完全燃焼で透明の気体となる", "完全燃焼で透明の気体となる", "すみやかに二酸化炭素と水になる"], "explain": "炭素の割合が多いものを空気中で燃焼させる[ 不完全燃焼で黒いススが生じる ]。\n★不完全燃焼では、酸素の供給が追いつかないため一酸化炭素COとスス(炭素の微粒子)が生じます。\n★「黒いスス」は「黒煙(こくえん)」とも表現されます。"}, {"q": "アセチレンやベンゼンを空気中で燃やすと、[____]。", "answer": "不完全燃焼で黒いススが生じる", "choices": ["不完全燃焼で黒いススが生じる", "不完全燃焼で透明の気体となる", "完全燃焼で透明の気体となる", "すみやかに二酸化炭素と水になる"], "explain": "アセチレンやベンゼンを空気中で燃やすと、[ 不完全燃焼で黒いススが生じる ]。\n★アセチレンH-C≡C-HやベンゼンC₆H₆のような、炭素と水素が1:1(50％ずつ)で構成される化合物(炭素の割合が多い化合物)は不完全燃焼により黒いススを生じます。"}, {"q": "炭素Cと水素Hのみでできた化合物を[____]と呼ぶ。", "answer": "炭化水素", "choices": ["炭化水素", "オキシド", "ニトロ化合物", "エステル"], "explain": "炭素Cと水素Hのみでできた化合物を[ 炭化水素 ]と呼ぶ。\n★炭化水素はCₓHᵣ\n★似ている用語に糖類である炭水化物Cₓ(H₂O)ᵣがあります。"}, {"q": "炭素原子間が全て単結合の炭化水素を[____]と呼ぶ。", "answer": "飽和炭化水素", "choices": ["飽和炭化水素", "環式不飽和炭化水素", "芳香族炭化水素", "脂環式不飽和炭化水素"], "explain": "炭素原子間が全て単結合の炭化水素を[ 飽和炭化水素 ]と呼ぶ。"}, {"q": "炭素原子間にC=C結合やC≡C結合を含む炭化水素を[____]と呼ぶ。", "answer": "不飽和炭化水素", "choices": ["不飽和炭化水素", "飽和炭化水素", "鎖式飽和炭化水素", "環式飽和炭化水素"], "explain": "炭素原子間にC=C結合やC≡C結合を含む炭化水素を[ 不飽和炭化水素 ]と呼ぶ。"}, {"q": "枝分かれのない鎖状構造を[____]と呼ぶ。", "answer": "直鎖状構造", "choices": ["直鎖状構造", "分枝状構造", "環状構造", "架橋構造"], "explain": "枝分かれのない鎖状構造を[ 直鎖状構造 ]と呼ぶ。"}, {"q": "枝分かれのある鎖状構造を[____]と呼ぶ。", "answer": "分枝状構造", "choices": ["分枝状構造", "直鎖状構造", "環状構造", "立体構造"], "explain": "枝分かれのある鎖状構造を[ 分枝状構造 ]と呼ぶ。\n★分枝(ぶんし)と読みます。"}, {"q": "分子が鎖状構造の炭化水素を[____]と呼ぶ。", "answer": "鎖式炭化水素", "choices": ["鎖式炭化水素", "環式炭化水素", "芳香族炭化水素", "脂環式炭化水素"], "explain": "分子が鎖状構造の炭化水素を[ 鎖式炭化水素 ]と呼ぶ。\n★脂肪族炭化水素とも呼びます。"}, {"q": "分子が鎖状構造の炭化水素を[____]と呼ぶ。", "answer": "脂肪族炭化水素", "choices": ["脂肪族炭化水素", "環式炭化水素", "芳香族炭化水素", "脂環式炭化水素"], "explain": "分子が鎖状構造の炭化水素を[ 脂肪族炭化水素 ]と呼ぶ。\n★鎖式炭化水素とも呼びます。"}, {"q": "鎖式炭化水素は他に[____]と呼ばれる。", "answer": "脂肪族炭化水素", "choices": ["脂肪族炭化水素", "環式炭化水素", "芳香族炭化水素", "脂環式炭化水素"], "explain": "鎖式炭化水素は他に[ 脂肪族炭化水素 ]と呼ばれる。"}, {"q": "分子が環状構造の炭化水素を[____]と呼ぶ。", "answer": "環式炭化水素", "choices": ["環式炭化水素", "脂肪族炭化水素", "鎖式不飽和炭化水素", "鎖式飽和炭化水素"], "explain": "分子が環状構造の炭化水素を[ 環式炭化水素 ]と呼ぶ。"}, {"q": "有機  "アルケン"], "explain": "不飽和でC=C結合を1個含む脂環式炭化水素を[ シクロアルケン ]と呼ぶ。\n★化学式はCₓH₂ₓ₋₂、アルキンと同じです。"}, {"q": "[____]の分子は単結合のみである。", "answer": "飽和炭化水素", "choices": ["飽和炭化水素", "環式不飽和炭化水素", "芳香族炭化水素", "脂環式不飽和炭化水素"], "explain": "[ 飽和炭化水素 ]の分子は単結合のみである。"}, {"q": "[____]の分子は炭素間に二重結合や三重結合を含む。", "answer": "不飽和炭化水素", "choices": ["不飽和炭化水素", "飽和炭化水素", "鎖式飽和炭化水素", "環式飽和炭化水素"], "explain": "[ 不飽和炭化水素 ]の分子は炭素間に二重結合や三重結合を含む。\n★不飽和は炭素間二重結合や三重結合を意味します。C=C、C≡C。"}, {"q": "[____]の分子は鎖状構造のみの分子である。", "answer": "脂肪族炭化水素", "choices": ["脂肪族炭化水素", "脂環式飽和炭化水素", "芳香族炭化水素", "脂環式不飽和炭化水素"], "explain": "[ 脂肪族炭化水素 ]の分子は鎖状構造のみの分子である。\n★鎖式炭化水素と同じ意味です。"}, {"q": "[____]の分子は環状構造を含む分子である。", "answer": "脂環式炭化水素", "choices": ["脂環式炭化水素", "脂肪族炭化水素", "鎖式不飽和炭化水素", "鎖式飽和炭化水素"], "explain": "[ 脂環式炭化水素 ]の分子は環状構造を含む分子である。\n★芳香環でない環状構造を持ちます。"}, {"q": "[____]の分子は環状構造を含む分子である。", "answer": "芳香族炭化水素", "choices": ["芳香族炭化水素", "脂肪族炭化水素", "鎖式不飽和炭化水素", "鎖式飽和炭化水素"], "explain": "[ 芳香族炭化水素 ]の分子は環状構造を含む分子である。\n★ベンゼン環やナフタレン環などの芳香環を持ちます。"}, {"q": "エタンは[____]に分類される。", "answer": "飽和脂肪族炭化水素", "choices": ["飽和脂肪族炭化水素", "不飽和脂肪族炭化水素", "不飽和脂環式炭化水素", "芳香族炭化水素"], "explain": "エタンは[ 飽和脂肪族炭化水素 ]に分類される。\n★化学式C₂H₆、簡易構造式CH₃-CH₃、ethane\n★アルカン、鎖式飽和炭化水素、飽和鎖式炭化水素も同じ意味です。"}, {"q": "エチレンは[____]に分類される。", "answer": "不飽和脂肪族炭化水素", "choices": ["不飽和脂肪族炭化水素", "飽和脂肪族炭化水素", "不飽和脂環式炭化水素", "芳香族炭化水素"], "explain": "エチレンは[ 不飽和脂肪族炭化水素 ]に分類される。\n★化学式C₂H₄、簡易構造式CH₂=CH₂、エチレン(ethylene)は慣用名、IUPAC命名法ではエテン(ethene)です。\n★鎖式不飽和炭化水素、不飽和鎖式炭化水素も同じ意味です。\n★C=Cが1つなのでアルケンともいえます。"}, {"q": "アセチレンは[____]に分類される。", "answer": "不飽和脂肪族炭化水素", "choices": ["不飽和脂肪族炭化水素", "飽和脂肪族炭化水素", "不飽和脂環式炭化水素", "芳香族炭化水素"], "explain": "アセチレンは[ 不飽和脂肪族炭化水素 ]に分類される。\n★化学式C₂H₂、構造式H-C≡C-H、アセチレン(acetylene) は炭素数が2のアルキンです。IUPAC命名法ではエチン(ethyne)\n★鎖式不飽和炭化水素、不飽和鎖式炭化水素も同じ意味です。"}, {"q": "シクロヘキサンは[____]に分類される。", "answer": "飽和脂環式炭化水素", "choices": ["飽和脂環式炭化水素", "不飽和脂肪族炭化水素", "不飽和脂環式炭化水素", "芳香族炭化水素"], "explain": "シクロヘキサンは[ 飽和脂環式炭化水素 ]に分類される。\n★シクロヘキサン(cyclohexane) は、分子式 C₆H₁₂\n★芳香族炭化水素を除く環式炭化水素を脂環式炭化水素と呼びます。"}, {"q": "シクロヘキセンは[____]に分類される。", "answer": "不飽和脂環式炭化水素", "choices": ["不飽和脂環式炭化水素", "不飽和脂肪族炭化水素", "飽和脂環式炭化水素", "芳香族炭化水素"], "explain": "シクロヘキセンは[ 不飽和脂環式炭化水素 ]に分類される。\n★シクロヘキセン(cyclohexene) は、分子式 C₆H₁₀\n ★芳香族炭化水素を除く環式炭化水素を脂環式炭化水素と呼びます。"}, {"q": "ベンゼンは[____]に分類される。", "answer": "芳香族炭化水素", "choices": ["芳香族炭化水素", "不飽和脂環式炭化水素", "不飽和脂肪族炭化水素", "飽和脂環式炭化水素"], "explain": "ベンゼンは[ 芳香族炭化水素 ]に分類される。\n★ベンゼン(benzene)は分子式 C₆H₆、分子量78です。この分子量78も使用頻度は高いです。(連想、沖縄県の県庁所在地 那覇(なは78)"}, {"q": "ナフタレンは[____]に分類される。", "answer": "芳香族炭化水素", "choices": ["芳香族炭化水素", "不飽和脂環式炭化水素", "不飽和脂肪族炭化水素", "飽和脂環式炭化水素"], "explain": "ナフタレンは[ 芳香族炭化水素 ]に分類される。\n★ナフタレン(naphthalene)は、分子式C₁₀H₈、分子量128。\n★ベンゼン環とナフタレン環を「芳香環」と答えさせる出題もあります。"}, {"q": "エタンは[____]に分類される。", "answer": "アルカン", "choices": ["アルカン", "シクロアルカン", "アルケン", "アルキン"], "explain": "エタンは[ アルカン ]に分類される。\n★「C-Cのみ、C=C1つ、C≡C1つ」の順に「アルカン、アルケン、アルキン」と覚えます。\n★化学式C₂H₆、簡易構造式CH₃-CH₃、エタン(ethane)\n★飽和脂肪族炭化水素、鎖式飽和炭化水素、飽和鎖式炭化水素も同じ意味です。"}, {"q": "エチレンは[____]に分類される。", "answer": "アルケン", "choices": ["アルケン", "アルカン", "シクロアルカン", "シクロアルケン"], "explain": "エチレンは[ アルケン ]に分類される。\n★「C-Cのみ、C=C1つ、C≡C1つ」の順に「アルカン、アルケン、アルキン」と覚えます。★C=Cが1つなのでアルケンです。\n★化学式C₂H₄、簡易構造式CH₂=CH₂、エチレン(ethylene)は慣用名、IUPAC命名法ではエテン(ethene)です。"}, {"q": "アセチレンは[____]に分類される。", "answer": "アルキン", "choices": ["アルキン", "アルケン", "アルカン", "シクロアルカン"], "explain": "アセチレンは[ アルキン ]に分類される。\n★「C-Cのみ、C=C1つ、C≡C1つ」の順に「アルカン、アルケン、アルキン」と覚えます。★C≡Cが1つなのでアルキンです。\n★化学式C₂H₂、構造式H-C≡C-H、アセチレン(acetylene) はIUPAC命名法ではエチン(ethyne)です。"}, {"q": "シクロヘキサンは[____]に分類される。", "answer": "シクロアルカン", "choices": ["シクロアルカン", "シクロアルケン", "アルケン", "アルカン"], "explain": "シクロヘキサンは[ シクロアルカン ]に分類される。\n★シクロヘキサン(cyclohexane) は、分子式C₆H₁₂です。シクロ(cyclo)は環状構造、ヘキサンの「サン」はアルカン(飽和鎖式炭化水素)の「カン」に対応します。"}, {"q": "シクロヘキセンは[____]に分類される。", "answer": "シクロアルケン", "choices": ["シクロアルケン", "シクロアルカン", "アルキン", "アルケン"], "explain": "シクロヘキセンは[ シクロアルケン ]に分類される。\n★シクロヘキセン(cyclohexene) は、分子式C₆H₁₀です。シクロ(cyclo)は環状構造、ヘキセンの「セン」はアルケン(C=C1つ)の「ケン」に対応します。"}]}, {"code": "A2", "name": "異性体", "parent": "炭化水素", "questions": [{"q": "分子式が同じで構造が異なる化合物を[____]と呼ぶ。", "answ l\n★エタンの燃焼熱を例に熱化学方程式で書くと、\nC₂H₆ + 7/2 O₂ = 2CO₂ + 3H₂O + 1561kJ\nと書けます。"}, {"q": "アルカンの燃焼反応は[____](反応)であり、アルカンは[____]として利用される。", "answer": "発熱反応、燃料", "choices": ["発熱反応、燃料", "発熱反応、蛍光灯", "吸熱反応、燃料", "吸熱反応、冷却剤"], "explain": "アルカンの燃焼反応は[ 発熱反応 ]であり、アルカンは[ 燃料 ]として利用される。"}, {"q": "分子中の原子や原子団が、他の原子や原子団と置き換わる反応を[____]という。", "answer": "置換反応", "choices": ["置換反応", "付加反応", "重合反応", "脱水反応"], "explain": "分子中の原子や原子団が、他の原子や原子団と置き換わる反応を[ 置換反応 ]という。"}, {"q": "新たに置換された原子や原子団を[____]と呼ぶ。", "answer": "置換基", "choices": ["置換基", "官能基", "炭化水素基", "置換体"], "explain": "新たに置換された原子や原子団を[ 置換基 ]と呼ぶ。"}, {"q": "置換反応により生成した分子を[____]という。", "answer": "置換体", "choices": ["置換体", "異性体", "炭化水素", "置換基"], "explain": "置換反応により生成した分子を[ 置換体 ]という。"}, {"q": "アルカンに塩素や臭素を混合すると[____](が起こる)。", "answer": "反応しない", "choices": ["反応しない", "付加反応", "置換反応", "脱水反応"], "explain": "アルカンに塩素や臭素を混合すると[ 反応しない ]。"}, {"q": "アルカンに塩素や臭素を混合し、光を照射すると[____](が起こる)。", "answer": "置換反応", "choices": ["置換反応", "付加反応", "反応しない", "脱水反応"], "explain": "アルカンに塩素や臭素を混合し、光を照射すると[ 置換反応 ]が起こる。\n★メタンと塩素では、\n★CH₄ + Cl₂ → CH₃Cl + HCl (光・紫外線)\nのように反応します。最終的にCCl₄まで反応が進みます。"}, {"q": "メタンを十分な塩素と混合し、光を照射すると最終的に[____]となる。", "answer": "テトラクロロメタン(四塩化炭素)", "choices": ["テトラクロロメタン(四塩化炭素)", "塩化水素", "ジクロロエタン", "クロロメタン"], "explain": "メタンを十分な塩素と混合し、光を照射すると最終的に[ テトラクロロメタン(四塩化炭素) ]となる。\n★CH₄ → CH₃Cl → CH₂Cl₂ → CHCl₃ → CCl₄"}, {"q": "臭素とヘキサンの混合物を試験管に入れ、日光を当てながら振ると反応前の[____](色)が[____](色)へ変化する。", "answer": "赤褐色、無色", "choices": ["赤褐色、無色", "黄褐色、無色", "無色、赤褐色", "無色、黄褐色"], "explain": "臭素とヘキサンの混合物を試験管に入れ、日光を当てながら振ると反応前の[ 赤褐色 ]が[ 無色 ]へ変化する。\n★入試では「赤褐色が消えた」の表現が多いです。"}, {"q": "臭素とヘキサンの混合物を試験管に入れ、日光を当てながら振ると、気体の[____]が生じる。", "answer": "臭化水素HBr", "choices": ["臭化水素HBr", "塩化水素HCl", "臭化アンモニウムNH₄Br", "臭素Br₂"], "explain": "臭素とヘキサンの混合物を試験管に入れ、日光を当てながら振ると、気体の[ 臭化水素HBr ]が生じる。"}, {"q": "臭化水素HBrに濃アンモニア水の付いたガラス棒を近づけると[____]が生じる。", "answer": "臭化アンモニウムNH₄Brの白煙・微結晶", "choices": ["臭化アンモニウムNH₄Brの白煙・微結晶", "塩化アンモニウムNH₄Clの白煙・微結晶", "臭化アンモニウムNH₄Brの白色気体", "塩化アンモニウムNH₄Clの白色気体"], "explain": "臭化水素HBrに濃アンモニア水の付いたガラス棒を近づけると[ 臭化アンモニウムNH₄Brの白煙・微結晶 ]が生じる。\n★通常は塩化水素HClの検出に利用する操作ですが、臭化水素HBrも同様に反応します。高校教科書より。"}, {"q": "塩化水素HClに濃アンモニア水の付いたガラス棒を近づけると[____]が生じる。", "answer": "塩化アンモニウムNH₄Clの白煙・微結晶", "choices": ["塩化アンモニウムNH₄Clの白煙・微結晶", "臭化アンモニウムNH₄Brの白煙・微結晶", "臭化アンモニウムNH₄Brの白色気体", "塩化アンモニウムNH₄Clの白色気体"], "explain": "塩化水素HClに濃アンモニア水の付いたガラス棒を近づけると[ 塩化アンモニウムNH₄Clの白煙・微結晶 ]が生じる。"}, {"q": "水分子の籠状構造の中にメタン分子が取り込まれた固体燃料資源として期待される物質は[____]である。\n籠状構造(かごじょう構造)", "answer": "メタンハイドレート", "choices": ["メタンハイドレート", "ナフサ", "CNG(圧縮天然ガス)", "LNG(液化天然ガス)"], "explain": "水分子の籠状構造の中にメタン分子が取り込まれた固体燃料資源として期待される物質は[ メタンハイドレート ]である。\n★籠状構造(かごじょう構造)と読みます。教科書に記載があり、メディアに取り上げられることが多く常識問題のように出題されます。英文読解などにも出てきます(methane hydrate)。"}, {"q": "従来のガス田以外のメタン供給源としてシェールガス(頁岩気、けつがんき)やメタンハイドレートが注目を集めている。メタンハイドレートはメタンと水から成るが、わずかに二酸化炭素も含有する。シェールガスや二酸化炭素は、地球温暖化の原因と指摘されており、[____]と呼ばれる。", "answer": "温室効果ガス", "choices": ["温室効果ガス", "ノックス、ソックス", "CNG(圧縮天然ガス)", "LNG(液化天然ガス)"], "explain": "従来のガス田以外のメタン供給源としてシェールガス(頁岩気、けつがんき)やメタンハイドレートが注目を集めている。メタンハイドレートはメタンと水から成るが、わずかに二酸化炭素も含有する。シェールガスや二酸化炭素は、地球温暖化の原因と指摘されており、[ 温室効果ガス ]と呼ばれる。\n★慶應医2019年(選択肢なし)\n★二酸化炭素＝温室効果ガス、の言い換えを覚えます。\n★シェールガスは2009年頃には温室効果ガスを減らすタイプのガスと考えられていましたが、その後は従来の天然ガスよりも温室効果ガスの排出量が大きくなると考えられています。"}, {"q": "シクロアルカンの一般式をCₓH₂ₓで表すとき、xは[____](以上)である。*必要十分とする。", "answer": "3以上", "choices": ["3以上", "2以上", "4以上", "1以上"], "explain": "シクロアルカンの一般式をCₓH₂ₓで表すとき、xは[ 3以上 ]である。\n★環状構造を作るためには炭素が少なくとも3つ必要です。"}, {"q": "炭化水素において、環状構造を作るためには[____](以上)の炭素が必要である。*必要十分とする。", "answer": "3つ以上", "choices": ["3つ以上", "2つ以上", "4つ以上", "1つ以上"], "explain": "炭化水素において、環状構造を作るためには[ 3つ以上 ]の炭素が必要である。\n★環状構造を作るためには炭素が少なくとも3つ必要です。"}, {"q": "シクロヘキサン分子の形状は[____]である。", "answer": "いす形構造", "choices": ["いす形構造", "ふな形構造", "シス形構造", "トランス形構造"], "explain": "シクロヘキサン分子の形状は[ いす形構造 ]である。\n★シクロヘキサンC₆H₁₂の舟形は存在しないとしている教科書と、平衡混合物の99.9%以上がいす型、0.01%未満で舟型(ねじれ舟型)が存在するとしている教科書があります。"}, {"q": "シクロヘキサンに考えうる構造で実在しない形は[____]である。", "answer": "ふな形構造", "choices": ["ふな形構造", "いす形構造", "シス形構造", "トランス形構造"], "explain": "シクロヘキサンに考えうる構造で実在しない形は[ ふな形構造 ]である。\n★すぐにいす形構造へ変化し アルコール", "ペルオキシド", "グリコール"], "explain": "アルケンをオゾン分解してケトンとアルデヒドが生成するとき、その中間体として[ オゾニド ]が生じる。\n★オゾン分解では分解後にアルデヒドで酸化が止まるようにオゾニドを加水分解します。"}, {"q": "あるアルケンをオゾン分解したとき、アセトンCH₃COCH₃とアセトアルデヒドCH₃CHOが生成した。元のアルケンの名称は[____]。", "answer": "2-メチル-2-ブテン", "choices": ["2-メチル-2-ブテン", "2-メチル-2-ペンテン", "2-メチル-1-ブテン", "2-メチル-1-ペンテン"], "explain": "あるアルケンをオゾン分解したとき、アセトンCH₃COCH₃とアセトアルデヒドCH₃CHOが生成した。元のアルケンの名称は[ 2-メチル-2-ブテン ]。\n★それぞれのC=Oから酸素を取り、C=Cと繋げて推測します。\n★C(CH₃)₂=CHCH₃ →(オゾン分解)→ C(CH₃)₂=O + O=CHCH₃ つまり、CH₃COCH₃ + CH₃CHO"}, {"q": "2-メチル-2-ブテンをオゾン分解すると[____]が生じる。", "answer": "アセトンとアセトアルデヒド", "choices": ["アセトンとアセトアルデヒド", "アセトンとブテン", "メタンとアセトアルデヒド", "メタンとブテン"], "explain": "2-メチル-2-ブテンをオゾン分解すると[ アセトンとアセトアルデヒド ]が生じる。\n★二重結合C=Cの部分をC=O + O=Cのように分解します。\n★C(CH₃)₂=CHCH₃ →(オゾン分解)→ C(CH₃)₂=O + O=CHCH₃ つまり、CH₃COCH₃ + CH₃CHO"}, {"q": "アルケンを硫酸酸性のKMnO₄水溶液で酸化するとき、生成する可能性のある組み合わせは[____]である。", "answer": "ケトンとカルボン酸", "choices": ["ケトンとカルボン酸", "アルデヒドとカルボン酸", "ケトンとアルデヒド", "カルボン酸のみ"], "explain": "アルケンを硫酸酸性のKMnO₄水溶液で酸化するとき、生成する可能性のある組み合わせは[ ケトンとカルボン酸 ]である。\n★KMnO₄水溶液はアルデヒドをカルボン酸まで酸化します。*オゾン分解ではアルデヒドで止まります。"}, {"q": "アルケンを硫酸酸性のKMnO₄水溶液で酸化するとき、アルデヒドが生成しない理由は[____]ためである。", "answer": "アルデヒドがすぐに酸化されてカルボン酸になる", "choices": ["アルデヒドがすぐに酸化されてカルボン酸になる", "カルボン酸が酸化されずアルデヒドにならない", "アルデヒドがすぐに酸化されてカルボニル基(ケトン基)になる", "アルデヒドではなくエーテル結合となる"], "explain": "アルケンを硫酸酸性のKMnO₄水溶液で酸化するとき、アルデヒドが生成しない理由は[ アルデヒドがすぐに酸化されてカルボン酸になる ]ためである。\n★オゾン分解ではアルデヒドで止まります。"}, {"q": "ギ酸を硫酸酸性の過マンガン酸カリウム水溶液(KMnO₄水溶液)で酸化するときに生じる物質は[____]である。", "answer": "二酸化炭素と水(炭酸)", "choices": ["二酸化炭素と水(炭酸)", "二酸化炭素と水素(炭酸)", "ホルムアルデヒドと水素", "メタノールと水素"], "explain": "ギ酸を硫酸酸性の過マンガン酸カリウム水溶液(KMnO₄水溶液)で酸化するときに生じる物質は[ 二酸化炭素と水(炭酸) ]である。\n★ギ酸(カルボン酸)で止まらず炭酸まで酸化され、炭酸が熱分解して二酸化炭素と水になります。\n★HCOOH + (1/2)O₂ → H₂CO₃ → CO₂ + H₂O"}, {"q": "ギ酸が酸化されるとき、酸化されるのは[____](基)の部分である。", "answer": "ホルミル基(アルデヒド基)", "choices": ["ホルミル基(アルデヒド基)", "カルボキシ基", "カルボニル基(ケトン基)", "ヒドロキシ基"], "explain": "ギ酸が酸化されるとき、酸化されるのは[ ホルミル基(アルデヒド基) ]の部分である。\n★ギ酸はホルミル基(アルデヒド基)とカルボキシ基を持ちます。ギ酸HCO-OHを逆からかくと、HO-CHOとホルミル基-CHOが現れます。ホルミル基は還元性 : "乾性油と比較すると、不乾性油は不飽和脂肪酸の割合が[ 少ない ]。また、不乾性油は常温で[ 液体 ]の油脂である。\n★乾性油と不乾性油はどちらも脂肪油(常温で液体)です。C=C結合が酸化され重合していくことで固化するため、C=C結合が多い方が乾性油、少ない方が不乾性油となります。分子の形状と分子間力の考えとは逆なので注意して下さい。"}, {"q": "塗料や印刷インクに使われる油脂は[____]。", "answer": "乾性油", "choices": ["乾性油", "半乾性油", "硬化油", "不乾性油"], "explain": "塗料や印刷インクに使われる油脂は[ 乾性油 ]。\n★常温で塗りやすい液体であり、空気中で固化していくと考えると、乾性油となります。"}, {"q": "食用油や化粧品に使われる油脂は[____]。", "answer": "不乾性油", "choices": ["不乾性油", "乾性油", "油脂", "硬化油"], "explain": "食用油や化粧品に使われる油脂は[ 不乾性油 ]。\n★食用油は常温で固化しないので不乾性油です。食用油のごま油や菜種油など、半乾性油のものもあります。"}, {"q": "乾性油の用途として正しいものは[____]。", "answer": "塗料や印刷インク", "choices": ["塗料や印刷インク", "食用油や化粧品", "マーガリン", "牛脂、豚脂、バター"], "explain": "乾性油の用途として正しいものは[ 塗料や印刷インク ]。\n★乾性油は常温で液体で、空気中で固化していくと考えると、塗りやすく、塗った後に乾く(固化する)と都合のよい塗料や印刷インクを選べます。"}, {"q": "不乾性油の用途として正しいものは[____]。", "answer": "食用油や化粧品", "choices": ["食用油や化粧品", "塗料や印刷インク", "マーガリン", "牛脂、豚脂、バター"], "explain": "不乾性油の用途として正しいものは[ 食用油や化粧品 ]。\n★食用油のごま油や菜種油は半乾性油です。"}, {"q": "シス-トランス型のトランスからきていて、摂取は有害とされ規制されている脂肪酸は[____]。", "answer": "トランス脂肪酸", "choices": ["トランス脂肪酸", "シス脂肪酸", "ヒドロキシ酸", "トリカルボン酸"], "explain": "シス-トランス型のトランスからきていて、摂取は有害とされ規制されている脂肪酸は[ トランス脂肪酸 ]。\n★天然の脂肪油(脂肪酸の部分)のほとんどはシス型ですが、脂肪油に水素を付加することでトランス型の割合が増えます。水素の付加方法は改良はされていますが、マーガリンにもトランス脂肪酸が含まれています。"}, {"q": "紅花油、大豆油、ヤシ油は[____]に分類できる。", "answer": "脂肪油", "choices": ["脂肪油", "脂肪", "セッケン", "硬化油"], "explain": "紅花油、大豆油、ヤシ油は[ 脂肪油 ]に分類できる。\n★食用に利用する植物性油脂は脂肪油(液体の油脂)です。空気中で固まりにくい不乾性油もしくは半乾性油です。\n★脂肪は室温で固体の油脂です。\n硬化油は植物性油脂(液体の油脂、脂肪油)に水素を付加させ固化したもの。\n★セッケンは高級脂肪酸のナトリウム塩。"}, {"q": "牛脂(ヘット)、豚脂(ラード)、バターは[____]に分類できる。", "answer": "脂肪", "choices": ["脂肪", "脂肪油", "半乾性油", "乾性油"], "explain": "牛脂(ヘット)、豚脂(ラード)、バターは[ 脂肪 ]に分類できる。\n★動物性油脂の多くは脂肪(固体の油脂)です。"}, {"q": "マーガリンは[____]に分類できる。", "answer": "硬化油", "choices": ["硬化油", "不乾性油", "乾性油", "脂肪"], "explain": "マーガリンは[ 硬化油 ]に分類できる。\n★マーガリンは植物性油脂(液体の油脂、脂肪油)に水素を付加させ固化したものです。"}]}, {"code": "D6", "name": "セッケン1", "parent": "油脂・セッケン", "questions": [{"q": "セッケン分子は疎水基を[____]、親水基を[____]。", "answer": "もち、もつ", "choices": ["もち、もつ", "もち、もたない", "もたず、もつ", "もたず、もたない"], "explain": "セッケン分子は疎水基を[ もつ ]、親水基を[ もつ ]。\n★セッケンは高級脂肪酸のナトリウム塩です。油脂をけん化(塩基で加水分解)すると生じます。★炭化水素基の部分が疎水基、-COONaの部分が親水基です。"}, {"q": "セッケン分子の疎水基には[____](性)がある。", "answer": "親油性", "choices": ["親油性", "還元性", "親水性", "耐熱性"], "explain": "セッケン分子の疎水基には[ 親油性 ]がある。\n★高校化学での疎水基と親油基、疎水性と親油性は同じ意味です。"}, {"q": "セッケン分子の親油性のことを他に[____](性)という。", "answer": "疎水性", "choices": ["疎水性", "還元性", "親水性", "耐熱性"], "explain": "セッケン分子の親油性のことを他に[ 疎水性 ]という。\n★高校化学での疎水基と親油基、疎水性と親油性は同じ意味です。"}, {"q": "セッケン分子のうち、油汚れにくっつきやすい部分は[____]。", "answer": "疎水基", "choices": ["疎水基", "親水基", "ホルミル基(アルデヒド基)", "カルボニル基(ケトン基)"], "explain": "セッケン分子のうち、油汚れにくっつきやすい部分は[ 疎水基 ]。\n★親油性(疎水性)をもつのは疎水基です。"}, {"q": "セッケン分子が油汚れを囲んだ安定なコロイド粒子を[____]と呼ぶ。", "answer": "ミセル", "choices": ["ミセル", "にかわ", "ゼラチン", "懸濁液(サスペンション)"], "explain": "セッケン分子が油汚れを囲んだ安定なコロイド粒子を[ ミセル ]と呼ぶ。\n★セッケン分子は内側に疎水基(炭化水素基)を向け油汚れを取り囲み、外側には親水基(-COONa)を向けた状態になります。"}, {"q": "ミセルの性質として正しいものは[____]。", "answer": "コロイド粒子", "choices": ["コロイド粒子", "タンパク質", "脂肪酸", "カルボン酸"], "explain": "ミセルの性質として正しいものは[ コロイド粒子 ]。\n★セッケン分子は内側に疎水基(炭化水素基)を向け油汚れを取り囲み、外側には親水基(-COONa)を向けた状態になります。"}, {"q": "セッケンが油汚れをミセルとして水溶液中に分散させることを[____]という。", "answer": "乳化作用", "choices": ["乳化作用", "薬理作用", "消化作用", "塩析"], "explain": "セッケンが油汚れをミセルとして水溶液中に分散させることを[ 乳化作用 ]という。\n★乳化作用とは水と油のように本来はまざりあわないものを混ぜ合わせる作用のことです。★セッケン分子は内側に疎水基(炭化水素基)を向け油汚れを取り囲み、外側には親水基(-COONa)を向けた状態になります。"}, {"q": "乳化作用をもつ液体のことを[____]という。", "answer": "乳化剤", "choices": ["乳化剤", "還元剤", "界面活性剤", "ラテックス"], "explain": "乳化作用をもつ液体のことを[ 乳化剤 ]という。\n★乳化とは水と油のように本来はまざりあわないものが、混ざり合う現象のことです。乳化させる性質を乳化作用といいます。\n★比較：乳化作用でできた液体は乳濁液(エマルジョン)といいます。"}, {"q": "乳化作用でできた液体のことを[____]という。", "answer": "乳濁液", "choices": ["乳濁液", "懸濁液", "にかわ", "硬水"], "explain": "乳化作用でできた液体のことを[ 乳濁液 ]という。\n★乳濁液(にゅうだくえき)をエマルジョンともいいます。牛乳のように濁った液体です。★比較：乳化作用をもつ液体のことを乳化剤といいます。"}, {"q": "乳濁液のことを他に[____]という。", "answer": "エマルジョン", "choices": ["エマルジョン", "サスペンション", "にかわ", "硬水"], "explain": "乳濁液のことを他に[ エマルジョン ]という。\n★乳濁液(エマルジョン)は乳化作用でできた液体です。牛乳(水と乳脂肪)のように濁った液体です。\n★比較：乳化作用をもつ液体のことを乳化剤といいます。"}, {"q": "懸濁液のことを他に[____]という。", "answer": "サスペンション", "choices": ["サスペンション", "エマルジョン", "にかわ", "硬水"], "explain": "懸濁液のことを他に[ サスペンション ]という。\n★懸濁液(けんだくえき)は固体の微粒子が液体中に分散している混合物です。時間が経つと微粒子は沈んでいきます。懸案(未決定の案)の「懸」なので、懸濁液は「混ざりきっていない(濁った溶液)」と覚えるとよいと思います。"}, {"q": "乳化作用でできた液体のことを[____]という。", "answer": "エマルジョン", "choices": ["エマルジョン", "サスペンション", "にかわ", "硬水"], "explain": "乳化作用でできた液体のことを[ エマルジョン ]という。\n★エマルジョンを乳濁液(にゅうだくえき)ともいいます。牛乳(水と乳脂肪)のように濁った液体です。★比較：乳化作用をもつ液体のことを乳化剤といいます。"}, {"q": "セッケン水の水面におけるセッケン分子の向きは[____]となる。", "answer": "疎水基は上向き、親水基は下向き", "choices": ["疎水基は上向き、親水基は下向き", "疎水基と親水基が交互に上向き", "疎水基は下向き、親水基は上向き", "疎水基と親水基が交互に下向き"], "explain": "セッケン水の水面におけるセッケン分子の向きは[ 疎水基は上向き、親水基は下向き ]となる。\n★水面は空気(大気)と水の境目です。疎水基は空気(大気)へ向け、親水基を水へ向けます。通常は重力の関係で空気が上、水が下になります(念のため)。"}, {"q": "高級アルコールの硫酸エステル塩は[____]である。", "answer": "合成洗剤", "choices": ["合成洗剤", "セッケン", "ニトログリセリン", "油脂"], "explain": "高級アルコールの硫酸エステル塩は[ 合成洗剤 ]である。\n★合成洗剤は硫酸エステル塩、セッケンは高級脂肪酸のナトリウム塩です。"}, {"q": "合成洗剤とセッケンでは[____]の洗浄力が大きい。", "answer": "合成洗剤", "choices": ["合成洗剤", "セッケン", "ほぼ同じ", "バラバラなため比較できない"], "explain": "合成洗剤とセッケンでは[ 合成洗剤 ]の洗浄力が大きい。\n★合成洗剤は硫酸エステル塩、セッケンは高級脂肪酸のナトリウム塩です。"}, {"q": "セッケンの液性は[____]。", "answer": "アルカリ性", "choices": ["アルカリ性", "中性", "強酸性", "弱酸性"], "explain": "セッケンの液性は[ アルカリ性 ]。\n★高級脂肪酸(カルボン酸)由来の酸性よりもNaOH由来の強塩基性が強いのでアルカリ性と考えます。\n★参考にした教科書がアルカリ性となっていましたが、弱塩基性と表記しているものも多いです。"}, {"q": "無添加の合成洗剤の液性は[____]。", "answer": "中性", "choices": ["中性", "アルカリ性", "弱酸性", "強酸性"], "explain": "無添加の合成洗剤の液性は[ 中性 ]。\n★硫酸由来の強酸とNaOH由来の強塩基が打ち消しあって中性と考えます。"}, {"q": "市販されている多くの合成洗剤の液性は[____]。\n*添加物で調整され使いやすくなっているもの。", "answer": "アルカリ性", "choices": ["アルカリ性", "中性", "弱酸性", "強酸性"], "explain": "市販されている多くの合成洗剤の液性は[ アルカリ性 ]。\n*添加物で調整され使いやすくなっているもの。\n★無添加の合成洗剤は中性です。\n★アルカリ性は弱塩基性のことです。どちらでも可(試験では出題の表現に合わせてください)。"}, {"q": "セッケンは強酸を加えると[____]。", "answer": "洗浄力を失う", "choices": ["洗浄力を失う", "洗浄力を失わない", "一時的に洗浄力を失う", "洗浄力が増す"], "explain": "セッケンは強酸を加えると[ 洗浄力を失う ]。\n★弱酸遊離反応(弱酸追い出し反応)によりカルボン酸が遊離してセッケンとして機能しなくなります。"}, {"q": "合成洗剤は強酸を加えると[____]。", "answer": "洗浄力を失わない", "choices": ["洗浄力を失わない", "洗浄力を失う", "一時的に洗浄力を失う", "洗浄力が増す"], "explain": "合成洗剤は強酸を加えると[ 洗浄力を失わない ]。\n★合成洗剤は硫酸エステル塩(スルホン酸エステル塩)なので弱酸遊離反応(弱酸追い出し反応)は起こらず、合成洗剤の機能はそのままです。"}, {"q": "硬水中でセッケンを使うと[____]、洗浄力は[____]。", "answer": "沈殿を生じ、低下する", "choices": ["沈殿を生じ、低下する", "沈殿を生じ、変化しない", "沈殿せず、低下する", "沈殿せず、変化しない"], "explain": "硬水中でセッケンを使うと[ 沈殿を生じ ]、洗浄力は[ 低下する ]。\n★カルボキシ基-COO⁻の部分がCa²⁺やMg²⁺と反応して沈殿を生じセッケンの機能が低下します。"}, {"q": "海水中でセッケンを使うと[____]、洗浄力は[____]。", "answer": "沈殿を生じ、低下する", "choices": ["沈殿を生じ、低下する", "沈殿を生じ、変化しない", "沈殿せず、低下する", "沈殿せず、変化しない"], "explain": "海水中でセッケンを使うと[ 沈殿を生じ ]、洗浄力は[ 低下する ]。\n★カルボキシ基-COO⁻の部分がCa²⁺やMg²⁺と反応して沈殿が生じセッケンの機能が低下します。"}, {"q": "硬水中で合成洗剤を使うと[____]、洗浄力は[____]。", "answer": "沈殿せず、変化しない", "choices": ["沈殿せず、変化しない", "沈殿せず、低下する", "沈殿を生じ、低下する", "沈殿を生じ、変化しない"], "explain": "硬水中で合成洗剤を使うと[ 沈殿せず ]、洗浄力は[ 変化しない ]。"}, {"q": "海水中で合成洗剤を使うと[____]、洗浄力は[____]。", "answer": "沈殿せず、変化しない", "choices": ["沈殿せず、変化しない", "沈殿せず、低下する", "沈殿を生じ、低下する", "沈殿を生じ、変化しない"], "explain": "海水中で合成洗剤を使うと[ 沈殿せず ]、洗浄力は[ 変化しない ]。"}, {"q": "「セッケンの泡立ちが悪くなる」とあればセッケンの[____]を意味する。", "answer": "洗浄力の低下", "choices": ["洗浄力の低下", "洗浄力の向上", "洗浄力に変化なし", "洗浄力の再生"], "explain": "「セッケンの泡立ちが悪くなる」とあればセッケンの[ 洗浄力の低下 ]を意味する。\n★泡立たせると油汚れをより包み込みやすい状態になります。"}, {"q": "硬水は[____]である。", "answer": "Ca²⁺やMg²⁺を含む水", "choices": ["Ca²⁺やMg²⁺を含む水", "Ca²⁺やMg²⁺を含まない水", "コロイド溶液である", "セッケン水である"], "explain": "硬水は[ Ca²⁺やMg²⁺を含む水 ]である。\n★硬水と軟水の区別は厳密にはイオンの割合で決まります。水1リットル中に溶けているカルシウムとマグネシウムの量を表わした数値を「硬度」といいます。硬度が120mg/L以下を「軟水」、120mg/L以上を「硬水」といいます。"}, {"q": "カルシウムイオンCa²⁺やマグネシウムイオンMg²⁺を含む水のことを[____]という。", "answer": "硬水", "choices": ["硬水", "軟水", "乳濁液(エマルジョン)", "セッケン水"], "explain": "カルシウムイオンCa²⁺やマグネシウムイオンMg²⁺を含む水のことを[ 硬水 ]という。\n★硬水と軟水の区別は厳密にはイオンの割合で決まります。水1リットル中に溶けているカルシウムとマグネシウムの量を表わした数値を「硬度」といいます。硬度が120mg/L以下を「軟水」、120mg/L以上を「硬水」といいます。"}, {"q": "アルキル硫酸ナトリウムは[____]。", "answer": "AS(アルコール系合成洗剤)", "choices": ["AS(アルコール系合成洗剤)", "ABS(石油系合成洗剤)", "セッケン", "ラテックス"], "explain": "アルキル硫酸ナトリウムは[ AS(アルコール系合成洗剤) ]。\n★合成洗剤です。硫酸エステルのナトリウム塩です。\n★AS\nアルキル硫酸ナトリウム\nsodium alkylsulfateのAlkyl Sulfateです。sodiumはナトリウム。\n★ABS\nアルキルベンゼンスルホン酸ナトリウム\nsodium alkylbenzenesulfonateのAlkyl Benzene Sulfonateです。sodiumはナトリウム。"}, {"q": "アルキルベンゼンスルホン酸ナトリウムは[____]。", "answer": "ABS(石油系合成洗剤)", "choices": ["ABS(石油系合成洗剤)", "AS(アルコール系合成洗剤)", "セッケン", "ラテックス"], "explain": "アルキルベンゼンスルホン酸ナトリウムは[ ABS(石油系合成洗剤) ]。\n★合成洗剤です。硫酸エステルのナトリウム塩です。\n★AS\nアルキル硫酸ナトリウム\nsodium alkylsulfateのAlkyl Sulfateです。sodiumはナトリウム。\n★ABS\nアルキルベンゼンスルホン酸ナトリウム\nsodium alkylbenzenesulfonateのAlkyl Benzene Sulfonateです。sodiumはナトリウム。"}, {"q": "合成洗剤は[____]である。", "answer": "中性洗剤", "choices": ["中性洗剤", "還元剤", "セッケン", "ラテックス"], "explain": "合成洗剤は[ 中性洗剤 ]である。\n★無添加の合成洗剤の液性は中性なので中性洗剤です。合成洗剤は硫酸エステル塩(スルホン酸エステル塩)なので、硫酸由来の強酸とNaOH由来の強塩基が打ち消しあって中性と考えます。"}]}, {"code": "D6B", "name": "セッケン2", "parent": "油脂・セッケン", "questions": [{"q": "セッケンのように、水の表面張力を著しく低下させ、固体の表面を水に濡れやすくするような性質をもつ物質を[____]と呼ぶ。", "answer": "界面活性剤", "choices": ["界面活性剤", "乳化剤", "合成洗剤", "還元剤"], "explain": "セッケンのように、水の表面張力を著しく低下させ、固体の表面を水に濡れやすくするような性質をもつ物質を[ 界面活性剤 ]と呼ぶ。"}, {"q": "セッケンのように、界面の性質を変える働きをもつ物質を[____]と呼ぶ。", "answer": "界面活性剤", "choices": ["界面活性剤", "乳化剤", "合成洗剤", "還元剤"], "explain": "セッケンのように、界面の性質を変える働きをもつ物質を[ 界面活性剤 ]と呼ぶ。\n★主にセッケンが水の表面張力を著しく低下させる性質を指します。"}, {"q": "水よりもセッケン水の方が繊維に入り込みやすいのは[____]ためである。", "answer": "セッケン水は表面張力が低い", "choices": ["セッケン水は表面張力が低い", "セッケン水は表面張力が高い", "セッケン水は還元性がある", "セッケン水は極性が低い"], "explain": "水よりもセッケン水の方が繊維に入り込みやすいのは[ セッケン水は表面張力が低い ]ためである。\n★表面張力が大きい液体は水滴の状態(球形に近く表面積が最小)を保とうとします。逆に、表面張力が小さいと表面積が広くなり繊維と触れ合いやすく濡れやすくなります。"}, {"q": "液体が表面積をできるだけ小さくしようとする力を[____]という。", "answer": "表面張力", "choices": ["表面張力", "水素結合", "イオン結合", "共有結合"], "explain": "液体が表面積をできるだけ小さくしようとする力を[ 表面張力 ]という。"}, {"q": "液体の表面積が最小のとき、一般に[____](形)である。", "answer": "球形", "choices": ["球形", "平面状の円", "円柱形", "正四面体"], "explain": "液体の表面積が最小のとき、一般に[ 球形 ]である。\n★同体積の物質の表面積は球形で最小になります。中学・高校入試の算数・数学などでも出題されます。"}, {"q": "水が半分ほど入ったコップの水面はコップとの接触部分が少し高い。この持ち上げる力を[____]という。", "answer": "表面張力", "choices": ["表面張力", "水素結合", "イオン結合", "共有結合"], "explain": "水が半分ほど入ったコップの水面はコップとの接触部分が少し高い。この持ち上げる力を[ 表面張力 ]という。"}, {"q": "水が半分ほど入ったコップについて、水との接触部分が親水性のコップのとき、水の高さは中央より接触部分が[____]、撥水加工されたコップでは、中央より接触部分が[____]。", "answer": "高く、低い", "choices": ["高く、低い", "高く、高い", "低く、低い", "低く、高い"], "explain": "水が半分ほど入ったコップについて、水との接触部分が親水性のコップのとき、水の高さは中央より接触部分が[ 高く ]、撥水加工されたコップでは、中央より接触部分が[ 低い ]。\n★水をはじく性質を撥水といいます。"}, {"q": "コップに水をゆっくり注ぐとき、コップの最上位より少し高いところまで注ぐことができる。この保持力を[____]という。", "answer": "表面張力", "choices": ["表面張力", "水素結合", "イオン結合", "共有結合"], "explain": "コップに水をゆっくり注ぐとき、コップの最上位より少し高いところまで注ぐことができる。この保持力を[ 表面張力 ]という。"}, {"q": "セッケンや合成洗剤では、電離した[____]が界面活性を示し、逆性セッケンでは[____]が界面活性を示す。", "answer": "陰イオン、陽イオン", "choices": ["陰イオン、陽イオン", "陰イオン、陰イオン", "陽イオン、陽イオン", "陽イオン、陰イオン"], "explain": "セッケンや合成洗剤では、電離した[ 陰イオン ]が界面活性を示し、逆性セッケンでは[ 陽イオン ]が界面活性を示す。\n★逆性セッケンは陽イオンが界面活性をもつ界面活性剤です。陽性セッケンともいいます。★セッケンや合成洗剤では、陰イオン(R-COO⁻やR-OSO₃⁻)が界面活性を示します。"}, {"q": "逆性セッケンは[____]に分類できる。", "answer": "陽イオン界面活性剤", "choices": ["陽イオン界面活性剤", "陰イオン界面活性剤", "非イオン界面活性剤", "両性イオン界面活性剤"], "explain": "逆性セッケンは[ 陽イオン界面活性剤 ]に分類できる。\n★逆性セッケンは陽イオンが界面活性をもつ界面活性剤です。陽性セッケンともいいます。★セッケンや合成洗剤では、陰イオン(R-COO⁻やR-OSO₃⁻)が界面活性を示します。"}, {"q": "逆性セッケンの別名として正しいものは[____]。", "answer": "陽性セッケン", "choices": ["陽性セッケン", "合成洗剤", "陰性セッケン", "ビルダー"], "explain": "逆性セッケンの別名は[ 陽性セッケン ]。\n★逆性セッケンは陽イオンが界面活性をもつ界面活性剤です。陽性セッケンともいいます。★セッケンや合成洗剤では、陰イオン(R-COO⁻やR-OSO₃⁻)が界面活性を示します。"}, {"q": "セッケンは[____]に分類できる。", "answer": "陰イオン界面活性剤", "choices": ["陰イオン界面活性剤", "陽イオン界面活性剤", "非イオン界面活性剤", "両性イオン界面活性剤"], "explain": "セッケンは[ 陰イオン界面活性剤 ]に分類できる。\n★セッケンや合成洗剤では、陰イオン(R-COO⁻やR-OSO₃⁻)が界面活性を示します。"}, {"q": "AS、ABS、中性洗剤などは[____]に分類できる。", "answer": "陰イオン界面活性剤", "choices": ["陰イオン界面活性剤", "陽イオン界面活性剤", "非イオン界面活性剤", "両性イオン界面活性剤"], "explain": "AS、ABS、中性洗剤などは[ 陰イオン界面活性剤 ]に分類できる。\n★AS、ABS、中性洗剤は合成洗剤です。★セッケンや合成洗剤では、陰イオン(R-COO⁻やR-OSO₃⁻)が界面活性を示します。"}, {"q": "シャンプーは[____]に分類できる。", "answer": "陰イオン界面活性剤", "choices": ["陰イオン界面活性剤", "陽イオン界面活性剤", "非イオン界面活性剤", "両性イオン界面活性剤"], "explain": "シャンプーは[ 陰イオン界面活性剤 ]に分類できる。\n★シャンプーも油汚れを落とすものはセッケンや合成洗剤と同じ陰イオン界面活性剤に分類します。"}, {"q": "リンスやコンディショナーは[____]に分類できる。 : ["陽イオン界面活性剤", "陰イオン界面活性剤", "非イオン界面活性剤", "両性イオン界面活性剤"], "explain": "コンディショナー、リンス、消毒薬に用いられる界面活性剤は[ 陽イオン界面活性剤 ]である。\n★比較：シャンプーは陰イオン界面活性剤です。\n★比較：リンスインシャンプーは両性イオン界面活性剤です。"}]}, {"code": "D7", "name": "けん化、ヨウ素との反応", "parent": "油脂・セッケン", "questions": [{"q": "ヤシ油にエタノールと水酸化ナトリウムを加えて加熱することを[____]という。", "answer": "けん化", "choices": ["けん化", "転化", "エステル化", "塩析"], "explain": "ヤシ油にエタノールと水酸化ナトリウムを加えて加熱することを[ けん化 ]という。\n★ヤシ油を油脂と言い換えます。油脂はエステルなので塩基(NaOHやKOH)により加水分解が起こります。この加水分解をけん化といいます。★エタノールは油脂と塩基(NaOHやKOH)を混ざりやすくするための溶媒です。"}, {"q": "けん化後の反応液を飽和食塩水に注ぎ析出させる方法を[____]という。", "answer": "塩析", "choices": ["塩析", "けん化", "転化", "エステル化"], "explain": "けん化後の反応液を飽和食塩水に注ぎ析出させる方法を[ 塩析 ]という。\n★塩析(えんせき)とは、塩(えん)の強い水和力によって、水和力の弱い物質から水和水を奪い析出させる方法です。"}, {"q": "けん化後の反応液を塩化ナトリウムの飽和水溶液に注ぎ析出させる方法を[____]という。", "answer": "塩析", "choices": ["塩析", "けん化", "転化", "エステル化"], "explain": "けん化後の反応液を塩化ナトリウムの飽和水溶液に注ぎ析出させる方法を[ 塩析 ]という。\n★塩析(えんせき)とは、塩(えん)の強い水和力によって、水和力の弱い物質から水和水を奪い析出させる方法です。\n★比較：けん化は塩基(NaOHやKOHなど)による加水分解です。"}, {"q": "けん化後の反応液を塩化ナトリウムの飽和水溶液に注ぐと、[____](ため)析出がおこる。", "answer": "塩が水和水を奪うため", "choices": ["塩が水和水を奪うため", "中和反応が起こるため", "乳化作用が起こるため", "不飽和結合が酸化されるため"], "explain": "けん化後の反応液を塩化ナトリウムの飽和水溶液に注ぐと、[ 塩が水和水を奪うため ]析出がおこる。\n★この析出法を塩析(えんせき)といいます。塩(えん)によって析出させる方法です。"}, {"q": "塩(えん)の強い水和力によって、水和力の弱い物質から水和水を奪い析出させる方法を[____]という。", "answer": "塩析", "choices": ["塩析", "けん化", "転化", "エステル化"], "explain": "塩(えん)の強い水和力によって、水和力の弱い物質から水和水を奪い析出させる方法を[ 塩析 ]という。\n★この範囲では、強い水和力をもつ塩は飽和食塩水(飽和NaCl水溶液)、水和力の弱い物質は油脂のけん化後の反応液です。\n★比較：けん化は塩基(水酸化ナトリウムなど)による加水分解です。"}, {"q": "塩化ナトリウムの飽和水溶液と[____]は同じ物質である。", "answer": "飽和食塩水", "choices": ["飽和食塩水", "無水酢酸", "氷酢酸", "炭酸ナトリウム"], "explain": "塩化ナトリウムの飽和水溶液と[ 飽和食塩水 ]は同じ物質である。\n★食塩水や海水の主成分をNaCl水溶液とする言い換えは問題文や解説を読むためにも必要です。ただし、濃度100％ではありません。"}, {"q": "けん化した油脂を飽和食塩水へ加えると[____]が析出する。", "answer": "セッケン(固体)", "choices": ["セッケン(固体)", "ミセル", "水酸化ナトリウム", "高級脂肪酸"], "explain": "けん化した油脂を飽和食塩水へ加えると[ セッケン(固体) ]が析出する。\n★セッケンは高級脂肪酸のナトリウム塩です。油脂の加水分解により生じた脂肪酸ナトリウム塩をセッケンといいます。塩析により固体として析出します。"}, {"q": "試験管などと共に使う、ゴム栓にガ  "explain": "ニトロベンゼンの性質として正しいものは[ 爆発性がない ]。\n★ニトロベンゼンは、淡黄色の油状液体で、水より重く、水に溶けにくく、有機溶媒に溶けやすい、有毒な中性物質です。トリニトロトルエン(TNT)とは違い爆発性はありません。"}, {"q": "ニトロベンゼンがアニリン塩酸塩になるときの変化の説明として適切なものは[____]。", "answer": "淡黄色の油状物質が溶けて透明になる", "choices": ["淡黄色の油状物質が溶けて透明になる", "淡黄色の油状物質が生じる", "淡黄色の固体が溶けて透明になる", "淡黄色の固体(沈殿)が生じる"], "explain": "ニトロベンゼンがアニリン塩酸塩になるときの変化の説明として適切なものは[ 淡黄色の油状物質が溶けて透明になる ]。\n★ニトロベンゼンを還元してアニリンを生成する過程です。この文脈ではニトロベンゼンの油滴がなくなるまで反応させることを想定します。\n★ニトロベンゼンC₆H₅-NO₂は淡黄色の油状液体です。\n★アニリン塩酸塩は塩なので水溶液に溶けます(透明になる)。"}, {"q": "ニトロベンゼンがアニリン塩酸塩になるときの反応を[____]という。", "answer": "還元反応", "choices": ["還元反応", "加水分解", "アルカリ融解", "カップリング"], "explain": "ニトロベンゼンがアニリン塩酸塩になるときの反応を[ 還元反応 ]という。\n★ニトロベンゼンC₆H₅-NO₂\n★アニリン塩酸塩C₆H₅-NH₃Cl\nニトロベンゼンの酸素が取れて、水素がついているので還元だと判断できます。HClは酸化数0と考えます。"}, {"q": "ニトロベンゼンにNiまたはPtを触媒として水素を作用させると[____]が生成する。", "answer": "アニリン", "choices": ["アニリン", "アセトアニリド", "アニリン塩酸塩", "1-フェニルアゾ-2-ナフトール"], "explain": "ニトロベンゼンにNiまたはPtを触媒として水素を作用させると[ アニリン ]が生成する。\n★水素でニトロベンゼンを還元しています。\n★C₆H₅-NO₂ + 3H₂ → C₆H₅-NH₂ + 2H₂O (触媒 Ni or Pt)"}, {"q": "[____]にNiまたはPtを触媒として水素を作用させるとアニリンが生成する。", "answer": "ニトロベンゼン", "choices": ["ニトロベンゼン", "アセトアニリド", "アニリン塩酸塩", "1-フェニルアゾ-2-ナフトール"], "explain": "[ ニトロベンゼン ]にNiまたはPtを触媒として水素を作用させるとアニリンが生成する。\n★水素でニトロベンゼンを還元しています。\n★C₆H₅-NO₂ + 3H₂ → C₆H₅-NH₂ + 2H₂O (触媒 Ni or Pt)"}, {"q": "ニトロベンゼンに水素を作用させてアニリンを得るときの触媒として適切なものは[____]。", "answer": "NiまたはPt", "choices": ["NiまたはPt", "酸触媒", "酸化バナジウム(V)V₂O₅", "スズ(or 鉄)"], "explain": "ニトロベンゼンに水素を作用させてアニリンを得るときの触媒として適切なものは[ NiまたはPt ]。\n★水素でニトロベンゼンを還元しています。\n★C₆H₅-NO₂ + 3H₂ → C₆H₅-NH₂ + 2H₂O (触媒 Ni or Pt)"}, {"q": "ニトロベンゼンからアニリンを生成するときの反応は、ニトロベンゼンの[____]である。", "answer": "還元反応", "choices": ["還元反応", "加水分解", "アルカリ融解", "カップリング"], "explain": "ニトロベンゼンからアニリンを生成するときの反応は、ニトロベンゼンの[ 還元反応 ]である。\n★ニトロベンゼンC₆H₅-NO₂\n★アニリンC₆H₅-NH₂\nニトロベンゼンの酸素が取れて、水素がついているのでニトロベンゼンの還元反応と判断できます。全体では酸化還元反応です。"}]}, {"code": "F7", "name": "窒素を含む芳香族3", "parent": "芳香族2", "questions": [{"q": "-N=N-の名称は[____]。", "answer": "アゾ基", "choices": ["アゾ基", "ニトロ基", "シアノ基(ニトリル基)", "アミノ基"], "exp がら、亜硝酸ナトリウム水溶液を加えると[ 塩化ベンゼンジアゾニウム(水溶液) ]が生成する。\n★C₆H₅-NH₂ + NaNO₂ + 2HCl → [C₆H₅N≡N]⁺Cl⁻ + NaCl + 2H₂O"}, {"q": "アニリンから塩化ベンゼンジアゾニウムを生成するときの条件として適切なものは[____]。", "answer": "5°C以下に冷却", "choices": ["5°C以下に冷却", "高温高圧", "加熱のみ", "加圧のみ"], "explain": "アニリンから塩化ベンゼンジアゾニウムを生成するときの条件として適切なものは[ 5°C以下に冷却 ]。\n★C₆H₅-NH₂ + NaNO₂ + 2HCl → [C₆H₅-N≡N]⁺Cl⁻ + NaCl + 2H₂O"}, {"q": "アニリンを希塩酸に溶かし、5°C以下に冷却しながら、[____]を加えると塩化ベンゼンジアゾニウム(水溶液)が生成する。", "answer": "亜硝酸ナトリウム水溶液", "choices": ["亜硝酸ナトリウム水溶液", "2-ナフトールの水酸化ナトリウム水溶液", "p-ヒドロキシアゾベンゼン", "1-フェニルアゾ-2-ナフトール"], "explain": "アニリンを希塩酸に溶かし、5°C以下に冷却しながら、[ 亜硝酸ナトリウム水溶液 ]を加えると塩化ベンゼンジアゾニウム(水溶液)が生成する。\n★亜硝酸ナトリウム水溶液NaNO₂\n★C₆H₅-NH₂ + NaNO₂ + 2HCl → [C₆H₅-N≡N]⁺Cl⁻ + NaCl + 2H₂O"}, {"q": "亜硝酸ナトリウムの化学式は[____]。", "answer": "NaNO₂", "choices": ["NaNO₂", "NaNO₃", "NaNO", "Na₂NO₃"], "explain": "亜硝酸ナトリウムの化学式は[ NaNO₂ ]。\n★亜硝酸の「亜(〜酸)」は「酸素が一つ少ない」の意味です。\n★硝酸HNO₃\n★亜硝酸HNO₂\n★硝酸ナトリウムNaNO₃\n★亜硝酸ナトリウムNaNO₂"}, {"q": "アニリンから塩化ベンゼンジアゾニウムを生成するときの反応を[____]という。", "answer": "ジアゾ化", "choices": ["ジアゾ化", "熱分解(加水分解)", "アミド化", "ニトロ化"], "explain": "アニリンから塩化ベンゼンジアゾニウムを生成するときの反応を[ ジアゾ化 ]という。\n★ジアゾ化はジアゾニオ基-N⁺≡Nをもつジアゾニウム化合物R-N⁺≡Nを作る反応です。★カップリング(ジアゾカップリング)は、アゾ基-N=N-をもつ化合物(アゾ化合物)を作る反応です。\n★C₆H₅-NH₂ + NaNO₂ + 2HCl → [C₆H₅-N≡N]⁺Cl⁻ + NaCl + 2H₂O\n★ジアゾニオ基-N⁺≡N\n★ジアゾニウム化合物R-N⁺≡N"}, {"q": "塩化ベンゼンジアゾニウム(水溶液)は5°C以上になると[____]へ変化する。", "answer": "窒素とフェノールと塩酸", "choices": ["窒素とフェノールと塩酸", "アニリンと塩酸", "ニトロベンゼンと塩酸", "窒素とアニリン塩酸塩"], "explain": "塩化ベンゼンジアゾニウム(水溶液)は5°C以上になると[ 窒素とフェノールと塩酸 ]へ変化する。\n★塩化ベンゼンジアゾニウム(水溶液)を熱すると一部が分解して窒素を発生し、フェノールが生じます。\n★[C₆H₅-N≡N]⁺Cl⁻ + H₂O → C₆H₅-OH + HCl + N₂"}, {"q": "5°C以上になると窒素とフェノールと塩酸に分解される物質(水溶液)は[____]。", "answer": "塩化ベンゼンジアゾニウム", "choices": ["塩化ベンゼンジアゾニウム", "2-ナフトールの水酸化ナトリウム水溶液", "亜硝酸ナトリウム水溶液", "1-フェニルアゾ-2-ナフトール"], "explain": "5°C以上になると窒素とフェノールと塩酸に分解される物質(水溶液)は[ 塩化ベンゼンジアゾニウム ]。\n★塩化ベンゼンジアゾニウム(水溶液)を熱すると一部が分解して窒素を発生し、フェノールが生じます。\n★[C₆H₅-N≡N]⁺Cl⁻ + H₂O → C₆H₅-OH + HCl + N₂"}, {"q": "塩化ベンゼンジアゾニウムを5°C以上にしたとき、窒素とフェノールと塩酸に分解される反応を[____]という。", "answer": "熱分解(加水分解)", "choices": ["熱分解 const LS_KEY = 'yuukikagaku_progress_v1';
const UID_KEY = 'yuukikagaku_userid_v1';
const QUEUE_KEY = 'yuukikagaku_sync_queue_v1';
const GAS_URL = "https://script.google.com/macros/s/AKfycbxzSyhZakYdLJ2kYgczpUlpVW4H-ORJksS2JIa-NDOEGmIUEUbFDK9TnLqRywmiT6D0zA/exec";

let progress = loadProgress();

function loadProgress(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }
  catch(e){ return {}; }
}
function saveProgress(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(progress)); }catch(e){}
  cloudPush(); // 自動でクラウドへ
}

/* ---------------- CLOUD SYNC ---------------- */
function getUserId(){ try{ return localStorage.getItem(UID_KEY)||''; }catch(e){ return ''; } }
function getCloudId(){ const u=getUserId(); return u ? (u + '__yuuki') : ''; }
function setUserId(id){ try{ localStorage.setItem(UID_KEY, id); }catch(e){} }

function setSyncStatus(text, kind){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  el.textContent = text;
  el.className = 'sync-status' + (kind?(' '+kind):'');
  if(kind==='ok'){
    clearTimeout(setSyncStatus._t);
    setSyncStatus._t = setTimeout(()=>{ el.textContent=''; el.className='sync-status'; }, 1800);
  }
}

let cloudPushTimer = null;
let cloudPushing = false;
function cloudPush(){
  const uid = getUserId();
  if(!uid) return;             // ID未設定なら同期しない
  // 連打を間引いて、最後の状態だけ送る
  clearTimeout(cloudPushTimer);
  cloudPushTimer = setTimeout(doCloudPush, 800);
}

async function doCloudPush(){
  const uid = getUserId();
  if(!uid){ return; }
  if(cloudPushing){ cloudPush(); return; } // 送信中なら後でもう一度
  cloudPushing = true;
  setSyncStatus('同期中…');
  const payload = JSON.stringify({ userId: getCloudId(), data: progress });
  try{
    // text/plain にするとCORSのプリフライトを避けられる
    await fetch(GAS_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: payload
    });
    setSyncStatus('同期しました ✓', 'ok');
    try{ localStorage.removeItem(QUEUE_KEY); }catch(e){}
  }catch(err){
    // オフライン等。あとで送るためにキューへ
    try{ localStorage.setItem(QUEUE_KEY, '1'); }catch(e){}
    setSyncStatus('オフライン（後で同期）', 'warn');
  }finally{
    cloudPushing = false;
  }
}

async function cloudPull(){
  const uid = getUserId();
  if(!uid) return false;
  setSyncStatus('読み込み中…');
  try{
    const res = await fetch(GAS_URL + '?userId=' + encodeURIComponent(getCloudId()));
    const j = await res.json();
    if(j && j.ok && j.data && typeof j.data==='object'){
      progress = j.data;
      try{ localStorage.setItem(LS_KEY, JSON.stringify(progress)); }catch(e){}
      setSyncStatus('読み込み完了 ✓', 'ok');
      return true;
    }
    setSyncStatus('', 'ok');
    return false;
  }catch(err){
    setSyncStatus('オフライン', 'warn');
    return false;
  }
}

// 起動時：IDがあればクラウドから読み込んで画面更新。なければID入力を促す。
async function initCloud(){
  // オフライン中にためた変更があれば送る
  window.addEventListener('online', ()=>{ if(getUserId()) doCloudPush(); });

  let uid = getUserId();
  if(!uid){
    openUidDialog(true); // 初回
    return;
  }
  const ok = await cloudPull();
  if(ok){
    if(typeof renderHome==='function') renderHome();
  }
}

  const cur = getUserId();

    : '同期に使うIDです。別の端末と同じIDにすると進捗が揃います。';
  const id = window.prompt(msg, cur || '');
  if(id===null) return;       // キャンセル
  const v = id.trim();
  if(!v) return;
  setUserId(v);
  // ID設定直後：まずクラウドにデータがあれば取り込み、無ければ今のローカルを送る
  cloudPull().then(found=>{
    if(found){ if(typeof renderHome==='function') renderHome(); }
    else { doCloudPush(); }
  });
}
// progress shape:
//   progress.chapters[code] = {correct, attempts}            // 章集計(既存互換)
//   progress.words[wordId]  = {c:正解回数, w:不正解回数}      // 問題単位(mikan)
// 旧データ({code:{correct,attempts}})からの移行も行う
function migrateProgress(){
  if(!progress.words || !progress.chapters){
    const old = progress;
    progress = {chapters:{}, words:{}};
    for(const k in old){
      if(old[k] && typeof old[k]==='object' && ('attempts' in old[k])){
        progress.chapters[k] = {correct:old[k].correct||0, attempts:old[k].attempts||0};
      }
    }
  }
  if(!progress.chapters) progress.chapters={};
  if(!progress.words) progress.words={};
}
migrateProgress();

function chapProgress(code){
  if(!progress.chapters[code]) progress.chapters[code] = {correct:0, attempts:0};
  return progress.chapters[code];
}

// 各問題に一意IDを付与（章コード + インデックス）
function wordId(chapterCode, idx){ return chapterCode + '#' + idx; }
function wordStat(id){
  if(!progress.words[id]) progress.words[id] = {c:0, w:0};
  return progress.words[id];
}

// mikan習熟度ロジック:
//  公式仕様「覚えた」にするには正解回数が不正解回数と同じか上回る必要がある。
//  4段階を 正解数 c と 不正解数 w から判定する。
//  - 未学習: c+w===0 -> null
//  - 苦手   : w>c
//  - うろ覚え: w===c (まだ覚えたに届かない) かつ 学習済
//  - ほぼ覚えた: c>w かつ c-w<3
//  - 覚えた : c>w かつ c-w>=3
function levelOf(id){
  const s=progress.words[id]; if(!s||(s.c+s.w)===0) return null;
  if(s.w>s.c) return 'weak';        // 苦手
  if(s.w===s.c) return 'vague';     // うろ覚え
  if(s.c-s.w>=3) return 'known';    // 覚えた
  return 'almost';                  // ほぼ覚えた
}
const LEVELS=['known','almost','vague','weak'];
const LEVEL_LABEL={known:'覚えた',almost:'ほぼ覚えた',vague:'うろ覚え',weak:'苦手'};
const LEVEL_COLOR={known:'#1a9d5a',almost:'#46c07a',vague:'#9bcf3f',weak:'#3b86f0'};
// 出題優先度の重み（大きいほど出やすい）
const LEVEL_WEIGHT={weak:5, vague:4, almost:2, known:1};
const NEW_WEIGHT=3; // 未学習

// 章内の習熟度別カウント
function chapterLevelCounts(c){
  const counts={known:0,almost:0,vague:0,weak:0,none:0};
  c.questions.forEach((q,idx)=>{
    const lv=levelOf(wordId(c.code,idx));
    counts[lv||'none']++;
  });
  return counts;
}

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

// 問題に元インデックスを保持させて返す（wordId算出のため）
function withIdx(chapter){
  return chapter.questions.map((q,idx)=>Object.assign({}, q, {_idx:idx, _code:chapter.code}));
}
// 間隔反復つきの出題選択: 苦手/うろ覚え/未学習を優先しつつランダム性も持たせる
function pickSpaced(chapter, count){
  const pool=withIdx(chapter);
  const weighted=pool.map(q=>{
    const lv=levelOf(wordId(q._code,q._idx));
    const w = lv? LEVEL_WEIGHT[lv] : NEW_WEIGHT;
    return {q, key: Math.random()/ w}; // keyが小さいほど優先(=重み大ほど前)
  });
  weighted.sort((a,b)=>a.key-b.key);
  let picked=weighted.map(x=>x.q);
  if(count>0) picked=picked.slice(0,count);
  return shuffle(picked); // 出題順は混ぜる
}
// 苦手復習: 苦手・うろ覚えだけ集める
function pickReview(chapter, count){
  const pool=withIdx(chapter).filter(q=>{
    const lv=levelOf(wordId(q._code,q._idx));
    return lv==='weak'||lv==='vague';
  });
  let picked=shuffle(pool);
  if(count>0) picked=picked.slice(0,count);
  return picked;
}
// 章全体の苦手数
function chapterWeakCount(c){
  const cc=chapterLevelCounts(c); return cc.weak+cc.vague;
}

/* ---------------- HOME ---------------- */
let activeParent = DATA.parents[0];

function renderHome(){
  // stats
  const total = DATA.chapters.reduce((s,c)=>s+c.questions.length,0);
  // 学習済(=1回以上回答した問題数) と 覚えた数
  let learned=0, known=0;
  DATA.chapters.forEach(c=>c.questions.forEach((q,idx)=>{
    const lv=levelOf(wordId(c.code,idx));
    if(lv){ learned++; if(lv==='known') known++; }
  }));
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = learned;
  document.getElementById('statRate').textContent = learned? Math.round(known/learned*100)+'%' : '0%';

  // segmented parents
  const seg = document.getElementById('seg');
  seg.innerHTML='';
  DATA.parents.forEach(p=>{
    const b=document.createElement('button');
    b.textContent=p; if(p===activeParent) b.classList.add('on');
    b.onclick=()=>{activeParent=p; renderHome();};
    seg.appendChild(b);
  });

  // chapter cards
  const wrap = document.getElementById('chapters');
  wrap.innerHTML='';
  DATA.chapters.filter(c=>c.parent===activeParent).forEach(c=>{
    const pr = progress.chapters[c.code];
    const cc = chapterLevelCounts(c);
    const learned = cc.known+cc.almost+cc.vague+cc.weak;
    const pct = c.questions.length? Math.round((cc.known+cc.almost*0.6+cc.vague*0.3)/c.questions.length*100):0;
    let lvBar='';
    if(learned>0){
      const seg=(n,col)=> n>0?`<span style="background:${col};flex:${n}"></span>`:'';
      lvBar=` ・ <span class="lvbar">${seg(cc.known,LEVEL_COLOR.known)}${seg(cc.almost,LEVEL_COLOR.almost)}${seg(cc.vague,LEVEL_COLOR.vague)}${seg(cc.weak,LEVEL_COLOR.weak)}<span style="background:#eee;flex:${c.questions.length-learned}"></span></span>`;
    } else { lvBar=' ・ 未学習'; }
    const card=document.createElement('button');
    card.className='chap';
    const circ=2*Math.PI*18;
    const dash=circ*(pct/100);
    card.innerHTML=`
      <div class="ring">
        <svg width="42" height="42" viewBox="0 0 42 42">
          <circle cx="21" cy="21" r="18" fill="none" stroke="#efefef" stroke-width="4"/>
          <circle cx="21" cy="21" r="18" fill="none" stroke="#f47b20" stroke-width="4"
                  stroke-linecap="round" stroke-dasharray="${dash} ${circ}"/>
        </svg>
        <div class="pct">${pct}%</div>
      </div>
      <div class="meta">
        <div class="t">${c.name}</div>
        <div class="s">${c.questions.length}問${lvBar}</div>
      </div>
      <div class="go">›</div>`;
    card.onclick=()=>openSheet(c);
    wrap.appendChild(card);
  });
}

/* ---------------- SHEET ---------------- */
let sheetChapter=null, sheetMode='quiz', sheetCount=10;
function openSheet(c){
  sheetChapter=c;
  document.getElementById('sheetTitle').textContent=c.name;
  const weak=chapterWeakCount(c);
  const cc=chapterLevelCounts(c);
  document.getElementById('sheetSub').innerHTML=
    c.questions.length+'問' + (weak>0?` ・ <span style="color:#3b86f0">復習対象 ${weak}</span>`:'');
  // 苦手復習ボタンの有効/無効
  const rev=document.getElementById('reviewBtn');
  if(rev){
    if(weak>0){ rev.style.display='block'; rev.querySelector('.rev-n').textContent=weak; }
    else rev.style.display='none';
  }
  document.getElementById('sheetWrap').classList.add('show');
}
function closeSheet(){document.getElementById('sheetWrap').classList.remove('show');}
document.getElementById('sheetWrap').onclick=(e)=>{if(e.target.id==='sheetWrap')closeSheet();};
document.querySelectorAll('#modeRow button').forEach(b=>{
  b.onclick=()=>{document.querySelectorAll('#modeRow button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); sheetMode=b.dataset.mode;};
});
document.querySelectorAll('#countRow button').forEach(b=>{
  b.onclick=()=>{document.querySelectorAll('#countRow button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); sheetCount=parseInt(b.dataset.n);};
});
document.getElementById('sheetStart').onclick=()=>{
  closeSheet();
  if(sheetMode==='quiz'){
    const qs=pickSpaced(sheetChapter, sheetCount);
    startQuiz(sheetChapter, qs, false);
  }else{
    let qs=shuffle(withIdx(sheetChapter));
    if(sheetCount>0) qs=qs.slice(0,sheetCount);
    startFlash(sheetChapter, qs);
  }
};
// 苦手だけ復習
(function(){
  const rev=document.getElementById('reviewBtn');
  if(rev) rev.onclick=()=>{
    closeSheet();
    const qs=pickReview(sheetChapter, 0);
    if(qs.length===0) return;
    startQuiz(sheetChapter, qs, true);
  };
})();

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('show'));
  document.getElementById(id).classList.add('show');
  window.scrollTo(0,0);
}

/* ---------------- QUIZ ---------------- */
let qList=[], qIdx=0, qCorrect=0, qStreak=0, qAnswered=false, qChapter=null, qIsReview=false, qSnap=null;
function snapshotLevels(list){
  // 出題対象の各問題の「開始前レベル」を記録
  const m={};
  list.forEach(q=>{ m[wordId(q._code,q._idx)] = levelOf(wordId(q._code,q._idx)); });
  return m;
}
function startQuiz(chapter, list, isReview){
  qChapter=chapter; qList=list; qIdx=0; qCorrect=0; qStreak=0; qIsReview=!!isReview;
  qSnap=snapshotLevels(list);
  show('quizScreen'); renderQ();
}
function renderQ(){
  qAnswered=false;
  const q=qList[qIdx];
  document.getElementById('quizFill').style.width=((qIdx)/qList.length*100)+'%';
  document.getElementById('quizCount').textContent=`${qIdx+1} / ${qList.length}`;
  const streakEl=document.getElementById('streak');
  if(qStreak>=2){streakEl.textContent=`${qStreak}問連続正解中！`;streakEl.classList.add('show');}
  else streakEl.classList.remove('show');

  document.getElementById('quizText').innerHTML=
    q.q.replace(/\[_+\]/g,'<span class="blank">?</span>');

  const opts=document.getElementById('quizOpts');
  opts.innerHTML='';
  shuffle(q.choices).forEach((ch,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML=`<span class="n">${i+1}</span><span>${ch}</span>`;
    b.onclick=()=>answer(b,ch,q);
    opts.appendChild(b);
  });
  const ex=document.getElementById('quizExplain');
  ex.classList.remove('show'); ex.innerHTML='';
  document.getElementById('quizNext').classList.remove('show');
  document.getElementById('quizScore').textContent=
    qIdx>0?`正解 ${qCorrect} / ${qIdx}`:'';
}
function answer(btn,choice,q){
  if(qAnswered)return; qAnswered=true;
  const ok=(choice===q.answer);
  const pr=chapProgress(qChapter.code);
  pr.attempts++; if(ok)pr.correct++;
  // 問題単位の習熟度記録（mikan: 正解/不正解回数）
  const st=wordStat(wordId(q._code,q._idx));
  if(ok){st.c++;qCorrect++;qStreak++;}else{st.w++;qStreak=0;}
  saveProgress();

  document.querySelectorAll('.opt').forEach(o=>{
    o.classList.add('locked');
    const txt=o.querySelector('span:last-child').textContent;
    if(txt===q.answer)o.classList.add('correct');
    else if(o===btn&&!ok)o.classList.add('wrong');
    else o.classList.add('dim');
  });
  const ex=document.getElementById('quizExplain');
  ex.innerHTML=`<div class="eh">解説</div>${q.explain.replace(/\n/g,'<br>')}`;
  ex.classList.add('show');

  const streakEl=document.getElementById('streak');
  if(qStreak>=2){streakEl.textContent=`${qStreak}問連続正解中！`;streakEl.classList.add('show');}
  else streakEl.classList.remove('show');

  document.getElementById('quizNext').classList.add('show');
  document.getElementById('quizScore').textContent=`正解 ${qCorrect} / ${qIdx+1}`;
  document.getElementById('quizFill').style.width=((qIdx+1)/qList.length*100)+'%';
}
document.getElementById('quizNext').onclick=()=>{
  if(qIdx+1>=qList.length){finishQuiz();return;}
  qIdx++; renderQ();
};
function finishQuiz(){
  document.getElementById('doneScoreBig').textContent=`${qCorrect}/${qList.length}`;
  const rate=qList.length? qCorrect/qList.length : 0;
  let msg='この調子で続けよう。';
  if(rate===1)msg='全問正解！完璧です。';
  else if(rate>=0.8)msg='よくできました。';
  else if(rate>=0.5)msg='もう少しで合格ライン。';
  else msg='復習して再挑戦しよう。';
  document.getElementById('doneTitle').textContent=qChapter.name + (qIsReview?'（復習）':'');
  document.getElementById('doneMsg').textContent=msg;

  // 習熟度の増減を集計（開始前スナップショット → 現在）
  const before={known:0,almost:0,vague:0,weak:0,none:0};
  const after ={known:0,almost:0,vague:0,weak:0,none:0};
  qList.forEach(q=>{
    const id=wordId(q._code,q._idx);
    const b=qSnap[id]||'none'; before[b==null?'none':b]++;
    const a=levelOf(id)||'none'; after[a]++;
  });
  const dEl=document.getElementById('levelDelta');
  dEl.innerHTML='';
  LEVELS.forEach(lv=>{
    const diff=after[lv]-before[lv];
    const cls=diff>0?'up':(diff<0?'down':'zero');
    const sign=diff>0?'+'+diff:(diff<0?''+diff:'±0');
    const row=document.createElement('div'); row.className='row';
    row.innerHTML=`<span class="nm">${LEVEL_LABEL[lv]}</span>`+
      `<span class="badge" style="background:${LEVEL_COLOR[lv]}">${after[lv]}</span>`+
      `<span class="delta ${cls}">${sign}</span>`;
    dEl.appendChild(row);
  });

  // 苦手リスト（この回で苦手/うろ覚えになっている問題）
  const weakNow=qList.filter(q=>{const lv=levelOf(wordId(q._code,q._idx));return lv==='weak'||lv==='vague';});
  const block=document.getElementById('reviewBlock');
  if(weakNow.length>0){
    block.style.display='block';
    document.getElementById('reviewCountLabel').textContent=`わからなかった (${weakNow.length})`;
    const list=document.getElementById('reviewList'); list.innerHTML='';
    weakNow.slice(0,8).forEach(q=>{
      const lv=levelOf(wordId(q._code,q._idx));
      const it=document.createElement('div'); it.className='review-item';
      it.innerHTML=`<span class="ri-lv" style="background:${LEVEL_COLOR[lv]}">${LEVEL_LABEL[lv]}</span>`+
        `<div class="ri-q">${q.q.replace(/\[_+\]/g,'____')}</div>`+
        `<div class="ri-a">→ ${q.answer}</div>`;
      list.appendChild(it);
    });
    document.getElementById('reviewNowBtn').onclick=()=>{
      startQuiz(qChapter, shuffle(weakNow), true);
    };
  } else {
    block.style.display='none';
  }

  // 「もう一度」は間隔反復で再出題
  doneRetry=()=>startQuiz(qChapter, pickSpaced(qChapter, sheetCount>0?sheetCount:0), false);
  show('doneScreen');
}
document.getElementById('quizClose').onclick=()=>{renderHome();show('homeScreen');};

}
function renderF(){
  fFlip=false;
  const q=fList[fIdx];
  document.getElementById('flashFill').style.width=((fIdx+1)/fList.length*100)+'%';
  document.getElementById('flashCount').textContent=`${fIdx+1} / ${fList.length}`;

  card.classList.remove('flip');

    <div class="face-text">${q.q.replace(/\[_+\]/g,'<span class="ans">?</span>')}</div>`;
}
document.getElementById('fcard').onclick=()=>{
  const q=fList[fIdx]; fFlip=!fFlip;
  const card=document.getElementById('fcard');
  if(fFlip){
    card.classList.add('flip');
    card.innerHTML=`<div class="face-label">答え</div>
      <div class="face-text"><span class="ans">${q.answer}</span></div>
      <div class="face-text" style="font-size:14px;color:#555;margin-top:18px;font-weight:500;">${q.explain.replace(/\n/g,'<br>')}</div>`;
  }else renderF();
};
document.getElementById('flashNext').onclick=()=>{fIdx=(fIdx+1)%fList.length;renderF();};
document.getElementById('flashPrev').onclick=()=>{fIdx=(fIdx-1+fList.length)%fList.length;renderF();};
document.getElementById('flashClose').onclick=()=>{renderHome();show('homeScreen');};
