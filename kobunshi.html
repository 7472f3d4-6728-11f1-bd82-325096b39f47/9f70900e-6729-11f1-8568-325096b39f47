<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>高分子化学</title>
<meta name="theme-color" content="#6db020">
<style>
  :root{
    --bg:#fff; --paper:#f4f4f6; --ink:#2b2b2b; --sub:#9a9a9a; --line:#eee;
    --accent:#9BDE40; --accent2:#b8ef60; --accent-deep:#6db020; --accent-soft:#f0fce0; --accent-ink:#2d5010; --accent-glow:rgba(109,176,32,0.25);
    --peach:#fff3e6;
    --p0:#d9d9de; --p1:#3b86f0; --p2:#7cc6b0; --p3:#46c07a; --p4:#1a9d5a;
    --ok:#1a9d5a; --ok-soft:#e8f6ee; --ng:#e8483b; --ng-soft:#fdecea;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:"Hiragino Sans","Yu Gothic UI","Yu Gothic",system-ui,sans-serif;background:var(--paper);
    color:var(--ink);line-height:1.6;display:flex;justify-content:center;min-height:100dvh;}
  .app{width:100%;max-width:460px;background:var(--bg);min-height:100dvh;position:relative;overflow:hidden;}
  button{font-family:inherit;cursor:pointer;}
  .screen{display:none;flex-direction:column;min-height:100dvh;}
  .screen.show{display:flex;}
  @keyframes fade{from{opacity:.5}to{opacity:1}}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}

  /* ---------- HOME ---------- */
  .home{flex:1;display:flex;flex-direction:column;animation:fade .2s;}
  .home-head{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--accent-ink);padding:20px 18px 16px;}
  .kicker{font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.85;font-weight:700;}
  .home-head h1{margin:1px 0 0;font-size:23px;font-weight:800;}
  .sync-bar{display:flex;align-items:center;gap:8px;margin-top:9px;}
  .sync-status{font-size:12px;opacity:.92;min-height:15px;}
  .sync-btn{margin-left:auto;background:rgba(0,0,0,.07);border:none;color:var(--accent-ink);font-size:12px;
    font-weight:700;padding:6px 12px;border-radius:999px;}
  .sync-btn:active{transform:scale(.96);}
  .summary{display:flex;align-items:center;gap:14px;margin:-26px 14px 0;background:#fff;border-radius:18px;
    box-shadow:var(--shadow);padding:14px 16px;position:relative;z-index:2;}
  .summary .sm-stats{display:flex;flex:1;gap:2px;text-align:center;}
  .summary .sm{flex:1;}
  .summary .sm .n{font-size:17px;font-weight:800;line-height:1.2;}
  .summary .sm .l{font-size:10px;color:var(--sub);}
  .review-cta{margin:12px 14px 0;background:var(--accent-soft);border:1px solid #ffe2b8;border-radius:14px;
    padding:12px 15px;display:flex;align-items:center;gap:10px;}
  .review-cta:active{transform:scale(.995);}
  .review-cta .rc-t{font-weight:800;font-size:13.5px;color:var(--accent-ink);}
  .review-cta .rc-s{font-size:11.5px;color:var(--sub);}
  .review-cta .rc-go{margin-left:auto;color:var(--accent-deep);font-weight:800;font-size:18px;}
  /* おさらい確認画面 */
  .rc-hero{background:var(--accent-soft);border-radius:16px;margin:14px;padding:18px 16px;text-align:center;}
  .rc-hero-emoji{font-size:30px;}
  .rc-hero-title{font-weight:800;font-size:16px;color:var(--accent-ink);margin-top:4px;}
  .rc-hero-sub{font-size:11.5px;color:var(--sub);margin-top:10px;}
  .rc-hero-count{font-weight:900;color:var(--accent-deep);line-height:1;}
  .rc-hero-count>span:first-child{font-size:40px;}
  .rc-hero-unit{font-size:16px;margin-left:3px;}
  #rcProf{padding:6px 4px;}
  .rc-prow{display:flex;align-items:center;gap:10px;padding:7px 12px;}
  .rc-pdot{width:12px;height:12px;border-radius:50%;flex:none;}
  .rc-plabel{font-size:13px;color:var(--ink);}
  .rc-pcount{margin-left:auto;font-weight:800;font-size:13px;color:var(--sub);}
  .rc-chapters{padding:2px 14px 16px;}
  .rc-chip{display:flex;align-items:center;gap:8px;background:var(--paper);border-radius:12px;padding:11px 13px;margin-bottom:8px;}
  .rc-chip-parent{font-size:10.5px;color:var(--sub);}
  .rc-chip-name{font-weight:700;font-size:13.5px;color:var(--ink);}
  .rc-chip-n{margin-left:auto;font-weight:800;font-size:12.5px;color:var(--accent-deep);background:var(--accent-soft);border-radius:999px;padding:3px 10px;flex:none;}
  .rc-empty{text-align:center;color:var(--sub);font-size:13px;padding:24px;}
  .seg{display:flex;gap:7px;overflow-x:auto;padding:15px 14px 6px;scrollbar-width:none;}
  .seg::-webkit-scrollbar{display:none;}
  .seg button{flex:0 0 auto;border:1px solid var(--line);background:#fff;color:#666;padding:7px 15px;
    border-radius:999px;font-size:13px;font-weight:700;white-space:nowrap;}
  .seg button.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);}
  .chapters{padding:4px 14px 30px;display:flex;flex-direction:column;gap:9px;}
  .lesson{display:flex;align-items:center;gap:13px;background:#fff;border:1px solid var(--line);
    border-radius:15px;padding:12px 14px;}
  .lesson:active{transform:scale(.99);}
  .lesson-name{flex:1;font-size:15px;font-weight:700;min-width:0;}
  .lesson-q{font-size:12px;color:var(--sub);font-weight:700;background:#f4f4f6;border-radius:999px;
    padding:4px 11px;white-space:nowrap;}
  .lesson-go{color:#ccc;font-size:18px;font-weight:800;margin-left:2px;}

  /* ring */
  .ring-txt{font-weight:800;fill:var(--ink);}
  .ring-sub{fill:var(--sub);}

  /* ---------- DETAIL (full screen) ---------- */
  #detailScreen{background:#fff;}
  .detail-wrap{flex:1;display:flex;flex-direction:column;animation:slideup .25s ease;overflow:hidden;}
  .grip{width:42px;height:4px;background:#e2e2e2;border-radius:999px;margin:9px auto 2px;}
  .detail-top{display:flex;padding:2px 14px;}
  .detail-scroll{flex:1;overflow-y:auto;padding:6px 18px 16px;}
  .detail-ring{display:flex;flex-direction:column;align-items:center;margin:12px 0 4px;}
  .detail-name{font-size:17px;font-weight:800;text-align:center;margin:10px 0 2px;}
  .detail-parent{font-size:12px;color:var(--sub);text-align:center;}
  .decks{display:flex;gap:9px;overflow-x:auto;padding:16px 2px 6px;scrollbar-width:none;}
  .decks::-webkit-scrollbar{display:none;}
  .decks::after{content:"";flex:0 0 16px;display:block;}
  .deck{flex:0 0 auto;width:84px;border:1.5px solid var(--line);border-radius:14px;padding:10px 4px 9px;
    text-align:center;background:#fff;}
  .deck.on{border-color:var(--accent-deep);background:var(--accent-soft);}
  .deck.dis{opacity:.4;}
  .deck .di{font-size:17px;height:22px;line-height:22px;display:flex;align-items:center;justify-content:center;}
  .deck .dl{font-size:12.5px;font-weight:800;margin-top:1px;}
  .deck .dn{font-size:11px;color:var(--sub);}
  .deck.on .dn{color:var(--accent-ink);}
  .deck-info{background:var(--accent-soft);border-radius:13px;padding:12px 14px;margin-top:10px;position:relative;}
  .deck-info .dit{font-size:13px;font-weight:800;color:var(--accent-ink);margin-bottom:2px;}
  .deck-info .dis2{font-size:12px;color:#7a7a7a;}
  .opt-label{font-size:12px;color:#999;font-weight:800;margin:18px 2px 8px;}
  .mode-row{display:flex;gap:10px;}
  .mode-row button{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:13px;padding:11px;
    display:flex;flex-direction:column;align-items:center;gap:4px;}
  .mode-row button.on{border-color:var(--accent-deep);background:var(--accent-soft);}
  .mode-row .mi{font-size:20px;}
  .mode-row .mt{font-size:13px;font-weight:800;color:#555;}
  .mode-row button.on .mt{color:var(--accent-ink);}
  .settings-link{width:100%;display:flex;justify-content:space-between;align-items:center;background:#fff;
    border:1px solid var(--line);border-radius:13px;padding:14px 15px;font-size:14px;color:#444;font-weight:700;margin-top:16px;}
  .settings-link .sl-go{color:#bbb;font-size:18px;}
  .detail-foot{padding:12px 18px calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:#fff;}

  .icon-btn{width:30px;height:30px;border:none;background:#f2f2f4;border-radius:50%;font-size:18px;color:#666;
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .icon-btn:active{transform:scale(.92);}
  .big-btn{width:100%;background:var(--accent);color:var(--accent-ink);border:none;border-radius:14px;padding:16px;font-size:16px;
    font-weight:800;box-shadow:0 5px 16px var(--accent-glow);}
  .big-btn:active{transform:scale(.99);}
  .big-btn:disabled{background:#d3d3d6;box-shadow:none;}

  /* ---------- SETTINGS (full screen) ---------- */
  #settingsScreen{background:var(--paper);}
  .set-bar{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border-bottom:1px solid var(--line);}
  .set-bar h2{font-size:16px;font-weight:800;margin:0;}
  .set-scroll{flex:1;overflow-y:auto;padding:8px 16px 30px;}
  .ds-label{font-size:12px;color:#999;font-weight:800;margin:16px 2px 7px;}
  .ds-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:2px 15px;}
  .row{display:flex;justify-content:space-between;align-items:center;padding:13px 2px;border-bottom:1px solid #f2f2f2;font-size:14px;color:#333;gap:10px;}
  .ds-card .row:last-child{border-bottom:none;}
  .row .rsub{font-size:11px;color:var(--sub);font-weight:400;margin-top:1px;}
  .stepper{display:flex;align-items:center;gap:12px;flex:0 0 auto;}
  .stepper button{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--accent-deep);background:#fff;
    color:var(--accent-deep);font-size:17px;display:flex;align-items:center;justify-content:center;font-weight:700;}
  .stepper button:active{transform:scale(.9);}
  .st-val{min-width:52px;text-align:center;font-weight:800;font-size:14px;}
  .switch{position:relative;display:inline-block;width:46px;height:27px;flex:0 0 auto;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;inset:0;background:#d4d4d8;border-radius:999px;transition:.2s;}
  .slider::before{content:"";position:absolute;width:21px;height:21px;left:3px;top:3px;background:#fff;border-radius:50%;
    transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.25);}
  input:checked + .slider{background:var(--accent);}
  input:checked + .slider::before{transform:translateX(19px);}

  /* ---------- QUIZ ---------- */
  .top-bar{display:flex;align-items:center;gap:11px;padding:12px 14px 8px;}
  .pbar{flex:1;height:8px;background:#eee;border-radius:6px;overflow:hidden;}
  .pfill{height:100%;width:0;background:var(--accent-deep);border-radius:6px;transition:width .3s;}
  .dots{font-size:20px;color:#bbb;letter-spacing:1px;background:none;border:none;}
  .timer-bar{height:4px;background:#f0f0f0;margin:0 16px;border-radius:3px;overflow:hidden;}
  .timer-fill{height:100%;width:100%;background:var(--accent-deep);}
  .quiz-body{flex:1;display:flex;flex-direction:column;padding:8px 18px 18px;}
  .q-card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);
    padding:22px 20px;position:relative;display:flex;flex-direction:column;justify-content:center;min-height:190px;}
  .q-count{font-size:12px;color:var(--sub);text-align:center;font-weight:700;margin-bottom:12px;}
  .q-text{font-size:18px;font-weight:700;line-height:1.7;text-align:center;}
  .q-card .card-star{position:absolute;right:14px;bottom:12px;font-size:21px;background:none;border:none;color:#dcdce0;}
  .q-card .card-star.on{color:var(--accent-deep);}
  .blank{display:inline-block;min-width:62px;border-bottom:2.5px solid var(--accent-deep);margin:0 5px;color:transparent;}
  .opts{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
  .opt{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);background:#fff;border-radius:13px;
    padding:14px 14px;font-size:15px;text-align:left;color:#333;font-weight:600;position:relative;}
  .opt:active{transform:scale(.99);}
  .opt .num{width:24px;height:24px;border-radius:50%;border:1.5px solid #ddd;color:#aaa;font-size:12px;font-weight:800;
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .opt.correct{background:var(--ok-soft);border-color:var(--ok);color:var(--ok);}
  .opt.correct .num{border-color:var(--ok);color:var(--ok);}
  .opt.wrong{background:var(--ng-soft);border-color:var(--ng);color:var(--ng);}
  .opt.wrong .num{border-color:var(--ng);color:var(--ng);}
  .opt.dim{opacity:.45;}
  .opt .mk{margin-left:auto;font-weight:800;font-size:17px;}
  .opt.cover{justify-content:center;color:var(--accent-ink);background:var(--accent-soft);border:1.5px dashed var(--accent-deep);font-weight:700;}
  .explain{display:none;background:#fafafa;border:1px solid var(--line);border-radius:13px;padding:13px 14px;
    font-size:13px;color:#444;white-space:pre-wrap;margin-top:13px;}
  .explain.show{display:block;animation:fade .2s;}
  .explain .ex-h{font-weight:800;font-size:12px;margin-bottom:4px;}
  .quiz-foot{margin-top:auto;padding-top:13px;}
  .next-btn{display:none;width:100%;background:var(--accent);color:var(--accent-ink);border:none;border-radius:14px;padding:16px;
    font-size:16px;font-weight:800;box-shadow:0 5px 16px var(--accent-glow);}
  .next-btn.show{display:block;}
  .next-btn:active{transform:scale(.99);}

  /* ---------- FLASHCARD ---------- */
  .flash-body{flex:1;display:flex;flex-direction:column;padding:8px 18px 18px;}
  .fcard{flex:1;min-height:300px;border-radius:20px;border:1px solid var(--line);box-shadow:var(--shadow);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;
    margin:14px 0;background:#fff;position:relative;}
  .face-label{position:absolute;top:14px;left:16px;font-size:11px;font-weight:800;color:var(--accent-deep);letter-spacing:1px;}
  .fcard .card-star{position:absolute;right:14px;bottom:12px;font-size:21px;background:none;border:none;color:#dcdce0;}
  .fcard .card-star.on{color:var(--accent-deep);}
  .face-text{font-size:19px;font-weight:700;line-height:1.7;}
  .fans{font-size:23px;font-weight:800;color:var(--ok);margin-bottom:10px;}
  .fexp{font-size:13px;color:#555;white-space:pre-wrap;text-align:left;margin-top:4px;max-height:38vh;overflow:auto;}
  .fhint{text-align:center;color:var(--sub);font-size:12px;margin-bottom:8px;}
  .grade-row{display:flex;gap:11px;}
  .grade-row button{flex:1;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:800;}
  .g-ng{background:#eaf2fe;color:#2f6fd0;}
  .g-ok{background:var(--ok-soft);color:var(--ok);}
  .grade-row button:active{transform:scale(.98);}

  /* ---------- RESULT ---------- */
  .result{flex:1;background:var(--peach);display:flex;flex-direction:column;padding:6px 18px 24px;overflow-y:auto;animation:fade .25s;}
  .result-top{display:flex;}
  .praise{text-align:center;margin-top:6px;}
  .praise .pk{font-size:13px;color:var(--accent-ink);font-weight:800;}
  .praise .pt{font-size:30px;font-weight:900;letter-spacing:2px;}
  .praise .pm{font-size:13px;color:#666;margin-top:2px;}
  .mascot{display:block;margin:10px auto 4px;animation:pop .4s ease;}
  .stat-card{background:#fff;border-radius:18px;box-shadow:var(--shadow);padding:18px;margin:14px 0 0;text-align:center;}
  .stat-card .sc-badge{display:inline-block;background:var(--accent-soft);color:var(--accent-ink);font-size:12px;
    font-weight:800;padding:4px 14px;border-radius:999px;}
  .stat-card .sc-big{font-size:38px;font-weight:900;color:var(--accent-deep);margin:6px 0;}
  .stat-card .sc-big small{font-size:20px;color:#bbb;}
  .stat-card .sc-row{display:flex;border-top:1px solid var(--line);padding-top:12px;margin-top:6px;}
  .stat-card .sc-cell{flex:1;}
  .stat-card .sc-cell .v{font-size:17px;font-weight:800;}
  .stat-card .sc-cell .k{font-size:11px;color:var(--sub);}
  .res-btn{width:100%;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:800;margin-top:14px;}
  .res-prim{background:var(--accent);color:var(--accent-ink);box-shadow:0 5px 16px var(--accent-glow);}
  .res-btn:active{transform:scale(.99);}
  .wrong-head{display:flex;align-items:center;margin:20px 0 8px;}
  .wrong-head .wh-t{font-weight:800;font-size:14px;}
  .wrong-head .wh-b{margin-left:auto;background:#eaf2fe;color:#2f6fd0;border:none;border-radius:999px;
    padding:7px 13px;font-size:12px;font-weight:800;}
  .wrong-item{background:#fff;border-radius:12px;padding:11px 14px;margin-bottom:7px;}
  .wrong-item .wi-q{font-size:13px;color:#888;}
  .wrong-item .wi-a{font-size:15px;font-weight:800;}
  /* result 2 */
  .r2-card{background:#fff;border-radius:18px;box-shadow:var(--shadow);padding:18px;margin-top:14px;}
  .r2-head{display:flex;align-items:flex-end;justify-content:space-between;}
  .r2-ch{font-size:12px;color:var(--sub);}
  .r2-name{font-size:16px;font-weight:800;}
  .r2-pct{font-size:30px;font-weight:900;color:var(--accent-deep);}
  .r2-pct small{font-size:15px;}
  .r2-bar{height:14px;background:#eee;border-radius:999px;overflow:hidden;margin:10px 0 4px;position:relative;}
  .r2-fill{height:100%;background:var(--accent-deep);border-radius:999px;display:flex;align-items:center;justify-content:flex-start;}
  .r2-bar .r2-min{position:absolute;left:9px;top:0;line-height:14px;font-size:10px;font-weight:800;color:#fff;}
  .r2-bar .r2-max{position:absolute;right:9px;top:0;line-height:14px;font-size:10px;font-weight:800;color:#aaa;}
  .r2-goal{font-size:12px;color:#777;text-align:center;}
  .r2-levels{border-top:1px solid var(--line);margin-top:12px;padding-top:8px;}
  .r2-lv{display:flex;align-items:center;padding:7px 2px;font-size:14px;}
  .r2-lv .l{color:#555;width:92px;}
  .r2-lv .badge{min-width:26px;height:22px;padding:0 7px;border-radius:7px;color:#fff;font-size:12px;font-weight:800;
    display:inline-flex;align-items:center;justify-content:center;}
  .r2-lv .delta{margin-left:10px;font-weight:800;font-size:13px;}
  .speech{display:flex;align-items:center;gap:10px;margin-top:14px;}
  .speech .bubble{flex:1;background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px 13px;font-size:13px;
    color:#444;position:relative;}
  .speech .bubble::before{content:"";position:absolute;left:-7px;top:50%;transform:translateY(-50%);
    border:7px solid transparent;border-right-color:#fff;}
  .empty{padding:26px;text-align:center;color:var(--sub);font-size:13px;}

  /* ---------- DARK MODE ---------- */
  body.dark{--bg:#12131a;--paper:#1c1d28;--ink:#f0f0f5;--sub:#8888a8;--line:#2c2d40;--accent:#00c1cc;--accent2:#29f4ff;--accent-deep:#00c1cc;--accent-soft:#0a2a2e;--accent-ink:#7ce7ed;--accent-glow:rgba(0,193,204,.20);--peach:#1e1a14;--p0:#555;--p1:#2a5cb0;--p2:#3a8060;--p3:#2a7a3a;--p4:#107a3a;--ok:#2aad6a;--ok-soft:#0e2a1e;--ng:#c03030;--ng-soft:#2a0e0e;--shadow:0 2px 4px rgba(0,0,0,.5),0 8px 24px rgba(0,0,0,.6);}
  body.dark .app{background:var(--bg);}
  body.dark .lesson{background:var(--bg);border-color:var(--line);}
  body.dark .lesson-name{color:var(--ink);}
  body.dark .lesson-q{background:var(--paper);color:var(--sub);}
  body.dark .lesson-go{color:var(--sub);}
  body.dark .seg button{background:var(--bg);color:var(--ink);border-color:var(--line);}
  body.dark .seg button.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);}
  body.dark .deck{background:var(--bg);border-color:var(--line);}
  body.dark .deck .dl{color:var(--ink);}
  body.dark .deck .dn{color:var(--sub);}
  body.dark .deck-info .dis2{color:var(--sub);}
  body.dark .opt-label{color:var(--sub);}
  body.dark .mode-row button{background:var(--bg);border-color:var(--line);}
  body.dark .mode-row .mt{color:var(--ink);}

  .dot-weak{background:#669efe;}
  .dot-vague{background:#8ed832;}
  .dot-good{background:#58c568;}

<body>
<div class="app">

  <!-- ===== HOME ===== -->
  <div class="screen show" id="homeScreen">
    <div class="home">
      <div class="home-head">
        <div class="kicker">Polymer Chemistry</div>
        <h1>高分子化学</h1>
        <div class="sync-bar"><span class="sync-status" id="syncStatus"></span>
          <button class="dark-toggle" id="darkToggle">🌙</button><button class="sync-btn" id="uidBtn">☁ 同期ID</button></div>
      </div>

      <div id="reviewCta"></div>
      <div class="seg" id="seg"></div>
      <div class="chapters" id="chapters"></div>
    </div>
  </div>

  <!-- ===== CHAPTER DETAIL ===== -->
  <div class="screen" id="detailScreen">
    <div class="detail-wrap">
      <div class="grip" id="grip"></div>
      <div class="detail-top"><button class="icon-btn" id="detailClose">⌄</button></div>
      <div class="detail-scroll">
        <div class="detail-ring" id="detailRing"></div>
        <div class="detail-name" id="detailName"></div>
        <div class="detail-parent" id="detailParent"></div>
        <div class="decks" id="decks"></div>
        <div class="deck-info" id="deckInfo"></div>
        <div class="opt-label">学習モード</div>
        <div class="mode-row" id="modeRow">
          <button data-mode="quiz" class="on"><span class="mi">📝</span><span class="mt">4択</span></button>
          <button data-mode="flash"><span class="mi">🃏</span><span class="mt">カード</span></button>
        </div>
        <button class="settings-link" id="settingsLink"><span>詳細設定</span><span class="sl-go">›</span></button>
      <button class="settings-link" id="qlistBtn"><span>問題一覧</span><span class="sl-go">›</span></button>
      </div>
      <div class="detail-foot"><button class="big-btn" id="startBtn">スタート</button></div>
    </div>
  </div>

  <!-- ===== SETTINGS ===== -->
  <div class="screen" id="settingsScreen">
    <div class="set-bar"><button class="icon-btn" id="setBack">‹</button><h2>詳細設定</h2></div>
    <div class="set-scroll">
      <div class="ds-label">4択</div>
      <div class="ds-card">
        <div class="row"><span>問題数 / 回</span>
          <div class="stepper"><button class="st-m" data-t="count">−</button><span class="st-val" id="vCount">50</span><button class="st-p" data-t="count">＋</button></div></div>
        <div class="row"><span>制限時間</span>
          <div class="stepper"><button class="st-m" data-t="quizTime">−</button><span class="st-val" id="vQuizTime">なし</span><button class="st-p" data-t="quizTime">＋</button></div></div>
        <div class="row"><span>暗記シート機能<div class="rsub">選択肢を一時的に非表示にできるよ</div></span>
          <label class="switch"><input type="checkbox" id="optHide"><span class="slider"></span></label></div>
      </div>
      <div class="ds-label">カードめくり</div>
      <div class="ds-card">
        <div class="row"><span>問題数 / 回</span>
          <div class="stepper"><button class="st-m" data-t="count2">−</button><span class="st-val" id="vCount2">50</span><button class="st-p" data-t="count2">＋</button></div></div>
        <div class="row"><span>制限時間</span>
          <div class="stepper"><button class="st-m" data-t="cardTime">−</button><span class="st-val" id="vCardTime">なし</span><button class="st-p" data-t="cardTime">＋</button></div></div>
        <div class="row"><span>タップせずに答えを表示する</span>
          <label class="switch"><input type="checkbox" id="optAuto"><span class="slider"></span></label></div>
        <div class="row"><span>特訓モード<div class="rsub">「未学習・苦手」が無くなるまで出題し続けるよ</div></span>
          <label class="switch"><input type="checkbox" id="optTrain"><span class="slider"></span></label></div>
      </div>
      <div class="ds-label">共通設定</div>
      <div class="ds-card">
        <div class="row"><span>サウンド（正解・不正解音）</span>
          <label class="switch"><input type="checkbox" id="optSound" checked><span class="slider"></span></label></div>
        <div class="row"><span>シャッフル出題</span>
          <label class="switch"><input type="checkbox" id="optShuffle" checked><span class="slider"></span></label></div>
        <div class="row"><span>前回の続きから</span>
          <label class="switch"><input type="checkbox" id="optResume"><span class="slider"></span></label></div>
      </div>
    </div>
  </div>

  <!-- ===== QUIZ ===== -->
  <div class="screen" id="quizScreen">
    <div class="top-bar"><button class="icon-btn" id="quizClose">×</button>
      <div class="pbar"><div class="pfill" id="quizFill"></div></div>
      <button class="dots">⋮</button></div>
    <div class="timer-bar" id="quizTimerBar" style="display:none"><div class="timer-fill" id="quizTimerFill"></div></div>
    <div class="quiz-body">
      <div class="q-card">
        <div class="q-count" id="quizCount"></div>
        <div class="q-text" id="quizText"></div>
        <button class="card-star" id="quizStar">★</button>
      </div>
      <div class="opts" id="quizOpts"></div>
      <div class="explain" id="quizExplain"></div>
      <div class="quiz-foot"><button class="next-btn" id="quizNext">次へ →</button></div>
    </div>
  </div>

  <!-- ===== FLASHCARD ===== -->
  <div class="screen" id="flashScreen">
    <div class="top-bar"><button class="icon-btn" id="flashClose">×</button>
      <div class="pbar"><div class="pfill" id="flashFill"></div></div>
      <button class="dots">⋮</button></div>
    <div class="timer-bar" id="flashTimerBar" style="display:none"><div class="timer-fill" id="flashTimerFill"></div></div>
    <div class="flash-body">
      <div class="q-count" id="flashCount" style="padding-top:4px"></div>
      <div class="fcard" id="fcard"></div>
      <div class="fhint" id="fhint">タップで答えを表示</div>
      <div class="grade-row" id="gradeRow" style="visibility:hidden">
        <button class="g-ng" id="gradeNg">△ あいまい</button>
        <button class="g-ok" id="gradeOk">◎ わかった</button></div>
    </div>
  </div>

  <!-- ===== RESULT 1 ===== -->
  <div class="screen" id="res1Screen">
    <div class="result">
      <div class="result-top"><button class="icon-btn" id="res1Close">×</button></div>
      <div class="praise" id="res1Praise"></div>
      <div id="res1Mascot"></div>
      <div class="stat-card" id="res1Stat"></div>
      <button class="res-btn res-prim" id="res1Next">次へ →</button>
      <div id="res1Wrong"></div>
    </div>
  </div>

  <!-- ===== RESULT 2 ===== -->
  <div class="screen" id="res2Screen">
    <div class="result">
      <div class="result-top"><button class="icon-btn" id="res2Close">×</button></div>
      <div class="r2-card" id="r2Card"></div>
      <div class="speech" id="r2Speech"></div>
      <button class="res-btn res-prim" id="res2Main">ホームに戻る</button>
      <button class="res-btn" style="background:#f0f0f2;color:#555" id="res2Sub"></button>
    </div>
  </div>


  <!-- ===== QUESTION LIST ===== -->
  <div class="screen" id="qlistScreen">
    <div class="set-bar"><button class="icon-btn" id="qlistBack">‹</button><h2 id="qlistTitle">問題一覧</h2></div>
    <div class="qlist-scroll" id="qlistScroll"></div>
  </div>

  <!-- ===== REVIEW CONFIRM（おさらい確認） ===== -->
  <div class="screen" id="reviewConfirmScreen">
    <div class="set-bar"><button class="icon-btn" id="rcBack">‹</button><h2>おさらい確認</h2></div>
    <div class="set-scroll">
      <div class="rc-hero">
        <div class="rc-hero-emoji">🔁</div>
        <div class="rc-hero-title">今おさらいの時間です</div>
        <div class="rc-hero-sub">対象問題数</div>
        <div class="rc-hero-count"><span id="rcCount">0</span><span class="rc-hero-unit">問</span></div>
      </div>
      <div class="ds-label">習熟度内訳</div>
      <div class="ds-card" id="rcProf"></div>
      <div class="ds-label">対象の章</div>
      <div class="rc-chapters" id="rcChapters"></div>
    </div>
    <div class="detail-foot"><button class="big-btn" id="rcStart">おさらいスタート</button></div>
  </div>
</div>

ain":"★H-CH(NH₂)COOH\n★「最も簡単な構造」は「分子量が小さい、構成原子が少ない」などを考えます。"},{"id":"J100090","q":"不斉炭素原子をもつα-アミノ酸のうち、最も簡単な構造をもつものは[ アラニン(Ala) ]である。","answer":"アラニン(Ala)","choices":["アラニン(Ala)","グリシン(Gly)","セリン(Ser)","フェニルアラニン(Phe)"],"explain":"★CH₃-CH(NH₂)COOH\n★不斉炭素原子をもつα-アミノ酸に絞るとアラニン(Ala)、全てのα-アミノ酸ではグリシン(Gly)です。"},{"id":"J100100","q":"光学異性体をもつα-アミノ酸のうち、最も簡単な構造をもつものは[ アラニン(Ala) ]である。","answer":"アラニン(Ala)","choices":["アラニン(Ala)","グリシン(Gly)","セリン(Ser)","直線偏光"],"explain":"★CH₃-CH(NH₂)COOH\n★光学異性体をもつα-アミノ酸に絞るとアラニン(Ala)、全てのα-アミノ酸ではグリシン(Gly)です。"},{"id":"J100110","q":"光学異性体が回転させる光を[ 平面偏光 ]という。","answer":"平面偏光","choices":["平面偏光","反射光","可視光","界面活性"],"explain":""},{"id":"J100120","q":"C=C結合をもたない合成ゴムは[ シリコーンゴム(Q) ]である。","answer":"旋光性(右旋性、左旋性)","choices":["旋光性(右旋性、左旋性)","偏光性","弾性","水酸化ナトリウム水溶液"],"explain":"★C=C結合をもたない(つまり、ブタジエン骨格ももたない)合成ゴムとしてフッ素ゴム(FKM)とシリコーンゴム(Q)を覚えます。C=C結合部分は空気で酸化されゴムの老化が起きやすい部分です。そのC=C結合をもたないので耐老化性の特徴を示します。\n★フッ素ゴム(FKM)\n[-[-CH₂-CF₂-]ᵤ-[-CF₂-CF(CF₃)-]ᵥ-]ₓなど\nシリコーンゴム(Q)\n[-Si(CH₃)₂-O-]ₓなど、-Si-O-の連なり(シロキサン骨格、ポリシロキサン)をもつゴム。\n*(範囲外)-Si-O-の連なり、または-Si-O-Si-をシロキサン結合と呼びます。"},{"id":"J100130","q":"α-アミノ酸と加熱すると紫色(青紫～赤紫)に呈色する溶液を[ ニンヒドリン溶液 ]という。","answer":"ニンヒドリン溶液","choices":["ニンヒドリン溶液","ビウレット溶液","濃硝酸","硫黄の検出"],"explain":"★アミノ酸(-NH₂)に反応して紫色はニンヒドリン溶液。α-アミノ酸の範囲ではニンヒドリン反応をまず覚えてます。★ビウレット溶液はトリペプチド(2つのペプチド結合)に反応して赤紫色です。"},{"id":"J100140","q":"α-アミノ酸をニンヒドリン溶液と加熱すると紫色(青紫～赤紫)に呈色する。この反応を[ ニンヒドリン反応 ]という。","answer":"ニンヒドリン反応","choices":["ニンヒドリン反応","ビウレット反応","キサントプロテイン反応","中性化合物"],"explain":"★ニンヒドリン反応はアミノ酸(-NH₂)に反応して紫色。★ビウレット反応はトリペプチド(2つのペプチド結合)に反応して赤紫色。★キサントプロテイン反応は芳香環(ベンゼン環)へ反応して橙黄色。"},{"id":"J100150","q":"酸と塩基の両方と反応する化合物を[ 両性化合物 ]という。","answer":"両性化合物","choices":["両性化合物","酸性化合物","塩基性化合物","中性化合物"],"explain":"★酸性も塩基性も供えた両性です。★比較：酸・塩基での中性化合物(中性物質)は酸と塩基のどちらとも反応しない化合物を指します。"},{"id":"J100151","q":"酸や塩基との反応からみると、α-アミノ酸は[ 両性化合物 ]である。","answer":"両性化合物","choices":["両性化合物","酸性化合物","塩基性化合物","塩基性アミノ酸"],"explain":"★酸性も塩基性も供えた両性です。★比較：酸・塩基での中性化合物(中性物質)は酸と塩基のどちらとも反応しない化合物を指します。★比較：中性アミノ酸は1分子中にカルボキシ基とアミノ基を1個ずつもつアミノ酸で、両性化合物です。"},{"id":"J100160","q":"1分子中にカルボキシ基とアミノ基を1個ずつもつアミノ酸を[ 中性アミノ酸 ]という。","answer":"中性アミノ酸","choices":["中性アミノ酸","双性アミノ酸","酸性アミノ酸","陰イオン"],"explain":"★カルボキシ基とアミノ基の数から問われているので中性アミノ酸と答えます。★カルボキシ基-COOHが多いものは酸性アミノ酸、アミノ基-NH₂が多いものは塩基性アミノ酸です。"},{"id":"J100170","q":"α-アミノ酸の結晶中での形態を[ 双性イオン ]という。","answer":"双性イオン","choices":["双性イオン","中性イオン","陽イオン","溶けにくく、溶けやすい"],"explain":"★双性イオン(両性イオン)は1分子中に正電荷と負電荷の両方をもつイオンです。α-アミノ酸は結晶中で双性イオンのイオン結晶です。一般的に他の有機化合物より融点も高く、水に溶けやすくなります。"},{"id":"J100180","q":"α-アミノ酸は水に[ 溶けやすく ]、有機溶媒に[ 溶けにくい ]ものが多い。","answer":"溶けやすく、溶けにくい","choices":["溶けやすく、溶けにくい","溶けやすく、溶けやすい","溶けにくく、溶けにくい","塩基性イオン"],"explain":"★α-アミノ酸の結晶はイオン結晶なので「水に溶けやすく、有機溶媒に溶けにくい」といえます。"},{"id":"J100190","q":"α-アミノ酸を酸性溶液中に入れたときの形態は[ 陽イオン ]である。","answer":"陽イオン","choices":["陽イオン","陰イオン","酸性イオン","塩基性イオン"],"explain":"★R-CH(NH₂)COOH + H⁺ ⇄ R-CH(NH₃⁺)COOH\n-NH₃⁺の部分が陽イオンを示しています。α-アミノ酸にH⁺がくっついていき陽イオンになります。"},{"id":"J100200","q":"α-アミノ酸を塩基性溶液中に入れたときの形態は[ 陰イオン ]である。","answer":"陰イオン","choices":["陰イオン","陽イオン","酸性イオン","α-アミノ酸が等電点にあるときの形態は[ 双性イオン ]である。\n★R-CH(NH₃⁺)COO⁻の形になっています。\n★双性イオンは両性イオンとも呼びます。"],"explain":"★R-CH(NH₂)COOH + OH⁻ ⇄ R-CH(NH₂)COO⁻ + H₂O\n-COO⁻の部分が陰イオンを示しています。α-アミノ酸とOH⁻が中和していき陰イオンになります。"},{"id":"J100210","q":"α-アミノ酸が等電点にあるときの形態は[ 双性イオン ]である。","answer":"双性イオン","choices":["双性イオン","中性イオン","陽イオン","平均分子量"],"explain":"★R-CH(NH₃⁺)COO⁻の形になっています。\n★双性イオンは両性イオンとも呼びます。"},{"id":"J100220","q":"アミノ酸の電荷が全体として0になるpHの値を[ 等電点 ]という。","answer":"等電点","choices":["等電点","けん化価","軟化点","平均分子量"],"explain":"★pH(ピーエイチ、ピーエッチ)と読みます。少し前の教育課程ではドイツ語読みのペーハーと読んでいました。パソコンやスマホの変換でも出てきます。"},{"id":"J100230","q":"アミノ酸の電荷が全体として0になる等電点は[ pHの値 ]からわかる。\n①pH = -log[H⁺]\n水素イオン濃度の常用対数(log₁₀X)にマイナスをつけたものです。\n②[H⁺] = 10⁻ᵖ\nとしたときのpがpHになります。常用対数(log₁₀X)をとり左辺右辺を移項すると②は①へ変形できます。","answer":"pHの値","choices":["pHの値","けん化価","沸点上昇","陽極側へ移動する"],"explain":""},{"id":"J100240","q":"等電点にあるアミノ酸は、電気泳動を行うと[ 移動しない ]。","answer":"移動しない","choices":["移動しない","pH7.0の点へ集まる","陰極側へ移動する","陽極側へ移動する"],"explain":"★等電点にあるアミノ酸は双性イオンとなり移動しません。"},{"id":"J100250","q":"陽イオンは、電気泳動を行うと[ 陰極側へ移動する ]。","answer":"陰極側へ移動する","choices":["陰極側へ移動する","pH7.0の点へ集まる","移動しない","陰イオンは、電気泳動を行うと[ 陽極側へ移動する ]。\n★陰イオンはマイナスの電荷を帯びているので陽極側へ移動します。"],"explain":"★陽イオンはプラスの電荷を帯びているので陰極側へ移動します。"},{"id":"J100260","q":"陰イオンは、電気泳動を行うと[ 陽極側へ移動する ]。","answer":"陽極側へ移動する","choices":["陽極側へ移動する","pH7.0の点へ集まる","陰極側へ移動する","変化しない"],"explain":"★陰イオンはマイナスの電荷を帯びているので陽極側へ移動します。"},{"id":"J100270","q":"アミノ酸の水溶液の液性が等電点より酸性側のとき、アミノ酸の電離平衡は[ 陽イオン側へ偏る ]。","answer":"陽イオン側へ偏る","choices":["陽イオン側へ偏る","陰イオン側へ偏る","双性イオンになる","変化しない"],"explain":"★酸性側ではH⁺が多いのでアミノ酸の電離平衡は、\nR-CH(NH₂)COOH + H⁺ ⇄ R-CH(NH₃⁺)COOHの陽イオン側(右側)へ偏ります。(電気泳動をすると陰極側へ移動します。)"},{"id":"J100280","q":"アミノ酸の水溶液の液性が等電点より塩基性側のとき、アミノ酸の電離平衡は[ 陰イオン側へ偏る ]。","answer":"陰イオン側へ偏る","choices":["陰イオン側へ偏る","陽イオン側へ偏る","双性イオンになる","pH7.0の点へ集まる"],"explain":"★塩基性側ではOH⁻が多いのでアミノ酸の電離平衡は、\nR-CH(NH₂)COOH + OH⁻ ⇄ R-CH(NH₂)COO⁻の陰イオン側(右側)へ偏ります。(電気泳動をすると陽極側へ移動します。)"},{"id":"J100290","q":"アミノ酸の水溶液の液性が等電点より酸性側のとき、電気泳動をするとアミノ酸は[ 陰極側へ移動する  ]。","answer":"Clearing non-config state for ","choices":["Clearing non-config state for "],"explain":"★酸性側ではH⁺が多いのでアミノ酸の電離平衡は、\nR-CH(NH₂)COOH + H⁺ ⇄ R-CH(NH₃⁺)COOHの陽イオン側(右側)へ偏ります。(電気泳動をすると陰極側へ移動します。)"},{"id":"J100300","q":"アミノ酸の水溶液の液性が等電点より塩基性側のとき、電気泳動をするとアミノ酸は[ 陽極側へ移動する ]。","answer":"陽極側へ移動する","choices":["陽極側へ移動する","陰極側へ移動する ","移動しない","核酸"],"explain":"★塩基性側ではOH⁻が多いのでアミノ酸の電離平衡は、\nR-CH(NH₂)COOH + OH⁻ ⇄ R-CH(NH₂)COO⁻の陰イオン側(右側)へ偏ります。(電気泳動をすると陽極側へ移動します。)"},{"id":"J100310","q":"複数のアミノ酸が-CONH-結合で繋がった化合物を[ ペプチド ]という。","answer":"ペプチド","choices":["ペプチド","多糖類","合成樹脂(プラスチック)","核酸"],"explain":"★アミノ酸どうしでの-CONH-結合を特にペプチド結合と呼びます。アミド結合でもありますが、おそらくこの問われ方のときはペプチド結合のみ正解です。"},{"id":"J100320","q":"複数のアミノ酸がペプチド結合で繋がった化合物を[ ペプチド ]という。","answer":"ペプチド","choices":["ペプチド","多糖類","合成樹脂(プラスチック)","モノペプチド"],"explain":"★アミノ酸どうしでの-CONH-結合を特にペプチド結合と呼びます。"},{"id":"J100330","q":"2つのアミノ酸が1つのペプチド結合で繋がった化合物を[ ジペプチド ]という。","answer":"ジペプチド","choices":["ジペプチド","トリペプチド","ポリペプチド","モノペプチド"],"explain":"★アミノ酸の数を数えてジ(2)ペプチドと呼びます。"},{"id":"J100340","q":"3つのアミノ酸が2つのペプチド結合で繋がった化合物を[ トリペプチド ]という。","answer":"トリペプチド","choices":["トリペプチド","ポリペプチド","ジペプチド","モノペプチド"],"explain":"★アミノ酸の数を数えてトリ(3)ペプチドと呼びます。"},{"id":"J100350","q":"多数のアミノ酸がペプチド結合で繋がった化合物を[ ポリペプチド ]という。*確認問題(同範囲に重複収録)","answer":"ポリペプチド","choices":["ポリペプチド","トリペプチド","ジペプチド","α-アミノ酸"],"explain":"★高分子化合物になります。タンパク質はポリペプチドです。"},{"id":"J100360","q":"ポリペプチドのうち構成アミノ酸の数が数十個以上あり、特有の機能をもつものは[ タンパク質 ]である。","answer":"タンパク質","choices":["タンパク質","リン酸","必須アミノ酸","モノペプチド"],"explain":""},{"id":"J100370","q":"タンパク質は[ ポリペプチド ]に分類できる。","answer":"ポリペプチド","choices":["ポリペプチド","トリペプチド","ジペプチド","ビタミン類である"],"explain":"★タンパク質はアミノ酸がペプチド結合で連なった高分子(ポリペプチド)です。"},{"id":"J100380","q":"タンパク質は[ 電気泳動をする ]。","answer":"電気泳動をする","choices":["電気泳動をする","電気泳動をしない","多糖類である","乳酸"],"explain":"★アミノ酸が電気泳動をするので、アミノ酸の高分子(ポリペプチド)であるタンパク質も電気泳動すると繋げます。"},{"id":"J500010","q":"タンパク質の分子の形状が変わり性質が変わることを[ タンパク質の変性 ]という。","answer":"タンパク質の変性","choices":["タンパク質の変性","タンパク質の失活","タンパク質の塩析","タンパク質の老化"],"explain":""},{"id":"J500020","q":"「なま卵からゆで卵をつくる」といえば、[ タンパク質の変性 ]を意味する。","answer":"タンパク質の変性","choices":["タンパク質の変性","タンパク質の失活","タンパク質の塩析","タンパク質の老化"],"explain":"★具体例をいくつか覚えます。★タンパク質の変性は、タンパク質の分子の形状が変わり性質が変わることです。"},{"id":"J500030","q":"「重金属イオンを作用させるとタンパク質の性質が変わった」といえば、[ タンパク質の変性 ]を意味する。","answer":"タンパク質の変性","choices":["タンパク質の変性","タンパク質の失活","タンパク質の塩析","タンパク質の老化"],"explain":"★具体例をいくつか覚えます。★タンパク質の変性は、タンパク質の分子の形状が変わり性質が変わることです。"},{"id":"J500040","q":"「酸、塩基、アルコール、アセトンを加えるとタンパク質の性質が変わった」といえば、[ タンパク質の変性 ]を意味する。","answer":"タンパク質の変性","choices":["タンパク質の変性","タンパク質の失活","タンパク質の塩析","タンパク質の老化"],"explain":"★具体例をいくつか覚えます。★タンパク質の変性は、タンパク質の分子の形状が変わり性質が変わることです。"},{"id":"J500050","q":"タンパク質が化学的な反応性や機能を失うことを[ タンパク質の失活 ]という。","answer":"タンパク質の失活","choices":["タンパク質の失活","タンパク質の変性","タンパク質の塩析","タンパク質の老化"],"explain":"★タンパク質の失活は、「タンパク質が活性を失うこと」とも表現されます。★タンパク質の変性は、反応する相手や反応に適した温度などが変化することで、活性は失いません。"},{"id":"J500051","q":"タンパク質が活性を失うことを[ タンパク質の失活 ]という。","answer":"タンパク質の失活","choices":["タンパク質の失活","タンパク質の変性","タンパク質の塩析","変化しない"],"explain":"★活性とは、化学的に活発な状態です。タンパク質の失活は、「タンパク質の化学的な反応性がなくなった」ことを意味します。"},{"id":"J500060","q":"タンパク質の水溶液に、硫酸ナトリウムや塩化マグネシウム、硫酸アルミニウムなどを大量に加えるとタンパク質は[ 沈殿する ]。","answer":"沈殿する","choices":["沈殿する","赤紫系統に呈色する","分離して水面に浮く","老化"],"explain":"★この現象を塩析といいます。塩析は、ある溶質を、高濃度の塩の溶液により(沈殿として)析出させる分離法です。高濃度の塩が溶質の水分を吸収します。"},{"id":"J500070","q":"タンパク質の水溶液に、硫酸ナトリウムや塩化マグネシウムなどを大量に加えるとタンパク質の沈殿が生じる。このことを[ 塩析 ]という。","answer":"塩析","choices":["塩析","変性","失活","老化"],"explain":"★塩析は、ある溶質を、高濃度の塩の溶液により(沈殿として)析出させる分離法です。高濃度の塩が溶質の水分を吸収します。"},{"id":"J500080","q":"大豆を潰して入れた水溶液に、にがりを加えると沈殿が生じる。このことを[ 塩析 ]という。","answer":"塩析","choices":["塩析","変性","失活","水酸化ナトリウム"],"explain":"★大豆がタンパク質で、にがりが塩(えん)です。にがりの主成分は塩化マグネシウム。★塩析は、ある溶質を、高濃度の塩の溶液により(沈殿として)析出させる分離法です。高濃度の塩が溶質の水分を吸収します。"},{"id":"J500090","q":"にがりの主成分は[ 塩化マグネシウム ]である。","answer":"塩化マグネシウム","choices":["塩化マグネシウム","塩化ナトリウム","水酸化マグネシウム","一次構造と二次構造が壊れる"],"explain":"★「大豆をすり潰した水溶液ににがりを加えると沈殿が生じる(塩析)」がよく出題されます。"},{"id":"J500100","q":"グリコーゲン、セルロース、マンナン、ガラクタンのうち、ヒトが消化できるものは[ グリコーゲン ]である。","answer":"一次構造は保たれる","choices":["一次構造は保たれる","二次構造は保たれる","一次構造のみ壊れる","黄色、橙黄色"],"explain":"★消化できないものとして野菜や果物のセルロース、こんにゃくのマンナン(グルコマンナン)、寒天のガラクタンを覚えます。ヒトは消化できなくても、草食動物は消化できたりします。"},{"id":"J500110","q":"ビウレット反応で呈色したときの色は[ 赤紫色 ]である。","answer":"赤紫色","choices":["赤紫色","白色","黒色"],"explain":"★ビウレット反応(biuret test)ですが音からView Redと連想すると赤紫色を答えやすいと思います。"},{"id":"J500120","q":"キサントプロテイン反応で呈色したときの色は[ 黄色、橙黄色 ]である。","answer":"黄色、橙黄色","choices":["黄色、橙黄色","赤紫色","白色"],"explain":"★キ(黄色)サン(濃硝酸)ト(と)プロテイン(タンパク質)と連想すると黄色系を答えやすいです。*キサント(xantho-、ギリシア語)は黄色(yellow)を意味します。★濃硝酸がベンゼン環(芳香環)をニトロ化して黄色になります。"},{"id":"J500130","q":"PbS(沈殿)の色は[ 黒色 ]である。","answer":"黒色","choices":["黒色","黄色、橙黄色","赤紫色","白色"],"explain":"★硫化物XSの沈殿の多くは黒色です。無機化学では、例外としてCdS(黄色)、ZnS(白色)、MnS(ピンク色)の3つ、HgS(黒色)が昇華すると赤色に変わる、なども覚えます。"},{"id":"J500140","q":"ニンヒドリン反応で呈色したときの色は[ 紫色 ]である。","answer":"紫色","choices":["紫色","黒色","黄色、橙黄色","濃硝酸、アンモニア水"],"explain":"★ゴロ: 村にひとりあみちゃん(紫、ニンヒドリン、アミノ酸のアミノ基)★「紫色」「赤紫色」「青紫〜赤紫色」(ヒズチジンとは青色)など教科書や参考書により幅があります。★高校範囲ではアミノ酸との反応のみですので紫系の色を答えます。"},{"id":"J500150","q":"ビウレット反応での試薬は[ NaOHaq、硫酸銅(II)aq ]である。","answer":"NaOHaq、硫酸銅(II)aq","choices":["NaOHaq、硫酸銅(II)aq","ニンヒドリン溶液","NaOHaq、酢酸鉛(II)aq"],"explain":"★NaOHは塩基性にするために加えます。硫酸銅(II)のCu²⁺イオンがペプチド結合部分に配位結合をして赤紫色になります。2つ以上のペプチド結合(トリペプチド以上)で呈色します。"},{"id":"J500160","q":"キサントプロテイン反応での試薬は[ 濃硝酸、アンモニア水 ]である。(加熱)","answer":"濃硝酸、アンモニア水","choices":["濃硝酸、アンモニア水","NaOHaq、硫酸銅(II)aq","ニンヒドリン溶液"],"explain":"★濃硝酸で黄色、アンモニア水で橙黄色です。\n★キ(黄色)サン(濃硝酸)ト(と)プロテイン(タンパク質)と対応させると、あとは加熱とアンモニア水です。★濃硝酸がベンゼン環(芳香環)をニトロ化して黄色になります。\n*キサント(xantho-、ギリシア語)は黄色(yellow)を意味します。"},{"id":"J500170","q":"タンパク質から硫黄の検出をするときの試薬は[ NaOHaq、酢酸鉛(II)aq ]である。(酢酸、加熱)","answer":"NaOHaq、酢酸鉛(II)aq","choices":["NaOHaq、酢酸鉛(II)aq"],"explain":"★システインとメチオニンが検出できます。東大2018年(教科書の表現が曖昧な部分)\n★ゴロ:しめしめ or 酢飯(すめし、S、メチオニン、システイン)\n★[発展]側鎖にSをもつシステイン(-SH)は容易に反応します。メチオニンの-S-は側鎖ではないためそのままでは反応しません。メチオニンを水酸化ナトリウムと高温で分解したり、固体のナトリウムと融解することで反応します。\n★-SHメルカプト基(チオール基)\n★-S-チオ基\n★PbSの黒色沈殿を生じます。\n★中性〜塩基性で沈殿が生じる反応なのでNaOHaqを入れる必然性があります。酸性下ではH⁺が多くなりS²⁻ + 2H⁺ → H₂Sの反応が起こります。(平衡・無機化学)"},{"id":"J500180","q":"ニンヒドリン反応での試薬は[ ニンヒドリン溶液 ]である。","answer":"ニンヒドリン溶液","choices":["ニンヒドリン溶液","NaOHaq、酢酸鉛(II)aq","濃硝酸、アンモニア水","硫黄の検出"],"explain":"★アミノ酸を検出する反応です。紫系統の色になります。★ゴロ: 村にひとりアミちゃん(紫、ニンヒドリン、アミノ酸のアミノ基)"},{"id":"J500190","q":"銅(II)イオンが2つ以上のペプチド結合と錯イオンを形成する呈色反応を[ ビウレット反応 ]という。","answer":"ビウレット反応","choices":["ビウレット反応","キサントプロテイン反応","ニンヒドリン反応","両方反応しない"],"explain":"★「2つ以上のペプチド結合」はトリペプチド以上のペプチドを意味しています。ジペプチドでは陰性です。"},{"id":"J500200","q":"ジペプチドとトリペプチドのビウレット反応について適切なものは[ トリペプチドのみ反応する ]である。","answer":"トリペプチドのみ反応する","choices":["トリペプチドのみ反応する","ジペプチドのみ反応する","両方反応する","硫黄の検出"],"explain":"★トリペプチドには2つのペプチド結合があります。ジペプチドは1つだけペプチド結合をもち、ビウレット反応は陰性です。"},{"id":"J500210","q":"アミノ酸が単体であるとき、どのアミノ酸にも呈色しない反応は[ ビウレット反応 ]である。","answer":"ビウレット反応","choices":["ビウレット反応","キサントプロテイン反応","ニンヒドリン反応","硫黄の検出"],"explain":"★ビウレット反応は「2つ以上のペプチド結合」(トリペプチド以上)との反応です。アミノ酸が3つ以上連なっている必要があります。"},{"id":"J500211","q":"どのジペプチドにも呈色しない反応は[ ビウレット反応 ]である。","answer":"ビウレット反応","choices":["ビウレット反応","キサントプロテイン反応","ニンヒドリン反応","硫黄の検出"],"explain":"★ビウレット反応は「2つ以上のペプチド結合」(ト Aspartic acid + phenylAlanine Methyl Ester"},{"id":"J300120","q":"L-フェニルアラニンのメチルエステルとジペプチドを作り、アスパルテームとなるアミノ酸は[ L-アスパラギン酸 ]である。★アスパルテームとアスパラギン酸は3文字目まで同じなので連想しやすいと思います。","answer":"L-アスパラギン酸","choices":["L-アスパラギン酸","L-グルタミン酸","L-アスパラギン","L-リシンのメチルエステル"],"explain":"★英語\nAspartame\nAspartic acid + phenylAlanine Methyl Ester"},{"id":"J300130","q":"L-アスパラギン酸とジペプチドを作り、アスパルテームとなるものは[ L-フェニルアラニンのメチルエステル ]である。","answer":"L-フェニルアラニンのメチルエステル","choices":["L-フェニルアラニンのメチルエステル","L-アラニンのメチルエステル","L-チロシンのメチルエステル","多糖類"],"explain":"★英語\nAspartame\nAspartic acid + phenylAlanine Methyl Ester"},{"id":"J300140","q":"砂糖の200倍近くの甘さをもつアスパルテームは[ 人工甘味料 ]に分類できる。","answer":"人工甘味料","choices":["人工甘味料","転化糖","単糖類","1種類(異性体なし)"],"explain":"★ノンカロリー・ローカロリー飲料・食品に含まれます。構成要素は必須アミノ酸ですが、人工物なので健康面に疑問を呈する記事などを見かけます。天然の糖類も取りすぎると糖尿病になりますので注意してください。"},{"id":"J300150","q":"グリシンとアラニンのジペプチドには構造異性体が[ 2種類 ]ある。","answer":"2種類","choices":["2種類","4種類","6種類","1種類(異性体なし)、2種類"],"explain":"★名称は範囲外ですがグリシルアラニン(Gly-Ala)とアラニルグリシン(Ala-Gly)があります。\nグリシルアラニン(Gly-Ala)\nH₂N-CH₂-CONH-CH(CH₃)-COOH\nアラニルグリシン(Ala-Gly)\nH₂N-CH(CH₃)-CONH-CH₂-COOH"},{"id":"J300151","q":"グリシンとアラニンのジペプチドには構造異性体が[ 2種類 ]あり、光学異性体を含めると[ 4種類 ]の異性体がある。","answer":"2種類、4種類","choices":["2種類、4種類","4種類、6種類","6種類、12種類","グリシンのアミノ基"],"explain":"★名称は範囲外ですがグリシルアラニン(Gly-Ala)とアラニルグリシン(Ala-Gly)があります。★アラニン側に不斉炭素原子をそれぞれ1つずつ持つので、光学異性体が2¹=2種類ずつ存在し、異性体は4種類になります。"},{"id":"J300160","q":"グリシンとアラニンのジペプチドの1つとして、グリシンのアミノ基と結合するのは[ アラニンのカルボキシ基 ]の部分である。","answer":"アラニンのカルボキシ基","choices":["アラニンのカルボキシ基","アラニンのアミノ基","グリシンのカルボキシ基","グリシンのアミノ基"],"explain":"★アラニルグリシン(Ala-Gly)\nH₂N-CH(CH₃)-CO-OH + H-NH-CH₂-COOH \n→ H₂N-CH(CH₃)-CONH-CH₂-COOH"},{"id":"J300170","q":"グリシンとアラニンのジペプチドの1つとして、グリシンのカルボキシ基と結合するのは[ アラニンのアミノ基 ]の部分である。","answer":"アラニンのアミノ基","choices":["アラニンのアミノ基","アラニンのカルボキシ基","グリシンのカルボキシ基","4種類"],"explain":"★グリシルアラニン(Gly-Ala)\nH₂N-CH₂-CO-OH + H-NH-CH(CH₃)-COOH \n→ H₂N-CH₂-CONH-CH(CH₃)-COOH"},{"id":"J300180","q":"グリシン、アラニン、フェニルアラニンの各1分子ずつのトリペプチドには構造異性体が[ 6種類 ]ある。","answer":"6種類","choices":["6種類","12種類","3種類","3種類、24種類"],"explain":"★アミノ基を左側、カルボキシ基を右側と固定すると、3!=3×2×1=6通り。Gly-Ala-Phe、Gly-Phe-Ala、Ala-Gly-Phe、Ala-Phe-Gly、Phe-Gly-Ala、Phe-Ala-Gly、の6つが作れます。"},{"id":"J300181","q":"グリシン、アラニン、フェニルアラニンの各1分子ずつのトリペプチドには構造異性体が[ 6種類 ]あり、光学異性体を含めると[ 24種類 ]の異性体がある。","answer":"6種類、24種類","choices":["6種類、24種類","6種類、48種類","3種類、12種類","3種類、24種類"],"explain":"★アミノ基を左側、カルボキシ基を右側と固定すると、3!=3×2×1=6通り。不斉炭素原子が2つずつあるので、光学異性体が2²=4種類ずつ存在し、異性体は6×4=24種類になります。"},{"id":"J300182","q":"グリシン、アラニン、フェニルアラニンの各1分子ずつのトリペプチドには構造異性体が[ 6種類 ]あり、光学異性体を含めると[ 24種類 ]の異性体がある。","answer":"6種類、24種類","choices":["6種類、24種類","6種類、48種類","3種類、12種類","6種類"],"explain":"★アミノ基を左側、カルボキシ基を右側と固定すると、3!=3×2×1=6通り。不斉炭素原子が2つずつあるので、光学異性体が2²=4種類ずつ存在し、異性体は6×4=24種類になります。"},{"id":"J300200","q":"アルファベットA、B、Cを各1回ずつ使い横1列に並べる並べ方は[ 6種類 ]ある。ただし、A-B-CとC-B-Aは区別し、別の並べ方としてカウントする。","answer":"6種類","choices":["6種類","3種類","2種類"],"explain":"★3!=3×2×1=6通り。A-B-C、A-C-B、B-A-C、B-C-A、C-A-B、C-B-A。"},{"id":"J300201","q":"アルファベットA、B、Bを各1回ずつ使い横1列に並べる並べ方は[ 3種類 ]ある。ただし、A-B-BとB-B-Aは区別し、別の並べ方としてカウントする。","answer":"3種類","choices":["3種類","2種類","4種類","9種類"],"explain":"★3つのうち2つが同じなので、3!/2!=3通り。A-B-B、B-A-B、B-B-A。"},{"id":"J300210","q":"グリシン、アラニン、アラニンの各1分子ずつのトリペプチドには構造異性体が[ 3種類 ]ある。","answer":"3種類","choices":["3種類","2種類","4種類","6種類、12種類"],"explain":"★アミノ基を左側、カルボキシ基を右側と固定すると、3!/2!=3通り。Gly-Ala-Ala、Ala-Gly-Ala、Ala-Ala-Gly。★不斉炭素原子が2つずつあるので、光学異性体を含めると2²=4種類ずつ存在し、異性体は3×4=12種類になります。"},{"id":"J300220","q":"グリシン、アラニン、アラニンの各1分子ずつのトリペプチドには構造異性体が[ 3種類 ]あり、光学異性体を含めると[ 12種類 ]の異性体がある。","answer":"3種類、12種類","choices":["3種類、12種類","3種類、6種類","6種類、24種類","6種類"],"explain":"★アミノ基を左側、カルボキシ基を右側と固定すると、3!/2!=3通り。不斉炭素原子が2つずつあるので、光学異性体を含めると2²=4種類ずつ存在し、異性体は3×4=12種類になります。"},{"id":"J300230","q":"グリシン、グリシン、アラニンの各1分子ずつのトリペプチドには構造異性体が[ 3種類 ]ある。","answer":"3種類","choices":["3種類","2種類","4種類","6種類、12種類"],"explain":"★アミノ基を左側、カルボキシ基を右側と固定すると、3!/2!=3通り。Gly-Gly-Ala、Gly-Ala-Gly、Ala-Gly-Gly。★不斉炭素原子が1つずつあるので、光学異性体を含めると2¹=2種類ずつ存在し、異性体は3×2=6種類になります。"},{"id":"J300240","q":"グリシン、グリシン、アラニンの各1分子ずつのトリペプチドには構造異性体が[ 3種類 ]あり、光学異性体を含めると[ 6種類 ]の異性体がある。","answer":"3種類、6種類","choices":["3種類、6種類","3種類、12種類","6種類、24種類","糖類"],"explain":"★アミノ基を左側、カルボキシ基を右側と固定すると、3!/2!=3通り。不斉炭素原子が1つずつあるので、光学異性体を含めると2¹=2種類ずつ存在し、異性体は3×2=6種類になります。"},{"id":"J600270","q":"酵素が作用する相手のことを[ 基質 ]という。","answer":"基質","choices":["基質"],"explain":"★酵素は生体内で触媒として働く物質です。触媒は化学反応を促進する物質で反応の前後で変化のないものです。"},{"id":"J600280","q":"アミラーゼの基質は[ デンプン ]である。","answer":"デンプン","choices":["デンプン","セルロース","マルトース","スクロース"],"explain":"★デンプンはアミロースとアミロペクチンです。アミロース(amylose)やアミロペクチン(amylopectin)の酵素(-ase)はアミラーゼ(amylase)です。★デンプンはラテン語でamylum、英語はstarchです。"},{"id":"J600290","q":"マルターゼの基質は[ マルトース ]である。","answer":"マルトース","choices":["マルトース","デンプン","セルロース","スクラーゼの基質は[ スクロース ]である。\n★スクロース(sucrose)の酵素(-ase)はスクラーゼ(sucrase)です。"],"explain":"★マルトース(maltose)の酵素(-ase)はマルターゼ(maltase)です。"},{"id":"J600300","q":"スクラーゼの基質は[ スクロース ]である。","answer":"スクロース","choices":["スクロース","デンプン","マルトース","セルラーゼの基質は[ セルロース ]である。\n★セルロース(cellulose)の酵素(-ase)はセルラーゼ(cellulase)です。"],"explain":"★スクロース(sucrose)の酵素(-ase)はスクラーゼ(sucrase)です。"},{"id":"J600310","q":"セルラーゼの基質は[ セルロース ]である。","answer":"セルロース","choices":["セルロース","デンプン","マルトース","グルコース"],"explain":"★セルロース(cellulose)の酵素(-ase)はセルラーゼ(cellulase)です。"},{"id":"J600320","q":"ペプシンの基質は[ タンパク質 ]である。","answer":"タンパク質","choices":["タンパク質","デンプン","油脂","グルコース"],"explain":"★タンパク質(protein)の酵素で胃液に含まれるものがペプシン(pepsin)です。★ゴロ: 家でペプシマン、タンパク質を吸い取ります。(胃液、ペプシン、タンパク質、すい液、トリプシン)。ペプシマンはペプシコーラのキャラクターです。"},{"id":"J600330","q":"トリプシンの基質は[ タンパク質 ]である。","answer":"タンパク質","choices":["タンパク質","デンプン","油脂","ペプチダーゼの基質は[ ペプチド ]である。\n★ペプチド(peptid)の酵素(-ase)はペプチダーゼ(peptidase)です。"],"explain":"★タンパク質(protein)の酵素ですい液に含まれるものがトリプシン(trypsin)です。★ゴロ: 家でペプシマン、タンパク質を吸い取ります。(胃液、ペプシン、タンパク質、すい液、トリプシン)。ペプシマンはペプシコーラのキャラクターです。"},{"id":"J600340","q":"ペプチダーゼの基質は[ ペプチド ]である。","answer":"ペプチド","choices":["ペプチド","過酸化水素","油脂","デンプン"],"explain":"★ペプチド(peptid)の酵素(-ase)はペプチダーゼ(peptidase)です。"},{"id":"J600350","q":"リパーゼの基質は[ 油脂 ]である。","answer":"油脂","choices":["油脂","過酸化水素","ペプチド"],"explain":"★油脂(fats and oils)を脂質(lipid)と言い換えます。脂質(lipid)の酵素(-ase)はリパーゼ(lipase)です。"},{"id":"J600360","q":"チマーゼの基質は[ グルコース ]である。","answer":"グルコース","choices":["グルコース","過酸化水素","油脂"],"explain":"★チマーゼ(zymase)は、グルコースなどの単糖類へ作用します。★グルコースをエタノールと二酸化炭素に発酵させる酵素複合体です。この発酵をアルコール発酵といいます。(教科書ではグルコースのみ、百科事典ではスクロースなどもアルコール発酵させるとあります。)"},{"id":"J600370","q":"カタラーゼの基質は[ 過酸化水素 ]である。","answer":"過酸化水素","choices":["過酸化水素","ペプチド","油脂","スクロース"],"explain":"★過酸化水素に作用して酸素と水へ分解します。★カタラーゼ(catalase)は、触媒(enzyme, catalyst)として過酸化水素(hydrogen peroxide)に作用します。catalysis「触媒作用」、catalyze「触媒作用を及ぼす」を覚えると連想しやすくなります。*どの酵素にも触媒作用はあります。"},{"id":"J600380","q":"アミラーゼがデンプンに作用すると[ マルトース ]が生成する。","answer":"マルトース","choices":["マルトース","ペプチド","グルコース","スクロース"],"explain":"★デンプンは多糖類のアミロースやアミロペクチンです。アミロースとアミロペクチンを加水分解すると二糖類のマルトースになります。さらにマルターゼで加水分解するとα-グルコースになります。"},{"id":"J600390","q":"マルターゼがマルトースに作用すると[ グルコース ]が生成する。","answer":"グルコース","choices":["グルコース","マルトース","ペプチド"],"explain":"★マルトース(二糖類)を加水分解するとグルコース(単糖類)になります。水中ではαとβが平衡です。★マルトースはα-グルコースとグルコースがα-1,4グリコシド結合した二糖類です。★ゴロ: 一緒に(α-1、4)ぐるぐるまる(グルコース2つでマルトース)。"},{"id":"J600400","q":"スクラーゼがスクロースに作用すると[ グルコースとフルクトース ]が生成する。","answer":"グルコースとフルクトース","choices":["グルコースとフルクトース","マルトース","グルコース","基質"],"explain":"★スクロース(二糖類)を加水分解するとα-グルコース(ブドウ糖)とβ-フルクトース(果糖)の等量混合物である転化糖になります。★スクロースは、α-グルコースとβ-フルクトース(五員環)がα-1，2グリコシド結合をしています。★ゴロ: スクールでスグ5人フルのがベター"},{"id":"J600410","q":"スクラーゼがスクロースに作用すると[ 転化糖 ]が生成する。","answer":"転化糖","choices":["転化糖","ペプチド","油脂","基質"],"explain":"★スクロース(二糖類)を加水分解するとα-グルコース(ブドウ糖)とβ-フルクトース(果糖)の等量混合物である転化糖になります。★スクロースは、α-グルコースとβ-フルクトース(五員環)がα-1，2グリコシド結合をしています。★ゴロ: スクールでスグ5人フルのがベター"},{"id":"J600420","q":"グルコースとフルクトース(共に単糖類)の等量混合物のことを[ 転化糖 ]という。","answer":"転化糖","choices":["転化糖","ペプチド","油脂","スクロース"],"explain":"★スクロースを酵素スクラーゼで加水分解するとα-グルコース(ブドウ糖)とβ-フルクトース(果糖)の等量混合物である転化糖になります。"},{"id":"J600430","q":"セルラーゼがセルロースに作用すると[ セロビオース ]が生成する。","answer":"セロビオース","choices":["セロビオース","マルトース","ペプチド","デンプン"],"explain":"★多糖類のセルロースを加水分解するとセロビオース(二糖類)になります。\n★セルロース→セロビオース→グルコース(水中ではαとβが平衡、単量体としてはβ-グルコース)\n(酵素は順にセルラーゼ、セロビアーゼ)"},{"id":"J600440","q":"ペプシンがタンパク質に作用すると[ ペプチド ]が生成する。","answer":"ペプチド","choices":["ペプチド","過酸化水素","油脂","デンプン"],"explain":"★タンパク質はポリペプチドです。加水分解するとペプチドになります。*ペプチダーゼでペプチドをさらに分解するとα-アミノ酸になります。★酵素の所在のゴロ: 家でペプシマン、タンパク質を吸い取る。(胃液、ペプシン、タンパク質、すい液、トリプシン)"},{"id":"J600450","q":"トリプシンがタンパク質に作用すると[ ペプチド ]が生成する。","answer":"ペプチド","choices":["ペプチド","過酸化水素","油脂","デンプン"],"explain":"★タンパク質はポリペプチドです。加水分解するとペプチドになります。*ペプチダーゼでペプチドをさらに分解するとα-アミノ酸になります。★酵素の所在のゴロ: 家でペプシマン、タンパク質を吸い取る。(胃液、ペプシン、タンパク質、すい液、トリプシン)"},{"id":"J600460","q":"ペプチダーゼがペプチドに作用すると[ アミノ酸 ]が生成する。","answer":"アミノ酸","choices":["アミノ酸","タンパク質","油脂","脂肪油とグリコール"],"explain":"★ペプチドはα-アミノ酸がペプチド結合で2つ以上繋がったものです。加水分解すると(α-)アミノ酸になります。★多数繋がると高分子のポリペプチド(タンパク質)になります。"},{"id":"J600470","q":"リパーゼが油脂に作用すると[ 脂肪酸とモノグリセリド ]が生成する。","answer":"脂肪酸とモノグリセリド","choices":["脂肪酸とモノグリセリド","脂肪酸とグリコール","脂肪油とモノグリセリド","水と酸素"],"explain":"★油脂はグリセリンに3つの高級脂肪酸がエステル結合したものです。リパーゼで加水分解すると脂肪酸とモノグリセリドになります。★グリセリンに高級脂肪酸が1つだけ繋がったものをモノグリセリドといいます。2つではジグリセリド、3つではトリグリセリド(油脂)です。"},{"id":"J600480","q":"チマーゼがグルコースに作用すると[ エタノールと二酸化炭素 ]が生成する。","answer":"エタノールと二酸化炭素","choices":["エタノールと二酸化炭素","エタノールと酸素","水と二酸化炭素","カタラーゼが過酸化水素に作用すると[ 水と酸素 ]が生成する。\n★2H₂O₂ → 2H₂O + O₂"],"explain":"★チマーゼは、グルコースをエタノールと二酸化炭素に発酵させる酵素複合体です。この発酵をアルコール発酵といいます。(教科書ではグルコースのみ、百科事典ではスクロースなどもアルコール発酵させるとあります。)"},{"id":"J600490","q":"カタラーゼが過酸化水素に作用すると[ 水と酸素 ]が生成する。","answer":"水と酸素","choices":["水と酸素","エタノールと酸素","水と二酸化炭素","スクラーゼ"],"explain":"★2H₂O₂ → 2H₂O + O₂"},{"id":"J600500","q":"デンプンに作用して、マルトースを生成する酵素は[ アミラーゼ ]である。","answer":"アミラーゼ","choices":["アミラーゼ","セルラーゼ","マルターゼ","スクラーゼ"],"explain":"★デンプンはアミロースとアミロペクチンです。アミロース(amylose)やアミロペクチン(amylopectin)の酵素(-ase)はアミラーゼ(amylase)です。★デンプンはラテン語でamylum、英語はstarchです。"},{"id":"J600510","q":"マルトースに作用して、グルコースを生成する酵素は[ マルターゼ ]である。","answer":"マルターゼ","choices":["マルターゼ","アミラーゼ","セルラーゼ"],"explain":"★マルトース(maltose)の酵素(-ase)はマルターゼ(maltase)です。"},{"id":"J600520","q":"スクロースに作用して、グルコースとフルクトースを生成する酵素は[ スクラーゼ ]である。","answer":"スクラーゼ","choices":["スクラーゼ","アミラーゼ","マルターゼ"],"explain":"★スクロース(sucrose)の酵素(-ase)はスクラーゼ(sucrase)です。"},{"id":"J600530","q":"セルロースに作用して、セロビオースを生成する酵素は[ セルラーゼ ]である。","answer":"セルラーゼ","choices":["セルラーゼ","アミラーゼ","マルターゼ","カタラーゼ"],"explain":"★セルロース(cellulose)の酵素(-ase)はセルラーゼ(cellulase)です。"},{"id":"J600540","q":"タンパク質に作用して、ペプチドを生成する酵素は[ ペプシン ]である。","answer":"ペプシン","choices":["ペプシン","リパーゼ","ペプチダーゼ","カタラーゼ"],"explain":"★タンパク質(protein)の酵素で胃液に含まれるものがペプシン(pepsin)です。★ゴロ: 家でペプシマン、タンパク質を吸い取る。(胃液、ペプシン、タンパク質、すい液、トリプシン)"},{"id":"J600550","q":"タンパク質に作用して、ペプチドを生成する酵素は[ トリプシン ]である。","answer":"トリプシン","choices":["トリプシン","リパーゼ","ペプチダーゼ","ペプチドに作用して、アミノ酸を生成する酵素は[ ペプチダーゼ ]である。\n★ペプチド(peptid)の酵素(-ase)はペプチダーゼ(peptidase)です。"],"explain":"★タンパク質(protein)の酵素ですい液に含まれるものがトリプシン(trypsin)です。★ゴロ: タンパク質を吸いとります。(タンパク質、すい液、トリプシン)"},{"id":"J600560","q":"ペプチドに作用して、アミノ酸を生成する酵素は[ ペプチダーゼ ]である。","answer":"ペプチダーゼ","choices":["ペプチダーゼ","リパーゼ","ペプシン","カタラーゼ"],"explain":"★ペプチド(peptid)の酵素(-ase)はペプチダーゼ(peptidase)です。"},{"id":"J600570","q":"油脂に作用して、脂肪酸とモノグリセリドを生成する酵素は[ リパーゼ ]である。","answer":"リパーゼ","choices":["リパーゼ","チマーゼ","ペプシン","カタラーゼ"],"explain":"★油脂(fats and oils)を脂質(lipid)と考えて、脂質(lipid)の酵素(-ase)はリパーゼ(lipase)です。"},{"id":"J600580","q":"グルコースに作用して、エタノールと二酸化炭素を生成する酵素は[ チマーゼ ]である。","answer":"チマーゼ","choices":["チマーゼ","リパーゼ","ペプシン","トリプシン"],"explain":"★グルコースなどの単糖類へ作用します。★グルコースをエタノールと二酸化炭素に発酵させる酵素複合体です。この発酵をアルコール発酵といいます。(教科書ではグルコースのみ、百科事典ではスクロースなどもアルコール発酵させるとあります。)"},{"id":"J600590","q":"過酸化水素に作用して、水と酸素を生成する酵素は[ カタラーゼ ]である。","answer":"カタラーゼ","choices":["カタラーゼ","リパーゼ","チマーゼ","バイオマス発電装置"],"explain":"★触媒(enzyme, catalyst)として有名な過酸化水素(hydrogen peroxide)に触媒として作用する(catalyze)のはカタラーゼ(catalase)です。★catalysis「触媒作用」、catalyze「触媒作用を及ぼす」から連想します。"},{"id":"J600600","q":"アルコール飲料や医薬品を生成するときに、酵素反応を行う微生物などを大量に閉じ込めて反応を起こさせる装置を[ バイオリアクター ]という。","answer":"バイオリアクター","choices":["バイオリアクター","キップの装置","ドラフト","リン酸"],"explain":""},{"id":"J400010","q":"多数のα-アミノ酸が一定の配列順序でペプチド結合した物質を[ タンパク質 ]という。","answer":"タンパク質","choices":["タンパク質","炭水化物","脂肪","ジペプチド"],"explain":"★機能をもつポリペプチドをタンパク質と呼びますが、ポリペプチドとタンパク質の境界線に厳密な定義はありません。"},{"id":"J400020","q":"タンパク質は[ ポリペプチド ]に分類できる。","answer":"ポリペプチド","choices":["ポリペプチド","オリゴペプチド","トリペプチド","脂肪"],"explain":"★機能をもつポリペプチドをタンパク質と呼びますが、ポリペプチドとタンパク質の境界線に厳密な定義はありません。"},{"id":"J400030","q":"人の体内で水に次いで多い構成要素は[ タンパク質 ]である。(約20％、体形により例外はあるかもしれません)","answer":"タンパク質","choices":["タンパク質","炭水化物","無機塩類","カゼイン"],"explain":"★水分60％、たんぱく質20％、脂肪18％の順です。"},{"id":"J400040","q":"血糖値を減少させるタンパク質に[ インスリン ]がある。","answer":"インスリン","choices":["インスリン","ヘモグロビン","ミオグロビン","カゼイン"],"explain":"★糖尿病の治療ではインスリンを携帯して自己注射をすることもあります。医療系ドラマなどにも登場します。"},{"id":"J400050","q":"酸素を運搬するタンパク質に[ ヘモグロビン ]がある。","answer":"ヘモグロビン","choices":["ヘモグロビン","インスリン","ミオグロビン","約20種類"],"explain":"★中学理科でも登場しますので、一般常識の範囲だと思います。"},{"id":"J400060","q":"ヒトを構築しているタンパク質は大まかに[ 約10万種類 ]ある。","answer":"約10万種類","choices":["約10万種類","約1000万種類","約1000種類","タンパク質の三次構造"],"explain":"★タンパク質を構成するα-アミノ酸は約20種類ですが、組み合わせにより約10万種類のタンパク質が体内で機能しています。"},{"id":"J400061","q":"タンパク質分子中のアミノ酸の連なりを[ ポリペプチド鎖 ]という。","answer":"ポリペプチド鎖","choices":["ポリペプチド鎖","タンパク質の一次構造","タンパク質の二次構造","タンパク質の四次構造"],"explain":"★「アミノ酸の連なり」を「ポリペプチド鎖」といい、ポリペプチド鎖の「アミノ酸の配列順序」を「タンパク質の一次構造」といいます。"},{"id":"J400070","q":"タンパク質のポリペプチド鎖のα-アミノ酸の配列順序のことを[ タンパク質の一次構造 ]という。","answer":"タンパク質の一次構造","choices":["タンパク質の一次構造","タンパク質の二次構造","タンパク質の三次構造","二重らせん構造"],"explain":"★「アミノ酸の連なり」を「ポリペプチド鎖」といい、ポリペプチド鎖の「アミノ酸の配列順序」を「タンパク質の一次構造」といいます。"},{"id":"J400080","q":"タンパク質のポリペプチド鎖がとるらせん構造を[ α-ヘリックス ]という。","answer":"Clearing non-config state for ","choices":["Clearing non-config state for "],"explain":"★タンパク質の二次構造のうち、ポリペプチド鎖のらせん構造はα-ヘリックス、ポリペプチド鎖の平面構造はβ-シート(β-構造)といいます。"},{"id":"J400090","q":"C=C結合をもたない合成ゴムは[ シリコーンゴム(Q) ]である。","answer":"\n        |","choices":["\n        |","p-ヒドロキシフェニルアラニンは[____]である。","\n\n答え\n","\n\n答え."],"explain":"★C=C結合をもたない(つまり、ブタジエン骨格ももたない)合成ゴムとしてフッ素ゴム(FKM)とシリコーンゴム(Q)を覚えます。C=C結合部分は空気で酸化されゴムの老化が起きやすい部分です。そのC=C結合をもたないので耐老化性の特徴を示します。\n★フッ素ゴム(FKM)\n[-[-CH₂-CF₂-]ᵤ-[-CF₂-CF(CF₃)-]ᵥ-]ₓなど\nシリコーンゴム(Q)\n[-Si(CH₃)₂-O-]ₓなど、-Si-O-の連なり(シロキサン骨格、ポリシロキサン)をもつゴム。\n*(範囲外)-Si-O-の連なり、または-Si-O-Si-をシロキサン結合と呼びます。"},{"id":"J400091","q":"タンパク質のα-ヘリック →イソプレン"},{"id":"K600060","q":"イソプレンC₅H₈は[ 無色 ]の[ 液体 ]である。","answer":"無色、液体","choices":["無色、液体","無色、固体","黄色、液体","シリコーンゴム"],"explain":"★イソプレンは2-メチル-1,3-ブタジエン\nCH₂=C(CH₃)-CH=CH₂です。\n★1つ飛びの二重結合を共役二重結合と呼び(範囲外)、この構造からジエン系ゴムが得られます。"},{"id":"K600070","q":"生ゴム(天然ゴム)は[ ポリイソプレン ]である。","answer":"ポリイソプレン","choices":["ポリイソプレン","ポリブタジエン","フッ素ゴム","グッタペルカ、チクル、天然ゴム(生ゴム)"],"explain":"★教科書に出てくるポリイソプレンは、\n・シス形の天然ゴム(生ゴム)、\n・トランス形のグッタペルカ、\n・シス形とトランス形を含むチクル、です。\n★[-CH₂-C(CH₃)=CH-CH₂-]ₓ\n構成単位で見ると二重結合が1つになり、位置も真ん中になります。\n★イソプレンは2-メチル-1,3-ブタジエン\nCH₂=C(CH₃)-CH=CH₂です。"},{"id":"K600072","q":"ポリイソプレンとして、シス形の[ 天然ゴム(生ゴム) ]、トランス形の[ グッタペルカ ]、シス形とトランス形を含む[ チクル ]がある。","answer":"天然ゴム(生ゴム)、グッタペルカ、チクル","choices":["天然ゴム(生ゴム)、グッタペルカ、チクル","天然ゴム(生ゴム)、チクル、グッタペルカ","グッタペルカ、天然ゴム(生ゴム)、チクル","もたない"],"explain":"★ゴムの木から天然ゴム(生ゴム)、グッタペルカの木(アカテツ科)からグッタペルカ、サボティラの木からチクルが採れます。(教科書より)\n★天然ゴム(生ゴム)とグッタペルカは入試で問われます。*チクルは掲載なしの教科書が多いです。"},{"id":"K600080","q":"イソプレンは[ 2つ ]のC=C結合をもつ。","answer":"2つ","choices":["2つ","1つ","3つ","もたない"],"explain":"★イソプレンは2-メチル-1,3-ブタジエン\nCH₂=C(CH₃)-CH=CH₂です。\n★1つ飛びの二重結合を共役二重結合と呼び(範囲外)、この構造からジエン系ゴムが得られます。高校範囲ではジエン系ゴムかそれ以外かを区別させます。"},{"id":"K600090","q":"ポリイソプレンの構成単位になっているイソプレン部分は重合体の中で[ 1つ ]のC=C結合をもつ。","answer":"1つ","choices":["1つ","2つ","3つ","1-メチル-1,3-ブタジエン"],"explain":"★[-CH₂-C(CH₃)=CH-CH₂-]ₓ\n構成単位で見ると二重結合が1つになり、位置も真ん中になります。\n★比較：単量体としてのイソプレンは2-メチル-1,3-ブタジエン\nCH₂=C(CH₃)-CH=CH₂です。"},{"id":"K600100","q":"イソプレンは[ 2-メチル-1,3-ブタジエン ]である。","answer":"2-メチル-1,3-ブタジエン","choices":["2-メチル-1,3-ブタジエン","2-メチル-3-ブテン","2-メチル-1-ブテン","3位と4位の炭素間"],"explain":"★化学式は、\nCH₂=C(CH₃)-CH=CH₂です。\n★1つ飛びの二重結合を共役二重結合と呼び(範囲外)、この構造からジエン系ゴムが得られます。*「イソプレン、2-メチル-1,3-ブタジエン」はゴムの基本です。100回唱えてでも覚えましょう！"},{"id":"K600110","q":"ポリイソプレンの構成単位になっているイソプレン部分のC=C結合は[ 2位と3位の炭素間 ]にある。","answer":"2位と3位の炭素間","choices":["2位と3位の炭素間","1位と2位の炭素間","1位と2位、3位と4位の炭素間","交互にシス形とトランス形"],"explain":"★ポリイソプレン\n[-CH₂-C(CH₃)=CH-CH₂-]ₓ\n構成単位で見ると二重結合が1つになり、位置も真ん中になります。\n★比較：単量体としてのイソプレンは2-メチル-1,3-ブタジエン\nCH₂=C(CH₃)-CH=CH₂です。"},{"id":"K600120","q":"天然ゴム(生ゴム)のポリイソプレン鎖のC=C結合部分は const LSP = "kobunshi";
const LS_KEY  = LSP + "_progress_v4";   /* v4: 新ストレージ／クラウド方式に合わせて再スタート */
const SET_KEY = LSP + "_settings_v2";
const UID_KEY = LSP + "_uid_v2";   /* v2: 同期IDも新規化（旧IDを記憶しない＝完全に最初から） */
const GAS_URL = "https://script.google.com/macros/s/AKfycbxzSyhZakYdLJ2kYgczpUlpVW4H-ORJksS2JIa-NDOEGmIUEUbFDK9TnLqRywmiT6D0zA/exec";
const SYNC_SUFFIX = "-kobun-v4";   /* 教科ごとに固有のクラウド保存枠（衝突防止・空き枠から再スタート） */
const DAILY_GOAL = 10;

/* proficiency: 0 未学習 / 1 苦手 / 2 うろ覚え / 3 ほぼ覚えた / 4 完璧 */
const PLABEL=["未学習","苦手","うろ覚え","ほぼ覚えた","覚えた"];
const PCOLOR=["#d9d9de","#3b86f0","#7cc6b0","#46c07a","#1a9d5a"];
const H=3600e3, D=24*H;
function reviewInterval(p){ return p===4?7*D : p===3?3*D : p===2?1*D : 1*H; }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }

/* ---------- storage ---------- */
let progress = loadProgress();
let settings = loadSettings();
function loadProgress(){
  let o; try{ o=JSON.parse(localStorage.getItem(LS_KEY)); }catch(e){}
  if(!o||typeof o!=="object") o={};
  o.words=o.words||{}; o.stocked=o.stocked||{}; o.resume=o.resume||{}; o.daily=o.daily||{date:todayStr(),count:0};
  return o;
}
function saveProgress(){ try{ localStorage.setItem(LS_KEY,JSON.stringify(progress)); }catch(e){} cloudPush(); }
function loadSettings(){
  const def={count:50,quizTime:0,cardTime:0,hide:false,auto:false,train:false,sound:true,shuffle:true,resume:false,mode:"quiz"};
  let o; try{ o=JSON.parse(localStorage.getItem(SET_KEY)); }catch(e){}
  return Object.assign(def,o||{});
}
function saveSettings(){ try{ localStorage.setItem(SET_KEY,JSON.stringify(settings)); }catch(e){} }

function wordId(code,idx){ return code+"#"+idx; }
function peek(id){
  const s=progress.words[id];
  if(!s) return {p:0,c:0,w:0,due:0};
  if(s.p===undefined){ const c=s.c||0,w=s.w||0; return {p:(c+w===0)?0:(w>c)?1:(c-w>=3)?4:(w===c)?2:3,c,w,due:s.due||0}; }
  return {p:s.p,c:s.c||0,w:s.w||0,due:s.due||0};
}
function profOf(id){ return peek(id).p; }
function dueNow(id,now){ const s=peek(id); return s.p>0 && s.due && s.due<=now; }
function isStocked(id){ return !!progress.stocked[id]; }
function wState(id){
  let s=progress.words[id];
  if(!s){ s={p:0,c:0,w:0,due:0,t:0}; progress.words[id]=s; }
  if(s.p===undefined){ const c=s.c||0,w=s.w||0; s.p=(c+w===0)?0:(w>c)?1:(c-w>=3)?4:(w===c)?2:3; }
  if(s.due===undefined) s.due=0;
  return s;
}
function applyAnswer(id,correct){
  const s=wState(id); const before=s.p; const now=Date.now();
  if(correct){ s.c++; s.p=(s.p===0)?2:Math.min(4,s.p+1); } // 初見正解→うろ覚え、以降+1
  else       { s.w++; s.p=1; }                              // 不正解→苦手
  s.t=now; s.due=now+reviewInterval(s.p);
  bumpDaily();
  return {before,after:s.p};
}
function bumpDaily(){
  const t=todayStr();
  if(!progress.daily||progress.daily.date!==t) progress.daily={date:t,count:0};
  progress.daily.count++;
}
function dailyCount(){ return (progress.daily&&progress.daily.date===todayStr())?progress.daily.count:0; }

/* ---------- cloud sync ---------- */
function getUid(){ try{ return localStorage.getItem(UID_KEY)||""; }catch(e){ return ""; } }
function setUid(v){ try{ localStorage.setItem(UID_KEY,v); }catch(e){} }
function syncStatus(t,kind){ const el=document.getElementById("syncStatus"); if(!el)return;
  el.textContent=t||""; if(kind==="ok"){ clearTimeout(syncStatus._t); syncStatus._t=setTimeout(()=>el.textContent="",1600); } }
let pushTimer=null,pushing=false,unsynced=false;
function cloudPush(){ if(!getUid())return; clearTimeout(pushTimer); pushTimer=setTimeout(doPush,800); }
/* doPush: 同期成否をレスポンスで必ず検証する。サーバが {ok:true} を返さない限り「成功」と表示しない。
   失敗してもローカル（localStorage）には保存済みなのでデータは失われない。 */
async function doPush(){ const uid=getUid(); if(!uid)return; if(pushing){ cloudPush(); return; }
  pushing=true; syncStatus("同期中…");
  try{
    const res=await fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({userId:uid+SYNC_SUFFIX,data:progress})});
    let ok=false; try{ const j=JSON.parse(await res.text()); ok=!!(j&&j.ok); }catch(_){ ok=false; }
    if(res.ok&&ok){ unsynced=false; syncStatus("同期しました ✓","ok"); }
    else{ unsynced=true; syncStatus("クラウド保存に失敗（端末には保存済み）","warn"); }
  }catch(e){ unsynced=true; syncStatus("オフライン（端末には保存済み）","warn"); }
  finally{ pushing=false; } }
/* mergeProgress: クラウドとローカルを「問題ごとに最終解答時刻 t が新しい方」で統合する。
   ローカルを丸ごと上書きしないため、クラウドが古い／空でも学習結果が消えない。
   各レコード {p,c,w,due,t} 自体は変更しない＝習熟度判定・SRS・学習履歴のロジックは不変。 */
function mergeProgress(local, cloud){
  local=local||{}; cloud=cloud||{};
  const out={ words:{}, stocked:{}, resume:{}, daily:null };
  const lw=local.words||{}, cw=cloud.words||{};
  new Set([...Object.keys(lw),...Object.keys(cw)]).forEach(id=>{
    const a=lw[id], b=cw[id];
    out.words[id]=(a&&b)?(((b.t||0)>(a.t||0))?b:a):(a||b);
  });
  out.stocked=Object.assign({}, cloud.stocked||{}, local.stocked||{});
  out.resume =Object.assign({}, cloud.resume||{},  local.resume||{});
  const t=todayStr(); const cand=[local.daily,cloud.daily].filter(d=>d&&d.date===t);
  out.daily = cand.length ? cand.reduce((m,d)=>((d.count||0)>(m.count||0)?d:m)) : (local.daily||cloud.daily||{date:t,count:0});
  return out;
}
async function cloudPull(){ const uid=getUid(); if(!uid)return false; syncStatus("読み込み中…");
  try{ const res=await fetch(GAS_URL+"?userId="+encodeURIComponent(uid+SYNC_SUFFIX)); const j=await res.json();
    if(j&&j.ok&&j.data&&typeof j.data==="object"){
      const cloud=j.data; cloud.words=cloud.words||{};
      const cloudEmpty=Object.keys(cloud.words).length===0;
      const localEmpty=Object.keys((progress&&progress.words)||{}).length===0;
      /* クラウドが空でローカルに学習結果がある場合は、絶対にローカルを消さない。逆にローカルをクラウドへ上げる。 */
      if(cloudEmpty&&!localEmpty){ syncStatus("","ok"); doPush(); return false; }
      progress=mergeProgress(progress, cloud);
      progress.words=progress.words||{}; progress.stocked=progress.stocked||{}; progress.resume=progress.resume||{}; progress.daily=progress.daily||{date:todayStr(),count:0};
      try{ localStorage.setItem(LS_KEY,JSON.stringify(progress)); }catch(e){}
      syncStatus("読み込み完了 ✓","ok"); return true; }
    syncStatus("","ok"); return false; }
  catch(e){ syncStatus("オフライン","warn"); return false; } }
async function initCloud(){ window.addEventListener("online",()=>{ if(getUid())doPush(); });
  if(!getUid())return; if(await cloudPull()) renderHome(); }
function openUidDialog(){ const cur=getUid();
  const id=window.prompt("同期IDを決めてください（他の端末で同じIDにすると進捗が共有されます）。\n例: mirin-x7k2p9\n\n※このアプリ専用の保存枠です。",cur||"");
  if(id===null)return; const v=id.trim(); if(!v)return; setUid(v);
  cloudPull().then(f=>{ if(f)renderHome(); else doPush(); }); }

let actx=null;
function tone(freq,start,dur,type,vol){ const o=actx.createOscillator(),g=actx.createGain();
  o.type=type||"sine"; o.frequency.setValueAtTime(freq,actx.currentTime+start);
  g.gain.setValueAtTime(0.0001,actx.currentTime+start);
  g.gain.exponentialRampToValueAtTime(vol||0.18,actx.currentTime+start+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+start+dur);
  o.connect(g); g.connect(actx.destination); o.start(actx.currentTime+start); o.stop(actx.currentTime+start+dur+0.02); }
function playSound(ok){ if(!settings.sound)return;

    if(ok){ tone(880,0,0.12,"sine",0.16); tone(1320,0.10,0.18,"sine",0.16); } // ピンポン上昇

/* ---------- decks ---------- */
const DECKS=[
  {key:"all",    label:"全問",    icon:"📚",info:["全問出題","この章の全ての問題を出題します"]},
  {key:"stocked",label:"保存済み",icon:"🔖",info:["保存済み","ブックマーク（★）した問題です"]},
  {key:"unlearn",label:"未着手",  icon:"<span class='deck-dot dot-unlearn'></span>",info:["未着手","まだ一度も学習していない問題です"]},
  {key:"weak",   label:"苦手",    icon:"<span class='deck-dot dot-weak'></span>",info:["苦手","間違えてしまった「苦手」な問題です"]},
  {key:"vague",  label:"うろ覚え",icon:"<span class='deck-dot dot-vague'></span>",info:["うろ覚え","あと少しで覚えられる問題です"]},
  {key:"good",   label:"ほぼ覚えた",icon:"<span class='deck-dot dot-good'></span>",info:["ほぼ覚えた","もう少しで完璧！な問題です"]},
  {key:"perfect",label:"覚えた",  icon:"<span class='deck-dot dot-perfect'></span>",info:["覚えた","完全に覚えた問題です"]},
];
function chapterCards(c){ return c.questions.map((q,idx)=>({q,idx,id:wordId(c.code,idx)})); }
function deckCount(c,key){ const now=Date.now(); let n=0;
  c.questions.forEach((q,idx)=>{ const id=wordId(c.code,idx);
    if(key==="unlearn"){ if(profOf(id)===0)n++; }
    else if(key==="weak"){ if(profOf(id)===1)n++; }
    else if(key==="vague"){ if(profOf(id)===2)n++; }
    else if(key==="good"){ if(profOf(id)===3)n++; }
    else if(key==="perfect"){ if(profOf(id)===4)n++; }
    else if(key==="stocked"){ if(isStocked(id))n++; }
    else if(key==="review"){ if(dueNow(id,now))n++; }
    else n++; });
  return n; }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }

function pickWords(c,deck,count,shuffleOn){
  const cards=chapterCards(c); const now=Date.now(); let pool;
  if(deck==="unlearn") pool=cards.filter(x=>profOf(x.id)===0);
  else if(deck==="weak") pool=cards.filter(x=>profOf(x.id)===1);
  else if(deck==="vague") pool=cards.filter(x=>profOf(x.id)===2);
  else if(deck==="good") pool=cards.filter(x=>profOf(x.id)===3);
  else if(deck==="perfect") pool=cards.filter(x=>profOf(x.id)===4);
  else if(deck==="stocked") pool=cards.filter(x=>isStocked(x.id));
  else if(deck==="review") pool=cards.filter(x=>dueNow(x.id,now));
  else pool=cards.slice();
  pool=shuffleOn?shuffle(pool):pool; if(count>0&&pool.length>count) pool=pool.slice(0,count); return pool;
}
function hasNextTraining(c){ return chapterCards(c).some(x=>profOf(x.id)<=1); }

/* ---------- scope helpers（章詳細=単章 / おさらい=全章 を“同じUI”で扱う共通化） ---------- */
/* reviewAll のときは全章を対象スコープにし、章詳細と同じ deck/出題ロジックをそのまま再利用する。
   各問題の id（章コード#idx）は元のまま保持＝習熟度・SRS・統計のロジックは一切変更しない。 */
function scopeChapters(){ return reviewAll ? DATA.chapters : (curChapter ? [curChapter] : []); }
function scopeDeckCount(key){ return scopeChapters().reduce((s,c)=>s+deckCount(c,key),0); }
function scopePick(deck,count,shuffleOn){
  let pool=[];
  scopeChapters().forEach(c=>{ pickWords(c,deck,0,false).forEach(x=>pool.push({q:x.q,idx:x.idx,id:x.id,code:c.code})); });
  pool=shuffleOn?shuffle(pool):pool;
  if(count>0&&pool.length>count) pool=pool.slice(0,count);
  return pool;
}
function scopeQuestions(){ const out=[]; scopeChapters().forEach(c=>c.questions.forEach((q,idx)=>out.push({q,idx,code:c.code}))); return out; }
function scopeDonutSVG(size){
  let cts=[0,0,0,0,0],total=0;
  scopeChapters().forEach(c=>c.questions.forEach((q,idx)=>{ cts[profOf(wordId(c.code,idx))]++; total++; }));
  if(!total) return "<div style=\"width:"+size+"px;height:"+size+"px;border-radius:50%;background:#d0d0d4;display:flex;align-items:center;justify-content:center;font-size:"+Math.round(size*0.34)+"px;\">🔁</div>";
  const DCOL=["#d0d0d4","#669efe","#8ed832","#58c568","#12a737"], ORDER=[4,3,2,1,0];
  let deg=0,stops="";
  ORDER.forEach(p=>{ const n=cts[p]; if(n>0){ const end=deg+n/total*360; stops+=DCOL[p]+" "+deg.toFixed(1)+"deg "+end.toFixed(1)+"deg,"; deg=end; }});
  stops=stops.replace(/,$/,"");
  const hole=Math.round(size*0.60);
  return "<div style=\"width:"+size+"px;height:"+size+"px;border-radius:50%;background:conic-gradient("+stops+");display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><div style=\"width:"+hole+"px;height:"+hole+"px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:"+Math.round(size*0.30)+"px;\">🔁</div></div>";
}

/* ---------- ring ---------- */
function masteryPct(c){ let sum=0; c.questions.forEach((q,idx)=>sum+=profOf(wordId(c.code,idx))); const max=c.questions.length*4; return max?Math.round(sum/max*100):0; }
function ringSVG(pct,size,centerText,centerSub){
  const r=15.9155, col=pct>=80?"#1a9d5a":pct>=40?"#00c1cc":pct>0?"#7cc6b0":"#dcdce0";
  const big=size>=90, ts=big?9:8.5, txt=centerText!=null?centerText:pct+"%";
  const sub=centerSub?`<text x="18" y="${big?24:24}" text-anchor="middle" class="ring-sub" font-size="4.2">${centerSub}</text>`:"";
  return `<svg width="${size}" height="${size}" viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="${r}" fill="none" stroke="#f0f0f0" stroke-width="3.2"/>
    <circle cx="18" cy="18" r="${r}" fill="none" stroke="${col}" stroke-width="3.2" stroke-linecap="round"
      stroke-dasharray="${pct} 100" transform="rotate(-90 18 18)"/>
    <text x="18" y="${centerSub?19:21}" text-anchor="middle" class="ring-txt" font-size="${ts}">${txt}</text>${sub}</svg>`;
}

/* ---------- DONUT CHART ---------- */
function donutSVG(c,size){
  const total=c.questions.length; if(!total) return ringSVG(0,size,"?","");
  let gray=0,blue=0,green=0;
  // 色: p=0→灰, p=1(苦手)→青, p=2/3/4(うろ覚え以上)→緑
  c.questions.forEach((q,idx)=>{ const p=profOf(wordId(c.code,idx)); if(p===0)gray++;else if(p===1)blue++;else green++; });
  const grayPct=Math.round(gray/total*100);
  const bluePct=Math.round(blue/total*100);
  const greenPct=100-grayPct-bluePct;
  const gDeg=greenPct*3.6,bDeg=bluePct*3.6;
  const chIdx=DATA.chapters.findIndex(ch=>ch.code===c.code)+1;
  const hole=Math.round(size*0.60); const fs=size>=60?14:11;
  return "<div style=\"width:"+size+"px;height:"+size+"px;border-radius:50%;background:conic-gradient(#1a9d5a 0deg "+gDeg+"deg,#3b86f0 "+gDeg+"deg "+(gDeg+bDeg)+"deg,#d0d0d4 "+(gDeg+bDeg)+"deg 360deg);display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><div style=\"width:"+hole+"px;height:"+hole+"px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:"+fs+"px;color:var(--ink);\">"+chIdx+"</div></div>";
}

/* ---------- DETAIL DONUT (5-color by proficiency) ---------- */
function detailDonutSVG(c,size){
  const total=c.questions.length; if(!total) return "<div style=\"width:"+size+"px;height:"+size+"px;border-radius:50%;background:#d0d0d4;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;\">?</div>";
  let cts=[0,0,0,0,0];

  const DCOL=["#d0d0d4","#669efe","#8ed832","#58c568","#12a737"];
