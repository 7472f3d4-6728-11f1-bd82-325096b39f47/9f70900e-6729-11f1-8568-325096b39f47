let S=null;
function startSession(){
  let cards,chapter;
  if(reviewAll){
    cards=scopePick(curDeck,settings.count,settings.shuffle); chapter=null;
  } else { chapter=curChapter;
    cards=pickWords(chapter,curDeck,settings.count,settings.shuffle).map(x=>({q:x.q,idx:x.idx,id:x.id,code:chapter.code}));
    if(settings.resume&&!settings.shuffle){ const r=progress.resume[chapter.code+":"+curDeck];
      if(r>0&&r<cards.length) cards=cards.slice(r).concat(cards.slice(0,r)); }
  }
  if(!cards.length){ alert("出題できる問題がありません。"); return; }
  S={chapter,deck:curDeck,reviewAll,mode:settings.mode,cards,i:0,correct:0,streak:0,answered:false,
     trans:[],round:1,trainAll:settings.train&&!reviewAll&&chapter,t0:Date.now()};
  if(S.mode==="quiz") runQuiz(); else runFlash();
}
function qtextHTML(q){ return esc(q).replace(/\[_+\]/g,'<span class="blank">　</span>'); }

let timerRAF=null,timerEnd=0;
function startTimer(sec,barId,fillId,onEnd){ stopTimer();
  if(!sec){ document.getElementById(barId).style.display="none"; return; }
  document.getElementById(barId).style.display="block"; const fill=document.getElementById(fillId); timerEnd=Date.now()+sec*1000;
  (function tick(){ const left=timerEnd-Date.now(); fill.style.width=Math.max(0,left/(sec*1000)*100)+"%";
    if(left<=0){ stopTimer(); onEnd(); return; } timerRAF=requestAnimationFrame(tick); })(); }
function stopTimer(){ if(timerRAF)cancelAnimationFrame(timerRAF); timerRAF=null; }

/* ---------- QUIZ ---------- */
function runQuiz(){ show("quizScreen"); renderQuiz(); }
function renderQuiz(){
  const card=S.cards[S.i]; S.answered=false;
  document.getElementById("quizFill").style.width=(S.i/S.cards.length*100)+"%";
  document.getElementById("quizCount").textContent=`${S.i+1} / ${S.cards.length}`+(S.trainAll?`　特訓${S.round}周目`:"");
  document.getElementById("quizText").innerHTML=qtextHTML(card.q.q);
  const star=document.getElementById("quizStar"); star.classList.toggle("on",isStocked(card.id));
  star.onclick=()=>{ toggleStock(card.id); star.classList.toggle("on",isStocked(card.id)); };
  const opts=shuffle(card.q.choices.slice());
  const box=document.getElementById("quizOpts");
  if(settings.hide){ box.innerHTML=`<button class="opt cover" id="cover">タップして選択肢を表示</button>`;
    document.getElementById("cover").onclick=()=>renderOptions(opts,card); }
  else renderOptions(opts,card);
  const ex=document.getElementById("quizExplain"); ex.classList.remove("show"); ex.innerHTML="";
  const nb=document.getElementById("quizNext"); nb.classList.remove("show");
  nb.textContent=(S.i===S.cards.length-1)?"結果を見る →":"次へ →";
  if(settings.quizTime) startTimer(settings.quizTime,"quizTimerBar","quizTimerFill",()=>{ if(!S.answered) answerQuiz(null,card,opts); });
  else document.getElementById("quizTimerBar").style.display="none";
}
function renderOptions(opts,card){
  const box=document.getElementById("quizOpts");
  box.innerHTML=opts.map((o,i)=>`<button class="opt" data-i="${i}"><span class="num">${i+1}</span><span>${esc(o)}</span></button>`).join("");
  box.querySelectorAll(".opt").forEach((b,i)=>b.onclick=()=>{ if(!S.answered) answerQuiz(opts[i],card,opts); });
}
function answerQuiz(choice,card,opts){
  S.answered=true; stopTimer();
  const correct=choice===card.q.answer; const t=applyAnswer(card.id,correct);
  S.trans.push({q:card.q,id:card.id,code:card.code,before:t.before,after:t.after,correct});
  if(correct){ S.correct++; S.streak++; } else S.streak=0;
  playSound(correct);
  document.querySelectorAll("#quizOpts .opt").forEach(b=>{ const txt=b.querySelector("span:last-child").textContent;
    if(txt===card.q.answer){ b.classList.add("correct"); const m=document.createElement("span"); m.className="mk"; m.textContent="◎"; b.appendChild(m); }
    else if(txt===choice){ b.classList.add("wrong"); const m=document.createElement("span"); m.className="mk"; m.textContent="×"; b.appendChild(m); }
    else b.classList.add("dim"); });
  const ex=document.getElementById("quizExplain");
  ex.innerHTML=`<div class="ex-h" style="color:${correct?'var(--ok)':'var(--ng)'}">${correct?"正解 ◎":"不正解　正解: "+esc(card.q.answer)}</div>${esc(card.q.explain||card.q.answer)}`;
  ex.classList.add("show");
  document.getElementById("quizFill").style.width=((S.i+1)/S.cards.length*100)+"%";
  if(!S.reviewAll&&S.chapter) progress.resume[S.chapter.code+":"+S.deck]=card.idx;
  saveProgress();
  const nb=document.getElementById("quizNext"); nb.classList.add("show");
  nb.onclick=()=>{ S.i++; if(S.i>=S.cards.length) endSession(); else renderQuiz(); };
}

/* ---------- FLASHCARD ---------- */
function runFlash(){ show("flashScreen"); renderFlash(); }
function renderFlash(){
  const card=S.cards[S.i]; S.flip=false;
  document.getElementById("flashFill").style.width=(S.i/S.cards.length*100)+"%";
  document.getElementById("flashCount").textContent=`${S.i+1} / ${S.cards.length}`+(S.trainAll?`　特訓${S.round}周目`:"");
  const fc=document.getElementById("fcard");
  fc.innerHTML=`<div class="face-label">問題</div><div class="face-text">${qtextHTML(card.q.q)}</div>
    <button class="card-star ${isStocked(card.id)?'on':''}" id="fStar">★</button>`;
  fc.onclick=e=>{ if(e.target.id==="fStar")return; flip(); };
  document.getElementById("fStar").onclick=()=>{ toggleStock(card.id); document.getElementById("fStar").classList.toggle("on",isStocked(card.id)); };
  document.getElementById("fhint").style.visibility="visible";
  document.getElementById("gradeRow").style.visibility="hidden";
  if(settings.cardTime) startTimer(settings.cardTime,"flashTimerBar","flashTimerFill",()=>{ if(!S.flip) flip(); });
  else document.getElementById("flashTimerBar").style.display="none";
  if(settings.auto){ const at=S.i; setTimeout(()=>{ if(!S.flip && S.i===at) flip(); }, 1000); }
}
function flip(){ if(S.flip)return; S.flip=true; stopTimer();
  const card=S.cards[S.i]; const fc=document.getElementById("fcard");
  fc.innerHTML=`<div class="face-label" style="color:var(--ok)">答え</div><div class="fans">${esc(card.q.answer)}</div>
    <div class="fexp">${esc(card.q.explain||"")}</div>`;
  document.getElementById("fhint").style.visibility="hidden";
  document.getElementById("gradeRow").style.visibility="visible";
}
document.getElementById("gradeOk").onclick=()=>gradeFlash(true);
document.getElementById("gradeNg").onclick=()=>gradeFlash(false);
function gradeFlash(ok){ if(!S.flip)flip();
  const card=S.cards[S.i]; const t=applyAnswer(card.id,ok);
  S.trans.push({q:card.q,id:card.id,code:card.code,before:t.before,after:t.after,correct:ok});
  if(ok)S.correct++; playSound(ok);
  if(!S.reviewAll&&S.chapter) progress.resume[S.chapter.code+":"+S.deck]=card.idx;
  saveProgress();
  S.i++; if(S.i>=S.cards.length) endSession(); else renderFlash();
}
function toggleStock(id){ if(progress.stocked[id]) delete progress.stocked[id]; else progress.stocked[id]=1; saveProgress(); }
document.getElementById("quizClose").onclick=goHome;
document.getElementById("flashClose").onclick=goHome;
function goHome(){ stopTimer(); renderHome(); show("homeScreen"); }

/* ---------- RESULT ---------- */
function endSession(){ stopTimer(); show("res1Screen"); renderResult1(); }
function renderResult1(){
  const total=S.cards.length, rate=Math.round(S.correct/total*100);
  const mood=rate>=90?"great":rate>=60?"good":rate>=30?"ok":"sad";
  const titles=rate>=90?["満点級！","天才！"]:rate>=60?["いいね！","その調子！"]:rate>=30?["ナイス！","コツコツ！"]:["ドンマイ！","復習しよ！"];
  document.getElementById("res1Praise").innerHTML=`<div class="pk">よく頑張りました</div><div class="pt">${titles[1]}</div><div class="pm">正答率 ${rate}%</div>`;
  document.getElementById("res1Mascot").innerHTML=mascot(mood,120);
  const sec=Math.max(1,Math.round((Date.now()-S.t0)/1000));
  document.getElementById("res1Stat").innerHTML=
    `<div class="sc-badge">わかった数</div><div class="sc-big">${S.correct}<small>/${total}</small></div>
     <div class="sc-row"><div class="sc-cell"><div class="v">${sec}<small style="font-size:11px">秒</small></div><div class="k">解答時間</div></div>
       <div class="sc-cell"><div class="v">${dailyCount()}<small style="font-size:11px">問</small></div><div class="k">本日の累計</div></div></div>`;
  const wrong=S.trans.filter(t=>!t.correct);
  const wd=document.getElementById("res1Wrong");
  if(wrong.length){ wd.innerHTML=`<div class="wrong-head"><span class="wh-t">わからなかった (${wrong.length})</span>
      <button class="wh-b" id="reviewWrong">🔁 ${wrong.length}問を復習</button></div>`+
      wrong.map(t=>`<div class="wrong-item"><div class="wi-q">${qtextHTML(t.q.q)}</div><div class="wi-a">${esc(t.q.answer)}</div></div>`).join("");
    document.getElementById("reviewWrong").onclick=()=>{
      S.cards=shuffle(wrong.map(t=>({q:t.q,idx:(t.id.split('#')[1]|0),id:t.id,code:t.code})));
      S.i=0;S.correct=0;S.streak=0;S.trans=[];S.round++;S.t0=Date.now(); if(S.mode==="quiz")runQuiz(); else runFlash(); };
  } else wd.innerHTML="";
  document.getElementById("res1Next").onclick=()=>{ show("res2Screen"); renderResult2(); };
}
function renderResult2(){
  // セッション内の前後レベルから増減を集計
  const now={1:0,2:0,3:0,4:0}, before={1:0,2:0,3:0,4:0};
  S.trans.forEach(t=>{ if(t.after>=1)now[t.after]++; if(t.before>=1)before[t.before]++; });
  const chap=S.chapter, pct=chap?masteryPct(chap):0;
  const studied=chap?chapterCards(chap).filter(x=>profOf(x.id)>0).length:0;
  const totalQ=chap?chap.questions.length:S.cards.length;
  const goalHit=dailyCount()>=DAILY_GOAL;
  // 章全体の現在習熟度分布を集計（セッション外の問題も含む）
  const chapCounts={1:0,2:0,3:0,4:0};
  if(chap){ chap.questions.forEach((q,idx)=>{ const p=profOf(wordId(chap.code,idx)); if(p>=1&&p<=4) chapCounts[p]++; }); }
  const chapTotal=chap?chap.questions.length:S.cards.length;
  const lv=(p,key,label)=>{
    const d=now[key]-before[key];
    const ds=d>0?`<span class="delta plus">+${d}</span>`:(d<0?`<span class="delta minus">${d}</span>`:"");
    const cnt=chap?chapCounts[key]:now[key];
    const pct2=chapTotal?Math.round(cnt/chapTotal*100):0;
    return `<div class="r2-brow"><span class="r2-blabel">${label}</span><div class="r2-btrack"><div class="r2-bfill" data-pct="${pct2}" style="background:${PCOLOR[key]}"></div></div><span class="r2-bcount">${cnt}問</span>${ds}</div>`;
  };
  document.getElementById("r2Card").innerHTML=
    `<div class="r2-head"><div><div class="r2-ch">${esc(chap?chap.parent:'おさらい')}</div><div class="r2-name">${esc(chap?chap.name:'全範囲の復習')}</div></div>
       <div class="r2-pct">${pct}<small>%</small></div></div>
     <div class="r2-bar"><div class="r2-fill" style="width:${chap?Math.round(studied/totalQ*100):100}%"></div>
       <span class="r2-min">${chap?studied:S.cards.length}</span><span class="r2-max">${totalQ}</span></div>
     <div class="r2-goal">${goalHit?`今日の目標${DAILY_GOAL}問を突破 🎉`:`今日 ${dailyCount()} / ${DAILY_GOAL} 問`}</div>
     <div class="r2-levels">${lv(0,4,"覚えた")}${lv(0,3,"ほぼ覚えた")}${lv(0,2,"うろ覚え")}${lv(0,1,"苦手")}</div>`;
  setTimeout(()=>{document.querySelectorAll("#r2Card .r2-bfill").forEach(el=>{el.style.width=el.dataset.pct+"%";});},50);
  const rate=Math.round(S.correct/S.cards.length*100);
  const msg=rate>=80?"すごい！この調子で完璧にしよう！":rate>=50?"いいペース！復習で定着させよう！":"間違いは伸びしろ！もう一度トライ！";
  document.getElementById("r2Speech").innerHTML=`${mascot(rate>=80?"great":"good",64)}<div class="bubble">${msg}</div>`;
  // 特訓の続き or もう一度
  const main=document.getElementById("res2Main"), sub=document.getElementById("res2Sub");
  if(S.trainAll&&S.chapter&&hasNextTraining(S.chapter)){
    const remain=chapterCards(S.chapter).filter(x=>profOf(x.id)<=1).length;
    main.textContent=`続けて特訓（残り${remain}問）`;
    main.onclick=()=>{ let cards=shuffle(chapterCards(S.chapter).filter(x=>profOf(x.id)<=1)).map(x=>({q:x.q,idx:x.idx,id:x.id,code:S.chapter.code}));
      if(settings.count>0&&cards.length>settings.count) cards=cards.slice(0,settings.count);
      S.cards=cards;S.i=0;S.correct=0;S.streak=0;S.trans=[];S.round++;S.t0=Date.now(); if(S.mode==="quiz")runQuiz(); else runFlash(); };
    sub.style.display="block"; sub.textContent="ホームに戻る"; sub.onclick=goHome;
  } else { main.textContent="ホームに戻る"; main.onclick=goHome;
    sub.style.display="block"; sub.textContent="もう一度（同じ範囲）";
    sub.onclick=()=>{ if(S.reviewAll) openReview(); else openDetail(S.chapter.code); }; }
}
document.getElementById("res1Close").onclick=goHome;
document.getElementById("res2Close").onclick=goHome;

/* ---------- DARK MODE ---------- */
(function(){
  const DK="kobunshi_dark";
  function applyDark(v){document.body.classList.toggle("dark",v);const btn=document.getElementById("darkToggle");if(btn)btn.textContent=v?"☀️":"🌙";}
  let dark=localStorage.getItem(DK)==="1"; applyDark(dark);
  document.getElementById("darkToggle").onclick=()=>{dark=!dark;localStorage.setItem(DK,dark?"1":"0");applyDark(dark);};
})();
/* ---------- boot ---------- */
renderHome();
initCloud();
</script>
